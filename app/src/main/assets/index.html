sticas en tiempo real","main_menu.show_stats_help":"Piezas, tiempo, rebotes, fallos","main_menu.sounds":"Sonidos del juego","main_menu.sounds_help":"Ralentiza ciertos teléfonos.","main_menu.starting_perks":"Beneficios iniciales","main_menu.starting_perks_checked":"Cuando inicies una nueva partida, se te asignará una de estas ventajas. Haz clic en una ventaja para excluirla.","main_menu.starting_perks_help":"Elija sus prestaciones iniciales","main_menu.starting_perks_unchecked":"Las prestaciones que figuran a continuación no se proponen como prestaciones iniciales, pero puede hacer clic en ellas para añadirlas a las posibles prestaciones iniciales.","main_menu.title":"Breakout 71","main_menu.unlocks":"Contenido desbloqueado","main_menu.unlocks_help":"Prueba los objetos desbloqueados","play.close_modale_window_tooltip":"Cerrar","play.current_lvl":"Nivel {{level}}/{{max}}","play.menu_label":"Menú","play.menu_tooltip":"Abrir el menú principal","play.missed_ball":"fallado","play.mobile_press_to_play":"Mantener pulsado para jugar","play.score_tooltip":"Consulta tu puntuación, mejoras y mucho más","play.stats.coins_catch_rate":"Tasa de captura de monedas","play.stats.levelMisses":"Fallaste tiros, o no golpeaste ningún ladrillo","play.stats.levelTime":"Duración del nivel","play.stats.levelWallBounces":"Rebota en las paredes","score_panel.close_to_unlock":"Siguiente nivel desbloqueado:","score_panel.get_upgrades_to_unlock":"Consigue {{missingUpgrades}} y coge {{points}} monedas extra para desbloquear el nivel \\"{{level}}\\".","score_panel.rerolls_count":"Has acumulado {{rerolls}} rerolls","score_panel.score_to_unlock":"Coge {{points}} monedas más para desbloquear el nivel \\"{{level}}\\".","score_panel.title":"{{score}} puntos en {{level}}/{{max}} nivel","score_panel.upcoming_levels":"Niveles de partido :","score_panel.upgrades_picked":"Mejoras elegidas durante el juego :","unlocks.greyed_out_help":"Los objetos en gris pueden desbloquearse aumentando tu puntuación total. La puntuación total aumenta cada vez que consigues puntos en el juego.","unlocks.intro":"Tu puntuación total es {{ts}}. A continuación encontrarás todas las mejoras y niveles que ofrece el juego. Haz clic en uno de ellos para probarlo en una partida de prueba.","unlocks.just_unlocked":"Nivel desbloqueado","unlocks.just_unlocked_plural":"Acabas de desbloquear {{count}} niveles","unlocks.level":"<h2>Has desbloqueado {{unlocked}} niveles en {{out_of}}</h2>\\n<p>Aquí están todos los niveles del juego, haz clic en uno para probarlo. </p> ","unlocks.level_description":"Un nivel {{size}}x{{size}} con {{bricks}} ladrillos, {{colors}} colores y {{bombs}} bombas.","unlocks.minScore":"Alcanza una puntuación de ${{minScore}} en una partida para desbloquearla.","unlocks.minScoreWithPerks":"Alcanzar ${{minScore}} en un juego con {{required}} pero sin {{forbidden}}.","unlocks.minTotalScore":"Acumula un total de ${{score}}","unlocks.reached":"Tu mejor puntuación hasta ahora es {{reached}}.","unlocks.title_upgrades":"Has desbloqueado {{unlocked}} mejoras en {{out_of}}.","upgrades.addiction.name":"Adicción","upgrades.addiction.tooltip":"+{{lvl}} combo / ladrillo, combo perdido después de {{delay}}s sin romper ningún ladrillo","upgrades.addiction.verbose_description":"La cuenta atrás sólo comienza una vez que se ha destruido el primer ladrillo del nivel, y se detiene en cuanto no hay más ladrillos.","upgrades.asceticism.name":"Ascetismo","upgrades.asceticism.tooltip":"+{{combo}} combo por ladrillo roto, - {{combo}} cuando una pieza es atrapada","upgrades.asceticism.verbose_description":"Tendremos que encontrar una forma de almacenar las piezas mientras crece el combo.","upgrades.ball_attract_ball.help_plural":"Mayor fuerza de atracción","upgrades.ball_attract_ball.name":"Gravedad","upgrades.ball_attract_ball.tooltip":"Las pelotas atraen a las pelotas","upgrades.ball_attract_ball.verbose_description":"Las bolas que están separadas más de 3/4 de la anchura de la pantalla empiezan a atraerse. La fuerza de atracción es mayor cuanto más separadas están las bolas. Las partículas del arco iris volarán para simbolizar la fuerza de atracción. Esta ventaja sólo está disponible si ya tienes más de una bola en juego.","upgrades.ball_attracts_coins.name":"Balas de la suerte","upgrades.ball_attracts_coins.tooltip":"Las monedas van con la bola más cercana","upgrades.ball_attracts_coins.verbose_description":"Puedes utilizarlo para que las piezas orbiten la pelota y colorear los ladrillos cercanos, o como una especie de rincón imantado.","upgrades.ball_repulse_ball.help_plural":"Fuerza de repulsión más fuerte","upgrades.ball_repulse_ball.name":"Vuelo en formación","upgrades.ball_repulse_ball.tooltip":"Las balas repelen a las balas","upgrades.ball_repulse_ball.verbose_description":"Las bolas que están a menos de un cuarto de la anchura de la pantalla empiezan a repelerse. La fuerza de repulsión es mayor cuanto más cerca están una de otra. Se mostrarán partículas para simbolizar la aplicación de esta fuerza. Esta ventaja sólo está disponible si ya tienes más de una bola.","upgrades.base_combo.name":"Mejor base","upgrades.base_combo.tooltip":"El combo comienza en {{coins}} en lugar de 1.","upgrades.base_combo.verbose_description":"Tu combo normalmente empieza en 1 al principio del nivel y vuelve a 1 cuando rebotas sin golpear nada. Con esta función, el combo empieza 3 puntos más arriba, por lo que siempre conseguirás al menos 4 monedas por ladrillo. Cuando tu combo se reinicia, vuelve a ser 4 en lugar de 1. Tu bola parpadeará un poco para indicar que su combo es superior a 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosiones más violentas","upgrades.bigger_explosions.verbose_description":"La explosión por defecto arrasa un cuadrado de ladrillos de 3x3; con esta mejora, uno de 5x5. El viento que sopla las piezas también es mucho más fuerte. La pantalla parpadeará un poco después de cada explosión (excepto en el modo de gráficos básicos).","upgrades.bigger_puck.name":"Raqueta más grande","upgrades.bigger_puck.tooltip":"Atrapa más monedas fácilmente.","upgrades.bigger_puck.verbose_description":"Una raqueta grande significa que nunca se te escapa la pelota y que puedes coger más piezas, además de apuntar los rebotes con precisión. Sin embargo, una raqueta grande es más difícil de usar en los laterales del nivel.","upgrades.clairvoyant.name":"Perspicaz","upgrades.clairvoyant.tooltip":"Revela los niveles, el PV de los ladrillos y la dirección de las balas","upgrades.clairvoyant.verbose_description":"Te ayuda a elegir las mejoras adecuadas y a entender qué ocurre con los \\"ladrillos macizos\\". Los niveles 2 y 3 (en modo bucle) proporcionan información adicional de dudosa utilidad.","upgrades.coin_magnet.help_plural":"Mayor efecto sobre las piezas","upgrades.coin_magnet.name":"Imán para monedas","upgrades.coin_magnet.tooltip":"La raqueta atrae monedas","upgrades.coin_magnet.verbose_description":"Dirige las piezas hacia la raqueta. El efecto es mayor en las piezas que ya están cerca de la raqueta.","upgrades.compound_interest.name":"Interés compuesto","upgrades.compound_interest.tooltip":"+{{lvl}} combo por ladrillo roto, se pone a cero cuando se pierde una pieza","upgrades.compound_interest.verbose_description":"Tu combo aumentará en uno cada vez que rompas un ladrillo. Si pierdes alguna pieza, tu combo volverá a cero.\\n\\nSi tu combo es superior al mínimo, aparecerá una línea roja en la parte inferior de la zona de juego para recordarte que las monedas no deben ir allí.","upgrades.concave_puck.name":"Raqueta cóncava","upgrades.concave_puck.tooltip":"Ayuda a evitar los bordes.","upgrades.concave_puck.verbose_description":"Las pelotas comienzan verticalmente al principio del nivel y rebotan en la raqueta más verticalmente y al revés.","upgrades.corner_shot.name":"Tiro de esquina","upgrades.corner_shot.tooltip":"Deja que tu raqueta salga del área enmarcada","upgrades.corner_shot.verbose_description":"Te ayuda a apuntar a las esquinas","upgrades.etherealcoins.name":"Moneda espacial","upgrades.etherealcoins.tooltip":"Las piezas ya no se ven afectadas por la gravedad","upgrades.etherealcoins.verbose_description":"Debe estar seguro de que las piezas se caerán en algún momento.","upgrades.extra_levels.name":"5 minutos más","upgrades.extra_levels.tooltip":"Juega {{count}} niveles en lugar de 7","upgrades.extra_levels.verbose_description":"El juego suele durar 7 niveles, tras los cuales se acaba la partida y la puntuación que hayas alcanzado es tu puntuación del juego.\\n\\nElegir esta mejora te permite prolongar el juego un nivel. Los últimos niveles suelen ser en los que más puntos consigues, así que la diferencia puede ser espectacular.","upgrades.extra_life.help_plural":"La (última) bola rebota hasta el fondo de la pantalla en lugar de perderse ( {{lvl}} veces).","upgrades.extra_life.name":"Segunda oportunidad","upgrades.extra_life.tooltip":"La pelota rebota una vez antes de perderse.","upgrades.extra_life.verbose_description":"Normalmente, sólo tienes una bola por ronda, y la ronda termina en cuanto la sueltas.\\n\\nEsta habilidad añade una barra blanca en la parte inferior de la pantalla que guardará una bola una vez, y se romperá en el proceso.\\n\\nPuedes coger varias vidas por adelantado, que se usan cada vez que una bola está a punto de perderse.","upgrades.forgiving.name":"Errar es humano","upgrades.forgiving.tooltip":"Perder los ladrillos significa perder una porción progresivamente mayor del combo","upgrades.forgiving.verbose_description":" El primer ladrillo perdido por nivel no cuesta nada, el siguiente 10%, 20% y así sucesivamente.","upgrades.fountain_toss.name":"Moneda en la fuente","upgrades.fountain_toss.tooltip":"A veces ganas un pequeño combo cuando pierdes monedas.","upgrades.fountain_toss.verbose_description":"Cuando se pierde una moneda mientras tu combo estaba por debajo de {{max}}, tu combo tiene una probabilidad de {{lvl}}/combo de incrementarse.","upgrades.ghost_coins.name":"Habitaciones fantasma","upgrades.ghost_coins.tooltip":"Las monedas atraviesan los ladrillos lentamente","upgrades.ghost_coins.verbose_description":"No es un error, ¡es una característica! Las piezas atraviesan los ladrillos lentamente. Los niveles más altos permiten que las monedas pasen más rápido a través de los ladrillos.","upgrades.helium.name":"Helio","upgrades.helium.tooltip":"Las piezas flotan en lugar de caer alrededor de la raqueta.","upgrades.helium.verbose_description":"Las monedas esperarán a estar debajo de la raqueta para caer.","upgrades.hot_start.name":"Arranque en caliente","upgrades.hot_start.tooltip":"Combo a {{start}}, -{{loss}} combo por segundo","upgrades.hot_start.verbose_description":"Al principio de cada nivel, tu combo comenzará con +30 puntos, pero cada segundo se reducirá en un punto.  ","upgrades.implosions.name":"Implosiones","upgrades.implosions.tooltip":"Las explosiones absorben las piezas en lugar de hacerlas estallar.","upgrades.implosions.verbose_description":"La fuerza de la explosión se aplica en sentido contrario. El nivel 2+ aumenta la potencia de la implosión.","upgrades.instant_upgrade.name":"Más vale pájaro en mano que ciento volando","upgrades.instant_upgrade.tooltip":"-1 mejora ahora, pero una elección de meses hasta el final del juego.","upgrades.instant_upgrade.verbose_description":"Elige inmediatamente dos mejoras para conseguir una gratis y otra para pagar la que usaste para conseguir esta ventaja. Cada vez que elijas mejoras del siguiente menú, tendrás menos opciones.","upgrades.left_is_lava.name":"Evitar el lado izquierdo","upgrades.left_is_lava.tooltip":"+{{lvl}} combo por ladrillo, se pierde al tocar el borde izquierdo","upgrades.left_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, dándote una moneda extra cada vez que rompes un ladrillo.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola golpea el lado izquierdo.\\n\\nEn cuanto tu combo aumenta, el lado izquierdo se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.limitless.name":"Sin límites","upgrades.limitless.tooltip":"Aumenta el nivel máximo de todas las mejoras de {{lvl}} .","upgrades.limitless.verbose_description":"Elegir esta ventaja también aumenta su propio límite en un punto, permitiéndote elegirla de nuevo.","upgrades.metamorphosis.name":"Metamorfosis","upgrades.metamorphosis.tooltip":"Cada pieza puede manchar {{lvl}} ladrillo(s) con su color","upgrades.metamorphosis.verbose_description":"Con esta mejora, las monedas tendrán el color del ladrillo del que proceden y colorearán el primer ladrillo que toquen.\\n\\nLas piezas aparecen a la velocidad de la bola que las rompió, lo que significa que puedes apuntar un poco en la dirección de los ladrillos que quieres \\"pintar\\".","upgrades.minefield.name":"Campo de minas","upgrades.minefield.tooltip":"+{{lvl}} combo por ladrillo explosivo en pantalla","upgrades.minefield.verbose_description":"Añade +lvl al combo cuando se coloca un ladrillo, -lvl cuando se destruye y aumenta el combo básico en el número de ladrillos multiplicado por el nivel.","upgrades.multiball.name":"Bola múltiple","upgrades.multiball.tooltip":"Cada nivel comienza con {{count}} bolas.","upgrades.multiball.verbose_description":"En cuanto sueltas la bola en Breakout 71, pierdes.\\n\\nCon esta ventaja, tienes dos bolas, así que puedes permitirte perder una.\\n\\nLas bolas perdidas vuelven al siguiente nivel.\\n\\nTener más de una bala te permite obtener otras ventajas y, por supuesto, completar el nivel más rápidamente.","upgrades.nbricks.name":"Domiciliación bancaria","upgrades.nbricks.tooltip":"Golpea exactamente {{lvl}} ladrillos por rebote para +{{lvl}} combo, de lo contrario combo perdido","upgrades.nbricks.verbose_description":"Si tu bola rebota sin romper ningún ladrillo, cuenta como golpe.  Los ladrillos destruidos por explosiones no cuentan.","upgrades.one_more_choice.name":"La respuesta D","upgrades.one_more_choice.tooltip":"1 opción de mejora adicional disponible hasta el final del juego","upgrades.one_more_choice.verbose_description":"Cada menú de mejoras tendrá una opción adicional.  Esto no aumenta el número de mejoras que puede elegir, pero le ayuda a crear el perfil ideal. \\"Respuesta D\\" es una referencia a un sketch clásico.","upgrades.passive_income.name":"Ingresos pasivos","upgrades.passive_income.tooltip":"+{{lvl}} combo / ladrillo, a menos que la raqueta se haya movido en los últimos {{time}} segundos, en cuyo caso se pierde el combo.","upgrades.passive_income.verbose_description":"Algunas mejoras hacen que las pelotas se muevan sin necesidad de poner la raqueta en movimiento.","upgrades.picky_eater.name":"Comer por colores","upgrades.picky_eater.tooltip":"+{{lvl}} combo por ladrillo roto del color de la bola, combo perdido en caso contrario","upgrades.picky_eater.verbose_description":"Cada vez que rompes un ladrillo del mismo color que tu bola, tu combinación aumenta en uno.\\nSi es de otro color, la bola adopta este nuevo color, pero la combinación se reinicia, a menos que no queden ladrillos del mismo color que la bola. Los ladrillos de color incorrecto se marcan con un círculo rojo. Si tienes más de una bola, todas cambian de color al mismo tiempo cuando una de ellas toca un ladrillo.","upgrades.pierce.name":"Bola perforadora","upgrades.pierce.tooltip":"La pelota golpea {{count}} ladrillos después de cada rebote en la raqueta.","upgrades.pierce.verbose_description":"Normalmente, la pelota rebota en cuanto golpea un ladrillo. Con esta mejora, continuará su trayectoria hasta que haya roto 3 ladrillos.\\n\\nDespués, rebotará en el cuarto ladrillo y tendrá que tocar la raqueta para poner a cero el contador.","upgrades.pierce_color.name":"Taladro de color","upgrades.pierce_color.tooltip":"+{{lvl}} de daño a los ladrillos del mismo color que la bola","upgrades.pierce_color.verbose_description":"Cada vez que una bola golpea un ladrillo del mismo color, lo atraviesa sin obstáculos.\\n\\nCuando choca contra un ladrillo de otro color, lo rompe, adopta su color y rebota.\\n\\nSi tienes ladrillos macizos, las cosas funcionan de otra manera.","upgrades.puck_repulse_ball.help_plural":"La fuerza de repulsión es mayor","upgrades.puck_repulse_ball.name":"Aterrizaje suave","upgrades.puck_repulse_ball.tooltip":"La raqueta repele las pelotas","upgrades.puck_repulse_ball.verbose_description":"Cuando una pelota se acerca a la raqueta, empieza a frenarse e incluso a botar sin tocar el disco.","upgrades.reach.name":"Ataque aéreo","upgrades.reach.tooltip":"Romper uno de los N ladrillos de la línea inferior destruye el combo. De lo contrario, +N combo.","upgrades.reach.verbose_description":"Si sólo hay una fila de ladrillos, o si la fila más baja cubre todo el ancho del juego, esta ventaja no tiene efecto. De lo contrario, si se rompe esta fila inferior, se reinicia el combo; si se rompe cualquier otra fila, el combo aumenta en el número de ladrillos de esa fila.\\n\\nLa fila inferior de ladrillos se marcará con un círculo rojo para recordarte que no debes tocarla.","upgrades.respawn.name":"Reaparición","upgrades.respawn.tooltip":"{{percent}}% de los ladrillos reaparecen después de {{delay}}s.","upgrades.respawn.verbose_description":"Los efectos de partículas te mostrarán dónde aparecerán los ladrillos.","upgrades.right_is_lava.name":"Evitar el lado derecho","upgrades.right_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el impacto con el lado derecho","upgrades.right_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, dándote una moneda extra cada vez que rompas los ladrillos siguientes.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola toca el lado derecho del área de juego.\\n\\nEn cuanto tu combo aumenta, el lado derecho se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.sacrifice.help_l1":"Perder una vida destruye todos los ladrillos","upgrades.sacrifice.help_over":"Perder una vida multiplica el combo por {{lvl}} y luego destruye todos los ladrillos de la pantalla","upgrades.sacrifice.name":"Sacrificio","upgrades.sacrifice.verbose_description":"El combo podría llegar muy alto.","upgrades.sapper.help_plural":"Los primeros {{lvl}} ladrillos rotos se convierten en bombas.","upgrades.sapper.name":"Zapador","upgrades.sapper.tooltip":"El primer ladrillo roto se convierte en una bomba.","upgrades.sapper.verbose_description":"En lugar de desaparecer, el primer ladrillo roto es sustituido por una bomba. Al rebotar la pelota en la raqueta, se restablece el efecto.  A medida que subas de nivel, podrás colocar más bombas.","upgrades.shocks.name":"Choque","upgrades.shocks.tooltip":"Choque explosivo entre balas","upgrades.shocks.verbose_description":"Cuando dos balas chocan, intercambian velocidades, crean una explosión y ganan un poco de la velocidad que las separaba.","upgrades.shunt.name":"Derivación","upgrades.shunt.tooltip":"Aparca {{percent}}% de combo al cambiar de nivel","upgrades.shunt.verbose_description":"El arranque en caliente simplemente se añadirá a la combinación actual","upgrades.side_flip.name":"Derecha","upgrades.side_flip.tooltip":"+{{lvl}} combo por ladrillo roto de la derecha, -{{loss}} de lo contrario","upgrades.side_flip.verbose_description":"Golpea el ladrillo por su lado derecho para conseguir un combo, pero evita golpearlo por su lado izquierdo ya que esto cancelará dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.side_kick.name":"Zurdos","upgrades.side_kick.tooltip":"+{{lvl}} combo por ladrillo roto de la izquierda, -{{loss}} de lo contrario","upgrades.side_kick.verbose_description":"Golpea el ladrillo por su lado izquierdo para conseguir un combo, pero evita golpearlo por su lado derecho ya que esto cancelará dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.skip_last.help_plural":"Los últimos {{lvl}} ladrillos restantes se autodestruirán","upgrades.skip_last.name":"Fácil de limpiar","upgrades.skip_last.tooltip":"El último ladrillo se autodestruye.","upgrades.skip_last.verbose_description":"Tienes que romper todos los ladrillos para pasar al siguiente nivel.\\n\\nSin embargo, puede ser difícil conseguir los últimos ladrillos.\\n\\nCompletar un nivel antes de tiempo te da opciones extra al subir de nivel.\\n\\nNo quedarte nunca sin ladrillos también es una gran ventaja.\\n\\nAsí que si te cuesta romper los últimos ladrillos, conseguir esta ventaja unas cuantas veces puede ayudarte.","upgrades.slow_down.name":"Bola lenta","upgrades.slow_down.tooltip":"El balón se mueve más despacio","upgrades.slow_down.verbose_description":"La bola empieza relativamente despacio, pero con cada nivel del juego empieza un poco más rápido, y también se acelera si pasas mucho tiempo en un nivel.\\n\\nEsta ventaja hace que la bola sea más fácil de manejar.\\n\\nPuedes conseguirla al principio de cada partida activando el modo niño en el menú.","upgrades.smaller_puck.help_plural":"La raqueta se encoge aún más y el combo vuelve a aumentar.","upgrades.smaller_puck.name":"Raqueta más pequeña","upgrades.smaller_puck.tooltip":"También da +5 combo","upgrades.smaller_puck.verbose_description":"Recibes una bonificación de combo permanente de +5 por elegir esta mejora.","upgrades.soft_reset.name":"Restablecimiento progresivo","upgrades.soft_reset.tooltip":"Al reiniciar el combo se conserva el {{percent}}% de los puntos","upgrades.soft_reset.verbose_description":"Limita el impacto de un reinicio de combo.","upgrades.streak_shots.name":"Secuencia de destrucción","upgrades.streak_shots.tooltip":"Más piezas si rompes varios ladrillos a la vez.","upgrades.streak_shots.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta. El combo se pone a cero cuando la pelota golpea la raqueta. Una vez que tu combo supera el valor base, tu raqueta se vuelve roja para recordarte que tocarla con la pelota destruirá tu combo.","upgrades.sturdy_bricks.name":"Ladrillos macizos","upgrades.sturdy_bricks.tooltip":"+{{lvl}} puntos de vida de los ladrillos, +{{percent}}% monedas cuando se destruyen","upgrades.sturdy_bricks.verbose_description":"Cada nivel de esta mejora añade un PV a todos los ladrillos. Puedes comprobar el número de PV usando la cualificación \\"Clarividente\\". Puedes aumentar el daño de las balas obteniendo la mejora \\"Bala perforante\\". Cada nivel de esta mejora añade un 50% más de monedas.","upgrades.telekinesis.help_plural":"Mayor efecto sobre el balón","upgrades.telekinesis.name":"Telequinesis","upgrades.telekinesis.tooltip":"Control de la trayectoria del balón","upgrades.telekinesis.verbose_description":"Controla la bola mientras sube.","upgrades.top_is_lava.name":"Icare","upgrades.top_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el rebote del techo","upgrades.top_is_lava.verbose_description":"Cada vez que rompas un ladrillo, tu combo aumentará en uno. Sin embargo, tu combo se reiniciará en cuanto tu bola llegue a la parte superior de la pantalla.\\n\\nCuando tu combo supere el mínimo, aparecerá una barra roja en la parte superior de la pantalla para recordarte que debes evitar golpearla.","upgrades.trampoline.name":"Trampolín","upgrades.trampoline.tooltip":"+{{lvl}} combo cada vez que una pelota rebota en la raqueta,-{{lvl}} combo cada vez que una pelota rebota en uno de los bordes","upgrades.trampoline.verbose_description":"Una de las pocas mejoras que no tiene una condición de reinicio","upgrades.unbounded.help_no_ceiling":"+{{lvl}} combo por ladrillo, más lados o techo","upgrades.unbounded.name":"Liberado, entregado","upgrades.unbounded.tooltip":"+{{lvl}} combo por ladrillo, más lados para mantener la pelota en juego, peligro","upgrades.unbounded.verbose_description":"Espero que hayas encontrado la forma de mantener tu bola en la pantalla. En el nivel 2+, el techo también desaparecerá. Se trata de una ventaja avanzada.","upgrades.viscosity.name":"Fluido viscoso","upgrades.viscosity.tooltip":"Las piezas caen más lentamente","upgrades.viscosity.verbose_description":"Las piezas normalmente se aceleran con la gravedad y las explosiones para alcanzar velocidades bastante altas.\\n\\nEsta habilidad las ralentiza constantemente, como si estuvieran en una especie de líquido viscoso.\\n\\nEsto facilita su captura y combina bien con mejoras que influyen en el movimiento de la pieza.","upgrades.wind.help_plural":"Viento más fuerte","upgrades.wind.name":"Viva el viento","upgrades.wind.tooltip":"La posición de la raqueta crea viento","upgrades.wind.verbose_description":"El viento depende de la posición de la raqueta en la pantalla, hacia la izquierda si está a la izquierda, hacia la derecha si está a la derecha.\\nAfecta a pelotas y piezas.","upgrades.yoyo.name":"Yo-Yo","upgrades.yoyo.tooltip":"La pelota desciende hacia la raqueta.","upgrades.yoyo.verbose_description":"Es lo contrario de la Telequinesis: controlar la pelota mientras cae hacia la raqueta.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"+{{lvl}} combo por ladrillo, hasta que haya una explosión","upgrades.zen.verbose_description":"Básicamente es un juego no violento."}');var T={};T=JSON.parse('{"confirmRestart.no":"Annuler","confirmRestart.text":"Vous êtes sur le point de commencer une nouvelle partie, est-ce vraiment ce que vous vouliez ?","confirmRestart.title":"Démarrer une nouvelle partie ?","confirmRestart.yes":"Commencer une nouvelle partie","gameOver.creative":"Cette partie de test ne sera pas enregistrée.","gameOver.cumulative_total":"Votre score total cumulé est passé de {{startTs}} à {{endTs}}.","gameOver.lost.summary":"Vous avez fait tomber la balle après avoir attrapé {{score}} pièces.","gameOver.lost.title":"Balle perdue","gameOver.stats.balls_lost":"Balles perdues","gameOver.stats.bricks_broken":"Briques cassées","gameOver.stats.bricks_per_minute":"Briques cassées par minute","gameOver.stats.catch_rate":"Pièces attrapées","gameOver.stats.combo_avg":"Combo moyen","gameOver.stats.combo_max":"Combo maximum","gameOver.stats.duration_per_level":"Durée par niveau","gameOver.stats.hit_rate":"Précision","gameOver.stats.intro":"Vous trouverez ci-dessous les statistiques de cette partie comparées à vos {{count}} meilleures parties.","gameOver.stats.level_reached":"Niveau atteint","gameOver.stats.total_score":"Score total","gameOver.stats.upgrades_applied":"Améliorations appliquées","gameOver.unlocked_perk":"Amélioration débloquée","gameOver.unlocked_perk_plural":"Vous avez débloqué {{count}} améliorations","gameOver.win.summary":"Cette partie est terminée. Vous avez accumulé {{score}} pièces. ","gameOver.win.title":"Vous avez terminé cette partie","history.columns.score":"Score","history.columns.started":"Date","history.help":"Liste vos {{count}} meilleurs parties.","history.locked":"Jouez d\'abord au moins dix parties","history.title":"Historique","lab.help":"Essayez n\'importe quel combinaison d\'améliorations et de niveaux.","lab.instructions":"Sélectionnez les améliorations ci-dessous, puis choisissez le niveau à jouer. .","lab.menu_entry":"Mode créatif","lab.reset":"Retirer toutes les améliorations","lab.select_level":"Sélectionnez un niveau sur lequel jouer","lab.unlocks_at":"Déverrouillé à partir d\'un score total de {{score}}","level_up.after_buttons":"Vous venez de terminer le niveau {{level}}/{{max}}.","level_up.before_buttons":"Vous avez attrapé {{score}} pièces {{catchGain}} sur {{levelSpawnedCoins}} en {{time}} secondes {{timeGain}}.\\n\\nVous avez raté les briques {{levelMisses}} fois {{missesGain}} et touché les bords de la zone de jeu {{levelWallBounces}} fois {{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Essayez d\'attraper toutes les pièces, de ne jamais rater les briques, de ne pas toucher les murs ou de terminer le niveau en moins de 30 secondes pour obtenir des choix supplémentaires et des améliorations.","level_up.compliment_good":"Bravo !","level_up.compliment_perfect":"Impressionnant, continuez comme ça !","level_up.pick_upgrade_title":"Choisir une amélioration","level_up.plus_one_upgrade":"(+1 upgrade)","level_up.plus_one_upgrade_and_reroll":"(+1 amélioration et +1 relance)","level_up.reroll":"Relancer ({{count}})","level_up.reroll_help":"Nouveaux choix","level_up.upgrade_perk_to_level":"  niveau {{level}}","main_menu.basic":"Graphismes simplifiés","main_menu.basic_help":"Meilleures performances.","main_menu.colorful_coins":"Pièces colorées","main_menu.colorful_coins_help":"Les pièces apparaissent toujours de la couleur de la brique","main_menu.comboIncreaseTexts":"Afficher un +X doré","main_menu.comboIncreaseTexts_help":"Quand le combo augmente","main_menu.contrast":"Contraste élevé","main_menu.contrast_help":"Affichage plus contrasté et coloré","main_menu.credit_levels":"Niveaux","main_menu.donate":"Vous avez joué {{hours}} heures","main_menu.donate_help":"Pourriez-vous donner quelques euros ? Vous pouvez masquer ce rappel dans les paramètres.","main_menu.donation_reminder":"Me rappeler de donner","main_menu.donation_reminder_help":"Afficher le temps de jeu et un lien pour donner dans le menu principal","main_menu.download_save_file":"Sauvegarder mes progrès","main_menu.download_save_file_help":"Obtenir un fichier de sauvegarde","main_menu.extra_bright":"Plus de lumière","main_menu.extra_bright_help":"Plus grand halo lumineux autours des briques et pièces.","main_menu.fullscreen":"Plein écran","main_menu.fullscreen_help":"Le jeu essaiera de passer en plein écran quand vous le démarrez","main_menu.help_content":"## Objectif\\n\\nAttrapez un maximum de pièces au cours des 7 niveaux.\\nLes pièces apparaissent lorsque vous cassez des briques.\\nAttrapez-les avec votre palet pour augmenter votre score.\\nVotre score est affiché en haut à droite de l\'écran.\\nNe laissez pas tomber la balle, sinon la partie est terminée.\\n\\nAprès avoir détruit toutes les briques, vous pourrez choisir une amélioration.\\n\\n## Améliorations\\n\\nLes améliorations que vous choisissez seront valables jusqu\'à la fin de la partie.\\nCertaines peuvent être sélectionnées plusieurs fois pour un effet plus puissant.\\nD\'autres aident à viser ou simplifient le jeu.\\nCertaines ne sont utiles que lorsqu\'elles sont combinées.\\n\\nVous obtenez toujours une amélioration au début de chaque partie.\\nSon icône forme les briques du premier niveau.\\nVous pouvez sélectionner les améliorations de départ dans les paramètres.\\n\\nDe nombreuses améliorations influencent votre combo.\\n\\n## Combo\\n\\nVotre « combo » correspond au nombre de pièces générées lorsqu\'une brique se casse.\\nIl est affiché sur votre palet. Par exemple, x4 signifie que chaque brique rapporte 4 pièces.\\n\\nLa plupart des améliorations qui augmentent le combo ajoutent également une condition pour le réinitialiser.\\nLe combo se réinitialise également si la balle revient sur la raquette sans toucher de brique.\\nUn message « Manqué » s\'affiche alors.\\n\\nEssayez de viser vers un brique à chaque rebond.\\n\\n## Visée\\n\\nSeule la position de la balle sur la raquette détermine son angle de rebond.\\nSi la balle touche la raquette en plein centre, elle rebondira verticalement.\\nSi vous frappez sur le côté de la raquette, l\'angle sera plus grand.\\nLa vitesse de la raquette et l\'angle d\'incidence de la balle n\'ont pas d\'effet.\\n\\nDe nombreuses améliorations facilitant la visée peuvent être débloquées.\\n\\n## Déblocages\\n\\nLorsque vous jouez à Breakout 71 pour la première fois, la plupart des améliorations et des niveaux sont verrouillés.\\nLes améliorations se débloquent simplement en jouant et en attrapant beaucoup de pièces.\\nLes premiers niveaux se débloquent en atteignant un score élevé.\\nLes niveaux suivants ajoutent une condition concernant les avantages sélectionnés.\\n\\nAtteindre des scores élevés est beaucoup plus facile lorsque vous obtenez plusieurs améliorations après chaque niveau.\\n\\n## Relances et améliorations gratuites\\n\\nVous obtiendrez une amélioration supplémentaire si vous jouez bien :\\n\\n- Terminez le niveau en moins de {{levelTimeGood}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedGood}} fois\\n- Attrapez {{catchRateGood}} % de pièces\\n- Manquez les briques moins de {{missesGood}} fois\\n\\nVous bénéficierez également d\'une relance qui vous permettra d\'ignorer les améliorations  si vous faites  encore mieux :\\n\\n- Terminez un niveau en moins de {{levelTimeBest}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedBest}} fois\\n- Attrapez {{catchRateBest}} % de pièces\\n- Manquez les briques moins de {{missesBest}} fois\\n\\nUne option dans les paramètres vous permet d\'afficher ces statistiques ","main_menu.help_help":"Découvrez le jeu en détail","main_menu.help_title":"Aide","main_menu.help_upgrades":"## Améliorations","main_menu.high_score":"High score : {{score}}","main_menu.kid":"Mode enfants","main_menu.kid_help":"Balle plus lente","main_menu.language":"Langue","main_menu.language_help":"Changer la langue d\'affichage","main_menu.load_save_file":"Charger une sauvegarde","main_menu.load_save_file_help":"Depuis un fichier ","main_menu.max_coins":"{{max}} pièces affichées maximum","main_menu.max_coins_help":"Visuel uniquement, pas d\'impact sur le score","main_menu.max_particles":" {{max}} particules maximum","main_menu.max_particles_help":"Limite le nombre de particules affichées à l\'écran pour les effets visuels","main_menu.mobile":"Mode mobile","main_menu.mobile_help":"Laisse un espace sous la raquette.","main_menu.normal":"Nouvelle Partie","main_menu.normal_help":"Avec un avantage de départ aléatoire","main_menu.pointer_lock":"Verrouillage du pointeur","main_menu.pointer_lock_help":"Cache aussi le curseur de la souris.","main_menu.record":"Enregistrer des vidéos de jeu","main_menu.record_download":"Télécharger la vidéo ({{size}} MB)","main_menu.record_help":"Obtenez une vidéo de chaque niveau.","main_menu.red_miss":"Balles ratées","m ons sur {{out_of}}","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brique, combo perdu après {{delay}}s sans casser de briques","upgrades.addiction.verbose_description":"Le décompte ne commence qu\'à parti de la  destruction de la première brique du niveau, et s\'arrête dès qu\'il n\'y a plus de briques. ","upgrades.asceticism.name":"Ascétisme","upgrades.asceticism.tooltip":"+{{combo}} combo par brique cassée, - {{combo}} quand une pièce est attrapée","upgrades.asceticism.verbose_description":"Il faudra trouver un moyen de stocker les pièces pendant que le combo grandis. ","upgrades.ball_attract_ball.help_plural":"Force d\'attraction plus forte","upgrades.ball_attract_ball.name":"Gravité","upgrades.ball_attract_ball.tooltip":"Les balles attirent les balles","upgrades.ball_attract_ball.verbose_description":"Les balles qui sont éloignées de plus de 3/4 de la largeur d\'écran commencent à s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus éloignées l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle en jeu.","upgrades.ball_attracts_coins.name":"Balles fortunées","upgrades.ball_attracts_coins.tooltip":"Les pièces accompagnent la balle la plus proche ","upgrades.ball_attracts_coins.verbose_description":"Vous pourriez l\'utiliser pour que les pièces orbitent autours de la balle et colorent les briques à proximité, ou comme une sorte de coin magnet. ","upgrades.ball_repulse_ball.help_plural":"Force de répulsion plus forte","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.ball_repulse_ball.tooltip":"Les balles repoussent les balles","upgrades.ball_repulse_ball.verbose_description":"Les balles qui se trouvent à moins d\'un quart de largeur d\'écran commencent à se repousser les unes les autres. La force de répulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affichées pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle.","upgrades.base_combo.name":"Meilleur base","upgrades.base_combo.tooltip":"Le combo commence à {{coins}} au lieu de 1.","upgrades.base_combo.verbose_description":"Votre combo commence normalement à 1 au début du niveau et revient à 1 lorsque vous rebondissez sans rien toucher. Avec cette caractéristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pièces par brique. Lorsque votre combo est réinitialisé, il revient à 4 et non à 1.  Votre balle scintillera un peu pour indiquer que son combo est supérieur à 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosions plus violentes","upgrades.bigger_explosions.verbose_description":"L\'explosion par défaut efface un carré de 3x3 briques, avec cette amélioration un carré de 5x5. Le vent soufflant les pièces est également beaucoup plus fort. L\'écran clignotera un peu après chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_puck.name":"Raquette plus grande","upgrades.bigger_puck.tooltip":"Attrapez facilement plus de pièces.","upgrades.bigger_puck.verbose_description":"Une grande raquette permet de ne jamais rater la balle et d\'attraper plus de pièces, ainsi que d\'orienter précisément les rebonds. Cependant, une grande raquette est plus difficile à utiliser sur les côtés du niveau.","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"Révèle les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.verbose_description":"Vous aide à choisir les bonnes améliorations et à comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) amènent des informations complémentaires d\'une utilité douteuse. ","upgrades.coin_magnet.help_plural":"Effet plus marqué sur les pièces","upgrades.coin_magnet.name":"Aimant pour pièces","upgrades.coin_magnet.tooltip":"La raquette attire les pièces","upgrades.coin_magnet.verbose_description":"Dirige les pièces vers la raquette. L\'effet est plus fort sur les pièces déjà proche de la raquette. ","upgrades.compound_interest.name":"Intérêts composés","upgrades.compound_interest.tooltip":"+{{lvl}} combo par brique cassée, remise à zéro quand une pièce est perdu","upgrades.compound_interest.verbose_description":"Votre combo augmentera d\'une unité à chaque fois que vous casserez une brique. Toute pièce perdue remettra votre combo à zéro. \\n\\nSi votre combo est supérieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pièces ne doivent pas aller à cet endroit.","upgrades.concave_puck.name":"Raquette concave","upgrades.concave_puck.tooltip":"Aide à éviter les bords.","upgrades.concave_puck.verbose_description":"Les balles démarrent verticalement en début de niveau, et rebondi sur la raquette de manière plus verticale et inversée.","upgrades.corner_shot.name":"Tir en coin","upgrades.corner_shot.tooltip":"Laisse votre raquette sortir de la zone encadrée","upgrades.corner_shot.verbose_description":"Aide à viser dans les coins","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.etherealcoins.tooltip":"Les pièces ne subissent plus la gravité","upgrades.etherealcoins.verbose_description":"Il faudrait vous assurer que les pièces tomberont bien quand même à un moment.","upgrades.extra_levels.name":"Encore 5 minutes","upgrades.extra_levels.tooltip":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.verbose_description":"La partie dure normalement 7 niveaux, après quoi le jeu est terminé et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette amélioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux où vous faites le plus de points, la différence peut donc être spectaculaire.","upgrades.extra_life.help_plural":"La (dernière) balle rebondit en bas de l\'écran au lieu d\'être perdue ( {{lvl}} fois).","upgrades.extra_life.name":"Seconde chance","upgrades.extra_life.tooltip":"La balle rebondit une fois avant d\'être perdue.","upgrades.extra_life.verbose_description":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est terminée dès que vous la laissez tomber.\\n\\nCette compétence ajoute une barre blanche en bas de l\'écran qui sauvera une balle une fois, et se brisera au cours du processus.\\n\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilisées à chaque fois qu\'une balle est sur le point d\'être perdue. ","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.forgiving.tooltip":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.verbose_description":" La première brique ratée par niveau ne coûte rien, la suivante 10%, 20%, etc.","upgrades.fountain_toss.name":"Pièce dans la fontaine","upgrades.fountain_toss.tooltip":"Gagnez parfois un peu de combo quand vous perdez des pièces.","upgrades.fountain_toss.verbose_description":"Quand une pièce est perdue alors que votre combo était en dessous de {{max}}, votre combo à une probabilité de {{lvl}}/combo d\'être incrémenté","upgrades.ghost_coins.name":"Pièces fantôme","upgrades.ghost_coins.tooltip":"Les pièces traversent les briques doucement","upgrades.ghost_coins.verbose_description":"Ce n\'est pas une bug, c\'est une fonctionnalité ! Les pièces passent à travers les briques doucement. Les niveaux plus élevés permettent aux pièce de traverser les briques plus vite.","upgrades.helium.name":"Hélium","upgrades.helium.tooltip":"Les pièce flottent au lieu de tomber autours de la raquette.","upgrades.helium.verbose_description":"Les pièces attendront d\'être sous la raquette pour tomber. ","upgrades.hot_start.name":"Démarrage à chaud","upgrades.hot_start.tooltip":"Combo à {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.verbose_description":"Au début de chaque niveau, votre combo commencera à +30 points, mais à chaque seconde, il sera diminué d\'un point.  ","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Les explosions aspirent les pièces au lieu de les faire exploser.","upgrades.implosions.verbose_description":"La force d’explosion est appliquée dans l’autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.instant_upgrade.name":"Un tiens vaut deux tu l\'auras","upgrades.instant_upgrade.tooltip":"-1 amélioration maintenant, mais un choix de mois jusqu\'à la fin de la partie.","upgrades.instant_upgrade.verbose_description":"Choisissez immédiatement deux améliorations, afin d\'en obtenir une gratuite et une autre pour rembourser celle utilisée pour obtenir cet avantage. Chaque fois que vous choisirez des améliorations dans le menu suivant, vous aurez moins de choix.","upgrades.left_is_lava.name":"Éviter le côté gauche","upgrades.left_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en touchant le bord gauche","upgrades.left_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté gauche.\\n\\nDès que votre combo augmente, le côté gauche devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.limitless.name":"Sans limites","upgrades.limitless.tooltip":"Augmenter le niveau maximum de toutes les mises à niveau de {{lvl}} ","upgrades.limitless.verbose_description":"Choisir cet avantage augmente également sa propre limite d\'un point, vous permettant de le choisir à nouveau.","upgrades.metamorphosis.name":"Métamorphose","upgrades.metamorphosis.tooltip":"Chaque pièce peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.verbose_description":"Avec cette amélioration, les pièces seront de la couleur de la brique d\'où elles proviennent et coloreront la première brique qu\'elles toucheront. \\n\\nLes pièces apparaissent à la vitesse de la balle qui les a cassées, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\".","upgrades.minefield.name":"Terrain miné","upgrades.minefield.tooltip":"+{{lvl}} combo par brique explosive à l\'écran","upgrades.minefield.verbose_description":"Ajoute +lvl au combo lorsqu\'une brique est placée, -lvl lorsqu\'elle est détruite et augmente le combo de base du nombre de briques multiplié par le niveau","upgrades.multiball.name":"Multi balle","upgrades.multiball.tooltip":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.verbose_description":"Dès que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien sûr, de franchir le niveau plus rapidement.","upgrades.nbricks.name":"Prélèvement","upgrades.nbricks.tooltip":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon combo perdu","upgrades.nbricks.verbose_description":"Si votre balle rebondis sans casser une brique, ça compte quand même comme une frappe.  Les briques détruites par des explosions ne comptent pas.","upgrades.one_more_choice.name":"La réponse D","upgrades.one_more_choice.tooltip":"1 choix supplémentaire d\'amélioration proposé jusqu\'à la fin de la partie","upgrades.one_more_choice.verbose_description":"Chaque menu d\'amélioration comportera une option supplémentaire.  Cela n\'augmente pas le nombre d\'améliorations que vous pouvez choisir, mais vous aide à créer le profile idéal. \\"La réponse D\\" est une référence à un sketch classique. ","upgrades.passive_income.name":"Revenu passif","upgrades.passive_income.tooltip":"+{{lvl}} combo / brique, sauf si la raquette à bougé dans les {{time}} dernières secondes, combo perdu dans ce cas","upgrades.passive_income.verbose_description":"Certaines amélioration font bouger les balles sans avoir besoin de mettre la raquette en mouvement.","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.picky_eater.tooltip":"+{{lvl}} combo par brique cassée la couleur de la balle,  combo perdu sinon","upgrades.picky_eater.verbose_description":"Chaque fois que vous cassez une brique de la même couleur que votre balle, votre combo augmente d\'une unité.\\nS\'il s\'agit d\'une couleur différente, la balle adopte cette nouvelle couleur, mais la combinaison est réinitialisée, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle. Les briques de la mauvaise couleur sont entourées en rouge. Si vous avez plus d\'une balle, elles changent toutes de couleur en même temps lorsque l\'une d\'entre elles touche une brique.","upgrades.pierce.name":"Balle perçante","upgrades.pierce.tooltip":"La balle perce {{count}} briques après chaque rebond  sur la raquette.","upgrades.pierce.verbose_description":"Normalement , la balle rebondit dès qu\'elle touche une brique. Avec cette amélioration, elle continuera sa trajectoire jusqu\'à avoir cassées 3 briques.\\n\\nAprès cela, elle rebondira sur la quatrième brique et devra toucher la raquette pour remettre le compteur à zéro.","upgrades.pierce_color.name":"Perceur de couleur","upgrades.pierce_color.tooltip":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.verbose_description":"Chaque fois qu\'une balle touche une brique de la même couleur, elle la traverse sans encombre.\\n\\nLorsqu\'elle atteint une brique de couleur différente, elle la casse, prend sa couleur et rebondit. \\n\\nSi vous avez des briques solides, le fonctionnement est un peu différent. ","upgrades.puck_repulse_ball.help_plural":"La force de répulsion est plus grande","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.puck_repulse_ball.tooltip":"La raquette repousse les balles","upgrades.puck_repulse_ball.verbose_description":"Lorsqu\'une balle s\'approche de la raquette, elle commence à ralentir, voire à rebondir sans toucher le palet.","upgrades.reach.name":"Attaque aérienne","upgrades.reach.tooltip":"Casser une des N briques de la ligne la plus basse détruit le combo. Sinon, +N combo.","upgrades.reach.verbose_description":"S\'il n\'y a qu\'une seule rangée de briques, ou si la rangée la plus basse couvre toute la largeur du jeu, cet avantage est sans effet. Sinon, briser cette rangée la plus basse réinitialise le combo ; briser toute autre rangée augmente le combo du nombre de briques présentes sur cette rangée.\\n\\nLa rangée de briques du bas sera entourée en rouge pour vous rappeler de ne pas la toucher. ","upgrades.respawn.name":"Réapparition ","upgrades.respawn.tooltip":"{{percent}}% des briques réapparaissent après {{delay}}s.","upgrades.respawn.verbose_description":"Des effets de particules vous indiqueront où les briques apparaîtront. ","upgrades.right_is_lava.name":"Éviter le côté droit","upgrades.right_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de choc avec le coté droit","upgrades.right_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté droit de la zone de jeu.\\n\\nDès que votre combo augmente, le côté droit devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.sacrifice.help_l1":"Perdre une vie détruit toutes les briques","upgrades.sacrifice.help_over":"Perdre une vie multiplie le combo par {{lvl}} puis détruit toutes les briques à l\'écran","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.verbose_description":"Le combo pourrait monter assez haut.","upgrades.sapper.help_plural":"Les premières briques {{lvl}} cassées deviennent des bombes.","upgrades.sapper.name":"Sapeur","upgrades.sapper.tooltip":"La première brique cassée devient une bombe.","upgrades.sapper.verbose_description":"Au lieu de disparaître, la première brique cassée est remplacée par une bombe. Faire rebondir la balle sur la raquette réarme l\'effet.  En montant en niveau, vous pourrez placer plus de bombes.","upgrades.shocks.name":"Choc","upgrades.shocks.tooltip":"Collision explosive entre les balles","upgrades.shocks.verbose_description":"Quand deux balles entrent en collision,  elles échangent leurs vitesse, créent une explosion et gagnent un peu de vitesse qui les sépare. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.verbose_description":"Démarrage à chaud sera simplement ajouté au combo actuel","upgrades.side_flip.name":"Droitier","upgrades.side_flip.tooltip":"+{{lvl}} combo par brique cassé de la droite, -{{loss}} sinon","upgrades.side_flip.verbose_description":"Impactez la brique sur son côté droit pour obtenir un combo, mais évitez de la frapper sur son côté gauche, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.side_kick.name":"Gaucher","upgrades.side_kick.tooltip":"+{{lvl}} combo par brique cassé de la gauche, -{{loss}} sinon","upgrades.side_kick.verbose_description":"Impactez la brique sur son côté gauche pour obtenir un combo, mais évitez de la frapper sur son côté droit, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.skip_last.help_plural":"Les {{lvl}} dernières briques restantes s\'autodétruiront","upgrades.skip_last.name":"Nettoyage facile","upgrades.skip_last.tooltip":"La dernière brique s\'autodétruit.","upgrades.skip_last.verbose_description":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut être difficile d\'obtenir les dernières briques.\\n\\nTerminer un niveau plus tôt permet d\'obtenir des choix supplémentaires lors de la mise à niveau. \\n\\nNe jamais manquer de briques est également très avantageux.\\n\\nDonc, si vous avez du mal à casser les dernières briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.slow_down.name":"Balle lente","upgrades.slow_down.tooltip":"La balle se déplace plus lentement","upgrades.slow_down.verbose_description":"La balle démarre relativement lentement, mais à chaque niveau de votre partie, elle démarre un peu plus vite, et elle accélère également si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile à gérer. \\n\\nVous pouvez l\'obtenir au début de chaque partie en activant le mode enfant dans le menu.","upgrades.smaller_puck.help_plural":"La raquette rétrécie encore et le combo augmente encore.","upgrades.smaller_puck.name":"Raquette plus petite","upgrades.smaller_puck.tooltip":"Donne aussi +5 combo","upgrades.smaller_puck.verbose_description":"Vous bénéficiez d\'un bonus permanent de +5 combo pour avoir choisi cette amélioration.","upgrades.soft_reset.name":"Réinitialisation progressive","upgrades.soft_reset.tooltip":"La remise à zéro du combo conserve {{percent}}% des points","upgrades.soft_reset.verbose_description":"Limite l\'impact d\'une réinitialisation du combo.","upgrades.streak_shots.name":"Séquence de destruction","upgrades.streak_shots.tooltip":"Plus de pièces si vous cassez plusieurs briques à la fois.","upgrades.streak_shots.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente. Le combo est remis à zéro quand la balle touche la raquette. Une fois que votre combo dépasse la valeur de base, votre raquette devient rouge pour vous rappeler que le fait de la toucher avec la balle détruira votre combo.","upgrades.sturdy_bricks.name":"Briques solides","upgrades.sturdy_bricks.tooltip":"+{{lvl}} points de vie des briques, +{{percent}}% pièces quand elles sont détruites","upgrades.sturdy_bricks.verbose_description":"Chaque niveau de cet amélioration ajoute un PV à toutes les briques. Vous pouvez consulter le nombre de PV avec l\'avantage \\"clairvoyant\\". Vous pouvez augmenter les dégâts des balles en obtenant l\'amélioration \\"Balle perçante\\". Chaque niveau de cet amélioration ajoute 50% de pièces en plus.","upgrades.telekinesis.help_plural":"Effet plus fort sur la balle","upgrades.telekinesis.name":"Télékinésie","upgrades.telekinesis.tooltip":"Contrôler la trajectoire de la balle","upgrades.telekinesis.verbose_description":"Vous contrôlez la balle pendant qu\'elle monte.","upgrades.top_is_lava.name":"Icare ","upgrades.top_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de rebond au plafond","upgrades.top_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité. Cependant, votre combo sera réinitialisé dès que votre balle atteindra le haut de l\'écran.\\n\\nLorsque votre combo est supérieur au minimum, une barre rouge apparaît en haut de l\'écran pour vous rappeler que vous devez éviter de la frapper.","upgrades.trampoline.name":"Trampoline","upgrades.trampoline.tooltip":"+{{lvl}} combo à chaque rebond d\'une balle sur la raquette,-{{lvl}} combo à chaque rebond sur un des bords","upgrades.trampoline.verbose_description":"Une des rares améliorations à ne pas avoir de condition de remise à zéro","upgrades.unbounded.help_no_ceiling":"+{{lvl}} combo par brique, plus de cotés ou de plafond","upgrades.unbounded.name":"Libérée, délivrée","upgrades.unbounded.tooltip":"+{{lvl}} combo par brique, plus de cotés pour garder la balle en jeu, danger","upgrades.unbounded.verbose_description":"J\'espère que vous avez trouvé un moyen de garder votre balle à l\'écran. Au niveau 2+, le plafond disparaîtra également. Il s\'agit d\'un avantage avancé.","upgrades.viscosity.name":"Fluide visqueux ","upgrades.viscosity.tooltip":"Chute plus lente des pièces","upgrades.viscosity.verbose_description":"Les pièces accélèrent nor l_attract_ball.tooltip":"공은 공을 끌어당깁니다","upgrades.ball_attract_ball.verbose_description":"\\"게임 영역 너비의 3/4\\" 이상 떨어져 있는 공은 서로 끌어당기기 시작합니다.\\n\\n공이 서로 가장 멀리 떨어져 있을수록 끌어당기는 힘이 더 강해집니다.\\n\\n무지개 입자가 날아다니며 끌어당기는 힘을 상징합니다. 이 특전은 이미 공이 두 개 이상 있는 경우에만 제공됩니다.","upgrades.ball_attracts_coins.name":"공은 동전을 끌어당깁니다","upgrades.ball_attracts_coins.tooltip":"동전은 가장 가까운 공을 따라 느리게 떨어집니다.","upgrades.ball_attracts_coins.verbose_description":"\'얼룩\' 및 \'유령 동전\'과 함께 사용하면 동전으로 공 주위를 \'페인트칠\'하는 데 사용할 수 있습니다. 동전 자석 대용으로도 사용할 수 있습니다.","upgrades.ball_repulse_ball.help_plural":"더 강력한 반발력","upgrades.ball_repulse_ball.name":"개인 공간","upgrades.ball_repulse_ball.tooltip":"공은 공을 튕겨냅니다","upgrades.ball_repulse_ball.verbose_description":"화면 너비의 1/4 이하로 떨어진 공은 서로 반발하기 시작합니다. 공이 서로 가까이 있으면 반발력이 더 강해집니다. 이 힘이 가해지는 것을 상징하기 위해 입자가 튀어 나옵니다. 이 특전은 공이 두 개 이상 있는 경우에만 제공됩니다.","upgrades.base_combo.name":"강력한 기반","upgrades.base_combo.tooltip":"콤보는 1이 아닌 {{coins}} 에서 시작합니다.","upgrades.base_combo.verbose_description":"콤보는 일반적으로 레벨이 시작될 때 1에서 시작되며, 아무것도 치지 않고 튕기면 1로 초기화됩니다. 이 특전을 사용하면 콤보가 3점 더 높게 시작되므로 항상 브릭당 최소 4개의 코인을 얻을 수 있습니다. 콤보가 초기화될 때마다 1이 아닌 4로 돌아갑니다. 콤보가 1보다 높다는 것을 알리기 위해 공이 약간 반짝입니다.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"더 큰 폭발","upgrades.bigger_explosions.verbose_description":"기본 폭발은 3x3 정사각형을 지우고 5x5 정사각형이되며 동전에 대한 타격도 훨씬 더 강해집니다. 폭발할 때마다 화면이 깜박입니다(기본 모드 제외).","upgrades.bigger_puck.name":"더 큰 퍽","upgrades.bigger_puck.tooltip":"더 많은 코인을 쉽게 획득하세요.","upgrades.bigger_puck.verbose_description":"퍽이 크면 공을 놓치지 않고 더 많은 동전을 잡기 쉬울 뿐만 아니라 바운스 각도도 정확하게 맞출 수 있습니다(공의 각도는 퍽에 닿는 위치에 따라 달라집니다).\\n\\n그러나 큰 퍽은 레벨의 측면에서 사용하기가 더 어렵고 때때로 놓칠 수 있습니다.","upgrades.clairvoyant.name":"천리안","upgrades.clairvoyant.tooltip":"다음 레벨, 벽돌 HP 및 공 방향 보기","upgrades.clairvoyant.verbose_description":"올바른 업그레이드를 선택하고 튼튼한 브릭에 어떤 일이 일어나고 있는지 이해하는 데 도움이 됩니다. 레벨 2와 3은 모호한 유틸리티에 대한 추가 지식을 제공합니다(루프 모드에서 도달 가능).","upgrades.coin_magnet.help_plural":"코인에 더 강력한 효과","upgrades.coin_magnet.name":"동전 자석","upgrades.coin_magnet.tooltip":"퍽은 동전을 끌어당깁니다","upgrades.coin_magnet.verbose_description":"동전을 퍽으로 향하게 합니다. 동전이 이미 퍽에 가까이 있으면 효과가 더 강해집니다. 모든 동전을 잡으면 게임에서 특별한 보너스를 획득할 수 있습니다.\\n\\n더 많은 동전을 잡는 또 다른 방법은 바닥에서 벽돌을 치는 것입니다. 공의 속도와 방향은 스폰된 동전의 속도에 영향을 미칩니다.","upgrades.compound_interest.name":"복리 이자","upgrades.compound_interest.tooltip":"벽돌 깨질 때마다 +{{lvl}} 콤보, 코인 손실 시 초기화","upgrades.compound_interest.verbose_description":"벽돌을 부술 때마다 콤보가 하나씩 증가하며, 벽돌을 부술 때마다 점점 더 많은 코인을 생성합니다.\\n\\n하지만 코인을 놓치면 콤보가 초기화되므로 모든 코인을 퍽으로 모두 잡아야 합니다.\\n\\n콤보가 최소값을 넘으면 플레이 영역 하단에 빨간색 선이 표시되어 코인이 그쪽으로 이동해서는 안 된다는 것을 알려줍니다.","upgrades.concave_puck.name":"오목한 퍽","upgrades.concave_puck.tooltip":"수직 조준 정밀도 향상","upgrades.concave_puck.verbose_description":"공은 레벨이 똑바로 위로 올라가고 각도를 줄여서 튕기기 시작합니다.","upgrades.corner_shot.name":"코너 샷","upgrades.corner_shot.tooltip":"퍽이 화면 테두리와 겹치도록 합니다.","upgrades.corner_shot.verbose_description":"모서리 조준에 도움이 됩니다. 레벨이 높아질수록 더 멀리 나갈 수 있습니다.","upgrades.etherealcoins.name":"코인, 우주에서","upgrades.etherealcoins.tooltip":"코인은 더 이상 중력의 영향을 받지 않습니다.","upgrades.etherealcoins.verbose_description":"동전이 어떻게든 떨어지도록 해야 하며, 그렇지 않으면 동전을 얻지 못할 것입니다.","upgrades.extra_levels.name":"5분 더","upgrades.extra_levels.tooltip":"7 대신 {{count}} 레벨 플레이","upgrades.extra_levels.verbose_description":"기본 게임은 최대 7레벨까지 플레이할 수 있으며, 그 이후에는 게임이 종료됩니다.\\n\\n이 특전의 각 레벨은 한 단계씩 더 높은 레벨로 올라갈 수 있습니다. 마지막 레벨에서 가장 많은 점수를 획득하는 경우가 많기 때문에 그 차이가 극적일 수 있습니다.","upgrades.extra_life.help_plural":"(마지막) 공이 손실되지 않고 바닥에{{lvl}} 번 튕겨집니다.","upgrades.extra_life.name":"엑스트라 라이프","upgrades.extra_life.tooltip":"공은 하프라인에서 한 번 튕긴 후 사라집니다.","upgrades.extra_life.verbose_description":"일반적으로 공은 하나이며, 공을 떨어뜨리는 순간 게임이 끝납니다.\\n\\n이 특전은 화면 하단에 흰색 막대가 추가되어 공을 한 번 저장하고 그 과정에서 중단할 수 있습니다.\\n\\n공이 화면 하단에 튕길 때마다 해당 특전의 레벨이 한 단계씩 감소합니다.","upgrades.forgiving.name":"용서","upgrades.forgiving.tooltip":"휴식 시간을 놓치면 콤보가 한 번에 감소하는 것이 아니라 점진적으로 감소합니다.","upgrades.forgiving.verbose_description":"레벨당 첫 번째 미스는 무료이며, 그 다음에는 콤보의 10%, 그 다음에는 20%입니다.","upgrades.fountain_toss.name":"분수 던지기","upgrades.fountain_toss.tooltip":"동전을 놓치면 콤보를 얻습니다.","upgrades.fountain_toss.verbose_description":"동전을 놓쳤는데 콤보가 {{max}}미만일 경우, 콤보가 {{lvl}}의 확률로 성장합니다. /의 확률로 콤보가 1만큼 성장합니다.","upgrades.ghost_coins.name":"유령 코인","upgrades.ghost_coins.tooltip":"동전이 벽돌을 천천히 통과합니다.","upgrades.ghost_coins.verbose_description":"버그가 아니라 기능입니다!  동전은 벽돌 사이를 천천히 날아갑니다. 레벨이 높을수록 더 빨리 움직입니다.","upgrades.helium.name":"헬륨","upgrades.helium.tooltip":"퍽의 좌우 중력 반전","upgrades.helium.verbose_description":"이렇게 하면 동전에 영향을 미치며 동전을 집어들 준비가 될 때까지 떠다니게 됩니다.","upgrades.hot_start.name":"핫 스타트","upgrades.hot_start.tooltip":"콤보 {{start}}, - 초당{{loss}} 콤보에서 시작","upgrades.hot_start.verbose_description":"모든 레벨이 시작될 때 콤보는 +30점으로 시작하지만, 매 초마다 1점씩 감소합니다. 이 효과는 다른 특전과 중첩됩니다.","upgrades.implosions.name":"영향","upgrades.implosions.tooltip":"폭발은 동전을 날려버리는 대신 빨아들입니다.","upgrades.implosions.verbose_description":"폭발력은 다른 방향으로 적용됩니다. 추가 레벨은 \\"더 큰 폭발\\"로 작용합니다.","upgrades.instant_upgrade.name":"즉시 업그레이드","upgrades.instant_upgrade.tooltip":"지금 +1 업그레이드, 게임 종료 시까지 -1 선택.","upgrades.instant_upgrade.verbose_description":"즉시 두 가지 업그레이드를 선택하면 무료 업그레이드 한 개와 이 특전을 받기 위해 사용한 업그레이드를 상환하는 업그레이드 한 개를 얻게 됩니다. 업그레이드를 선택할 수 있는 메뉴가 추가될 때마다 선택할 수 있는 옵션이 줄어듭니다.","upgrades.left_is_lava.name":"왼쪽을 피하십시오.","upgrades.left_is_lava.tooltip":"+{{lvl}} 벽돌을 부술 때마다 콤보. 공이 화면 왼쪽에 맞으면 콤보가 초기화됩니다.","upgrades.left_is_lava.verbose_description":"벽돌을 부술 때마다 콤보가 하나씩 증가하므로 다음에 부수는 모든 벽돌에서 코인을 하나 더 얻을 수 있습니다.\\n\\n하지만 콤보는 공이 왼쪽에 닿는 즉시 초기화됩니다.\\n\\n콤보가 올라가는 즉시 왼쪽이 빨간색으로 표시되어 부딪히지 않도록 주의해야 한다는 것을 알려줍니다.\\n","upgrades.limitless.name":"무한한","upgrades.limitless.tooltip":"모든 업그레이드의 최대 레벨을 {{lvl}} 만큼 올립니다.","upgrades.limitless.verbose_description":"이 특전을 선택하면 자신의 한도도 하나씩 증가하여 다시 선택할 수 있습니다.","upgrades.metamorphosis.name":"메타모포시스","upgrades.metamorphosis.tooltip":"각 동전은 {{lvl}} 개의 벽돌을 해당 색상으로 얼룩지게 할 수 있습니다.","upgrades.metamorphosis.verbose_description":"이 특전을 사용하면 동전이 나온 벽돌의 색을 띠게 되며, 처음 닿는 벽돌도 같은 색으로 물들게 됩니다.\\n\\n동전은 벽돌을 부순 공의 속도로 생성되므로 \'칠하고 싶은\' 벽돌의 방향으로 살짝 조준하면 됩니다.","upgrades.minefield.name":"지뢰밭","upgrades.minefield.tooltip":"화면의 폭탄 벽돌 당 +{{lvl}} 콤보","upgrades.minefield.verbose_description":"벽돌을 놓으면 콤보에 + 레벨을, 파괴하면 - 레벨을 추가하고 기본 콤보에 벽돌 수에 레벨을 곱한 만큼 레벨을 올립니다.","upgrades.multiball.name":"멀티 볼","upgrades.multiball.tooltip":"","upgrades.multiball.verbose_description":"브레이크아웃 71에서 공을 떨어뜨리는 순간 패배합니다.\\n\\n이 특전으로 공 두 개를 얻게 되므로 공 하나를 잃어도 괜찮습니다.\\n\\n잃어버린 공은 다음 레벨에서 다시 돌아옵니다.\\n\\n공이 두 개 이상 있으면 추가 특전이 제공되며, 당연히 레벨을 더 빨리 클리어할 수 있습니다.","upgrades.nbricks.name":"엄격한 샘플 크기","upgrades.nbricks.tooltip":"퍽 바운스당 정확히 {{lvl}} 개의 벽돌을 쳐서 +{{lvl}} 콤보를 달성하고, 그렇지 않으면 초기화됩니다.","upgrades.nbricks.verbose_description":"반드시 벽돌을 파괴할 필요는 없지만, 벽돌을 쳐야 합니다. 폭발로 파괴된 벽돌은 포함되지 않습니다.","upgrades.one_more_choice.name":"추가 선택 사항","upgrades.one_more_choice.tooltip":"레벨을 더 올리면 목록에 {{lvl}} 개의 옵션이 추가됩니다.","upgrades.one_more_choice.verbose_description":"모든 업그레이드 메뉴에 옵션이 하나 더 추가됩니다.  선택할 수 있는 업그레이드 수가 증가하지는 않습니다.","upgrades.passive_income.name":"수동 소득","upgrades.passive_income.tooltip":"+{{lvl}} 콤보/브릭, 퍽이 지난 {{time}}초 동안 움직이지 않았다면 대신 재설정됩니다.","upgrades.passive_income.verbose_description":"일부 특전은 아무것도 하지 않아도 공이 원하는 것을 할 수 있도록 도와줍니다.","upgrades.picky_eater.name":"까다로운 식성","upgrades.picky_eater.tooltip":"벽돌 깨질 때마다 +{{lvl}} 콤보, 공 색이 바뀌면 초기화됨","upgrades.picky_eater.verbose_description":"공과 같은 색의 벽돌을 부술 때마다 콤보가 하나씩 증가합니다.\\n다른 색이면 공은 새로운 색으로 바뀌지만 공과 같은 색의 벽돌이 남아 있지 않은 한 콤보는 초기화됩니다.\\n최소값보다 높은 콤보를 얻으면 잘못된 색의 벽돌에는 빨간색 테두리가 생깁니다.\\n공이 두 개 이상 있는 경우, 공 중 하나가 벽돌에 닿을 때마다 공의 색이 모두 바뀝니다.","upgrades.pierce.name":"피어싱","upgrades.pierce.tooltip":"퍽 바운드 후 공이 {{count}} 개의 벽돌을 관통했습니다.","upgrades.pierce.verbose_description":"공은 일반적으로 무언가에 닿는 즉시 튕깁니다. 이 특전을 사용하면 벽돌이 최대 3개까지 깨질 때까지 공의 궤적이 계속됩니다.\\n\\n그 후 4번째 벽돌에 닿으면 공이 튕기며, 카운터를 초기화하려면 퍽을 터치해야 합니다.","upgrades.pierce_color.name":"컬러 피어싱","upgrades.pierce_color.tooltip":"공 색깔의 벽돌에 +{{lvl}} 피해","upgrades.pierce_color.verbose_description":"공이 같은 색의 벽돌에 부딪힐 때마다 방해받지 않고 그냥 통과합니다.\\n\\n다른 색의 벽돌에 닿으면 벽돌을 부수고 그 색을 가져가서 튕겨 나갑니다.\\n\\n튼튼한 벽돌이 있다면 공이 같은 색의 벽돌에 닿아도 튕겨나갈 수 있습니다.","upgrades.puck_repulse_ball.help_plural":"","upgrades.puck_repulse_ball.name":"연착륙","upgrades.puck_repulse_ball.tooltip":"퍽이 공을 튕겨냅니다","upgrades.puck_repulse_ball.verbose_description":"공이 퍽에 가까워지면 속도가 느려지기 시작하고 심지어 퍽에 닿지 않고 튕겨 나갈 수도 있습니다.","upgrades.reach.name":"하향식","upgrades.reach.tooltip":" 가장 아래 줄에 있는 N개의 벽돌을 터치하면 콤보가 초기화됩니다. 그렇지 않으면 +N 콤보","upgrades.reach.verbose_description":"벽돌이 한 줄만 있거나 가장 낮은 벽돌 줄이 게임의 전체 너비를 덮는 경우, 이 특전은 아무 효과가 없습니다. 그렇지 않으면 이 가장 낮은 줄을 부수면 콤보가 초기화되고, 다른 줄을 부수면 가장 낮은 줄에 있는 벽돌 수만큼 콤보가 증가합니다.\\n\\n가장 낮은 줄은 빨간색으로 강조 표시됩니다.","upgrades.respawn.name":"다시 생성","upgrades.respawn.tooltip":" {{delay}}초 후에{{percent}}%의 벽돌이 다시 생성됩니다.","upgrades.respawn.verbose_description":"일부 파티클 효과는 벽돌이 나타나는 위치를 알려줍니다.","upgrades.right_is_lava.name":"오른쪽을 피하십시오.","upgrades.right_is_lava.tooltip":"+{{lvl}} 벽돌당 콤보. 공이 화면 왼쪽에 맞으면 콤보가 초기화됩니다.","upgrades.right_is_lava.verbose_description":"벽돌을 부술 때마다 콤보가 하나씩 증가하므로 다음에 부수는 모든 벽돌에서 코인을 하나 더 얻을 수 있습니다.\\n\\n하지만 콤보는 공이 오른쪽에 닿는 즉시 초기화됩니다.\\n\\n콤보가 올라가는 즉시 오른쪽이 빨간색으로 표시되어 부딪히지 않도록 주의해야 한다는 것을 알려줍니다.\\n","upgrades.sacrifice.help_l1":"생명을 잃으면 모든 벽돌이 사라집니다","upgrades.sacrifice.help_over":"콤보로 생명력 {{lvl}}을 잃으면 모든 벽돌을 클리어합니다.","upgrades.sacrifice.name":"희생","upgrades.sacrifice.verbose_description":"이렇게 하면 콤보가 꽤 높아질 수 있습니다.","upgrades.sapper.help_plural":"처음 깨진 {{lvl}} 개의 벽돌은 폭탄이 됩니다.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"첫 번째 벽돌이 깨지면 폭탄이 됩니다.","upgrades.sapper.verbose_description":"처음 부순 벽돌은 그냥 사라지는 대신 폭탄 벽돌로 대체됩니다. 퍽에 공을 튕기면 효과가 다시 활성화됩니다. 이 특전을 레벨 업하면 더 많은 폭탄을 배치할 수 있습니다.\\n\\n폭탄은 주변 동전의 속도에 영향을 미치므로 너무 많이 폭발하면 노력의 결실을 얻기 어려울 수 있다는 점을 기억하세요.","upgrades.shocks.name":"쇼크","upgrades.shocks.tooltip":"폭발성 공 충돌","upgrades.shocks.verbose_description":"두 공이 충돌할 때마다 속도를 바꾸고 폭발을 일으키며 추가 속도를 얻어 분리합니다.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"레벨 사이에 콤보의 {{percent}}% 유지","upgrades.shunt.verbose_description":"핫 스타트 기능도 있는 경우 현재 콤보에 핫 스타트 기능이 추가됩니다.","upgrades.side_flip.name":"오른손잡이","upgrades.side_flip.tooltip":"오른쪽에서 깨진 벽돌당 +{{lvl}} 콤보, 그렇지 않으면 -{{loss}} 콤보","upgrades.side_flip.verbose_description":"벽돌의 오른쪽을 타격하면 콤보 1개를 얻지만, 왼쪽을 타격하면 콤보 2개가 제거되므로 피하세요. 위쪽과 아래쪽에서 타격해도 효과가 없습니다.","upgrades.side_kick.name":"왼손잡이","upgrades.side_kick.tooltip":"왼쪽에서 깨진 벽돌당 +{{lvl}} 콤보, 그렇지 않으면 -{{loss}} 콤보","upgrades.side_kick.verbose_description":"벽돌의 왼쪽을 타격하면 콤보 1개를 얻지만, 오른쪽을 타격하면 콤보 2개가 제거되므로 피하세요. 위쪽과 아래쪽에서 타격해도 효과가 없습니다.","upgrades.skip_last.help_plural":"마지막 {{lvl}} 개의 벽돌이 폭발합니다.","upgrades.skip_last.name":"간편한 정리","upgrades.skip_last.tooltip":"마지막 벽돌이 폭발합니다.","upgrades.skip_last.verbose_description":"다음 레벨로 이동하려면 모든 벽돌을 깨야 합니다. 하지만 마지막 벽돌을 구하기는 어려울 수 있습니다.\\n\\n레벨을 일찍 클리어하면 업그레이드할 때 선택의 폭이 넓어집니다. 벽돌을 놓치지 않는 것도 매우 유리합니다.\\n\\n따라서 마지막 벽돌을 깨는 것이 어렵다면 이 특전을 몇 번 사용하면 도움이 될 수 있습니다.","upgrades.slow_down.name":"느린 공","upgrades.slow_down.tooltip":"공이 더 느리게 움직입니다.","upgrades.slow_down.verbose_description":"공은 비교적 느리게 시작하지만, 게임을 레벨이 올라갈수록 조금씩 더 빠르게 시작됩니다.\\n\\n또한 한 레벨에서 많은 시간을 보내면 속도가 빨라집니다.\\n\\n이 특전 덕분에 더 쉽게 관리할 수 있습니다.\\n\\n메뉴에서 어린이 모드를 활성화하면 매번 시작할 때마다 이 특전을 받을 수 있습니다.","upgrades.smaller_puck.help_plural":"더 작은 퍽과 더 높은 베이스 콤보","upgrades.smaller_puck.name":"더 작은 퍽","upgrades.smaller_puck.tooltip":"기본 콤보 +5 부여","upgrades.smaller_puck.verbose_description":"이렇게 하면 퍽이 작아져 이론적으로는 코너 샷이 더 쉬워지지만 실제로는 난이도만 높아집니다.\\n\\n그렇기 때문에 이 벽돌을 선택한 후 부수는 모든 벽돌에 대해 벽돌당 +5 코인이라는 좋은 보너스가 주어집니다.","upgrades.soft_reset.name":"소프트 리셋","upgrades.soft_reset.tooltip":"콤보 재설정은 {{percent}}%를 유지합니다.","upgrades.soft_reset.verbose_description":"콤보 재설정의 영향을 제한합니다.","upgrades.streak_shots.name":"히트 행진","upgrades.streak_shots.tooltip":"퍽을 튕기기 전에 벽돌을 많이 깨면 더 많은 코인을 획득할 수 있습니다.","upgrades.streak_shots.verbose_description":"벽돌을 부술 때마다 콤보(벽돌당 코인 개수)가 하나씩 증가합니다.\\n\\n하지만 공이 퍽에 닿는 순간 콤보는 기본값으로 초기화되며, 브릭당 코인 하나만 얻게 됩니다.\\n\\n콤보가 기본값 이상으로 올라가면 퍽이 빨간색으로 표시되어 공에 닿으면 콤보가 파괴된다는 것을 알려줍니다.","upgrades.sturdy_bricks.name":"견고한 벽돌","upgrades.sturdy_bricks.tooltip":"벽돌 HP +{{lvl}} , 깨질 때 생성되는 동전 비율 +{{percent}}%","upgrades.sturdy_bricks.verbose_description":"이 특성의 레벨이 올라갈 때마다 모든 브릭에 HP가 하나씩 추가됩니다. \\"투시력\\" 특전으로 HP 수치를 확인할 수 있습니다. \\"관통\\" 특전을 획득하면 공의 공격력을 높일 수 있습니다. 이 특성의 각 레벨은 동전 스폰을 +50% 추가합니다.","upgrades.telekinesis.help_plural":"공에 더 강력한 효과","upgrades.telekinesis.name":"염력","upgrades.telekinesis.tooltip":"퍽은 공의 궤적을 제어합니다.","upgrades.telekinesis.verbose_description":"공이 올라가는 동안 공을 컨트롤합니다.","upgrades.top_is_lava.name":"하늘이 한계입니다","upgrades.top_is_lava.tooltip":"+ 브릭당{{lvl}} 콤보, 상단 타격 시 초기화됨","upgrades.top_is_lava.verbose_description":"벽돌을 부술 때마다 콤보가 하나씩 증가합니다. 하지만 공이 화면 상단에 닿으면 콤보가 초기화됩니다.\\n\\n콤보가 최소값을 초과하면 상단에 빨간색 막대가 표시되어 부딪히지 않도록 주의해야 함을 알려줍니다.","upgrades.trampoline.name":"트램펄린","upgrades.trampoline.tooltip":"+ 퍽 바운스당{{lvl}} 콤보, 모든 테두리에서 바운스당{{lvl}} 콤보","upgrades.trampoline.verbose_description":"초기화 조건이 추가되지 않는 드문 콤보 업그레이드 중 하나입니다.","upgrades.unbounded.help_no_ceiling":"벽돌당 +{{lvl}} 콤보, 측면 또는 천장 없음","upgrades.unbounded.name":"무제한","upgrades.unbounded.tooltip":"벽돌당 +{{lvl}} 콤보, 더 이상 공을 유지할 측면이 없음, 위험","upgrades.unbounded.verbose_description":"공을 화면에 계속 띄울 수 있는 방법을 찾으셨기를 바랍니다. 측면 타격에 대한 페널티가 더 이상 적용되지 않습니다. 레벨 2 이상에서는 천장도 사라집니다. 이것은 고급 특전입니다.","upgrades.viscosity.name":"점성","upgrades.viscosity.tooltip":"느린 코인 낙하","upgrades.viscosity.verbose_description":"동전은 일반적으로 중력과 폭발로 인해 상당히 빠른 속도로 가속됩니다.\\n\\n이 특성은 마치 점성이 있는 액체 속에 있는 것처럼 지속적으로 속도를 느리게 만듭니다.\\n\\n따라서 동전을 쉽게 잡을 수 있으며, 동전의 움직임에 영향을 주는 특전과 잘 어울립니다.","upgrades.wind.help_plural":"더 강력한 풍력","upgrades.wind.name":"바람","upgrades.wind.tooltip":"퍽 위치가 바람을 일으킵니다.","upgrades.wind.verbose_description":"바람은 퍽 위치에 따라 달라집니다: 왼쪽은 왼쪽으로, 오른쪽은 오른쪽으로 불어옵니다. 공과 동전 모두에 영향을 줍니다.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"공이 퍽 쪽으로 떨어짐","upgrades.yoyo.verbose_description":"염력과 반대되는 개념으로, 공이 다시 떨어지는 동안 공을 제어합니다.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"벽돌당 +{{lvl}} 콤보, 폭발 시 초기화됨","upgrades.zen.verbose_description":"결국, 이 게임은 비폭력적인 게임입니다."}');var j={};j=JSON.parse('{"confirmRestart.no":"Отмена","confirmRestart.text":"Вы собираетесь нача pawnedCoins}} за {{time}} секунды {{timeGain}}.\\n\\nВы промахнулись {{levelMisses}} раз {{missesGain}} и ударились о стены или потолок {{levelWallBounces}} раз{{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Постарайтесь поймать все монеты, не промахнуться мимо кирпичей, не удариться о стены/потолок или пройти уровень за 30 секунд, чтобы получить дополнительные улучшения.","level_up.compliment_good":"Молодцы!","level_up.compliment_perfect":"Впечатляет, продолжайте в том же духе!","level_up.pick_upgrade_title":"Выберите обновление","level_up.plus_one_upgrade":"(+1 обновление)","level_up.plus_one_upgrade_and_reroll":"(+1 улучшение и +1 повторный бросок)","level_up.reroll":"Повторный бросок ({{count}})","level_up.reroll_help":"Предложите новые варианты","level_up.upgrade_perk_to_level":"  lvl {{level}}","main_menu.basic":"Базовая графика","main_menu.basic_help":"Улучшенная производительность.","main_menu.colorful_coins":"Разноцветные монеты","main_menu.colorful_coins_help":"Монеты всегда спаунятся того же цвета, что и кирпичи","main_menu.comboIncreaseTexts":"Показать +X в золотом цвете","main_menu.comboIncreaseTexts_help":"Когда комбо увеличивается","main_menu.contrast":"Высокая контрастность","main_menu.contrast_help":"Более красочная и темная визуализация","main_menu.credit_levels":"Уровни","main_menu.donate":"Вы играли {{hours}} часов","main_menu.donate_help":"Как насчет пожертвования? Вы можете скрыть это напоминание в настройках.","main_menu.donation_reminder":"Напомните мне о пожертвовании","main_menu.donation_reminder_help":"Смотрите время игры и ссылку на пожертвование в главном меню","main_menu.download_save_file":"Скачать счет и статистику","main_menu.download_save_file_help":"Получить файл сохранения","main_menu.extra_bright":"Очень яркий","main_menu.extra_bright_help":"Увеличивает размер ореола вокруг монет и кирпичей.","main_menu.fullscreen":"ПОЛНЫЙ ЭКРАН","main_menu.fullscreen_help":"Игра пытается перейти в полноэкранный режим перед запуском","main_menu.help_content":"## Цель\\n\\nПоймайте как можно больше монет на протяжении 7 уровней.\\nМонеты появляются, когда вы разбиваете кирпичи.\\nЛовите их шайбой, чтобы увеличить свой счет.\\nВаш счет отображается в правом верхнем углу экрана.\\nНе уроните шайбу, иначе игра закончится.\\n\\nУничтожив все кирпичи, вы сможете выбрать улучшение.\\n\\n## Апгрейды\\n\\nВыбранные вами улучшения будут действовать до конца игры.\\nНекоторые из них можно выбирать несколько раз для усиления эффекта.\\nНекоторые помогают в прицеливании или облегчают игру другими способами.\\nНекоторые полезны только в комбинации.\\n\\nВ начале каждой игры вы всегда получаете один апгрейд.\\nЕго иконка будет служить кирпичом первого уровня.\\nВыбрать стартовые апгрейды можно в настройках.\\n\\nМногие апгрейды влияют на ваши комбо.\\n\\n## Комбо\\n\\nВаше \\"комбо\\" - это количество монет, появляющихся при разрушении кирпича.\\nОно отображается на вашей шайбе, например, x4 означает, что каждый кирпич порождает 4 монеты.\\nБольшинство обновлений, увеличивающих комбо, также добавляют условие для его сброса.\\nКомбо также сбрасывается, если мяч возвращается к шайбе, не попав ни в один кирпич.\\nВ этом случае будет показано сообщение \\"промах\\".\\n\\nСтарайтесь каждый раз целиться в кирпич.\\n\\n## Прицеливание\\n\\nТолько положение мяча на шайбе определяет, как он отскочит.\\nЕсли мяч попадет в центр шайбы, он отскочит вертикально вверх.\\nЕсли вы ударите с одной стороны, он отскочит под большим углом.\\nСкорость шайбы и угол входа не влияют на направление мяча после отскока.\\n\\nМожно открыть множество улучшений, помогающих в прицеливании.\\n\\n## Unlocks\\n\\nПри первой игре в Breakout 71 большинство обновлений и уровней заблокированы.\\nМодификации можно разблокировать, просто играя и собирая много монет.\\nПервые уровни разблокируются при достижении высокого результата.\\nПоследующие уровни добавляют условие, по которому вы можете выбрать те или иные привилегии.\\n\\nДобиваться высоких результатов гораздо проще, если после каждого уровня вы получаете несколько обновлений.\\n\\n## Повторные прокачки и бесплатные улучшения\\n\\nВы получите дополнительный апгрейд, если будете играть хорошо:\\n\\n- Пройдите уровень за {{levelTimeGood}} секунд\\n- Ударьте по бокам или сверху менее {{wallBouncedGood}} раз\\n- Поймайте {{catchRateGood}}% монет\\n- Пропустите кирпичи менее {{missesGood}} раз\\n\\nВы также получите повторную прокачку, которая позволит вам пропустить обновления, если вы справитесь с заданием еще лучше:\\n\\n- Пройдите уровень за {{levelTimeBest}} секунды\\n- Попадите по бокам или сверху менее {{wallBouncedBest}} раз\\n- Поймать {{catchRateBest}}% монет\\n- Промахнитесь по кирпичам менее {{missesBest}} раз\\n\\nОпция в настройках позволяет отображать эту статистику","main_menu.help_help":"Узнайте больше об игре","main_menu.help_title":"Помощь","main_menu.help_upgrades":"## Обновления","main_menu.high_score":"Высокий балл : {{score}}","main_menu.kid":"Детский режим","main_menu.kid_help":"Начинайте будущие игры с \\"медленного мяча\\".","main_menu.language":"Язык","main_menu.language_help":"Выберите язык игры","main_menu.load_save_file":"Загрузить файл сохранения","main_menu.load_save_file_help":"Выберите файл сохранения на вашем устройстве","main_menu.max_coins":" {{max}} монет на экране максимум","main_menu.max_coins_help":"Только косметика, не влияет на результат","main_menu.max_particles":" {{max}} частиц максимум","main_menu.max_particles_help":"Ограничивает количество частиц, отображаемых на экране для визуального эффекта.","main_menu.mobile":"Мобильный режим","main_menu.mobile_help":"Оставляет пространство под шайбой.","main_menu.normal":"НОВАЯ ИГРА","main_menu.normal_help":"Пройдите 7 уровней со случайным стартовым преимуществом","main_menu.pointer_lock":"Блокировка указателя мыши","main_menu.pointer_lock_help":"Фиксирует и скрывает курсор мыши.","main_menu.record":"Запись видеороликов игрового процесса","main_menu.record_downl
