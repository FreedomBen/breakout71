","level_up.unlocked_perk":" (Amélioration)","level_up.upgrade_perk_to_level":"  niveau {{level}}","loop.converted_rerolls":"Vos {{n}} relances restantes ont été converties en +{{n}} combo de base.","loop.instructions":"Tous vos avantages seront bannis pour la suite de la partie, sauf celui que vous choisirez ci-dessous. Votre choix sera augmenté d\'un niveau, mêmes au delà de la limite normalement appliquée.","loop.no_rerolls":"Vous n\'aviez plus de re-rolls, donc votre combo de base est resté le même.","loop.title":"Début de la boucle n°{{loop}}","main_menu.basic":"Graphismes simplifiés","main_menu.basic_help":"Meilleures performances.","main_menu.colorful_coins":"Pièces colorées","main_menu.colorful_coins_help":"Les pièces apparaissent toujours de la couleur de la brique","main_menu.comboIncreaseTexts":"Afficher un +X doré","main_menu.comboIncreaseTexts_help":"Quand le combo augmente","main_menu.contrast":"Contraste élevé","main_menu.contrast_help":"Affichage plus contrasté et coloré","main_menu.credit_levels":"<h2>Source ou référence des niveaux</h2>","main_menu.credits":"# Crédits\\n\\nJ\'ai récupéré de nombreux motifs d\'arrière-plan sur https://pattern.monster/\\n\\nUne partie du code de génération de sons a été écrite par ChatGPT et a été largement adaptée à mon utilisation au fil du temps.\\n\\nJe souhaitais un APK qui démarre en plein écran et puisse être listé sur Android et le Play Store. J\'ai commencé avec une vue vide et je me suis attelé à la réduire, à l\'aide de ce tutoriel : https://github.com/fractalwrench/ApkGolf/blob/master/blog/BLOG_POST.md\\n\\nColin (obigre) a apporté de nombreuses idées fantastiques au jeu. Voici son site web : https://colin-crapahute.bearblog.dev/\\n\\nTõnu Rääk a fait un template Tiermaker pour partager vos améliorations préférées :  https://tiermaker.com/create/breakout-71-perks-18086724\\n\\n# Autres jeux de casse-briques\\n\\nVoici quelques jeux intéressants dans le genre du casse-briques :\\n\\n- LBreakoutHD : un remake open source intéressant https://sourceforge.net/p/lgames/code/HEAD/tree/trunk/lbreakouthd/\\n- Wizorb https://store.steampowered.com/app/207420/Wizorb/\\n- Breakout multijoueur : JcJ avec multijoueur de type console aérienne https://casmo.itch.io/breakout-multiplayer\\n- Ricochet Infinity : https://www.myabandonware.com/game/ricochet-infinity-dxm\\n- Mes premières tentatives dans le genre : https://breakout-v1.lecaro.me/ (décontracté, plus proche du concept original de Breakout) et https://breakout-v2.lecaro.me/ (multijoueur)\\n\\n# Autres jeux PC à forte rejouabilité\\n\\n- Rollers of the realm : https://store.steampowered.com/app/262470/Rollers_of_the_Realm/\\n- FTL : https://www.gog.com/en/game/faster_than_light\\n- Nova Drift : https://www.gog.com/en/game/nova_drift\\n- Noita : https://www.gog.com/en/game/noita\\n- Enter the Gungeon : https://www.gog.com/en/game/enter_the_gungeon\\n- Zero Sivert : https://store.steampowered.com/app/1782120/ZERO_Sievert/\\n- Factorio : https://www.factorio.com/\\n- Nuclear throne : https://store.steampowered.com/app/242680/Nuclear_Throne/ (ne l\'achetez pas sur GOG, c\'est obsolète)\\n- Brigador : https://www.gog.com/en/game/brigador\\n- Teleglitch https://www.gog.com/en/game/teleglitch_die_more_edition\\n- Broforce : https://www.gog.com/en/game/broforce\\n- Spelunky : https://www.gog.com/en/game/spelunky","main_menu.donate":"Vous avez joué {{hours}} heures","main_menu.donate_help":"Pourriez-vous donner {{suggestion}} € ? Vous pouvez masquer ce rappel dans les paramètres.","main_menu.donation_reminder":"Me rappeler de donner","main_menu.donation_reminder_help":"Afficher le temps de jeu et un lien pour donner dans le menu principal","main_menu.download_save_file":"Sauvegarder mes progrès","main_menu.download_save_file_help":"Obtenir un fichier de sauvegarde","main_menu.extra_bright":"Plus de lumière","main_menu.extra_bright_help":"Plus grand halo lumineux autours des briques et pièces.","main_menu.footer_html":" <p>  \\n<span>Programmé en France par <a href=\\"https://lecaro.me\\">Renan LE CARO</a>.</span>\\n<a href=\\"https://paypal.me/renanlecaro\\" target=\\"_blank\\">Donner</a>\\n<a href=\\"https://discord.gg/bbcQw4x5zA\\" target=\\"_blank\\">Discord</a>\\n<a href=\\"https://f-droid.org/en/packages/me.lecaro.breakout/\\" target=\\"_blank\\">F-Droid</a>\\n<a href=\\"https://play.google.com/store/apps/details?id=me.lecaro.breakout\\" target=\\"_blank\\">Google Play</a>\\n<a href=\\"https://renanlecaro.itch.io/breakout71\\" target=\\"_blank\\">itch.io</a>\\n<a href=\\"https://gitlab.com/lecarore/breakout71\\" target=\\"_blank\\">Gitlab</a>\\n<a href=\\"https://breakout.lecaro.me/\\" target=\\"_blank\\">Version web</a>\\n<a href=\\"https://news.ycombinator.com/item?id=43183131\\" target=\\"_blank\\">HackerNews</a>\\n<a href=\\"https://breakout.lecaro.me/privacy.html\\" target=\\"_blank\\">Politique de confidentialité</a> \\n<span>v.{{appVersion}}</span>\\n</p>","main_menu.fullscreen":"Plein écran","main_menu.fullscreen_help":"Le jeu essaiera de passer en plein écran quand vous le démarrez","main_menu.help_content":"# Objectif\\n\\nLe but est d\'attraper un maximum de pièces au cours des 7 niveaux.\\nLes pièces apparaissent lorsque vous cassez des briques.\\nElles volent, rebondissent et roulent, et vous devez les attraper avec votre palet pour augmenter votre score.\\nVotre score est affiché en haut à droite de l\'écran.\\nVous devez supprimer toutes les briques pour passer au niveau suivant.\\nSi vous laissez tomber la balle, la partie est terminée, sauf si vous aviez l\'amélioration « Vie supplémentaire ».\\n\\n# Améliorations\\n\\nAprès avoir terminé un niveau, vous pourrez choisir des améliorations parmi une petite sélection qui vous sera présentée.\\nL\'amélioration choisie sera valable jusqu\'à la fin de la partie. Vous aurez plus de choix d\'améliorations, et même la possibilité d\'en choisir plusieurs à la fin du niveau si vous jouez bien : attrapez toutes les pièces, terminez le niveau rapidement et ne ratez jamais votre cible.\\nVous obtenez également une amélioration aléatoire gratuite au début de chaque partie. Vous pouvez voir vos améliorations (et quelques détails supplémentaires) en cliquant sur votre score en haut à droite de l\'écran.\\n\\nLes améliorations s\'appliquent à l\'ensemble de la partie et peuvent être synergiques. Par exemple, si vous combinez « sapeur » et « perforant », la première brique que vous touchez après un rebond de palet se transformera immédiatement en brique explosive et explosera avec la même balle, vous donnant ainsi une balle explosive.\\n\\nCertaines améliorations facilitent la visée, comme les « balles de contrôle de palet ». Certaines améliorations peuvent être sélectionnées plusieurs fois pour augmenter leur effet. Par exemple, « +1 balle niveau 2 » ajoute une troisième balle.\\n\\nLors de votre première partie, seules quelques améliorations sont disponibles ; vous débloquez les autres en jouant et en marquant des points. Un mécanisme similaire s\'applique au déblocage des niveaux. À la fin d\'une partie, les éléments que vous venez de débloquer seront affichés et vous pourrez consulter leur contenu complet dans le menu / Déblocages.\\n\\nDe nombreuses améliorations influencent votre combo.\\n\\n# Combo\\n\\nVotre « combo » correspond au nombre de pièces générées lorsqu\'une brique se brise. L\'affichage est sur votre palet. Par exemple, x4 signifie que chaque brique rapporte 4 pièces. Le combo se réinitialise si vous ratez toutes les briques et que la balle revient vers le palet sans en avoir touché aucune.\\n\\n# Déblocages\\n\\nLorsque vous démarrez Breakout 71 pour la première fois, vous avez accès à quelques améliorations et niveaux. Les autres doivent être débloqués. Les améliorations se débloquent simplement en jouant. Chaque fois que vous attrapez une pièce, votre score total cumulé augmente d\'un point. Une fois le seuil de l\'amélioration atteint, elle est débloquée.\\n\\nLe déblocage des niveaux est un peu différent : il requiert une excellente maîtrise du jeu, de différentes manières. Les premiers niveaux nécessitent d\'atteindre le score X pendant une partie, tandis que les niveaux suivants sont débloqués en atteignant un score élevé de X avec l\'atout Y et sans l\'atout Z. Toutes ces conditions sont pseudo-aléatoires, certaines sont donc probablement plus difficiles que d\'autres. Elles devraient toutefois être les mêmes pour tous les joueurs. Il est possible qu\'une mise à jour de la liste des atouts modifie les atouts requis.\\n\\n# Configuration requise\\n\\nBreakout 71 peut fonctionner hors ligne (ajoutez-le à l\'écran d\'accueil) et fonctionne bien même sur les appareils bas de gamme.\\nL\'application est très simple et occupe peu d\'espace de stockage (environ 0,1 Mo).\\nSi l\'application est instable, activez le « mode rapide » dans les paramètres pour afficher une vue simplifiée et plus rapide. Il existe également un mode facile pour les enfants (balle plus lente).\\n\\n# Boucle\\n\\nUne fois toutes les améliorations débloquées, vous aurez la possibilité de jouer une partie plus longue.\\nDans ce mode, vous pouvez boucler le jeu jusqu\'à 7 fois après votre première tentative.\\n\\nChaque boucle est plus courte et vous ne pouvez pas utiliser les niveaux d\'avantages utilisés dans les niveaux précédents, à l\'exception d\'un avantage que vous pouvez améliorer continuellement. Si vous épuisez complètement un avantage, il ne sera plus proposé dans les boucles suivantes. L\'avantage que vous améliorez gagne instantanément +1 niveau et +2 niveaux max.\\n\\nChaque boucle est plus courte d\'un niveau. La balle démarre légèrement plus vite. La partie se termine lorsque vous perdez le ballon ou terminez la 7e boucle.\\n\\n# Visée\\n\\nSeule la position du palet frappé détermine la trajectoire du ballon. Si le ballon touche le palet en plein centre, il rebondira verticalement, tandis que si vous frappez davantage d\'un côté, l\'angle sera plus grand.\\nLa vitesse du palet et l\'angle d\'arrivée n\'ont aucun impact sur la direction du ballon après le rebond.\\n\\nUn palet plus petit facilitera peut-être la visée près des coins, mais rendra aussi beaucoup plus difficile la capture de pièces.\\nLes options « Vent » et « Télékinesis » peuvent vous aider à viser même après un rebond dans la mauvaise direction.\\n« Balle plus lente » vous donne un peu plus de temps pour viser, ce qui est particulièrement utile dans les niveaux avancés où la balle va plus vite. La balle accélère également à mesure que vous progressez dans chaque niveau.","main_menu.help_help":"Découvrez le jeu en détail","main_menu.help_title":"Aide et crédits","main_menu.help_upgrades":"<h2>Améliorations</h2>","main_menu.high_score":"High score : {{score}}","main_menu.kid":"Mode enfants","main_menu.kid_help":"Balle plus lente","main_menu.language":"Langue","main_menu.language_help":"Changer la langue d\'affichage","main_menu.load_save_file":"Charger une sauvegarde","main_menu.load_save_file_help":"Depuis un fichier ","main_menu.loop_run_help":"Permet de boucler le jeu jusqu\'à 7 fois","main_menu.max_coins":"{{max}} pièces affichées maximum","main_menu.max_coins_help":"Visuel uniquement, pas d\'impact sur le score","main_menu.max_particles":" {{max}} particules maximum","main_menu.max_particles_help":"Limite le nombre de particules affichées à l\'écran pour les effets visuels","main_menu.mobile":"Mode mobile","main_menu.mobile_help":"Laisse un espace sous le palet.","main_menu.normal":"Nouvelle partie","main_menu.normal_help":"Avec un avantage de départ aléatoire","main_menu.pointer_lock":"Verrouillage du pointeur","main_menu.pointer_lock_help":"Cache aussi le curseur de la souris.","main_menu.record":"Enregistrer des vidéos de jeu","main_menu.record_download":"Télécharger la vidéo ({{size}} MB)","main_menu.record_help":"Obtenez une vidéo de chaque niveau.","main_menu.red_miss":"Balles ratées","main_menu.red_miss_help":"Afficher des particules rouges a WithPerks":"Atteignez ${{minScore}} dans une partie avec {{required}} mais sans {{forbidden}}.","unlocks.minTotalScore":"Accumuler un total de ${{score}}","unlocks.reached":"Votre meilleur score pour l\'instant est {{reached}}.","unlocks.title_upgrades":"Vous avez débloqué {{unlocked}} améliorations sur {{out_of}}","upgrades.addiction.fullHelp":"Le décompte ne commence qu\'à parti de la  destruction de la première brique du niveau, et s\'arrête dès qu\'il n\'y a plus de briques. ","upgrades.addiction.help":"+{{lvl}} combo / brique, le combo RAZ après {{delay}}s sans casser de briques","upgrades.addiction.name":"Addiction","upgrades.asceticism.fullHelp":"Il faudra trouver un moyen de stocker les pièces pendant que le combo grandis. ","upgrades.asceticism.help":"+{{combo}} combo par brique cassée, - {{combo}} quand une pièce est attrapée","upgrades.asceticism.name":"Ascétisme","upgrades.ball_attract_ball.fullHelp":"Les balles qui sont éloignées de plus de 3/4 de la largeur d\'écran commencent à s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus éloignées l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle en jeu.","upgrades.ball_attract_ball.help":"Les balles attirent les balles","upgrades.ball_attract_ball.help_plural":"Force d\'attraction plus forte","upgrades.ball_attract_ball.name":"Gravité","upgrades.ball_attracts_coins.fullHelp":"Vous pourriez l\'utiliser pour que les pièces orbitent autours de la balle et colorent les briques à proximité.","upgrades.ball_attracts_coins.help":"Les balles attirent les pièces","upgrades.ball_attracts_coins.name":"Balles de fortune","upgrades.ball_repulse_ball.fullHelp":"Les balles qui se trouvent à moins d\'un quart de largeur d\'écran commencent à se repousser les unes les autres. La force de répulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affichées pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle.","upgrades.ball_repulse_ball.help":"Les balles repoussent les balles","upgrades.ball_repulse_ball.help_plural":"Force de répulsion plus forte","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.base_combo.fullHelp":"Votre combo commence normalement à 1 au début du niveau et revient à 1 lorsque vous rebondissez sans rien toucher. Avec cette caractéristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pièces par brique. Lorsque votre combo est réinitialisé, il revient à 4 et non à 1.  Votre balle scintillera un peu pour indiquer que son combo est supérieur à 1.","upgrades.base_combo.help":"Le combo commence à {{coins}}.","upgrades.base_combo.name":"Combo +3","upgrades.bigger_explosions.fullHelp":"L\'explosion par défaut efface un carré de 3x3 briques, avec cette amélioration un carré de 5x5. Le vent soufflant les pièces est également beaucoup plus fort. L\'écran clignotera un peu après chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_explosions.help":"Explosions plus violentes","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_puck.fullHelp":"Un grand palet permet de ne jamais rater la balle et d\'attraper plus de pièces, ainsi que d\'orienter précisément les rebonds (l\'angle de la balle ne dépend que de l\'endroit où elle touche le palet). \\n\\nCependant, un grand palet est plus difficile à utiliser sur les côtés du niveau, sauf si vous le combinez avec une autre amélioration.","upgrades.bigger_puck.help":"Attrapez facilement plus de pièces.","upgrades.bigger_puck.name":"Palet plus grand","upgrades.clairvoyant.fullHelp":"Vous aide à choisir les bonnes améliorations et à comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) amènent des informations complémentaires d\'une utilité douteuse. ","upgrades.clairvoyant.help":"Révèle les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.name":"Clairvoyant","upgrades.coin_magnet.fullHelp":"Dirige les pièces vers le palet. L\'effet est plus fort si la pièce est déjà proche du palet. Attraper toutes les pièces apporte des bonus spéciaux dans le jeu.  \\n\\nUne autre façon d\'attraper plus de pièces est de frapper les briques par le bas. La vitesse et la direction de la balle ont un impact sur la vitesse des pièces produites.","upgrades.coin_magnet.help":"Le palet attire les pièces","upgrades.coin_magnet.help_plural":"Effet plus marqué sur les pièces","upgrades.coin_magnet.name":"Aimant pour pièces","upgrades.compound_interest.fullHelp":"Votre combo augmentera d\'une unité à chaque fois que vous casserez une brique, générant de plus en plus de pièces à chaque fois que vous casserez une brique. Veillez cependant à attraper chacune de ces pièces avec votre palet, car toute pièce perdue remettra votre combo à zéro. \\n    \\nSi votre combinaison est supérieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pièces ne doivent pas aller à cet endroit.","upgrades.compound_interest.help":"+{{lvl}} combo par brique cassée, remise à zéro quand une pièce est perdu","upgrades.compound_interest.name":"Intérêts","upgrades.concave_puck.fullHelp":"Les balles démarrent verticalement en début de niveau, et rebondi sur le palet de manière plus verticale et inversée.","upgrades.concave_puck.help":"Aide à éviter les bords.","upgrades.concave_puck.name":"Palet concave","upgrades.corner_shot.fullHelp":"Aide à viser dans les coins","upgrades.corner_shot.help":"Laisse votre palet sortir de la zone encadrée","upgrades.corner_shot.name":"Tir en coin","upgrades.etherealcoins.fullHelp":"Il faudrait vous assurer que les pièces tomberont bien quand même à un moment.","upgrades.etherealcoins.help":"Les pièces ne subissent plus la gravité","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.extra_levels.fullHelp":"La partie dure normalement 7 niveaux, après quoi le jeu est terminé et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette amélioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux où vous faites le plus de points, la différence peut donc être spectaculaire.","upgrades.extra_levels.help":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.name":"+1 niveau","upgrades.extra_life.fullHelp":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est terminée dès que vous la laissez tomber.\\n\\nCette compétence ajoute une barre blanche en bas de l\'écran qui sauvera une balle une fois, et se brisera au cours du processus.\\n\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilisées à chaque fois qu\'une balle est sur le point d\'être perdue. ","upgrades.extra_life.help":"La balle rebondit une fois avant d\'être perdue.","upgrades.extra_life.help_plural":"La balle rebondit {{lvl}} fois avant d\'être perdue.","upgrades.extra_life.name":"+1 vie","upgrades.forgiving.fullHelp":" La première brique ratée par niveau ne coûte rien, la suivante 10%, 20%, etc.","upgrades.forgiving.help":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.fountain_toss.fullHelp":"","upgrades.fountain_toss.help":"Quand une pièce est perdue alors que votre combo était en dessous de {{max}}, votre combo à une probabilité de {{lvl}}/combo d\'être incrémenté","upgrades.fountain_toss.name":"Pièce dans la fontaine","upgrades.ghost_coins.fullHelp":"Ce n\'est pas une bug, c\'est une fonctionnalité Les pièces passent à travers les briques doucement. ","upgrades.ghost_coins.help":"Les pièces traversent les briques","upgrades.ghost_coins.name":"Pièces fantôme","upgrades.helium.fullHelp":"Les pièces attendront d\'être sous le palet pour tomber. ","upgrades.helium.help":"Les pièce flottent au lieu de tomber autours du palet","upgrades.helium.name":"Helium","upgrades.hot_start.fullHelp":"Au début de chaque niveau, votre combo commencera à +30 points, mais à chaque seconde, il sera diminué d\'un point. Cela signifie que les 30 premières secondes d\'un niveau produiront beaucoup plus de pièces que les suivantes.\\nVous devez vous assurer de terminer le niveau rapidement. L\'effet se cumule avec d\'autres avantages liés au combo, ce qui vous permet d\'augmenter le combo après les 30 secondes, mais il continuera à diminuer chaque seconde. Chaque fois que vous reprenez la compétence, l\'effet est encore plus prononcé.","upgrades.hot_start.help":"Combo à {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.name":"Démarrage à chaud","upgrades.implosions.fullHelp":"La force d’explosion est appliquée dans l’autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.implosions.help":"Les explosions aspirent les pièces au lieu de les faire exploser.","upgrades.implosions.name":"Implosions","upgrades.instant_upgrade.fullHelp":"Choisissez immédiatement deux améliorations, afin d\'en obtenir une gratuite et une autre pour rembourser celle utilisée pour obtenir cet avantage. Chaque fois que vous choisirez des améliorations dans le menu suivant, vous aurez moins de choix.","upgrades.instant_upgrade.help":"-{{lvl}} choix jusqu\'à la fin de la partie.","upgrades.instant_upgrade.name":"+2 améliorations maintenant","upgrades.left_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté gauche.\\n\\nDès que votre combo augmente, le côté gauche devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.left_is_lava.help":"+{{lvl}} combo par brique, RAZ en touchant le bord gauche","upgrades.left_is_lava.name":"Éviter le côté gauche","upgrades.limitless.fullHelp":"Choisir cet avantage augmente également sa propre limite d\'un point, vous permettant de le choisir à nouveau.","upgrades.limitless.help":"Augmenter le niveau maximum de toutes les mises à niveau de {{lvl}} ","upgrades.limitless.name":"Sans limites","upgrades.metamorphosis.fullHelp":"Avec cette amélioration, les pièces seront de la couleur de la brique d\'où elles proviennent et coloreront la première brique qu\'elles toucheront. \\n\\nLes pièces apparaissent à la vitesse de la balle qui les a cassées, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\".","upgrades.metamorphosis.help":"Chaque pièces peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.name":"Métamorphose","upgrades.multiball.fullHelp":"Dès que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien sûr, de franchir le niveau plus rapidement.","upgrades.multiball.help":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.name":"+1 balle","upgrades.nbricks.fullHelp":"Si votre balle rebondis sans casser une brique, ça compte quand même comme une frappe.  Les briques détruites par des explosions ne comptent pas.","upgrades.nbricks.help":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon RAZ","upgrades.nbricks.name":"Prélèvement","upgrades.one_more_choice.fullHelp":"Chaque menu d\'amélioration comportera une option supplémentaire.  Cela n\'augmente pas le nombre d\'améliorations que vous pouvez choisir, mais vous aide à créer le profile idéal. ","upgrades.one_more_choice.help":"Les niveaux suivants offriront  {{lvl}} option(s) supplémentaire(s) dans la liste d\'améliorations.","upgrades.one_more_choice.name":"+1 choix","upgrades.passive_income.fullHelp":"Certaines amélioration font bouger les balles sans avoir besoin de mettre le palet en mouvement.","upgrades.passive_income.help":"+{{lvl}} combo / brique, sauf si le palet à bougé dans les {{time}} dernières secondes, RAZ dans ce cas","upgrades.passive_income.name":"Revenu passif","upgrades.picky_eater.fullHelp":"Chaque fois que vous cassez une brique de la même couleur que votre balle, votre combo augmente d\'une unité.\\n\\nS\'il s\'agit d\'une couleur différente, la balle adopte cette nouvelle couleur, mais la combinaison est réinitialisée, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle.\\n\\nLes briques de la mauvaise couleur sont entourées en rouge.\\n\\nSi vous avez plus d\'une balle, elles changent toutes de couleur en même temps lorsque l\'une d\'entre elles touche une brique.","upgrades.picky_eater.help":"+{{lvl}} combo par brique cassée la couleur de la balle, RAZ sinon","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.pierce.fullHelp":"Normalement , la balle rebondit dès qu\'elle touche une brique. Avec cette caractéristique, elle continuera sa trajectoire jusqu\'à 3 briques cassées.\\n\\nAprès cela, elle rebondira sur la quatrième brique et vous devez toucher le palet pour remettre le compteur à zéro.","upgrades.pierce.help":"La balle perce {{count}} briques après chaque rebond  sur le palet","upgrades.pierce.name":"Balle perçante","upgrades.pierce_color.fullHelp":"Chaque fois qu\'une balle touche une brique de la même couleur, elle la traverse sans encombre.\\n\\nLorsqu\'elle atteint une brique de couleur différente, elle la casse, prend sa couleur et rebondit. \\n\\nSi vous avez des briques solides, le fonctionnement est un peu différent. ","upgrades.pierce_color.help":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.name":"Perceur de couleur","upgrades.puck_repulse_ball.fullHelp":"Lorsqu\'une balle s\'approche du palet, elle commence à ralentir, voire à rebondir sans toucher le palet. Beaucoup de choses sont liées à un passage par le palet dans le jeu, donc ça pourrait ouvrir des possibilités. ","upgrades.puck_repulse_ball.help":"Le palet repousse les balles","upgrades.puck_repulse_ball.help_plural":"La force de répulsion est plus grande","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.reach.fullHelp":"S\'il n\'y a qu\'une seule rangée de briques, ou si la rangée la plus basse couvre toute la largeur du jeu, cet avantage est sans effet. Sinon, briser cette rangée la plus basse réinitialise le combo ; briser toute autre rangée augmente le combo du nombre de briques présentes sur cette rangée.\\n\\nLa rangée de briques du bas sera entourée en rouge pour vous rappeler de ne pas la toucher. ","upgrades.reach.help":"Casser une des N briques de la ligne la plus basse RAZ le combo. Sinon, +N combo.","upgrades.reach.name":"Attaque aérienne","upgrades.respawn.fullHelp":"Des effets de particules vous indiqueront où les briques apparaîtront. ","upgrades.respawn.help":"{{percent}}% des briques réapparaissent après {{delay}}s.","upgrades.respawn.name":"Réapparition ","upgrades.right_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté droit de la zone de jeu.\\n\\nDès que votre combo augmente, le côté droit devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.right_is_lava.help":"+{{lvl}} combo par brique, RAZ en cas de choc avec le coté droit","upgrades.right_is_lava.name":"Éviter le côté droit","upgrades.sacrifice.fullHelp":"Le combo pourrait monter assez haut.","upgrades.sacrifice.help_l1":"Perdre une vie détruit toutes les briques","upgrades.sacrifice.help_over":"Perdre une vie multiplie le combo par {{lvl}} puis détruit toutes les briques à l\'écran","upgrades.sacrifice.name":"Sacrifice","upgrades.sapper.fullHelp":"Au lieu de disparaître, la première brique cassée est remplacée par une bombe. Faire rebondir la balle sur le palet réarme l\'effet.   En montant en niveau, vous pourrez placer plus de bombes. \\n\\nN\'oubliez pas que les bombes ont un impact sur la vitesse des pièces à proximité. Trop d\'explosions peuvent rendre difficile la récupération des fruits de votre dur labeur.","upgrades.sapper.help":"La première brique cassée devient une bombe.","upgrades.sapper.help_plural":"Les premières briques {{lvl}} cassées deviennent des bombes.","upgrades.sapper.name":"Sapeur","upgrades.shocks.fullHelp":"Quand deux balles entrent en collision,  elles échangent leurs vitesse, créent une explosion et gagnent un peu de vitesse qui les sépare. ","upgrades.shocks.help":"Collision explosive entre les balles","upgrades.shocks.name":"Choc","upgrades.shunt.fullHelp":"Démarrage à chaud sera simplement ajouté au combo actuel","upgrades.shunt.help":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.name":"Shunt","upgrades.side_kick.fullHelp":"Lorsqu\'une brique est touchée, le jeu vérifie la vitesse horizontale de la balle et ajoute +1 au combo si sa direction sur l\'axe horizontale est vers la droite. Dans le cas contraire, le combo diminuera de deux points. L\'emplacement de l\'impact sur la brique n\'a aucune importance.","upgrades.side_kick.help":"+{{lvl}} combo par brique cassé horizontalement, -{{loss}} sinon","upgrades.side_kick.name":"Gaucher","upgrades.skip_last.fullHelp":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut être difficile d\'obtenir les dernières briques.\\n\\nTerminer un niveau plus tôt permet d\'obtenir des choix supplémentaires lors de la mise à niveau. \\n\\nNe jamais manquer de briques est également très avantageux.\\n\\nDonc, si vous avez du mal à casser les dernières briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.skip_last.help":"La dernière brique s\'autodétruit.","upgrades.skip_last.help_plural":"Les {{lvl}} dernières briques restantes s\'autodétruiront","upgrades.skip_last.name":"Nettoyage facile","upgrades.slow_down.fullHelp":"La balle démarre relativement lentement, mais à chaque niveau de votre partie, elle démarre un peu plus vite, et elle accélère également si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile à gérer. \\n\\nVous pouvez l\'obtenir au début de chaque partie en activant le mode enfant dans le menu.","upgrades.slow_down.help":"La balle se déplace plus lentement","upgrades.slow_down.name":"Balle lente","upgrades.smaller_puck.fullHelp":"Le palet est donc plus petit, ce qui, en théorie, facilite certains tirs en coin, mais augmente surtout la difficulté.\\n\\nC\'est pourquoi vous bénéficiez également d\'un bonus de +5 pièces par brique pour toutes les briques que vous casserez après avoir choisi cette option.","upgrades.smaller_puck.help":"Donne aussi +5 combo","upgrades.smaller_puck.help_plural":"Palet encore plus petit et combinaison de base plus élevée","upgrades.smaller_puck.name":"Palet plus petit","upgrades.soft_reset.fullHelp":"Limite l\'impact d\'une réinitialisation du combo.","upgrades.soft_reset.help":"La remise à zéro du combo conserve {{percent}}% des points","upgrades.soft_reset.name":"Réinitialisation progressive","upgrades.streak_shots.fullHelp":"Chaque fois que vous cassez une brique, votre combo (nombre de pièces par brique) augmente d\'une unité. Cependant, dès que la balle touche votre palet,  le combo est remis à sa valeur par défaut, et vous n\'obtiendrez qu\'une seule pièce par brique.\\n\\nUne fois que votre combinaison dépasse la valeur de base, votre palet devient rouge pour vous rappeler que le fait de le toucher avec la balle détruira votre combinaison.","upgrades.streak_shots.help":"Plus de pièces si vous cassez plusieurs briques à la fois.","upgrades.streak_shots.name":"Séquence de destruction","upgrades.sturdy_bricks.fullHelp":"Chaque niveau de cet atout ajoute un PV à toutes les briques. Vous pouvez consulter le nombre de PV avec l\'avantage \\"clairvoyant\\". Vous pouvez augmenter les dégâts des balles en obtenant l\'avantage \\"Balle perçante\\". Chaque niveau de cet atout ajoute 50% de pièces en plus.","upgrades.sturdy_bricks.help":"+{{lvl}} points de vie des briques, +{{percent}}% pièces quand elles sont détruites","upgrades.sturdy_bricks.name":"Briques solides","upgrades.telekinesis.fullHelp":"Vous contrôlez la balle pendant qu\'elle monte.","upgrades.telekinesis.help":"Contrôler la trajectoire de la balle","upgrades.telekinesis.help_plural":"Effet plus fort sur la balle","upgrades.telekinesis.name":"Télékinésie","upgrades.top_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité. Cependant, votre combo sera réinitialisé dès que votre balle atteindra le haut de l\'écran.\\n\\nLorsque votre combo est supérieur au minimum, une barre rouge apparaît en haut de l\'écran pour vous rappeler que vous devez éviter de la frapper.","upgrades.top_is_lava.help":"+{{lvl}} combo par brique, RAZ en cas de rebond au plafond","upgrades.top_is_lava.name":"Icare ","upgrades.trampoline.fullHelp":"Une des rares améliorations à ne pas avoir de condition de remise à zéro","upgrades.trampoline.help":"+{{lvl}} combo à chaque rebond d\'une balle sur le palet,-{{lvl}} combo à chaque rebond sur un bord ","upgrades.trampoline.name":"Trampoline","upgrades.unbounded.fullHelp":"J\'espère que vous avez trouvé un moyen de garder votre balle à l\'écran. Au niveau 2+, le plafond disparaîtra également. Il s\'agit d\'un avantage avancé.","upgrades.unbounded.help":"+{{lvl}} combo par brique, plus de cotés pour garder la balle en jeu, danger","upgrades.unbounded.help_no_ceiling":"+{{lvl}} combo par brique, plus de cotés ou de plafond","upgrades.unbounded.name":"Libérée, délivrée","upgrades.viscosity.fullHelp":"Les pièces accélèrent normalement avec la gravité et les explosions pour atteindre des vitesses assez élevées. \\n\\nCette compétence les ralentit constamment, comme si elles se trouvaient dans une sorte de liquide visqueux.\\n\\nCela permet de les attraper plus facilement et se combine bien avec les améliorations qui influencent le mouvement de la pièce.","upgrades.viscosity.help":"Chute plus lente des pièces","upgrades.viscosity.name":"Fluide visqueux ","upgrades.wind.fullHelp":"Le vent dépend de l\'endroit où se trouve le palet, s\'il est au centre de l\'écran, il ne se passe rien, s\'il est à gauche, il soufflera vers la gauche, s\'il est à droite de l\'écran, il soufflera vers la droite.\\n\\nLe vent affecte à la fois les balles et les pièces.","upgrades.wind.help":"La position du palet crée du vent","upgrades.wind.help_plural":"Force du vent plus importante","upgrades.wind.name":"Vive le vent","upgrades.yoyo.fullHelp":"C\'est l\'inverse de Télékinésie, contrôlez la balle alors qu\'elle redescend vers le palet.","upgrades.yoyo.help":"La balle descend vers le palet","upgrades.yoyo.name":"Yo-yo","upgrades.zen.fullHelp":"C\'est quand même un jeu non violent à la base.","upgrades.zen.help":"+{{lvl}} combo par brique, jusqu\'à ce qu\'il y ait une explosion","upgrades.zen.name":"Zen"}');var P={};P=JSON.parse('{"confirmRestart.no":"Cancel","confirmRestart.text":"You\'re about to start a new game, is that really what you wanted ?","confirmRestart.title":"Start a new game ?","confirmRestart.yes":"Restart game","gameOver.creative":"This is a test game, its score is not recorded.","gameOver.cumulative_total":"Your total cumulative score went from {{startTs}} to {{endTs}}.","gameOver.lost.summary":"You dropped the ball after catching {{score}} coins.","gameOver.lost.title":"Game Over","gameOver.restart":"Start a new game","gameOver.stats.balls_lost":"Balls lost","gameOver.stats.bricks_broken":"Bricks broken","gameOver.stats.bricks_per_minute":"Bricks broken per minute","gameOver.stats.catch_rate":"Catch \\n\\n{{compliment}}","level_up.compliment_advice":"Try to catch all coins, never miss the bricks, never hit the walls/ceiling or clear the level under 30s to gain additional choices and upgrades.","level_up.compliment_good":"Well done !","level_up.compliment_perfect":"Impressive, keep it up !","level_up.pick_upgrade_title":"Pick an upgrade","level_up.plus_one_upgrade":"(+1  upgrade)","level_up.plus_one_upgrade_and_reroll":"(+1 upgrade and  +1 re-roll)","level_up.reroll":"Re-roll ({{count}})","level_up.reroll_help":"Offer new choices","level_up.unlocked_level":" (Level)","level_up.unlocked_perk":" (Perk)","level_up.upgrade_perk_to_level":"  lvl {{level}}","loop.converted_rerolls":"Your {{n}} leftover re-rolls where converted to +{{n}} base combo.","loop.instructions":"All perks you have now will have lower max levels depending on their current level. You can pick one below that will gain one level and one max level instead. Your pick will be leveled up, even beyond the maximum normally allowed for that perk.","loop.no_rerolls":"You didn\'t have any leftover re-rolls, so your base combo stayed the same. ","loop.title":"Starting loop {{loop}}","main_menu.basic":"Basic graphics","main_menu.basic_help":"Better performance.","main_menu.colorful_coins":"Colorful coins","main_menu.colorful_coins_help":"Coins always spawn of the color of the brick","main_menu.comboIncreaseTexts":"Show +X in gold","main_menu.comboIncreaseTexts_help":"When the combo increase","main_menu.contrast":"High Contrast","main_menu.contrast_help":"More colorful and dark rendering","main_menu.credit_levels":"<h2>Levels source or reference link</h2>","main_menu.credits":"# Credits\\n\\nI pulled many background patterns from https://pattern.monster/\\n\\nSome of the sound generating code was written by ChatGPT, and heavily\\nadapted to my usage over time.\\n\\nI wanted an APK to start in fullscreen and be able to list it on fdroid and the play store. I started with an empty view and went to work trimming it down, with the help of that tutorial : https://github.com/fractalwrench/ApkGolf/blob/master/blog/BLOG_POST.md\\n\\nColin (obigre) brought a lot of fantastic ideas to the game, here\'s his website (in French) : https://colin-crapahute.bearblog.dev/\\n\\nTõnu Rääk made a Tiermaker template to share your favorite perk choices :  https://tiermaker.com/create/breakout-71-perks-18086724\\n\\n# Breakout games suggestions\\n\\nHere are a few interesting games in the breakout genre :\\n\\n- LBreakoutHD : https://sourceforge.net/p/lgames/code/HEAD/tree/trunk/lbreakouthd/\\n- Wizorb : https://store.steampowered.com/app/207420/Wizorb/\\n- Ricochet infinity : https://www.myabandonware.com/game/ricochet-infinity-dxm\\n- First prototype of B71 : https://breakout-v1.lecaro.me/\\n- Second prototype of B71: https://breakout-v2.lecaro.me/\\n- Whackerball : https://store.steampowered.com/app/2192170/Whackerball/\\n\\n# PC game suggestions\\n\\nHere are a few games i\'ve sank a lot of time in, and that inspired breakout in some way\\n\\n- Heat signature : https://www.humblebundle.com/store/heat-signature\\n- FTL : https://www.gog.com/en/game/faster_than_light\\n- Nova drift :   https://www.gog.com/en/game/nova_drift\\n- Noita : https://www.gog.com/en/game/noita\\n- Enter the gungeon : https://www.gog.com/en/game/enter_the_gungeon\\n- Zero Sivert : https://store.steampowered.com/app/1782120/ZERO_Sievert/\\n- Factorio :  https://www.factorio.com/\\n- Nuclear throne : https://store.steampowered.com/app/242680/Nuclear_Throne/  (don\'t buy on GOG it\'s outdated) \\n- Brigador :  https://www.gog.com/en/game/brigador\\n- Teleglitch https://www.gog.com/en/game/teleglitch_die_more_edition\\n- Rollers of the realm : https://store.steampowered.com/app/262470/Rollers_of_the_Realm/\\n","main_menu.donate":"You\'ve played for {{hours}} hours","main_menu.donate_help":"How about donating {{suggestion}} € ? You can hide this reminder in the settings. ","main_menu.donation_reminder":"Remind me to donate","main_menu.donation_reminder_help":"See time played and donation link in main menu","main_menu.download_save_file":"Download score and stats","main_menu.download_save_file_help":"Get a save file","main_menu.extra_bright":"Extra bright","main_menu.extra_bright_help":"Increases the size of the halo around coins and bricks.","main_menu.footer_html":"<p>       \\n<span>Made in France by <a href=\\"https://lecaro.me\\">Renan LE CARO</a>.</span> \\n<a href=\\"https://paypal.me/renanlecaro\\" target=\\"_blank\\">Donate</a>\\n<a href=\\"https://discord.gg/bbcQw4x5zA\\" target=\\"_blank\\">Discord</a>\\n<a href=\\"https://f-droid.org/en/packages/me.lecaro.breakout/\\" target=\\"_blank\\">F-Droid</a>\\n<a href=\\"https://play.google.com/store/apps/details?id=me.lecaro.breakout\\" target=\\"_blank\\">Google Play</a>\\n<a href=\\"https://renanlecaro.itch.io/breakout71\\" target=\\"_blank\\">itch.io</a> \\n<a href=\\"https://gitlab.com/lecarore/breakout71\\" target=\\"_blank\\">Gitlab</a>\\n<a href=\\"https://breakout.lecaro.me/\\" target=\\"_blank\\">Web version</a>\\n<a href=\\"https://news.ycombinator.com/item?id=43183131\\" target=\\"_blank\\">HackerNews</a>\\n<a href=\\"https://breakout.lecaro.me/privacy.html\\" target=\\"_blank\\">Privacy Policy</a>\\n<span>v.{{appVersion}}</span>\\n</p>\\n","main_menu.fullscreen":"Fullscreen","main_menu.fullscreen_help":"Game will try to go full screen before starting","main_menu.help_content":"# Goal\\n\\nThe goal is to catch as many coins as possible during 7 levels. \\nCoins appear when you break bricks.\\nThey fly around, bounce and roll, and you need to catch them with your puck to increase your score. \\nYour score is displayed in the top right corner of the screen.\\nYou must delete all bricks to progress to the next level. \\nIf you drop the ball, it\'s game over, unless you had the \\"extra life\\" upgrade.\\n\\n# Upgrades \\n\\nAfter clearing a level, you\'ll be able to pick upgrades among a small selection presented to you. \\n\\nThe upgrade you pick will apply until the end of the run. You will get more upgrade if you play well : catch all coins, clear the level quickly, never miss the bricks, never bounce on the sides or ceiling.\\n\\nIf you play very well, you\'ll also get \\"rerolls\\" that allow you to shuffle the list of upgrades that are offered to you. Once an upgrade is offered, it\'s less likely to reappear afterward. \\n\\nYou also get a free random upgrade at the beginning of each run. There\'s also an easy mode for kids, where the game will always start with the \\"slower ball\\" upgrade.  You can see which upgrades you have and more by clicking your score at the top right of the screen. \\n\\nUpgrades apply to the whole run and can synergize, or really work against each other. Most of the fun of the game is discovering which ones work best together.\\n\\nSome upgrades help with aiming, like \\"Telekinesis\\". Some upgrades can be picked multiple times to increase the effect, you\'ll see for example \\"+1 ball level 2\\" which adds a third ball.\\n\\nWhen you first play, only a few upgrades are available, you unlock the rest by simply playing and scoring points. There\'s a similar \\nmechanic for levels unlock. At the end of a run, the things you just unlocked will be shown, and you can check the full content in menu / unlocks.\\n\\nMany upgrades impact your combo. \\n\\n# Combo\\n\\nYour \\"combo\\" is the number of coins spawned when a brick breaks. It is displayed on your puck, for example x4 means each\\nbrick will spawn 4 coins. It will reset if you miss. \\n\\nMany upgrades will increase the combo when you break a brick, but also add a condition to reset it. So the more upgrades you pick, the faster it will climb, but the more likely it will be that it returns to it\'s base value. \\n\\n# Aiming\\n\\nWhat decides how the ball flies away is only the position of the puck hit. If the ball hits the puck dead center, it will bounce back up vertically, while in you hit more on one side, it will have more angle. \\n\\nThe puck speed and incoming angle have no impact on the ball direction after bouncing.\\n\\nYou might find that a smaller puck makes it a bit easier to aim near corners, but also makes it much harder to catch coins.\\n\\n\\"Wind\\" and \\"puck controls ball\\" can help you aim even after the ball bounced to the wrong direction.\\n\\n\\"Slower ball\\" gives you a bit more time to aim, particularly useful in later levels where the ball goes faster. The ball also\\naccelerates as you spend time in each level. \\n\\n# Unlocks\\n\\nWhen starting breakout 71 for the first time, you can access a few upgrades and levels. The rest needs to be unlocked. Upgrades are unlocked by simply playing. Every time you catch a coin, your total score is raised by one. Then once you reach the threshold of the upgrade, it\'s unlocked.\\n\\nUnlocking levels is a bit different, it requires you to play very well, in many different ways. The first levels just need a high score of X, but later level are unlocked by reaching a high score of X with perk Y and without perk Z. All those requirements are pseudo random and not handpicked, so some are likely much harder than others. They should be the same for everyone though. It might happen that an update of the game perks list changes the required perks. \\n\\n# System requirements \\n\\nThe game should perform well even on low-end devices.  It\'s very lean and does not take much storage space (Roughly 0.1MB). The web version is supposed to work on iOS safari, Firefox ESR and chrome, on desktop and mobile.\\n\\nIf the app stutters, turn on \\"fast mode\\" in the settings to render a simplified view that should be faster. You can adjust many aspects of the game there, go have a look ! \\n\\n# Playing offline \\n\\nBreakout 71 can work offline in many ways:\\n\\n- play store  : https://play.google.com/store/apps/details?id=me.lecaro.breakout\\n- fdroid : https://f-droid.org/packages/me.lecaro.breakout/\\n- html file on pc : https://renanlecaro.itch.io/breakout71\\n\\n","main_menu.help_help":"Learn more about general aspects of the game","main_menu.help_title":"Help and credits","main_menu.help_upgrades":"<h2>Upgrades</h2>","main_menu.high_score":"High score : {{score}}","main_menu.kid":"Kids mode","main_menu.kid_help":"Start future games with \\"slower ball\\".","main_menu.language":"Language","main_menu.language_help":"Choose the game\'s language","main_menu.load_save_file":"Load save file","main_menu.load_save_file_help":"Select a save file on your device","main_menu.loop_run_help":"Allows you to loop up to 7 times","main_menu.max_coins":" {{max}} coins on screen maximum","main_menu.max_coins_help":"Cosmetic only, no effect on score","main_menu.max_particles":" {{max}} particles maximum","main_menu.max_particles_help":"Limits the number of particles show on screen for visual effect. ","main_menu.mobile":"Mobile mode","main_menu.mobile_help":"Leaves space under the puck.","main_menu.normal":"New game","main_menu.normal_help":"Play 7 levels with a random starting perk","main_menu.pointer_lock":"Mouse pointer lock","main_menu.pointer_lock_help":"Locks and hides the mouse cursor.","main_menu.record":"Record gameplay videos","main_menu.record_download":"Download video ({{size}} MB)","main_menu.record_help":"Get a video of each level.","main_menu.red_miss":"Miss warning","main_menu.red_miss_help":"Show red particles around balls going down without a hit.","main_menu.reset":"Reset Game","main_menu.reset_cancel":"No","main_menu.reset_confirm":"Yes","main_menu.reset_help":"Erase high score, play time and statistics","main_menu.reset_instruction":"You will loose all progress you made in the game, are you sure ?","main_menu.save_file_error":"Error loading save file","main_menu.save_file_loaded":"Save file loaded","main_menu.save_file_loaded_help":"The app will now reload to apply your save","main_menu.save_file_loaded_ok":"Ok","main_menu.settings_help":"Tailor the game play oints at level {{level}}/{{max}} of loop {{loop}}","score_panel.upcoming_levels":"Upcoming levels :","score_panel.upgrades_picked":"Upgrades picked so far : ","unlocks.greyed_out_help":"The greyed out ones can be unlocked by increasing your total score. The total score increases every time you score in game.","unlocks.intro":"Your total score is {{ts}}. Below are all the upgrades and levels the games has to offer.   Click an upgrade or level below to start a game with it.","unlocks.just_unlocked":"You just unlocked a level","unlocks.just_unlocked_plural":"You just unlocked {{count}} levels","unlocks.level":"<h2>You unlocked {{unlocked}} levels out of {{out_of}}</h2>\\n<p>Here are all the game levels, click one to start a game with that starting level. </p> ","unlocks.level_description":"A {{size}}x{{size}} level with {{bricks}} bricks, {{colors}} colors and {{bombs}} bombs.","unlocks.minScore":"Reach ${{minScore}} in a run to unlock.","unlocks.minScoreWithPerks":"Reach ${{minScore}} in a run with {{required}} but without {{forbidden}} to unlock.","unlocks.minTotalScore":"Accumulate a total of ${{score}}","unlocks.reached":"Your best score was {{reached}}.","unlocks.title_upgrades":"You unlocked {{unlocked}} upgrades out of {{out_of}}","upgrades.addiction.fullHelp":"The countdown only starts after breaking the first brick of each level. It stops as soon as all bricks are destroyed.","upgrades.addiction.help":"+{{lvl}} combo / brick, combo resets {{delay}}s after breaking a brick. ","upgrades.addiction.name":"Addiction","upgrades.asceticism.fullHelp":"You\'ll need to store the coins somewhere while your combo climbs. ","upgrades.asceticism.help":"+{{combo}} combo / brick,  - {{combo}} on coin catch","upgrades.asceticism.name":"Asceticism","upgrades.ball_attract_ball.fullHelp":"Balls that are more than \\"3/4 of the game area width\\" away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.","upgrades.ball_attract_ball.help":"Balls attract balls","upgrades.ball_attract_ball.help_plural":"Stronger attraction force","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attracts_coins.fullHelp":"This could be used to \\"paint around\\" the balls with coins if you combined it with \\"stain\\" and \\"ghost coins\\".","upgrades.ball_attracts_coins.help":"Balls attract coins","upgrades.ball_attracts_coins.name":"Fortunate ball","upgrades.ball_repulse_ball.fullHelp":"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.","upgrades.ball_repulse_ball.help":"Balls repulse balls","upgrades.ball_repulse_ball.help_plural":"Stronger repulsion force","upgrades.ball_repulse_ball.name":"Personal space","upgrades.base_combo.fullHelp":"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you\'ll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.","upgrades.base_combo.help":"Combo starts at {{coins}}.","upgrades.base_combo.name":"+3 base combo","upgrades.bigger_explosions.fullHelp":"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)","upgrades.bigger_explosions.help":"Bigger explosions","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_puck.fullHelp":"A bigger puck makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball\'s angle only depends on where it hits the puck). \\n\\nHowever, a large puck is harder to use around the sides of the level, and will make it sometimes unavoidable to miss. You could word around that with other perks.","upgrades.bigger_puck.help":"Easily catch more coins.","upgrades.bigger_puck.name":"Bigger puck","upgrades.clairvoyant.fullHelp":"Helps you pick the right upgrades and understand what\'s going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)","upgrades.clairvoyant.help":"See upcoming levels, bricks HP and ball direction","upgrades.clairvoyant.name":"Clairvoyant","upgrades.coin_magnet.fullHelp":"Directs the coins to the puck. The effect is stronger if the coin is close to it already. Catching all coins bring special bonuses in the game. \\n\\nAnother way to catch more coins is to hit bricks from the bottom. The ball\'s speed and direction impacts the spawned coin\'s velocity. ","upgrades.coin_magnet.help":"Puck attracts coins","upgrades.coin_magnet.help_plural":"Stronger effect on the coins","upgrades.coin_magnet.name":"Coins magnet","upgrades.compound_interest.fullHelp":"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\n\\nBe sure however to catch every one of those coins with your puck, as any lost coin will reset your combo. \\n\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.","upgrades.compound_interest.help":"+{{lvl}} combo per brick broken, resets on coin lost","upgrades.compound_interest.name":"Compound interest","upgrades.concave_puck.fullHelp":"Balls starts the level going straight up, and bounces with less angle.","upgrades.concave_puck.help":" Helps with aiming straight up","upgrades.concave_puck.name":"Concave puck","upgrades.corner_shot.fullHelp":"Helps with aiming in the corners. Further levels let you go further out. ","upgrades.corner_shot.help":"Lets your puck overlap with the borders of the screen","upgrades.corner_shot.name":"Corner shot","upgrades.etherealcoins.fullHelp":"You\'ll have to make sure that the coins fall down somehow, or you won\'t get any. ","upgrades.etherealcoins.help":"Coins are no  longer affected by gravity","upgrades.etherealcoins.name":"Coins, in Space","upgrades.extra_levels.fullHelp":"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.","upgrades.extra_levels.help":"Play {{count}} levels instead of 7","upgrades.extra_levels.name":"+1 level","upgrades.extra_life.fullHelp":"Normally, you have one ball, and the game is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou\'ll loose one level of that perk every time a ball bounces at the bottom of the screen.","upgrades.extra_life.help":"The ball will bounce once on the bottom line before being lost.","upgrades.extra_life.help_plural":"The ball will bounce on the bottom {{lvl}} times before being lost.","upgrades.extra_life.name":"+1 life","upgrades.forgiving.fullHelp":"The first miss per level is free, then 10% of the combo, then 20% .. ","upgrades.forgiving.help":"Missing breaks reduces combo progressively instead of all at once.","upgrades.forgiving.name":"Forgiving","upgrades.fountain_toss.fullHelp":"","upgrades.fountain_toss.help":"When you miss a coin and your combo was under {{max}}, your combo has a probability of {{lvl}}/combo to grow by one.","upgrades.fountain_toss.name":"Fountain toss","upgrades.ghost_coins.fullHelp":"It\'s not a bug, it\'s a feature !  Coins fly through bricks slowly. Higher levels let them move faster. ","upgrades.ghost_coins.help":"Coins pass through bricks","upgrades.ghost_coins.name":"Ghost coins","upgrades.helium.fullHelp":"This affects the coins  and will let the float up until you are ready to pick them up.","upgrades.helium.help":"Gravity reversed left and right of puck","upgrades.helium.name":"Helium","upgrades.hot_start.fullHelp":"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one.\\n\\nThis means the first 30 seconds in a level will spawn many more coins than the following ones, and you should make sure that you clear the level quickly. \\n\\nThe effect stacks with other combo related perks, so you might be able to raise the combo after the 30s timeout, but it will keep ticking down. \\n\\nEvery time you take the perk again, the effect will be more dramatic.","upgrades.hot_start.help":"Start at combo {{start}}, -{{loss}} combo per second","upgrades.hot_start.name":"Hot start","upgrades.implosions.fullHelp":"The explosion force is applied the other way. Further levels act as \\"bigger explosion\\"","upgrades.implosions.help":"Explosions suck coins in instead of blowing them out","upgrades.implosions.name":"Implosions","upgrades.instant_upgrade.fullHelp":"Immediately pick two upgrades, so that you get one free one and one to repay the one used to get this perk. Every further menu to pick upgrades will have fewer options to choose from.","upgrades.instant_upgrade.help":"-{{lvl}} choice until game end.","upgrades.instant_upgrade.name":"+2 upgrades now","upgrades.left_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n","upgrades.left_is_lava.help":"+{{lvl}} combo per brick broken, resets on left side hit","upgrades.left_is_lava.name":"Avoid left side","upgrades.limitless.fullHelp":"Choosing this perk also raises his own limit by one, letting you pick it again.","upgrades.limitless.help":"Raise all upgrade\'s maximum level by {{lvl}} ","upgrades.limitless.name":"Limitless","upgrades.metamorphosis.fullHelp":"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. \\n\\nCoins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\"paint\\".","upgrades.metamorphosis.help":"Each coins can stain {{lvl}} brick(s) with its color","upgrades.metamorphosis.name":"Metamorphosis","upgrades.multiball.fullHelp":"As soon as you drop the ball in Breakout 71, you loose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.","upgrades.multiball.help":"Start every levels with {{count}} balls.","upgrades.multiball.name":"+1 ball","upgrades.nbricks.fullHelp":"You don\'t necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don\'t count","upgrades.nbricks.help":"Hit exactly {{lvl}} bricks per puck bounce for +{{lvl}} combo, otherwise it resets","upgrades.nbricks.name":"Strict sample size","upgrades.one_more_choice.fullHelp":"Every upgrade menu will have one more option.  Doesn\'t increase the number of upgrades you can pick.","upgrades.one_more_choice.help":"Further level ups will offer {{lvl}} more option(s) in the list","upgrades.one_more_choice.name":"+1 choice","upgrades.passive_income.fullHelp":"Some perks can help the balls do what you want without needing to do anything.","upgrades.passive_income.help":"+{{lvl}} combo / brick, unless the puck moved in the last {{time}}s, then it resets instead","upgrades.passive_income.name":"Passive income","upgrades.picky_eater.fullHelp":"Whenever you break a brick the same color as your ball, your combo increases by one. \\n\\nIf it\'s a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball\'s color. \\n\\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red halo. \\n\\nIf you have more than one ball, they all switch color whenever one of them hits a brick.","upgrades.picky_eater.help":"+{{lvl}} combo per brick broken, resets on ball color change","upgrades.picky_eater.name":"Picky eater","upgrades.pierce.fullHelp":"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\n\\nAfter that, it will bounce on the 4th brick, and you\'ll need to touch the puck to reset the counter.","upgrades.pierce.help":"Ball pierces {{count}} bricks after a puck bounce","upgrades.pierce.name":"Piercing","upgrades.pierce_color.fullHelp":"Whenever a ball hits a brick of the same color, it will just go through unimpeded. \\n\\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\n\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.","upgrades.pierce_color.help":"+{{lvl}} damage to bricks of the ball\'s color","upgrades.pierce_color.name":"Color pierce","upgrades.puck_repulse_ball.fullHelp":"When a ball gets close to the puck, it will start slowing down, and even potentially bouncing without touching the puck.","upgrades.puck_repulse_ball.help":"Puck repulses balls","upgrades.puck_repulse_ball.help_plural":"Stronger repulsion force","upgrades.puck_repulse_ball.name":"Soft landing","upgrades.reach.fullHelp":"If there is only one row of bricks, or if the lowest row of bricks cover the whole width of the game,  then this perk does nothing. Otherwise, breaking this lowest row resets the combo, while breaking anything else increases the combo by the number of bricks present on that lowest row. \\n\\nThe lowest row will be highlighted in red. ","upgrades.reach.help":" Touching the N bricks of the lowest row resets the combo. Otherwise, +N combo","upgrades.reach.name":"Top down","upgrades.respawn.fullHelp":"Some particle effect will let you know where bricks will appear. ","upgrades.respawn.help":"{{percent}}% of bricks re-spawn after {{delay}}s.","upgrades.respawn.name":"Re-spawn","upgrades.right_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n","upgrades.right_is_lava.help":"+{{lvl}} combo per brick broken, resets on right side hit","upgrades.right_is_lava.name":"Avoid right side","upgrades.sacrifice.fullHelp":"This might get the combo pretty high.","upgrades.sacrifice.help_l1":"Loosing a life clears all bricks","upgrades.sacrifice.help_over":"Loosing a life {{lvl}}x the combo then clears all bricks","upgrades.sacrifice.name":"Sacrifice","upgrades.sapper.fullHelp":"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the puck re-arms the effect. Leveling-up this perk will allow you to place more bombs.\\n\\nRemember that bombs impact the velocity of nearby coins, so too many explosions could make it hard to catch the fruits of your hard work.","upgrades.sapper.help":"The first brick broken becomes a bomb.","upgrades.sapper.help_plural":"The first {{lvl}} bricks broken become bombs.","upgrades.sapper.name":"Sapper","upgrades.shocks.fullHelp":"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separated them. ","upgrades.shocks.help":"Explosive balls collisions","upgrades.shocks.name":"Shocks","upgrades.shunt.fullHelp":"If you also have hot start, the hot start is just added to the current combo","upgrades.shunt.help":"Keep {{percent}}% of your combo between levels","upgrades.shunt.name":"Shunt","upgrades.side_kick.fullHelp":"When a brick get hit, the game checks the ball\'s horizontal velocity, and add +1 to the combo it is towards the right. The combo will decrease by 2 otherwise. The location of the impact on the brick is irrelevant. ","upgrades.side_kick.help":"+{{lvl}} combo per brick broken from the left, -{{loss}} otherwise","upgrades.side_kick.name":"Left handed","upgrades.skip_last.fullHelp":"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\n\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help.","upgrades.skip_last.help":"The last brick will explode.","upgrades.skip_last.help_plural":"The last {{lvl}}  bricks will explode.","upgrades.skip_last.name":"Easy Cleanup","upgrades.slow_down.fullHelp":"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.","upgrades.slow_down.help":"Ball moves more slowly","upgrades.slow_down.name":"Slower ball","upgrades.smaller_puck.fullHelp":"This makes the puck smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat\'s why you also get a nice bonus of +5 coins per brick for all bricks you\'ll break after picking this. ","upgrades.smaller_puck.help":"Also gives +5 base combo","upgrades.smaller_puck.help_plural":"Even smaller puck and higher base combo","upgrades.smaller_puck.name":"Smaller puck","upgrades.soft_reset.fullHelp":"Limit the impact of a combo reset.","upgrades.soft_reset.help":"Combo resets keeps {{percent}}%","upgrades.soft_reset.name":"Soft reset","upgrades.streak_shots.fullHelp":"Every time you break a brick, your combo (number of coins per bricks) increases by one. \\n\\nHowever, as soon as the ball touches your puck, the combo is reset to its default value, and you\'ll just get one coin per brick.\\n\\nOnce your combo rises above the base value, your puck will become red to remind you that it will destroy your combo to touch it with the ball.","upgrades.streak_shots.help":"More coins if you break many bricks at once.","upgrades.streak_shots.name":"Single puck hit streak","upgrades.sturdy_bricks.fullHelp":"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\"clairvoyant\\" perk. You can increase ball damage by getting the \\"piercing\\" perk. Each level of the perk adds +50% coins spawn. ","upgrades.sturdy_bricks.help":"+{{lvl}} bricks HP, +{{percent}}% coins spawned when broken","upgrades.sturdy_bricks.name":"Sturdy bricks","upgrades.telekinesis.fullHelp":"You control the ball while it\'s going up. ","upgrades.telekinesis.help":"Puck controls the ball\'s trajectory","upgrades.telekinesis.help_plural":"Stronger effect on the ball","upgrades.telekinesis.name":"Telekinesis","upgrades.top_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. ","upgrades.top_is_lava.help":"+{{lvl}} combo per brick, reset when the top is hit","upgrades.top_is_lava.name":"Sky is the limit","upgrades.trampoline.fullHelp":"One of the rare  combo upgrades that don\'t add a reset condition","upgrades.trampoline.help":"+{{lvl}} combo per puck bounce,-{{lvl}} combo per bounce on any border","upgrades.trampoline.name":"Trampoline","upgrades.unbounded.fullHelp":"I hope you\'ve found a way to keep your ball on screen. Penalties for hitting the sides no longer apply. At level 2+, the ceiling will also disappear. This is an advanced perk. ","upgrades.unbounded.help":"+{{lvl}} combo per brick, no more sides to keep the ball in game, danger","upgrades.unbounded.help_no_ceiling":"+{{lvl}} combo per brick, no more sides  or ceiling","upgrades.unbounded.name":"Unbounded","upgrades.viscosity.fullHelp":"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin\'s movement.","upgrades.viscosity.help":"Slower coin fall","upgrades.viscosity.name":"Viscosity","upgrades.wind.fullHelp":"The wind depends on where your puck is, if it\'s in the center of the screen nothing happens, if it\'s on the left it will blow left-wise, if it\'s on the right of the screen then it will blow right-wise. \\n\\nThe wind affects both the balls and coins.","upgrades.wind.help":"Puck position creates wind","upgrades.wind.help_plural":"Stronger wind force","upgrades.wind.name":"Wind","upgrades.yoyo.fullHelp":"It\'s the opposite of telekinesis, control the ball while it\'s falling back down.","upgrades.yoyo.help":"Ball falls toward puck","upgrades.yoyo.name":"Yo-yo","upgrades.zen.fullHelp":"After all, this is a non-violent game. ","upgrades.zen.help":"+{{lvl}} combo per bricks, reset when there\'s an explosion","upgrades.zen.name":"Zen"}');var H={};function R(e,_){if(void 0===H[e])try{var t,r=localStorage.getItem(e);r&&(H[e]=JSON.parse(r))}catch(e){console.warn(e)}return null!==(t=H[e])&&void 0!==t?t:_}function L(e,_){H[e]=_;try{localStorage.setItem(e,JSON.stringify(_))}catch(e){console.warn(e)}}function B(){return R("breakout_71_total_score",0)}function T(){return 200*Math.pow(2,R("max_coins",1))}function O(){return 200*Math.pow(2,R("max_particles",1))}var C={fr:_(M),en:_(P)};function F(){var e,_;return R("
