ف می‌کنند و پاداش امتیاز را افزایش می‌دهند.","upgrades.trickledown.name":"چکه به پایین","upgrades.trickledown.tooltip":"سکه‌ها در بالای صفحه ظاهر می‌شوند.","upgrades.trickledown.verbose_description":"سکه‌ها ممکن است روی آجرهای ردیف بالا بنشینند، در این صورت پس از شکستن آن آجرها پایین می‌افتند.","upgrades.unbounded.name":"حاشیه","upgrades.unbounded.tooltip":"فضایی در چپ و راست سطح اضافه می‌کند، اما پارو نمی‌تواند تا آنجا برود.","upgrades.unbounded.verbose_description":"قدرت دیگری ممکن است به گسترش دامنه پارو کمک کند.","upgrades.viscosity.name":"چسبناکی","upgrades.viscosity.tooltip":"افت سکه‌ها کندتر","upgrades.viscosity.verbose_description":"سکه‌ها معمولاً با جاذبه و انفجارها به سرعت‌های بالایی شتاب می‌گیرند.\\n\\nاین ویژگی دائماً آن‌ها را کند می‌کند، گویی در مایعی ویسکوز هستند.\\n\\nاین کار گرفتن آن‌ها را آسان‌تر می‌کند و با ویژگی‌هایی که حرکت سکه‌ها را تحت تأثیر قرار می‌دهند به‌خوبی ترکیب می‌شود.","upgrades.wind.name":"باد","upgrades.wind.tooltip":"موقعیت پارو باد ایجاد می‌کند","upgrades.wind.verbose_description":"باد به موقعیت پارو بستگی دارد: چپ به چپ می‌وزد، راست به راست. روی توپ‌ها و سکه‌ها تأثیر می‌گذارد.","upgrades.wrap_left.name":"پیچش چپ","upgrades.wrap_left.tooltip":"برخورد به سمت چپ توپ را به سمت راست تلپورت می‌کند","upgrades.wrap_left.verbose_description":"سطوح بالاتر سکه‌ها را نیز تلپورت می‌کنند.","upgrades.wrap_right.name":"پیچش راست","upgrades.wrap_right.tooltip":"برخورد به سمت راست توپ را به سمت چپ تلپورت می‌کند","upgrades.wrap_right.verbose_description":"سطوح بالاتر سکه‌ها را نیز تلپورت می‌کنند.","upgrades.wrap_up.name":"پیچش بالا","upgrades.wrap_up.tooltip":"لمس بالای صفحه توپ را درست بالای پارو تلپورت می‌کند.","upgrades.wrap_up.verbose_description":"این به‌عنوان برخورد پارو محسوب نمی‌شود. در سطح ۲، سکه‌ها نیز تلپورت می‌کنند.","upgrades.yoyo.name":"یو-یو","upgrades.yoyo.tooltip":"توپ به سمت پارو می‌افتد","upgrades.yoyo.verbose_description":"برعکس تله‌کینزی است، توپ را وقتی به پایین برمی‌گردد کنترل کنید.","upgrades.zen.name":"ذن","upgrades.zen.toolt ver.stats.duration_per_level":"レベルごとのプレイタイム","gameOver.stats.hit_rate":"ヒット率","gameOver.stats.level_reached":"到達レベル","gameOver.stats.total_score":"合計スコア","gameOver.stats.upgrades_applied":"取得したアップグレード","gameOver.stats_intro":"あなたのトップ{{count}}のプレイ結果との比較です。","gameOver.unlocked_perk":"解禁したアップグレード","gameOver.unlocked_perk_plural":"{{count}}個の特典を解禁しました","gameOver.win.summary":"ゲームオーバー。あなたは合計で{{score}}コインを獲得しました。","gameOver.win.title":"このゲームをクリアしました","help.content":"## 目標\\n\\n7つのレベルでコインをできるだけ多くキャッチしましょう。\\nブロックを破壊するとコインが出現します。\\nパドルでキャッチしてスコアを稼ぎましょう。\\nスコアは画面右上に表示されます。\\nボールを落としてしまうとゲームオーバーです。\\n\\n全てのブロックを破壊すると、アップグレードを選択できます。\\n\\n## アップグレード\\n\\n選択したアップグレードは、そのプレイの終了まで適用されます。\\n効果を強化するために複数回選択できるものもあります。\\nエイミングを補助したり、他の方法でゲームを簡単にするものもあります。\\n組み合わせた場合にのみ有用なものもあります。\\n\\n各ゲームの開始時には必ず1つのアップグレードを獲得します。\\nそのアイコンが、最初のレベルのブロックになります。\\n設定画面で開始時のアップグレードを選択できます。\\n\\n多くのアップグレードはコンボに影響します。\\n\\n## コンボ\\n\\n「コンボ」とは、ブロックが破壊された際に出現するコインの数です。\\nパドル上に表示され、例えば\uD83E\uDE994は破壊したブロック1個につき4枚のコインが出現することを意味します。\\nコンボを増加させるアップグレードの多くは、コンボをリセットされる条件も追加します。\\nまた、ボールがブロックに当たらずにパドルに戻った場合もコンボはリセットされます。\\nその際には「MISS」と表示されます。\\n\\n常にブロックを狙うようにしましょう。\\n\\n## 狙い\\n\\nボールが跳ね返る方向は、パドル上のボールの位置で決まります。\\nパドルの中心に当たると真上に跳ね返ります。\\n外側に当たるほど、反射角度が大きくなります。\\nパドルの移動速度や入射角度は、反射後のボール方向には影響しません。\\n\\nエイミングを助けるアップグレードが多くあります。\\n\\n## レベルとアップグレードの解禁\\n\\nBreakout 71を初めてプレイする際、ほとんどのレベルとアップグレードが使用できません。\\nアップグレードは、プレイして多くのコインを集めるだけで解禁されます。\\n初期のレベルは、ハイスコアを達成することで解禁されます。\\n後期のレベルでは、選択可能な特典に条件が追加されます。\\n\\nメダルの獲得により各ステージで複数のアップグレードを獲得できれば、ハイスコア達成が格段に容易になります。\\n\\n## メダル\\n\\n以下の条件を満たすと追加のアップグレードとそれらの選択肢が増加します：\\n\\n- ステージをなるべく早くクリアする\\n- すべてのコインをキャッチする\\n- ボールを毎回何かに当てる（「MISS」をしない）","help.help":"このゲームについて","help.levels":"レベル一覧","help.title":"ヘルプ","help.upgrades":"## アップグレード","history.columns.score":"スコア","history.columns.started":"日付","history.help":"あなたのプレイ結果のベスト{{count}}です。","history.include_past_versions":"過去バージョンの記録も表示する","history.locked":"10回以上プレイすると解禁","history.title":"プレイ記録","lab.help":"お好みのビルドを試そう。","lab.instruc _coins.tooltip":"コインは一番近いボールに引き寄せられます","upgrades.ball_attracts_coins.verbose_description":"『染色』と『ゴーストコイン』と組み合わせれば、周りのブロックを染められます。 コインマグネットの代替品としても機能します.","upgrades.ball_repulse_ball.name":"パーソナルスペース","upgrades.ball_repulse_ball.tooltip":"ボール同士は反発しあいます","upgrades.ball_repulse_ball.verbose_description":"ボール同士の距離が画面幅の4分の1未満だと、互いを押しのけます。距離が近ければ近いほど押し出す力は強くなります。押し合う力はパーティクル効果で可視化されます。この特典はすでにマルチボールを獲得していないと選択肢に挙がりません。","upgrades.base_combo.name":"ベースアップ","upgrades.base_combo.tooltip":"ブロックごとのコインが3枚増える","upgrades.base_combo.verbose_description":"レベルは通常1コンボで始まり、ミスするごとに1コンボに戻ります。この特典があれば、最低コンボが3増えるので、ブロックごとに最低4枚のコインが出てくることになります。コンボがリセットされると、4コンボに戻ります。コンボが増えたことを、ボールのキラキラが表現します。レベルが増えると、さらに3コンボ上乗せされます。","upgrades.bigger_explosions.name":"ドッカン","upgrades.bigger_explosions.tooltip":"爆発が大きくなります","upgrades.bigger_explosions.verbose_description":"通常、爆発の効果範囲は3マス四方ですが、この特典を獲得すると、範囲が上下左右さらに1マス広がり、5マス四方になります。コインが飛び散る力もかなり強くなります。爆発すると画面が光ります（簡易グラフィック適用時を除く）。","upgrades.bigger_puck.name":"大きいパドル","upgrades.bigger_puck.tooltip":"コインを受け止めやすくします","upgrades.bigger_puck.verbose_description":"パドルを大きくすると、ボールやコインを受け止めやすくなり、さらにボールの角度を精密に調整しやすくなります（ボールが反射する角度は、ボールがパドル上のどこに当たったかのみで決まります）。","upgrades.bricks_attract_ball.name":"ブロックはボールを引き寄せる","upgrades.bricks_attract_ball.tooltip":"ボールが近くのブロックに引き寄せられます","upgrades.bricks_attract_ball.verbose_description":"ブロックを{{count}}個壊すまで、ボールがブロックに引き寄せられます。レベルが増えると効果が強くなり、効果が無くなるまで壊せるブロックの数も増えます。ボールがパドルに当たると効果が再開します。","upgrades.bricks_attract_coins.name":"レンガがコインを引き寄せる","upgrades.bricks_attract_coins.tooltip":"落ちてこないようにできます","upgrades.bricks_attract_coins.verbose_description":"コインは近くのブロックに引き寄せられます。レベルが高くなると、引き寄せる力も強くなります。","upgrades.buoy.name":"ブイ","upgrades.buoy.tooltip":"コインは一番下のラインに{{duration}}秒間浮かびます。","upgrades.buoy.verbose_description":"効果はモバイルモード時に最もよく確認できます","upgrades.chill.name":"チル","upgrades.chill.tooltip":"アップグレードもレベル上限もなくなります。","upgrades.chill.verbose_description":"ボールの加速もはるかに遅くなります。","upgrades.clairvoyant.name":"透視能力","upgrades.clairvoyant.tooltip":"これからのレベル、ブロックのHP、そしてボールの方向が見えます","upgrades.clairvoyant.verbose_description":"適切なアップグレードを選ぶのに役立ちます。『頑丈なブロック』での現状もわかりやすくなります。レベル2・3ではいまいち有用性がわからない情報が手に入ります。（ループモードで到達可）","upgrades.coin_magnet.name":"コインマグネット","upgrades.coin_magnet.tooltip":"パドルはコインを引き寄せます","upgrades.coin_magnet.verbose_description":"コインをパドルに誘導します。コインが既にパドルに近いほど効果は強くなります。","upgrades.compound_interest.name":"複合利息","upgrades.compound_interest.tooltip":"コインを逃さなければ、コインが増えます","upgrades.compound_interest.verbose_description":"ブロックを壊すごとにコンボが1増え、発生するコインも1枚づつ増えます。\\nしかし、コインを取り逃すとコンボがリセットされるので、一枚残らず受け止めてください。\\nコンボが最低より増えると、プレイエリアの下端に、コインを当ててはいけない赤い線が表示されます。","upgrades.concave_puck.name":"凹型パドル","upgrades.concave_puck.tooltip":"垂直方向の狙いが向上する","upgrades.concave_puck.verbose_description":"ボールはレベル開始時に真っ直ぐ上へ飛び、反射角が小さくなります。","upgrades.corner_shot.name":"コーナーショット","upgrades.corner_shot.tooltip":"パドルが画面の端をはみ出て移動できます","upgrades.corner_shot.verbose_description":"角から狙いを定めるのに役立ちます。レベルが増えるごとにはみ出られる長さが増えます。","upgrades.double_or_nothing.name":"ハイリスク・ハイリターン","upgrades.double_or_nothing.tooltip":"コンボ上昇スピード{{multiplier}} 倍、コンボリセットでスコアの{{percent}}%消失。","upgrades.double_or_nothing.verbose_description":"コンボのリセットは、コンボが最小値より増えている場合にのみカウントされます","upgrades.etherealcoins.name":"無重力コイン","upgrades.etherealcoins.tooltip":"コインが重力の影響を受けなくなります","upgrades.etherealcoins.verbose_description":"コインは何回も跳ね返ってもスピードを保つようになり、重力の影響も受けなくなります。","upgrades.extra_levels.name":"あと五分だけ","upgrades.extra_levels.tooltip":"7レベルではなく、{{count}}レベルをプレイします","upgrades.extra_levels.verbose_description":"デフォルトのゲームは最大7面まで続き、そこでゲームオーバーとなります。\\n\\nこの特典の1レベルにつき、プレイするレベルを1面追加します。最後の面が最もスコアを稼げるレベルになることが多いので、通常プレイのスコアとは劇的な差がつく事があります。","upgrades.extra_life.name":"残機","upgrades.extra_life.tooltip":"ボールを受け止められなくても一回続けられる","upgrades.extra_life.verbose_description":"効果が発動されると残機は消費されます。残機はパドルの後ろの白い線として表示されます。","upgrades.forgiving.name":"寛容","upgrades.forgiving.tooltip":"ミスしてもコンボの減り幅を小さくします","upgrades.forgiving.verbose_description":"各レベルの最初のミスはコンボがそのままで、それからコンボの一割づつ増えていきます。","upgrades.fountain_toss.name":"願いの泉","upgrades.fountain_toss.tooltip":"コインを撮り逃したときにコンボを獲得します。","upgrades.fountain_toss.verbose_description":"コンボがレベル数の30倍未満のときに、コインを取り逃すと、コンボが1増える確率があります。","upgrades.ghost_coins.name":"ゴーストコイン","upgrades.ghost_coins.tooltip":"コインはブロックをゆっくりすり抜けます","upgrades.ghost_coins.verbose_description":"バグではなく、機能です！ コインはレンガをゆっくりとすり抜けていきます。特典レベルが高いほど、速く移動します.","upgrades.golden_goose.name":"黄金のガチョウ","upgrades.golden_goose.tooltip":"コインがブロックに当たると、ボールへ瞬間移動","upgrades.golden_goose.verbose_description":"コインがブロックに当たると、最も近いボールにテレポートします。レベル2では、フィールドの左右の境界てもテレポートします。","upgrades.happy_family.name":"一家団欒","upgrades.happy_family.tooltip":"すべてのボールを生かしておけばコインが増えます。","upgrades.happy_family.verbose_description":"ボールをはね返すたび、追加のボール1つにつき1コンボ加算。ボールを逃すとコンボがリセットされます。一つ目のボールはコンボを付与しません。","upgrades.helium.name":"ヘリウム","upgrades.helium.tooltip":"パドルの左右で重力が弱くなります","upgrades.helium.verbose_description":"レベル1では重力が弱くなります。レベル2では、コインがゆっくりと浮上するようになります。レベル3ではギューンと上がるようになります。","upgrades.hot_start.name":"スタートダッシュ","upgrades.hot_start.tooltip":"30秒以内に片付けるとコインが増えます","upgrades.hot_start.verbose_description":"それぞれのレベルの開始時、コンボが{{start}}加算されますが、一秒ごとに{{loss}}減少します。効果は他の特典に上乗せされます。","upgrades.implosions.name":"内破","upgrades.implosions.tooltip":"爆発はコインを散らすのではなく、内側に吸い込みます","upgrades.implosions.verbose_description":"爆発の力の方向が逆になります。強化すると内破の力が強くなります","upgrades.left_is_lava.name":"左を避ける","upgrades.left_is_lava.tooltip":"左の壁に触れなければ、コインが増える","upgrades.left_is_lava.verbose_description":"ブロックを壊すたびコンボが一つずつ増加するので、次のブロックから得られるコインの枚数が1枚増えます。\\n\\nしかし、ボールが左の壁に当たった途端コンボがリセットされます。\\n\\nコンボが上昇すると、当ててはいけない左の壁が赤く表示されます。\\n\\nレベル2に増強すると、左の壁がなくなるので、ボールやコインを失うかもしれません。","upgrades.limitless.name":"限界突破","upgrades.limitless.tooltip":"すべてのアップグレードの最大レベルを{{lvl}}上げる","upgrades.limitless.verbose_description":"この特典を選択すると、それ自身の限界も1つ上がるので、再び選択することができます。","upgrades.metamorphosis.name":"染色","upgrades.metamorphosis.tooltip":"コインは{{lvl}}個のブロックに色を移します","upgrades.metamorphosis.verbose_description":"この特典では、コインは出てきたブロックと同じ色になり、次に当たったブロックに色を移します。コインはブロックを壊したボールと同じスピードで動くので、色を付けたいブロックを少し狙うことができます。特典レベル1では、それぞれのコインはブロック1つに色を移すことができ、その後は中空で表示されます。","upgrades.minefield.name":"地雷原","upgrades.minefield.tooltip":"画面上の爆弾ブロック1つにつきコイン{{percent}}%増加","upgrades.minefield.verbose_description":"爆発している間も数に含まれます。","upgrades.multiball.name":"マルチボール","upgrades.multiball.tooltip":"各レベルは {{count}} 個のボールで始まります。","upgrades.multiball.verbose_description":"Breakout 71では、ボールを取り逃したら負けです。\\n\\nこの特典があれば、ボールが2つに増え、片方を取り逃しても続けられます。\\n\\n取り逃したボールは次のステージで返ってきます。\\n\\nボールが複数ある時だけ取得できる特典があるだけではなく、ボールが複数あればもちろんより速くクリアできます。","upgrades.nbricks.name":"唯我独尊","upgrades.nbricks.tooltip":"ブロックを1つずつ当てるとコインが増えます。","upgrades.nbricks.verbose_description":"パドルに1回当てるたび、ブロックにちょうど{{lvl}}回当てれば、+{{lvl}}コンボ、そうでなければリセット。当てた際にブロックを壊す必要はありません。爆発で壊れたブロックは数に入りません","upgrades.one_more_choice.name":"品揃え","upgrades.one_more_choice.tooltip":"アップグレードの選択肢が増える","upgrades.one_more_choice.verbose_description":"これ以降のアップグレードの選択肢がもう1つ追加されます。獲得できるアップグレード数が増えるわけではありません。","upgrades.ottawa_treaty.name":"オタワ条約","upgrades.ottawa_treaty.tooltip":"ブロックを壊すと近くの爆弾が解除される","upgrades.ottawa_treaty.verbose_description":"近くの爆弾は色付きブロックに置き換えられます。 あなたがサッパーを持っている場合は、ボールは、次のバウンドまで、そのサッパー効果を失うことになります。 一度に1つの爆弾だけ無力化することができます。","upgrades.passive_income.name":"受動所得","upgrades.passive_income.tooltip":"コインが増えるが、動いている間ボールやコインを受け止められない","upgrades.passive_income.verbose_description":"ブロックを壊すたび{{lvl}}コンボ増加、移動後{{time}}秒間パドルの実体がなくなります。一部の特典は、何もせずにボールを思い通りにできます。","upgrades.picky_eater.name":"ピューティー・エター","upgrades.picky_eater.tooltip":"色でレンガ色を崩せばより多くの硬貨","upgrades.picky_eater.verbose_description":"ボールと同じ色のレンガを破るたびに、画面マイナスの色の数が増えます。\\n異なる色の場合、ボールは新しい色をとりますが、球の色を残したレンガがなければ、コンボはリセットされます。\\n少なくともコンボを高く得ると、間違った色のレンガは赤い境界線を取得します。\\nボールが1つ以上ある場合、それらはそれらのいずれかがレンガに当たるたびに色を切り替えます.","upgrades.pierce.name":"ピアス","upgrades.pierce.tooltip":"ボールピアス {{count}} パドルバウンス後のレンガ","upgrades.pierce.verbose_description":"ボールは通常、何かに触れるとすぐにバウンスします。 このパークでは、最大3つのレンガが壊れたため、その軌跡を継続します。\\n\\nその後、4番目のレンガにバウンスし、カウンターをリセットするためにパドルに触れる必要があります.","upgrades.pierce_color.name":"カラーピアス","upgrades.pierce_color.tooltip":"球は同じ色の煉瓦を通って行きます","upgrades.pierce_color.verbose_description":"通常、ボールは1つの損傷および煉瓦に1つの健康ポイント(HP)があります。\\nボールが同じ色のレンガに当たると、それはただ圧迫されて行くだけです。\\n異なる色のレンガに達すると、それを破り、その色を取り、バウンスします。\\nあなたが丈夫なレンガを持っている場合は、ボールは、まだ同じ色のレンガをバウンスするかもしれません.","upgrades.puck_repulse_ball.name":"ソフトランディング","upgrades.puck_repulse_ball.tooltip":"パドルはボールを弾きます","upgrades.puck_repulse_ball.verbose_description":"ボールがパドルに近づくと、パドルに触れずにボールが遅くなり、潜在的に跳ね上がります.","upgrades.rainbow.name":"レインボー","upgrades.rainbow.tooltip":"虹色のコインスポーン.","upgrades.rainbow.verbose_description":"各レベルは色のコインの割合を増加させます。 色はレベル時間に依存します.","upgrades.reach.name":"トップダウン","upgrades.reach.tooltip":"レンガの一番低い列を避けると、コインが増える","upgrades.reach.verbose_description":"最も低い列のNレンガに触れると、コンボがリセットされます。 それ以外の場合、+Nコンボ。\\n\\nレンガの1列だけがある場合、またはレンガの一番低い列がゲームの幅全体をカバーしている場合は、このパークは何もしません。 それ以外の場合は、この低い行を破棄すると、コンボがリセットされ、他のものは、その低い行に存在するレンガの数によってコンボが増加します。\\n\\n一番低い行は赤でハイライトされます.","upgrades.respawn.name":"リスペーン","upgrades.respawn.tooltip":"{{delay}}% のレンガは、 {{delay}} の後に再開されます.","upgrades.respawn.verbose_description":"いくつかの粒子効果は、レンガがどこに表示されるかを知らせます.","upgrades.right_is_lava.name":"右を避ける","upgrades.right_is_lava.tooltip":"右の壁に触れなければ、コインが増える","upgrades.right_is_lava.verbose_description":"ブロックを壊すたびコンボが一つずつ増加するので、次のブロックから得られるコインの枚数が1枚増えます。\\n\\nしかし、ボールが右の壁に当たった途端コンボがリセットされます。\\n\\nコンボが上昇すると、当ててはいけない右の壁が赤く表示されます。\\n\\nレベル2に増強すると、右の壁がなくなるので、ボールやコインを失うかもしれません。","upgrades.sacrifice.name":"サクリフィス","upgrades.sacrifice.tooltip":"すべてのレンガをクリアする生命を失う","upgrades.sacrifice.verbose_description":"レベル2+では、ボードをクリアする前に、コンボもパークのレベルでマルチプライドされます。 これは、かなり高いコンボを得ることができます.","upgrades.sapper.name":"サッパー","upgrades.sapper.tooltip":"最初のレンガが壊れた爆弾になります.","upgrades.sapper.verbose_description":"ちょうど消えるのではなく、あなたが壊れる最初のレンガは、爆弾レンガに置き換えられます。 パドルでボールを弾くと効果を再アームします。 このパークをレベルアップすると、より多くの爆弾を配置することができます.","upgrades.shocks.name":"ショック","upgrades.shocks.tooltip":"爆発性の球の衝突","upgrades.shocks.verbose_description":"2つのボールが衝突すると、速度を交換し、爆発をスポーンし、それらを分離するために速度を追加.","upgrades.shunt.name":"シャント","upgrades.shunt.tooltip":"レベル間のコンボの {{percent}}% を保持する","upgrades.shunt.verbose_description":"熱いスタートをしても、ホットスタートは現在のコンボに追加されます","upgrades.side_flip.name":"右手","upgrades.side_flip.tooltip":"右からレンガを打つとコインが増える","upgrades.side_flip.verbose_description":"+{{lvl}} 右から壊れたレンガごとのコンボ, -{{loss}} その他. 右側のレンガに衝撃して、コンボを1つ獲得しますが、左の側に衝突して2コンボを取り除きます。 上下からヒットしても効果がありません.","upgrades.side_kick.name":"左手","upgrades.side_kick.tooltip":"左からレンガを打つとコインが増える","upgrades.side_kick.verbose_description":"+{{lvl}} 左から壊れたレンガごとのコンボ, -{{loss}} その他. 左側のレンガに衝撃を与え、コンボを1つ獲得しますが、2コンボを外すと右側に衝突しないでください。 上下からヒットしても効果がありません.","upgrades.skip_last.name":"クリーンアップ","upgrades.skip_last.tooltip":"最後のブロックが自壊するようになる","upgrades.skip_last.verbose_description":"次のレベルに進むには、すべてのブロックを壊す必要があります。しかし、最後の1個を破壊するのは難しいかもしれません。\\nこのアップグレードはレベルが上がるごとに、最後に自壊するブロックの数が増えていきます。\\nレベルを早くクリアすると、アップグレード時に選択肢が増えます。ブロックを逃さないことも非常に重要です。\\n\\n最後のブロックを破壊するのが難しい場合は、このアップグレードを複数取得すると役立つかもしれません。","upgrades.slow_down.name":"スローボール","upgrades.slow_down.tooltip":"ボールの速さが遅くなる","upgrades.slow_down.verbose_description":"ボールの速さが比較的遅くなりますが、ゲームのレベルが進むごとに少しずつ速くなります。\\n\\nまた、一つのレベルで長時間経過した場合も速くなります。\\n\\nこのパークにより、ボールがより扱いやすくなります。\\n\\n設定から「キッズモード」を有効にすれば、毎回スタート時に獲得できます。","upgrades.smaller_puck.name":"スモールパドル","upgrades.smaller_puck.tooltip":"出現するコインが{{percent}}% 増加する","upgrades.smaller_puck.verbose_description":"パドルが小さくなり、理論上はコーナーショットが簡単になりますが、難易度が上がります。\\n\\nただし、ボーナスとしてコインの出現数が+50%増加します。","upgrades.soft_reset.name":"ソフトリセット","upgrades.soft_reset.tooltip":"リセット時にコンボの {{percent}}% を保持する","upgrades.soft_reset.verbose_description":"コンボリセットの影響を制限します.","upgrades.steering.name":"ステアリング","upgrades.steering.tooltip":"パドルが動くとき球は回ります","upgrades.steering.verbose_description":"パドルの位置の変更は、ボールの動きの方向に直接影響します。 レベル2+では、ボールの指示を示す行を取得します.","upgrades.sticky_coins.name":"スティッキーコイン","upgrades.sticky_coins.tooltip":"コインは同じ色のレンガに固執","upgrades.sticky_coins.verbose_description":"レベル2では、彼らはどんな色のレンガに固執します","upgrades.streak_shots.name":"ヒット連打","upgrades.streak_shots.tooltip":"一度に多くのブロックを破壊するとコインが増えます","upgrades.streak_shots.verbose_description":"ブロックを破壊するたびに、コンボが増加します。\\n\\nしかし、ボールがパドルに触れるとすぐに、コンボがリセットされます。\\n\\nコンボが基本値を超えると、パドルに赤い枠が表示されます。これは、ボールがパドルに触れるとコンボが途切れることを示す警告です。","upgrades.sturdy_bricks.name":"丈夫なレンガ","upgrades.sturdy_bricks.tooltip":"+{{lvl}} レンガ HP, +{{percent}}% コイン","upgrades.sturdy_bricks.verbose_description":"すべてのレンガに1つのHPを追加します。 「clairvoyant」パークでHP番号を見ることができます。 パークを「ピアス」することでボールダメージを増加させることができます。 パークの各レベルは+50%の硬貨のスポーーンを加えます.","upgrades.superhot.name":"SUPER HOT （スーパーホット）","upgrades.superhot.tooltip":"パドルの移動と連動して時間が進むようになります。","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"テレキネシス","upgrades.telekinesis.tooltip":"パドルの位置がボールに影響を与えるようになる","upgrades.telekinesis.verbose_description":"ボールの上昇時に軌道を操作できます。ボールが画面の下半分にある場合に、その効果はより強くなります。","upgrades.three_cushion.name":"3つのクッション","upgrades.three_cushion.tooltip":"レンガを間接的に当たるとコインが増える","upgrades.three_cushion.verbose_description":"側面および上、パドルバウンスごとの+{{max}}までの1つの打撃ごとの+1のコンボ。\\n毎回ヒットすると、コンボを1つずつ上げ、最大+3になります。\\nその後、次のパドルバウンスまでコンボは獲得しません。\\n\\n最初に弾くことなくレンガを打つときにコンボがリセットされます.","upgrades.top_is_lava.name":"空は限界です","upgrades.top_is_lava.tooltip":"あなたがトップに当たらないなら、より多くのコイン","upgrades.top_is_lava.verbose_description":"レンガを破るたびに、コンボが増加します。 しかし、あなたのコンボが画面の上部に当たるとすぐにリセットされます。\\n\\n少なくともコンボが上にあるとき、赤いバーが上部に現れて、ヒットを避けるべきだと思い出させます。\\n\\nレベル2では、ボーダーは完全に削除され、ボールやコインは失われる可能性があります.","upgrades.trampoline.name":"トランポリン","upgrades.trampoline.tooltip":"レンガやパドルだけにバウンスすると、コインが増える","upgrades.trampoline.verbose_description":"パドルが跳ねるごとに{{lvl}} コンボ増加、ボーダーに跳ねるごとに{{lvl}} コンボ減少。リセット条件が発生しない数少ないコンボアップグレードの一つ。","upgrades.transparency.name":"透明性","upgrades.transparency.tooltip":"+50%の硬貨。 画面上部にボールが見えない.","upgrades.transparency.verbose_description":"画面上部にボールが透明になります。\\n+{{percent}} % コイン。\\nレベルが高いとボールが透明になり、ポイントボーナスが増加します.","upgrades.trickledown.name":"トリックダウン","upgrades.trickledown.tooltip":"コインは画面上部に表示されます.","upgrades.trickledown.verbose_description":"コインはレンガの上にレンガがある場合は、レンガの上に座るかもしれません。その場合、レンガが壊れた後に落ちます.","upgrades.unbounded.name":"パディング","upgrades.unbounded.tooltip":"左右のスペースを追加しますが、パドルは遠くに行けません.","upgrades.unbounded.verbose_description":"別のアップグレードは、パドルのリーチを拡張するのに役立ちます.","upgrades.viscosity.name":"粘度","upgrades.viscosity.tooltip":"コインの落下が遅くなる","upgrades.viscosity.verbose_description":"コインは通常、重力や爆発によって加速します。\\n\\nこのパークは常にどろどろの液体の中にいるかのように、コインの加速が遅くなります。\\n\\nこれによりコインをキャッチしやすくなり、コインの動きに影響を与えるパークと相性が良いです。","upgrades.wind.name":"ウインド","upgrades.wind.tooltip":"パドルの位置は風を作ります","upgrades.wind.verbose_description":"風はパドルの位置に依存します。左のブロー、右は右に吹きます。 ボールとコインの両方に影響します.","upgrades.wrap_left.name":"左ラップ","upgrades.wrap_left.tooltip":"左側の右側にボールをトッピングする","upgrades.wrap_left.verbose_description":"高いレベルのテレポートコインも.","upgrades.wrap_right.name":"右ラップ","upgrades.wrap_right.tooltip":"右側の側面を押すと、左側にボールをテレポートします","upgrades.wrap_right.verbose_description":"高いレベルのテレポートコインも.","upgrades.wrap_up.name":"ラップアップ","upgrades.wrap_up.tooltip":"画面の上部に触れると、パドルの上にボールを通信します.","upgrades.wrap_up.verbose_description":"パドルヒットではカウントされません。 レベル2では、コインのテレポートも.","upgrades.yoyo.name":"ヨーヨー","upgrades.yoyo.tooltip":"ボールがパドルに向かって落下するようになる","upgrades.yoyo.verbose_description":"「テレキネシス」とは逆に、ボールの落下時に軌道を操作できます。","upgrades.zen.name":"禅 （ZEN）","upgrades.zen.tooltip":"ボムが爆発しなければ、より多くのコインを獲得できます","upgrades.zen.verbose_description":"3秒ごとに +{{lvl}}コンボ、ボムの爆発時にコンボがリセットされる"}');var U={};U=JSON.parse('{"confirmRestart.no":"取消","confirmRestart.text":"你即將開始一個新遊戲。你確定你要繼續嗎？","confirmRestart.title":"開始一個新遊戲？","confirmRestart.yes":"重新開始遊戲","editor.editing.bigger":"增加關卡尺寸","editor.editing.color":"在顏色清單中選擇一種顏色（每個關卡最多 5 種）","editor.editing.copied":"關卡代碼已複製","editor.editing.copy":"複製關卡代碼","editor.editing.copy_help":"在我們的 Discord 中分享關卡代碼，以將其納入遊戲中。","editor.editing.credit":"致謝和來源","editor.editing.credit_prompt":"輸入你的關卡的來源網址或說明。","editor.editing.delete":"刪除關卡","editor.editing.down":"向下移動全部磚塊","editor.editing.help":"然後點擊一個磚塊來為其著色。","editor.editing.left":" 瞄準磚塊。\\n\\n## 瞄準\\n\\n只有球在槳板上的位置決定了它的彈跳方式。\\n如果球擊中槳板的正中央，它會垂直彈起。\\n如果你擊中槳板的邊緣越近，它的角度就越大。\\n槳板速度和進入角度對球彈跳後的方向沒有影響。\\n\\n許多有助於瞄準的升級都可以解鎖。\\n\\n## 解鎖\\n\\n首次遊玩 Breakout 71 時，大多數升級和關卡都是鎖定的。\\n只需要遊玩並收集大量硬幣即可解鎖升級。\\n達到高分即可解鎖前期關卡。\\n後期關卡會根據玩家所選擇的技能進行調整。\\n\\n憑藉獎牌，每個關卡獲得多次升級後，獲得高分會更加容易。\\n\\n## 獎牌\\n\\n玩得好的話，你將會獲得額外的升級和選擇：\\n\\n- 快速通關\\n- 接住所有硬幣\\n- 確保在球拍彈跳之間擊中目標","help.help":"瞭解更多遊戲資訊","help.levels":"關卡","help.title":"幫助","help.upgrades":"## 升級","history.columns.score":"分數","history.columns.started":"日期","history.help":"看你最好的 {{count}} 次遊玩。","history.include_past_versions":"也顯示過往的版本","history.locked":"遊玩至少十次以解鎖","history.title":"遊玩歷史","lab.help":"嘗試任何你想要的構建。","lab.instructions":"選擇升級和一個關卡，然後點擊上面的遊玩按鈕。","lab.menu_entry":"創造模式","lab.play":"遊玩","lab.reset":"重置","lab.select_level":"選擇要遊玩的關卡","lab.unlocks_at":"總分數達到 {{score}} 以解鎖","level_up.challenges.catchRateGood.description":"接住 {{gold}}% 的硬幣以獲得金牌，{{silver}}% 的硬幣以獲得銀牌。","level_up.challenges.catchRateGood.name":"已接住 {{total}} 枚中的 {{caught}} 枚硬幣","level_up.challenges.earned_medal":"你獲得了一枚獎牌","level_up.challenges.earned_medal_plural":"你獲得了 {{count}} 枚獎牌","level_up.challenges.gain":"+{{choices}} 個選擇和 +{{up}} 個升級","level_up.challenges.levelMisses.description":"如果你未擊中少於 {{gold}} 次以獲得金牌，少於 {{silver}} 次以獲得銀牌。","level_up.challenges.levelMisses.name":"{{value}} 次未擊中","level_up.challenges.levelMisses.none":"没有未擊中","level_up.challenges.levelTime.description":"你完成關卡的時間少於 {{gold}} 秒以獲得金牌，少於 {{silver}} 秒以獲得銀牌。","level_up.challenges.levelTime.name":"{{value}} 秒遊玩時間","level_up.challenges.no_gain":"沒有收穫","level_up.forbidden":"在此遊玩中選擇此技能將阻止你解鎖關卡「{{levelName}}」。","level_up.required":"在此遊玩中選擇此技能將可能允許你解鎖關卡「{{levelName}}」。","level_up.title":"關卡 {{level}}／{{max}} 已清除","level_up.upgrade_perks":"你接住了 {{coins}} 枚硬幣。請在下方選擇 {{count}} 個升級。","main_menu.donate":"你已遊玩了 {{hours}} 小時","main_menu.donate_help":"想捐助嗎？你可以在設定中隱藏此提醒。","main_menu.high_score":"最高分：{{score}}","main_menu.normal":"新遊戲","main_menu.normal_help":"以隨機起始技能遊玩 7 個關卡","main_menu.settings_help": 選擇，但是選擇更多則會增加風險和回報。","unlocks.category.combo_boost":"## 連擊強化升級\\n\\n這些升級可以提升連擊數或連擊倍數，而且沒有增加重置條件。","unlocks.category.simple":"## 輔助升級\\n\\n這些升級幾乎適用於任何情況。","unlocks.greyed_out_help":"灰色的升級可以透過增加總分數來解鎖。遊戲中每次得分都會增加總分數。","unlocks.intro":"你的總分數是 {{ts}}。點擊下方的一個升級以使用它開始遊戲。","unlocks.just_unlocked":"關卡已解鎖","unlocks.just_unlocked_plural":"你剛剛解鎖了 {{count}} 個關卡","unlocks.level":"你已解鎖 {{out_of}} 個中的 {{unlocked}} 個關卡","unlocks.level_description":"一個 {{size}}x{{size}} 的關卡，包含 {{bricks}} 塊磚塊、{{colors}} 種顏色和 {{bombs}} 顆炸彈。","unlocks.levels":"已解鎖關卡","unlocks.minScore":"在一場遊戲中達到 ${{minScore}} 以解鎖。","unlocks.minScoreWithPerks":"在一場遊戲中達到 ${{minScore}} ，而且有 {{required}} 但是沒有 {{forbidden}} 以解鎖。","unlocks.minScoreWithPerksNoForbidden":"在一次遊玩中選擇 {{required}} 而且達到 ${{minScore}} 分以解鎖。","unlocks.minTotalScore":"累計 ${{score}}","unlocks.reached":"你的最佳分數是 {{reached}}。","unlocks.title_upgrades":"{{unlocked}}／{{out_of}} 個升級已解鎖","unlocks.try":"嘗試","unlocks.upgrades":"已解鎖升級","unlocks.use":"使用","upgrades.addiction.name":"上癮","upgrades.addiction.tooltip":"如果你不停地擊破磚塊，將獲得更多硬幣","upgrades.addiction.verbose_description":"+{{lvl}} 連擊/磚塊破壞，連擊在磚塊破壞後 {{delay}}秒重設。倒數計時僅在破壞每個等級的第一個磚塊後開始。所有磚塊被破壞後，倒數計時立即停止。","upgrades.asceticism.name":"苦修主義","upgrades.asceticism.tooltip":"每擊破一塊磚塊 +{{combo}} 連擊，每接住一枚硬幣 -{{combo}} 連擊。","upgrades.asceticism.verbose_description":"當你的連擊攀升時，你需要將硬幣存放在某個地方。","upgrades.ball_attract_ball.name":"重力","upgrades.ball_attract_ball.tooltip":"球吸引球","upgrades.ball_attract_ball.verbose_description":"距離超過「遊戲區域寬度的四分之三」的球將開始相互吸引。\\n\\n當它們距離越遠時，吸引力越強。\\n\\n彩虹粒子會飛舞，象徵吸引力。此技能僅在你擁有多個球時有效。","upgrades.ball_attracts_coins.name":"球吸引硬幣","upgrades.ball_attracts_coins.tooltip":"硬幣跟隨最接近的球","upgrades.ball_attracts_coins.verbose_description":"如果將它與「染色劑」和「幽靈硬幣」結合使用，就可以用來在球周圍「塗抹」硬幣。它也可以代替硬幣磁鐵。","upgrades.ball_repulse_ball.name":"個人空間","upgrades.ball_repulse_ball.tooltip":"球排斥球","upgrades.ball_repulse_ball.verbose_description":"距離小於螢幕寬度四分之一的球會開始互相排斥。當它們彼此靠近時，排斥力會更強。粒子會噴射出來，象徵施加的排斥力。此技能僅在你擁有多個球時使用。","upgrades.base_combo.name":"堅實的基礎","upgrades.base_combo.tooltip":"每擊破一塊磚塊可以多獲得 3 枚硬幣","upgrades.base_combo.verbose_description":"你的連擊通常在關卡開始時從 1 開始，當你四處彈跳而沒有擊中任何東西時，連擊會重置為 1。使用此技能，連擊初始值會高出 3 點，因此你每擊中一塊磚塊至少能獲得 4 枚硬幣。每當你的連擊重置時，它都會回到 4 點而不是 1 點。你的球會稍微閃爍，以表示它的連擊值高於 1。在第 2 級時，它會增加 4 枚硬幣，然後是 5 枚，然後是 6 枚…","upgrades.bigger_explosions.name":"轟隆爆炸","upgrades.bigger_explosions.tooltip":"更大的爆炸","upgrades.bigger_explosions.verbose_description":"預設爆炸會清除 3x3 的範圍，使用此技能後會變成 5x5 的範圍，對硬幣的打擊力也會顯著增強。每次爆炸後螢幕都會閃爍（基本模式除外）","upgrades.bigger_puck.name":"更大的槳板","upgrades.bigger_puck.tooltip":"輕鬆接住更多硬幣","upgrades.bigger_puck.verbose_description":"較大的槳板使得更容易無法錯過球並接住更多硬幣，而且還可以精確地調整彈跳角度（球的角度僅取決於它擊中槳板的位置）。","upgrades.bricks_attract_ball.name":"磚塊吸引球","upgrades.bricks_attract_ball.tooltip":"球飛向附近的磚塊","upgrades.bricks_attract_ball.verbose_description":"球會朝著它將擊中的前 {{count}} 塊磚塊飛去。等級越高，效果越強。效果停止前可以擊中的磚塊數量也越多。當球擊中槳板時，效果會重新生效。","upgrades.bricks_attract_coins.name":"磚塊吸引硬幣","upgrades.bricks_attract_coins.tooltip":"幫助他們留在那裡","upgrades.bricks_attract_coins.verbose_description":"硬幣會被附近的磚塊吸引。等級越高，吸引力越強。","upgrades.buoy.name":"浮標","upgrades.buoy.tooltip":"硬幣在底線上漂浮 {{duration}} 秒。","upgrades.buoy.verbose_description":"效果在行動模式下最明顯","upgrades.chill.name":"悠閒自在","upgrades.chill.tooltip":"沒有更多升級，無限關卡。","upgrades.chill.verbose_description":"球的加速也會慢很多。","upgrades.clairvoyant.name":"千里眼","upgrades.clairvoyant.tooltip":"看到即將到來的關卡、磚塊生命值和球的方向","upgrades.clairvoyant.verbose_description":"幫助你選擇合適的升級，並且了解堅固磚塊的用途。等級 2 和 3 將帶來關於可疑用途的額外知識（可以在循環模式下獲得）","upgrades.coin_magnet.name":"硬幣磁鐵","upgrades.coin_magnet.tooltip":"槳板吸引硬幣","upgrades.coin_magnet.verbose_description":"將硬幣引導至槳板。如果硬幣已經靠近槳板，效果會更顯著。","upgrades.compound_interest.name":"複利息","upgrades.compound_interest.tooltip":"如果你接住所有硬幣，將獲得更多硬幣","upgrades.compound_interest.verbose_description":"每擊破一塊磚塊，你的連擊次數就會增加一次，產生的硬幣也會越來越多。\\n不過，一定要用你的槳板接住每一枚硬幣，因為任何遺失的硬幣都會重置你的連擊次數。\\n當你的連擊次數超過最低限制時，遊戲區域底部會出現一條紅線，提醒你硬幣不要落在那裡。","upgrades.concave_puck.name":"凹面槳板","upgrades.concave_puck.tooltip":"提高垂直瞄準精準度","upgrades.concave_puck.verbose_description":"關卡開始時球會垂直上升，並以較小的角度反彈。","upgrades.corner_shot.name":"角落射擊","upgrades.corner_shot.tooltip":"讓你的槳板與螢幕邊框重疊","upgrades.corner_shot.verbose_description":"有助於在角落瞄準。更高的等級可以讓你瞄準更遠。","upgrades.double_or_nothing.name":"加倍或歸零","upgrades.double_or_nothing.tooltip":"連擊攀升速度加快 {{multiplier}} 倍，但是每次重置時你將損失 {{percent}}% 的分數。","upgrades.double_or_nothing.verbose_description":"連擊重置只會在你的連擊高於最低連擊數時生效","upgrades.etherealcoins.name":"太空硬幣","upgrades.etherealcoins.tooltip":"硬幣不再受重力影響","upgrades.etherealcoins.verbose_description":"硬幣即使經過多次彈跳仍能保持其速度，不再受到重力的影響。","upgrades.extra_levels.name":"多 5 分鐘","upgrades.extra_levels.tooltip":"遊玩 {{count}} 個關卡而不是 7 個關卡","upgrades.extra_levels.verbose_description":"遊戲預設最多可以進行 7 個關卡，其後遊戲結束。\\n\\n此技能每升一級即可增加一個關卡。最後的幾個關卡通常是最能夠得分的，因此差異可能非常顯著。","upgrades.extra_life.name":"額外生命","upgrades.extra_life.tooltip":"如果最後一個球即將丟失，會將其救回","upgrades.extra_life.verbose_description":"在此過程中，生命值會被消耗。額外的生命值會在槳板後方顯示為白線。","upgrades.forgiving.name":"寬容","upgrades.forgiving.tooltip":"未擊中時保留大部分連擊","upgrades.forgiving.verbose_description":"每個關卡的第一次未擊中是免費的，然後是連擊的 10%，然後是 20%…","upgrades.fountain_toss.name":"噴泉拋擲","upgrades.fountain_toss.tooltip":"當你錯過接住硬幣時獲得連擊。","upgrades.fountain_toss.verbose_description":"當你錯過一枚硬幣並且你的連擊低於等級*30 時，你的連擊有機率增加一等級／連擊。","upgrades.ghost_coins.name":"幽靈硬幣","upgrades.ghost_coins.tooltip":"硬幣緩慢地穿過磚塊","upgrades.ghost_coins.verbose_description":"這不是一個漏洞，而是一個功能！硬幣穿過磚塊時速度很慢。等級越高，硬幣的移動速度越快。","upgrades.golden_goose.name":"金鵝","upgrades.golden_goose.tooltip":"擊中磚塊後，硬幣傳送至球的位置","upgrades.golden_goose.verbose_description":"每當硬幣擊中磚塊時，硬幣都會傳送至最接近的球上。在第二級，硬幣擊中磚塊側面後也會傳送。","upgrades.happy_family.name":"幸福家庭","upgrades.happy_family.tooltip":"如果你將所有球留在遊戲中，將獲得更多硬幣。","upgrades.happy_family.verbose_description":"每次槳板反彈球時，每個額外球的連擊數 +1。掉球後連擊數會重置。只有多於一個球時才能獲得連擊數。","upgrades.helium.name":"氦氣","upgrades.helium.tooltip":"槳板的左右兩側有重力限制","upgrades.helium.verbose_description":"在第 1 級，重力減少。在第 2 級，硬幣緩慢浮起。在第 3 級，硬幣真的會飛起來。","upgrades.hot_start.name":"熱啟動","upgrades.hot_start.tooltip":"如果你在 30 秒內完成關卡，將獲得更多硬幣","upgrades.hot_start.verbose_description":"在每個關卡開始時，你的連擊都會 +{{start}} 點，但是之後每秒鐘都會減少 {{loss}} 點。此效果可以與其他技能疊加。","upgrades.implosions.name":"內爆","upgrades.implosions.tooltip":"爆炸會將硬幣吸入而不是吹出","upgrades.implosions.verbose_description":"爆炸力以另一種方式施加。更高等級的爆炸相當於「更大的爆炸」","upgrades.left_is_lava.name":"避免左側","upgrades.left_is_lava.tooltip":"如果你不觸碰左側，將獲得更多硬幣","upgrades.left_is_lava.verbose_description":"每當你擊破一塊磚塊時，你的連擊就會增加一點，所以你接下來擊破的所有磚塊都會多獲得一枚硬幣。\\n\\n但是，當你的球擊中左側時，你的連擊數就會重置。\\n\\n當你的連擊數增加時，左側會變成紅色，提醒你避免擊中它們。\\n\\n在第 2 級，邊界會被完全移除，你的球和硬幣可能會遺失。","upgrades.limitless.name":"無限","upgrades.limitless.tooltip":"將所有升級的最高等級提高 {{lvl}} 級","upgrades.limitless.verbose_description":"選擇這個技能也會使它自身的限制提高，讓你再次選擇它。","upgrades.metamorphosis.name":"變形","upgrades.metamorphosis.tooltip":"每枚硬幣都可以將 {{lvl}} 塊磚塊染成其顏色","upgrades.metamorphosis.verbose_description":"使用此技能時，硬幣的顏色將與它們來自的磚塊顏色相同，並且將接觸到的第一塊磚塊染成相同的顏色。硬幣產生時的速度和方向與擊破它們磚塊的球的速度相同，這意味著你可以稍微瞄準你想要「塗色」的磚塊的方向。在第 1 級，每枚硬幣可以為 1 塊磚塊上色，之後就會「耗盡」並呈現空心狀態。","upgrades.minefield.name":"地雷區","upgrades.minefield.tooltip":"螢幕上每個炸彈磚塊 +{{percent}}% 的硬幣","upgrades.minefield.verbose_description":"炸彈爆炸時也會被計數。","upgrades.multiball.name":"多個球","upgrades.multiball.tooltip":"每個關卡開始時都有 {{count}} 個球。","upgrades.multiball.verbose_description":"在 Breakout 71 中，只要你丟了球，你就輸了。\\n\\n有了此技能，你會得到兩個球，所以你丟了一個也沒有問題。\\n\\n丟了的球會在下一關重新出現。\\n\\n擁有多個球可以獲得更多技能，當然也能更快通關。","upgrades.nbricks.name":"嚴格的樣本量","upgrades.nbricks.tooltip":"如果你逐一擊破磚塊，將獲得更多硬幣。","upgrades.nbricks.verbose_description":"每次槳板反彈擊中 {{lvl}} 個磚塊以獲得 +{{lvl}} 連擊，否則連擊數會重置。你不一定要擊破這些磚塊，但是你必須擊中它們。爆炸摧毀的磚塊不計算在內。","upgrades.one_more_choice.name":"額外選擇","upgrades.one_more_choice.tooltip":"更多升級選擇","upgrades.one_more_choice.verbose_description":"每個升級選單都會多一個選項。這並不會增加你可以選擇的升級數量。","upgrades.ottawa_treaty.name":"渥太華條約","upgrades.ottawa_treaty.tooltip":"擊破炸彈附近的磚塊可以拆除炸彈","upgrades.ottawa_treaty.verbose_description":"附近的炸彈將會被替換為一個彩色磚塊。如果你有工兵，球將失去工兵效果，直至下次彈跳。一次只能替換一個炸彈。","upgrades.passive_income.name":"被動收入","upgrades.passive_income.tooltip":"更多硬幣，但是移動的槳板接不住球或硬幣","upgrades.passive_income.verbose_description":"+{{lvl}} 連擊 / 磚塊破碎，移動 {{time}}秒後，槳不再重要。某些技能可以幫助球按照你的意願行動，而無需你做任何事情。","upgrades.picky_eater.name":"挑食者","upgrades.picky_eater.tooltip":"如果你逐色擊破磚塊，將獲得更多硬幣","upgrades.picky_eater.verbose_description":"每當你的球擊破一塊與其顏色相同的磚塊時，你的連擊數會增加螢幕上顏色的總數減一。\\n如果擊破的是不同顏色的磚塊時，球會變成新的顏色，但連擊數會重置，除非之前所有與球的顏色相同的磚塊都已擊破。\\n一旦你的連擊數超過最低值，顏色錯誤的磚塊就會出現紅色邊框。\\n如果你有多個球，當其中一個球擊中磚塊時，所有球的顏色都會變更。","upgrades.pierce.name":"穿刺","upgrades.pierce.tooltip":"球在槳板彈起後最多穿刺 {{count}} 塊磚塊","upgrades.pierce.verbose_description":"通常情況下，球一碰到東西就會彈起。有了此技能，它可以穿刺最多 3 塊磚塊而且保持原來的軌跡。\\n\\n之後，它會在碰到第四塊磚塊時彈起，你需要使它碰到槳板以重置計數器。","upgrades.pierce_color.name":"顏色穿刺","upgrades.pierce_color.tooltip":"球穿過相同顏色的磚塊","upgrades.pierce_color.verbose_description":"通常情況下，球會造成 1 點傷害，磚塊則有 1 點生命值（HP）。\\n當球碰到相同顏色的磚塊時，它會暢通無阻地穿過。\\n當球碰到不同顏色的磚塊時，它會將其擊破，變成相同顏色並且彈起。\\n如果磚塊很堅固，球仍然可能會被相同顏色的磚塊彈起。","upgrades.puck_repulse_ball.name":"軟著陸","upgrades.puck_repulse_ball.tooltip":"槳板排斥球","upgrades.puck_repulse_ball.verbose_description":"當球靠近槳板時，它會開始減速，甚至可能在不碰到槳板的情況下彈起。","upgrades.rainbow.name":"彩虹","upgrades.rainbow.tooltip":"硬幣呈現彩虹色。","upgrades.rainbow.verbose_description":"每個關卡都會增加彩色硬幣的比例。顏色取決於關卡時間。","upgrades.reach.name":"自上而下","upgrades.reach.tooltip":"如果你避開最下面一排的磚塊，將獲得更多硬幣","upgrades.reach.verbose_description":"碰到最底排的 N 塊磚塊會重置連擊數。否則，+N 連擊。\\n\\n如果只有一排磚塊，或最底排的磚塊覆蓋了整個遊戲寬度，則此技能無效。否則，擊破最底排的磚塊會重置連擊數，而擊破其他任何磚塊都會使連擊數增加，增加的連擊數等於最底排的磚塊數量。\\n\\n最底排的磚塊會以紅色突出顯示。","upgrades.respawn.name":"重生","upgrades.respawn.tooltip":"{{percent}}% 的磚塊在 {{delay}} 秒後重新產生。","upgrades.respawn.verbose_description":"一些粒子效果會讓你知道磚塊會出現在哪裡。","upgrades.right_is_lava.name":"避免右側","upgrades.right_is_lava.tooltip":"如果你不觸碰右側，將獲得更多硬幣","upgrades.right_is_lava.verbose_description":"每當你擊破一塊磚塊，你的連擊數就會增加一，之後每擊破一塊磚塊，你就能多獲得一枚硬幣。\\n\\n但是，一旦你的球擊中右側邊緣，連擊數就會重置。\\n\\n隨著連擊數的增加，右側邊緣會變成紅色，提醒你避免擊中它們。\\n\\n在等級 2，邊框會完全消失，你的球和硬幣可能會遺失。","upgrades.sacrifice.name":"犧牲","upgrades.sacrifice.tooltip":"失去一條生命以清除所有磚塊","upgrades.sacrifice.verbose_description":"在第 2 級以上時，通關前的連擊數也會乘以技能等級。這樣連擊數可能會相當高。","upgrades.sapper.name":"工兵","upgrades.sapper.tooltip":"第一塊擊破的磚塊變成炸彈。","upgrades.sapper.verbose_description":"你擊破的第一塊磚塊不會直接消失，而是會被替換成一塊炸彈磚塊。將球彈到槳板上即可重新啟動此效果。升級此技能後，你可以放置更多炸彈。","upgrades.shocks.name":"衝擊","upgrades.shocks.tooltip":"球爆炸性碰撞","upgrades.shocks.verbose_description":"每當兩球相撞時，它們就會交換速度，產生爆炸，並且獲得額外的速度以將它們分開。","upgrades.shunt.name":"分流","upgrades.shunt.tooltip":"在關卡之間保持 {{percent}}% 的連擊","upgrades.shunt.verbose_description":"如果你還有熱啟動，熱啟動就會加入至目前連擊中","upgrades.side_flip.name":"右撇子","upgrades.side_flip.tooltip":"如果你只從右邊擊中磚塊，將獲得更多硬幣","upgrades.side_flip.verbose_description":"每從右側擊破一塊磚塊，+{{lvl}} 連擊，否則 -{{loss}} 連擊。擊打磚塊右側可獲得 1 連擊，但避免擊打左側，因為左側會減少 2 連擊。從頂部和底部擊打均無效。","upgrades.side_kick.name":"左撇子","upgrades.side_kick.tooltip":"如果你只從左邊擊中磚塊，將獲得更多硬幣","upgrades.side_kick.verbose_description":"每從左側擊破一塊磚塊，+{{lvl}} 連擊，否則 -{{loss}} 連擊。擊打磚塊左側可獲得 1 連擊，但避免擊打右側，因為右側會減少 2 連擊。從頂部和底部擊打均無效。","upgrades.skip_last.name":"輕鬆清理","upgrades.skip_last.tooltip":"最後一塊磚塊將會自毀","upgrades.skip_last.verbose_description":"你需要擊破所有磚塊才能進入下一關。然而，擊破最後幾塊磚塊可能並不容易。\\n此技能每提升一級，自爆磚塊的數量就會增加。\\n提前通關可以帶來更多升級選擇。從不錯過任何一塊磚塊也大有裨益。\\n\\n因此，如果你覺得擊破最後幾塊磚塊很困難，不妨多獲得幾次此技能以獲得幫助。","upgrades.slow_down.name":"慢速球","upgrades.slow_down.tooltip":"球移動得更慢","upgrades.slow_down.verbose_description":"遊戲開始時，球的速度相對較慢，但是隨著遊戲進程的推進，球的速度會逐漸加快。\\n\\n如果在一個關卡停留的時間太長，球的速度也會進逐漸加快。\\n\\n此技能讓遊戲更容易上手。\\n\\n你可以在選單中啟用兒童模式，每次遊戲開始時都會獲得此技能。","upgrades.smaller_puck.name":"小型槳板","upgrades.smaller_puck.tooltip":"{{percent}}% 更多硬幣","upgrades.smaller_puck.verbose_description":"這會使槳板變小，理論上會讓一些角落擊球更容易，但是實際上只會增加難度。\\n\\n所以你還能獲得硬幣產生率提升 50% 的額外獎勵。","upgrades.soft_reset.name":"軟重置","upgrades.soft_reset.tooltip":"連擊重置時保留 {{percent}}%","upgrades.soft_reset.verbose_description":"限制連擊重置的影響。","upgrades.steering.name":"轉向","upgrades.steering.tooltip":"槳板移動時球也會轉向","upgrades.steering.verbose_description":"槳板位置的改變會直接影響球的移動方向。在第 2 級或以上，螢幕上會出現一條線顯示球的移動方向。","upgrades.sticky_coins.name":"黏性硬幣","upgrades.sticky_coins.tooltip":"硬幣黏在相同顏色的磚塊上","upgrades.sticky_coins.verbose_description":"在等級 2，它們會黏在任何顏色的磚塊","upgrades.streak_shots.name":"連續擊中","upgrades.streak_shots.tooltip":"如果你一次擊破很多磚塊，將獲得更多硬幣","upgrades.streak_shots.verbose_description":"每次擊破磚塊，連擊數都會增加 1。\\n\\n但是，一旦球碰到槳板，連擊數就會重置為預設值。\\n\\n當連擊數超過基礎值時，槳板會出現紅色邊框，提醒你球碰到槳板會重置連擊數。","upgrades.sturdy_bricks.name":"堅固的磚塊","upgrades.sturdy_bricks.tooltip":"+{{lvl}} 磚塊生命值，+{{percent}}% 硬幣","upgrades.sturdy_bricks.verbose_description":"此技能每提升一級都會為所有磚塊增加 1 點生命值。你可以使用「透視」技能來查看磚塊生命值。 「穿透」技能可以提升球的傷害。此技能每提升一級也會增加 50% 的硬幣產生量。","upgrades.superhot.name":"超級熱","upgrades.superhot.tooltip":"當槳板移動時時間才會流動。","upgrades.superhot.verbose_description":"超級熱 超級熱 超級熱 超級熱","upgrades.telekinesis.name":"念力","upgrades.telekinesis.tooltip":"槳板的位置會影響球","upgrades.telekinesis.verbose_description":"在球上升的過程中，你可以控制它。當球位於螢幕下半部時，效果更明顯。","upgrades.three_cushion.name":"三邊不要碰","upgrades.three_cushion.tooltip":"如果你只是間接地擊中磚塊，將獲得更多硬幣","upgrades.three_cushion.verbose_description":"每次擊打側面和頂部可獲得 +1 連擊，每次彈起板子最多可獲得 +{{max}} 連擊。\\n每次擊打側面可使連擊增加 1，最多可獲得 +3。\\n之後，直到下一次彈起板子時才會獲得連擊。\\n\\n如果擊打磚塊時沒有先彈起，連擊將會重置。","upgrades.top_is_lava.name":"天空是限制","upgrades.top_is_lava.tooltip":"如果你避免擊中頂部，將獲得更多硬幣","upgrades.top_is_lava.verbose_description":"每次擊破磚塊，連擊數都會增加 1。但是，一旦球碰到螢幕頂部，連擊數就會重置。\\n\\n當連擊數超過最低值時，螢幕頂部會出現一個紅色條，提醒你避免碰到它。\\n\\n在第 2 級，邊框會完全消失，你的球和硬幣可能會丟失。","upgrades.trampoline.name":"彈跳床","upgrades.trampoline.tooltip":"如果你只在磚塊和槳板上彈跳，將獲得更多硬幣","upgrades.trampoline.verbose_description":"每次彈跳球拍 +{{lvl}} 連擊，每次彈跳任意邊界球拍 -{{lvl}} 連擊。罕見的連擊升級之一，無需重置條件","upgrades.transparency.name":"透明度","upgrades.transparency.tooltip":"+50% 硬幣。球在螢幕上方是隱形的。","upgrades.transparency.verbose_description":"螢幕頂部的球會變得透明。\\n+{{percent}} % 金幣。\\n等級越高，球越快變得透明，積分獎勵也越高。","upgrades.trickledown.name":"涓流而下","upgrades.trickledown.tooltip":"硬幣出現在螢幕頂部。","upgrades.trickledown.verbose_description":"如果頂排有磚塊，硬幣可能會落在頂排磚塊上，當你擊破頂排磚塊時，硬幣就會掉下來。","upgrades.unbounded.name":"特殊空間","upgrades.unbounded.tooltip":"在關卡增加了左右兩側的空間，但是你的槳板無法到達那麼遠的 meOver.unlocked_perk":"Melhoria desbloqueada","gameOver.unlocked_perk_plural":"Você acabou de desbloquear {{count}} vantagens","gameOver.win.summary":"Este jogo acabou. Você acumulou {{score}} moedas no total.","gameOver.win.title":"Você completou este jogo","help.content":"## Objetivo\\n\\nPegue quantas moedas possíveis em 7 níveis. \\nMoedas aparecem quando você quebra os blocos.\\nPegue-as para aumentar sua pontuação.\\nSua pontuação está localizada no canto superior direito da tela.\\nNão derrube a bola ou é fim de jogo.\\n\\nDepois de destruir todos os blocos, você poderá escolher uma melhoria.\\n\\n## Melhorias\\n\\nAs melhorias escolhidas serão aplicadas até o fim da partida. \\nAlgumas podem ser escolhidas múltiplas vezes para um efeito mais forte.\\nAlgumas ajudam com a mira, ou fazem o jogo mais fácil de alguma maneira. \\nAlgumas são úteis apenas quando combinadas com outras.\\n\\nVocê sempre receberá uma melhoria no início de cada partida. \\nSeu ícone servirá como os blocos do primeiro nível. \\nVocê pode escolher melhorias iniciais nas configurações.\\n\\nVárias melhorias farão impacto no seu combo. \\n\\n## Combo\\n\\nSeu \\"combo\\" é o número de moedas que aparecerão quando um bloco for quebrado. \\nSerá mostrado na sua raquete, por exemplo, \uD83E\uDE994 significa que cada bloco irá dar 4 moedas. \\nA maioria das melhorias que adicionam combo irão ter uma condição para reiniciá-lo. \\nO combo também irá reiniciar se a bola acertar a raquete sem acertar nenhum bloco.\\nUma mensagem de \\"errou\\" aparecerá quando isso acontecer. \\n\\nSempre tente mirar nos blocos. \\n\\n## Mira\\n\\nApenas a posição da bola contra a raquete decide como ela irá quicar.\\nSe a bola acertar o centro da raquete, irá quicar verticalmente. \\nSe você a quicar no canto, terá mais ângulo. \\nA velocidade da raquete e o ângulo de entrada não dão impacto na direção da bola depois de quicar.\\n\\nVárias melhorias que ajudam com a mira podem ser desbloqueados.\\n\\n## Desbloqueáveis\\n\\nAo jogar Breakout 71 pela primeira vez, a maioria das melhorias e níveis estarão bloqueados. \\nMelhorias são desbloqueáveis por simplesmente jogar e pegar muitas moedas. \\nOs primeiros níveis são dedbloqueáveis quando alcançado uma pontuação alta.\\nFases avançadas adicionam uma condição sobre quais desbloqueáveis você pode escolher.\\n\\nAlcançar pontuações altas é mais fácil quando você pega múltiplas melhorias por níveis graças às medalhas. \\n\\n## Medalhas\\n\\nVocê receberá escolhas extras de melhorias quando:\\n\\n- O nível for rapidamente concluído\\n- Todas as moedas foram pegas\\n- Sempre acertar no mínimo um bloco entre quicadas","help.help":"Saiba mais sobre o jogo","help.levels":"Níveis","help.title":"Ajuda","help.upgrades":"## Melhorias","history.columns.score":"Pontuação","history.columns.started":"Data","history.help":"Veja seus {{count}} melhores jogos.","history.include_past_versions":"Mostrar versões anteriores também","history.locked":"Jogue pelo menos dez jogos para desbloquear","history.title":"Histórico de partidas","lab.help":"Tente qualquer combinação que você quiser.","lab.instructions":"Selecione melhorias e um nível, em seguida, aperte no botão de jogar acima.","lab.menu_entry":"Modo criativo","lab.play":"Jogar","lab.reset":"Reiniciar","lab.select_level":"Escolha um nível para jogar","lab.unlocks_at":"Desbloqueia na pontuação total de {{score}}","level_up.challenges.catchRateGood.description":"Pegue {{gold}}% de moedas para ouro, {{silver}}% para prata.","level_up.challenges.catchRateGood.name":"{{caught}} moedas pegas de {{total}}","level_up.challenges.earned_medal":"Você ganhou uma medalha","level_up.challenges.earned_medal_plural":"Você ganhou {{count}} medalhas","level_up.challenges.gain":"+{{choices}} escolhas e +{{up}} melhorias","level_up.challenges.levelMisses.description":"Você terá uma medalha de ouro se perder menos de {{gold}} vezes, prata se for {{silver}}.","level_up.challenges.levelMisses.name":"{{value}} arre e desempenho aplicada!","settings.suggestions.basic_mode":"Sugestão: ligue o modo básico para melhorar o desempenho.","settings.suggestions.record":"Sugestão: Desative a gravação de vídeo para melhorar o desempenho.","settings.suggestions.reduce_brightness":"Sugestão: reduza o tamanho do espaço escuro para melhorar o desempenho.","settings.suggestions.reduce_coins":"Sugestão: melhorar o desempenho, limitando o máximo de moedas na tela para {{max}}.","settings.suggestions.simpler_lights":"Sugestão: simplificar os cálculos da luz para melhorar o desempenho.","settings.touch_delayed_start":"Início atrasado no celular","settings.touch_delayed_start_help":"3, 2, 1, Vai no início de um nível","starting_perks.checked":"Quando você começar um novo jogo, uma dessas vantagens será dada a você. Clique em uma vantagem para excluí-la.","starting_perks.help":"Escolha possíveis melhorias iniciais","starting_perks.random":"Todos os benefícios foram removidos, a escolha será aleatória.","starting_perks.title":"Vantagens iniciais","starting_perks.unchecked":"As vantagens abaixo não são oferecidas como vantagens iniciais, mas você pode clicar para adicioná-las à seleção.","unlocks.category.advanced":"# Melhorias avançadas\\n\\nEssas normalmente não são muito úteis por si só, mas podem se tornar muito poderosas quando combinadas com a combinação certa.","unlocks.category.beginner":"## Melhorias amigáveis para iniciantes\\n\\nEssas atualizações são muito úteis para iniciantes, eles ajudam você a jogar por mais tempo e errar menos.","unlocks.category.combo":"## Melhorias para combos\\n\\nEssas melhorias ajudam a aumentar seu combo progressivamente, mas também adicionar uma condição que reinicia-o. Escolher um é uma boa ideia, escolher vários aumenta o risco e a recompensa.","unlocks.category.combo_boost":"## Impulsionadores de combos\\n\\nEssas melhorias aumentam o multiplicador de combo ou o combo sem adicionar uma condição que o reinicia.","unlocks.category.simple":"## Melhorias de ajuda\\n\\nEssas melhorias são úteis em quase todas as combinações de melhorias.","unlocks.greyed_out_help":"As atualizações acinzentadas podem ser desbloqueadas aumentando sua pontuação total. A pontuação total aumenta cada vez que você pontuar no jogo.","unlocks.intro":"Sua pontuação total é {{ts}}. Clique em uma melhoria abaixo para iniciar um jogo com ela.","unlocks.just_unlocked":"Nível desbloqueado","unlocks.just_unlocked_plural":"Você acabou de desbloquear {{count}} níveis","unlocks.level":"Você desbloqueou {{unlocked}} de {{out_of}} níveis","unlocks.level_description":"Um nível {{size}}x{{size}} com {{bricks}} blocos, {{colors}} cores e {{bombs}} bombas.","unlocks.levels":"Níveis desbloqueados","unlocks.minScore":"Alcance ${{minScore}} em uma partida para desbloquear.","unlocks.minScoreWithPerks":"Alcance ${{minScore}} pontos em uma corrida com {{required}}, mas sem {{forbidden}} para desbloquear.","unlocks.minScoreWithPerksNoForbidden":"Alcance ${{minScore}} pontos em uma corrida com {{required}} para desbloquear.","unlocks.minTotalScore":"Acumule um total de ${{score}} pontos","unlocks.reached":"Sua melhor pontuação foi {{reached}}.","unlocks.title_upgrades":"{{unlocked}} melhorias de {{out_of}} desbloqueadas","unlocks.try":"Testar","unlocks.upgrades":"Melhorias desbloqueadas","unlocks.use":"Usar","upgrades.addiction.name":"Vício","upgrades.addiction.tooltip":"Mais moedas se você quebrar blocos sem pausas","upgrades.addiction.verbose_description":"+{{lvl}} combo por bloco quebrado, combo reinicia {{delay}} segundos após quebrar um bloco. A contagem regressiva só começa depois de quebrar o primeiro bloco de cada nível. Irá parar assim que todos os blocos forem destruídos.","upgrades.asceticism.name":"Ascetismo","upgrades.asceticism.tooltip":"+{{combo}} de combo por bloco quebrado, -{{combo}} por moedas coletadas.","upgrades.asceticism.verbose_description":"Você vai precisar guardar as moedas em algum lugar enquanto o combo sobe.","upgrades.ball_attract_ball.name":"Gravidade","upgrades.ball_attract_ball.tooltip":"Bolas atraem bolas","upgrades.ball_attract_ball.verbose_description":"As bolas que estão a mais de \\"3/4 da largura da área do jogo\\" de distância começarão a atrair uma à outra.\\n\\nA força da atração é mais forte quando estão longe uma da outra.\\n\\nPartículas de arco-íris voarão para simbolizar a força da atração. Esta vantagem só é oferecida se você tem mais de uma bola.","upgrades.ball_attracts_coins.name":"Bolas atraem moedas","upgrades.ball_attracts_coins.tooltip":"Moedas seguem a bola mais próxima","upgrades.ball_attracts_coins.verbose_description":"Isso poderia ser usado para \\"pintar ao redor\\" as bolas com moedas, se você combinar com \\"manchar\\" e \\"moedas fantasmas\\". Também funciona como um substituto para o ímã de moeda.","upgrades.ball_repulse_ball.name":"Espaço pessoal","upgrades.ball_repulse_ball.tooltip":"Bolas repelem bolas","upgrades.ball_repulse_ball.verbose_description":"As bolas que estão a menos de um quarto da largura da tela vão começar a se repelir. A força de repulsão é mais forte se elas estão perto umas das outras. Partículas serão lançadas para simbolizar a aplicação desta força. Esta vantagem só é oferecida se você tem mais de uma bola.","upgrades.base_combo.name":"Fundações fortes","upgrades.base_combo.tooltip":"Mais 3 moedas por bloco quebrado","upgrades.base_combo.verbose_description":"Seu combo começa normalmente em 1 no início do nível, e reinicia para 1 se você não acertar nada. Com esta vantagem, o combo começa com 3 pontos a mais, então você sempre terá pelo menos 4 moedas por bloco. Sempre que seu combo reiniciar, ele vai voltar para 4 e não 1. Sua bola vai brilhar um pouco para indicar que seu combo é maior que 1. No nível 2, adiciona mais 4 moedas, então 5, depois 6…","upgrades.bigger_explosions.name":"Cabum","upgrades.bigger_explosions.tooltip":"Explosões maiores","upgrades.bigger_explosions.verbose_description":"A explosão normal limpa uma área de 3x3, com isto se torna um área de 5x5, e a propulsão nas moedas também é significativamente maior. A tela piscará após cada explosão (exceto no modo básico)","upgrades.bigger_puck.name":"Raquete maior","upgrades.bigger_puck.tooltip":"Pegue moedas mais facilmente","upgrades.bigger_puck.verbose_description":"Uma raquete maior torna mais fácil nunca perder a bola e pegar mais moedas, e também para mirar mais precisamente (o ângulo da bola só depende de onde ela atinge a raquete).","upgrades.bricks_attract_ball.name":"Blocos atraem bolas","upgrades.bricks_attract_ball.tooltip":"A bola se dirige para os {{count}} blocos mais próximos","upgrades.bricks_attract_ball.verbose_description":"A bola vai em direção aos primeiros {{count}} blocos que atingir. O efeito é mais forte em níveis mais avançados. O número de blocos que podem ser atingidos antes que o efeito pare também é maior. O efeito é reativado quando a bola atinge a raquete.","upgrades.bricks_attract_coins.name":"Blocos atraem moedas","upgrades.bricks_attract_coins.tooltip":"Mantêm elas lá em cima","upgrades.bricks_attract_coins.verbose_description":"Moedas serão atraídas para blocos próximos. Em níveis posteriores, a atração é mais forte.","upgrades.buoy.name":"Boia","upgrades.buoy.tooltip":"Moedas flutuam por {{duration}} segundos na linha inferior.","upgrades.buoy.verbose_description":"O efeito é mais visível no modo para celular","upgrades.chill.name":"Calma","upgrades.chill.tooltip":"Não há mais melhorias, níveis ilimitados.","upgrades.chill.verbose_description":"A bola também acelera muito mais devagar.","upgrades.clairvoyant.name":"Clarividência","upgrades.clairvoyant.tooltip":"Veja os próximos níveis, HP dos blocos e direção da bola","upgrades.clairvoyant.verbose_description":"Te ajuda a escolher as melhores atualizações e entender a vida restante dos blocos resistentes. Níveis 2 e 3 trazem conhecimentos adicionais de uso duvidoso (acessível no modo loop)","upgrades.coin_magnet.name":"Imã de moedas","upgrades.coin_magnet.tooltip":"A raquete atrai moedas","upgrades.coin_magnet.verbose_description":"Direciona as moedas para a raquete. O efeito é mais forte se a moeda já estiver perto.","upgrades.compound_interest.name":"Juros compostos","upgrades.compound_interest.tooltip":"Mais moedas se você pegar todas as moedas","upgrades.compound_interest.verbose_description":"Seu combo vai crescer por um a cada vez que você quebrar um bloco, gerando mais e mais moedas a cada bloco que você quebrar.\\nCertifique-se de pegar cada uma dessas moedas com sua raquete, pois qualquer moeda perdida irá reiniciar seu combo.\\nUma vez que seu combo estiver acima do mínimo, o fundo da área de jogo terá uma linha vermelha para lembrar que as moedas não devem cair lá.","upgrades.concave_puck.name":"Raquete côncava","upgrades.concave_puck.tooltip":"Melhora a precisão vertical","upgrades.concave_puck.verbose_description":"As bolas começam o nível indo direto para cima, e quicam com menos ângulo.","upgrades.corner_shot.name":"Escanteio","upgrades.corner_shot.tooltip":"Permite que a raquete adentre nas bordas da tela","upgrades.corner_shot.verbose_description":"Ajuda com a mira nos cantos. Mais níveis permitem que você entre mais profundamente.","upgrades.double_or_nothing.name":"Tudo ou nada","upgrades.double_or_nothing.tooltip":"Combo sobe {{multiplier}} vezes mais rápido, mas você vai perder {{percent}}% de sua pontuação a cada reinício.","upgrades.double_or_nothing.verbose_description":"O reinício do combo só conta quando sua combinação estiver acima do mínimo","upgrades.etherealcoins.name":"Moedas, no Espaço","upgrades.etherealcoins.tooltip":"As moedas não são mais afetadas pela gravidade","upgrades.etherealcoins.verbose_description":"As moedas manterão sua velocidade mesmo após rebater várias vezes, e não serão mais afetadas pela gravidade.","upgrades.extra_levels.name":"Só mais 5 minutinhos","upgrades.extra_levels.tooltip":"Jogue {{count}} níveis ao invés de 7","upgrades.extra_levels.verbose_description":"O jogo padrão pode durar um máximo de 7 níveis, após isso o jogo está termina.\\n\\nCada nível desta vantagem permite que você jogue mais uma fase. Os últimos níveis são muitas vezes aqueles onde você faz mais pontuação, então a diferença pode ser dramática.","upgrades.extra_life.name":"Vida extra","upgrades.extra_life.tooltip":"Salva sua última bola se estiver prestes a cair","upgrades.extra_life.verbose_description":"A vida será consumida no processo. Vidas extras aparecem como linhas atrás da raquete.","upgrades.forgiving.name":"Errar é humano","upgrades.forgiving.tooltip":"Mantenha a maior parte de sua combinação quando errar","upgrades.forgiving.verbose_description":"A primeira falta por nível é livre, daí reduz 10% do combo, então 20%, e por aí vai.","upgrades.fountain_toss.name":"Fonte dos desejos","upgrades.fountain_toss.tooltip":"Ganhe combo quando perder algumas moedas.","upgrades.fountain_toss.verbose_description":"Quando você perder uma moeda e seu combo estiver abaixo do nível*30, seu nível/combo pode crescer por um.","upgrades.ghost_coins.name":"Moedas fantasma","upgrades.ghost_coins.tooltip":"Moedas passam lentamente através de blocos","upgrades.ghost_coins.verbose_description":"Não é um bug, é uma função! As moedas atravessam os blocos lentamente. Níveis mais avançados permitem que elas afundem mais rápido.","upgrades.golden_goose.name":"Gansa dourada","upgrades.golden_goose.tooltip":"Moedas se teletransportam para a bola depois de tocar em um bloco","upgrades.golden_goose.verbose_description":"Sempre que uma moeda tocar em um bloco, essa moeda se teletransportará para a bola mais próxima. No nível dois, as moedas teletransportam-se depois de bater nos lados também.","upgrades.happy_family.name":"Família feliz","upgrades.happy_family.tooltip":"Mais moedas se você manter todas as bolas na partida.","upgrades.happy_family.verbose_description":"+1 combo por bola extra quicada na raquete. Combo reinicia quando uma bola é perdida. Só a bola acima de 1 dá combinação.","upgrades.helium.name":"Hélio","upgrades.helium.tooltip":"Gravidade limitada nos lados da raquete","upgrades.helium.verbose_description":"No nível 1, a gravidade é reduzida. No nível 2, as moedas flutuam lentamente. No nível 3 elas realmente voam.","upgrades.hot_start.name":"Arrancada","upgrades.hot_start.tooltip":"Mais moedas se você vencer o nível antes de 30 segundos","upgrades.hot_start.verbose_description":"No início de cada nível, seu combo vai começar com +{{start}} pontos, mas então cada segundo será diminuído por {{loss}}. O efeito se empilha com outras vantagens.","upgrades.implosions.name":"Implosões","upgrades.implosions.tooltip":"Explosões sugam moedas ao invés de propulsioná-las","upgrades.implosions.verbose_description":"A força de explosão é aplicada do outro modo. Mais níveis atuam como uma \\"explosão maior\\"","upgrades.left_is_lava.name":"Evite o lado esquerdo","upgrades.left_is_lava.tooltip":"Mais moedas se você não tocar no lado esquerdo","upgrades.left_is_lava.verbose_description":"Sempre que você quebrar um bloco, seu combo vai aumentar por um, então você vai ter mais uma moeda de todos os blocos que você quebrar.\\n\\nNo entanto, seu combo irá reiniciar assim que sua bola atingir o lado esquerdo.\\n\\nQuando seu combo aumenta, o lado esquerdo fica vermelho para lembrar que você deve o evitar\\n\\nNo nível 2, a borda é completamente removida e suas bolas e moedas podem ser perdidas.","upgrades.limitless.name":"Sem limites","upgrades.limitless.tooltip":"Aumentar o nível máximo de todas as melhorias por {{lvl}}","upgrades.limitless.verbose_description":"Escolher esta vantagem também aumenta seu próprio limite por um, deixando-a escolher novamente.","upgrades.metamorphosis.name":"Metamorfose","upgrades.metamorphosis.tooltip":"Cada moeda pode manchar {{lvl}} bloco(s) com sua cor","upgrades.metamorphosis.verbose_description":"Com este vantagem, as moedas serão da cor do bloco de origem, e irão colorir o primeiro bloco que tocarem. Moedas surgem com a mesma velocidade da bola que as invocou, o que significa que você pode mirar nos blocos que você quer \\"pintar\\". No nível 1, cada moeda pode colorir 1 bloco antes de serem \\"gastas\\" e aparecerem ocas.","upgrades.minefield.name":"Campo Minado","upgrades.minefield.tooltip":"+{{percent}}% de moedas por bombas na tela","upgrades.minefield.verbose_description":"As bombas são contadas enquanto estão explodindo também.","upgrades.multiball.name":"Multi bolas","upgrades.multiball.tooltip":"Comece cada nível com {{count}} bolas.","upgrades.multiball.verbose_description":"Assim que você largar a bola no Breakout 71, você perde.\\n\\nCom esta vantagem, você tem duas bolas, e assim você pode se dar ao luxo de perder uma.\\n\\nAs bolas perdidas voltam no próximo nível.\\n\\nTer mais de uma bola torna outras vantagens disponíveis, e é claro, limpa o nível mais rápido.","upgrades.nbricks.name":"Amostragem","upgrades.nbricks.tooltip":"Mais moedas se você bater em blocos um por um.","upgrades.nbricks.verbose_description":"Bata em exatamente {{lvl}} blocos por quicada para ganhar +{{lvl}} combo, caso contrário, ele reinicia. Você não precisa necessariamente destruir esses blocos, mas você precisa bater neles. Blocos destruídos por explosões não contam.","upgrades.one_more_choice.name":"Escolha extra","upgrades.one_more_choice.tooltip":"Mais opções de melhorias","upgrades.one_more_choice.verbose_description":"Cada menu de melhorias terá mais uma opção. Não aumenta o número de melhorias que você pode escolher.","upgrades.ottawa_treaty.name":"Tratado de Ottawa","upgrades.ottawa_treaty.tooltip":"Quebrar um bloco perto de uma bomba a desarma","upgrades.ottawa_treaty.verbose_description":"A bomba próxima será substituída por um bloco colorido. Se você tiver sapador, a bola perderá seu efeito até a próxima rebatida. Só uma bomba pode ser substituída por vez.","upgrades.passive_income.name":"Renda passiva","upgrades.passive_income.tooltip":"Mais moedas porém uma raquete que se move não pega moedas ou bolas","upgrades.passive_income.verbose_description":"+{{lvl}} de combo por bloco quebrado, a raquete é imaterial por {{time}} segundos depois de se mover. Algumas vantagens podem fazem as bolas se moverem sem alguma interação sua.","upgrades.picky_eater.name":"Chato para comer","upgrades.picky_eater.tooltip":"Mais moedas se você quebrar blocos da cor da bola","upgrades.picky_eater.verbose_description":"Sempre que você quebrar um bloco com a mesma cor que sua bola, seu combo aumenta pelo número de cores na tela menos uma.\\nSe for uma cor diferente, a bola fica com a nova cor, mas o combo reinicia, a menos que não haja blocos da cor da bola.\\nUma vez que você obter um combo superior ao seu mínimo, os blocos de cor diferente obterão uma borda vermelha.\\nSe você tem mais de uma bola, todos eles mudarão de cor sempre que uma delas atingir um bloco.","upgrades.pierce.name":"Bola perfurante","upgrades.pierce.tooltip":"Bola perfura {{count}} blocos depois de quicar na raquete","upgrades.pierce.verbose_description":"A bola normalmente quica assim que bate em algo. Com esta vantagem, ela continuará sua trajetória até quebrar 3 blocos.\\n\\nDepois disso, ela vai quicar no 4º bloco, e você precisa rebater com a raquete para redefinir o contador.","upgrades.pierce_color.name":"Cor perfurante","upgrades.pierce_color.tooltip":"A bola atravessa blocos da mesma cor","upgrades.pierce_color.verbose_description":"Normalmente, as bolas dão 1 de dano e blocos têm 1 ponto de vida (HP).\\nSempre que uma bola atingir um bloco da mesma cor, ele só irá atravessá-lo.\\nUma vez que atingir um bloco de cor diferente, ela vai quebrar o bloco, adquirir sua cor e rebater.\\nSe você tiver blocos resistentes, a bola poderá rebater mesmo sendo da mesma cor.","upgrades.puck_repulse_ball.name":"Aterrissagem macia","upgrades.puck_repulse_ball.tooltip":"Raquete repele bolas","upgrades.puck_repulse_ball.verbose_description":"Quando uma bola chegar perto da raquete, ela irá começar a desacelerar, e até mesmo potencialmente quicar sem encostar na raquete.","upgrades.rainbow.name":"Arco-íris","upgrades.rainbow.tooltip":"Moedas surgem com cor arco-íris.","upgrades.rainbow.verbose_description":"Cada nível aumenta a proporção de moedas coloridas. A cor depende do tempo de nível.","upgrades.reach.name":"De cima para baixo","upgrades.reach.tooltip":"Mais moedas se você evitar a linha mais baixa de blocos","upgrades.reach.verbose_description":"Tocar os N blocos da linha mais baixa reinicia o combo. Caso contrário, combo +N.\\n\\nSe houver apenas uma linha de blocos, ou se a linha mais baixa de blocos cobrir toda a largura do jogo, então esta melhoria não faz nada. Caso contrário, quebrar a linha mais baixa reinicia o combo, ao quebrar qualquer outra coisa aumenta o combo pelo número de blocos presentes na linha mais baixa.\\n\\nA linha mais baixa será destacada em vermelho.","upgrades.respawn.name":"Reaparecimento","upgrades.respawn.tooltip":"{{percent}}% dos blocos reaparecem após {{delay}} segundos.","upgrades.respawn.verbose_description":"Um efeito de partícula irá mostrá-lo onde os blocos aparecerão.","upgrades.right_is_lava.name":"Evite o lado direito","upgrades.right_is_lava.tooltip":"Mais moedas se você não tocar no lado direito","upgrades.right_is_lava.verbose_description":"Sempre que você quebrar um bloco, seu combo vai aumentar por um, então você vai ter mais uma moeda para todos os próximos blocos que você quebrar.\\n\\nNo entanto, seu combo irá reiniciar assim que sua bola tocar no lado direito.\\n\\nAssim que seu combo aumentar, o lado direito vai ficar vermelho para lembrá-lo de que você deve evitar tocar nele.\\n\\nNo nível 2, a borda é completamente removida e suas bolas e moedas podem se perder.","upgrades.sacrifice.name":"Sacrifício","upgrades.sacrifice.tooltip":"Perder uma vida elimina todos os blocos","upgrades.sacrifice.verbose_description":"No nível 2+, o combo também é multiplicada pelo nível da vantagem antes de limpar o nível. Isto pode aumentar bastante o combo.","upgrades.sapper.name":"Sapador","upgrades.sapper.tooltip":"O primeiro bloco quebrado vira uma bomba.","upgrades.sapper.verbose_description":"Em vez de apenas desaparecer, o primeiro bloco que você quebrar será substituído por um bloco-bomba. Quicar a bola na raquete recarrega o efeito. Aumentar o nível desta vantagem permitirá que você coloque mais bombas.","upgrades.shocks.name":"Choques","upgrades.shocks.tooltip":"Colisões explosivas de bolas","upgrades.shocks.verbose_description":"Sempre que duas bolas colidem, trocam de velocidade entre si, geram uma explosão, e ganham velocidade adicional para se separarem.","upgrades.shunt.name":"Derivação","upgrades.shunt.tooltip":"Mantenha {{percent}}% do seu combo entre níveis","upgrades.shunt.verbose_description":"Se você também tiver arrancada, o início quente é apenas adicionado à combinação atual","upgrades.side_flip.name":"Destro","upgrades.side_flip.tooltip":"Mais moedas se você só acertar os blocos do lado direito","upgrades.side_flip.verbose_description":"+{{lvl}} combo por bloco quebrado pela direita, caso contrário, -{{loss}}. Acerte o lado direito do bloco para ganhar um combo, mas evite acertar do lado esquerdo, pois irá remover 2 do seu combo. Acertar de cima ou de baixo não surte efeito.","upgrades.side_kick.name":"Canhoto","upgrades.side_kick.tooltip":"Mais moedas se você só acertar blocos do lado esquerdo","upgrades.side_kick.verbose_description":"+{{lvl}} combo por bloco quebrado pela esquerda, caso contrário, -{{loss}}. Acerte o lado esquerdo do bloco para ganhar um combo, mas evite acertar do lado direito, pois irá remover 2 do seu combo. Acertar de cima ou de baixo não surte efeito.","upgrades.skip_last.name":"Limpeza fácil","upgrades.skip_last.tooltip":"O último bloco se autodestruirá","upgrades.skip_last.verbose_description":"Você precisa quebrar todos os blocos para ir para o próximo nível. No entanto, pode ser difícil acertar os últimos.\\nCada nível desta vantagem aumenta o número de blocos que se destroem sozinhos.\\nLimpar um nível rapidamente traz mais opções de melhorias. Nunca errar os blocos também é muito benéfico.\\n\\nEntão, se você achar difícil quebrar os últimos blocos, obter esta vantagem pode ajudar.","upgrades.slow_down.name":"Bola mais lenta","upgrades.slow_down.tooltip":"A bola se move mais lentamente","upgrades.slow_down.verbose_description":"A bola começa relativamente lenta, mas a cada nível ela fica um pouco mais rápida.\\n\\nTambém vai acelerar se você passar muito tempo em um nível.\\n\\nEsta vantagem a torna mais fácil de conduzi-la.\\n\\nVocê pode obtê-la no início de todas as partidas ativando o modo infantil nas configurações.","upgrades.smaller_puck.name":"Raquete menor","upgrades.smaller_puck.tooltip":"{{percent}}% mais moedas","upgrades.smaller_puck.verbose_description":"Diminui a raquete, o que em teoria, faz rebater nos cantos mais fácil, mas na verdade só aumenta a dificuldade.\\n\\nÉ por isso que você também obtém um bom bônus que gera +50% moedas.","upgrades.soft_reset.name":"Reinício progressivo","upgrades.soft_reset.tooltip":"Mantenha {{percent}}% do seu combo quando ele reiniciar","upgrades.soft_reset.verbose_description":"Reduz o impacto de um reinício de combo.","upgrades.steering.name":"Direção","upgrades.steering.tooltip":"As bolas viram quando a raquete se move","upgrades.steering.verbose_description":"A posição da raquete influencia diretamente a direção do movimento das bolas. No nível 2 para cima, você verá uma linha mostrando a direção da sua bola.","upgrades.sticky_coins.name":"Moedas pegajosas","upgrades.sticky_coins.tooltip":"Moedas grudam em blocos da mesma cor","upgrades.sticky_coins.verbose_description":"No nível 2, elas grudam em blocos de qualquer cor","upgrades.streak_shots.name":"Sequência de rebatidas","upgrades.streak_shots.tooltip":"Mais moedas se você quebrar muitos blocos ao mesmo tempo","upgrades.streak_shots.verbose_description":"Cada vez que você quebrar um bloco, sua combinação aumenta por um.\\n\\nNo entanto, assim que a bola tocar na sua raquete, o combo reinicia.\\n\\nUma vez que seu combo subir acima do valor base, sua raquete terá uma borda vermelha para lembrá-lo de que tocar na bola destruirá seu combo.","upgrades.sturdy_bricks.name":"Blocos resistentes","upgrades.sturdy_bricks.tooltip":"+{{lvl}} HP nos blocos, +{{percent}}% moedas","upgrades.sturdy_bricks.verbose_description":"Cada nível desta vantagem adiciona HP para todos os blocos. Você pode ver o número de HP com a vantagem \\"clarividente\\". Também pode aumentar o dano da bola, obtendo a vantagem \\"penetrar\\". Cada nível desta vantagem gera +50% moedas.","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"O tempo se move apenas quando a raquete se move.","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"Telecinese","upgrades.telekinesis.tooltip":"A posição da raquete influencia a bola","upgrades.telekinesis.verbose_description":"Controla a bola enquanto está subindo. O efeito é mais forte quando a bola está na metade inferior da tela.","upgrades.three_cushion.name":"Três almofadas","upgrades.three_cushion.tooltip":"Mais moedas se você bater blocos apenas indiretamente","upgrades.three_cushion.verbose_description":"+1 combo por hit em lados e topo, até +{{max}} por quicada na raquete.\\nCada acerto de um lado aumentará o combo por um, até +3.\\nDepois disso, nenhum combo será ganho até a próxima raquete.\\n\\nO combo se reinicia quando você bate em um bloco sem quicar primeiro.","upgrades.top_is_lava.name":"O céu é o limite","upgrades.top_is_lava.tooltip":"Mais moedas se você evitar acertar o topo","upgrades.top_is_lava.verbose_description":"Sempre que você quebrar um bloco, seu combo vai aumentar por um. No entanto, seu combo irá reiniciar assim que sua bola atingir o topo da tela.\\n\\nQuando seu combo está acima do mínimo, uma barra vermelha aparecerá no topo para lembrá-lo de que você deve evitar acertá-lo.\\n\\nNo nível 2, a borda é removida completamente e suas bolas e moedas podem ser perdidas.","upgrades.trampoline.name":"Trampolim","upgrades.trampoline.tooltip":"+{{lvl}} combo cada vez que a bolar quicar da raquete, -{{lvl}} combo cada vez que a bola quicar das bordas","upgrades.trampoline.verbose_description":"+{{lvl}} combo por quicada na raquete, -{{lvl}} combo por quicada em qualquer borda. Uma das raras melhorias de combo que não adicionam uma condição de reinício","upgrades.transparency.name":"Transparência","upgrades.transparency.tooltip":"A bola fica transparente no topo da tela. +{{percent}} % moedas quando todas as bolas estiverem totalmente transparentes.","upgrades.transparency.verbose_description":"A bola fica transparente na parte superior da tela.\\n+{{percent}} % moedas.\\nNíveis mais elevados tornam a bola transparente mais cedo e aumentam o bônus de ponto.","upgrades.trickledown.name":"Gotejamento","upgrades.trickledown.tooltip":"Moedas aparecem no topo da tela.","upgrades.trickledown.verbose_description":"As moedas podem ficar em cima de um bloco se tiver blocos na linha superior, nesse caso elas só irão cair depois que você quebrar esse bloco.","upgrades.unbounded.name":"Agorafobia","upgrades.unbounded.tooltip":"Adiciona espaço à esquerda e à direita do nível, mas a sua raquete não pode ir tão longe.","upgrades.unbounded.verbose_description":"Outra melhoria pode te ajudar a estender o alcance da sua raquete.","upgrades.viscosity.name":"Viscosidade","upgrades.viscosity.tooltip":"Queda de moeda mais lenta","upgrades.viscosity.verbose_description":"As moedas normalmente aceleram com a gravidade e as explosões até atingirem velocidades bastante elevadas.\\n\\nEsta vantagem faz com que elas desacelerem constantemente, como se estivessem dentro de algum tipo de líquido viscoso.\\n\\nIsto torna mais fácil coletá-las e combina bem com vantagens que influenciam o movimento da moeda.","upgrades.wind.name":"Vento","upgrades.wind.tooltip":"A posição da raquete cria vento","upgrades.wind.verbose_description":"O vento depende da posição da raquete: esquerda assopra pra esquerda, direita assopra pra direita. Afeta bolas e moedas.","upgrades.wrap_left.name":"Envolver à esquerda","upgrades.wrap_left.tooltip":"Bater no lado esquerdo teletransporta a bola para o lado direito","upgrades.wrap_left.verbose_description":"Níveis mais avançados também incluem teletransporte de moedas.","upgrades.wrap_right.name":"Envolver à direita","upgrades.wrap_right.tooltip":"Bater no lado direito teletransporta a bola para o lado esquerdo","upgrades.wrap_right.verbose_description":"Níveis mais avançados também incluem teletransporte de moedas.","upgrades.wrap_up.name":"Envolver","upgrades.wrap_up.tooltip":"Tocar no topo da tela vai teletransportar a bola logo acima da raquete.","upgrades.wrap_up.verbose_description":"Isto não conta como um arremesso da raquete. No nível 2, as moedas também se teletransportam.","upgrades.yoyo.name":"Ioiô","upgrades.yoyo.tooltip":"A bola cai em direção a raquete","upgrades.yoyo.verbose_description":"É o oposto da telecinese, controle a bola enquanto ela está caindo.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"Mais moedas se não disparar bombas","upgrades.zen.verbose_description":"+{{lvl}} combo a cada 3s, reinicia quando acontece uma explosão"}');var I={};I=JSON.parse('{"confirmRestart.no":"Cancelar","confirmRestart.text":"Irá começar um novo jogo. Quer continuar?","confirmRestart.title":"Começar um novo jogo?","confirmRestart.yes":"Reiniciar jogo","editor.editing.bigger":"Aumentar tamanho do nível","editor.editing.color":"Escolha uma cor na lista de cores (máximo 5 por nível)","editor.editing.copied":"Código de nível copiado","editor.editing.copy":"Copiar código de nível","editor.editing.copy_help":"Partilhe o código de nível no nosso Discord para ser adicionado ao jogo.","editor.editing.credit":"Créditos e fonte","editor.editing.credit_prompt":"Digit ível atingido","gameOver.stats.total_score":"Pontuação total","gameOver.stats.upgrades_applied":"Melhorias usadas","gameOver.stats_intro":"Veja abaixo as estatísticas do jogo em comparação com os seus {{count}} melhores jogos.","gameOver.unlocked_perk":"Melhoria desbloqueada","gameOver.unlocked_perk_plural":"Acabou de desbloquear {{count}} vantagens","gameOver.win.summary":"Este jogo acabou. Acumulou {{score}} moedas no total.","gameOver.win.title":"Você completou este jogo","help.content":"Golo\\n\\nPegue o máximo de moedas possível durante 7 níveis.\\nMoedas aparecem quando você quebra tijolos.\\nPegue-os com seu paddle para aumentar sua pontuação.\\nSua pontuação é exibida no canto superior direito da tela.\\nNão deixes cair a bola ou acabou o jogo.\\n\\nDepois de destruir todos os tijolos, você terá que escolher uma atualização.\\n\\n# Atualizações\\n\\nAs atualizações que você escolher serão aplicadas até o final da execução.\\nAlguns podem ser escolhidos várias vezes para um efeito mais forte.\\nAlguns ajudam com o objetivo, ou tornam o jogo mais fácil em algumas outras maneiras.\\nAlguns só são úteis quando combinados.\\n\\nVocê sempre tem uma atualização no início de cada jogo.\\nSeu ícone servirá como os tijolos do primeiro nível.\\nVocê pode selecionar atualizações iniciais nas configurações.\\n\\nMuitas atualizações impactam sua combinação.\\n\\n# Combo #\\n\\nSeu \\"combo\\" é o número de moedas geradas quando um tijolo quebra.\\nÉ exibido em seu paddle, por exemplo .4 significa que cada tijolo terá 4 moedas.\\nA maioria das atualizações que aumentam a combinação também adicionam uma condição para redefini-la.\\nA combinação também irá redefinir se a bola retornar ao remo sem bater em qualquer tijolo.\\nUma mensagem \\"miss\\" será mostrada quando isso acontecer.\\n\\nTente apontar para um tijolo cada vez.\\n\\nA apontar\\n\\nApenas a posição da bola no remo decide como ele vai saltar.\\nSe a bola atingir o centro morto paddle, ele vai voltar para cima verticalmente.\\nSe você bater mais de um lado, terá mais ângulo.\\nA velocidade do remo e o ângulo de entrada não têm impacto na direção da bola após o salto.\\n\\nMuitas atualizações que ajudam com o objetivo podem ser desbloqueadas.\\n\\n# Desbloqueios\\n\\nAo jogar Breakout 71 pela primeira vez, a maioria das atualizações e níveis estão bloqueados.\\nAs atualizações são desbloqueadas simplesmente jogando e pegando muitas moedas.\\nOs primeiros níveis são desbloqueados alcançando uma pontuação alta.\\nOs níveis posteriores adicionam uma condição sobre quais vantagens você pode selecionar.\\n\\nAlcance altas pontuações é muito mais fácil quando você recebe várias atualizações por nível graças às medalhas.\\n\\nMedalhas\\n\\nVocê terá um upgrade e escolhas extras quando jogar bem:\\n\\n- Limpe o nível rapidamente\\n- Pegar todas as moedas\\n- Sempre acertaste em algo entre saltos de pá","help.help":"Saiba mais sobre o jogo","help.levels":"Níveis","help.title":"Ajuda","help.upgrades":"## Melhorias","history.columns.score":"Pontuação","history.columns.started":"Data","history.help":"Veja os seus {{count}} melhores jogos.","history.include_past_versions":"Mostrar versões anteriores também","history.locked":"Jogue pelo menos dez jogos para desbloquear","history.title":"Histórico de partidas","lab.help":"Tente qualquer combinação que quiser.","lab.instructions":"Selecione melhorias e um nível, em seguida, aperte no botão de jogar acima.","lab.menu_entry":"Modo criativo","lab.play":"Jogar","lab.reset":"Reiniciar","lab.select_level":"Escolha um nível para jogar","lab.unlocks_at":"Desbloqueia na pontuação total de {{score}}","level_up.challenges.catchRateGood.description":"Apanhe {{gold}}% de moedas para ouro, {{silver}}% para prata.","level_up.challenges.catchRateGood.name":"{{caught}} moedas retiradas de {{total}}","level_up.challenges.earned_medal":"Ganhou uma medalha","level_up.challenges.earned_medal_plural":"Ganhou {{count}} medalhas","level_up.challenges.gain":"+{{ch
