so que hayas logrado en el juego, ¿estás seguro?","settings.save_file_error":"Error al cargar el archivo guardado","settings.save_file_loaded":"Guardar archivo cargado","settings.save_file_loaded_help":"La aplicación ahora se recargará para aplicar tu guardado.","settings.save_file_loaded_ok":"DE ACUERDO","settings.show_fps":"Contador de FPS","settings.show_fps_help":"Supervisar el rendimiento de la aplicación","settings.show_stats":"Mostrar estadísticas en tiempo real","settings.show_stats_help":"Monedas, tiempo, rebotes, fallos.","settings.smooth_lighting":"Iluminación suave","settings.smooth_lighting_help":"Desenfoca los efectos de luz de fondo para que se vean menos cuadrados. Aumenta el retardo.","settings.sounds":"Sonidos del juego","settings.sounds_help":"Pitidos, bloops y brrrr","settings.stress_test":"Prueba de estrés","settings.stress_test_help":"Inicie un juego controlado por bot con una cantidad muy alta de monedas para probar los límites de rendimiento de su dispositivo.","starting_perks.checked":"Al empezar una partida nueva, recibirás una de esas ventajas. Haz clic en una ventaja para excluirla.","starting_perks.help":"Elija posibles actualizaciones iniciales","starting_perks.random":"Se han eliminado todos los beneficios, la elección será aleatoria.","starting_perks.title":"Beneficios iniciales","starting_perks.unchecked":"Los beneficios a continuación no se ofrecen como beneficios iniciales, pero puedes hacer clic para agregarlos al grupo.","unlocks.category.advanced":"## Mejoras avanzadas\\n\\nNo suelen ser muy útiles por sí solas, pero pueden volverse muy poderosas al combinarlas con la mejora combinada adecuada.","unlocks.category.beginner":"Mejoras para principiantes\\n\\nEstas mejoras son muy útiles para principiantes, ya que les ayudan a jugar más tiempo y a fallar menos la pelota.","unlocks.category.combo":"## Mejoras de combo\\n\\nEstas mejoras ayudan a aumentar tu combo progresivamente, pero también añaden una condición de reinicio. Usar una es buena idea, pero usar más aumenta el riesgo y la recompensa.","unlocks.category.combo_boost":"Mejoras de combo\\n\\nEstas mejoras aumentan el combo o el multiplicador de combo sin necesidad de reiniciarlo.","unlocks.category.simple":"## Mejoras auxiliares\\n\\nEstas mejoras son útiles en casi cualquier configuración.","unlocks.greyed_out_help":"Los objetos en gris pueden desbloquearse aumentando tu puntuación total. La puntuación total aumenta cada vez que consigues puntos en el juego.","unlocks.intro":"Tu puntuación total es {{ts}}. Haz clic en una mejora a continuación para empezar a jugar con ella.","unlocks.just_unlocked":"Nivel desbloqueado","unlocks.just_unlocked_plural":"Acabas de desbloquear {{count}} niveles","unlocks.level":"Desbloqueaste {{unlocked}} niveles de {{out_of}}","unlocks.level_description":"Un nivel {{size}}x{{size}} con {{bricks}} ladrillos, {{colors}} colores y {{bombs}} bombas.","unlocks.levels":"Niveles desbloqueados","unlocks.minScore":"Alcanza una puntuación de ${{minScore}} en una partida para desbloquearla.","unlocks.minScoreWithPerks":"Alcanzar ${{minScore}} en un juego con {{required}} pero sin {{forbidden}}.","unlocks.minTotalScore":"Acumula un total de ${{score}}","unlocks.reached":"Tu mejor puntuación hasta ahora es {{reached}}.","unlocks.title_upgrades":"Has desbloqueado {{unlocked}} mejoras en {{out_of}}.","unlocks.upgrades":"Mejoras desbloqueadas","upgrades.addiction.name":"Adicción","upgrades.addiction.tooltip":"+{{lvl}} combo / ladrillo, combo perdido después de {{delay}}s sin romper ningún ladrillo","upgrades.addiction.verbose_description":"La cuenta atrás sólo comienza una vez que se ha destruido el primer ladrillo del nivel, y se detiene en cuanto no hay más ladrillos.","upgrades.asceticism.name":"Ascetismo","upgrades.asceticism.tooltip":"+{{combo}} combo por ladrillo roto, - {{combo}} cuando una pieza es atrapada","upgrades.asceticism.verbose_description":"Tendremos que encontrar una forma de almacenar las piezas mientras crece el combo.","upgrades.ball_attract_ball.name":"Gravedad","upgrades.ball_attract_ball.tooltip":"Las pelotas atraen a las pelotas","upgrades.ball_attract_ball.verbose_description":"Las bolas que están separadas más de 3/4 de la anchura de la pantalla empiezan a atraerse. La fuerza de atracción es mayor cuanto más separadas están las bolas. Las partículas del arco iris volarán para simbolizar la fuerza de atracción. Esta ventaja sólo está disponible si ya tienes más de una bola en juego.","upgrades.ball_attracts_coins.name":"Balas de la suerte","upgrades.ball_attracts_coins.tooltip":"Las monedas van con la bola más cercana","upgrades.ball_attracts_coins.verbose_description":"Puedes utilizarlo para que las piezas orbiten la pelota y colorear los ladrillos cercanos, o como una especie de rincón imantado.","upgrades.ball_repulse_ball.name":"Vuelo en formación","upgrades.ball_repulse_ball.tooltip":"Las balas repelen a las balas","upgrades.ball_repulse_ball.verbose_description":"Las bolas que están a menos de un cuarto de la anchura de la pantalla empiezan a repelerse. La fuerza de repulsión es mayor cuanto más cerca están una de otra. Se mostrarán partículas para simbolizar la aplicación de esta fuerza. Esta ventaja sólo está disponible si ya tienes más de una bola.","upgrades.base_combo.name":"Mejor base","upgrades.base_combo.tooltip":"3 monedas más por cada ladrillo roto","upgrades.base_combo.verbose_description":"Tu combo normalmente empieza en 1 al principio del nivel y vuelve a 1 cuando rebotas sin golpear nada. Con esta función, el combo empieza 3 puntos más arriba, por lo que siempre conseguirás al menos 4 monedas por ladrillo. Cuando tu combo se reinicia, vuelve a ser 4 en lugar de 1. Tu bola parpadeará un poco para indicar que su combo es superior a 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosiones más violentas","upgrades.bigger_explosions.verbose_description":"La explosión por defecto arrasa un cuadrado de ladrillos de 3x3; con esta mejora, uno de 5x5. El viento que sopla las piezas también es mucho más fuerte. La pantalla parpadeará un poco después de cada explosión (excepto en el modo de gráficos básicos).","upgrades.bigger_puck.name":"Raqueta más grande","upgrades.bigger_puck.tooltip":"Atrapa más monedas fácilmente.","upgrades.bigger_puck.verbose_description":"Una raqueta grande significa que nunca se te escapa la pelota y que puedes coger más piezas, además de apuntar los rebotes con precisión. Sin embargo, una raqueta grande es más difícil de usar en los laterales del nivel.","upgrades.bricks_attract_ball.name":"Los ladrillos atraen bolas","upgrades.bricks_attract_ball.tooltip":"La pelota va hacia los primeros {{count}} ladrillos que golpea.","upgrades.bricks_attract_ball.verbose_description":"El efecto es más intenso en niveles más altos. La cantidad de ladrillos que pueden impactar antes de que el efecto se detenga también es mayor. El efecto se reactiva cuando el balón impacta el disco.","upgrades.bricks_attract_coins.name":"Los ladrillos atraen monedas","upgrades.bricks_attract_coins.tooltip":"Les ayuda a permanecer allí arriba.","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Boya","upgrades.buoy.tooltip":"Las monedas flotan durante {{duration}} segundos en la línea inferior.","upgrades.buoy.verbose_description":"El efecto es más visible en el modo móvil.","upgrades.clairvoyant.name":"Perspicaz","upgrades.clairvoyant.tooltip":"Revela los niveles, el PV de los ladrillos y la dirección de las balas","upgrades.clairvoyant.verbose_description":"Te ayuda a elegir las mejoras adecuadas y a entender qué ocurre con los \\"ladrillos macizos\\". Los niveles 2 y 3 (en modo bucle) proporcionan información adicional de dudosa utilidad.","upgrades.coin_magnet.name":"Imán para monedas","upgrades.coin_magnet.tooltip":"La raqueta atrae monedas","upgrades.coin_magnet.verbose_description":"Dirige las piezas hacia la raqueta. El efecto es mayor en las piezas que ya están cerca de la raqueta.","upgrades.compound_interest.name":"Interés compuesto","upgrades.compound_interest.tooltip":"+{{lvl}} combo por ladrillo roto, se pone a cero cuando se pierde una pieza","upgrades.compound_interest.verbose_description":"Tu combo aumentará en uno cada vez que rompas un ladrillo. Si pierdes alguna pieza, tu combo volverá a cero.\\n\\nSi tu combo es superior al mínimo, aparecerá una línea roja en la parte inferior de la zona de juego para recordarte que las monedas no deben ir allí.","upgrades.concave_puck.name":"Raqueta cóncava","upgrades.concave_puck.tooltip":"Ayuda a evitar los bordes.","upgrades.concave_puck.verbose_description":"Las pelotas comienzan verticalmente al principio del nivel y rebotan en la raqueta más verticalmente y al revés.","upgrades.corner_shot.name":"Tiro de esquina","upgrades.corner_shot.tooltip":"Deja que tu raqueta salga del área enmarcada","upgrades.corner_shot.verbose_description":"Te ayuda a apuntar a las esquinas","upgrades.double_or_nothing.name":"Doble o nada","upgrades.double_or_nothing.tooltip":"El combo sube {{multiplier}} veces más rápido, pero perderás el {{percent}}% de tu puntuación en cada reinicio.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"Moneda espacial","upgrades.etherealcoins.tooltip":"Las piezas ya no se ven afectadas por la gravedad","upgrades.etherealcoins.verbose_description":"Las monedas mantendrán su velocidad incluso después de varios rebotes y ya no se verán afectadas por la gravedad.","upgrades.extra_levels.name":"5 minutos más","upgrades.extra_levels.tooltip":"Juega {{count}} niveles en lugar de 7","upgrades.extra_levels.verbose_description":"El juego suele durar 7 niveles, tras los cuales se acaba la partida y la puntuación que hayas alcanzado es tu puntuación del juego.\\n\\nElegir esta mejora te permite prolongar el juego un nivel. Los últimos niveles suelen ser en los que más puntos consigues, así que la diferencia puede ser espectacular.","upgrades.extra_life.name":"Segunda oportunidad","upgrades.extra_life.tooltip":"La pelota rebota una vez antes de perderse.","upgrades.extra_life.verbose_description":"Normalmente, sólo tienes una bola por ronda, y la ronda termina en cuanto la sueltas.\\n\\nEsta habilidad añade una barra blanca en la parte inferior de la pantalla que guardará una bola una vez, y se romperá en el proceso.\\n\\nPuedes coger varias vidas por adelantado, que se usan cada vez que una bola está a punto de perderse.","upgrades.forgiving.name":"Errar es humano","upgrades.forgiving.tooltip":"Perder los ladrillos significa perder una porción progresivamente mayor del combo","upgrades.forgiving.verbose_description":" El primer ladrillo perdido por nivel no cuesta nada, el siguiente 10%, 20% y así sucesivamente.","upgrades.fountain_toss.name":"Moneda en la fuente","upgrades.fountain_toss.tooltip":"A veces ganas un pequeño combo cuando pierdes monedas.","upgrades.fountain_toss.verbose_description":"Cuando pierdes una moneda y tu combo está por debajo del nivel*30, tu combo tiene una probabilidad de nivel/combo de crecer en uno.","upgrades.ghost_coins.name":"Habitaciones fantasma","upgrades.ghost_coins.tooltip":"Las monedas atraviesan los ladrillos lentamente","upgrades.ghost_coins.verbose_description":"No es un error, ¡es una característica! Las piezas atraviesan los ladrillos lentamente. Los niveles más altos permiten que las monedas pasen más rápido a través de los ladrillos.","upgrades.golden_goose.name":"Ganso dorado","upgrades.golden_goose.tooltip":"Las monedas se teletransportan a la pelota después de golpear un ladrillo.","upgrades.golden_goose.verbose_description":"Cuando una moneda impacta un ladrillo, se teletransporta a la bola más cercana. En el nivel dos, las monedas también se teletransportan al impactar un lado.","upgrades.happy_family.name":"Familia feliz","upgrades.happy_family.tooltip":"Más monedas si mantienes todas las bolas en juego.","upgrades.happy_family.verbose_description":"+1 combo por bola extra por rebote de la paleta. El combo se reinicia al perder una bola. Solo la bola superior a 1 otorga combo.","upgrades.helium.name":"Helio","upgrades.helium.tooltip":"Las piezas flotan en lugar de caer alrededor de la raqueta.","upgrades.helium.verbose_description":"En el nivel 1, la gravedad se reduce. En el nivel 2, las monedas flotan lentamente. En el nivel 3, vuelan de verdad.","upgrades.hot_start.name":"Arranque en caliente","upgrades.hot_start.tooltip":"Combo a {{start}}, -{{loss}} combo por segundo","upgrades.hot_start.verbose_description":"Al principio de cada nivel, tu combo comenzará con +30 puntos, pero cada segundo se reducirá en un punto.  ","upgrades.implosions.name":"Implosiones","upgrades.implosions.tooltip":"Las explosiones absorben las piezas en lugar de hacerlas estallar.","upgrades.implosions.verbose_description":"La fuerza de la explosión se aplica en sentido contrario. El nivel 2+ aumenta la potencia de la implosión.","upgrades.left_is_lava.name":"Evitar el lado izquierdo","upgrades.left_is_lava.tooltip":"+{{lvl}} combo por ladrillo, se pierde al tocar el borde izquierdo","upgrades.left_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, dándote una moneda extra cada vez que rompes un ladrillo.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola golpea el lado izquierdo.\\n\\nEn cuanto tu combo aumenta, el lado izquierdo se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.limitless.name":"Sin límites","upgrades.limitless.tooltip":"Aumenta el nivel máximo de todas las mejoras de {{lvl}} .","upgrades.limitless.verbose_description":"Elegir esta ventaja también aumenta su propio límite en un punto, permitiéndote elegirla de nuevo.","upgrades.metamorphosis.name":"Metamorfosis","upgrades.metamorphosis.tooltip":"Cada pieza puede manchar {{lvl}} ladrillo(s) con su color","upgrades.metamorphosis.verbose_description":"Con esta mejora, las monedas tendrán el color del ladrillo del que proceden y colorearán el primer ladrillo que toquen.\\n\\nLas piezas aparecen a la velocidad de la bola que las rompió, lo que significa que puedes apuntar un poco en la dirección de los ladrillos que quieres \\"pintar\\".","upgrades.minefield.name":"Campo de minas","upgrades.minefield.tooltip":"+{{percent}}% de monedas por cada ladrillo bomba en la pantalla","upgrades.minefield.verbose_description":"Las bombas también se cuentan mientras explotan.","upgrades.multiball.name":"Bola múltiple","upgrades.multiball.tooltip":"Cada nivel comienza con {{count}} bolas.","upgrades.multiball.verbose_description":"En cuanto sueltas la bola en Breakout 71, pierdes.\\n\\nCon esta ventaja, tienes dos bolas, así que puedes permitirte perder una.\\n\\nLas bolas perdidas vuelven al siguiente nivel.\\n\\nTener más de una bala te permite obtener otras ventajas y, por supuesto, completar el nivel más rápidamente.","upgrades.nbricks.name":"Domiciliación bancaria","upgrades.nbricks.tooltip":"Golpea exactamente {{lvl}} ladrillos por rebote para +{{lvl}} combo, de lo contrario combo perdido","upgrades.nbricks.verbose_description":"Si tu bola rebota sin romper ningún ladrillo, cuenta como golpe.  Los ladrillos destruidos por explosiones no cuentan.","upgrades.one_more_choice.name":"La respuesta D","upgrades.one_more_choice.tooltip":"1 opción de mejora adicional disponible hasta el final del juego","upgrades.one_more_choice.verbose_description":"Cada menú de mejoras tendrá una opción adicional.  Esto no aumenta el número de mejoras que puede elegir, pero le ayuda a crear el perfil ideal. \\"Respuesta D\\" es una referencia a un sketch clásico.","upgrades.ottawa_treaty.name":"Tratado de Ottawa","upgrades.ottawa_treaty.tooltip":"Romper un ladrillo cerca de una bomba la desarma.","upgrades.ottawa_treaty.verbose_description":"La bomba cercana será reemplazada por un bloque de color. Si tienes zapador, la pelota perderá su efecto hasta el próximo rebote. Solo se puede reemplazar una bomba a la vez.","upgrades.passive_income.name":"Ingresos pasivos","upgrades.passive_income.tooltip":"+{{lvl}} combo/bloque, la paleta es inmaterial {{time}}s después de mover","upgrades.passive_income.verbose_description":"Algunas mejoras hacen que las pelotas se muevan sin necesidad de poner la raqueta en movimiento.","upgrades.picky_eater.name":"Comer por colores","upgrades.picky_eater.tooltip":"+{{lvl}} combo por ladrillo roto del color de la bola, combo perdido en caso contrario","upgrades.picky_eater.verbose_description":"Cada vez que rompes un ladrillo del mismo color que tu bola, tu combinación aumenta en uno.\\nSi es de otro color, la bola adopta este nuevo color, pero la combinación se reinicia, a menos que no queden ladrillos del mismo color que la bola. Los ladrillos de color incorrecto se marcan con un círculo rojo. Si tienes más de una bola, todas cambian de color al mismo tiempo cuando una de ellas toca un ladrillo.","upgrades.pierce.name":"Bola perforadora","upgrades.pierce.tooltip":"La pelota golpea {{count}} ladrillos después de cada rebote en la raqueta.","upgrades.pierce.verbose_description":"Normalmente, la pelota rebota en cuanto golpea un ladrillo. Con esta mejora, continuará su trayectoria hasta que haya roto 3 ladrillos.\\n\\nDespués, rebotará en el cuarto ladrillo y tendrá que tocar la raqueta para poner a cero el contador.","upgrades.pierce_color.name":"Taladro de color","upgrades.pierce_color.tooltip":"+{{lvl}} de daño a los ladrillos del mismo color que la bola","upgrades.pierce_color.verbose_description":"Cada vez que una bola golpea un ladrillo del mismo color, lo atraviesa sin obstáculos.\\n\\nCuando choca contra un ladrillo de otro color, lo rompe, adopta su color y rebota.\\n\\nSi tienes ladrillos macizos, las cosas funcionan de otra manera.","upgrades.puck_repulse_ball.name":"Aterrizaje suave","upgrades.puck_repulse_ball.tooltip":"La raqueta repele las pelotas","upgrades.puck_repulse_ball.verbose_description":"Cuando una pelota se acerca a la raqueta, empieza a frenarse e incluso a botar sin tocar el disco.","upgrades.rainbow.name":"Arcoíris","upgrades.rainbow.tooltip":"Las monedas aparecen con colores del arco iris.","upgrades.rainbow.verbose_description":"Cada nivel aumenta la cantidad de monedas de colores. El color depende del tiempo transcurrido.","upgrades.reach.name":"Ataque aéreo","upgrades.reach.tooltip":"Romper uno de los N ladrillos de la línea inferior destruye el combo. De lo contrario, +N combo.","upgrades.reach.verbose_description":"Si sólo hay una fila de ladrillos, o si la fila más baja cubre todo el ancho del juego, esta ventaja no tiene efecto. De lo contrario, si se rompe esta fila inferior, se reinicia el combo; si se rompe cualquier otra fila, el combo aumenta en el número de ladrillos de esa fila.\\n\\nLa fila inferior de ladrillos se marcará con un círculo rojo para recordarte que no debes tocarla.","upgrades.respawn.name":"Reaparición","upgrades.respawn.tooltip":"{{percent}}% de los ladrillos reaparecen después de {{delay}}s.","upgrades.respawn.verbose_description":"Los efectos de partículas te mostrarán dónde aparecerán los ladrillos.","upgrades.right_is_lava.name":"Evitar el lado derecho","upgrades.right_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el impacto con el lado derecho","upgrades.right_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, dándote una moneda extra cada vez que rompas los ladrillos siguientes.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola toca el lado derecho del área de juego.\\n\\nEn cuanto tu combo aumenta, el lado derecho se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.sacrifice.name":"Sacrificio","upgrades.sacrifice.tooltip":"Perder una vida multiplica el combo por {{lvl}} y luego destruye todos los ladrillos de la pantalla","upgrades.sacrifice.verbose_description":"El combo podría llegar muy alto.","upgrades.sapper.name":"Zapador","upgrades.sapper.tooltip":"El primer ladrillo roto se convierte en una bomba.","upgrades.sapper.verbose_description":"En lugar de desaparecer, el primer ladrillo roto es sustituido por una bomba. Al rebotar la pelota en la raqueta, se restablece el efecto.  A medida que subas de nivel, podrás colocar más bombas.","upgrades.shocks.name":"Choque","upgrades.shocks.tooltip":"Choque explosivo entre balas","upgrades.shocks.verbose_description":"Cuando dos balas chocan, intercambian velocidades, crean una explosión y ganan un poco de la velocidad que las separaba.","upgrades.shunt.name":"Derivación","upgrades.shunt.tooltip":"Aparca {{percent}}% de combo al cambiar de nivel","upgrades.shunt.verbose_description":"El arranque en caliente simplemente se añadirá a la combinación actual","upgrades.side_flip.name":"Derecha","upgrades.side_flip.tooltip":"+{{lvl}} combo por ladrillo roto de la derecha, -{{loss}} de lo contrario","upgrades.side_flip.verbose_description":"Golpea el ladrillo por su lado derecho para conseguir un combo, pero evita golpearlo por su lado izquierdo ya que esto cancelará dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.side_kick.name":"Zurdos","upgrades.side_kick.tooltip":"+{{lvl}} combo por ladrillo roto de la izquierda, -{{loss}} de lo contrario","upgrades.side_kick.verbose_description":"Golpea el ladrillo por su lado izquierdo para conseguir un combo, pero evita golpearlo por su lado derecho ya que esto cancelará dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.skip_last.name":"Fácil de limpiar","upgrades.skip_last.tooltip":"El último ladrillo se autodestruye.","upgrades.skip_last.verbose_description":"Tienes que romper todos los ladrillos para pasar al siguiente nivel.\\n\\nSin embargo, puede ser difícil conseguir los últimos ladrillos.\\n\\nCompletar un nivel antes de tiempo te da opciones extra al subir de nivel.\\n\\nNo quedarte nunca sin ladrillos también es una gran ventaja.\\n\\nAsí que si te cuesta romper los últimos ladrillos, conseguir esta ventaja unas cuantas veces puede ayudarte.","upgrades.slow_down.name":"Bola lenta","upgrades.slow_down.tooltip":"El balón se mueve más despacio","upgrades.slow_down.verbose_description":"La bola empieza relativamente despacio, pero con cada nivel del juego empieza un poco más rápido, y también se acelera si pasas mucho tiempo en un nivel.\\n\\nEsta ventaja hace que la bola sea más fácil de manejar.\\n\\nPuedes conseguirla al principio de cada partida activando el modo niño en el menú.","upgrades.smaller_puck.name":"Raqueta más pequeña","upgrades.smaller_puck.tooltip":"También otorga +{{percent}}% monedas","upgrades.smaller_puck.verbose_description":"Esto hace que la paleta sea más pequeña, lo que en teoría facilita algunos tiros de esquina, pero en realidad solo aumenta la dificultad.\\n\\nPor eso también obtienes una buena bonificación de +50% en la generación de monedas.","upgrades.soft_reset.name":"Restablecimiento progresivo","upgrades.soft_reset.tooltip":"Al reiniciar el combo se conserva el {{percent}}% de los puntos","upgrades.soft_reset.verbose_description":"Limita el impacto de un reinicio de combo.","upgrades.sticky_coins.name":"Monedas pegajosas","upgrades.sticky_coins.tooltip":"Las monedas se adhieren a los ladrillos del mismo color.","upgrades.sticky_coins.verbose_description":"En el nivel 2, se adhieren a ladrillos de cualquier color.","upgrades.streak_shots.name":"Secuencia de destrucción","upgrades.streak_shots.tooltip":"Más piezas si rompes varios ladrillos a la vez.","upgrades.streak_shots.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta. El combo se pone a cero cuando la pelota golpea la raqueta. Una vez que tu combo supera el valor base, tu raqueta se vuelve roja para recordarte que tocarla con la pelota destruirá tu combo.","upgrades.sturdy_bricks.name":"Ladrillos macizos","upgrades.sturdy_bricks.tooltip":"+{{lvl}} puntos de vida de los ladrillos, +{{percent}}% monedas cuando se destruyen","upgrades.sturdy_bricks.verbose_description":"Cada nivel de esta mejora añade un PV a todos los ladrillos. Puedes comprobar el número de PV usando la cualificación \\"Clarividente\\". Puedes aumentar el daño de las balas obteniendo la mejora \\"Bala perforante\\". Cada nivel de esta mejora añade un 50% más de monedas.","upgrades.superhot.name":"Súper caliente","upgrades.superhot.tooltip":"El tiempo se mueve cuando se mueve la paleta.","upgrades.superhot.verbose_description":"SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE","upgrades.telekinesis.name":"Telequinesis","upgrades.telekinesis.tooltip":"Control de la trayectoria del balón","upgrades.telekinesis.verbose_description":"Controla la bola mientras sube.","upgrades.three_cushion.name":"Tres cojines","upgrades.three_cushion.tooltip":"+1 de combo por golpe en los laterales y la parte superior, hasta +{{max}} por cada rebote de la paleta. El combo se reinicia al golpear un ladrillo sin rebotar primero.","upgrades.three_cushion.verbose_description":"Cada golpe lateral aumentará el combo en uno, hasta +3. Después, no se obtendrá ningún combo hasta el siguiente rebote de la paleta.","upgrades.top_is_lava.name":"Icare","upgrades.top_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el rebote del techo","upgrades.top_is_lava.verbose_description":"Cada vez que rompas un ladrillo, tu combo aumentará en uno. Sin embargo, tu combo se reiniciará en cuanto tu bola llegue a la parte superior de la pantalla.\\n\\nCuando tu combo supere el mínimo, aparecerá una barra roja en la parte superior de la pantalla para recordarte que debes evitar golpearla.","upgrades.trampoline.name":"Trampolín","upgrades.trampoline.tooltip":"+{{lvl}} combo cada vez que una pelota rebota en la raqueta,-{{lvl}} combo cada vez que una pelota rebota en uno de los bordes","upgrades.trampoline.verbose_description":"Una de las pocas mejoras que no tiene una condición de reinicio","upgrades.transparency.name":"Transparencia","upgrades.transparency.tooltip":"La bola se vuelve transparente en la parte superior de la pantalla. +{{percent}} % monedas cuando todas las bolas son completamente transparentes","upgrades.transparency.verbose_description":"Los niveles más altos hacen que la pelota se vuelva transparente más rápidamente y aumentan la bonificación de puntos.","upgrades.trickledown.name":"Escorrentía","upgrades.trickledown.tooltip":"Las monedas aparecen en la parte superior de la pantalla.","upgrades.trickledown.verbose_description":"Podría ayudarte a ahorrar algunas monedas. ","upgrades.unbounded.name":"Espacio libre","upgrades.unbounded.tooltip":"+{{lvl}} combo por ladrillo, más lados para mantener la pelota en juego, peligro","upgrades.unbounded.verbose_description":"Espero que hayas encontrado la forma de mantener tu bola en la pantalla. En el nivel 2+, el techo también desaparecerá. Se trata de una ventaja avanzada.","upgrades.viscosity.name":"Fluido viscoso","upgrades.viscosity.tooltip":"Las piezas caen más lentamente","upgrades.viscosity.verbose_description":"Las piezas normalmente se aceleran con la gravedad y las explosiones para alcanzar velocidades bastante altas.\\n\\nEsta habilidad las ralentiza constantemente, como si estuvieran en una especie de líquido viscoso.\\n\\nEsto facilita su captura y combina bien con mejoras que influyen en el movimiento de la pieza.","upgrades.wind.name":"Viva el viento","upgrades.wind.tooltip":"La posición de la raqueta crea viento","upgrades.wind.verbose_description":"El viento depende de la posición de la raqueta en la pantalla, hacia la izquierda si está a la izquierda, hacia la derecha si está a la derecha.\\nAfecta a pelotas y piezas.","upgrades.wrap_left.name":"Envolver a la izquierda","upgrades.wrap_left.tooltip":"Golpear el lado izquierdo teletransporta la pelota al lado derecho.","upgrades.wrap_left.verbose_description":"Los niveles superiores también teletransportan monedas.","upgrades.wrap_right.name":"Envolver a la derecha","upgrades ı yalnızca birleştirildiğinde işe yarar.\\n\\nHer oyunun başında her zaman bir yükseltme alırsın. \\nSimgesi ilk seviyenin tuğlaları olarak hizmet eder. \\nAyarlardan başlangıç yükseltmelerini seçebilirsin.\\n\\nBirçok yükseltme kombonu etkiler. \\n\\n## Kombo\\n\\n\\"Kombon\\", bir tuğla kırıldığında ortaya çıkan jeton sayısıdır. \\nKüreğinizde görüntülenir, örneğin x4 her tuğlanın 4 jeton üreteceği anlamına gelir. \\nKomboyu artıran çoğu yükseltme, onu sıfırlamak için bir koşul da ekler. \\nTop herhangi bir tuğlaya çarpmadan küreğe geri dönerse kombo da sıfırlanır. \\nBu olduğunda bir \\"ıskalama\\" mesajı gösterilir. \\n\\nHer seferinde bir tuğlaya doğru nişan almaya çalışın. \\n\\n## Nişan Alma\\n\\nSadece küreğin üzerindeki top konumu nasıl sekeceğine karar verir. \\nTop küreğin tam ortasına çarparsa, dikey olarak geri sekecektir. \\nBir tarafa daha fazla vurursanız, daha fazla açıya sahip olacaktır. \\nKürek hızı ve gelen açı, zıpladıktan sonra topun yönü üzerinde hiçbir etkiye sahip değildir. \\n\\nNişan almaya yardımcı olan birçok yükseltme açılabilir. \\n\\n## Kilit Açmalar\\n\\nBreakout 71\'i ilk kez oynarken, çoğu yükseltme ve seviye kilitlenir. \\nYükseltmeler, sadece oynayarak ve birçok jeton yakalayarak açılır. \\nİlk seviyeler yüksek bir puana ulaşarak açılır.\\nDaha sonraki seviyeler hangi avantajları seçebileceğinize dair bir koşul ekler.\\n\\nHer seviyeden sonra birden fazla yükseltme aldığınızda yüksek puanlara ulaşmak çok daha kolaydır.\\n\\n## Tekrar atışlar ve ücretsiz yükseltmeler\\n\\nİyi oynadığınızda seçebileceğiniz ekstra bir yükseltme elde edersiniz: \\n\\n- Seviyeyi {{levelTimeGood}} saniyenin altında tamamlayın\\n- Kenarlara veya tepeye {{wallBouncedGood}} kereden az vurun\\n- Paraların {{catchRateGood}}%\'sini yakalayın\\n- Tuğlaları {{missesGood}} kereden az ıskalayın\\n\\nDaha da iyi yaparsanız yükseltmeleri atlamanıza izin veren bir tekrar atış da elde edersiniz: \\n\\n- Seviyeyi {{levelTimeBest}} saniyenin altında tamamlayın\\n- Kenarlara veya tepeye {{wallBouncedBest}} kereden az vurun\\n- Paraların {{catchRateBest}}%\'sini yakalayın\\n- Tuğlaları {{missesBest}} kereden az ıskalayın\\n\\nAyarlardaki bir seçenek bu istatistikleri görüntülemenizi sağlar","help.help":"Oyun hakkında daha fazla bilgi edinin","help.levels":"Seviyeler","help.title":"Yardım","help.upgrades":"## Yükseltmeler","history.columns.score":"Gol","history.columns.started":"Tarih","history.help":"En iyi {{count}} oyununuzu görün.","history.include_past_versions":"Geçmiş sürümleri de göster","history.locked":"Kilidi açmak için en az on oyun oynayın","history.title":"Koşu geçmişi","lab.help":"İstediğiniz herhangi bir yapıyı deneyin","lab.instructions":"Yükseltmeleri ve bir seviyeyi seçin, ardından yukarıdaki oynat düğmesine tıklayın","lab.menu_entry":"Yaratıcı mod","lab.play":"Oynamak","lab.reset":"Sıfırla","lab.select_level":"Oynamak için bir seviye seçin","lab.unlocks_at":"Toplam puan {{score}}olduğunda açılır","level_up.after_buttons":" {{level}}/{{max}}seviyesini yeni bitirdiniz.","level_up.before_buttons":" {{time}} saniyede {{levelSpawnedCoins}} üzerinden {{score}} jeton {{catchGain}} yakaladın {{timeGain}}.\\n {{levelMisses}} kez {{missesGain}} ıskaladın ve {{levelWallBounces}} kez duvarlara veya tavana çarptın{{wallHitsGain}}.\\n{{compliment}}","level_up.compliment_advice":"Tüm paraları toplamaya çalışın, tuğlaları asla kaçırmayın, duvarlara/tavana çarpmayın veya ek yükseltmeler kazanmak için 30 saniyenin altındaki seviyeyi temizlemeyin.","level_up.compliment_good":"Tebrikler !","level_up.compliment_perfect":"Çok etkileyici, böyle devam edin!","level_up.pick_upgrade_title":"Bir yükseltme seçin","level_up.plus_one_upgrade":"(+1 yükseltme)","level_up.plus_one_upgrade_and_reroll":"(+1 yükseltme ve +1 yeniden atma)","level_up.reroll":"Tekrar at ({{count}})","level_up.reroll_help":"Yeni seçenekler sunun","level_up.upgrade_perk_to_level":"Seviye {{level}}","main_menu.basic":"","main_menu.basic_help":"","main_menu.colorful_coi kirdir, daha fazlasını almak riski ve ödülü artırır.","unlocks.category.combo_boost":"## Kombo güçlendirici yükseltmeleri\\n\\nBu yükseltmeler, sıfırlama koşulu eklemeden komboyu veya kombo çarpanını artırır.","unlocks.category.simple":"## Yardımcı yükseltmeleri\\n\\nBu yükseltmeler hemen hemen her yapıda faydalıdır.","unlocks.greyed_out_help":"Grileştirilmiş yükseltmeler toplam puanınızı artırarak açılabilir. Toplam puan, oyunda her puan aldığınızda artar.","unlocks.intro":"Toplam puanınız {{ts}}. Aşağıdaki yükseltmelerden birine tıklayarak onunla bir oyun başlatabilirsiniz.","unlocks.just_unlocked":"Seviye kilidi açıldı","unlocks.just_unlocked_plural":"Az önce {{count}} seviyenin kilidini açtınız","unlocks.level":" {{out_of}}seviyeden {{unlocked}} tanesinin kilidini açtın","unlocks.level_description":" {{bricks}} tuğla, {{colors}} renk ve {{bombs}} bombadan oluşan {{size}}x{{size}} büyüklüğünde bir seviye.","unlocks.levels":"Kilidi açılmış seviyeler","unlocks.minScore":"Kilidi açmak için bir koşuda ${{minScore}} \'a ulaşın.","unlocks.minScoreWithPerks":" {{required}} ile ancak {{forbidden}} olmadan bir koşuda ${{minScore}} \'a ulaşın.","unlocks.minTotalScore":"Toplam ${{score}}biriktirin","unlocks.reached":"En iyi skorunuz {{reached}}idi.","unlocks.title_upgrades":" {{out_of}}yükseltmeden {{unlocked}} tanesinin kilidini açtınız","unlocks.upgrades":"Kilidi açılmış yükseltmeler","upgrades.addiction.name":"Bağımlılık","upgrades.addiction.tooltip":"+{{lvl}} kombo / tuğla, kombo bir tuğlayı kırdıktan sonra {{delay}}saniye içinde sıfırlanır.","upgrades.addiction.verbose_description":"Geri sayım yalnızca her seviyenin ilk tuğlası kırıldıktan sonra başlar. Tüm tuğlalar yok edildiğinde durur.","upgrades.asceticism.name":"Zühd","upgrades.asceticism.tooltip":"+{{combo}} kombo / tuğla, - {{combo}} jeton yakalamada","upgrades.asceticism.verbose_description":"Kombonuz tırmanırken paraları bir yere saklamanız gerekecek.","upgrades.ball_attract_ball.name":"Yer çekimi","upgrades.ball_attract_ball.tooltip":"Toplar toplarını çeker","upgrades.ball_attract_ball.verbose_description":"\\"Oyun alanının genişliğinin 3/4\'ünden\\" daha uzakta olan toplar birbirini çekmeye başlayacaktır. \\n\\nÇekim kuvveti, birbirlerinden en uzakta olduklarında daha güçlüdür. \\n\\nGökkuşağı parçacıkları çekim kuvvetini sembolize etmek için uçacaktır. Bu avantaj yalnızca birden fazla topunuz varsa sunulur.","upgrades.ball_attracts_coins.name":"Toplar madeni paraları çeker","upgrades.ball_attracts_coins.tooltip":"Madeni paralar en yakın topu takip eder ve daha yavaş düşer","upgrades.ball_attracts_coins.verbose_description":"\\"Leke\\" ve \\"hayalet paralar\\" ile birleştirdiğinizde, bu, paralarla topların \\"etrafını boyamak\\" için kullanılabilir. Ayrıca, para mıknatısı yerine de kullanılabilir.","upgrades.ball_repulse_ball.name":"Kişisel alan","upgrades.ball_repulse_ball.tooltip":"Toplar topları iter","upgrades.ball_repulse_ball.verbose_description":"Çeyrek ekran genişliğinden daha az uzaklıktaki toplar birbirini itmeye başlayacaktır. Birbirlerine yakınlarsa itme kuvveti daha güçlüdür. Parçacıklar bu kuvvetin uygulandığını sembolize etmek için dışarı fırlayacaktır. Bu avantaj yalnızca birden fazla topunuz varsa sunulur.","upgrades.base_combo.name":"Güçlü temeller","upgrades.base_combo.tooltip":"Kırılan her tuğla için 3 jeton daha","upgrades.base_combo.verbose_description":"Kombonuz normalde seviyenin başında 1\'den başlar ve hiçbir şeye çarpmadan zıpladığınızda 1\'e sıfırlanır. Bu avantajla, kombo 3 puan daha yüksekte başlar, bu yüzden her zaman tuğla başına en az 4 jeton alırsınız. Kombonuz her sıfırlandığında, 1 yerine 4\'e geri döner. Topunuz, kombosunun birden yüksek olduğunu belirtmek için biraz parıldayacaktır.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Daha büyük patlamalar","upgrades.bigger_explosions.verbose_description":"Varsayılan patlama 3x3 kareyi temizler, bununla 5x5 kare olur ve paralara gelen darbe de önemli ölçüde daha güçlüdür. Ekran her patlamadan sonra yanıp söner (temel mod hariç)","upgrades.bigger_puck.name":"Daha büyük kürek","upgrades.bigger_puck.tooltip":"Kolayca daha fazla para yakalayın.","upgrades.bigger_puck.verbose_description":"Daha büyük bir kürek, topu asla ıskalamamanızı ve daha fazla jeton yakalamanızı kolaylaştırır, ayrıca topun sekme açısını hassas bir şekilde ayarlamanızı sağlar (topun açısı yalnızca küreğe çarptığı yere bağlıdır).","upgrades.bricks_attract_ball.name":"Tuğlalar topları çeker","upgrades.bricks_attract_ball.tooltip":"Top çarpacağı ilk {{count}} tuğlaya doğru gider.","upgrades.bricks_attract_ball.verbose_description":"Etkisi daha yüksek seviyelerde daha güçlüdür. Etki durmadan önce vurabilecek tuğla sayısı da daha yüksektir. Etki, top diske çarptığında yeniden silahlanır.","upgrades.bricks_attract_coins.name":"Tuğlalar madeni paraları çeker","upgrades.bricks_attract_coins.tooltip":"Onların orada kalmalarına yardımcı olur","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Şamandıra","upgrades.buoy.tooltip":"Madeni paralar alt satırda {{duration}} saniye boyunca yüzer.","upgrades.buoy.verbose_description":"Etkisi mobil modda en iyi şekilde görülür","upgrades.clairvoyant.name":"Durugörü sahibi","upgrades.clairvoyant.tooltip":"Yaklaşan seviyeleri, tuğla HP\'sini ve top yönünü görün","upgrades.clairvoyant.verbose_description":"Doğru yükseltmeleri seçmenize ve sağlam tuğlalarla neler olup bittiğini anlamanıza yardımcı olur. Seviye 2 ve 3, şüpheli fayda hakkında ek bilgi getirir (döngü modunda erişilebilir)","upgrades.coin_magnet.name":"Madeni para mıknatısı","upgrades.coin_magnet.tooltip":"Kürek paraları çekiyor","upgrades.coin_magnet.verbose_description":"Madeni paraları küreğe yönlendirir. Madeni para zaten küreğe yakınsa etkisi daha güçlüdür.","upgrades.compound_interest.name":"Bileşik faiz","upgrades.compound_interest.tooltip":"+{{lvl}} kombo her kırılan tuğla için, jeton kaybedildiğinde sıfırlanır","upgrades.compound_interest.verbose_description":"Her tuğlayı kırdığınızda kombonuz bir artacak ve kırdığınız her tuğlayla birlikte daha fazla jeton ortaya çıkacaktır. \\nAncak, bu jetonların her birini küreğinizle yakaladığınızdan emin olun, çünkü kaybedilen jeton kombonuzu sıfırlayacaktır.\\nKombonuz minimumun üzerine çıktığında, oyun alanının alt kısmında jetonların oraya gitmemesi gerektiğini hatırlatan kırmızı bir çizgi olacaktır.","upgrades.concave_puck.name":"İçbükey kürek","upgrades.concave_puck.tooltip":"Dikey nişan alma hassasiyetini artırır","upgrades.concave_puck.verbose_description":"Toplar düz bir şekilde yukarı doğru çıkarak başlar ve daha az açıyla zıplar.","upgrades.corner_shot.name":"Köşe vuruşu","upgrades.corner_shot.tooltip":"Küreğinizin ekranın sınırlarıyla örtüşmesini sağlar","upgrades.corner_shot.verbose_description":"Köşelerde nişan almaya yardımcı olur. Daha ileri seviyeler daha uzağa gitmenizi sağlar.","upgrades.double_or_nothing.name":"Çift veya hiç","upgrades.double_or_nothing.tooltip":"Kombo {{multiplier}} kat daha hızlı tırmanır, ancak her sıfırlamada puanınızın % {{percent}}kadarını kaybedersiniz.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"Uzayda Madeni Paralar","upgrades.etherealcoins.tooltip":"Madeni paralar artık yer çekiminden etkilenmiyor","upgrades.etherealcoins.verbose_description":"Paralar birkaç kez zıpladıktan sonra bile hızlarını koruyacak ve artık yer çekiminden etkilenmeyecekler.","upgrades.extra_levels.name":"5 dakika daha","upgrades.extra_levels.tooltip":"7 yerine {{count}} seviye oyna","upgrades.extra_levels.verbose_description":"Varsayılan oyun en fazla 7 seviye sürebilir, ardından oyun biter. \\n\\nBu avantajın her seviyesi bir seviye daha yukarı çıkmanızı sağlar. Son seviyeler genellikle en fazla puanı aldığınız seviyelerdir, bu yüzden fark dramatik olabilir.","upgrades.extra_life.name":"Ekstra Hayat","upgrades.extra_life.tooltip":"Top, kaybedilmeden önce alt çizgide bir kez sekecektir.","upgrades.extra_life.verbose_description":"Normalde bir topunuz vardır ve oyun onu bıraktığınız anda biter.\\n\\nBu yetenek, ekranın altına bir kez topu kurtaracak ve bu süreçte kırılacak beyaz bir çubuk ekler. \\n\\nEkranın altında bir top her zıpladığında bu yeteneğin bir seviyesini kaybedersiniz.","upgrades.forgiving.name":"Bağışlayıcı","upgrades.forgiving.tooltip":"Molaları kaçırmak, komboyu bir kerede azaltmak yerine kademeli olarak azaltır.","upgrades.forgiving.verbose_description":"Her seviyede ilk ıskalama bedava, sonra kombonun %10\'u, sonra %20\'si...","upgrades.fountain_toss.name":"Çeşme atışı","upgrades.fountain_toss.tooltip":"Birkaç jetonu kaçırdığınızda bir miktar kombo kazanın.","upgrades.fountain_toss.verbose_description":"Bir jetonu kaçırdığınızda ve kombonuz seviye*30\'un altındaysa, kombonuzun seviye/kombo oranının bir artması olasılığı vardır.","upgrades.ghost_coins.name":"Hayalet paralar","upgrades.ghost_coins.tooltip":"Madeni paralar yavaşça tuğlaların arasından geçiyor","upgrades.ghost_coins.verbose_description":"Bu bir hata değil, bir özellik! Madeni paralar tuğlaların içinden yavaşça uçar. Daha yüksek seviyeler daha hızlı hareket etmelerini sağlar.","upgrades.golden_goose.name":"Altın yumurtlayan tavuk","upgrades.golden_goose.tooltip":"Madeni paralar bir tuğlaya çarptıktan sonra topa ışınlanır","upgrades.golden_goose.verbose_description":"Bir madeni para bir tuğlaya çarptığında, o madeni parayı en yakın topa ışınla. İkinci seviyede, madeni paralar bir tarafa çarptıktan sonra da ışınlanır.","upgrades.happy_family.name":"Mutlu aile","upgrades.happy_family.tooltip":"Eğer tüm topları oyunda tutarsanız daha fazla jeton kazanırsınız.","upgrades.happy_family.verbose_description":"Her kürek sıçraması için ekstra top başına +1 kombo. Bir top kaybedildiğinde kombo sıfırlanır. Sadece 1\'in üzerindeki top kombo verir.","upgrades.helium.name":"Helyum","upgrades.helium.tooltip":"Yerçekimi küreğin solunda ve sağında tersine döndü","upgrades.helium.verbose_description":"1. seviyede yer çekimi azalır. 2. seviyede paralar yavaşça yukarı doğru süzülür. 3. seviyede gerçekten uçarlar.","upgrades.hot_start.name":"Sıcak başlangıç","upgrades.hot_start.tooltip":" {{start}}kombosundan başla, saniyede{{loss}} kombo","upgrades.hot_start.verbose_description":"Her seviyenin başında kombonuz +30 puanla başlayacak, ancak daha sonra her saniye bir puan düşecek. Etki diğer avantajlarla birikiyor.","upgrades.implosions.name":"İç patlamalar","upgrades.implosions.tooltip":"Patlamalar paraları dışarı atmak yerine içeri çekiyor","upgrades.implosions.verbose_description":"Patlama kuvveti diğer şekilde uygulanır. Daha ileri seviyeler \\"daha büyük patlama\\" olarak işlev görür.","upgrades.left_is_lava.name":"Sol taraftan kaçının","upgrades.left_is_lava.tooltip":"+ Kırılan tuğla başına{{lvl}} kombo. Top ekranın sol tarafına çarparsa kombo sıfırlanır","upgrades.left_is_lava.verbose_description":"Bir tuğlayı kırdığınızda, kombonuz bir artacak, böylece kırdığınız sonraki tüm tuğlalardan bir jeton daha alacaksınız.\\n\\nAncak, kombonuz topunuz sol tarafa çarptığı anda sıfırlanacaktır. \\n\\nKombonuz yükseldiği anda, sol taraf kırmızıya dönerek onlara çarpmamanız gerektiğini hatırlatır.\\n","upgrades.limitless.name":"Sınırsız","upgrades.limitless.tooltip":"Tüm yükseltmelerin maksimum seviyesini {{lvl}} kadar artırın","upgrades.limitless.verbose_description":"Bu yeteneği seçmek, onun kendi sınırını da bir arttırır ve tekrar seçmenize olanak tanır.","upgrades.metamorphosis.name":"Başkalaşım","upgrades.metamorphosis.tooltip":"Her madeni para, {{lvl}} tuğlayı kendi rengiyle lekeleyebilir","upgrades.metamorphosis.verbose_description":"Bu yetenekle, madeni paralar geldikleri tuğlanın renginde olacak ve dokundukları ilk tuğlayı aynı renge boyayacak. Madeni paralar onları kıran topun hızıyla ortaya çıkar, bu da \\"boyamak\\" istediğiniz tuğlalara doğru biraz nişan alabileceğiniz anlamına gelir. 1. seviyede, her madeni para \\"harcanmadan\\" ve içi boş görünmeden önce 1 tuğlayı boyayabilir.","upgrades.minefield.name":"Mayın tarlası","upgrades.minefield.tooltip":"Ekrandaki bomba tuğlası başına +{{percent}}% jeton","upgrades.minefield.verbose_description":"Bombalar patlarken de sayılır.","upgrades.multiball.name":"Çoklu top","upgrades.multiball.tooltip":"Her seviyeye {{count}} topla başlayın.","upgrades.multiball.verbose_description":"Breakout 71\'de topu düşürdüğünüz anda kaybedersiniz. \\n\\nBu avantajla iki top elde edersiniz ve bu yüzden birini kaybetmeyi göze alabilirsiniz. \\n\\nKaybedilen toplar bir sonraki seviyede geri gelir. \\n\\nBirden fazla topa sahip olmak bazı ek avantajları kullanılabilir hale getirir ve tabii ki seviyeyi daha hızlı temizler.","upgrades.nbricks.name":"Sıkı örneklem büyüklüğü","upgrades.nbricks.tooltip":"Kürek sıçraması başına tam olarak {{lvl}} tuğla vurun +{{lvl}} kombo için, aksi takdirde sıfırlanır","upgrades.nbricks.verbose_description":"Bu tuğlaları yok etmeniz gerekmiyor ancak onlara vurmanız gerekiyor. Patlamalarla yok edilen tuğlalar sayılmaz","upgrades.one_more_choice.name":"Ekstra seçenek","upgrades.one_more_choice.tooltip":"Daha fazla seviye atlama, listede {{lvl}} daha fazla seçenek sunacak","upgrades.one_more_choice.verbose_description":"Her yükseltme menüsü bir seçeneğe daha sahip olacak. Seçebileceğiniz yükseltme sayısını artırmaz.","upgrades.ottawa_treaty.name":"Ottawa antlaşması","upgrades.ottawa_treaty.tooltip":"Bir bombanın yakınında tuğla kırmak onu etkisiz hale getirir","upgrades.ottawa_treaty.verbose_description":"Yakındaki bomba renkli bir blokla değiştirilecektir. Eğer sapper\'ınız varsa, top bir sonraki sıçramaya kadar sapper etkisini kaybedecektir. Aynı anda yalnızca bir bomba değiştirilebilir.","upgrades.passive_income.name":"Pasif gelir","upgrades.passive_income.tooltip":"+{{lvl}} kombo / tuğla, kürek önemsizdir {{time}}saniye hareket ettikten sonra","upgrades.passive_income.verbose_description":"Bazı özellikler, topların hiçbir şey yapmanıza gerek kalmadan istediğinizi yapmasına yardımcı olabilir.","upgrades.picky_eater.name":"Seçici yiyen","upgrades.picky_eater.tooltip":"+{{lvl}} kombo her tuğla kırıldığında, top rengi değiştiğinde sıfırlanır","upgrades.picky_eater.verbose_description":"Topunuzla aynı renkte bir tuğlayı kırdığınızda, kombonuz bir artar. \\nEğer farklı bir renkteyse, top yeni rengi alır, ancak kombo sıfırlanır, tabii topun renginde tuğla kalmamışsa. \\nMinimumunuzdan daha yüksek bir kombo elde ettiğinizde, yanlış renkteki tuğlalar kırmızı bir kenarlık alır. \\nBirden fazla topunuz varsa, bunlardan biri bir tuğlaya çarptığında hepsi renk değiştirir.","upgrades.pierce.name":"Delme","upgrades.pierce.tooltip":"Kürek zıplamasından sonra top {{count}} tuğlayı deldi","upgrades.pierce.verbose_description":"Top normalde bir şeye dokunduğu anda zıplar. Bu avantajla, 3 tuğla kırılıncaya kadar yörüngesine devam eder. \\n\\nBundan sonra, 4. tuğlada zıplar ve sayacı sıfırlamak için küreğe dokunmanız gerekir.","upgrades.pierce_color.name":"Renk delme","upgrades.pierce_color.tooltip":"+{{lvl}} topun rengindeki tuğlalara hasar","upgrades.pierce_color.verbose_description":"Bir top aynı renkteki bir tuğlaya çarptığında, engellenmeden geçecektir. \\n\\nFarklı renkteki bir tuğlaya ulaştığında, onu kıracak, rengini alacak ve sekecektir.\\n\\nSağlam tuğlalarınız varsa, top yine de aynı renkteki bir tuğladan sekebilir.","upgrades.puck_repulse_ball.name":"Yumuşak iniş","upgrades.puck_repulse_ball.tooltip":"Kürek topları iter","upgrades.puck_repulse_ball.verbose_description":"Bir top küreğe yaklaştığında yavaşlamaya başlayacak ve hatta küreğe değmeden bile zıplamaya başlayacaktır.","upgrades.rainbow.name":"Gökkuşağı","upgrades.rainbow.tooltip":"Paralar gökkuşağı renklerinde ortaya çıkar.","upgrades.rainbow.verbose_description":"Her seviye renkli jetonların oranını artırır. Renk seviye zamanına bağlıdır.","upgrades.reach.name":"Yukarıdan aşağıya","upgrades.reach.tooltip":"En alt sıradaki N tuğlasına dokunmak komboyu sıfırlar. Aksi takdirde, +N kombo","upgrades.reach.verbose_description":"Eğer sadece bir sıra tuğla varsa veya en alttaki tuğla sırası oyunun tüm genişliğini kaplıyorsa, bu avantaj hiçbir işe yaramaz. Aksi takdirde, bu en alttaki sırayı kırmak komboyu sıfırlarken, başka bir şeyi kırmak komboyu o en alttaki sırada bulunan tuğla sayısı kadar artırır. \\n\\nEn alttaki sıra kırmızıyla vurgulanacaktır.","upgrades.respawn.name":"Yeniden canlanma","upgrades.respawn.tooltip":" {{delay}}saniye sonra tuğlaların %{{percent}}\'ı yeniden ortaya çıkar.","upgrades.respawn.verbose_description":"Bazı parçacık efektleri tuğlaların nerede belireceğini size bildirecektir.","upgrades.right_is_lava.name":"Sağ taraftan kaçının","upgrades.right_is_lava.tooltip":"Tuğla başına +{{lvl}} kombo. Top ekranın sağ tarafına çarparsa kombo sıfırlanır","upgrades.right_is_lava.verbose_description":"Bir tuğlayı kırdığınızda, kombonuz bir artacak, böylece kırdığınız sonraki tüm tuğlalardan bir jeton daha alacaksınız.\\n\\nAncak, topunuz sağ tarafa çarptığı anda kombonuz sıfırlanacaktır.\\n\\nKombonuz yükseldiği anda, onlara çarpmaktan kaçınmanız gerektiğini hatırlatmak için sağ taraf kırmızı olur.","upgrades.sacrifice.name":"Kurban etmek","upgrades.sacrifice.tooltip":"Komboya {{lvl}}can eklendiğinde tüm tuğlalar temizlenir","upgrades.sacrifice.verbose_description":"Bu, komboyu oldukça yükseğe çıkarabilir.","upgrades.sapper.name":"Kazmacı","upgrades.sapper.tooltip":"İlk kırılan tuğla bombaya dönüşür.","upgrades.sapper.verbose_description":"Sadece ortadan kaybolmak yerine, kırdığınız ilk tuğla bir bomba tuğlasıyla değiştirilecektir. Kürek üzerinde topu sektirmek, efekti yeniden etkinleştirir. Bu yeteneği seviyelendirmek, daha fazla bomba yerleştirmenize olanak tanır.","upgrades.shocks.name":"Şoklar","upgrades.shocks.tooltip":"Patlayıcı top çarpışmaları","upgrades.shocks.verbose_description":"İki top çarpıştığında hızları değişir, bir patlama meydana gelir ve onları ayırmak için ek hız kazanırlar.","upgrades.shunt.name":"Şant","upgrades.shunt.tooltip":"Kombonuzun {{percent}}%\'sini seviyeler arasında tutun","upgrades.shunt.verbose_description":"Eğer sıcak başlatma özelliğiniz de varsa, sıcak başlatma özelliği mevcut kombinasyona eklenir","upgrades.side_flip.name":"Sağ elini kullanan","upgrades.side_flip.tooltip":"Sağdan kırılan tuğla başına +{{lvl}} kombo, aksi takdirde -{{loss}} ","upgrades.side_flip.verbose_description":"Bir kombo kazanmak için tuğlanın sağ tarafına vurun, ancak sol tarafına vurmaktan kaçının çünkü bu 2 komboyu kaldırır. Üstten ve alttan vurmanın bir etkisi yoktur.","upgrades.side_kick.name":"Solak","upgrades.side_kick.tooltip":"Soldan kırılan tuğla başına +{{lvl}} kombo, aksi takdirde -{{loss}} ","upgrades.side_kick.verbose_description":"Tuğlanın sol tarafına vurarak bir kombo elde edin, ancak sağ tarafına vurmaktan kaçının çünkü bu 2 komboyu kaldırır. Üstten ve alttan vurmanın bir etkisi yoktur.","upgrades.skip_last.name":"Kolay Temizlik","upgrades.skip_last.tooltip":"Son tuğla patlayacak.","upgrades.skip_last.verbose_description":"Bir sonraki seviyeye geçmek için tüm tuğlaları kırmanız gerekir. Ancak son tuğlaları elde etmek zor olabilir. \\n\\nBir seviyeyi erken bitirmek, yükseltme sırasında ekstra seçenekler sunar. Tuğlaları asla kaçırmamak da çok faydalıdır. \\n\\nYani son tuğlaları kırmakta zorlanıyorsanız, bu yeteneği birkaç kez elde etmek yardımcı olabilir.","upgrades.slow_down.name":"Daha yavaş top","upgrades.slow_down.tooltip":"Top daha yavaş hareket ediyor","upgrades.slow_down.verbose_description":"Top nispeten yavaş başlar, ancak oyununuzun her seviyesinde biraz daha hızlı başlayacaktır. \\n\\nAyrıca bir seviyede çok zaman geçirirseniz hızlanacaktır. \\n\\nBu avantaj onu daha yönetilebilir hale getirir. \\n\\nMenüde çocuk modunu etkinleştirerek her seferinde başlangıçta alabilirsiniz.","upgrades.smaller_puck.name":"Daha küçük kürek","upgrades.smaller_puck.tooltip":"Ayrıca +{{percent}}% jeton verir","upgrades.smaller_puck.verbose_description":"Bu, k hion.tooltip":"Yanlarda ve üstte her vuruşta +1 kombo, kürek sıçraması başına +{{max}} \'a kadar. Önce sıçramadan bir tuğlaya çarptığınızda kombo sıfırlanır.","upgrades.three_cushion.verbose_description":"Bir tarafa yapılan her vuruş komboyu bir, +3\'e kadar yükseltir. Bundan sonra, bir sonraki kürek sıçramasına kadar kombo kazanılmaz.","upgrades.top_is_lava.name":"Sınır gökyüzüdür","upgrades.top_is_lava.tooltip":"Tuğla başına +{{lvl}} kombo, tepeye vurulduğunda sıfırlanır","upgrades.top_is_lava.verbose_description":"Bir tuğlayı kırdığınızda, kombonuz bir artar. Ancak, topunuz ekranın tepesine çarptığı anda kombonuz sıfırlanır. \\n\\nKombonuz minimumun üzerinde olduğunda, ona çarpmamanız gerektiğini hatırlatmak için üstte kırmızı bir çubuk belirir.","upgrades.trampoline.name":"Trambolin","upgrades.trampoline.tooltip":"+ kürek sıçraması başına{{lvl}} kombo,- herhangi bir sınırda sıçrama başına{{lvl}} kombo","upgrades.trampoline.verbose_description":"Sıfırlama koşulu eklemeyen nadir kombo yükseltmelerinden biri","upgrades.transparency.name":"Şeffaflık","upgrades.transparency.tooltip":"Top ekranın üst kısmında şeffaf hale gelir. Tüm toplar tam şeffaflığa ulaştığında +{{percent}} % jeton","upgrades.transparency.verbose_description":"Daha yüksek seviyeler topun daha çabuk şeffaf olmasını sağlar ve puan bonusunu artırır.","upgrades.trickledown.name":"Sızma ekonomisi","upgrades.trickledown.tooltip":"Paralar ekranın üst kısmında görünür.","upgrades.trickledown.verbose_description":"Kenara biraz para ayırmanıza yardımcı olabilir.","upgrades.unbounded.name":"Dolgu","upgrades.unbounded.tooltip":"Seviyenin sağına ve soluna boşluk ekler, ancak küreğiniz o kadar uzağa gidemez.","upgrades.unbounded.verbose_description":"Bir diğer geliştirme ise küreğinizin erişim mesafesini uzatmanıza yardımcı olabilir.","upgrades.viscosity.name":"Viskozite","upgrades.viscosity.tooltip":"Daha yavaş para düşüşü","upgrades.viscosity.verbose_description":"Madeni paralar normalde yer çekimi ve patlamalarla oldukça yüksek hızlara ulaşır. \\n\\nBu yetenek, sanki bir tür viskoz sıvının içindeymiş gibi sürekli olarak yavaşlamalarını sağlar. \\n\\nBu, onları yakalamayı kolaylaştırır ve madeni paranın hareketini etkileyen yeteneklerle güzel bir şekilde birleşir.","upgrades.wind.name":"Rüzgâr","upgrades.wind.tooltip":"Kürek pozisyonu rüzgar yaratır","upgrades.wind.verbose_description":"Rüzgar küreğin pozisyonuna bağlıdır: sol sola eser, sağ sağa eser. Hem topları hem de paraları etkiler.","upgrades.wrap_left.name":"Sola doğru sarın","upgrades.wrap_left.tooltip":"Sol tarafa vurmak topu sağ tarafa ışınlar","upgrades.wrap_left.verbose_description":"Daha yüksek seviyelerde ışınlanma paraları da var.","upgrades.wrap_right.name":"Sağa doğru sarın","upgrades.wrap_right.tooltip":"Sağ tarafa vurmak topu sol tarafa ışınlar","upgrades.wrap_right.verbose_description":"Daha yüksek seviyelerde ışınlanma paraları da var.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"Top küreğe doğru düşer","upgrades.yoyo.verbose_description":"Telekinezinin tam tersi, topun aşağı düşerken kontrol edilmesi.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"Bombaları tetiklemezseniz daha fazla para kazanırsınız","upgrades.zen.verbose_description":"+{{lvl}} kombo her 3 saniyede bir, patlama olduğunda sıfırlanır"}');var j={};j=JSON.parse('{"confirmRestart.no":"Abbrechen","confirmRestart.text":"Sie sind dabei, ein neues Spiel zu beginnen. Sind Sie sicher, dass Sie das wollen?","confirmRestart.title":"Neues Spiel beginnen?","confirmRestart.yes":"Spiel neustarten","editor.editing.bigger":"Level vergrößern","editor.editing.color":"Wähle eine Farbe aus der Farbliste (max. 5 pro Level)","editor.editing.copied":"","editor.editing.copy":"Levelcode kopieren","editor.editing.copy_help":"Teile ihn im Kanal #levels auf unserem Discord","editor.editing.credit":"Credits und Quellcode","editor.editing.credit_prompt":"Gib die URL oder Erklärung deines Levels ein.","editor.editing.delete":"Level löschen","editor.editing.down":"Bewege alle Steine nach unten","editor.editing.help":"Klicke dann auf eine Kachel, um sie einzufärben.","editor.editing.left":"Bewege alle Steine nach links","editor.editing.play":"Spiele dieses Level","editor.editing.rename":"Levelname","editor.editing.rename_prompt":"Gib einen neuen Namen für das Level ein","editor.editing.right":"Bewege alle Steine nach rechts","editor.editing.show_code":"","editor.editing.show_code_help":"","editor.editing.smaller":"Level verkleinern","editor.editing.title":"Bearbeite Level: {{name}}","editor.editing.up":"Bewege alle Steine nach oben","editor.help":"Erstelle benutzerdefinierte Level und gib sie frei, um sie in das Spiel aufzunehmen.","editor.import":"Importiere ein Level","editor.import_instruction":"Füge einen Levelcode ein, um ihn in deine Levelliste zu importieren","editor.locked":"Erreiche eine Gesamtpunktzahl von {{min}} zum freizuschalten","editor.new_level":"Neues Level","editor.title":"Level-Editor","gameOver.creative":"Dieses Spiel wird nicht aufgezeichnet.","gameOver.cumulative_total":"Ihre Gesamtpunktzahl ist von {{startTs}} auf {{endTs}}gestiegen.","gameOver.lost.summary":"Du hast den Ball fallen lassen, nachdem du {{score}} Münzen gesammelt hast.","gameOver.lost.title":"Spiel vorbei","gameOver.stats.balls_lost":"Verlorene Bälle","gameOver.stats.bricks_broken":"Steine gebrochen","gameOver.stats.bricks_per_minute":"Zerbrochene Steine pro Minute","gameOver.stats.catch_rate":"Fangquote","gameOver.stats.combo_avg":"Durchschnittliche Combo","gameOver.stats.combo_max":"Maximale Combo","gameOver.stats.duration_per_level":"Dauer pro Level","gameOver.stats.hit_rate":"Trefferquote","gameOver.stats.intro":"","gameOver.stats.level_reached":"Erreichtes Level","gameOver.stats.total_score":"Gesamtpunktzahl","gameOver.stats.upgrades_applied":"Angewandte Upgrades","gameOver.stats_intro":"Hier findest du deine Spielstatistik im Vergleich zu Ihren {{count}} besten Spielen.","gameOver.unlocked_perk":"Upgrade freigeschaltet","gameOver.unlocked_perk_plural":"Du hast gerade {{count}} Vergünstigungen freigeschaltet","gameOver.win.summary":"Das Spiel ist vorbei. Du hast {{score}} Münzen eingesteckt.","gameOver.win.title":"Du hast dieses Spiel abgeschlossen","help.content":"## Ziel\\n\\nSammle in 7 Levels so viele Münzen wie möglich ein.\\nDie Münzen erscheinen, wenn du Ziegel zerbrichst.\\nFangen Sie sie mit Ihrem Paddel auf, um Ihre Punktzahl zu erhöhen.\\nIhr Punktestand wird in der oberen rechten Ecke des Bildschirms angezeigt.\\nLassen Sie den Ball nicht fallen, sonst ist das Spiel vorbei.\\n\\nWenn du alle Ziegel zerstört hast, kannst du dir ein Upgrade aussuchen.\\n\\n## Upgrades\\n\\nDie Upgrades, die du wählst, gelten bis zum Ende des Laufs.\\nEinige können mehrmals ausgewählt werden, um die Wirkung zu verstärken.\\nEinige helfen beim Zielen oder machen das Spiel auf andere Weise einfacher.\\nEinige sind nur in Kombination nützlich.\\n\\nZu Beginn eines jeden Spiels erhältst du immer ein Upgrade.\\nIhr Symbol dient als Baustein des ersten Levels.\\nDu kannst die Start-Upgrades in den Einstellungen auswählen.\\n\\nViele Upgrades wirken sich auf deine Kombo aus.\\n\\n## Combo\\n\\nDeine \\"Combo\\" ist die Anzahl der Münzen, die beim Zerbrechen eines Steins entstehen.\\nSie wird auf deinem Paddel angezeigt, zum Beispiel x4 bedeutet, dass jeder Stein 4 Münzen hervorbringt.\\nDie meisten Upgrades, die den Combo erhöhen, fügen auch eine Bedingung hinzu, um ihn zurückzusetzen.\\nDie Kombo wird auch zurückgesetzt, wenn der Ball zum Schläger zurückkehrt, ohne einen Stein zu treffen.\\nIn diesem Fall wird eine \\"Miss\\"-Meldung angezeigt.\\n\\nVersuchen Sie, jedes Mal auf einen Stein zu zielen.\\n\\n## Anvisieren\\n\\nNur die Position des Balls auf dem Schläger entscheidet darüber, wie der Ball abprallt.\\nWenn der Ball das Paddel genau in der Mitte trifft, prallt er senkrecht nach oben ab.\\nWenn du ihn mehr auf einer Seite triffst, hat er einen größeren Winkel.\\nDie Paddelgeschwindigkeit und der Auftreffwinkel haben keinen Einfluss auf die Richtung des Balls nach dem Aufprall.\\n\\nViele Upgrades, die beim Zielen helfen, können freigeschaltet werden.\\n\\n## Freischaltungen\\n\\nWenn du Breakout 71 zum ersten Mal spielst, sind die meisten Upgrades und Levels gesperrt.\\nUpgrades werden freigeschaltet, indem du einfach spielst und viele Münzen fängst.\\nDie ersten Level werden durch das Erreichen einer hohen Punktzahl freigeschaltet.\\nSpätere Levels fügen eine Bedingung hinzu, welche Vergünstigungen Sie auswählen können.\\n\\nEine hohe Punktzahl zu erreichen ist viel einfacher, wenn du nach jedem Level mehrere Upgrades erhältst.\\n\\n## Re-Rolls und kostenlose Upgrades\\n\\nWenn du gut spielst, bekommst du ein zusätzliches Upgrade, das du auswählen kannst:\\n\\n- Schaffe das Level in weniger als {{levelTimeGood}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedGood}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateGood}}% der Münzen\\n- Verfehle die Steine weniger als {{missesGood}} Mal\\n\\nDu bekommst auch einen Re-Roll, mit dem du Upgrades überspringen kannst, wenn du noch besser abschneidest:\\n\\n- Schaffe ein Level in weniger als {{levelTimeBest}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedBest}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateBest}}% der Münzen\\n- Verfehle die Steine weniger als {{missesBest}} Mal\\n\\nMit einer Option in den Einstellungen können Sie diese Statistiken anzeigen lassen","help.help":"Erfahre mehr über das Spiel","help.levels":"Level","help.title":"Hilfe","help.upgrades":"## Upgrades","history.columns.score":"Punktzahl","history.columns.started":"Datum","history.help":"Statistik deiner {{count}} besten Spiele.","history.include_past_versions":"Auch frühere Versionen anzeigen","history.locked":"Spiele mindestens zehn Spiele spielen zum freizuschalten","history.title":"Spielverlauf","lab.help":"Probiere beliebige Konstruktionen aus","lab.instructions":"Wähle Upgrades und ein Level aus und klicke darüber auf die Schaltfläche „Play“","lab.menu_entry":"Kreativ-Modus","lab.play":"Spielen","lab.reset":"Zurücksetzen","lab.select_level":"Wähle ein Level zum Spielen","lab.unlocks_at":"Wird bei Gesamtpunktzahl {{score}} freigeschaltet","level_up.after_buttons":"Du hast gerade Level {{level}}/{{max}} beendet.","level_up.before_buttons":"Du hast {{score}} Münzen {{catchGain}} aus {{levelSpawnedCoins}} in {{time}} Sekunden {{timeGain}} gefangen.\\n\\nDu hast {{levelMisses}} Mal danebengeschossen {{missesGain}} und {{levelWallBounces}} Mal die Wände oder die Decke getroffen {{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Versuche, alle Münzen zu fangen, verpasse nie die Steine, stoße nie an die Wände/Decke oder schaffe das Level unter 30 Sekunden, um zusätzliche Upgrades zu erhalten.","level_up.compliment_good":"Gut gemacht!","level_up.compliment_perfect":"Beeindruckend, machen Sie weiter so!","level_up.pick_upgrade_title":"Wählen Sie ein Upgrade","level_up.plus_one_upgrade":"(+1 Upgrade)","level_up.plus_one_upgrade_and_reroll":"(+1 Upgrade und +1 Neuwurf)","level_up.reroll":"Neu würfeln ({{count}})","level_up.reroll_help":"Bietet neue Auswahl","level_up.upgrade_perk_to_level":"  lvl {{level}}","main_menu.basic":"","main_menu.basic_help":"","main_menu.colorful_coins":"","main_menu.colorful_coins_help":"","main_menu.comboIncreaseTexts":"","main_menu.comboIncreaseTexts_help":"","main_menu.contrast":"","main_menu.contrast_help":"","main_menu.credit_levels":"","main_menu.donate":"Sie haben schon {{hours}} Stunden gespielt","main_menu.donate_help":"Wie wäre es mit einer Spende? Sie können diese Erinnerung in den Einstellungen ausblenden.","main_menu.donation_reminder":"","main_menu.donation_reminder_help":"","main_menu.download_save_file":"","main_menu.download_save_file_help":"","main_menu.extra_bright":"","main_menu.extra_bright_help":"","main_menu.fullscreen":"","main_menu.fullscreen_help":"","main_menu.help_content":"","main_menu.help_h
