ivo","settings.match_pixel_ratio":"Renderizar na resolução nativa do monitor","settings.match_pixel_ratio_help":"Mais nítido, mas mais lento a renderizar.","settings.max_coins":"Máximo de {{max}} moedas no ecrã","settings.max_coins_help":"Apenas um cosmético, nenhum efeito na pontuação","settings.mobile":"Modo para telemóvel","settings.mobile_help":"Deixa um espaço extra sob a raquete.","settings.pointer_lock":"Travar o ponteiro do rato","settings.pointer_lock_help":"Trava e esconde o cursor do rato.","settings.precise_lighting":"Iluminação precisa","settings.precise_lighting_help":"Usar uma grade menor para o efeito de luz de fundo","settings.probabilistic_lighting":"Visão persistente","settings.probabilistic_lighting_help":"Melhora o desempenho quando houver mais que 150 moedas, reutilizando algumas luzes do quadro anterior","settings.record":"Gravar a partida","settings.record_download":"Descarregar vídeo ({{size}} MB)","settings.record_help":"Grave um vídeo de cada nível.","settings.reset":"Reiniciar a Partida","settings.reset_cancel":"Não","settings.reset_confirm":"Sim","settings.reset_help":"Apagar a pontuação mais alta, tempo de jogo e estatísticas","settings.reset_instruction":"Vai perder todo o progresso feito no jogo, tem certeza?","settings.save_file_error":"Erro carregando os dados","settings.save_file_loaded":"Gravar ficheiro de dados","settings.save_file_loaded_help":"A app agora vai reiniciar para aplicar os seus dados gravados","settings.save_file_loaded_ok":"Ok","settings.show_fps":"Contador de FPS","settings.show_fps_help":"Monitorar o desempenho da app","settings.show_stats":"Mostrar estatísticas em tempo real","settings.show_stats_help":"Moedas, tempo, erros","settings.smooth_lighting":"Iluminação suave","settings.smooth_lighting_help":"Borrar os efeitos de luz de fundo para fazê-los parecer menos quadrado. Aumenta o lag.","settings.sounds":"Sons do jogo","settings.sounds_help":"Bipis, bupis e brrrr","settings.stress_test":"Teste de stress","settings.stress_test_help":"Começa um jogo controlado por um bot com um número muito alto de moedas, para testar a performance do seu dispositivo.","settings.suggestions.applied":"Sugestão de desempenho aplicada!","settings.suggestions.basic_mode":"Sugestão: ligue o modo básico para melhorar o desempenho.","settings.suggestions.record":"Sugestão: Desative a gravação de vídeo para melhorar o desempenho.","settings.suggestions.reduce_brightness":"Sugestão: reduza o tamanho do espaço escuro para melhorar o desempenho.","settings.suggestions.reduce_coins":"Sugestão: melhorar o desempenho, limitando o máximo de moedas no ecrã a {{max}}.","settings.suggestions.simpler_lights":"Sugestão: simplificar os cálculos da luz para melhorar o desempenho.","settings.touch_delayed_start":"Início atrasado no telemóvel","settings.touch_delayed_start_help":"3, 2, 1, Vai no início de um nível","starting_perks.checked":"Quando começar um novo jogo, uma dessas vantagens será-lhe dada. Clique numa vantagem para excluí-la.","starting_perks.help":"Escolha possíveis melhorias iniciais","starting_perks.random":"Todos os benefícios foram removidos, a escolha será aleatória.","starting_perks.title":"Vantagens iniciais","starting_perks.unchecked":"As vantagens abaixo não são oferecidas como vantagens iniciais, mas pode clicar para adicioná-las à seleção.","unlocks.category.advanced":"# Atualizações avançadas\\n\\nEsses normalmente não são muito úteis por si mesmos, mas podem se tornar muito poderosos quando combinados com a atualização de combinação certa.","unlocks.category.beginner":"## Melhorias amigáveis para iniciantes\\n\\nEssas atualizações são muito úteis para iniciantes e ajudam a jogar por mais tempo e errar menos.","unlocks.category.combo":"## Melhorias para combos\\n\\nEssas melhorias ajudam a aumentar o seu combo progressivamente, mas também adicionar uma condição que reinicia-o. Escolher um é uma boa ideia, escolher vários aumenta o risco e a recompensa.","unlocks.category.combo_boost":"## Impulsionadores de combos\\n\\nEssas melhorias aumentam o multiplicador de combo ou o combo sem adicionar uma condição que o reinicia.","unlocks.category.simple":"# Melhorias de ajuda\\n\\nEssas atualizações são úteis em quase qualquer compilação.","unlocks.greyed_out_help":"As atualizações acinzentadas podem ser desbloqueadas aumentando a sua pontuação total. A pontuação total aumenta cada vez que pontuar no jogo.","unlocks.intro":"A sua pontuação total é {{ts}}. Clique numa melhoria abaixo para iniciar um jogo com ela.","unlocks.just_unlocked":"Nível desbloqueado","unlocks.just_unlocked_plural":"Acabou de desbloquear {{count}} níveis","unlocks.level":"Desbloqueou {{unlocked}} de {{out_of}} níveis","unlocks.level_description":"Um nível {{size}}x{{size}} com {{bricks}} blocos, {{colors}} cores e {{bombs}} bombas.","unlocks.levels":"Níveis desbloqueados","unlocks.minScore":"Alcance ${{minScore}} numa partida para desbloquear.","unlocks.minScoreWithPerks":"Alcance ${{minScore}} pontos numa corrida com {{required}} mas sem {{forbidden}} para desbloquear.","unlocks.minScoreWithPerksNoForbidden":"Alcance ${{minScore}} em uma corrida com {{required}} para desbloquear.","unlocks.minTotalScore":"Acumule um total de ${{score}} pontos","unlocks.reached":"A sua melhor pontuação foi {{reached}}.","unlocks.title_upgrades":"{{unlocked}} melhorias de {{out_of}} desbloqueadas","unlocks.try":"Testar","unlocks.upgrades":"Melhorias desbloqueadas","unlocks.use":"Usar","upgrades.addiction.name":"Vício","upgrades.addiction.tooltip":"Mais moedas se quebrar tijolos sem parar","upgrades.addiction.verbose_description":"+{{lvl}} combo por bloco quebrado, combo reinicia {{delay}} segundos após quebrar um bloco. A contagem regressiva só começa depois de quebrar o primeiro bloco de cada nível. Irá parar assim que todos os blocos forem destruídos.","upgrades.asceticism.name":"Ascetismo","upgrades.asceticism.tooltip":"+{{combo}} de combo por bloco quebrado, -{{combo}} por moedas coletadas.","upgrades.asceticism.verbose_description":"Vai precisar guardar as moedas em algum lugar enquanto o combo sobe.","upgrades.ball_attract_ball.name":"Gravidade","upgrades.ball_attract_ball.tooltip":"Bolas atraem bolas","upgrades.ball_attract_ball.verbose_description":"As bolas que estão a mais que \\"3/4 da largura da área do jogo\\" de distância começarão a atrair uma à outra.\\n\\nA força da atração é mais forte quando estão longe uma da outra.\\n\\nPartículas de arco-íris voarão para simbolizar a força da atração. Esta vantagem só é oferecida se tem mais que uma bola.","upgrades.ball_attracts_coins.name":"Bolas atraem moedas","upgrades.ball_attracts_coins.tooltip":"Moedas seguem a bola mais próxima","upgrades.ball_attracts_coins.verbose_description":"Isto poderia ser usado para \\"pintar ao redor\\" as bolas com moedas, se combinar com \\"manchar\\" e \\"moedas fantasmas\\". Também funciona como um substituto para o ímã de moeda.","upgrades.ball_repulse_ball.name":"Espaço pessoal","upgrades.ball_repulse_ball.tooltip":"Bolas repelem bolas","upgrades.ball_repulse_ball.verbose_description":"As bolas que estão a menos que um quarto da largura do ercã vão começar a repelir-se. A força de repulsão é mais forte se elas estão perto umas das outras. Partículas serão lançadas para simbolizar a aplicação desta força. Esta vantagem só é oferecida se tem mais do que uma bola.","upgrades.base_combo.name":"Fundações fortes","upgrades.base_combo.tooltip":"Mais 3 moedas por bloco quebrado","upgrades.base_combo.verbose_description":"A sua combinação normalmente começa em 1 no início do nível e reinicia para 1 se não acertar nada. Com esta vantagem, a combinação começa 3 pontos mais alto, então sempre terá pelo menos 4 moedas por tijolo. Sempre que o seu combo redefinir, ele vai voltar para 4 e não 1. A sua bola vai brilhar um pouco para indicar que a sua combinação é maior que uma. No nível 2, adiciona 4 moedas, então 5, depois 6…","upgrades.bigger_explosions.name":"Cabum","upgrades.bigger_explosions.tooltip":"Explosões maiores","upgrades.bigger_explosions.verbose_description":"A explosão normal limpa uma área de 3x3, com isto torna-se uma área de 5x5, e a propulsão nas moedas também é significativamente maior. O ecrã piscará após cada explosão (exceto no modo básico)","upgrades.bigger_puck.name":"Raquete maior","upgrades.bigger_puck.tooltip":"Apanhe moedas mais facilmente","upgrades.bigger_puck.verbose_description":"Uma raquete maior torna mais fácil nunca perder a bola e apanhar mais moedas, e também para mirar mais precisamente (o ângulo da bola só depende de onde ela atinge a raquete).","upgrades.bricks_attract_ball.name":"Blocos atraem bolas","upgrades.bricks_attract_ball.tooltip":"A bola vai para tijolos mais próximos","upgrades.bricks_attract_ball.verbose_description":"A bola vai para o primeiro {{count}} tijolos que vai bater. O efeito é mais forte em níveis mais elevados. O número de tijolos que pode bater antes que o efeito pare também é maior. O efeito diminui quando a bola atinge a raquete.","upgrades.bricks_attract_coins.name":"Blocos atraem moedas","upgrades.bricks_attract_coins.tooltip":"Mantêm elas lá em cima","upgrades.bricks_attract_coins.verbose_description":"Moedas serão atraídas para blocos próximos. Em níveis posteriores, a atração é mais forte.","upgrades.buoy.name":"Boia","upgrades.buoy.tooltip":"Moedas flutuam por {{duration}} segundos na linha inferior.","upgrades.buoy.verbose_description":"O efeito é mais visível no modo para telemóvel","upgrades.chill.name":"Calma","upgrades.chill.tooltip":"Não há mais melhorias, níveis ilimitados.","upgrades.chill.verbose_description":"A bola também acelera muito mais devagar.","upgrades.clairvoyant.name":"Clarividência","upgrades.clairvoyant.tooltip":"Veja os próximos níveis, HP dos blocos e direção da bola","upgrades.clairvoyant.verbose_description":"Ajuda-o a escolher as atualizações certas e perceber o que acontece com blocos robustos. Nível 2 e 3 trazem conhecimentos adicionais de uso duvidoso (acessível no modo loop)","upgrades.coin_magnet.name":"Imã de moedas","upgrades.coin_magnet.tooltip":"A raquete atrai moedas","upgrades.coin_magnet.verbose_description":"Direciona as moedas para a raquete. O efeito é mais forte se a moeda já estiver perto.","upgrades.compound_interest.name":"Juros compostos","upgrades.compound_interest.tooltip":"Mais moedas se apanhar todas as moedas","upgrades.compound_interest.verbose_description":"O seu combo vai crescer por um a cada vez que quebrar um bloco, gerando mais e mais moedas a cada tijolo que quebrar.\\nCertifique-se de apanhar cada uma dessas moedas com a sua raquete, pois qualquer moeda perdida irá reiniciar o seu combo.\\nUma vez que o seu combo estiver acima do mínimo, o fundo da área de jogo terá uma linha vermelha para lembrar que as moedas não devem cair.","upgrades.concave_puck.name":"Raquete côncava","upgrades.concave_puck.tooltip":"Melhora a precisão vertical","upgrades.concave_puck.verbose_description":"As bolas começam o nível indo direto para cima e quicam com menos ângulo.","upgrades.corner_shot.name":"Escanteio","upgrades.corner_shot.tooltip":"Permite que a raquete adentre nas bordas do ecrã","upgrades.corner_shot.verbose_description":"Ajuda com a mira nos cantos. Mais níveis permitem que entre mais profundamente.","upgrades.double_or_nothing.name":"Tudo ou nada","upgrades.double_or_nothing.tooltip":"Combo sobe {{multiplier}} vezes mais rápido, mas vai perder {{percent}}% da sua pontuação a cada reinício.","upgrades.double_or_nothing.verbose_description":"O reinício do combo só conta quando a sua combinação estiver acima do mínimo","upgrades.etherealcoins.name":"Moedas, no Espaço","upgrades.etherealcoins.tooltip":"As moedas não são mais afetadas pela gravidade","upgrades.etherealcoins.verbose_description":"As moedas manterão a sua velocidade mesmo após rebater várias vezes e já não serão afetadas pela gravidade.","upgrades.extra_levels.name":"mais 5 minutos","upgrades.extra_levels.tooltip":"Jogue {{count}} níveis ao invés de 7","upgrades.extra_levels.verbose_description":"O jogo padrão pode durar um máximo de 7 níveis, após isto o jogo está termina.\\n\\nCada nível desta vantagem permite que jogue mais uma fase. Os últimos níveis são muitas vezes aqueles onde faz mais pontuação, então a diferença pode ser dramática.","upgrades.extra_life.name":"Vida extra","upgrades.extra_life.tooltip":"Grava a sua última bola se estiver prestes a cair","upgrades.extra_life.verbose_description":"A vida será consumida no processo. Vidas extras aparecem como linhas atrás da raquete.","upgrades.forgiving.name":"Errar é humano","upgrades.forgiving.tooltip":"Mantenha a maior parte da sua combinação quando errar","upgrades.forgiving.verbose_description":"A primeira falta por nível é livre, daí reduz 10% do combo, então 20% e por aí vai.","upgrades.fountain_toss.name":"Fonte dos desejos","upgrades.fountain_toss.tooltip":"Ganhe combo quando perder algumas moedas.","upgrades.fountain_toss.verbose_description":"Quando perder uma moeda e o seu combo estiver abaixo do nível*30, o seu nível/combo pode crescer por um.","upgrades.ghost_coins.name":"Moedas fantasma","upgrades.ghost_coins.tooltip":"Moedas passam lentamente através de blocos","upgrades.ghost_coins.verbose_description":"Não é um bug, é uma função! As moedas voam através de tijolos lentamente. Níveis mais elevados permitem que eles se movam mais rápido.","upgrades.golden_goose.name":"Gansa dourada","upgrades.golden_goose.tooltip":"Moedas teletransportam-se para a bola depois de tocar num bloco","upgrades.golden_goose.verbose_description":"Sempre que uma moeda tocar num bloco, essa moeda teletransportará-se para a bola mais próxima. No nível dois, as moedas teletransportam-se depois de bater nos lados também.","upgrades.happy_family.name":"Família feliz","upgrades.happy_family.tooltip":"Mais moedas se vocẽ manter todas as bolas na partida.","upgrades.happy_family.verbose_description":"+1 combo por bola extra quicada na raquete. Combo reinicia quando uma bola é perdida. Só a bola acima de 1 dá combinação.","upgrades.helium.name":"Hélio","upgrades.helium.tooltip":"Gravidade limitada nos lados da raquete","upgrades.helium.verbose_description":"No nível 1, a gravidade é reduzida. No nível 2, as moedas flutuam lentamente. No nível 3 elas realmente voam.","upgrades.hot_start.name":"Arrancada","upgrades.hot_start.tooltip":"Mais moedas se vencer o nível antes de 30 segundos","upgrades.hot_start.verbose_description":"No início de cada nível, o seu combo vai começar com +{{start}} pontos, mas então cada segundo será diminuído por {{loss}}. O efeito empilha-se com outras vantagens.","upgrades.implosions.name":"Implosões","upgrades.implosions.tooltip":"Explosões sugam moedas ao invés de propulsioná-las","upgrades.implosions.verbose_description":"A força de explosão é aplicada do outro modo. Mais níveis atuam como uma \\"explosão maior\\"","upgrades.left_is_lava.name":"Evite o lado esquerdo","upgrades.left_is_lava.tooltip":"Mais moedas se não tocar no lado esquerdo","upgrades.left_is_lava.verbose_description":"Sempre que quebrar um bloco, o seu combo vai aumentar por um, então vai ter mais uma moeda de todos os blocos que quebrar.\\n\\nNo entanto, o seu combo irá reiniciar assim que a sua bola atingir o lado esquerdo.\\n\\nQuando o seu combo aumenta, o lado esquerdo fica vermelho para fazê-lo lembrar que deve evitá-lo\\n\\nNo nível 2, a borda é completamente removida e as suas bolas e moedas podem ser perdidas.","upgrades.limitless.name":"Sem limites","upgrades.limitless.tooltip":"Aumentar o nível máximo de todas as melhorias por {{lvl}}","upgrades.limitless.verbose_description":"Escolher esta vantagem também aumenta o seu próprio limite por um, deixando-a escolher novamente.","upgrades.metamorphosis.name":"Metamorfose","upgrades.metamorphosis.tooltip":"Cada moeda pode manchar {{lvl}} bloco(s) com a sua cor","upgrades.metamorphosis.verbose_description":"Com este vantagem, as moedas serão da cor do tijolo de que vieram e irão colorir o primeiro tijolo que tocam. Moedas surgem com a mesma velocidade da bola que as invocou, o que significa que pode mirar nos blocos que quer \\"pintar\\". No nível 1, cada moeda pode colorir 1 bloco antes de serem \\"gastas\\" e aparecerem ocas.","upgrades.minefield.name":"Campo Minado","upgrades.minefield.tooltip":"+{{percent}}% de moedas por chumbas no ecrã","upgrades.minefield.verbose_description":"As chumbas são contadas enquanto estão explodindo também.","upgrades.multiball.name":"Multi bolas","upgrades.multiball.tooltip":"Comece cada nível com {{count}} bolas.","upgrades.multiball.verbose_description":"Assim que largar a bola no Breakout 71, perde.\\n\\nCom esta vantagem, tem duas bolas e assim pode dar-se ao luxo de perder uma.\\n\\nAs bolas perdidas voltam no próximo nível.\\n\\nTer mais que uma bola torna outras vantagens disponíveis e é claro, limpa o nível mais rápido.","upgrades.nbricks.name":"Tamanho restrito da amostra","upgrades.nbricks.tooltip":"Mais moedas se bater em blocos um por um.","upgrades.nbricks.verbose_description":"Bata exatamente {{lvl}} tijolos por quicada para +{{lvl}} combo, caso contrário ele reinicia. Não precisa necessariamente destruir esses blocos, mas precisa bater neles. Blocos destruídos por explosões não contam","upgrades.one_more_choice.name":"Escolha extra","upgrades.one_more_choice.tooltip":"Mais opções de melhorias","upgrades.one_more_choice.verbose_description":"Cada menu de melhorias terá mais uma opção. Não aumenta o número de melhorias que pode escolher.","upgrades.ottawa_treaty.name":"Tratado de Ottawa","upgrades.ottawa_treaty.tooltip":"Quebrar um bloco perto de uma chumba a desarma","upgrades.ottawa_treaty.verbose_description":"A chumba próxima será substituída por um bloco colorido. Se  tiver sapador, a bola perderá o seu efeito até a próxima rebatida. Só uma chumba pode ser substituída por vez.","upgrades.passive_income.name":"Renda passiva","upgrades.passive_income.tooltip":"Mais moedas, porém uma raquete que se move não apanha moedas ou bolas","upgrades.passive_income.verbose_description":"+{{lvl}} de combo por bloco quebrado, a raquete é imaterial por {{time}} segundos depois de se mover. Algumas vantagens podem fazem as bolas se moverem sem nenhuma interação sua.","upgrades.picky_eater.name":"Chato para comer","upgrades.picky_eater.tooltip":"Mais moedas se quebrar blocos da cor da bola","upgrades.picky_eater.verbose_description":"Sempre que quebrar um bloco com a mesma cor que a sua bola, o seu combo aumenta pelo número de cores no ecrã menos uma.\\nSe for uma cor diferente, a bola fica com a nova cor, mas o combo reinicia, a menos que não haja blocos da cor da bola.\\nUma vez que obter um combo superior ao seu mínimo, os blocos de cor diferente obterão uma borda vermelha.\\nSe tem mais que uma bola, todos eles mudarão de cor sempre que uma delas atingir um bloco.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Bola perfura {{count}} tijolos após um remo","upgrades.pierce.verbose_description":"A bola normalmente salta assim que toca algo. Com este garfo, continuará sua trajetória para até 3 tijolos quebrados.\\n\\nDepois disso, ele vai saltar no 4o tijolo, e você vai precisar tocar o remo para redefinir o contador.","upgrades.pierce_color.name":"Torcer de cor","upgrades.pierce_color.tooltip":"A bola passa por tijolos da mesma cor","upgrades.pierce_color.verbose_description":"Normalmente, as bolas fazem 1 dano e tijolos têm 1 ponto de saúde (HP). S\\nCada nível desta tinta aumentar as bolas de dano fazer a tijolos de sua cor.\\nQuando uma bola faz mais dano do que os pontos de saúde do tijolo, ele vai continuar em linha reta em vez de saltar;\\n\\nSempre que uma bola atinge um tijolo da mesma cor, ele só vai passar por desfeito.\\nUma vez que atinge um tijolo de uma cor diferente, ele vai quebrar, tomar a sua cor e saltar.\\nSe você tem tijolos resistentes, a bola ainda pode saltar de um tijolo da mesma cor.","upgrades.puck_repulse_ball.name":"Aterragem macia","upgrades.puck_repulse_ball.tooltip":"Bolas de repulsa de pá","upgrades.puck_repulse_ball.verbose_description":"Quando uma bola fica perto do remo, ele vai começar a abrandar, e até mesmo potencialmente saltando sem tocar no remo.","upgrades.rainbow.name":"Arco-íris","upgrades.rainbow.tooltip":"Moedas desova com cor arco-íris.","upgrades.rainbow.verbose_description":"Cada nível aumenta a proporção de moedas coloridas. A cor depende do tempo de nível.","upgrades.reach.name":"Top down","upgrades.reach.tooltip":"Mais moedas se você evitar a linha mais baixa de tijolos","upgrades.reach.verbose_description":"Tocar os tijolos N da linha mais baixa reinicia a combinação. Caso contrário, combo +N.\\n\\nSe houver apenas uma fileira de tijolos, ou se a linha mais baixa de tijolos cobrir toda a largura do jogo, então esta perk não faz nada. Caso contrário, quebrar esta linha mais baixa reinicia a combinação, ao quebrar qualquer outra coisa aumenta a combinação pelo número de tijolos presentes nessa linha mais baixa.\\n\\nA linha mais baixa será destacada em vermelho.","upgrades.respawn.name":"Reembolso","upgrades.respawn.tooltip":"{{percent}}% de tijolos re-spawn após {{delay}}s.","upgrades.respawn.verbose_description":"Algum efeito de partícula irá informá-lo onde os tijolos aparecerão.","upgrades.right_is_lava.name":"Evite o lado direito","upgrades.right_is_lava.tooltip":"Mais moedas se você não tocar no lado direito","upgrades.right_is_lava.verbose_description":"Sempre que você quebrar um tijolo, sua combinação vai aumentar por um, então você vai ter mais uma moeda de todos os tijolos próximos que você quebrar.\\n\\nNo entanto, sua combinação irá reiniciar assim que sua bola atingir o lado direito.\\n\\nAssim que sua combinação aumenta, o lado direito fica vermelho para lembrá-lo de que você deve evitar bater-los.\\n\\nNo nível 2, a fronteira é completamente removida e suas bolas e moedas podem se perder.","upgrades.sacrifice.name":"Sacrifício","upgrades.sacrifice.tooltip":"Loosing uma vida compensa todos os tijolos","upgrades.sacrifice.verbose_description":"No nível 2+, a combinação também é multiplicada pelo nível da tinta antes de limpar a placa. Isto pode ficar muito alto.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"O primeiro tijolo quebrado torna-se uma bomba.","upgrades.sapper.verbose_description":"Em vez de apenas desaparecer, o primeiro tijolo que você quebrar será substituído por um tijolo bomba. Bouncing a bola no paddle re-arms o efeito. Nivelar esta perk permitirá que você coloque mais bombas.","upgrades.shocks.name":"Choques","upgrades.shocks.tooltip":"Colisões de bolas explosivas","upgrades.shocks.verbose_description":"Sempre que duas bolas colidem, trocam sua velocidade, geram uma explosão e ganham velocidade adicional para separá-las.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Mantenha {{percent}}% de sua combinação entre níveis","upgrades.shunt.verbose_description":"Se você também tem início quente, o início quente é apenas adicionado à combinação atual","upgrades.side_flip.name":"Mão direita","upgrades.side_flip.tooltip":"Mais moedas se você bater tijolos da direita só","upgrades.side_flip.verbose_description":"+{{lvl}} combo por tijolo quebrado da direita, -{{loss}} caso contrário. Impacto o tijolo no seu lado direito para ganhar uma combinação, mas evitar bater-lhe no lado esquerdo como o removeria 2 combinação. Bater da parte superior e inferior não tem efeito.","upgrades.side_kick.name":"Mão esquerda","upgrades.side_kick.tooltip":"Mais moedas se você bater tijolos da esquerda só","upgrades.side_kick.verbose_description":"+{{lvl}} combo por tijolo quebrado da esquerda, -{{loss}} caso contrário. Impacto o tijolo no seu lado esquerdo para ganhar uma combinação, mas evitar bater-lhe no lado direito como o removeria 2 combinação. Bater da parte superior e inferior não tem efeito.","upgrades.skip_last.name":"Limpeza fácil","upgrades.skip_last.tooltip":"O último tijolo será auto destrutivo","upgrades.skip_last.verbose_description":"Você precisa quebrar todos os tijolos para ir para o próximo nível. No entanto, pode ser difícil obter os últimos.\\nCada nível desta tinta aumenta o número de tijolos que se destruem.\\nLimpar um nível cedo traz opções extras ao atualizar. Nunca perder os tijolos também é muito benéfico.\\n\\nEntão, se você achar difícil quebrar os últimos tijolos, obter esta perk alguns tempo pode ajudar.","upgrades.slow_down.name":"Bola mais lenta","upgrades.slow_down.tooltip":"A bola se move mais lentamente","upgrades.slow_down.verbose_description":"A bola começa relativamente lenta, mas cada nível do seu jogo vai começar um pouco mais rápido.\\n\\nTambém vai acelerar se você passar muito tempo em um nível.\\n\\nEsta perk torna mais gerenciável.\\n\\nVocê pode obtê-lo no início cada vez, permitindo o modo de criança no menu.","upgrades.smaller_puck.name":"Pequena pá","upgrades.smaller_puck.tooltip":"{{percent}}% mais moedas","upgrades.smaller_puck.verbose_description":"Isso torna o remo menor, o que, em teoria, torna alguns tiros de canto mais fácil, mas realmente apenas aumenta a dificuldade.\\n\\nÉ por isso que você também obter um bom bônus de + 50% moedas desova.","upgrades.soft_reset.name":"Reposição suave","upgrades.soft_reset.tooltip":"Mantenha {{percent}}% do seu combo quando ele reinicia","upgrades.soft_reset.verbose_description":"Limite o impacto de uma redefinição de combinação.","upgrades.steering.name":"Direcção","upgrades.steering.tooltip":"As bolas giram quando a pá se move","upgrades.steering.verbose_description":"A mudança da localização do remo influencia diretamente a direção do movimento das bolas. No nível 2+, você tem uma linha mostrando as direções da bola.","upgrades.sticky_coins.name":"Moedas pegajosas","upgrades.sticky_coins.tooltip":"Moedas vara a tijolos da mesma cor","upgrades.sticky_coins.verbose_description":"No nível 2, eles se encaixam em tijolos de qualquer cor","upgrades.streak_shots.name":"Bater em streak","upgrades.streak_shots.tooltip":"Mais moedas se você quebrar muitos tijolos ao mesmo tempo","upgrades.streak_shots.verbose_description":"Cada vez que você quebrar um tijolo, sua combinação aumenta por um.\\n\\nNo entanto, assim que a bola tocar seu paddle, a combinação é redefinida para seu valor padrão.\\n\\nUma vez que seu combo sobe acima do valor base, seu paddle terá uma borda vermelha para lembrá-lo de que destruirá sua combinação para tocá-lo com a bola.","upgrades.sturdy_bricks.name":"Tijolos resistentes","upgrades.sturdy_bricks.tooltip":"+{{lvl}} tijolos Moedas HP, +{{percent}}%","upgrades.sturdy_bricks.verbose_description":"Cada nível desta tinta adiciona um HP a todos os tijolos. Você pode ver o número HP com a perk \\"clairvoyant\\". Você pode aumentar o dano da bola, obtendo a perk \\"piercing\\". Cada nível da perk adiciona +50% moedas desova.","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"O tempo se move quando o remo se move.","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"Telecinese","upgrades.telekinesis.tooltip":"A posição do remo influencia a bola","upgrades.telekinesis.verbose_description":"Controla a bola enquanto está a subir. O efeito é mais forte quando a bola está na metade inferior da tela.","upgrades.three_cushion.name":"Três almofadas","upgrades.three_cushion.tooltip":"Mais moedas se você bater tijolos apenas indiretamente","upgrades.three_cushion.verbose_description":"+1 combinação por hit em lados e topo, até +{{max}} por remo.\\nCada hit de um lado aumentará a combinação por um, até +3.\\nDepois disso, nenhuma combinação será ganha até o próximo remo.\\n\\nCombo repõe quando você bate num tijolo sem saltar primeiro.","upgrades.top_is_lava.name":"O céu é o limite","upgrades.top_is_lava.tooltip":"Mais moedas se você evitar bater no topo","upgrades.top_is_lava.verbose_description":"Sempre que você quebrar um tijolo, sua combinação vai aumentar por um. No entanto, sua combinação irá reiniciar assim que sua bola atingiu o topo da tela.\\n\\nQuando sua combinação está acima do mínimo, uma barra vermelha aparecerá no topo para lembrá-lo de que você deve evitar bater nele.\\n\\nNo nível 2, a fronteira é completamente removida e suas bolas e moedas podem se perder.","upgrades.trampoline.name":"Trampolim","upgrades.trampoline.tooltip":"Mais moedas se você saltar em tijolos e o remo só","upgrades.trampoline.verbose_description":"+{{lvl}} combo per paddle bounce,-{{lvl}} combo per bounce on any border. Uma das raras atualizações de combinação que não adicionam uma condição de reset","upgrades.transparency.name":"Transparência","upgrades.transparency.tooltip":"+ 50% moedas. A bola é invisível no topo da tela.","upgrades.transparency.verbose_description":"A bola fica transparente na parte superior da tela.\\n+{{percent}} % moedas.\\nNíveis mais elevados tornam a bola transparente mais cedo e aumentam o bônus de ponto.","upgrades.trickledown.name":"Trickle down","upgrades.trickledown.tooltip":"Moedas aparecem no topo da tela.","upgrades.trickledown.verbose_description":"As moedas podem sentar-se em cima de um tijolo se houver tijolos na linha superior, nesse caso eles vão cair depois de você quebrar esse tijolo.","upgrades.unbounded.name":"Pavimentação","upgrades.unbounded.tooltip":"Adiciona espaço à esquerda e à direita do nível, mas o seu remo não pode ir tão longe.","upgrades.unbounded.verbose_description":"Outra atualização pode ajudá-lo a estender o alcance do seu paddle.","upgrades.viscosity.name":"Viscosidade","upgrades.viscosity.tooltip":"Queda de moeda mais lenta","upgrades.viscosity.verbose_description":"As moedas normalmente aceleram com gravidade e explosões a velocidades bastante altas.\\n\\nEsta perk constantemente os torna lentos, como se estivessem em algum tipo de líquido viscoso.\\n\\nIsso torna a pegá-los mais fácil, e combina bem com vantagens que influenciam o movimento da moeda.","upgrades.wind.name":"Vento","upgrades.wind.tooltip":"A posição do remo cria vento","upgrades.wind.verbose_description":"O vento depende da posição do paddle: sopros esquerdos, direito sopra direito. Atinge bolas e moedas.","upgrades.wrap_left.name":"Esquerda de envoltório","upgrades.wrap_left.tooltip":"Batendo no lado esquerdo teletransporta a bola para o lado direito","upgrades.wrap_left.verbose_description":"Moedas de teletransporte de níveis mais elevados também.","upgrades.wrap_right.name":"Envolver direito","upgrades.wrap_right.tooltip":"Batendo no lado direito teletransporta a bola para o lado esquerdo","upgrades.wrap_right.verbose_description":"Moedas de teletransporte de níveis mais elevados também.","upgrades.wrap_up.name":"Envolve-se","upgrades.wrap_up.tooltip":"Tocar no topo da tela vai teletransportar a bola logo acima do paddle.","upgrades.wrap_up.verbose_description":"Isto não conta como um remo. No nível 2, as moedas também teletransportam.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"A bola cai em direção ao paddle","upgrades.yoyo.verbose_description":"É o oposto da telecinese, controla a bola enquanto cai.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"Mais moedas se não disparar bombas","upgrades.zen.verbose_description":"+{{lvl}} combo cada 3s, redefinir quando há uma explosão"}');var K={};K=JSON.parse('{"confirmRestart.no":"Zrušiť","confirmRestart.text":"Chystáte sa začať novú hru. Určite chcete pokračovať?","confirmRestart.title":"Začať novú hru?","confirmRestart.yes":"Reštartovať hru","editor.editing.bigger":"Zväčšiť level","editor.editing.color":"Vyberte farbu v zozname farieb (max. 5 na jeden level)","editor.editing.copied":"Kód levelu skopírovaný","editor.editing.copy":"Skopírovať kód levelu","editor.editing.copy_help":"Pre pridanie do hry zdieľajte kód levelu na našom Discorde.","editor.editing.credit":"Autorstvo a zdroj","editor.editing.credit_prompt":"Zadajte adresu URL zdroja alebo opis vášho levelu.","editor.editing.delete":"Vymazať level","editor.editing.down":"Posunúť všetky dlaždice nadol","editor.editing.help":"Potom dlaždicu nafarbite klepnutím na ňu.","editor.editing.left":"Posunúť všetky dlaždice doľava","editor.editing.play":"Prehrať level","editor.editing.rename":"Názov levelu","editor.editing.rename_prompt":"Zadajte nové meno levelu.","editor.editing.right":"Posunúť všetky dlaždice doprava","editor.editing.show_code":"Zobraziť kód levelu","editor.editing.show_code_help":"Môžete ho ručne skopírovať.","editor.editing.smaller":"Zmenšiť level","editor.editing.title":"Upravujete level: {{name}}","editor.editing.up":"Posunúť všetky dlaždice nahor","editor.help":"Vytvárajte vlastné levely a zdieľajte ich, aby boli pridané do hry.","editor.import":"Importovať level","editor.import_instruction":"Pre pridanie do vášho zoznamu levelov vložte jeho kód levelu","editor.locked":"Odomknete dosiahnutím celkového skóre {{min}}","editor.new_level":"Nový level","editor.title":"Editor levelov","gameOver.creative":"Tento pokus nebude zaznamenaný.","gameOver.cumulative_total":"","gameOver.lastLevelSummary":"V leveli {{level}} ste chytili {{levelCoughtCoins}} mincí z celkového počtu {{levelSpawnedCoins}} ({{catchRate}} %) za {{duration}} sekúnd. Loptička netrafila žiadnu dlaždicu {{levelMisses}}-krát","gameOver.lost.summary":"Nechytili ste loptičku, čo ukončilo váš pokus s celkovým skóre {{score}} mincí.","gameOver.lost.title":"Koniec hry","gameOver.stats.balls_lost":"Nechytených loptičiek","gameOver.stats.bricks_broken":"Rozbitých dlaždíc","gameOver.stats.bricks_per_minute":"Rozbitých dlaždíc za minútu","gameOver.stats.catch_rate":"Úspešnosť chytania","gameOver.stats.combo_avg":"Priemerné combo","gameOver.stats.combo_max":"Maximálne combo","gameOver.stats.duration_per_level":"Trvanie na jeden level","gameOver.stats.hit_rate":"Úspešnosť triafania","gameOver.stats.level_reached":"Dosiahnutý level","gameOver.stats.total_score":"Celkové skóre","gameOver.stats.upgrades_applied":"Využitých vylepšení","gameOver.stats_intro":"Nižšie nájdete štatistiky tejto hry v porovnaní  s vašimi {{count}} najlepšími hrami.","gameOver.unlocked_perk":"Odomknuté vylepšenie","gameOver.unlocked_perk_plural":"Odomkli ste {{count}} vylepšení","gameOver.win.summary":"Hra sa skončila. Spolu ste nazbierali {{score}} mincí.","gameOver.win.title":"Tento pokus ste dokončili","help.content":"## Cieľ\\n\\nPočas 7 levelov chyťte čo najviac mincí.\\nMince vypadávajú z rozbitých dlaždíc.\\nChytajte ich plošinou a zvyšujte svoje skóre.\\nVaše skóre je zobrazené v pravom hornom rohu obrazovky.\\nAk vám loptička spadne, hra sa skončí.\\n\\nPo rozbití všetkých dlaždíc si môžete vybrať vylepšenia.\\n\\n## Vylepšenia\\n\\nVybraté vylepšenia sú aktívne do konca pokusu.\\nNiektoré si môžete vybrať viackrát pre silnejší efekt.\\nNiektoré vám pomáhajú mieriť alebo inak hru uľačujú.\\nNiektoré sú užitočné iba v kombinácii s inými.\\n\\nKaždú hru začínate s jedným vylepšením.\\nDlaždice prvého levelu zobrazujú jeho ikonu.\\nPočiatočné vylepšenia si môžete vybrať v nastaveniach.\\n\\nVeľa vylepšení ovplyvňuje vaše combo.\\n\\n## Combo\\n\\nVaše combo je počet mincí, ktoré vypadnú z rozbitej dlaždice.\\nJeho hodnota sa zobrazuje na plošine, napríklad \uD83E\uDE994 znamená, že z každej dlaždice vypadnú 4 mince.\\nVäčšina vylepšení, ktoré zvyšujú combo, pridáva aj obmedzenie, ktoré ho resetuje.\\nCombo sa taktiež resetuje, ak sa loptička vráti na plošinu bez toho, aby trafila akúkoľvek dlaždicu.\\nKeď sa to stane, zobrazí sa informácia „vedľa“.\\n\\nVždy sa snažte mieriť na dlaždicu.\\n\\n## Mierenie\\n\\nOdraz loptičky od plošiny ovplyvňuje miesto odrazu na plošine.\\nAk loptička trafí presný stred plošiny, odrazí sa kolmo nahor.\\nČím bližšie ku kraju ju trafíte, tým viac sa odrazí pod uhlom.\\nRýchlosť plošiny a uhol dopadajúcej loptičky nemajú na smer po odraze žiaden vplyv.\\n\\nMôžete si odomknúť rôzne vylepšenia, ktoré pomáhajú s mierením.\\n\\n## Odomykanie\\n\\nKeď hráte Breakout 71 prvýkrát, väčšina vylepšení a levelov bude zamknutá.\\nVylešpenia sa odomknú v priebehu hry chytaním mincí.\\nPrvé levely sa odomknú dosahovaním určitého skóre.\\nNeskoršie levely môžete odomknúť iba s určitou kombináciou vylepšení.\\n\\nVyššie skóre ľahšie dosiahnete s viacerými vylepšeniami za jeden level, čo vám umožňujú medaily.\\n\\n## Medaily\\n\\nVäčší výber a možnosť získať viac vylepšení za jeden level získate za:\\n\\n- Rýchle vyčistenie levelu\\n- Chytenie všetkých mincí\\n- Triafanie dlaždíc pomedzi odrazy od plošiny","help.help":"Viac informácií o hre","help.levels":"Levely","help.title":"Pomoc","help.upgrades":"## Vylepšenia","history.columns.score":"Skóre","history.columns.started":"Dátum","history.help":"Pozrite si svojich {{count}} najlepších pokusov.","history.include_past_versions":"Zobrazovať aj predošlé verzie","history.locked":"Odomknete odohraním aspoň desiatich hier","history.title":"História pokusov","lab.help":"Vyskúšajte si ľubovoľnú kombináciu vylepšení.","lab.instructions":"Vyberte si vylepšenia a level a potom hru spustite tlačidlom hore.","lab.menu_entry":"Kreatívny režim","lab.play":"Spustiť hru","lab.reset":"Reset","lab.select_level":"Vyberte si level","lab.unlocks_at":"Odomknite dosiahnutím celkového skóre {{score}}","level_up.challenges.catchRateGood.description":"Pre zlatú medailu chyťte {{gold}} % mincí, pre striebornú {{silver}} %.","level_up.challenges.catchRateGood.name":"Chytili ste {{caught}} mincí z {{total}}","level_up.challenges.earned_medal":"Získali ste medailu","level_up.challenges.earned_medal_plural":"Získali ste {{count}} medaily","level_up.challenges.gain":"+{{choices}} možností a +{{up}} vylepšení","level_up.challenges.levelMisses.description":"Zlatú medailu získate, ak sa netrafíte maximálne {{gold}}-krát, striebornú ak sa netrafíte maximálne {{silver}}-krát.","level_up.challenges.levelMisses.name":"","level_up.challenges.levelMisses.none":"Žiadne zmeškané zábery","level_up.challenges.levelTime.d 2,1, Choďte na začiatku úrovne","starting_perks.checked":"Keď začnete novú hru, jeden z tých perks vám poskytne. Kliknite na perk, aby ste ju vylúčili.","starting_perks.help":"Vyberte si možné začínajúce upgrady","starting_perks.random":"Všetky výhody boli odstránené, výber bude náhodný.","starting_perks.title":"Spustenie perks","starting_perks.unchecked":"Nižšie sú uvedené vidlice, ale môžete ich pridať do bazéna.","unlocks.category.advanced":"","unlocks.category.beginner":"","unlocks.category.combo":"","unlocks.category.combo_boost":"","unlocks.category.simple":"","unlocks.greyed_out_help":"","unlocks.intro":"","unlocks.just_unlocked":"","unlocks.just_unlocked_plural":"","unlocks.level":"","unlocks.level_description":"","unlocks.levels":"","unlocks.minScore":"","unlocks.minScoreWithPerks":"","unlocks.minScoreWithPerksNoForbidden":"","unlocks.minTotalScore":"","unlocks.reached":"","unlocks.title_upgrades":"","unlocks.try":"","unlocks.upgrades":"","unlocks.use":"Použitie","upgrades.addiction.name":"Závislosť","upgrades.addiction.tooltip":"Viac mincí, ak zlomíte tehly bez pauzy","upgrades.addiction.verbose_description":"+{{lvl}} combo / tehla rozbité, combo resetuje {{delay}} po rozpade tehly. odpočítavanie len začína po rozpade prvej tehly každej úrovne. Zastavuje hneď, ako sú všetky tehly zničené.","upgrades.asceticism.name":"Asceticizmus","upgrades.asceticism.tooltip":"+{{combo}} combo na tehly rozbité, -{{combo}} combo na mince chytený.","upgrades.asceticism.verbose_description":"Budete musieť uložiť mince niekde, zatiaľ čo vaše horolezectvo.","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attract_ball.tooltip":"Lopty priťahujú gule","upgrades.ball_attract_ball.verbose_description":"Lopty, ktoré sú viac ako \\"3/4 šírky hernej plochy\\" sa začínajú navzájom priťahovať.\\n\\nAtrakcia sila je silnejšia, keď sú od seba kožušiny.\\n\\nDúhové častice budú lietať symbolizovať lákavú silu. Tento perk sa ponúka len vtedy, ak máte viac ako jednu loptu už.","upgrades.ball_attracts_coins.name":"Lopty priťahujú mince","upgrades.ball_attracts_coins.tooltip":"Mince nasledovať najbližšie loptu","upgrades.ball_attracts_coins.verbose_description":"To by mohlo byť použité na \\"paint okolo\\" guľôčky s mince, ak ste spojili s \\"stain\\" a \\"host mince\\". Funguje tiež ako náhrada mince magnet.","upgrades.ball_repulse_ball.name":"Osobný priestor","upgrades.ball_repulse_ball.tooltip":"Lopty repulzné gule","upgrades.ball_repulse_ball.verbose_description":"Lopty, ktoré sú menej ako štvrtinu šírku obrazovky, sa začínajú navzájom odpudzovať. Repulzačná sila je silnejšia, ak sú navzájom blízko. Časti budú vyčerpať symbolizovať túto silu. Tento perk sa ponúka len vtedy, ak máte viac ako jednu loptu už.","upgrades.base_combo.name":"Silné základy","upgrades.base_combo.tooltip":"3 viac mincí za tehlu rozbité","upgrades.base_combo.verbose_description":"Váš hrebeň zvyčajne začína na 1 na začiatku úrovne, a resetuje na 1, keď odrazíte bez biť nič. S týmto perk, combo začína 3 body vyššie, takže budete vždy získať aspoň 4 mince na tehlu. Vždy, keď sa váš hrebeň reset, vráti sa späť na 4 a nie 1. Vaša lopta bude trblietať trochu naznačovať, že jeho česano je vyšší ako jeden. Na úrovni 2, dodáva 4 mince, potom 5, potom 6 ..","upgrades.bigger_explosions.name":"Všeobecný","upgrades.bigger_explosions.tooltip":"Veľké výbuchy","upgrades.bigger_explosions.verbose_description":"Predvolené výbuch vyčnieva štvorcové námestie 3x3, s tým sa stáva 5x5 štvorec a rana na mince je tiež výrazne silnejší. Obraz bude blesk po každom výbuchu (okrem základného režimu)","upgrades.bigger_puck.name":"Veľký paddleboard","upgrades.bigger_puck.tooltip":"Ľahko chytiť viac mincí","upgrades.bigger_puck.verbose_description":"Väčší paddleboard uľahčuje nikdy ujsť loptu a chytiť viac mincí, a tiež presne uhol odrazy ( uhol lopty závisí len na tom, kde zasiahne pád).","upgrades.bricks_attract_ball.name":"Bricks priťahuje gule","upgrades.bricks_attract_ball.tooltip":"Lopta ide smerom k blízkosti tehál","upgrades.bricks_attract_ball.verbose_description":"Lopta ide smerom k prvému {{count}} tehly to bude hit. Účinok je silnejší na vyššej úrovni. Počet tehál, ktoré môžu zasiahnuť pred zastavením účinku je tiež vyššia. Účinok zamračené, keď lopta zasiahne paddleboard.","upgrades.bricks_attract_coins.name":"Bricks priťahuje mince","upgrades.bricks_attract_coins.tooltip":"Pomáha im zostať tam","upgrades.bricks_attract_coins.verbose_description":"Mince budú priťahované do blízkych tehál. Na vyšších úrovniach je príťažlivosť silnejší.","upgrades.buoy.name":"Buoy","upgrades.buoy.tooltip":"Mince plávajú na {{duration}} sekúnd na spodnom riadku.","upgrades.buoy.verbose_description":"Účinok je najviac viditeľný v mobilnom režime","upgrades.chill.name":"Chill","upgrades.chill.tooltip":"Žiadne ďalšie upgrady, neobmedzené úrovne.","upgrades.chill.verbose_description":"Loptu tiež urýchľuje oveľa pomalšie.","upgrades.clairvoyant.name":"Všeobecný","upgrades.clairvoyant.tooltip":"Pozrite sa na nadchádzajúce úrovne, tehly HP a loptu smer","upgrades.clairvoyant.verbose_description":"Pomáha vám vybrať správne upgrady a pochopiť, čo sa deje s robustnými tehlami. Level 2 a 3 prinášajú ďalšie znalosti pochybného nástroja (rozšíriteľné v režime slučky)","upgrades.coin_magnet.name":"Mince magnet","upgrades.coin_magnet.tooltip":"Paddleboard priťahuje mince","upgrades.coin_magnet.verbose_description":"Priťahuje mince na paddleboard. Účinok je silnejší, ak je mince blízko nej už.","upgrades.compound_interest.name":"Zlúčeniny záujem","upgrades.compound_interest.tooltip":"Viac mincí, ak chytíte všetky mince","upgrades.compound_interest.verbose_description":"Váš hrebeň bude rásť raz zakaždým, keď rozbijete tehál, prerezávate viac a viac mincí s každou tehálou.\\nUistite sa však chytiť každý z týchto mincí s lopatou, pretože akákoľvek stratená mince obnoví vaše česanie.\\nAkonáhle je váš hrebeň nad minimálnou, dno hracej plochy bude mať červenú líniu, aby vám pripomenul, že mince by nemali ísť tam.","upgrades.concave_puck.name":"S pozdravom paddleboard","upgrades.concave_puck.tooltip":"Zlepšuje vertikálnu presnosť zacielenia","upgrades.concave_puck.verbose_description":"Lopty začínajú úroveň ísť rovno hore, a odrazí s menším uhlom.","upgrades.corner_shot.name":"Rohový záber","upgrades.corner_shot.tooltip":"Nechajte si paddleboard prekrývať sa s hranicami obrazovky","upgrades.corner_shot.verbose_description":"Pomáha s cieľom v rohoch. Ďalšie úrovne nechať ísť ďalej.","upgrades.double_or_nothing.name":"Dvojité alebo nič","upgrades.double_or_nothing.tooltip":"Combo lezie {{multiplier}} krát rýchlejšie, ale budete voľný {{percent}}% z vašich skóre na každom resete.","upgrades.double_or_nothing.verbose_description":"Horský reset počíta len vtedy, keď váš hrebeň bol nad minimálnou","upgrades.etherealcoins.name":"Mince, v priestore","upgrades.etherealcoins.tooltip":"Mince už nie sú ovplyvnené gravitáciou","upgrades.etherealcoins.verbose_description":"Mince budú udržiavať svoju rýchlosť aj po niekoľkých odrazí, a už nebudú ovplyvnené gravitáciou.","upgrades.extra_levels.name":"5 min viac","upgrades.extra_levels.tooltip":"Hrať {{count}} úrovne namiesto 7","upgrades.extra_levels.verbose_description":"Predvolená hra môže trvať maximálne 7 úrovní, po ktorej je hra skončila.\\n\\nKaždá úroveň tohto perka umožňuje ísť o jednu úroveň vyššie. Posledné úrovne sú často tie, kde urobíte najviac skóre, takže rozdiel môže byť dramatický.","upgrades.extra_life.name":"Extra život","upgrades.extra_life.tooltip":"Uloží vašu poslednú loptu, ak sa chystá byť stratený","upgrades.extra_life.verbose_description":"Život bude konzumovaný v procese. Extra životy ukazujú, ako pri líniách za pádom.","upgrades.forgiving.name":"Prevzdania","upgrades.forgiving.tooltip":"Udržujte väčšinu svojho hrebeňa, keď chýba","upgrades.forgiving.verbose_description":"Prvá chýba na úrovni je zadarmo, potom 10% z hrebeňa, potom 20% ..","upgrades.fountain_toss.name":"Fontány","upgrades.fountain_toss.tooltip":"Gain combo, keď vynecháte mince.","upgrades.fountain_toss.verbose_description":"Keď vynecháte mincu a váš hrebeň bol pod úrovňou * 30, váš hrebeň má pravdepodobnosť úrovne/kombo rásť jeden.","upgrades.ghost_coins.name":"Ghost mince","upgrades.ghost_coins.tooltip":"Mince pomaly prejsť cez tehly","upgrades.ghost_coins.verbose_description":"Nie je to chyba, je to funkcia! Mince letia cez tehly pomaly. Vyššie úrovne nechať ich pohybovať rýchlejšie.","upgrades.golden_goose.name":"Zlatý hus","upgrades.golden_goose.tooltip":"Mince teleport na loptu po zasiahnutí tehly","upgrades.golden_goose.verbose_description":"Kedykoľvek mince hity tehla, teleport, že mince do najbližšieho lopty. Na úrovni dva, mince teleport po biť stranu tiež.","upgrades.happy_family.name":"Šťastná rodina","upgrades.happy_family.tooltip":"Viac mincí, ak budete mať všetky guľôčky v hre.","upgrades.happy_family.verbose_description":"+1 combo za extra loptu na pád. Combo resetuje, keď je lopta stratená. Iba loptu nad 1 dať combo.","upgrades.helium.name":"Hélium","upgrades.helium.tooltip":"Gravity obmedzená vľavo a doprava paddle","upgrades.helium.verbose_description":"Na úrovni 1 sa znižuje gravitácia. Na úrovni 2, mince pomaly plávajú. Na úrovni 3 naozaj lietať.","upgrades.hot_start.name":"Horúci začiatok","upgrades.hot_start.tooltip":"Viac mincí, ak vyčistite úroveň pod 30s","upgrades.hot_start.verbose_description":"Na začiatku každej úrovne začne váš hrebeň na +{{start}} bodov, ale potom každý druhý bude znížený {{loss}}. Účinok zásobníky s inými perks.","upgrades.implosions.name":"Zložky","upgrades.implosions.tooltip":"Explosions sať mince namiesto fúkania","upgrades.implosions.verbose_description":"Expresná sila sa aplikuje iným spôsobom. Ďalšie úrovne pôsobia ako \\"bigger výbuch\\"","upgrades.left_is_lava.name":"Vyhnite sa ľavej strane","upgrades.left_is_lava.tooltip":"Viac mincí, ak sa nedotýkate ľavej strane","upgrades.left_is_lava.verbose_description":"Kedykoľvek rozbijete tehál, váš hrebeň sa zvýši jeden, takže dostanete jednu viac mincí zo všetkých ďalších tehálov, ktoré zlomíte.\\n\\nAvšak, váš hrebeň bude resetovať hneď, ako vaša lopta hity na ľavej strane .\\n\\nAkonáhle váš hrebeň stúpa, ľavá strana sa stáva červená, aby vám pripomenul, že by ste sa mali vyhnúť biť.\\n\\nNa úrovni 2 je hranica úplne odstránená a vaše guľôčky a mince by mohli stratiť.","upgrades.limitless.name":"Bez obmedzenia","upgrades.limitless.tooltip":"Zdvihnite maximálnu úroveň upgradu {{lvl}}","upgrades.limitless.verbose_description":"Výber tohto perku tiež zvyšuje svoj vlastný limit jedným, nechať si ho znova vybrať.","upgrades.metamorphosis.name":"Metamorfóza","upgrades.metamorphosis.tooltip":"Každá mince môže škvrnať {{lvl}} tehla (s) s jeho farbou","upgrades.metamorphosis.verbose_description":"S týmto perk, mince budú farba tehly pochádzajú, a bude farebná prvá tehla sa dotýkajú v rovnakej farbe. Mince šité s rýchlosťou lopty, ktorá ich rozbila, čo znamená, že môžete trochu zamerať v smere tehál, ktoré chcete \\"paint\\". Na úrovni 1, každá mince môže farba 1 tehly pred tým, ako je \\"spent\\" a zdá sa duté.","upgrades.minefield.name":"Minefield","upgrades.minefield.tooltip":"+{{percent}}% mincí za bombovú tehlu na obrazovke","upgrades.minefield.verbose_description":"Bomby sú počítané, zatiaľ čo sú explodujúce príliš.","upgrades.multiball.name":"Multi loptu","upgrades.multiball.tooltip":"Začnite všetky úrovne s {{count}} guľôčky.","upgrades.multiball.verbose_description":"Akonáhle spustíte loptu v Breakout 71, stratíte.\\n\\nS týmto atramentom získate dve guľôčky a môžete si dovoliť stratiť jeden.\\n\\nStratené gule sa vracajú na ďalšej úrovni.\\n\\nMať viac ako jednu guľôčku robí niektoré ďalšie perks k dispozícii, a samozrejme jasne vyrovnáva úroveň rýchlejšie.","upgrades.nbricks.name":"Prísne veľkosť vzorky","upgrades.nbricks.tooltip":"Viac mincí, ak narazíte na tehly jeden po druhom.","upgrades.nbricks.verbose_description":"Hit presne {{lvl}} tehly na paddle odraziť na +{{lvl}} combo, inak sa resetuje. Nemusíte nevyhnutne musieť zničiť tie tehly, ale musíte ich zasiahnuť. Bricks zničené výbuchmi sa nespoliehajú","upgrades.one_more_choice.name":"Extra výber","upgrades.one_more_choice.tooltip":"Ďalšie možnosti upgradu","upgrades.one_more_choice.verbose_description":"Každý upgrade menu bude mať ešte jednu možnosť. Nezvyšuje počet upgradov si môžete vybrať.","upgrades.ottawa_treaty.name":"Ottawa zmluva","upgrades.ottawa_treaty.tooltip":"Breaking tehla v blízkosti bomby ho odzbrojuje","upgrades.ottawa_treaty.verbose_description":"Najbližšie bomba bude nahradená farebným blokom. Ak máte večeru, lopta uvoľní svoj šperk účinok až do ďalšieho odrazí. Iba jedna bomba môže byť nahradená naraz.","upgrades.passive_income.name":"Pasívny príjem","upgrades.passive_income.tooltip":"Viac mincí, ale pohyblivý paddleboard nezachytí guľôčky alebo mince","upgrades.passive_income.verbose_description":"+{{lvl}} combo / tehla rozbité, paddleboard je nemateriál {{time}}s po pohybe. Niektoré perks môže pomôcť guľôčky robiť to, čo chcete, bez toho, aby nič neurobil.","upgrades.picky_eater.name":"Picky jedér","upgrades.picky_eater.tooltip":"Viac mincí, ak zlomíte tehly farbu podľa farby","upgrades.picky_eater.verbose_description":"Vždy, keď rozbijete tehlu rovnakú farbu ako vaša lopta, vaše česano zvyšuje počet farieb na obrazovke mínus jeden.\\nAk je to iná farba, lopta trvá, že nová farba, ale hrebeňo resetuje, pokiaľ neboli žiadne tehly vľavo z farby lopty.\\nAkonáhle dostanete hrebeň vyššie ako vaše minimum, tehál nesprávnej farby dostane červenú hranicu.\\nAk máte viac ako jednu guľu, všetci prepínajú farbu, keď jeden z nich hity tehlu.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Loptové móly {{count}} tehly po páde paddle","upgrades.pierce.verbose_description":"Lopta zvyčajne odrazí hneď, ako sa niečo dotkne. S týmto atramentom bude pokračovať v jeho trajektórii až 3 tehly rozbité.\\n\\nPotom to bude odraziť na 4. tehál, a budete musieť dotknúť paddleboard resetovať pult.","upgrades.pierce_color.name":"Farba pierce","upgrades.pierce_color.tooltip":"Lopta prechádza tehálmi rovnakej farby","upgrades.pierce_color.verbose_description":"Normálne, guľôčky robiť 1 poškodenie a tehly majú 1 zdravotný bod (HP).\\nKedykoľvek lopta hity tehlu rovnakej farby, bude to len prejsť neimped.\\nAkonáhle dosiahne tehlu inej farby, bude to zlomiť, vziať svoju farbu a odraziť.\\nAk máte robustné tehly, lopta môže stále odraziť tehlu rovnakej farby.","upgrades.puck_repulse_ball.name":"Soft pristátie","upgrades.puck_repulse_ball.tooltip":"Paddle repulzné gule","upgrades.puck_repulse_ball.verbose_description":"Keď lopta dostane blízko k pádu, začne spomaliť, a dokonca potenciálne poskakovanie bez dotyku paddleboard.","upgrades.rainbow.name":"Dúha","upgrades.rainbow.tooltip":"Mince šité s dúha farba.","upgrades.rainbow.verbose_description":"Každá úroveň zvyšuje podiel farebných mincí. Farba závisí od času úrovne.","upgrades.reach.name":"Top dole","upgrades.reach.tooltip":"Viac mincí, ak sa vyhnete najnižšiemu rade tehál","upgrades.reach.verbose_description":"Dotykanie N tehál najnižšieho riadku resetuje hrebeň. V opačnom prípade +N combo.\\n\\nAk existuje len jeden rad tehál, alebo ak najnižšie rade tehál pokrývajú celú šírku hry, potom tento perk nemá nič. V opačnom prípade lámanie tohto najnižšieho riadku resetuje hrebeňo, zatiaľ čo lámanie niečo iného zvyšuje hrebeň podľa počtu tehál prítomných na tomto najnižšiom rade.\\n\\nNajnižší riadok bude zvýraznený červenou.","upgrades.respawn.name":"Re-spawn","upgrades.respawn.tooltip":"{{percent}}% tehál re-spawn po {{delay}}s.","upgrades.respawn.verbose_description":"Niektorí účinok častíc vám umožní vedieť, kde sa objavia tehly.","upgrades.right_is_lava.name":"Vyhnite sa pravej strane","upgrades.right_is_lava.tooltip":"Viac mincí, ak sa nedotýkate pravej strane","upgrades.right_is_lava.verbose_description":"Kedykoľvek rozbijete tehál, váš hrebeň sa zvýši jeden, takže dostanete jednu viac mincí zo všetkých ďalších tehálov, ktoré zlomíte.\\n\\nAvšak, váš hrebeň bude resetovať hneď, ako vaša lopta hity na pravej strane.\\n\\nAkonáhle bude váš hrebeňo stúpa, správna strana sa červená, aby vám pripomenul, že by ste sa mali vyhnúť biť.\\n\\nNa úrovni 2 je hranica úplne odstránená a vaše guľôčky a mince by mohli stratiť.","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.tooltip":"Loosing život čistí všetky tehly","upgrades.sacrifice.verbose_description":"Na úrovni 2+, combo je tiež vynásobená úroveň perk pred vymazaním dosky. To môže dostať combo dosť vysoké.","upgrades.sapper.name":"Salón","upgrades.sapper.tooltip":"Prvá tehla zlomená sa stáva bombou.","upgrades.sapper.verbose_description":"Namiesto toho, aby len zmiznú, prvá tehla, ktorú zlomíte, bude nahradená bombovou tehálou. Porušenie lopty na paddleboard re-arms účinok. Úroveň-up tento perk vám umožní umiestniť viac bomby.","upgrades.shocks.name":"Shocks","upgrades.shocks.tooltip":"Zrážky výbušných guľôb","upgrades.shocks.verbose_description":"Vždy, keď dve guľôčky kolid, vymenia ich rýchlosť, prerezávajú výbuch, a získať pridané rýchlosť oddeliť ich.","upgrades.shunt.name":"SLOV","upgrades.shunt.tooltip":"Udržujte {{percent}}% vášho hrebeňa medzi úrovňami","upgrades.shunt.verbose_description":"Ak máte tiež horúci začiatok, horúci štart je len pridaný do aktuálneho hrebeňa","upgrades.side_flip.name":"Pravé odovzdané","upgrades.side_flip.tooltip":"Viac mincí, ak narazíte na tehly z pravej iba","upgrades.side_flip.verbose_description":"+{{lvl}} combo na tehlu rozbité z pravej, -{{loss}} inak. Vplyv tehál na pravej strane získať jeden hrebeň, ale vyhnúť sa ho biť na ľavej strane, ako by odstrániť 2 combo. Hitting z hornej a dno nemá žiadny účinok.","upgrades.side_kick.name":"Ľavá ruka","upgrades.side_kick.tooltip":"Viac mincí, ak narazíte na tehly z ľavej iba","upgrades.side_kick.verbose_description":"+{{lvl}} combo na tehlu rozbité z ľavej strany -{{loss}} inak. Vplyv tehál na ľavej strane získať jeden hrebeň, ale vyhnúť sa ho biť na pravej strane, ako by odstrániť 2 combo. Hitting z hornej a dno nemá žiadny účinok.","upgrades.skip_last.name":"Jednoduché čistenie","upgrades.skip_last.tooltip":"Posledná tehla sa bude deštruktovať","upgrades.skip_last.verbose_description":"Musíte zlomiť všetky tehly ísť na ďalšiu úroveň. Avšak, to môže byť ťažké získať tie posledné.\\nKaždá úroveň tohto perka zvyšuje počet tehál, ktoré sa budú deštruktovať.\\nVymazanie úrovne čoskoro prináša ďalšie možnosti pri modernizácii. Nikdy chýba tehál je tiež veľmi prospešný.\\n\\nTakže ak zistíte, že je ťažké prelomiť posledné tehly, dostať tento perk niekoľko času môže pomôcť.","upgrades.slow_down.name":"Slower loptu","upgrades.slow_down.tooltip":"Lopta sa pohybuje viac pomaly","upgrades.slow_down.verbose_description":"Loptu začína relatívne pomalé, ale každá úroveň vašej hry začne trochu rýchlejšie.\\n\\nTo bude tiež urýchliť, ak trávite veľa času na jednej úrovni.\\n\\nTento perk to robí viac zvládnuteľný.\\n\\nMôžete ho získať na začiatku zakaždým tým, že umožní režim dieťaťa v menu.","upgrades.smaller_puck.name":"Malý paddleboard","upgrades.smaller_puck.tooltip":"{{percent}}% viac mincí","upgrades.smaller_puck.verbose_description":"To robí paddle menšie, čo v teórii robí niektoré rohové zábery jednoduchšie, ale naozaj len zvyšuje obtiažnosť.\\n\\nTo je dôvod, prečo si tiež získať pekný bonus +50% mince kúpele.","upgrades.soft_reset.name":"Soft reset","upgrades.soft_reset.tooltip":"Udržujte {{percent}}% vášho hrebeňa, keď sa obnoví","upgrades.soft_reset.verbose_description":"Obmedzte vplyv na obnovenie hrebeňa.","upgrades.steering.name":"Riadenie","upgrades.steering.tooltip":"Lopty zase pri páde","upgrades.steering.verbose_description":"Zmena paddleboardu priamo ovplyvňuje smer pohybu guľôčok. Na úrovni 2+, dostanete linku, ktorá vám ukazuje smer lopty.","upgrades.sticky_coins.name":"Nálepkové mince","upgrades.sticky_coins.tooltip":"Mince držať tehál rovnakej farby","upgrades.sticky_coins.verbose_description":"Na úrovni 2 sa držať tehál akejkoľvek farby","upgrades.streak_shots.name":"Hit streak","upgrades.streak_shots.tooltip":"Viac mincí, ak rozbijete veľa tehál naraz","upgrades.streak_shots.verbose_description":"Zakaždým, keď rozbijete tehlu, váš hrebeň sa zvyšuje jedným.\\n\\nAvšak, akonáhle lopta dotýka vaše paddleboard, hrebeňo je resetovať na svoju predvolenú hodnotu.\\n\\nPo tom, čo váš hrebeň stúpa nad základnou hodnotou, vaše paddleboard bude mať červenú hranicu, aby vám pripomenul, že to bude zničiť váš hrebeň, aby sa ho dotknúť s loptou.","upgrades.sturdy_bricks.name":"Sturdy tehly","upgrades.sturdy_bricks.tooltip":"+{{lvl}} tehly HP, +{{percent}}% mincí","upgrades.sturdy_bricks.verbose_description":"Každá úroveň tohto perka pridáva jeden HP na všetky tehly. Môžete vidieť číslo HP s \\"clairvoyant\\" perk. Môžete zvýšiť poškodenie lopty tým, že dostanete \\"piercing\\" perk. Každá úroveň perk pridáva +50% mince kúpele.","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"Čas sa pohybuje, keď sa paddleboard pohybuje.","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"Telekinéza","upgrades.telekinesis.tooltip":"Poschodová poloha ovplyvňuje loptu","upgrades.telekinesis.verbose_description":"Ovládate loptu, zatiaľ čo to bude hore. Účinok je silnejší, keď je lopta v spodnej polovici obrazovky.","upgrades.three_cushion.name":"Tri vankúš","upgrades.three_cushion.tooltip":"Viac mincí, ak narazíte na tehly iba nepriamo","upgrades.three_cushion.verbose_description":"+1 combo za hit na stranách a hornej, až do +{{max}} za pád.\\nKaždý hit na strane bude zdvihnúť hrebeň jeden, až +3.\\nPo tom, žiadny hrebeň nebude získaný až do ďalšieho pádu.\\n\\nCombo resetuje, keď narazíte na tehlu bez poskakovania prvý.","upgrades.top_is_lava.name":"Sky je limit","upgrades.top_is_lava.tooltip":"Viac mincí, ak sa vyhnete biť hore","upgrades.top_is_lava.verbose_description":"Kedykoľvek rozbijete tehál, váš hrebeň sa zvýši jeden. Avšak, vaše combo bude resetovať hneď, ako vaša lopta hit vrchol obrazovky.\\n\\nKeď je váš hrebeň nad minimum, sa objaví červený bar na vrchole, aby vám pripomenul, že by ste sa mali vyhnúť biť.\\n\\nNa úrovni 2 je hranica úplne odstránená a vaše guľôčky a mince by mohli stratiť.","upgrades.trampoline.name":"Trampoline","upgrades.trampoline.tooltip":"Viac mincí, ak odrazíte na tehly a paddleboard iba","upgrades.trampoline.verbose_description":"+{{lvl}} combo na pád,-{{lvl}} combo na každom okraji. Jeden z vzácnych hrebeňov, ktoré nepridávajú stav obnovenia","upgrades.transparency.name":"Aktuality","upgrades.transparency.tooltip":"+50% mincí. Lopta je neviditeľný v hornej časti obrazovky.","upgrades.transparency.verbose_description":"Lopta sa stáva transparentnou v hornej časti obrazovky.\\n+{{percent}} % mincí.\\nVyššie úrovne, aby lopta priehľadný skôr a zvýšiť bod bonus.","upgrades.trickledown.name":"Triky dole","upgrades.trickledown.tooltip":"Mince sa objavujú v hornej časti obrazovky.","upgrades.trickledown.verbose_description":"Mince by mohli sedieť na vrchole tehly, ak sú tehly na hornom riadku, v takom prípade sa po rozpade, že tehla.","upgrades.unbounded.name":"Zváranie","upgrades.unbounded.tooltip":"Dodáva priestor vľavo a vpravo od úrovne, ale vaša paddleboard nemôže ísť tak ďaleko.","upgrades.unbounded.verbose_description":"Ďalšou upgradu vám môže pomôcť predĺžiť dosah paddleboardu.","upgrades.viscosity.name":"Viskozita","upgrades.viscosity.tooltip":"Spomalenie mince","upgrades.viscosity.verbose_description":"Mince zvyčajne urýchľujú gravitáciu a výbuchy na pomerne vysoké rýchlosti.\\n\\nTento perk ich neustále spomaľuje, ako keby boli v niektorých typoch viskozity kvapaliny.\\n\\nTo ich chytí jednoduchšie a kombinuje pekne s perks, ktoré ovplyvňujú pohyb mince.","upgrades.wind.name":"Vietor","upgrades.wind.tooltip":"Poschodová poloha vytvára vietor","upgrades.wind.verbose_description":"Vietor závisí od polohy pádu: ľavé údery vľavo, vpravo fúka. Ovplyvňuje guľôčky a mince.","upgrades.wrap_left.name":"Balenie vľavo","upgrades.wrap_left.tooltip":"Narazil na ľavej strane teleports loptu na pravej strane","upgrades.wrap_left.verbose_description":"Vyššie úrovne teleportové mince tiež.","upgrades.wrap_right.name":"Zabaliť právo","upgrades.wrap_right.tooltip":"Narazil na pravej strane teleports loptu na ľavej strane","upgrades.wrap_right.verbose_description":"Vyššie úrovne teleportové mince tiež.","upgrades.wrap_up.name":"Zabaliť hore","upgrades.wrap_up.tooltip":"Dotykanie hornej obrazovky bude teleport loptu tesne nad pádom.","upgrades.wrap_up.verbose_description":"To nebude počítať ako pád paddleboard. Na úrovni 2, mince teleport tiež.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"Lopta padá smerom k pádu","upgrades.yoyo.verbose_description":"Je to opak telekinézy, ovládať loptu, zatiaľ čo to padá späť.","upgrades.zen.name":"Slovenčina","upgrades.zen.tooltip":"Viac mincí, ak nechcete spúšťať bomby","upgrades.zen.verbose_description":"+{{lvl}} combo každý 3s, reset, keď je výbuch"}');var z=f("5mG9B"),B=f("6QuVk"),Y=document.createElement("div");function J(e){var a=arguments.length>1&&void 0!==arguments[1]?arguments[1]:"";X(),Y.classList="toast visible "+a,Y.innerHTML=e,o=setTimeout(X,1500)}function X(){o&&(clearTimeout(o),o=void 0),Y.classList="hidden toast"}Y.classList="hidden toast",document.body.appendChild(Y);var Q={},$=!1;try{for(var ee in localStorage)try{Q[ee]=JSON.parse(localStorage.getItem(ee)||"null")}catch(e){$||($=!0,J("Storage issue : ".concat(null==e?void 0:e.message))),console.warn("Reading "+ee,e)}}catch(e){console.warn(e)}function ea(e,a){var r;return null!==(r=Q[e])&&void 0!==r?r:a}var er=new Set;function et(e,a){er.add(e),Q[e]=a}function es(){try{var e=!0,a=!1,r=void 0;try{for(var t,s=er[Symbol.iterator]();!(e=(t=s.next()).done);e=!0){var o=t.value;localStorage.setItem(o,JSON.stringify(Q[o]))}}catch(
