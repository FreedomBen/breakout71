\n\\nDiese Upgrades verbessern deine Combos schrittweise, fügen aber auch eine Combo-Reset-Bedingung hinzu. Ein Upgrade ist sinnvoll, mehr Upgrades erhöhen das Risiko und den Nutzen.","unlocks.category.combo_boost":"## Combo-Booster-Upgrades\\n\\nDiese Upgrades erhöhen die Combo oder den Combo-Multiplikator, ohne eine Reset-Bedingung hinzuzufügen.","unlocks.category.simple":"## Helfer-Upgrades\\n\\nDiese Upgrades sind in fast jedem Build nützlich.","unlocks.greyed_out_help":"Die ausgegrauten Upgrades können freigeschaltet werden, indem du Ihre Gesamtpunktzahl erhöhst. Die Gesamtpunktzahl erhöht sich jedes Mal, wenn du im Spiel punktest.","unlocks.intro":"Deine Gesamtpunktzahl ist {{ts}}. Klicke auf ein Upgrade, um ein Spiel damit zu starten.","unlocks.just_unlocked":"Level freigeschaltet","unlocks.just_unlocked_plural":"Du hast gerade {{count}} Stufen freigeschaltet","unlocks.level":"Du hast {{unlocked}} Stufen von {{out_of}} freigeschaltet","unlocks.level_description":"Ein {{size}}x{{size}} Level mit {{bricks}} Steinen, {{colors}} Farben und {{bombs}} Bomben.","unlocks.levels":"Freigeschaltete Level","unlocks.minScore":"Erreiche ${{minScore}} in einem Lauf zum freischalten.","unlocks.minScoreWithPerks":"Erreiche ${{minScore}} in einem Spiel mit {{required}} , aber ohne {{forbidden}} freizuschalten.","unlocks.minScoreWithPerksNoForbidden":"Erreiche ${{minScore}} in einem Spiel mit {{required}} freizuschalten.","unlocks.minTotalScore":"Summiert ein Punktstand von ${{score}}","unlocks.reached":"Ihr bester Punktstand war {{reached}}.","unlocks.title_upgrades":"Du hast {{unlocked}} Upgrades von {{out_of}} freigeschaltet.","unlocks.try":"Versuchen","unlocks.upgrades":"Freigeschaltete Upgrades","unlocks.use":"Verwenden","upgrades.addiction.name":"Sucht","upgrades.addiction.tooltip":"+{{lvl}} Combo / Stein, Combo wird {{delay}}s nach Zerbrechen eines Steins zurückgesetzt.","upgrades.addiction.verbose_description":"Der Countdown beginnt erst nach dem Zerbrechen des ersten Steins eines jeden Levels. Er stoppt, sobald alle Ziegel zerstört sind.","upgrades.asceticism.name":"Askese","upgrades.asceticism.tooltip":"+{{combo}} Combo / Ziegel, - {{combo}} bei Münzfang","upgrades.asceticism.verbose_description":"Du musst die Münzen irgendwo aufbewahren, während die Combo steigt.","upgrades.ball_attract_ball.name":"Schwerkraft","upgrades.ball_attract_ball.tooltip":"Bälle ziehen Bälle an","upgrades.ball_attract_ball.verbose_description":"Bälle, die mehr als \\"3/4 der Spielfeldbreite\\" entfernt sind, beginnen sich gegenseitig anzuziehen.\\n\\nDie Anziehungskraft ist stärker, wenn sie am weitesten voneinander entfernt sind.\\n\\nUm die Anziehungskraft zu symbolisieren, fliegen Regenbogenpartikel. Dieser Vorteil wird nur angeboten, wenn du bereits mehr als einen Ball hast.","upgrades.ball_attracts_coins.name":"Bälle ziehen Münzen an","upgrades.ball_attracts_coins.tooltip":"Die Münzen folgen dem nächstgelegenen Ball und fallen langsamer herunter.","upgrades.ball_attracts_coins.verbose_description":"Dies könnte verwendet werden, um die Kugeln mit Münzen \\"anzumalen\\", wenn man es mit \\"Flecken\\" und \\"Geistermünzen\\" kombiniert. Es funktioniert auch als Ersatz für einen Münzmagneten.","upgrades.ball_repulse_ball.name":"Persönlicher Raum","upgrades.ball_repulse_ball.tooltip":"Bälle stoßen Bälle ab","upgrades.ball_repulse_ball.verbose_description":"Kugeln, die weniger als ein Viertel der Bildschirmbreite entfernt sind, stoßen sich gegenseitig ab. Die Abstoßungskraft ist stärker, wenn sie sich nahe beieinander befinden. Um diese Kraft zu symbolisieren, werden Partikel herausgeschleudert. Dieser Vorteil wird nur angeboten, wenn Sie bereits mehr als einen Ball haben.","upgrades.base_combo.name":"Starke Grundlagen","upgrades.base_combo.tooltip":"3 weitere Münzen pro zerbrochenem Ziegel","upgrades.base_combo.verbose_description":"Deine Combo beginnt normalerweise bei 1 am Anfang des Levels und wird auf 1 zurückgesetzt, wenn dein Ball zurückkehrt, ohne etwas zu treffen. Mit diesem Vorteil beginnt die Kombo 3 Punkte höher, sodass du immer mindestens 4 Münzen pro Stein erhältst. Immer, wenn deine Kombo zurückgesetzt wird, steht sie wieder bei 4 und nicht bei 1. Dein Ball wird ein wenig glitzern, um anzuzeigen, dass sein Combo höher als 1 ist.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Größere Explosionen","upgrades.bigger_explosions.verbose_description":"Die Standardexplosion räumt ein 3x3-Quadrat, mit dieser wird es zu einem 5x5-Quadrat, und der Schlag auf die Münzen ist auch wesentlich stärker. Der Bildschirm blinkt nach jeder Explosion (außer im Basismodus)","upgrades.bigger_puck.name":"Größeres Paddel","upgrades.bigger_puck.tooltip":"Einfach mehr Münzen fangen.","upgrades.bigger_puck.verbose_description":"Ein größeres Paddel macht es einfacher, den Ball nie zu verfehlen und mehr Münzen zu fangen. Außerdem kann man die Abpraller genau ausrichten (der Winkel des Balls hängt nur davon ab, wo er das Paddel trifft).","upgrades.bricks_attract_ball.name":"Ziegelsteine ziehen Bälle an","upgrades.bricks_attract_ball.tooltip":"Der Ball fliegt zu den ersten {{count}} Steinen, die er trifft.","upgrades.bricks_attract_ball.verbose_description":"Der Ball fliegt zu den ersten {{count}} Steinen, die er trifft. Der Effekt ist bei höheren Stufen stärker. Die Anzahl der Steine, die getroffen werden können, bevor der Effekt aufhört, ist ebenfalls höher. Der Effekt setzt wieder ein, wenn der Ball das Paddel trifft.","upgrades.bricks_attract_coins.name":"Ziegelsteine ziehen Münzen an","upgrades.bricks_attract_coins.tooltip":"Hilft ihnen, dort oben zu bleiben","upgrades.bricks_attract_coins.verbose_description":"Die Münzen werden von nahe gelegenen Steinen angezogen. Auf höheren Stufen ist die Anziehungskraft stärker.","upgrades.buoy.name":"Boje","upgrades.buoy.tooltip":"Münzen schweben {{duration}} Sekunden lang auf der unteren Linie.","upgrades.buoy.verbose_description":"Der Effekt ist im mobilen Modus am deutlichsten sichtbar","upgrades.chill.name":"Chill","upgrades.chill.tooltip":"Keine weiteren Upgrades, unbegrenzte Levels.","upgrades.chill.verbose_description":"Der Ball beschleunigt auch viel weniger.","upgrades.clairvoyant.name":"Hellsichtig","upgrades.clairvoyant.tooltip":"Sehen Sie die nächsten Levels, die HP der Steine und die Ballrichtung","upgrades.clairvoyant.verbose_description":"Hilft dir, die richtigen Upgrades auszuwählen und zu verstehen, was es mit den robusten Steinen auf sich hat. Level 2 und 3 bringen zusätzliches Wissen von zweifelhaftem Nutzen (erreichbar im Loop-Modus)","upgrades.coin_magnet.name":"Magnet für Münzen","upgrades.coin_magnet.tooltip":"Paddel zieht Münzen an","upgrades.coin_magnet.verbose_description":"Lenkt die Münzen auf das Paddel. Der Effekt ist stärker, wenn die Münze bereits in der Nähe ist.","upgrades.compound_interest.name":"Zinseszins","upgrades.compound_interest.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, Rücksetzung bei verlorener Münze","upgrades.compound_interest.verbose_description":"Deine Combo wächst jedes Mal um eins, wenn du einen Stein zerbrichst, und bringt mit jedem Stein, den du zerbrichst, mehr und mehr Münzen hervor.\\nAchten Sie jedoch darauf, jede dieser Münzen mit Ihrem Paddel aufzufangen, da jede verlorene Münze Ihre Combo zurücksetzt.\\nSobald deine Kombo über dem Minimum liegt, wird der Boden des Spielfelds mit einer roten Linie markiert, um dich daran zu erinnern, dass die Münzen nicht dorthin gehören.","upgrades.concave_puck.name":"Konkaves Paddel","upgrades.concave_puck.tooltip":"Verbessert die vertikale Zielgenauigkeit","upgrades.concave_puck.verbose_description":"Die Bälle gehen zu Beginn des Levels gerade nach oben und prallen in einem geringeren Winkel ab.","upgrades.corner_shot.name":"Eckball","upgrades.corner_shot.tooltip":"Lässt Ihr Paddel mit den Rändern des Bildschirms überlappen","upgrades.corner_shot.verbose_description":"Hilft beim Zielen in die Ecken. Weitere Stufen lassen dich weiter hinausgehen.","upgrades.double_or_nothing.name":"Doppelt oder nichts","upgrades.double_or_nothing.tooltip":"Combo steigt {{multiplier}} -mal schneller, aber Sie verlieren bei jedem Zurücksetzen {{percent}}% Ihrer Punktzahl.","upgrades.double_or_nothing.verbose_description":"Der Combo-Reset zählt nur, wenn deine Combo über dem Minimum lag","upgrades.etherealcoins.name":"Münzen, im Weltraum","upgrades.etherealcoins.tooltip":"Münzen werden nicht mehr von der Schwerkraft beeinflusst","upgrades.etherealcoins.verbose_description":"Die Münzen behalten ihre Geschwindigkeit auch nach mehreren Aufprallvorgängen bei und werden nicht mehr durch die Schwerkraft beeinflusst.","upgrades.extra_levels.name":"5 min mehr","upgrades.extra_levels.tooltip":"Spielen Sie {{count}} Stufen statt 7","upgrades.extra_levels.verbose_description":"Das Standardspiel kann maximal 7 Stufen dauern, danach ist das Spiel vorbei.\\n\\nMit jeder Stufe dieses Vorteils können Sie eine Stufe höher gehen. Die letzten Level sind oft diejenigen, in denen man die meisten Punkte macht, so dass der Unterschied dramatisch sein kann.","upgrades.extra_life.name":"Extraleben","upgrades.extra_life.tooltip":"Rettet deinen letzten Ball, wenn er kurz davor ist, verloren zu gehen","upgrades.extra_life.verbose_description":"Das Leben wird dabei verbraucht. Zusätzliche Leben werden als Linien hinter dem Paddel angezeigt.","upgrades.forgiving.name":"Verzeihen","upgrades.forgiving.tooltip":"Durch fehlende Pausen wird die Kombo schrittweise reduziert, anstatt auf einmal.","upgrades.forgiving.verbose_description":"Der erste Fehlschuss pro Level ist kostenlos, dann 10% der Combo, dann 20% ...","upgrades.fountain_toss.name":"Springbrunnen-Wurf","upgrades.fountain_toss.tooltip":"Steigere dein Combo, wenn du Münzen verpasst.","upgrades.fountain_toss.verbose_description":"Wenn du eine Münze verpasst und deine Combo unter {{max}}war, hat deine Combo eine Wahrscheinlichkeit von {{lvl}}/Combo um eins zu erhöhen.","upgrades.ghost_coins.name":"Geistermünzen","upgrades.ghost_coins.tooltip":"Münzen gehen langsam durch Ziegelsteine","upgrades.ghost_coins.verbose_description":"Das ist kein Bug, sondern ein Feature!  Die Münzen fliegen nur langsam durch die Ziegel. Höhere Stufen lassen sie schneller fliegen.","upgrades.golden_goose.name":"Goldene Gans","upgrades.golden_goose.tooltip":"Münzen teleportieren sich zum Ball, nachdem sie einen Ziegelstein getroffen haben","upgrades.golden_goose.verbose_description":"Immer wenn eine Münze einen Ziegelstein trifft, teleportieren Sie diese Münze zum nächsten Ball. Auf Stufe zwei teleportieren sich Münzen auch, wenn sie eine Seite treffen.","upgrades.happy_family.name":"Glückliche Familie","upgrades.happy_family.tooltip":"Mehr Münzen, wenn du alle Bälle im Spiel behältst.","upgrades.happy_family.verbose_description":"+1 Combo pro zusätzlichem Ball pro Schlägersprung. Die Combo wird zurückgesetzt, wenn ein Ball verloren geht. Nur Bälle über 1 ergeben eine Combo.","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Umgekehrte Schwerkraft links und rechts des Paddels","upgrades.helium.verbose_description":"Auf Stufe 1 ist die Schwerkraft reduziert. Auf Stufe 2 schweben die Münzen langsam nach oben. Auf Stufe 3 fliegen sie richtig.","upgrades.hot_start.name":"Heißer Start","upgrades.hot_start.tooltip":"Start bei Kombo {{start}}, -{{loss}} Kombo pro Sekunde","upgrades.hot_start.verbose_description":"Zu Beginn eines jeden Levels beginnt deine Kombo mit +{{start}} Punkten, aber dann wird sie jede Sekunde um {{loss}} Punkte verringert. Der Effekt ist mit anderen Vorteilen kombinierbar.","upgrades.implosions.name":"Implosionen","upgrades.implosions.tooltip":"Explosionen saugen Münzen an, anstatt sie wegzublasen","upgrades.implosions.verbose_description":"Die Explosionskraft wird in die andere Richtung angewendet. Weitere Stufen wirken als \\"größere Explosion\\".","upgrades.left_is_lava.name":"Linke Seite meiden","upgrades.left_is_lava.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein. Combo wird zurückgesetzt, wenn der Ball die linke Seite des Bildschirms trifft.","upgrades.left_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erhöht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine Münze mehr bekommst.\\n\\nAllerdings wird deine Combo zurückgesetzt, sobald dein Ball die linke Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die linke Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.","upgrades.limitless.name":"Grenzenlos","upgrades.limitless.tooltip":"Erhöhe die maximale Stufe aller Aufwertungen um {{lvl}}","upgrades.limitless.verbose_description":"Durch die Wahl dieses Vorteils wird auch sein eigenes Limit um eins erhöht, so dass man es erneut wählen kann.","upgrades.metamorphosis.name":"Metamorphose","upgrades.metamorphosis.tooltip":"Jede Münze kann {{lvl}} Steine mit ihrer Farbe färben","upgrades.metamorphosis.verbose_description":"Mit diesem Vorteil haben die Münzen die Farbe des Ziegels, aus dem sie stammen, und färben den ersten Ziegel den sie berühren in derselben Farbe. Die Münzen spawnen mit der Geschwindigkeit des Balls, der sie zerbrochen hat, was bedeutet, dass du ein bisschen in die Richtung der Ziegelsteine zielen kannst, die du \\"anmalen\\" willst. Auf Stufe 1 kann jede Münze 1 Ziegelstein einfärben, bevor sie \\"verbraucht\\" ist und hohl erscheint.","upgrades.minefield.name":"Minenfeld","upgrades.minefield.tooltip":"+{{percent}}% Münzen pro Bombenstein auf dem Bildschirm","upgrades.minefield.verbose_description":"Bomben werden auch während der Explosion gezählt.","upgrades.multiball.name":"Multi-Ball","upgrades.multiball.tooltip":"Beginne jedes Level mit {{count}} Bällen.","upgrades.multiball.verbose_description":"Sobald du den Ball in Breakout 71 fallen lässt, hast du verloren.\\n\\nMit diesem Vorteil erhalten Sie zwei Bälle und können es sich daher leisten, einen zu verlieren.\\n\\nDie verlorenen Bälle kommen im nächsten Level zurück.\\n\\nWenn du mehr als einen Ball hast, stehen dir weitere Vergünstigungen zur Verfügung, und du kannst das Level natürlich schneller abschließen.","upgrades.nbricks.name":"Strenger Stichprobenumfang","upgrades.nbricks.tooltip":"Triff genau {{lvl}} Steine pro Paddle Bounce für +{{lvl}} Combo, sonst wird er zurückgesetzt","upgrades.nbricks.verbose_description":"Ihr müsst die Steine nicht unbedingt zerstören, aber ihr müsst sie treffen. Durch Explosionen zerstörte Ziegelsteine zählen nicht.","upgrades.one_more_choice.name":"Extra Auswahl","upgrades.one_more_choice.tooltip":"Weitere Stufenaufstiege bieten {{lvl}} weitere Option(en) in der Liste","upgrades.one_more_choice.verbose_description":"Jedes Upgrade-Menü wird eine weitere Option enthalten.  Erhöht nicht die Anzahl der Upgrades, die Sie auswählen können.","upgrades.ottawa_treaty.name":"Ottawa-Vertrag","upgrades.ottawa_treaty.tooltip":"Das Zerschlagen eines Ziegelsteins in der Nähe einer Bombe entschärft diese","upgrades.ottawa_treaty.verbose_description":"Die nahe Bombe wird durch einen farbigen Block ersetzt. Wenn du einen Pionier hast, verliert der Ball seinen Pioniereffekt bis zum nächsten Aufprall. Es kann immer nur eine Bombe ersetzt werden.","upgrades.passive_income.name":"Passives Einkommen","upgrades.passive_income.tooltip":"+{{lvl}} Combo / Brick, es sei denn, das Paddel hat sich in den letzten {{time}}s bewegt, dann wird es stattdessen zurückgesetzt","upgrades.passive_income.verbose_description":"Einige Vergünstigungen können den Bällen helfen, das zu tun, was du willst, ohne dass du etwas tun musst.","upgrades.picky_eater.name":"Wählerischer Esser","upgrades.picky_eater.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, wird bei Farbwechsel des Balls zurückgesetzt","upgrades.picky_eater.verbose_description":"Jedes Mal, wenn du einen Stein der gleichen Farbe wie deine Kugel zerstörst, erhöht sich deine Kombination um eins.\\nWenn es eine andere Farbe ist, nimmt der Ball diese neue Farbe an, aber die Kombination wird zurückgesetzt, es sei denn, es sind keine Steine in der Farbe des Balls übrig.\\nSobald du eine höhere Kombination als das Minimum erreicht hast, werden die Steine der falschen Farbe rot umrandet.\\nWenn du mehr als eine Kugel hast, wechseln sie alle die Farbe, sobald eine von ihnen einen Stein trifft.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Der Ball durchdringt {{count}} Steine nach einem Paddle Bounce","upgrades.pierce.verbose_description":"Der Ball prallt normalerweise ab, sobald er etwas berührt. Mit diesem Vorteil setzt er seine Flugbahn für bis zu 3 Ziegelsteine gebrochen fort.\\n\\nDanach prallt er am 4. Ziegelstein ab, und du musst das Paddel berühren, um den Zähler zurückzusetzen.","upgrades.pierce_color.name":"Farbe durchstechen","upgrades.pierce_color.tooltip":"+{{lvl}} Schaden an Steinen der Farbe der Kugel","upgrades.pierce_color.verbose_description":"Wenn ein Ball auf einen gleichfarbigen Stein trifft, geht er ungehindert durch.\\n\\nSobald er einen andersfarbigen Stein erreicht, zerbricht er ihn, nimmt seine Farbe an und springt auf.\\n\\nWenn du robuste Steine hast, kann es sein, dass der Ball trotzdem an einem gleichfarbigen Stein abprallt.","upgrades.puck_repulse_ball.name":"Weiche Landung","upgrades.puck_repulse_ball.tooltip":"Paddel stößt Bälle ab","upgrades.puck_repulse_ball.verbose_description":"Wenn ein Ball in die Nähe des Schlägers kommt, wird er langsamer und springt möglicherweise sogar, ohne den Schläger zu berühren.","upgrades.rainbow.name":"Regenbogen","upgrades.rainbow.tooltip":"Münzen spawnen in Regenbogenfarben.","upgrades.rainbow.verbose_description":"Mit jedem Level steigt der Anteil der farbigen Münzen. Die Farbe hängt von der Levelzeit ab.","upgrades.reach.name":"Von oben nach unten","upgrades.reach.tooltip":"Das Berühren der N Steine der untersten Reihe setzt die Kombo zurück. Andernfalls: +N Combo","upgrades.reach.verbose_description":"Wenn es nur eine Reihe von Steinen gibt, oder wenn die unterste Reihe von Steinen die gesamte Breite des Spiels abdeckt, dann bewirkt dieser Vorteil nichts. Andernfalls wird die Combo zurückgesetzt, wenn diese unterste Reihe zerstört wird, während alles andere die Combo um die Anzahl der Steine in dieser untersten Reihe erhöht.\\n\\nDie unterste Reihe wird in rot hervorgehoben.","upgrades.respawn.name":"Neu spawnen","upgrades.respawn.tooltip":"{{percent}}% der Steine spawnen nach {{delay}}s erneut.","upgrades.respawn.verbose_description":"Partikeleffekte zeigen an, wo Ziegel erscheinen werden.","upgrades.right_is_lava.name":"Vermeiden Sie die rechte Seite","upgrades.right_is_lava.tooltip":"+{{lvl}} Kombo pro Stein. Combo wird zurückgesetzt, wenn der Ball die rechte Seite des Bildschirms trifft.","upgrades.right_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erhöht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine Münze mehr bekommst.\\n\\nAllerdings wird deine Kombo zurückgesetzt, sobald dein Ball die rechte Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die rechte Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.","upgrades.sacrifice.name":"Opfern Sie","upgrades.sacrifice.tooltip":"Der Verlust eines Lebens {{lvl}}x die Combo löscht dann alle Steine","upgrades.sacrifice.verbose_description":"Damit könnte die Kombination ziemlich hoch werden.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"Der erste zerbrochene Ziegelstein wird zu einer Bombe.","upgrades.sapper.verbose_description":"Anstatt einfach zu verschwinden, wird der erste Stein, den du zerbrichst, durch einen Bombenstein ersetzt. Wenn du den Ball auf dem Paddel abprallen lässt, wird der Effekt wieder aktiviert. Wenn Sie diese Fähigkeit aufwerten, können Sie mehr Bomben platzieren.","upgrades.shocks.name":"Schocks","upgrades.shocks.tooltip":"Kollisionen mit explosiven Kugeln","upgrades.shocks.verbose_description":"Wenn zwei Bälle zusammenstoßen, tauschen sie ihre Geschwindigkeit, lösen eine Explosion aus und gewinnen an Geschwindigkeit, um sie zu trennen.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Behalte {{percent}}% deines Combos zwischen den Levels","upgrades.shunt.verbose_description":"Wenn Sie auch Heißstart haben, wird der Heißstart einfach zur aktuellen Kombination hinzugefügt.","upgrades.side_flip.name":"Rechtshändig","upgrades.side_flip.tooltip":"+{{lvl}} Combo pro von rechts gebrochenem Stein, sonst -{{loss}}","upgrades.side_flip.verbose_description":"Triff den Ziegelstein auf der rechten Seite, um +{{lvl}} Combo zu erhalten, aber vermeide es, ihn auf der linken Seite zu treffen, da dies {{loss}} Combo reduziert. Schläge von oben und unten haben keinen Effekt.","upgrades.side_kick.name":"Linkshändig","upgrades.side_kick.tooltip":"+{{lvl}} Combo pro von links gebrochenem Stein, sonst -{{loss}}","upgrades.side_kick.verbose_description":"Triff den Ziegelstein auf der linken Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der rechten Seite zu treffen, da dies 2 Combo entfernen würde. Schläge von oben und unten haben keinen Effekt.","upgrades.skip_last.name":"Einfaches Aufräumen","upgrades.skip_last.tooltip":"Der letzte Stein wird explodieren.","upgrades.skip_last.verbose_description":"Du musst alle Steine zerbrechen, um die nächste Ebene zu erreichen. Es kann jedoch schwierig sein, die letzten Steine zu bekommen.\\n\\nWenn du ein Level früh beendest, hast du zusätzliche Möglichkeiten, um aufzurüsten. Es ist auch sehr vorteilhaft, nie die Steine zu verpassen.\\n\\nWenn es dir also schwerfällt, die letzten Steine zu zerbrechen, kann es helfen, wenn du diesen Vorteil ein paar Mal bekommst.","upgrades.slow_down.name":"Langsamer Ball","upgrades.slow_down.tooltip":"Der Ball bewegt sich langsamer","upgrades.slow_down.verbose_description":"Der Ball fängt relativ langsam an, aber mit jeder Spielstufe wird er ein bisschen schneller.\\n\\nEr wird auch schneller, wenn du viel Zeit in einem Level verbringst.\\n\\nDieser Vorteil macht ihn überschaubarer.\\n\\nDu kannst ihn jedes Mal beim Start erhalten, indem du den Kindermodus im Menü aktivierst.","upgrades.smaller_puck.name":"Kleineres Paddel","upgrades.smaller_puck.tooltip":"Gibt auch +5 Basis-Kombo","upgrades.smaller_puck.verbose_description":"Dadurch wird das Paddel kleiner, was theoretisch einige Eckschüsse einfacher macht, aber eigentlich nur den Schwierigkeitsgrad erhöht.\\n\\nDeshalb gibt es auch einen netten Bonus von +5 Münzen pro Ziegelstein für alle Ziegelsteine, die du nach der Auswahl dieser Option zerstörst.","upgrades.soft_reset.name":"Weicher Reset","upgrades.soft_reset.tooltip":"Combo-Rückstellungen halten {{percent}}%","upgrades.soft_reset.verbose_description":"Begrenzen Sie die Auswirkungen eines Combo-Resets.","upgrades.steering.name":"Lenkung","upgrades.steering.tooltip":"Bälle drehen sich, wenn das Paddel bewegt wird","upgrades.steering.verbose_description":"Die Änderung der Paddelposition hat direkten Einfluss auf die Bewegungsrichtung der Bälle. Auf Stufe 2+ erhältst du eine Linie, die dir die Richtung der Bälle anzeigt.","upgrades.sticky_coins.name":"Klebrige Münzen","upgrades.sticky_coins.tooltip":"Münzen haften an Steinen der gleichen Farbe","upgrades.sticky_coins.verbose_description":"Auf Stufe 2 haften sie an Steinen jeder Farbe","upgrades.streak_shots.name":"Glückssträhne","upgrades.streak_shots.tooltip":"Mehr Münzen, wenn du viele Steine zerbrichst, bevor du auf das Paddel springst.","upgrades.streak_shots.verbose_description":"Jedes Mal, wenn du einen Stein zerbrichst, erhöht sich dein Combo um eins.\\n\\nSobald der Ball jedoch Ihr Paddel berührt, wird die Kombination auf ihren Standardwert zurückgesetzt.\\n\\nSobald deine Kombo den Basiswert übersteigt, wird dein Paddel rot umrandet, um dich daran zu erinnern, dass es deine Kombo zerstört, wenn du es mit dem Ball berührst.","upgrades.sturdy_bricks.name":"Stabile Ziegel","upgrades.sturdy_bricks.tooltip":"+{{lvl}} Ziegel HP, +{{percent}}% Münzen, die beim Zerbrechen erzeugt werden","upgrades.sturdy_bricks.verbose_description":"Jede Stufe dieses Vorteils fügt allen Steinen einen HP hinzu. Du kannst die HP-Zahl mit dem Vorteil \\"Hellseher\\" sehen. Du kannst den Schaden der Kugeln erhöhen, indem du den \\"Piercing\\"-Vorteil bekommst. Jede Stufe des Vorteils erhöht den Spawn von Münzen um 50 %.","upgrades.superhot.name":"SUPER HEISS","upgrades.superhot.tooltip":"Die Zeit bewegt sich, wenn sich das Paddel bewegt.","upgrades.superhot.verbose_description":"SUPERHEISS SUPERHEISS SUPERHEISS SUPERHEISS","upgrades.telekinesis.name":"Telekinese","upgrades.telekinesis.tooltip":"Das Paddel steuert die Flugbahn des Balls","upgrades.telekinesis.verbose_description":"Du kontrollierst den Ball, während er nach oben fliegt. Der Effekt ist in der unteren Bildschirmhälfte stärker.","upgrades.three_cushion.name":"Dreiband","upgrades.three_cushion.tooltip":"+1 Combo pro Treffer an den Seiten und von oben. Die Combo wird zurückgesetzt, wenn Sie einen Ziegel treffen, ohne vorher abzuprallen.","upgrades.three_cushion.verbose_description":"+1 Combo pro Treffer an den Seiten und von oben, bis zu +{{max}} pro Paddelabprall.\\n\\nJeder Treffer an einer Seite erhöht die Combo um eins, bis zu +3.\\nDanach wird bis zum nächsten Paddelabprall keine Combo mehr erzielt.\\n\\nDie Combo wird zurückgesetzt, wenn du einen Stein triffst, ohne vorher abzuprallen.","upgrades.top_is_lava.name":"Der Himmel ist die Grenze","upgrades.top_is_lava.tooltip":"+{{lvl}} Combo pro Stein, wird zurückgesetzt, wenn die Spitze getroffen wird","upgrades.top_is_lava.verbose_description":"Jedes Mal, wenn du einen Stein zerbrichst, erhöht sich deine Kombo um eins. Allerdings wird deine Kombo zurückgesetzt, sobald dein Ball den oberen Rand des Bildschirms trifft.\\n\\nWenn deine Kombo über dem Minimum liegt, erscheint oben ein roter Balken, der dich daran erinnert, dass du es vermeiden solltest, ihn zu treffen.","upgrades.trampoline.name":"Trampolin","upgrades.trampoline.tooltip":"+{{lvl}} Combo pro Paddelabprall, -{{lvl}} Combo pro Abprall an einer beliebigen Grenze","upgrades.trampoline.verbose_description":"Eine der seltenen Combo-Upgrades, die keine Rücksetzbedingung hinzufügen","upgrades.transparency.name":"Transparenz","upgrades.transparency.tooltip":"Je höher der Ball auf dem Bildschirm ist, desto transparenter wird er. Je transparenter sie ist, desto mehr Münzen produziert sie.","upgrades.transparency.verbose_description":"Je höher die Stufe, desto eher wird der Ball transparent und desto höher ist der Punktebonus.","upgrades.trickledown.name":"Nach unten durchsickern","upgrades.trickledown.tooltip":"Die Münzen erscheinen am oberen Rand des Bildschirms.","upgrades.trickledown.verbose_description":"Die Münzen bleiben auf Ziegeln in der obersten Reihe liegen. Sie beginnen erst zu fallen, wenn der Ziegel weg ist.\\nEs könnte dir helfen, ein paar Münzen zur Seite zu legen.","upgrades.unbounded.name":"Polsterung","upgrades.unbounded.tooltip":"Fügt links und rechts des Levels Platz hinzu, aber dein Paddel kann nicht so weit gehen.","upgrades.unbounded.verbose_description":"Ein weiteres Upgrade könnte dir helfen, die Reichweite des Paddels zu vergrößern.","upgrades.viscosity.name":"Viskosität","upgrades.viscosity.tooltip":"Langsamerer Münzfall","upgrades.viscosity.verbose_description":"Münzen beschleunigen normalerweise durch Schwerkraft und Explosionen auf ziemlich hohe Geschwindigkeiten.\\n\\nMit dieser Fähigkeit werden sie ständig langsamer, als ob sie sich in einer Art zähflüssiger Flüssigkeit befänden.\\n\\nDas macht es einfacher, sie zu fangen, und lässt sich gut mit Perks kombinieren, die die Bewegung der Münze beeinflussen.","upgrades.wind.name":"WIND","upgrades.wind.tooltip":"Paddelstellung erzeugt Wind","upgrades.wind.verbose_description":"Der Wind hängt von der Paddelposition ab: links bläst links, rechts bläst rechts. Wirkt sich sowohl auf Bälle als auch auf Münzen aus.","upgrades.wrap_left.name":"Nach links umbrechen","upgrades.wrap_left.tooltip":"Wenn Sie die linke Seite treffen, wird der Ball auf die rechte Seite teleportiert","upgrades.wrap_left.verbose_description":"Höhere Level teleportieren auch Münzen.","upgrades.wrap_right.name":"Rechts umbrechen","upgrades.wrap_right.tooltip":"Wenn Sie die rechte Seite treffen, wird der Ball auf die linke Seite teleportiert","upgrades.wrap_right.verbose_description":"Höhere Level teleportieren auch Münzen.","upgrades.wrap_up.name":"Einpacken","upgrades.wrap_up.tooltip":"Durch Berühren der Oberseite des Bildschirms wird der Ball direkt über den Schläger teleportiert.","upgrades.wrap_up.verbose_description":"Dies zählt nicht als Paddeltreffer. Auf Stufe 2 teleportieren auch die Münzen.","upgrades.yoyo.name":"Yo-Yo","upgrades.yoyo.tooltip":"Ball fällt in Richtung Paddel","upgrades.yoyo.verbose_description":"Es ist das Gegenteil von Telekinese, den Ball zu kontrollieren, während er wieder nach unten fällt.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"Mehr Münzen, wenn Sie keine Bomben auslösen","upgrades.zen.verbose_description":"Schließlich handelt es sich um ein gewaltfreies Spiel."}');var D={};D=JSON.parse('{"confirmRestart.no":"취소","confirmRestart.text":"새 게임을 시작하려고 합니다. 계속하시겠습니까?","confirmRestart.title":"새 게임을 시작하시나요?","confirmRestart.yes":"게임 다시 시작","editor.editing.bigger":"수평 크기 증가","editor.editing.color":"색상 목록에서 색상 선택 (최대 5 레벨 당)","editor.editing.copied":"비밀번호","editor.editing.copy":"복사 레벨 코드","editor.editing.copy_help":"디스코드에서 레벨 코드를 공유하여 게임에 포함할 수 있습니다.","editor.editing.credit":"크레딧 및 소스","editor.editing.credit_prompt":"소스 URL을 입력하거나 레벨의 설명.","editor.editing.delete":"삭제 수준","editor.editing.down":"모든 벽돌을 아래로 이동","editor.editing.help":"그런 다음 타일을 클릭합니다.","editor.editing.left":"왼쪽에 모든 벽돌을 이동","editor.editing.play":"이 레벨을 재생","editor.editing.rename":"레벨 이름","editor.editing.rename_prompt":"레벨의 새 이름을 입력하세요.","editor.editing.right": \\n\\"콤보\\"는 벽돌이 깨질 때 생성되는 코인의 개수입니다.\\n패들에 표시되며, 예를 들어 \uD83E\uDE994는 각 브릭이 4개의 코인을 생성한다는 뜻입니다.\\n콤보를 증가시키는 대부분의 업그레이드에는 콤보를 초기화하는 조건이 추가됩니다.\\n공이 벽돌에 부딪히지 않고 패들로 돌아오면 콤보가 초기화됩니다.\\n이 경우 \\"미스\\" 메시지가 표시됩니다.\\n\\n매번 벽돌을 향해 조준하세요.\\n\\n## 조준\\n\\n패들에서 공의 위치에 따라 공이 튀어 오르는 방식이 결정됩니다.\\n공이 패들 중앙에 맞으면 수직으로 튀어 오르게 됩니다.\\n한쪽에 더 많이 맞으면 각도가 더 커집니다.\\n패들 속도와 들어오는 각도는 바운드 후 공의 방향에 영향을 미치지 않습니다.\\n\\n조준에 도움이 되는 다양한 업그레이드를 잠금 해제할 수 있습니다.\\n\\n## 잠금 해제\\n\\n브레이크아웃 71을 처음 플레이할 때는 대부분의 업그레이드와 레벨이 잠겨 있습니다.\\n업그레이드는 단순히 플레이하고 코인을 많이 잡으면 잠금 해제됩니다.\\n첫 번째 레벨은 높은 점수에 도달하면 잠금 해제됩니다.\\n이후 레벨에는 선택할 수 있는 특전에 대한 조건이 추가됩니다.\\n\\n메달 덕분에 레벨당 여러 번의 업그레이드를 받으면 고득점에 도달하기가 훨씬 쉬워집니다.\\n\\n메달 ## 메달\\n\\n게임을 잘하면 추가 업그레이드와 선택권을 얻을 수 있습니다:\\n\\n- 레벨을 빠르게 클리어하세요\\n- 모든 동전 잡기\\n- 항상 패들 바운스 사이에 무언가를 치십시오.","help.help":"게임에 대해 더 알아보기","help.levels":"한국어","help.title":"지원하다","help.upgrades":"## 업그레이드","history.columns.score":"점수","history.columns.started":"날짜","history.help":"{{count}} 개의 최고의 게임을 나열하세요.","history.include_past_versions":"과거 버전보기","history.locked":"잠금 해제하려면 최소 10개의 게임을 플레이하세요.","history.title":"기록 실행","lab.help":"원하는 빌드를 사용해 보세요.","lab.instructions":"아래에서 업그레이드를 선택한 다음 플레이할 레벨을 선택하세요.","lab.menu_entry":"크리에이티브 모드","lab.play":"뚱 베어","lab.reset":"모두 0으로 초기화","lab.select_level":"플레이할 레벨 선택","lab.unlocks_at":"총점 {{score}}에서 잠금 해제","level_up.challenges.catchRateGood.description":"금에 대한 동전의 {{gold}}%, 실버에 대한 {{silver}}%.","level_up.challenges.catchRateGood.name":"{{caught}}","level_up.challenges.earned_medal":"당신은 메달을 얻었다","level_up.challenges.earned_medal_plural":"당신이 적립 {{count}} 메달","level_up.challenges.gain":"+{{choices}} 선택 및 +{{up}} 관련 기사","level_up.challenges.levelMisses.description":"{{gold}}보다 적은 것을 놓으면 금메달을 받게 됩니다. 시간, {{silver}}에서 실버.","level_up.challenges.levelMisses.name":"{{value}} 놓은 샷","level_up.challenges.levelMisses.none":"놓친 샷 없음","level_up.challenges.levelTime.description":"{{gold}}과 {{silver}}s 아래의 은메달을 얻게 됩니다.","level_up.challenges.levelTime.name":"{{value}} 재생 시간","level_up.c :"스트레스 테스트","settings.stress_test_help":"동전의 매우 높은 숫자로 봇 제어 게임을 시작, 당신의 장치의 성능 한계를 테스트.","settings.suggestions.applied":"적용된 성과 제안!","settings.suggestions.basic_mode":"제안 : 성능 향상에 기본 모드를 켜십시오.","settings.suggestions.record":"제안 : 성능 향상을 위해 비디오 녹화를 비활성화합니다.","settings.suggestions.reduce_brightness":"제안: 성과를 개량하기 위하여 halo 크기를 감소시키십시오.","settings.suggestions.reduce_coins":"제안 : 화면의 코인 한도를 {{max}}으로 제한하여 성능을 개선하세요.","settings.suggestions.simpler_lights":"제안 : 빛 계산을 단순화하여 성능을 향상시킵니다.","settings.touch_delayed_start":"모바일에서 지연된 시작","settings.touch_delayed_start_help":"3,2,1,높이 시작","starting_perks.checked":"새로운 게임을 시작할 때, 그 특전 중 하나는 당신에게 주어질 것입니다. perk 를 클릭해 주세요.","starting_perks.help":"가능한 시작 업그레이드 선택","starting_perks.random":"모든 혜택이 제거되었습니다, 선택은 무작위로 될 것입니다.","starting_perks.title":"시작 perks","starting_perks.unchecked":"아래의 특전은 퍼크스 시작으로 제공되지 않지만 풀에 추가할 수 있습니다.","unlocks.category.advanced":"# # # # # # # # # # 고급 업그레이드\\n\\n그들은 일반적으로 스스로에 의해 아주 유용하지 않습니다, 그러나 적당한 combo 향상과 결합될 때 아주 강력한 일 수 있습니다.","unlocks.category.beginner":"## 초보자 친화적 인 업그레이드\\n\\n이러한 업그레이드는 초보자에 매우 도움이, 그들은 당신이 더 이상 재생하고 더 적은 공을 놓는 데 도움이.\\n.","unlocks.category.combo":"## 콤보 업그레이드\\n\\n이러한 업그레이드는 콤보를 크게 늘리고, 또한 콤보 리셋 상태를 추가합니다. 더 많은 위험을 증가시키고 보상을 얻는 좋은 아이디어.","unlocks.category.combo_boost":"## 콤보 부스터 업그레이드\\n\\n이러한 업그레이드는 리셋 상태를 추가하지 않고 combo 또는 combo multiplier를 증가시킵니다.","unlocks.category.simple":"# # # # # # # # # # Helper 업그레이드\\n\\n이러한 업그레이드는 거의 모든 빌드에 유용합니다.\\n.","unlocks.greyed_out_help":"회색으로 표시된 업그레이드는 총 점수를 올리면 잠금 해제할 수 있습니다. 총 점수는 게임에서 점수를 획득할 때마다 증가합니다.","unlocks.intro":"총 점수는 {{ts}}입니다. 아래는 게임에서 제공하는 모든 업그레이드와 레벨입니다.   아래에서 업그레이드 또는 레벨을 클릭하여 테스트 게임을 시작하세요.","unlocks.just_unlocked":"레벨 잠금 해제","unlocks.just_unlocked_plural":"방금 {{count}} 레벨을 잠금 해제했습니다.","unlocks.level":"자주 묻는 질문 {{out_of}}에서","unlocks.level_description":"{{bricks}} 개의 벽돌, {{colors}} 개의 색상, {{bombs}} 개의 폭탄이 있는 {{size}}x{{size}} 레벨입니다.","unlocks.levels":"잠금 해제","unlocks.minScore":"달리기에서 ${{minScore}} 에 도달하면 잠금이 해제됩니다.","unlocks.minScoreWithPerks":"잠금을 해제하려면 {{required}} 을 사용하지만 {{forbidden}} 을 사용하지 않고 실행하여{{minScore}} 달러에 도달하세요.","unlocks.minScoreWithPerksNoForbidden":"잠금 해제하려면 {{minScore}}에 도달하십시오.","unlocks.minTotalScore":"총{{score}}달러 적립","unlocks.reached":"최고 점수는 {{reached}}입니다.","unlocks.title_upgrades":"{{out_of}}에서 {{unlocked}} 개의 업그레이드를 잠금 해제했습니다.","unlocks.try":"지원하다","unlocks.upgrades":"잠금 해제","unlocks.use":"제품 정보","upgrades.addiction.name":"중독","upgrades.addiction.tooltip":"+{{lvl}} 콤보 / 벽돌, 벽돌을 부수고 {{delay}}초 후에 콤보가 초기화됩니다.","upgrades.addiction.verbose_description":"카운트다운은 각 레벨의 첫 번째 벽돌을 부순 후에만 시작됩니다. 모든 벽돌이 파괴되면 카운트다운이 멈춥니다.","upgrades.asceticism.name":"금욕주의","upgrades.asceticism.tooltip":"+{{combo}} 콤보 / 벽돌, - {{combo}} 동전 잡기","upgrades.asceticism.verbose_description":"콤보가 올라가는 동안 코인을 어딘가에 보관해야 합니다.","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attract_ball.tooltip":"공은 공을 끌어당깁니다","upgrades.ball_attract_ball.verbose_description":"\\"게임 영역 너비의 3/4\\" 이상 떨어져 있는 공은 서로 끌어당기기 시작합니다.\\n\\n공이 서로 가장 멀리 떨어져 있을수록 끌어당기는 힘이 더 강해집니다.\\n\\n무지개 입자가 날아다니며 끌어당기는 힘을 상징합니다. 이 특전은 이미 공이 두 개 이상 있는 경우에만 제공됩니다.","upgrades.ball_attracts_coins.name":"공은 동전을 끌어당깁니다","upgrades.ball_attracts_coins.tooltip":"동전은 가장 가까운 공을 따라 느리게 떨어집니다.","upgrades.ball_attracts_coins.verbose_description":"\'얼룩\' 및 \'유령 동전\'과 함께 사용하면 동전으로 공 주위를 \'페인트칠\'하는 데 사용할 수 있습니다. 동전 자석 대용으로도 사용할 수 있습니다.","upgrades.ball_repulse_ball.name":"개인 공간","upgrades.ball_repulse_ball.tooltip":"공은 공을 튕겨냅니다","upgrades.ball_repulse_ball.verbose_description":"화면 너비의 1/4 이하로 떨어진 공은 서로 반발하기 시작합니다. 공이 서로 가까이 있으면 반발력이 더 강해집니다. 이 힘이 가해지는 것을 상징하기 위해 입자가 튀어 나옵니다. 이 특전은 공이 두 개 이상 있는 경우에만 제공됩니다.","upgrades.base_combo.name":"강력한 기반","upgrades.base_combo.tooltip":"콤보는 1이 아닌 {{coins}} 에서 시작합니다.","upgrades.base_combo.verbose_description":"콤보는 일반적으로 레벨이 시작될 때 1에서 시작되며, 아무것도 치지 않고 튕기면 1로 초기화됩니다. 이 특전을 사용하면 콤보가 3점 더 높게 시작되므로 항상 브릭당 최소 4개의 코인을 얻을 수 있습니다. 콤보가 초기화될 때마다 1이 아닌 4로 돌아갑니다. 콤보가 1보다 높다는 것을 알리기 위해 공이 약간 반짝입니다.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"더 큰 폭발","upgrades.bigger_explosions.verbose_description":"기본 폭발은 3x3 정사각형을 지우고 5x5 정사각형이되며 동전에 대한 타격도 훨씬 더 강해집니다. 폭발할 때마다 화면이 깜박입니다(기본 모드 제외).","upgrades.bigger_puck.name":"더 큰 패들","upgrades.bigger_puck.tooltip":"더 많은 코인을 쉽게 획득하세요.","upgrades.bigger_puck.verbose_description":"패들이 크면 공을 놓치지 않고 더 많은 동전을 잡기 쉬울 뿐만 아니라 바운스 각도를 정확하게 맞출 수 있습니다(공이 패들에 닿는 위치에 따라 공의 각도가 달라집니다).","upgrades.bricks_attract_ball.name":"벽돌은 공을 끌","upgrades.bricks_attract_ball.tooltip":"볼 주변 벽돌로 이동","upgrades.bricks_attract_ball.verbose_description":"공이 처음 부딪히는 {{count}} 개의 벽돌을 향해 갑니다. 이 효과는 높은 레벨에서 더 강해집니다. 효과가 멈추기 전에 맞힐 수 있는 벽돌의 수도 더 많아집니다. 공이 패들을 맞히면 효과가 다시 강화됩니다.","upgrades.bricks_attract_coins.name":"벽돌은 동전을 끌어","upgrades.bricks_attract_coins.tooltip":"그들을 도와주세요","upgrades.bricks_attract_coins.verbose_description":"동전은 근처의 벽돌에 끌립니다. 레벨이 높을수록 인력이 더 강해집니다.","upgrades.buoy.name":"주 메뉴","upgrades.buoy.tooltip":"아래 줄에 {{duration}} 초에 대한 동전 float.","upgrades.buoy.verbose_description":"효력은 이동할 수 있는 형태에서 가장 눈에 보입니다","upgrades.chill.name":"칫","upgrades.chill.tooltip":"더 업그레이드 없음, 무제한 수준.","upgrades.chill.verbose_description":"공도 훨씬 느리게 가속합니다.","upgrades.clairvoyant.name":"천리안","upgrades.clairvoyant.tooltip":"다음 레벨, 벽돌 HP 및 공 방향 보기","upgrades.clairvoyant.verbose_description":"올바른 업그레이드를 선택하고 튼튼한 브릭에 어떤 일이 일어나고 있는지 이해하는 데 도움이 됩니다. 레벨 2와 3은 모호한 유틸리티에 대한 추가 지식을 제공합니다(루프 모드에서 도달 가능).","upgrades.coin_magnet.name":"동전 자석","upgrades.coin_magnet.tooltip":"패들은 동전을 끌어당깁니다.","upgrades.coin_magnet.verbose_description":"동전을 패들로 향하게 합니다. 동전이 이미 패들에 가까이 있으면 효과가 더 강해집니다.","upgrades.compound_interest.name":"복리 이자","upgrades.compound_interest.tooltip":"벽돌 깨질 때마다 +{{lvl}} 콤보, 코인 손실 시 초기화","upgrades.compound_interest.verbose_description":"벽돌을 부술 때마다 콤보가 하나씩 증가하며, 벽돌을 부술 때마다 점점 더 많은 코인이 생성됩니다.\\n하지만 코인을 잃으면 콤보가 초기화되므로 패들로 모든 코인을 잡아야 합니다.\\n콤보가 최소값을 넘으면 플레이 영역 하단에 빨간색 선이 표시되어 코인이 그쪽으로 가면 안 된다는 것을 알려줍니다.","upgrades.concave_puck.name":"오목한 패들","upgrades.concave_puck.tooltip":"수직 조준 정밀도 향상","upgrades.concave_puck.verbose_description":"공은 레벨이 똑바로 위로 올라가고 각도를 줄여서 튕기기 시작합니다.","upgrades.corner_shot.name":"코너 샷","upgrades.corner_shot.tooltip":"패들을 화면 테두리와 겹치게 할 수 있습니다.","upgrades.corner_shot.verbose_description":"모서리 조준에 도움이 됩니다. 레벨이 높아질수록 더 멀리 나갈 수 있습니다.","upgrades.double_or_nothing.name":"두 배 또는 아무것도 없음","upgrades.double_or_nothing.tooltip":"콤보 상승 {{multiplier}}배 더 빠르지만 각 리셋에서 점수의 {{percent}}%를 느슨하게 됩니다.","upgrades.double_or_nothing.verbose_description":"Combo는 당신의 combo가 최소한의 위 때만 카운트를 재설정합니다","upgrades.etherealcoins.name":"코인, 우주에서","upgrades.etherealcoins.tooltip":"코인은 더 이상 중력의 영향을 받지 않습니다.","upgrades.etherealcoins.verbose_description":"동전은 몇 개의 반송 후도 속도를 유지하며 중력에 더 이상 영향을 미치지 않습니다.","upgrades.extra_levels.name":"5분 더","upgrades.extra_levels.tooltip":"7 대신 {{count}} 레벨 플레이","upgrades.extra_levels.verbose_description":"기본 게임은 최대 7레벨까지 플레이할 수 있으며, 그 이후에는 게임이 종료됩니다.\\n\\n이 특전의 각 레벨은 한 단계씩 더 높은 레벨로 올라갈 수 있습니다. 마지막 레벨에서 가장 많은 점수를 획득하는 경우가 많기 때문에 그 차이가 극적일 수 있습니다.","upgrades.extra_life.name":"엑스트라 라이프","upgrades.extra_life.tooltip":"공은 하프라인에서 한 번 튕긴 후 사라집니다.","upgrades.extra_life.verbose_description":"일반적으로 공은 하나이며, 공을 떨어뜨리는 순간 게임이 끝납니다.\\n\\n이 특전은 화면 하단에 흰색 막대가 추가되어 공을 한 번 저장하고 그 과정에서 중단할 수 있습니다.\\n\\n공이 화면 하단에 튕길 때마다 해당 특전의 레벨이 한 단계씩 감소합니다.","upgrades.forgiving.name":"용서","upgrades.forgiving.tooltip":"휴식 시간을 놓치면 콤보가 한 번에 감소하는 것이 아니라 점진적으로 감소합니다.","upgrades.forgiving.verbose_description":"레벨당 첫 번째 미스는 무료이며, 그 다음에는 콤보의 10%, 그 다음에는 20%입니다.","upgrades.fountain_toss.name":"분수 던지기","upgrades.fountain_toss.tooltip":"동전을 놓치면 콤보를 얻습니다.","upgrades.fountain_toss.verbose_description":"동전을 놓쳤는데 콤보가 {{max}}미만일 경우, 콤보가 {{lvl}}의 확률로 성장합니다. /의 확률로 콤보가 1만큼 성장합니다.","upgrades.ghost_coins.name":"유령 코인","upgrades.ghost_coins.tooltip":"동전이 벽돌을 천천히 통과합니다.","upgrades.ghost_coins.verbose_description":"버그가 아니라 기능입니다!  동전은 벽돌 사이를 천천히 날아갑니다. 레벨이 높을수록 더 빨리 움직입니다.","upgrades.golden_goose.name":"황금 거위","upgrades.golden_goose.tooltip":"벽돌을 치면 동전이 공으로 순간이동합니다.","upgrades.golden_goose.verbose_description":"동전이 벽돌을 보았을 때, 동전이 가장 가까운 공에 보관합니다. 수준 2에서, 동전은 측을 너무 타격한 후에 수송합니다.","upgrades.happy_family.name":"행복한 가족","upgrades.happy_family.tooltip":"게임에서 모든 공을 유지하면 더 많은 동전.","upgrades.happy_family.verbose_description":"패들 바운스당 추가 공당 +1 콤보. 공을 잃으면 콤보가 초기화됩니다.  1 이상의 공만 콤보를 제공합니다.","upgrades.helium.name":"헬륨","upgrades.helium.tooltip":"패들 좌우 중력 제한","upgrades.helium.verbose_description":"이렇게 하면 동전에 영향을 미치며 동전을 집어들 준비가 될 때까지 떠다니게 됩니다.","upgrades.hot_start.name":"핫 스타트","upgrades.hot_start.tooltip":"콤보 {{start}}, - 초당{{loss}} 콤보에서 시작","upgrades.hot_start.verbose_description":"모든 레벨이 시작될 때 콤보는 +30점으로 시작하지만, 매 초마다 1점씩 감소합니다. 이 효과는 다른 특전과 중첩됩니다.","upgrades.implosions.name":"영향","upgrades.implosions.tooltip":"폭발은 동전을 날려버리는 대신 빨아들입니다.","upgrades.implosions.verbose_description":"폭발력은 다른 방향으로 적용됩니다. 추가 레벨은 \\"더 큰 폭발\\"로 작용합니다.","upgrades.left_is_lava.name":"왼쪽을 피하십시오.","upgrades.left_is_lava.tooltip":"+{{lvl}} 벽돌을 부술 때마다 콤보. 공이 화면 왼쪽에 맞으면 콤보가 초기화됩니다.","upgrades.left_is_lava.verbose_description":"벽돌을 부술 때마다 콤보가 하나씩 증가하므로 다음에 부수는 모든 벽돌에서 코인을 하나 더 얻을 수 있습니다.\\n\\n하지만 콤보는 공이 왼쪽에 닿는 즉시 초기화됩니다.\\n\\n콤보가 올라가는 즉시 왼쪽이 빨간색으로 표시되어 부딪히지 않도록 주의해야 한다는 것을 알려줍니다.","upgrades.limitless.name":"무한한","upgrades.limitless.tooltip":"모든 업그레이드의 최대 레벨을 {{lvl}} 만큼 올립니다.","upgrades.limitless.verbose_description":"이 특전을 선택하면 자신의 한도도 하나씩 증가하여 다시 선택할 수 있습니다.","upgrades.metamorphosis.name":"메타모포시스","upgrades.metamorphosis.tooltip":"각 동전은 {{lvl}} 개의 벽돌을 해당 색상으로 얼룩지게 할 수 있습니다.","upgrades.metamorphosis.verbose_description":"이 특전을 사용하면 동전이 나온 벽돌의 색을 띠게 되며, 처음 닿는 벽돌도 같은 색으로 물들게 됩니다.\\n\\n동전은 벽돌을 부순 공의 속도로 생성되므로 \'칠하고 싶은\' 벽돌의 방향으로 살짝 조준하면 됩니다.","upgrades.minefield.name":"지뢰밭","upgrades.minefield.tooltip":"화면의 폭탄 벽돌 당 +{{lvl}} 콤보","upgrades.minefield.verbose_description":"벽돌을 놓으면 콤보에 + 레벨을, 파괴하면 - 레벨을 추가하고 기본 콤보에 벽돌 수에 레벨을 곱한 만큼 레벨을 올립니다.","upgrades.multiball.name":"멀티 볼","upgrades.multiball.tooltip":"각 레벨은 {{count}} 개의 공으로 시작합니다.","upgrades.multiball.verbose_description":"브레이크아웃 71에서 공을 떨어뜨리는 순간 패배합니다.\\n\\n이 특전으로 공 두 개를 얻게 되므로 공 하나를 잃어도 괜찮습니다.\\n\\n잃어버린 공은 다음 레벨에서 다시 돌아옵니다.\\n\\n공이 두 개 이상 있으면 추가 특전이 제공되며, 당연히 레벨을 더 빨리 클리어할 수 있습니다.","upgrades.nbricks.name":"엄격한 샘플 크기","upgrades.nbricks.tooltip":"벽돌을 하나씩 치면 더 많은 코인을 얻을 수 있습니다.","upgrades.nbricks.verbose_description":"반드시 벽돌을 파괴할 필요는 없지만, 벽돌을 쳐야 합니다. 폭발로 파괴된 벽돌은 포함되지 않습니다.","upgrades.one_more_choice.name":"추가 선택 사항","upgrades.one_more_choice.tooltip":"레벨을 더 올리면 목록에 {{lvl}} 개의 옵션이 추가됩니다.","upgrades.one_more_choice.verbose_description":"모든 업그레이드 메뉴에 옵션이 하나 더 추가됩니다.  선택할 수 있는 업그레이드 수가 증가하지는 않습니다.","upgrades.ottawa_treaty.name":"Ottawa 치료","upgrades.ottawa_treaty.tooltip":"폭탄의 가까이에 벽돌을 파괴","upgrades.ottawa_treaty.verbose_description":"가까운 폭탄은 색 블록으로 대체됩니다. 그리퍼가있는 경우 공은 다음 바운드까지 그리퍼 효과를 느립니다. 1개의 폭탄만 한 번에 대체될 수 있습니다.","upgrades.passive_income.name":"수동 소득","upgrades.passive_income.tooltip":"동전이 더 많지만 움직이는 패들은 공이나 동전을 잡지 못합니다.","upgrades.passive_income.verbose_description":"일부 특전은 아무것도 하지 않아도 공이 원하는 것을 할 수 있도록 도와줍니다.","upgrades.picky_eater.name":"까다로운 식성","upgrades.picky_eater.tooltip":"벽돌 깨질 때마다 +{{lvl}} 콤보, 공 색이 바뀌면 초기화됨","upgrades.picky_eater.verbose_description":"공과 같은 색의 벽돌을 부술 때마다 콤보가 하나씩 증가합니다.\\n다른 색이면 공은 새로운 색으로 바뀌지만 공과 같은 색의 벽돌이 남아 있지 않은 한 콤보는 초기화됩니다.\\n최소값보다 높은 콤보를 얻으면 잘못된 색의 벽돌에는 빨간색 테두리가 생깁니다.\\n공이 두 개 이상 있는 경우, 공 중 하나가 벽돌에 닿을 때마다 공의 색이 모두 바뀝니다.","upgrades.pierce.name":"피어싱","upgrades.pierce.tooltip":"패들 바운스 후 공이 {{count}} 개의 벽돌을 관통했습니다.","upgrades.pierce.verbose_description":"공은 일반적으로 무언가에 닿는 즉시 튕깁니다. 이 특전을 사용하면 벽돌이 최대 3개까지 깨질 때까지 공의 궤적이 계속됩니다.\\n\\n그 후에는 4번째 벽돌에서 튕겨지며, 카운터를 초기화하려면 패들을 터치해야 합니다.","upgrades.pierce_color.name":"컬러 피어싱","upgrades.pierce_color.tooltip":"공 색깔의 벽돌에 +{{lvl}} 피해","upgrades.pierce_color.verbose_description":"공이 같은 색의 벽돌에 부딪힐 때마다 방해받지 않고 그냥 통과합니다.\\n\\n다른 색의 벽돌에 닿으면 벽돌을 부수고 그 색을 가져가서 튕겨 나갑니다.\\n\\n튼튼한 벽돌이 있다면 공이 같은 색의 벽돌에 닿아도 튕겨나갈 수 있습니다.","upgrades.puck_repulse_ball.name":"연착륙","upgrades.puck_repulse_ball.tooltip":"공을 밀어내는 패들","upgrades.puck_repulse_ball.verbose_description":"공이 패들에 가까워지면 속도가 느려지기 시작하고 패들에 닿지 않고 튀어 오를 수도 있습니다.","upgrades.rainbow.name":"언어 선택","upgrades.rainbow.tooltip":"동전은 무지개색으로 생성됩니다.","upgrades.rainbow.verbose_description":"각 수준은 착색된 동전의 비율을 증가합니다. 색깔은 수평 시간에 달려 있습니다.","upgrades.reach.name":"하향식","upgrades.reach.tooltip":"가장 아래 줄에 있는 N개의 벽돌을 터치하면 콤보가 초기화됩니다. 그렇지 않으면 +N 콤보","upgrades.reach.verbose_description":"벽돌이 한 줄만 있거나 가장 낮은 벽돌 줄이 게임의 전체 너비를 덮는 경우, 이 특전은 아무 효과가 없습니다. 그렇지 않으면 이 가장 낮은 줄을 부수면 콤보가 초기화되고, 다른 줄을 부수면 가장 낮은 줄에 있는 벽돌 수만큼 콤보가 증가합니다.\\n\\n가장 낮은 줄은 빨간색으로 강조 표시됩니다.","upgrades.respawn.name":"다시 생성","upgrades.respawn.tooltip":"{{delay}}초 후에{{percent}}%의 벽돌이 다시 생성됩니다.","upgrades.respawn.verbose_description":"일부 파티클 효과는 벽돌이 나타나는 위치를 알려줍니다.","upgrades.right_is_lava.name":"오른쪽을 피하십시오.","upgrades.right_is_lava.tooltip":"+{{lvl}} 벽돌당 콤보. 공이 화면 왼쪽에 맞으면 콤보가 초기화됩니다.","upgrades.right_is_lava.verbose_description":"벽돌을 부술 때마다 콤보가 하나씩 증가하므로 다음에 부수는 모든 벽돌에서 코인을 하나 더 얻을 수 있습니다.\\n\\n하지만 콤보는 공이 오른쪽에 닿는 즉시 초기화됩니다.\\n\\n콤보가 올라가는 즉시 오른쪽이 빨간색으로 표시되어 부딪히지 않도록 주의해야 한다는 것을 알려줍니다.","upgrades.sacrifice.name":"희생","upgrades.sacrifice.tooltip":"생명을 잃으면 모든 벽돌이 사라집니다","upgrades.sacrifice.verbose_description":"이렇게 하면 콤보가 꽤 높아질 수 있습니다.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"첫 번째 벽돌이 깨지면 폭탄이 됩니다.","upgrades.sapper.verbose_description":"처음 부순 벽돌은 그냥 사라지는 대신 폭탄 벽돌로 대체됩니다. 패들에서 공을 튕기면 효과가 다시 활성화됩니다. 이 특전을 레벨 업하면 더 많은 폭탄을 배치할 수 있습니다.","upgrades.shocks.name":"쇼크","upgrades.shocks.tooltip":"폭발성 공 충돌","upgrades.shocks.verbose_description":"두 공이 충돌할 때마다 속도를 바꾸고 폭발을 일으키며 추가 속도를 얻어 분리합니다.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"레벨 사이에 콤보의 {{percent}}% 유지","upgrades.shunt.verbose_description":"핫 스타트 기능도 있는 경우 현재 콤보에 핫 스타트 기능이 추가됩니다.","upgrades.side_flip.name":"오른손잡이","upgrades.side_flip.tooltip":"오른쪽에서 깨진 벽돌당 +{{lvl}} 콤보, 그렇지 않으면 -{{loss}} 콤보","upgrades.side_flip.verbose_description":"벽돌의 오른쪽을 타격하면 콤보 1개를 얻지만, 왼쪽을 타격하면 콤보 2개가 제거되므로 피하세요. 위쪽과 아래쪽에서 타격해도 효과가 없습니다.","upgrades.side_kick.name":"왼손잡이","upgrades.side_kick.tooltip":"왼쪽에서 깨진 벽돌당 +{{lvl}} 콤보, 그렇지 않으면 -{{loss}} 콤보","upgrades.side_kick.verbose_description":"벽돌의 왼쪽을 타격하면 콤보 1개를 얻지만, 오른쪽을 타격하면 콤보 2개가 제거되므로 피하세요. 위쪽과 아래쪽에서 타격해도 효과가 없습니다.","upgrades.skip_last.name":"간편한 정리","upgrades.skip_last.tooltip":"마지막 벽돌이 폭발합니다.","upgrades.skip_last.verbose_description":"다음 레벨로 이동하려면 모든 벽돌을 깨야 합니다. 하지만 마지막 벽돌을 구하기는 어려울 수 있습니다.\\n\\n레벨을 일찍 클리어하면 업그레이드할 때 선택의 폭이 넓어집니다. 벽돌을 놓치지 않는 것도 매우 유리합니다.\\n\\n따라서 마지막 벽돌을 깨는 것이 어렵다면 이 특전을 몇 번 사용하면 도움이 될 수 있습니다.","upgrades.slow_down.name":"느린 공","upgrades.slow_down.tooltip":"공이 더 느리게 움직입니다.","upgrades.slow_down.verbose_description":"공은 비교적 느리게 시작하지만, 게임을 레벨이 올라갈수록 조금씩 더 빠르게 시작됩니다.\\n\\n또한 한 레벨에서 많은 시간을 보내면 속도가 빨라집니다.\\n\\n이 특전 덕분에 더 쉽게 관리할 수 있습니다.\\n\\n메뉴에서 어린이 모드를 활성화하면 매번 시작할 때마다 이 특전을 받을 수 있습니다.","upgrades.smaller_puck.name":"더 작은 패들","upgrades.smaller_puck.tooltip":"기본 콤보 +5 부여","upgrades.smaller_puck.verbose_description":"이렇게 하면 패들이 작아져 이론적으로는 일부 코너 샷이 더 쉬워지지만 실제로는 난이도만 높아집니다.\\n\\n그렇기 때문에 코인 생성 +50%라는 좋은 보너스도 얻을 수 있습니다.","upgrades.soft_reset.name":"소프트 리셋","upgrades.soft_reset.tooltip":"콤보 재설정은 {{percent}}%를 유지합니다.","upgrades.soft_reset.verbose_description":"콤보 재설정의 영향을 제한합니다.","upgrades.steering.name":"제품 정보","upgrades.steering.tooltip":"패들을 움직이면 공이 회전합니다.","upgrades.steering.verbose_description":"패들 위치의 변화는 공의 이동 방향에 직접적인 영향을 미칩니다. 레벨 2 이상에서는 공의 방향을 나타내는 선이 표시됩니다.","upgrades.sticky_coins.name":"Sticky 동전","upgrades.sticky_coins.tooltip":"같은 색상의 벽돌에 동전 스틱","upgrades.sticky_coins.verbose_description":"수준 2에서는, 그들은 어떤 색깔든지의 벽돌에 찌릅니다","upgrades.streak_shots.name":"히트 행진","upgrades.streak_shots.tooltip":"한 번에 많은 벽돌을 깨면 더 많은 동전 얻기","upgrades.streak_shots.verbose_description":"벽돌을 깨뜨릴 때마다 콤보가 하나씩 증가합니다.\\n\\n하지만 공이 패들에 닿는 순간 콤보는 기본값으로 초기화됩니다.\\n\\n콤보가 기본값 이상으로 올라가면 패들에 빨간색 테두리가 표시되어 공에 닿으면 콤보가 파괴된다는 것을 알려줍니다.","upgrades.sturdy_bricks.name":"견고한 벽돌","upgrades.sturdy_bricks.tooltip":"벽돌 HP +{{lvl}} , 깨질 때 생성되는 동전 비율 +{{percent}}%","upgrades.sturdy_bricks.verbose_description":"이 특성의 레벨이 올라갈 때마다 모든 브릭에 HP bombs}} 个炸弹的 {{size}}x{{size}} 关卡。","unlocks.levels":"已解锁关卡","unlocks.minScore":"在一场游戏中达到 ${{minScore}} 来解锁。","unlocks.minScoreWithPerks":"在一场游戏中有 {{required}} 但没有 {{forbidden}} 达到 ${{minScore}} 来解锁。","unlocks.minScoreWithPerksNoForbidden":"在一次游玩中选择 {{required}} 并达到 ${{minScore}} 以解锁。","unlocks.minTotalScore":"累计总分 {{score}}","unlocks.reached":"你的最好分数是 {{reached}}。","unlocks.title_upgrades":"{{unlocked}} / {{out_of}} 升级已经解锁","unlocks.try":"尝试","unlocks.upgrades":"已解锁升级","unlocks.use":"使用","upgrades.addiction.name":"瘾","upgrades.addiction.tooltip":"不停地打碎砖块，获得更多硬币","upgrades.addiction.verbose_description":"每个打碎的砖块 +{{lvl}} 连击，打碎砖块后 {{delay}} 秒重置连击。仅在每一个关卡打碎第一个砖块后开始倒计时。倒计时在所有砖块摧毁后停止。","upgrades.asceticism.name":"苦修主义","upgrades.asceticism.tooltip":"每个打碎的砖块 +{{combo}} 连击。每个抓到的硬币 -{{combo}} 连击。","upgrades.asceticism.verbose_description":"在你的连击攀升时，你需要存放硬币在某个地方。","upgrades.ball_attract_ball.name":"重力","upgrades.ball_attract_ball.tooltip":"球吸引球","upgrades.ball_attract_ball.verbose_description":"距离超过“游戏区域宽度的 3/4”的球会开始相互吸引。\\n\\n当它们彼此远离时，吸引力会更强。\\n\\n彩虹粒子会飞起，象征着吸引力。只在你已经拥有一个以上的球时提供这个被动技能。","upgrades.ball_attracts_coins.name":"球吸引硬币","upgrades.ball_attracts_coins.tooltip":"硬币跟随最近的球","upgrades.ball_attracts_coins.verbose_description":"如果把它与“染色”和“幽灵硬币”结合，可以用硬币给球周围的砖块染色。它还可以代替硬币磁铁。","upgrades.ball_repulse_ball.name":"个人空间","upgrades.ball_repulse_ball.tooltip":"球排斥球","upgrades.ball_repulse_ball.verbose_description":"距离小于屏幕宽度四分之一的球会开始相互排斥。如果它们彼此靠近，排斥力会更强。粒子会喷射而出，象征着这种力量的作用。只在你已经拥有一个以上的小球时提供这个被动技能。","upgrades.base_combo.name":"坚实的基础","upgrades.base_combo.tooltip":"每一个打碎的砖块多给三个硬币","upgrades.base_combo.verbose_description":"在关卡开始时，你的连击通常从 1 开始，当球四处弹跳没有击中任何东西时，连击数会重置为 1。有了这个被动技能，连击高出 3 点开始，所以总是每个砖块至少得到 4 个硬币。每当你的连击重置，它会回到 4 而不是 1。你的小球会闪烁一点，表示连击数高于一。在等级 2，它添加 4 硬币，然后 5、6……","upgrades.bigger_explosions.name":"轰隆爆炸","upgrades.bigger_explosions.tooltip":"更大的爆炸","upgrades.bigger_explosions.verbose_description":"默认爆炸清除 3x3 的正方形，有了这个被动技能它变成了 5x5 的正方形，吹走硬币也明显更强。每次爆炸后屏幕会闪烁（基本模式除外）","upgrades.bigger_puck.name":"更大的桨板","upgrades.bigger_puck.tooltip":"轻松捕捉更多硬币","upgrades.bigger_puck.verbose_description":"更大的桨板容易不丢失球和抓到更多的硬币，还能精确地调整反弹的角度（球的角度只取决于它击中桨板的位置）。","upgrades.bricks_attract_ball.name":"砖块吸引球","upgrades.bricks_attract_ball.tooltip":"球冲向附近的砖块","upgrades.bricks_attract_ball.verbose_description":"球飞向它会击中的前 {{count}} 个砖块。等级越高，效果越强。效果停止前能击中的砖块的数字也更高。球击中桨板时重新获得效果。","upgrades.bricks_attract_coins.name":"砖块吸引硬币","upgrades.bricks_attract_coins.tooltip":"帮助它们留在那里","upgrades.bricks_attract_coins.verbose_description":"硬币会被附近的砖块吸引。等级越高，吸引力越强。","upgrades.buoy.name":"浮标","upgrades.buoy.tooltip":"硬币在底线上漂浮 {{duration}} 秒。","upgrades.buoy.verbose_description":"在手机模式中，效果最为明显","upgrades.chill.name":"放松","upgrades.chill.tooltip":"没有更多升级，无限制的关卡。","upgrades.chill.verbose_description":"球的加速也会慢得多。","upgrades.clairvoyant.name":"千里眼","upgrades.clairvoyant.tooltip":"看即将到来的关卡、砖块生命值和球的方向","upgrades.clairvoyant.verbose_description":"帮助你挑选正确的升级，了解坚固砖块发生什么事。等级 2 和 3 带来额外的可疑效用的知识（可在循环模式中达到）","upgrades.coin_magnet.name":"硬币磁铁","upgrades.coin_magnet.tooltip":"桨板吸引硬币","upgrades.coin_magnet.verbose_description":"把硬币导向桨板。如果硬币已经靠近桨板，效果更强。","upgrades.compound_interest.name":"复利","upgrades.compound_interest.tooltip":"如果你捕捉所有硬币，获得更多硬币","upgrades.compound_interest.verbose_description":"每次打碎一个砖块，你的连击加一，产生越来越多的硬币。\\n确保用桨板捕捉每一枚硬币，丢失硬币会重置连击。\\n一旦你的连击超过最低值，游玩区域的底部会有一条红线提醒你，硬币不能掉下去。","upgrades.concave_puck.name":"凹面桨板","upgrades.concave_puck.tooltip":"提高垂直瞄准精度","upgrades.concave_puck.verbose_description":"关卡开始时球直线上升，弹跳角度较小。","upgrades.corner_shot.name":"角落射击","upgrades.corner_shot.tooltip":"让你的桨板与屏幕边界重叠","upgrades.corner_shot.verbose_description":"有助于在角落瞄准。更高的等级让你移动更远。","upgrades.double_or_nothing.name":"加倍或归零","upgrades.double_or_nothing.tooltip":"连击爬升快 {{multiplier}} 倍，但每次重置都会损失分数的 {{percent}}%。","upgrades.double_or_nothing.verbose_description":"连击重置仅当连击大于最小值时计算","upgrades.etherealcoins.name":"太空硬币","upgrades.etherealcoins.tooltip":"硬币不再受重力影响","upgrades.etherealcoins.verbose_description":"硬币会保持它们的速度，即使在几次弹跳之后，并且不再受重力影响。","upgrades.extra_levels.name":"多 5 分钟","upgrades.extra_levels.tooltip":"玩 {{count}} 关卡而不是 7","upgrades.extra_levels.verbose_description":"默认游戏最多可持续 7 个关卡，之后游戏结束。\\n\\n这个被动技能的每一个等级让你前往一个更高的关卡。最后一关通常是你得分最多的关卡，因此差异可能非常大。","upgrades.extra_life.name":"额外生命","upgrades.extra_life.tooltip":"如果即将失去最后一个球，救你的球","upgrades.extra_life.verbose_description":"生命会在过程中被消耗。额外的生命在桨板后显示为白线。","upgrades.forgiving.name":"宽容","upgrades.forgiving.tooltip":"未命中时保留大部分连击","upgrades.forgiving.verbose_description":"每个关卡的第一次未命中是免费的，然后是连击的 10%、20%。","upgrades.fountain_toss.name":"喷泉投掷","upgrades.fountain_toss.tooltip":"当你错过硬币时获得连击。","upgrades.fountain_toss.verbose_description":"当你错过一枚硬币且你的连击低于关卡*30 时，你的连击有关卡/连击的概率加一。","upgrades.ghost_coins.name":"幽灵硬币","upgrades.ghost_coins.tooltip":"硬币慢慢穿过砖块","upgrades.ghost_coins.verbose_description":"这不是一个错误，是一个功能！硬币穿过砖块的速度很慢。等级越高，速度越快。","upgrades.golden_goose.name":"金鹅","upgrades.golden_goose.tooltip":"击中砖块后，硬币会传送到球上","upgrades.golden_goose.verbose_description":"每当一个硬币击中一个砖块，传送那个硬币到最近的球。在等级二，硬币击中一条边后也会传送。","upgrades.happy_family.name":"幸福家庭","upgrades.happy_family.tooltip":"在游戏中保留所有球，获得更多硬币。","upgrades.happy_family.verbose_description":"每一次桨板弹跳，每一个额外的球 +1 连击。失去球时重置连击。仅多于一的球给连击。","upgrades.helium.name":"氦气","upgrades.helium.tooltip":"桨板左右两边重力受限","upgrades.helium.verbose_description":"等级 1，减小重力。等级 2，硬币慢慢飘起。等级 3，硬币飞行。","upgrades.hot_start.name":"热启动","upgrades.hot_start.tooltip":"30 秒内清理关卡，获得更多硬币","upgrades.hot_start.verbose_description":"在每个关卡的开始，你的连击会从 +{{start}} 点开始，但之后每秒会减少 {{loss}}。此效果可与其他被动技能叠加。","upgrades.implosions.name":"内爆","upgrades.implosions.tooltip":"爆炸吸入硬币而不是吹走它们","upgrades.implosions.verbose_description":"爆炸力以其他方式施加。更高等级如同“更大的爆炸”","upgrades.left_is_lava.name":"避免左侧","upgrades.left_is_lava.tooltip":"不触碰左侧，获得更多硬币","upgrades.left_is_lava.verbose_description":"每当你打碎一个砖块，你的连击会加一，这样你会获得更多硬币。\\n\\n然而，你的球击中左侧，连击会重置。\\n\\n连击提升时，左侧变红以提醒你应该避免击中它们。\\n\\n在等级 2，边界完全移除，你可能失去球和硬币。","upgrades.limitless.name":"无限","upgrades.limitless.tooltip":"把所有升级的最高等级提高 {{lvl}}","upgrades.limitless.verbose_description":"选择这个被动技能也提高它自己的限制，让你再次挑选它。","upgrades.metamorphosis.name":"变形","upgrades.metamorphosis.tooltip":"每枚硬币可以用它的颜色给 {{lvl}} 个砖块染色","upgrades.metamorphosis.verbose_description":"硬币的颜色会变成它们所来自的砖块的颜色，并会给它们接触到的第一个砖块染上相同的颜色。硬币生成时的速度（方向）与打碎它们的球的速度（方向）相同，这意味着你可以稍微瞄准你想要“染色 ”的砖块的方向。在等级一，每个硬币可以染色一个砖块，然后硬币变为空心。","upgrades.minefield.name":"雷区","upgrades.minefield.tooltip":"屏幕上每个炸弹砖 +{{percent}}% 硬币","upgrades.minefield.verbose_description":"炸弹在它们爆炸时也会计数。","upgrades.multiball.name":"多个球","upgrades.multiball.tooltip":"每个关卡开始时有 {{count}} 个球。","upgrades.multiball.verbose_description":"在 Breakout 71 中，你掉了球就输了。\\n\\n有了这个被动技能，你得到两个球，因此你可以承受失去一个球。\\n\\n失去的球在下一关卡回来。\\n\\n拥有一个以上的球使更多被动技能可用，当然清理关卡更快。","upgrades.nbricks.name":"严格的样本量","upgrades.nbricks.tooltip":"逐个击中砖块，获得更多硬币。","upgrades.nbricks.verbose_description":"每一次桨板弹跳精确地击中 {{lvl}} 个砖块，得到 +{{lvl}} 连击，否则重置。你没有必要摧毁这些砖块，但你需要击中它们。爆炸摧毁的砖块不计数。","upgrades.one_more_choice.name":"额外选择","upgrades.one_more_choice.tooltip":"更多升级选择","upgrades.one_more_choice.verbose_description":"每个升级菜单会多一个选项。不增加你可以挑选升级的次数。","upgrades.ottawa_treaty.name":"渥太华条约","upgrades.ottawa_treaty.tooltip":"打碎一个炸弹附近的砖块会拆除炸弹","upgrades.ottawa_treaty.verbose_description":"附近的炸弹会被替换为一个有色的砖块。如果你有工兵，球会失去工兵效果，直到下次弹跳。一次只能替换一个炸弹。","upgrades.passive_income.name":"被动收入","upgrades.passive_income.tooltip":"更多硬币，但移动桨板抓不到球或硬币","upgrades.passive_income.verbose_description":"每一个打碎的砖块 +{{lvl}} 连击，桨板移动后 {{time}} 秒是非物质的。某些被动技能可以帮助球做你想做的事，无需做任何事情。","upgrades.picky_eater.name":"挑食者","upgrades.picky_eater.tooltip":"逐个清理颜色，获得更多硬币","upgrades.picky_eater.verbose_description":"每当你击碎一个与球的颜色相同的砖块，你的连击增加颜色之数减一的差。\\n如果是不同颜色，球会变成那个新颜色，但连击会重置，除非没有剩余与球颜色相同的砖块。\\n一旦你的连击高于最低值，错误颜色的砖块会有红色边框。\\n如果你有多个球，每当其中一个球击中砖块，它们都会切换颜色。","upgrades.pierce.name":"穿刺","upgrades.pierce.tooltip":"球在一次桨板弹跳后穿刺 {{count}} 个砖块","upgrades.pierce.verbose_description":"球通常碰到某个东西就会弹跳。有了这个被动技能，它会继续它的弹道来打碎多达 3 个砖块。\\n\\n之后，它会在第 4 个砖块上弹跳，球需要触碰桨板来重置计数器。","upgrades.pierce_color.name":"颜色穿刺","upgrades.pierce_color.tooltip":"球穿透相同颜色的砖块","upgrades.pierce_color.verbose_description":"通常，球造成 1 伤害，并且砖块有 1 生命值。\\n每当球击中相同颜色的砖块，它会穿透，畅通无阻。\\n一旦球碰到不同颜色的砖块，它会打碎砖块，变成砖块的颜色并弹跳。\\n如果你有坚固的砖块，球仍有可能在相同颜色的砖块上弹跳。","upgrades.puck_repulse_ball.name":"软着陆","upgrades.puck_repulse_ball.tooltip":"桨板排斥球","upgrades.puck_repulse_ball.verbose_description":"当球靠近桨板时，球会开始减慢速度，甚至可能在不接触桨板的情况下弹跳。","upgrades.rainbow.name":"彩虹","upgrades.rainbow.tooltip":"硬币以彩虹色生成。","upgrades.rainbow.verbose_description":"每个等级增加有色硬币的比例。颜色取决于时间。","upgrades.reach.name":"自上而下","upgrades.reach.tooltip":"避开最低一行的砖块，获得更多硬币","upgrades.reach.verbose_description":"触碰最低一行的 N 个砖块重置连击，否则 +N 连击。\\n\\n如果只有一行砖块，或者最低一行砖块覆盖了游戏的整个宽度，那么这个被动技能不起作用。否则，打碎最低一行砖块重置连击，打碎其他任何东西增加连击的数值为最低一行砖块的数量。\\n\\n最低一行会以红色高亮。","upgrades.respawn.name":"重生","upgrades.respawn.tooltip":"{{percent}}% 的砖块在 {{delay}} 秒后重新生成。","upgrades.respawn.verbose_description":"一些粒子效果会让你知道砖块会出现在哪里。","upgrades.right_is_lava.name":"避免右侧","upgrades.right_is_lava.tooltip":"不触碰右侧，获得更多硬币","upgrades.right_is_lava.verbose_description":"每当你打碎一个砖块，你的连击会加一，这样你会获得更多硬币。\\n\\n然而，你的球击中右侧，连击会重置。\\n\\n连击提升时，右侧变红以提醒你应该避免击中它们。\\n\\n在等级 2，边界完全移除，你可能失去球和硬币。","upgrades.sacrifice.name":"牺牲","upgrades.sacrifice.tooltip":"失去生命清除所有砖块","upgrades.sacrifice.verbose_description":"在等级 2+，清理完关卡之前，连击也会乘以被动技能的等级。这可能得到很高的连击。","upgrades.sapper.name":"工兵","upgrades.sapper.tooltip":"第一个打碎的砖块变成炸弹。","upgrades.sapper.verbose_description":"打碎的第一个砖块会被替换为炸弹砖块，而不是仅仅消失而已。球在桨板上弹跳重新获得效果。提升被动技能等级会允许你放置更多的炸弹。","upgrades.shocks.name":"冲击","upgrades.shocks.tooltip":"球爆炸性碰撞","upgrades.shocks.verbose_description":"每当两个球相撞，它们交换它们的速度，产生爆炸，并获得添加的速度以分开它们。","upgrades.shunt.name":"分流","upgrades.shunt.tooltip":"在关卡之间保留 {{percent}}% 的连击","upgrades.shunt.verbose_description":"如果你也有热启动，热启动添加到当前连击","upgrades.side_flip.name":"右撇子","upgrades.side_flip.tooltip":"仅从右边打碎砖块，获得更多硬币","upgrades.side_flip.verbose_description":"每次从右边打碎一个砖块 +{{lvl}} 连击，否则 -{{loss}}。击打砖块的右侧获得一个连击，但避免击打左侧，因为那会减少2个连击。从顶部或底部击中无效果。","upgrades.side_kick.name":"左撇子","upgrades.side_kick.tooltip":"仅从左边打碎砖块，获得更多硬币","upgrades.side_kick.verbose_description":"每次从左边打碎一个砖块 +{{lvl}} 连击，否则 -{{loss}}。击打砖块的左侧获得一个连击，但避免击打右侧，因为那会减少2个连击。从顶部或底部击中无效果。","upgrades.skip_last.name":"轻松清理","upgrades.skip_last.tooltip":"最后一个砖块会自我毁灭","upgrades.skip_last.verbose_description":"你需要打碎所有砖块才能进入下一关。不过，很难打掉最后一块砖。\\n这个被动技能的每一个等级增加自我毁灭的砖块的数量。\\n早一些清理一个关卡在升级时带来额外的选择。绝不未命中砖块也非常有益。\\n\\n因此，如果你觉得很难打碎最后的砖，多选几次这个被动技能会有帮助。","upgrades.slow_down.name":"慢球","upgrades.slow_down.tooltip":"球移动更慢","upgrades.slow_down.verbose_description":"游戏开始时球的速度相对较慢，每一个关卡，球会快一点。\\n\\n如果你在一个关卡中花费大量时间，球也会加速。\\n\\n这个被动技能使球更加可控。\\n\\n你可以在菜单中启用儿童模式，每一次新游戏获得这个被动技能。","upgrades.smaller_puck.name":"更小的桨板","upgrades.smaller_puck.tooltip":"{{percent}}% 更多硬币","upgrades.smaller_puck.verbose_description":"这使桨板更小，理论上使角落射击更容易，但实际上只是提高难度。\\n\\n这就是为什么你还能获得硬币生成 +50% 的奖励。","upgrades.soft_reset.name":"软重置","upgrades.soft_reset.tooltip":"连击重置时保留它的 {{percent}}%","upgrades.soft_reset.verbose_description":"限制连击重置的影响。","upgrades.steering.name":"转向","upgrades.steering.tooltip":"桨板移动时球转弯","upgrades.steering.verbose_description":"桨板位置的改变直接影响球运动的方向。在等级2+，球有一条显示方向的线。","upgrades.sticky_coins.name":"黏性硬币","upgrades.sticky_coins.tooltip":"硬币黏在相同颜色的砖块","upgrades.sticky_coins.verbose_description":"在等级2，它们黏在任何颜色的砖块","upgrades.streak_shots.name":"击中一连串","upgrades.streak_shots.tooltip":"一次打碎很多砖块，获得更多硬币","upgrades.streak_shots.verbose_description":"每次打碎一个砖块，连击加一。\\n\\n然而，球碰到桨板，连击就会重置。\\n\\n一旦你的连击超过基础值，桨板会有红色边框提醒你，球触碰桨板会破坏你的连击。","upgrades.sturdy_bricks.name":"坚固的砖块","upgrades.sturdy_bricks.tooltip":"+{{lvl}} 砖块生命值，+{{percent}}% 硬币","upgrades.sturdy_bricks.verbose_description":"这个被动技能的每个等级给所有砖块加一生命值。你可以用“千里眼”被动技能看生命值。获得“穿刺”被动技能可以增加球的伤害。这个被动技能的每一个等级加 50% 产生硬币。","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"当桨板移动时时间流动。","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"意念操控","upgrades.telekinesis.tooltip":"桨板位置影响球","upgrades.telekinesis.verbose_description":"当球上升时你可以控制它。球在屏幕下半部分时效果更强。","upgrades.three_cushion.name":"三边克朗球","upgrades.three_cushion.tooltip":"间接击中砖块，获得更多硬币","upgrades.three_cushion.verbose_description":"击中边界的两侧和顶部 +1 连击，每次桨板弹跳最多 +{{max}} 。\\n每次击中一侧，连击加一，最多 +3。\\n之后，不会获得连击直到下一次桨板弹跳。\\n\\n当你不先弹跳就击中砖块时连击重置。\\n这里采用百度百科的翻译，Three Cushion Billiards 是 Carom billiards 中的一种。","upgrades.top_is_lava.name":"天空是限制","upgrades.top_is_lava.tooltip":"避免击中顶部，获得更多硬币","upgrades.top_is_lava.verbose_description":"每当你打碎一个砖块，连击加一。然而，球击中屏幕顶部，连击重置。\\n\\n你的连击超过最低值时，顶部会出现一个红条提醒你应该避免击中它。\\n\\n在等级 2，边界完全移除，你可能失去球和硬币。","upgrades.trampoline.name":"蹦床","upgrades.trampoline.tooltip":"仅在砖块和桨板上弹跳，获得更多硬币","upgrades.trampoline.verbose_description":"每次桨板弹跳 +{{lvl}} 连击，每次在边界上弹跳 -{{lvl}} 连击。少有的不添加重置条件的一个连击升级","upgrades.transparency.name":"透明度","upgrades.transparency.tooltip":"+50% 硬币。球在屏幕顶部是不可见的。","upgrades.transparency.verbose_description":"球在屏幕顶部变透明。\\n+{{percent}} % 硬币。\\n更高的等级使球更快透明，并且增加奖励。","upgrades.trickledown.name":"涓滴效应","upgrades.trickledown.tooltip":"硬币出现在屏幕顶部。","upgrades.trickledown.verbose_description":"如果顶部有一行砖块，硬币可能停在上面，在这种情况，打碎砖块后硬币会掉下来。","upgrades.unbounded.name":"填充","upgrades.unbounded.tooltip":"在关卡的左右两边添加空间，但你的桨板不能去那么远。","upgrades.unbounded.verbose_description":"另一个升级可能帮助你延伸桨板的触及范围。","upgrades.viscosity.name":"粘度","upgrades.viscosity.tooltip":"硬币下落速度减慢","upgrades.viscosity.verbose_description":"硬币通常因重力和爆炸加速到很高的速度。\\n\\n这个被动技能使硬币不停地减速，如同它们在某种粘性液体中。\\n\\n这使捕捉硬币更容易，并与影响硬币移动的被动技能结合得很好。","upgrades.wind.name":"风","upgrades.wind.tooltip":"桨板的位置产生风","upgrades.wind.verbose_description":"风取决于桨板位置：左边向左吹，右边向右吹。影响球和硬币。","upgrades.wrap_left.name":"裹左边","upgrades.wrap_left.tooltip":"击中左边传送球到右边","upgrades.wrap_left.verbose_description":"更高等级也传送硬币。","upgrades.wrap_right.name":"裹右边","upgrades.wrap_right.tooltip":"击中右边传送球到左边","upgrades.wrap_right.verbose_description":"更高等级也传送硬币。","upgrades.wrap_up.name":"裹上边","upgrades.wrap_up.tooltip":"触碰屏幕的顶部会传送球到桨板之上。","upgrades.wrap_up.verbose_description":"这不算作击中桨板。在等级 2，也传送硬币。","upgrades.yoyo.nam levelCoughtCoins}} سکه از {{levelSpawnedCoins}} ({{catchRate}}%) را در {{duration}} ثانیه گرفتید. توپ {{levelMisses}} بار به آجرها برخورد نکرد","gameOver.lost.summary":"توپ را از دست دادید، بازی را با مجموع امتیاز {{score}} سکه به پایان رساندید.","gameOver.lost.title":"پایان بازی","gameOver.stats.balls_lost":"توپ‌های از دست رفته","gameOver.stats.bricks_broken":"آجرهای شکسته‌شده","gameOver.stats.bricks_per_minute":"آجرهای شکسته‌شده در دقیقه","gameOver.stats.catch_rate":"نرخ گرفتن","gameOver.stats.combo_avg":"میانگین ترکیب","gameOver.stats.combo_max":"بیشینه ترکیب","gameOver.stats.duration_per_level":"مدت زمان هر سطح","gameOver.stats.hit_rate":"نرخ برخورد","gameOver.stats.level_reached":"سطحی که رسیدید","gameOver.stats.total_score":"امتیاز کل","gameOver.stats.upgrades_applied":"قدرت‌های اعمال‌شده","gameOver.stats_intro":"آمار بازی شما در مقایسه با {{count}} بازی برترتان در زیر آمده است.","gameOver.unlocked_perk":"ویژگی باز شد","gameOver.unlocked_perk_plural":"شما {{count}} ویژگی باز کردید","gameOver.win.summary":"این بازی به پایان رسید. شما {{score}} سکه در کل جمع کردید.","gameOver.win.title":"این بازی را کامل کردید","help.content":"## هدف\\n\\nتا حد ممکن در ۷ سطح سکه جمع کنید.\\nسکه‌ها هنگام شکستن آجرها نمایان می‌شوند.\\nآن‌ها را با پارو بگیرید تا امتیازتان افزایش یابد.\\nامتیاز شما در گوشه بالا-راست صفحه نمایش داده می‌شود.\\nتوپ را از دست ندهید، وگرنه بازی تمام می‌شود.\\n\\nپس از نابودی همه آجرها، می‌توانید یک قدرت انتخاب کنید.\\n\\n## قدرت‌ها\\n\\nقدرت‌هایی که انتخاب می‌کنید تا پایان آن دست از بازی پیاده می‌شوند.\\nبرخی را می‌توان چندین بار انتخاب کرد تا اثر قوی‌تری داشته باشند.\\nبرخی به هدف‌گیری کمک می‌کنند یا بازی را آسان‌تر می‌کنند.\\nبرخی فقط در ترکیب با دیگران مفیدند.\\n\\nهمیشه در آغاز هر بازی یک قدرت دریافت می‌کنید.\\nنماد آن به‌عنوان آجرهای سطح اول استفاده می‌شود.\\nمی‌توانید قدرت‌های آغازین را در تنظیمات انتخاب کنید.\\n\\nبسیاری از قدرت‌ها بر ترکیب شما اثر می‌گذارند.\\n\\n## ترکیب\\n\\n«ترکیب» تعداد سکه‌هایی است که هنگام شکستن آجر نمایان می‌شوند.\\nروی پارو نمایش داده می‌شود، مثلاً \uD83E\uDE99۴ یعنی هر آجر ۴ سکه تولید می‌کند.\\nبیشتر قدرت‌هایی که ترکیب را افزایش می‌دهند، شرط بازنشانی آن را هم اضافه می‌کنند.\\nاگر توپ بدون برخورد به آجر به پارو برگردد، ترکیب بازنشانی می‌شود.\\nپیام «از دست دادن» در این حالت نمایش داده می‌شود.\\n\\nهر بار به سمت آجر هدف‌گیری کنید.\\n\\n## هدف‌گیری\\n\\nفقط موقعیت توپ روی پارو تعیین‌کننده زاویه پرش است.\\nاگر توپ دقیقاً به مرکز پارو برخورد کند، عمودی به بالا برمی‌گردد.\\nاگر به یک سمت برخورد کند، زاویه بیشتری خواهد داشت.\\nسرعت پارو و زاویه ورودی تأثیری بر جهت توپ پس از پرش ندارند.\\n\\nبسیاری از قدرت‌های کمک به هدف‌گیری قابل باز شدن هستند.\\n\\n## باز کردن‌ها\\n\\nدر اولین دست از بازی Breakout 71، بیشتر قدرت‌ها و سطوح قفل هستند.\\nقدرت‌ها با بازی کردن و گرفتن سکه‌های زیاد باز می‌شوند.\\nسطوح اولیه با کسب امتیاز بالا باز می‌شوند.\\nسطوح بعدی شرطی برای انتخاب ویژگی‌ها دارند.\\n\\nکسب امتیاز بالا با دریافت چندین قدرت در هر سطح به لطف نشان‌ها آسان‌تر است.\\n\\n## نشان‌ها\\n\\nبا بازی خوب، قدرت‌ها و انتخاب‌های اضافی دریافت می‌کنید:\\n\\n- سطح را سریع پاک کنید\\n- همه سکه‌ها را بگیرید\\n- همیشه بین پرش‌های پارو چیزی را بزنید","help.help":"بیشتر درباره بازی بدانید","help.levels":"سطوح","help.title":"راهنما","help.upgrades":"## قدرت‌ها","history.columns.score":"امتیاز","history.columns.started":"تاریخ","history.help":"{{count}} بازی برتر خود را ببینید.","history.include_past_versions":"نمایش نگارش‌های پیشین","history.locked":"دست‌کم ده بازی انجام دهید تا باز شود","history.title":"تاریخچه بازی","lab.help":"هر سازه‌ای که می‌خواهید امتحان کنید.","lab.instructions":"قدرت‌ها و سطح را انتخاب کنید، سپس دکمه بازی را بزنید.","lab.menu_entry":"حالت خلاق","lab.play":"بازی","lab.reset":"بازنشانی","lab.select_level":"سطحی برای بازی انتخاب کنید","lab.unlocks_at":"با امتیاز کل {{score}} باز می‌شود","level_up.challenges.catchRateGood.description":"{{gold}}% سکه برای نشان طلا، {{silver}}% برای نقره بگیرید.","level_up.challenges.catchRateGood.name":"{{caught}} سکه از {{total}} گرفته شد","level_up.challenges.e ulse_ball.name":"فضای شخصی","upgrades.ball_repulse_ball.tooltip":"توپ‌ها یکدیگر را دفع می‌کنند","upgrades.ball_repulse_ball.verbose_description":"توپ‌هایی که کمتر از یک‌چهارم عرض صفحه فاصله دارند، یکدیگر را دفع می‌کنند. نیروی دافعه وقتی نزدیک‌تر باشند قوی‌تر است. ذرات برای نشان دادن اعمال این نیرو خارج می‌شوند. این ویژگی فقط وقتی بیش از یک توپ دارید ارائه می‌شود.","upgrades.base_combo.name":"پایه‌های قوی","upgrades.base_combo.tooltip":"۳ سکه بیشتر برای هر آجر شکسته‌شده","upgrades.base_combo.verbose_description":"ترکیب شما معمولاً در آغاز سطح از ۱ آغاز می‌شود و با برخورد بدون هدف به ۱ بازنشانی می‌شود. با این ویژگی، ترکیب ۳ امتیاز بالاتر آغاز می‌شود، بنابراین همیشه حداقل ۴ سکه در هر آجر دریافت می‌کنید. هنگام بازنشانی ترکیب، به ۴ برمی‌گردد نه ۱. توپ شما کمی می‌درخشد تا نشان دهد ترکیب بالاتر از یک است. در سطح ۲، ۴ سکه، سپس ۵، سپس ۶ اضافه می‌کند…","upgrades.bigger_explosions.name":"کابوم","upgrades.bigger_explosions.tooltip":"انفجارهای بزرگ‌تر","upgrades.bigger_explosions.verbose_description":"انفجار پیش‌فرض یک مربع ۳x۳ را پاک می‌کند، با این ویژگی به مربع ۵x۵ تبدیل می‌شود و ضربه به سکه‌ها نیز به‌طور قابل‌توجهی قوی‌تر است. صفحه پس از هر انفجار چشمک می‌زند (به‌جز در حالت ساده)","upgrades.bigger_puck.name":"پاروی بزرگ‌تر","upgrades.bigger_puck.tooltip":"گرفتن سکه‌ها آسان‌تر","upgrades.bigger_puck.verbose_description":"پاروی بزرگ‌تر باعث می‌شود هرگز توپ را از دست ندهید و سکه‌های بیشتری بگیرید، همچنین زاویه پرش‌ها را دقیق‌تر تنظیم کنید (زاویه توپ فقط به محل برخورد با پارو بستگی دارد).","upgrades.bricks_attract_ball.name":"آجرها توپ را جذب می‌کنند","upgrades.bricks_attract_ball.tooltip":"توپ به سمت آجرهای نزدیک می‌رود","upgrades.bricks_attract_ball.verbose_description":"توپ به سمت اولین {{count}} آجری که برخورد می‌کند می‌رود. اثر در سطوح بالاتر قوی‌تر است. تعداد آجرهایی که می‌توانند پیش از توقف اثر برخورد کنند نیز بیشتر است. اثر با برخورد توپ به پارو دوباره فعال می‌شود.","upgrades.bricks_attract_coins.name":"آجرها سکه‌ها را جذب می‌کنند","upgrades.bricks_attract_coins.tooltip": oltip":"سکه‌ها پس از برخورد با آجر به توپ تلپورت می‌کنند","upgrades.golden_goose.verbose_description":"هرگاه سکه‌ای به آجر برخورد کند، به نزدیک‌ترین توپ تلپورت می‌کند. در سطح دوم، سکه‌ها پس از برخورد با کناره‌ها نیز تلپورت می‌کنند.","upgrades.happy_family.name":"خانواده شاد","upgrades.happy_family.tooltip":"سکه‌های بیشتر اگر همه توپ‌ها را در بازی نگه دارید.","upgrades.happy_family.verbose_description":"+۱ ترکیب به ازای هر توپ اضافی در هر پرش پارو. ترکیب با از دست دادن توپ بازنشانی می‌شود. فقط توپ‌های بالای ۱ ترکیب می‌دهند.","upgrades.helium.name":"هلیوم","upgrades.helium.tooltip":"جاذبه در چپ و راست پارو محدود شده است","upgrades.helium.verbose_description":"در سطح ۱، جاذبه کاهش می‌یابد. در سطح ۲، سکه‌ها به‌آرامی به بالا شناور می‌شوند. در سطح ۳ واقعاً پرواز می‌کنند.","upgrades.hot_start.name":"آغاز آتشین","upgrades.hot_start.tooltip":"سکه‌های بیشتر اگر سطح را زیر ۳۰ ثانیه پاک کنید","upgrades.hot_start.verbose_description":"در آغاز هر سطح، ترکیب شما با +{{start}} امتیاز آغاز می‌شود، اما هر ثانیه {{loss}} کاهش می‌یابد. اثر با سایر ویژگی‌ها جمع می‌شود.","upgrades.implosions.name":"انفجارهای داخلی","upgrades.implosions.tooltip":"انفجارها به‌جای پرت کردن سکه‌ها، آن‌ها را به داخل می‌کشند","upgrades.implosions.verbose_description":"نیروی انفجار برعکس اعمال می‌شود. سطوح بالاتر به‌عنوان «انفجار بزرگ‌تر» عمل می‌کنند","upgrades.left_is_lava.name":"از سمت چپ دوری کنید","upgrades.left_is_lava.tooltip":"سکه‌های بیشتر اگر به سمت چپ برخورد نکنید","upgrades.left_is_lava.verbose_description":"هرگاه آجری را بشکنید، ترکیب شما یک واحد افزایش می‌یابد، بنابراین از آجرهای بعدی سکه‌های بیشتری دریافت می‌کنید.\\n\\nاما ترکیب شما به‌محض برخورد توپ به سمت چپ بازنشانی می‌شود.\\n\\nوقتی ترکیب بالا می‌رود، سمت چپ قرمز می‌شود تا یادآوری کند که باید از برخورد با آن اجتناب کنید.\\n\\nدر سطح ۲، مرز کاملاً حذف می‌شود و توپ‌ها و سکه‌ها ممکن است گم شوند.","upgrades.limitless.name":"بی‌حد","upgrades.limitless.tooltip":"بیشترین سطح همه قدرت‌ها را {{lvl}} تا افزایش می‌دهد","upgrades.limitless.verbose_description":"انتخاب این ویژگی حد خودش را نیز یک واحد افزایش می‌دهد و امکان انتخاب دوباره آن را می‌دهد.","upgrades.metamorphosis.name":"دگردیسی","upgrades.metamorphosis.tooltip":"هر سکه می‌تواند {{lvl}} آجر را با رنگ خود رنگ‌آمیزی کند","upgrades.metamorphosis.verbose_description":"با این ویژگی، سکه‌ها به رنگ آجری که از آن آمده‌اند خواهند بود و اولین آجری که لمس کنند را به همان رنگ درمی‌آورند. سکه‌ها با سرعت توپی که آجر را شکسته ظاهر می‌شوند، یعنی می‌توانید کمی به سمت آجرهایی که می‌خواهید «رنگ کنید» هدف‌گیری کنید. در سطح ۱، هر سکه می‌تواند ۱ آجر را رنگ کند قبل از اینکه «مصرف» شود و توخالی به نظر برسد.","upgrades.minefield.name":"میدان مین","upgrades.minefield.tooltip":"+{{percent}}% سکه به ازای هر آجر بمبی روی صفحه","upgrades.minefield.verbose_description":"بمب‌ها هنگام انفجار نیز شمرده می‌شوند.","upgrades.multiball.name":"چندتوپه","upgrades.multiball.tooltip":"هر سطح را با {{count}} توپ آغاز کنید.","upgrades.multiball.verbose_description":"به‌محض از دست دادن توپ در Breakout 71، می‌بازید.\\n\\nبا این ویژگی، دو توپ دارید، بنابراین می‌توانید یکی را از دست بدهید.\\n\\nتوپ‌های از دست‌رفته در سطح بعدی برمی‌گردند.\\n\\nداشتن بیش از یک توپ برخی ویژگی‌های دیگر را در دسترس قرار می‌دهد و البته سطح را سریع‌تر پاک می‌کند.","upgrades.nbricks.name":"اندازه نمونه دقیق","upgrades.nbricks.tooltip":"سکه‌های بیشتر اگر آجرها را یکی‌یکی بزنید.","upgrades.nbricks.verbose_description":"دقیقاً {{lvl}} آجر در هر پرش پارو برای +{{lvl}} ترکیب بزنید، وگرنه بازنشانی می‌شود. لازم نیست آجرها را نابود کنید، فقط باید به آن‌ها برخورد کنید. آجرهای نابودشده توسط انفجارها شمرده نمی‌شوند","upgrades.one_more_choice.name":"انتخاب افزوده","upgrades.one_more_choice.tooltip":"انتخاب‌های قدرت بیشتر","upgrades.one_more_choice.verbose_description":"هر منوی قدرت یک گزینه بیشتر خواهد داشت. تعداد قدرت‌هایی که می‌توانید انتخاب کنید را افزایش نمی‌دهد.","upgrades.ottawa_treaty.name":"پیمان اتاوا","upgrades.ottawa_treaty.tooltip":"شکستن آجر نزدیک بمب آن را خنثی می‌کند","upgrades.ottawa_treaty.verbose_description":"بمب نزدیک با بلوک رنگی جایگزین می‌شود. اگر ویژگی خنثی‌کننده داشته باشید، توپ تا پرش بعدی اثر خنثی‌کننده را از دست می‌دهد. فقط یک بمب در هر زمان می‌تواند جایگزین شود.","upgrades.passive_income.name":"درآمد غیرفعال","upgrades.passive_income.tooltip":"سکه‌های بیشتر اما پاروی متحرک توپ‌ها یا سکه‌ها را نمی‌گیرد","upgrades.passive_income.verbose_description":"+{{lvl}} ترکیب برای هر آجر شکسته‌شده، پارو {{time}} ثانیه پس از حرکت غیرمادی است. برخی ویژگی‌ها می‌توانند به توپ‌ها کمک کنند بدون نیاز به انجام کاری آنچه می‌خواهید را انجام دهند.","upgrades.picky_eater.name":"خوراک‌گزین","upgrades.picky_eater.tooltip":"سکه‌های بیشتر اگر آجرها را رنگ به رنگ بشکنید","upgrades.picky_eater.verbose_description":"هرگاه آجری هم‌رنگ توپ خود را بشکنید، ترکیب شما به تعداد رنگ‌های روی صفحه منهای یک افزایش می‌یابد.\\nاگر رنگ متفاوت باشد، توپ آن رنگ جدید را می‌گیرد، اما ترکیب بازنشانی می‌شود، مگر اینکه هیچ آجری از رنگ توپ باقی نمانده باشد.\\nوقتی ترکیب بالاتر از حداقل باشد، آجرهای رنگ اشتباه حاشیه قرمز می‌گیرند.\\nاگر بیش از یک توپ داشته باشید، همه آن‌ها وقتی یکی به آجر برخورد کند تغییر رنگ می‌دهند.","upgrades.pierce.name":"نفوذ","upgrades.pierce.tooltip":"توپ پس از پرش از پارو به {{count}} آجر نفوذ می‌کند","upgrades.pierce.verbose_description":"توپ معمولاً به‌محض برخورد به چیزی پرش می‌کند. با این ویژگی، تا ۳ آجر شکسته‌شده به مسیر خود ادامه می‌دهد.\\n\\nپس از آن، در چهارمین آجر پرش می‌کند و باید پارو را لمس کنید تا شمارشگر بازنشانی شود.","upgrades.pierce_color.name":"نفوذ رنگی","upgrades.pierce_color.tooltip":"توپ از آجرهای هم‌رنگ عبور می‌کند","upgrades.pierce_color.verbose_description":"معمولاً توپ‌ها ۱ آسیب می‌زنند و آجرها ۱ نقطه سلامت (HP) دارند.\\nهرگاه توپ به آجری هم‌رنگ خود برخورد کند، بدون مانع عبور می‌کند.\\nوقتی به آجری با رنگ متفاوت می‌رسد، آن را می‌شکند، رنگش را می‌گیرد و پرش می‌کند.\\nاگر آجرهای مقاوم داشته باشید، توپ ممکن است همچنان از آجر هم‌رنگ پرش کند.","upgrades.puck_repulse_ball.name":"فرود نرم","upgrades.puck_repulse_ball.tooltip":"پارو توپ‌ها را دفع می‌کند","upgrades.puck_repulse_ball.verbose_description":"وقتی توپ به پارو نزدیک می‌شود، کند می‌شود و حتی ممکن است بدون لمس پارو پرش کند.","upgrades.rainbow.name":"رنگین‌کمان","upgrades.rainbow.tooltip":"سکه‌ها با رنگ رنگین‌کمانی ظاهر می‌شوند.","upgrades.rainbow.verbose_description":"هر سطح نسبت سکه‌های رنگی را افزایش می‌دهد. رنگ به زمان سطح بستگی دارد.","upgrades.reach.name":"از بالا به پایین","upgrades.reach.tooltip":"سکه‌های بیشتر اگر از ردیف پایین‌ترین آجرها دوری کنید","upgrades.reach.verbose_description":"لمس N آجر ردیف پایین ترکیب را بازنشانی می‌کند. در غیر این صورت، +N ترکیب.\\n\\nاگر فقط یک ردیف آجر وجود داشته باشد یا ردیف پایین کل عرض بازی را پوشش دهد، این ویژگی کاری نمی‌کند. در غیر این صورت، شکستن ردیف پایین ترکیب را بازنشانی می‌کند، در حالی که شکستن چیزهای دیگر ترکیب را به تعداد آجرهای ردیف پایین افزایش می‌دهد.\\n\\nردیف پایین به رنگ قرمز برجسته می‌شود.","upgrades.respawn.name":"بازآفرینی","upgrades.respawn.tooltip":"{{percent}}% آجرها پس از {{delay}} ثانیه بازآفرینی می‌شوند.","upgrades.respawn.verbose_description":"جلوه ذرات به شما نشان می‌دهد که آجرها کجا ظاهر می‌شوند.","upgrades.right_is_lava.name":"از سمت راست دوری کنید","upgrades.right_is_lava.tooltip":"سکه‌های بیشتر اگر به سمت راست برخورد نکنید","upgrades.right_is_lava.verbose_description":"هرگاه آجری را بشکنید، ترکیب شما یک واحد افزایش می‌یابد، بنابراین از آجرهای بعدی سکه‌های بیشتری دریافت می‌کنید.\\n\\nاما ترکیب شما به‌محض برخورد توپ به سمت راست بازنشانی می‌شود.\\n\\nوقتی ترکیب بالا می‌رود، سمت راست قرمز می‌شود تا یادآوری کند که باید از برخورد با آن اجتناب کنید.\\n\\nدر سطح ۲، مرز کاملاً حذف می‌شود و توپ‌ها و سکه‌ها ممکن است گم شوند.","upgrades.sacrifice.name":"فداکاری","upgrades.sacrifice.tooltip":"از دست دادن یک جان همه آجرها را پاک می‌کند","upgrades.sacrifice.verbose_description":"در سطح ۲ و بالاتر، ترکیب نیز قبل از پاک کردن صفحه با سطح ویژگی ضرب می‌شود. این ممکن است ترکیب را بسیار بالا ببرد.","upgrades.sapper.name":"خنثی‌کننده","upgrades.sapper.tooltip":"اولین آجر شکسته‌شده به بمب تبدیل می‌شود.","upgrades.sapper.verbose_description":"به‌جای ناپدید شدن، اولین آجر شکسته‌شده با آجر بمبی جایگزین می‌شود. پرش توپ روی پارو اثر را دوباره فعال می‌کند. ارتقای سطح این ویژگی امکان قرار دادن بمب‌های بیشتری را می‌دهد.","upgrades.shocks.name":"برخورد انفجاری","upgrades.shocks.tooltip":"برخوردهای انفجاری توپ‌ها","upgrades.shocks.verbose_description":"هرگاه دو توپ برخورد کنند، سرعت خود را مبادله می‌کنند، انفجار ایجاد می‌کنند و سرعت اضافی برای جدا شدن به‌دست می‌آورند.","upgrades.shunt.name":"انتقال","upgrades.shunt.tooltip":"{{percent}}% ترکیب خود را بین سطوح حفظ کنید","upgrades.shunt.verbose_description":"اگر ویژگی آغاز آتشین هم داشته باشید، آغاز آتشین فقط به ترکیب کنونی اضافه می‌شود","upgrades.side_flip.name":"راست‌دست","upgrades.side_flip.tooltip":"سکه‌های بیشتر اگر فقط از سمت راست به آجرها بزنید","upgrades.side_flip.verbose_description":"+{{lvl}} ترکیب برای هر آجر شکسته‌شده از سمت راست، -{{loss}} در غیر این صورت. به سمت راست آجر برخورد کنید تا یک ترکیب به دست آورید، اما از برخورد به سمت چپ اجتناب کنید زیرا ۲ ترکیب را حذف می‌کند. برخورد از بالا و پایین تأثیری ندارد.","upgrades.side_kick.name":"چپ‌دست","upgrades.side_kick.tooltip":"سکه‌های بیشتر اگر فقط از سمت چپ به آجرها بزنید","upgrades.side_kick.verbose_description":"+{{lvl}} ترکیب برای هر آجر شکسته‌شده از سمت چپ، -{{loss}} در غیر این صورت. به سمت چپ آجر برخورد کنید تا یک ترکیب به دست آورید، اما از برخورد به سمت راست اجتناب کنید زیرا ۲ ترکیب را حذف می‌کند. برخورد از بالا و پایین تأثیری ندارد.","upgrades.skip_last.name":"پاک‌سازی آسان","upgrades.skip_last.tooltip":"آخرین آجر خودبه‌خود نابود می‌شود","upgrades.skip_last.verbose_description":"برای رفتن به سطح بعدی باید همه آجرها را بشکنید. اما زدن آخرین آجرها ممکن است سخت باشد.\\nهر سطح این ویژگی تعداد آجرهایی که خودبه‌خود نابود می‌شوند را افزایش می‌دهد.\\nپاک کردن زودهنگام سطح انتخاب‌های اضافی هنگام قدرت می‌آورد. هرگز خطا نکردن در زدن آجرها نیز بسیار مفید است.\\n\\nاگر شکستن آخرین آجرها برایتان سخت است، گرفتن چند بار این ویژگی می‌تواند کمک کند.","upgrades.slow_down.name":"توپ کندتر","upgrades.slow_down.tooltip":"توپ آهسته‌تر حرکت می‌کند","upgrades.slow_down.verbose_description":"توپ نسبتاً آهسته آغاز می‌شود، اما هر سطح بازی کمی سریع‌تر می‌شود.\\n\\nاگر مدت زیادی در یک سطح بمانید، شتاب می‌گیرد.\\n\\nاین ویژگی آن را قابل‌کنترل‌تر می‌کند.\\n\\nمی‌توانید با فعال کردن حالت کودک در منو همیشه آن را در آغاز داشته باشید.","upgrades.smaller_puck.name":"پاروی کوچک‌تر","upgrades.smaller_puck.tooltip":"{{percent}}% سکه بیشتر","upgrades.smaller_puck.verbose_description":"این باعث کوچک‌تر شدن پارو می‌شود که در تئوری شوت‌های گوشه را آسان‌تر می‌کند، اما در واقع فقط دشواری را افزایش می‌دهد.\\n\\nبه همین دلیل پاداش خوبی به‌صورت +۵۰٪ تولید سکه دریافت می‌کنید.","upgrades.soft_reset.name":"بازنشانی نرم","upgrades.soft_reset.tooltip":"{{percent}}% ترکیب خود را هنگام بازنشانی حفظ کنید","upgrades.soft_reset.verbose_description":"تأثیر بازنشانی ترکیب را محدود می‌کند.","upgrades.steering.name":"هدایت","upgrades.steering.tooltip":"توپ‌ها با حرکت پارو می‌چرخند","upgrades.steering.verbose_description":"تغییر مکان پارو مستقیماً بر جهت حرکت توپ تأثیر می‌گذارد. در سطح ۲ و بالاتر، خطی نشان‌دهنده جهت توپ‌ها دریافت می‌کنید.","upgrades.sticky_coins.name":"سکه‌های چسبنده","upgrades.sticky_coins.tooltip":"سکه‌ها به آجرهای هم‌رنگ می‌چسبند","upgrades.sticky_coins.verbose_description":"در سطح ۲، به آجرهای هر رنگی می‌چسبند","upgrades.streak_shots.name":"رگبار برخورد","upgrades.streak_shots.tooltip":"سکه‌های بیشتر اگر چندین آجر را همزمان بشکنید","upgrades.streak_shots.verbose_description":"هر بار که آجری را بشکنید، ترکیب شما یک واحد افزایش می‌یابد.\\n\\nاما به‌محض اینکه توپ به پارو برخورد کند، ترکیب به مقدار پیش‌فرض بازنشانی می‌شود.\\n\\nوقتی ترکیب بالاتر از مقدار پایه باشد، پارو حاشیه قرمز می‌گیرد تا یادآوری کند که برخورد توپ با آن ترکیب را نابود می‌کند.","upgrades.sturdy_bricks.name":"آجرهای مقاوم","upgrades.sturdy_bricks.tooltip":"+{{lvl}} سلامت آجرها، +{{percent}}% سکه","upgrades.sturdy_bricks.verbose_description":"هر سطح این ویژگی یک نقطه سلامت به همه آجرها اضافه می‌کند. می‌توانید تعداد سلامت را با ویژگی «
