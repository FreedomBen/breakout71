tats.level_reached":"Erreichte Stufe","gameOver.stats.total_score":"Gesamtpunktzahl","gameOver.stats.upgrades_applied":"Angewandte Upgrades","gameOver.stats_intro":"Hier finden Sie Ihre Spielstatistik im Vergleich zu Ihren {{count}} besten Spielen.","gameOver.unlocked_perk":"Upgrade freigeschaltet","gameOver.unlocked_perk_plural":"Du hast soeben {{count}} Vergünstigungen freigeschaltet","gameOver.win.summary":"Das Spiel ist vorbei. Du hast {{score}} Münzen versteckt.","gameOver.win.title":"Du hast dieses Spiel abgeschlossen","help.content":"## Ziel\\n\\nSammle in 7 Levels so viele Münzen wie möglich ein.\\nDie Münzen erscheinen, wenn du Ziegel zerbrichst.\\nFangen Sie sie mit Ihrem Paddel auf, um Ihre Punktzahl zu erhöhen.\\nIhr Punktestand wird in der oberen rechten Ecke des Bildschirms angezeigt.\\nLassen Sie den Ball nicht fallen, sonst ist das Spiel vorbei.\\n\\nWenn du alle Ziegel zerstört hast, kannst du dir ein Upgrade aussuchen.\\n\\n## Upgrades\\n\\nDie Upgrades, die du wählst, gelten bis zum Ende des Laufs.\\nEinige können mehrmals ausgewählt werden, um die Wirkung zu verstärken.\\nEinige helfen beim Zielen oder machen das Spiel auf andere Weise einfacher.\\nEinige sind nur in Kombination nützlich.\\n\\nZu Beginn eines jeden Spiels erhältst du immer ein Upgrade.\\nIhr Symbol dient als Baustein des ersten Levels.\\nDu kannst die Start-Upgrades in den Einstellungen auswählen.\\n\\nViele Upgrades wirken sich auf deine Kombo aus.\\n\\n## Combo\\n\\nDeine \\"Combo\\" ist die Anzahl der Münzen, die beim Zerbrechen eines Steins entstehen.\\nSie wird auf deinem Paddel angezeigt, zum Beispiel x4 bedeutet, dass jeder Stein 4 Münzen hervorbringt.\\nDie meisten Upgrades, die den Combo erhöhen, fügen auch eine Bedingung hinzu, um ihn zurückzusetzen.\\nDie Kombo wird auch zurückgesetzt, wenn der Ball zum Schläger zurückkehrt, ohne einen Stein zu treffen.\\nIn diesem Fall wird eine \\"Miss\\"-Meldung angezeigt.\\n\\nVersuchen Sie, jedes Mal auf einen Stein zu zielen.\\n\\n## Anvisieren\\n\\nNur die Position des Balls auf dem Schläger entscheidet darüber, wie der Ball abprallt.\\nWenn der Ball das Paddel genau in der Mitte trifft, prallt er senkrecht nach oben ab.\\nWenn du ihn mehr auf einer Seite triffst, hat er einen größeren Winkel.\\nDie Paddelgeschwindigkeit und der Auftreffwinkel haben keinen Einfluss auf die Richtung des Balls nach dem Aufprall.\\n\\nViele Upgrades, die beim Zielen helfen, können freigeschaltet werden.\\n\\n## Freischaltungen\\n\\nWenn du Breakout 71 zum ersten Mal spielst, sind die meisten Upgrades und Levels gesperrt.\\nUpgrades werden freigeschaltet, indem du einfach spielst und viele Münzen fängst.\\nDie ersten Level werden durch das Erreichen einer hohen Punktzahl freigeschaltet.\\nSpätere Levels fügen eine Bedingung hinzu, welche Vergünstigungen Sie auswählen können.\\n\\nEine hohe Punktzahl zu erreichen ist viel einfacher, wenn du nach jedem Level mehrere Upgrades erhältst.\\n\\n## Re-Rolls und kostenlose Upgrades\\n\\nWenn du gut spielst, bekommst du ein zusätzliches Upgrade, das du auswählen kannst:\\n\\n- Schaffe das Level in weniger als {{levelTimeGood}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedGood}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateGood}}% der Münzen\\n- Verfehle die Steine weniger als {{missesGood}} Mal\\n\\nDu bekommst auch einen Re-Roll, mit dem du Upgrades überspringen kannst, wenn du noch besser abschneidest:\\n\\n- Schaffe ein Level in weniger als {{levelTimeBest}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedBest}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateBest}}% der Münzen\\n- Verfehle die Steine weniger als {{missesBest}} Mal\\n\\nMit einer Option in den Einstellungen können Sie diese Statistiken anzeigen lassen","help.help":"Erfahren Sie mehr über das Spiel","help.levels":"Ebenen","help.title":"Hilfe","help.upgrades":"## Upgrades","history.columns.score":"Ergebnis","history.columns.started":"Datum","history.help":"Sehen Sie Ihre {{count}} besten Spiele.","history.locked":"Mindestens zehn Spiele spielen, um freizuschalten","history.title":"Läuft Geschichte","lab.help":"Versuchen Sie jede beliebige Konstruktion","lab.instructions":"Wähle Upgrades und ein Level aus und klicke dann oben auf die Schaltfläche „Play“","lab.menu_entry":"Kreativ-Modus","lab.play":"Spielen","lab.reset":"Zurücksetzen","lab.select_level":"Wählen Sie einen Level zum Spielen","lab.unlocks_at":"Wird freigeschaltet bei Gesamtpunktzahl {{score}}","level_up.after_buttons":"Du hast gerade Level {{level}}/{{max}}beendet.","level_up.before_buttons":"Du hast {{score}} Münzen {{catchGain}} aus {{levelSpawnedCoins}} in {{time}} Sekunden {{timeGain}}gefangen.\\n\\nDu hast {{levelMisses}} Mal danebengeschossen {{missesGain}} und {{levelWallBounces}} Mal die Wände oder die Decke getroffen{{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Versuche, alle Münzen zu fangen, verpasse nie die Steine, stoße nie an die Wände/Decke oder schaffe das Level unter 30 Sekunden, um zusätzliche Upgrades zu erhalten.","level_up.compliment_good":"Gut gemacht!","level_up.compliment_perfect":"Beeindruckend, machen Sie weiter so!","level_up.pick_upgrade_title":"Wählen Sie ein Upgrade","level_up.plus_one_upgrade":"(+1 Aufwertung)","level_up.plus_one_upgrade_and_reroll":"(+1 Aufwertung und +1 Neuwurf)","level_up.reroll":"Neu würfeln ({{count}})","level_up.reroll_help":"Neue Wahlmöglichkeiten bieten","level_up.upgrade_perk_to_level":"  lvl {{level}}","main_menu.basic":"","main_menu.basic_help":"","main_menu.colorful_coins":"","main_menu.colorful_coins_help":"","main_menu.comboIncreaseTexts":"","main_menu.comboIncreaseTexts_help":"","main_menu.contrast":"","main_menu.contrast_help":"","main_menu.credit_levels":"","main_menu.donate":"Sie haben seit {{hours}} Stunden gespielt","main_menu.donate_help":"Wie wäre es mit einer Spende? Sie können diese Erinnerung in den Einstellungen ausblenden.","main_menu.donation_reminder":"","main_menu.donation_r übernehmen.","settings.save_file_loaded_ok":"Ok","settings.show_fps":"FPS-Zähler","settings.show_fps_help":"Überwachen Sie die Leistung der Anwendung","settings.show_stats":"Echtzeit-Statistiken anzeigen","settings.show_stats_help":"Münzen, Zeit, Sprünge, Fehlschüsse","settings.smooth_lighting":"Sanfte Beleuchtung","settings.smooth_lighting_help":"Verwischen Sie die Lichteffekte im Hintergrund, damit sie weniger quadratisch aussehen. Erhöht die Verzögerung.","settings.sounds":"Spiel-Sounds","settings.sounds_help":"Piepsen, Bloops und Brrrr","settings.stress_test":"Stresstest","settings.stress_test_help":"Starten Sie ein Bot-gesteuertes Spiel mit einer sehr hohen Anzahl an Münzen, um die Leistungsgrenzen Ihres Geräts zu testen.","starting_perks.checked":"Wenn Sie ein neues Spiel beginnen, wird Ihnen eine dieser Vergünstigungen angeboten. Klicken Sie auf eine Vergünstigung, um sie auszuschließen.","starting_perks.help":"Wählen Sie mögliche Start-Upgrades","starting_perks.random":"Alle Vorteile wurden gestrichen, die Auswahl erfolgt nach dem Zufallsprinzip.","starting_perks.title":"Startvorteile","starting_perks.unchecked":"Die folgenden Vergünstigungen werden nicht als Startvergünstigungen angeboten, aber Sie können sie durch Anklicken zum Pool hinzufügen.","unlocks.greyed_out_help":"Die ausgegrauten Upgrades können freigeschaltet werden, indem Sie Ihre Gesamtpunktzahl erhöhen. Die Gesamtpunktzahl erhöht sich jedes Mal, wenn Sie im Spiel punkten.","unlocks.intro":"Deine Gesamtpunktzahl ist {{ts}}. Nachfolgend finden Sie alle Upgrades und Levels, die das Spiel zu bieten hat.   Klicken Sie auf ein Upgrade oder eine Stufe, um ein Testspiel damit zu starten.","unlocks.just_unlocked":"Level freigeschaltet","unlocks.just_unlocked_plural":"Du hast soeben {{count}} Stufen freigeschaltet","unlocks.level":"<h2>Du hast {{unlocked}} Stufen von {{out_of}}freigeschaltet </h2>\\n<p>Hier sind alle Spielstufen, klicke eine an, um sie auszuprobieren.</p> ","unlocks.level_description":"Ein {{size}}x{{size}} Level mit {{bricks}} Steinen, {{colors}} Farben und {{bombs}} Bomben.","unlocks.minScore":"Erreiche ${{minScore}} in einem Lauf, um freizuschalten.","unlocks.minScoreWithPerks":"Erreiche ${{minScore}} in einem Durchgang mit {{required}} , aber ohne {{forbidden}} zu entsperren.","unlocks.minTotalScore":"Kumulieren Sie insgesamt ${{score}}","unlocks.reached":"Ihr bestes Ergebnis war {{reached}}.","unlocks.title_upgrades":"Du hast {{unlocked}} Upgrades von {{out_of}}freigeschaltet.","upgrades.addiction.name":"Sucht","upgrades.addiction.tooltip":"+{{lvl}} Combo / Stein, Combo wird {{delay}}s nach Zerbrechen eines Steins zurückgesetzt.","upgrades.addiction.verbose_description":"Der Countdown beginnt erst nach dem Zerbrechen des ersten Steins eines jeden Levels. Er stoppt, sobald alle Ziegel zerstört sind.","upgrades.asceticism.name":"Askese","upgrades.asceticism.tooltip":"+{{combo}} Combo / Ziegel, - {{combo}} bei Münzfang","upgrades.asceticism.verbose_description":"Sie müssen die Münzen irgendwo aufbewahren, während Ihre Combo aufsteigt.","upgrades.ball_attract_ball.help_plural":"Stärkere Anziehungskraft","upgrades.ball_attract_ball.name":"Schwerkraft","upgrades.ball_attract_ball.tooltip":"Bälle ziehen Bälle an","upgrades.ball_attract_ball.verbose_description":"Bälle, die mehr als \\"3/4 der Spielfeldbreite\\" entfernt sind, beginnen sich gegenseitig anzuziehen.\\n\\nDie Anziehungskraft ist stärker, wenn sie am weitesten voneinander entfernt sind.\\n\\nUm die Anziehungskraft zu symbolisieren, fliegen Regenbogenpartikel. Dieser Vorteil wird nur angeboten, wenn du bereits mehr als einen Ball hast.","upgrades.ball_attracts_coins.name":"Bälle ziehen Münzen an","upgrades.ball_attracts_coins.tooltip":"Die Münzen folgen der nächstgelegenen Kugel und fallen langsamer herunter.","upgrades.ball_attracts_coins.verbose_description":"Dies könnte verwendet werden, um die Kugeln mit Münzen \\"anzumalen\\", wenn man es mit \\"Flecken\\" und \\"Geistermünzen\\" kombiniert. Es funktioniert auch als Ersatz für einen Münzmagneten.","upgrades.ball_repulse_ball.help_plural":"Stärkere Abstoßungskraft","upgrades.ball_repulse_ball.name":"Persönlicher Raum","upgrades.ball_repulse_ball.tooltip":"Bälle stoßen Bälle ab","upgrades.ball_repulse_ball.verbose_description":"Kugeln, die weniger als ein Viertel der Bildschirmbreite entfernt sind, stoßen sich gegenseitig ab. Die Abstoßungskraft ist stärker, wenn sie sich nahe beieinander befinden. Um diese Kraft zu symbolisieren, werden Partikel herausgeschleudert. Dieser Vorteil wird nur angeboten, wenn Sie bereits mehr als einen Ball haben.","upgrades.base_combo.name":"Starke Grundlagen","upgrades.base_combo.tooltip":"Combo beginnt bei {{coins}} statt bei 1.","upgrades.base_combo.verbose_description":"Deine Combo beginnt normalerweise bei 1 am Anfang des Levels und wird auf 1 zurückgesetzt, wenn du herumspringst, ohne etwas zu treffen. Mit diesem Vorteil beginnt die Kombo 3 Punkte höher, sodass du immer mindestens 4 Münzen pro Stein erhältst. Immer, wenn deine Kombo zurückgesetzt wird, steht sie wieder bei 4 und nicht bei 1. Dein Ball wird ein wenig glitzern, um anzuzeigen, dass sein Combo höher als 1 ist.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Größere Explosionen","upgrades.bigger_explosions.verbose_description":"Die Standardexplosion räumt ein 3x3-Quadrat, mit dieser wird es zu einem 5x5-Quadrat, und der Schlag auf die Münzen ist auch wesentlich stärker. Der Bildschirm blinkt nach jeder Explosion (außer im Basismodus)","upgrades.bigger_puck.name":"Größeres Paddel","upgrades.bigger_puck.tooltip":"Einfach mehr Münzen fangen.","upgrades.bigger_puck.verbose_description":"Ein größeres Paddel macht es einfacher, den Ball nie zu verfehlen und mehr Münzen zu fangen. Außerdem kann man die Abpraller genau ausrichten (der Winkel des Balls hängt nur davon ab, wo er das Paddel trifft).","upgrades.bricks_attract_ball.name":"Ziegelsteine ziehen Bälle an","upgrades.bricks_attract_ball.tooltip":"Der Ball fliegt zu den ersten {{count}} Steinen, die er trifft.","upgrades.bricks_attract_ball.verbose_description":"Die Wirkung ist bei höheren Stufen stärker. Die Anzahl der Steine, die getroffen werden können, bevor der Effekt aufhört, ist ebenfalls höher. Der Effekt setzt wieder ein, wenn der Ball den Puck trifft.","upgrades.bricks_attract_coins.name":"Ziegelsteine ziehen Münzen an","upgrades.bricks_attract_coins.tooltip":"Hilft ihnen, dort oben zu bleiben","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Boje","upgrades.buoy.tooltip":"Münzen schweben {{duration}} Sekunden lang auf der unteren Linie.","upgrades.buoy.verbose_description":"Der Effekt ist im mobilen Modus am deutlichsten sichtbar","upgrades.clairvoyant.name":"Hellsichtig","upgrades.clairvoyant.tooltip":"Sehen Sie die nächsten Levels, die HP der Steine und die Ballrichtung","upgrades.clairvoyant.verbose_description":"Hilft dir, die richtigen Upgrades auszuwählen und zu verstehen, was es mit den robusten Steinen auf sich hat. Level 2 und 3 bringen zusätzliches Wissen von zweifelhaftem Nutzen (erreichbar im Loop-Modus)","upgrades.coin_magnet.help_plural":"Stärkere Wirkung auf die Münzen","upgrades.coin_magnet.name":"Magnet für Münzen","upgrades.coin_magnet.tooltip":"Paddel zieht Münzen an","upgrades.coin_magnet.verbose_description":"Lenkt die Münzen auf das Paddel. Der Effekt ist stärker, wenn die Münze bereits in der Nähe ist.","upgrades.compound_interest.name":"Zinseszins","upgrades.compound_interest.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, Rücksetzung bei verlorener Münze","upgrades.compound_interest.verbose_description":"Deine Combo wächst jedes Mal um eins, wenn du einen Stein zerbrichst, und bringt mit jedem Stein, den du zerbrichst, mehr und mehr Münzen hervor.\\nAchten Sie jedoch darauf, jede dieser Münzen mit Ihrem Paddel aufzufangen, da jede verlorene Münze Ihre Combo zurücksetzt.\\nSobald deine Kombo über dem Minimum liegt, wird der Boden des Spielfelds mit einer roten Linie markiert, um dich daran zu erinnern, dass die Münzen nicht dorthin gehören.","upgrades.concave_puck.name":"Konkaves Paddel","upgrades.concave_puck.tooltip":"Verbessert die vertikale Zielgenauigkeit","upgrades.concave_puck.verbose_description":"Die Bälle gehen zu Beginn des Levels gerade nach oben und prallen in einem geringeren Winkel ab.","upgrades.corner_shot.name":"Eckball","upgrades.corner_shot.tooltip":"Lässt Ihr Paddel mit den Rändern des Bildschirms überlappen","upgrades.corner_shot.verbose_description":"Hilft beim Zielen in den Kurven. Weitere Stufen lassen Sie weiter hinausgehen.","upgrades.etherealcoins.name":"Münzen, im Weltraum","upgrades.etherealcoins.tooltip":"Münzen werden nicht mehr von der Schwerkraft beeinflusst","upgrades.etherealcoins.verbose_description":"Die Münzen behalten ihre Geschwindigkeit auch nach mehreren Aufprallvorgängen bei und werden nicht mehr durch die Schwerkraft beeinflusst.","upgrades.extra_levels.name":"5 min mehr","upgrades.extra_levels.tooltip":"Spielen Sie {{count}} Stufen statt 7","upgrades.extra_levels.verbose_description":"Das Standardspiel kann maximal 7 Stufen dauern, danach ist das Spiel vorbei.\\n\\nMit jeder Stufe dieses Vorteils können Sie eine Stufe höher gehen. Die letzten Level sind oft diejenigen, in denen man die meisten Punkte macht, so dass der Unterschied dramatisch sein kann.","upgrades.extra_life.help_plural":"Dein (letzter) Ball wird auf dem Boden aufspringen, anstatt verloren zu gehen ({{lvl}} mal).","upgrades.extra_life.name":"Extraleben","upgrades.extra_life.tooltip":"Der Ball prallt einmal auf der unteren Linie auf, bevor er verloren ist.","upgrades.extra_life.verbose_description":"Normalerweise hat man nur einen Ball, und das Spiel ist vorbei, sobald man ihn fallen lässt.\\n\\nDieser Vorteil fügt eine weiße Leiste am unteren Rand des Bildschirms hinzu, die einen Ball einmal speichert und dabei zerbricht.\\n\\nJedes Mal, wenn ein Ball am unteren Rand des Bildschirms aufprallt, verlierst du eine Stufe dieses Vorteils.","upgrades.forgiving.name":"Verzeihen","upgrades.forgiving.tooltip":"Durch fehlende Pausen wird die Kombo schrittweise reduziert, anstatt auf einmal.","upgrades.forgiving.verbose_description":"Der erste Fehlschuss pro Level ist kostenlos, dann 10% der Combo, dann 20% ...","upgrades.fountain_toss.name":"Springbrunnen-Wurf","upgrades.fountain_toss.tooltip":"Gewinnen Sie etwas Combo, wenn Sie einige Münzen verpassen.","upgrades.fountain_toss.verbose_description":"","upgrades.ghost_coins.name":"Geistermünzen","upgrades.ghost_coins.tooltip":"Münzen gehen langsam durch Ziegelsteine","upgrades.ghost_coins.verbose_description":"Das ist kein Bug, sondern ein Feature!  Die Münzen fliegen nur langsam durch die Ziegel. Höhere Stufen lassen sie schneller fliegen.","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Umgekehrte Schwerkraft links und rechts des Paddels","upgrades.helium.verbose_description":"Dies wirkt sich auf die Münzen aus und lässt sie nach oben treiben, bis Sie bereit sind, sie aufzuheben.","upgrades.hot_start.name":"Heißer Start","upgrades.hot_start.tooltip":"Start bei Kombo {{start}}, -{{loss}} Kombo pro Sekunde","upgrades.hot_start.verbose_description":"Zu Beginn eines jeden Levels beginnt deine Kombo mit +30 Punkten, aber dann wird sie jede Sekunde um einen Punkt verringert. Der Effekt ist mit anderen Perks stapelbar.","upgrades.hypnosis.name":"Hypnose","upgrades.hypnosis.tooltip":"Immer wenn ein Ziegelstein seine Farbe ändert, teleportierst du diese Münze zur nächsten Kugel und lädst ihre Fähigkeit, einen Ziegelstein zu färben, wieder auf.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Implosionen","upgrades.implosions.tooltip":"Explosionen saugen Münzen an, anstatt sie wegzublasen","upgrades.implosions.verbose_description":"Die Explosionskraft wird in die andere Richtung angewendet. Weitere Stufen wirken als \\"größere Explosion\\".","upgrades.instant_upgrade.name":"Sofortiges Upgrade","upgrades.instant_upgrade.tooltip":"+2 Aufwertung jetzt, -1 Wahl bis Spielende.","upgrades.instant_upgrade.verbose_description":"Wählen Sie sofort zwei Upgrades aus, so dass Sie ein kostenloses Upgrade erhalten und eines, mit dem Sie das Upgrade, mit dem Sie diese Vergünstigung erhalten haben, zurückzahlen. Bei jedem weiteren Menü zur Auswahl von Upgrades gibt es weniger Optionen zur Auswahl.","upgrades.left_is_lava.name":"Linke Seite meiden","upgrades.left_is_lava.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein. Combo wird zurückgesetzt, wenn der Ball die linke Seite des Bildschirms trifft.","upgrades.left_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erhöht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine Münze mehr bekommst.\\n\\nAllerdings wird deine Combo zurückgesetzt, sobald dein Ball die linke Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die linke Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.limitless.name":"Grenzenlos","upgrades.limitless.tooltip":"Erhöhe die maximale Stufe aller Aufwertungen um {{lvl}} ","upgrades.limitless.verbose_description":"Durch die Wahl dieses Vorteils wird auch sein eigenes Limit um eins erhöht, so dass man es erneut wählen kann.","upgrades.metamorphosis.name":"Metamorphose","upgrades.metamorphosis.tooltip":"Jede Münze kann {{lvl}} Steine mit ihrer Farbe färben","upgrades.metamorphosis.verbose_description":"Mit diesem Vorteil haben die Münzen die Farbe des Ziegels, aus dem sie stammen, und färben den ersten Ziegel, den sie berühren, in derselben Farbe. Die Münzen spawnen mit der Geschwindigkeit des Balls, der sie zerbrochen hat, was bedeutet, dass du ein bisschen in die Richtung der Ziegelsteine zielen kannst, die du \\"anmalen\\" willst. Auf Stufe 1 kann jede Münze 1 Ziegelstein einfärben, bevor sie \\"verbraucht\\" wird und hohl erscheint.","upgrades.minefield.name":"Minenfeld","upgrades.minefield.tooltip":"+{{lvl}} Kombo pro Bombenstein auf dem Bildschirm","upgrades.minefield.verbose_description":"Fügt +lvl zur Combo hinzu, wenn ein Ziegelstein platziert wird, -lvl, wenn er zerstört wird, und erhöht die Basiskombo um die Anzahl der Ziegelsteine mal lvl","upgrades.multiball.name":"Multi-Ball","upgrades.multiball.tooltip":"Beginne jedes Level mit {{count}} Bällen.","upgrades.multiball.verbose_description":"Sobald du den Ball in Breakout 71 fallen lässt, hast du verloren.\\n\\nMit diesem Vorteil erhalten Sie zwei Bälle und können es sich daher leisten, einen zu verlieren.\\n\\nDie verlorenen Bälle kommen im nächsten Level zurück.\\n\\nWenn du mehr als einen Ball hast, stehen dir weitere Vergünstigungen zur Verfügung, und du kannst das Level natürlich schneller abschließen.","upgrades.nbricks.name":"Strenger Stichprobenumfang","upgrades.nbricks.tooltip":"Triff genau {{lvl}} Steine pro Paddle Bounce für +{{lvl}} Combo, sonst wird er zurückgesetzt","upgrades.nbricks.verbose_description":"Ihr müsst die Steine nicht unbedingt zerstören, aber ihr müsst sie treffen. Durch Explosionen zerstörte Ziegelsteine zählen nicht.","upgrades.one_more_choice.name":"Extra Auswahl","upgrades.one_more_choice.tooltip":"Weitere Stufenaufstiege bieten {{lvl}} weitere Option(en) in der Liste","upgrades.one_more_choice.verbose_description":"Jedes Upgrade-Menü wird eine weitere Option enthalten.  Erhöht nicht die Anzahl der Upgrades, die Sie auswählen können.","upgrades.ottawa_treaty.name":"Ottawa-Vertrag","upgrades.ottawa_treaty.tooltip":"Das Zerschlagen eines Ziegelsteins in der Nähe einer Bombe entschärft diese","upgrades.ottawa_treaty.verbose_description":"Die nahe Bombe wird durch einen farbigen Block ersetzt. Wenn du einen Pionier hast, verliert der Ball seinen Pioniereffekt bis zum nächsten Aufprall. Es kann immer nur eine Bombe ersetzt werden.","upgrades.passive_income.name":"Passives Einkommen","upgrades.passive_income.tooltip":"+{{lvl}} Combo / Brick, es sei denn, das Paddel hat sich in den letzten {{time}}s bewegt, dann wird es stattdessen zurückgesetzt","upgrades.passive_income.verbose_description":"Einige Vergünstigungen können den Bällen helfen, das zu tun, was du willst, ohne dass du etwas tun musst.","upgrades.picky_eater.name":"Wählerischer Esser","upgrades.picky_eater.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, wird bei Farbwechsel des Balls zurückgesetzt","upgrades.picky_eater.verbose_description":"Jedes Mal, wenn du einen Stein der gleichen Farbe wie deine Kugel zerstörst, erhöht sich deine Kombination um eins.\\nWenn es eine andere Farbe ist, nimmt der Ball diese neue Farbe an, aber die Kombination wird zurückgesetzt, es sei denn, es sind keine Steine in der Farbe des Balls übrig.\\nSobald du eine höhere Kombination als das Minimum erreicht hast, werden die Steine der falschen Farbe rot umrandet.\\nWenn du mehr als eine Kugel hast, wechseln sie alle die Farbe, sobald eine von ihnen einen Stein trifft.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Der Ball durchdringt {{count}} Steine nach einem Paddle Bounce","upgrades.pierce.verbose_description":"Der Ball prallt normalerweise ab, sobald er etwas berührt. Mit diesem Vorteil setzt er seine Flugbahn für bis zu 3 Ziegelsteine gebrochen fort.\\n\\nDanach prallt er am 4. Ziegelstein ab, und du musst das Paddel berühren, um den Zähler zurückzusetzen.","upgrades.pierce_color.name":"Farbe durchstechen","upgrades.pierce_color.tooltip":"+{{lvl}} Schaden an Steinen der Farbe der Kugel","upgrades.pierce_color.verbose_description":"Wenn ein Ball auf einen gleichfarbigen Stein trifft, geht er ungehindert durch.\\n\\nSobald er einen andersfarbigen Stein erreicht, zerbricht er ihn, nimmt seine Farbe an und springt auf.\\n\\nWenn du robuste Steine hast, kann es sein, dass der Ball trotzdem an einem gleichfarbigen Stein abprallt.","upgrades.puck_repulse_ball.help_plural":"Stärkere Abstoßungskraft","upgrades.puck_repulse_ball.name":"Weiche Landung","upgrades.puck_repulse_ball.tooltip":"Paddel stößt Bälle ab","upgrades.puck_repulse_ball.verbose_description":"Wenn ein Ball in die Nähe des Schlägers kommt, wird er langsamer und springt möglicherweise sogar, ohne den Schläger zu berühren.","upgrades.rainbow.name":"Regenbogen","upgrades.rainbow.tooltip":"Münzen spawnen in Regenbogenfarben.","upgrades.rainbow.verbose_description":"Mit jedem Level steigt der Anteil der farbigen Münzen. Die Farbe hängt von der Levelzeit ab.","upgrades.reach.name":"Von oben nach unten","upgrades.reach.tooltip":" Das Berühren der N Steine der untersten Reihe setzt die Kombo zurück. Andernfalls: +N Combo","upgrades.reach.verbose_description":"Wenn es nur eine Reihe von Steinen gibt, oder wenn die unterste Reihe von Steinen die gesamte Breite des Spiels abdeckt, dann bewirkt dieser Vorteil nichts. Andernfalls wird die Combo zurückgesetzt, wenn diese unterste Reihe zerstört wird, während alles andere die Combo um die Anzahl der Steine in dieser untersten Reihe erhöht.\\n\\nDie unterste Reihe wird in rot hervorgehoben.","upgrades.respawn.name":"Neu spawnen","upgrades.respawn.tooltip":"{{percent}}% der Steine spawnen nach {{delay}}s erneut.","upgrades.respawn.verbose_description":"Einige Partikeleffekte lassen Sie wissen, wo Ziegelsteine erscheinen werden.","upgrades.right_is_lava.name":"Vermeiden Sie die rechte Seite","upgrades.right_is_lava.tooltip":"+{{lvl}} Kombo pro Stein. Combo wird zurückgesetzt, wenn der Ball die rechte Seite des Bildschirms trifft.","upgrades.right_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erhöht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine Münze mehr bekommst.\\n\\nAllerdings wird deine Kombo zurückgesetzt, sobald dein Ball die rechte Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die rechte Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.sacrifice.help_l1":"Der Verlust eines Lebens löscht alle Steine","upgrades.sacrifice.help_over":"Der Verlust eines Lebens {{lvl}}x die Combo löscht dann alle Steine","upgrades.sacrifice.name":"Opfern Sie","upgrades.sacrifice.verbose_description":"Damit könnte die Kombination ziemlich hoch werden.","upgrades.sapper.help_plural":"Die ersten {{lvl}} Steine, die zerbrochen werden, werden zu Bomben.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"Der erste zerbrochene Ziegelstein wird zu einer Bombe.","upgrades.sapper.verbose_description":"Anstatt einfach zu verschwinden, wird der erste Stein, den du zerbrichst, durch einen Bombenstein ersetzt. Wenn du den Ball auf dem Paddel abprallen lässt, wird der Effekt wieder aktiviert. Wenn Sie diese Fähigkeit aufwerten, können Sie mehr Bomben platzieren.","upgrades.shocks.name":"Schocks","upgrades.shocks.tooltip":"Kollisionen mit explosiven Kugeln","upgrades.shocks.verbose_description":"Wenn zwei Kugeln zusammenstoßen, tauschen sie ihre Geschwindigkeit aus, lösen eine Explosion aus und gewinnen an Geschwindigkeit, um sie zu trennen.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Behalte {{percent}}% deines Combos zwischen den Levels","upgrades.shunt.verbose_description":"Wenn Sie auch Heißstart haben, wird der Heißstart einfach zur aktuellen Kombination hinzugefügt.","upgrades.side_flip.name":"Rechtshändig","upgrades.side_flip.tooltip":"+{{lvl}} Combo pro von rechts gebrochenem Stein, sonst -{{loss}} ","upgrades.side_flip.verbose_description":"Triff den Ziegelstein auf der rechten Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der linken Seite zu treffen, da dies 2 Combo entfernen würde. Schläge von oben und unten haben keinen Effekt.","upgrades.side_kick.name":"Linkshändig","upgrades.side_kick.tooltip":"+{{lvl}} Combo pro von links gebrochenem Stein, sonst -{{loss}} ","upgrades.side_kick.verbose_description":"Triff den Ziegelstein auf der linken Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der rechten Seite zu treffen, da dies 2 Combo entfernen würde. Schläge von oben und unten haben keinen Effekt.","upgrades.skip_last.help_plural":"Die letzten {{lvl}} Steine werden explodieren.","upgrades.skip_last.name":"Einfaches Aufräumen","upgrades.skip_last.tooltip":"Der letzte Stein wird explodieren.","upgrades.skip_last.verbose_description":"Du musst alle Steine zerbrechen, um die nächste Ebene zu erreichen. Es kann jedoch schwierig sein, die letzten Steine zu bekommen.\\n\\nWenn du ein Level früh beendest, hast du zusätzliche Möglichkeiten, um aufzurüsten. Es ist auch sehr vorteilhaft, nie die Steine zu verpassen.\\n\\nWenn es dir also schwerfällt, die letzten Steine zu zerbrechen, kann es helfen, wenn du diesen Vorteil ein paar Mal bekommst.","upgrades.slow_down.name":"Langsamer Ball","upgrades.slow_down.tooltip":"Der Ball bewegt sich langsamer","upgrades.slow_down.verbose_description":"Der Ball fängt relativ langsam an, aber mit jeder Spielstufe wird er ein bisschen schneller.\\n\\nEr wird auch schneller, wenn du viel Zeit in einem Level verbringst.\\n\\nDieser Vorteil macht ihn überschaubarer.\\n\\nDu kannst ihn jedes Mal beim Start erhalten, indem du den Kindermodus im Menü aktivierst.","upgrades.smaller_puck.name":"Kleineres Paddel","upgrades.smaller_puck.tooltip":"","upgrades.smaller_puck.verbose_description":"","upgrades.soft_reset.name":"Weicher Reset","upgrades.soft_reset.tooltip":"Combo-Rückstellungen halten {{percent}}%","upgrades.soft_reset.verbose_description":"Begrenzen Sie die Auswirkungen eines Combo-Resets.","upgrades.sticky_coins.name":"","upgrades.sticky_coins.tooltip":"","upgrades.sticky_coins.verbose_description":"","upgrades.streak_shots.name":"Glückssträhne","upgrades.streak_shots.tooltip":"Mehr Münzen, wenn du viele Steine zerbrichst, bevor du auf das Paddel springst.","upgrades.streak_shots.verbose_description":"Jedes Mal, wenn du einen Stein zerbrichst, erhöht sich dein Combo um eins.\\n\\nSobald der Ball jedoch Ihr Paddel berührt, wird die Kombination auf ihren Standardwert zurückgesetzt.\\n\\nSobald deine Kombo den Basiswert übersteigt, wird dein Paddel rot umrandet, um dich daran zu erinnern, dass es deine Kombo zerstört, wenn du es mit dem Ball berührst.","upgrades.sturdy_bricks.name":"Stabile Ziegel","upgrades.sturdy_bricks.tooltip":"+{{lvl}} Ziegel HP, +{{percent}}% Münzen, die beim Zerbrechen erzeugt werden","upgrades.sturdy_bricks.verbose_description":"Jede Stufe dieses Vorteils fügt allen Steinen einen HP hinzu. Du kannst die HP-Zahl mit der Perk \\"Hellseher\\" sehen. Du kannst den Schaden der Kugeln erhöhen, indem du den \\"Piercing\\"-Perk bekommst. Jede Stufe des Vorteils erhöht den Spawn von Münzen um 50 %.","upgrades.superhot.name":"SUPER HEISS","upgrades.superhot.tooltip":"Die Zeit bewegt sich, wenn sich das Paddel bewegt.","upgrades.superhot.verbose_description":"SUPERHEISS SUPERHEISS SUPERHEISS SUPERHEISS","upgrades.telekinesis.help_plural":"Stärkere Wirkung auf den Ball","upgrades.telekinesis.name":"Telekinese","upgrades.telekinesis.tooltip":"Das Paddel steuert die Flugbahn des Balls","upgrades.telekinesis.verbose_description":"Du kontrollierst den Ball, während er nach oben fliegt.","upgrades.three_cushion.name":"Dreiband","upgrades.three_cushion.tooltip":"+1 Combo pro Treffer an den Seiten und von oben. Die Combo wird zurückgesetzt, wenn Sie einen Ziegel treffen, ohne vorher abzuprallen.","upgrades.three_cushion.verbose_description":"","upgrades.top_is_lava.name":"Der Himmel ist die Grenze","upgrades.top_is_lava.tooltip":"+{{lvl}} Combo pro Stein, wird zurückgesetzt, wenn die Spitze getroffen wird","upgrades.top_is_lava.verbose_description":"Jedes Mal, wenn du einen Stein zerbrichst, erhöht sich deine Kombo um eins. Allerdings wird deine Kombo zurückgesetzt, sobald dein Ball den oberen Rand des Bildschirms trifft.\\n\\nWenn deine Kombo über dem Minimum liegt, erscheint oben ein roter Balken, der dich daran erinnert, dass du es vermeiden solltest, ihn zu treffen.","upgrades.trampoline.name":"Trampolin","upgrades.trampoline.tooltip":"+{{lvl}} Combo pro Paddelabprall, -{{lvl}} Combo pro Abprall an einer beliebigen Grenze","upgrades.trampoline.verbose_description":"Eine der seltenen Combo-Upgrades, die keine Rücksetzbedingung hinzufügen","upgrades.transparency.name":"Transparenz","upgrades.transparency.tooltip":"","upgrades.transparency.verbose_description":"Je höher die Stufe, desto eher wird der Ball transparent und desto höher ist der Punktebonus.","upgrades.trickledown.name":"Trickle down economics","upgrades.trickledown.tooltip":"Die Münzen erscheinen am oberen Rand des Bildschirms.","upgrades.trickledown.verbose_description":"Es könnte Ihnen helfen, ein paar Münzen zur Seite zu legen.","upgrades.unbounded.name":"Polsterung","upgrades.unbounded.tooltip":"Fügt links und rechts des Levels Platz hinzu, aber dein Paddel kann nicht so weit gehen.","upgrades.unbounded.verbose_description":"Ein weiteres Upgrade könnte Ihnen helfen, die Reichweite Ihres Paddels zu vergrößern.","upgrades.viscosity.name":"Viskosität","upgrades.viscosity.tooltip":"Langsamerer Münzfall","upgrades.viscosity.verbose_description":"Münzen beschleunigen normalerweise durch Schwerkraft und Explosionen auf ziemlich hohe Geschwindigkeiten.\\n\\nMit dieser Fähigkeit werden sie ständig langsamer, als ob sie sich in einer Art zähflüssiger Flüssigkeit befänden.\\n\\nDas macht es einfacher, sie zu fangen, und lässt sich gut mit Perks kombinieren, die die Bewegung der Münze beeinflussen.","upgrades.wind.help_plural":"Stärkere Windkraft","upgrades.wind.name":"WIND","upgrades.wind.tooltip":"Paddelstellung erzeugt Wind","upgrades.wind.verbose_description":"Der Wind hängt von der Paddelposition ab: links bläst links, rechts bläst rechts. Wirkt sich sowohl auf Bälle als auch auf Münzen aus.","upgrades.yoyo.name":"Yo-Yo","upgrades.yoyo.tooltip":"Ball fällt in Richtung Paddel","upgrades.yoyo.verbose_description":"Es ist das Gegenteil von Telekinese, den Ball zu kontrollieren, während er wieder nach unten fällt.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"+{{lvl}} Combo pro Ziegel, wird bei einer Explosion zurückgesetzt","upgrades.zen.verbose_description":"Schließlich handelt es sich um ein gewaltfreies Spiel."}');var W=y("5mG9B"),q=y("6QuVk"),H=document.createElement("div");function D(e){H.classList="toast visible",H.innerHTML=e,n&&clearTimeout(n),n=setTimeout(function(){n=void 0,H.classList="hidden toast"},1500)}H.classList="hidden toast",document.body.appendChild(H);var F={},I=!1;try{for(var V in localStorage)try{F[V]=JSON.parse(localStorage.getItem(V)||"null")}catch(e){I||(I=!0,D("Storage issue : ".concat(null==e?void 0:e.message))),console.warn("Reading "+V,e)}}catch(e){console.warn(e)}function Z(e,a){var r;return null!==(r=F[e])&&void 0!==r?r:a}var N=new Set;function U(e,a){N.add(e),F[e]=a}function K(){try{var e=!0,a=!1,r=void 0;try{for(var t,n=N[Symbol.iterator]();!(e=(t=n.next()).done);e=!0){var i=t.value;localStorage.setItem(i,JSON.stringify(F[i]))}}catch(e){a=!0,r=e}finally{try{e||null==n.return||n.return()}finally{if(a)throw r}}N.clear()}catch(e){I||(I=!0,D("Storage issue : ".concat(null==e?void 0:e.message))),console.warn(e)}}function Y(){return Z("breakout_71_total_score",0)}function X(){return 200*Math.pow(2,Z("max_coins",2))}setInterval(function(){return K()},500);var J=!1;function $(){return($=(0,W._)(function(){return(0,q.__generator)(this,function(e){switch(e.label){case 0:if(J||(J=!0,!navigator.storage||!navigator.storage.persist||!navigator.storage.persisted))return[2];return[4,navigator.storage.persisted()];case 1:if(e.sent())return[2];return[4,navigator.storage.persist()];case 2:return e.sent()||console.warn("No storage granted"),[2]}})})).apply(this,arguments)}var Q=[{text:"English",value:"en",strings:a(R),levelName:"UK"},{text:"Français",value:"fr",strings:a(G),levelName:"France"},{text:"عربي",value:"ar",strings:a(C),levelName:"Lebanon"},{text:"Español",value:"es",strings:a(E),levelName:"Chile"},{text:"Русский",value:"ru",s
