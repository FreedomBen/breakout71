هي التي تحقق فيها أعلى النقاط، لذا قد يكون الفرق كبيرًا.","upgrades.extra_life.help_plural":"سترتد الكرة (الأخيرة) إلى الأسفل بدلاً من أن تضيع ({{lvl}} مرة).","upgrades.extra_life.name":"حياة إضافية","upgrades.extra_life.tooltip":"سترتد الكرة مرة واحدة على الخط السفلي قبل أن تضيع.","upgrades.extra_life.verbose_description":"عادةً، لديك كرة واحدة، وتنتهي اللعبة بمجرد إسقاطها.\\n\\nتضيف هذه الميزة شريطًا أبيض أسفل الشاشة يحفظ الكرة مرة واحدة، ثم ينكسر أثناء ذلك.\\n\\nستخسر مستوى واحدًا من هذه الميزة في كل مرة ترتد فيها كرة أسفل الشاشة.","upgrades.forgiving.name":"غفور","upgrades.forgiving.tooltip":"يؤدي فقدان الفواصل إلى تقليل المجموعة تدريجيًا بدلاً من تقليلها دفعة واحدة.","upgrades.forgiving.verbose_description":"أول خطأ في كل مستوى مجاني، ثم 10% من المجموعة، ثم 20% ..","upgrades.fountain_toss.name":"رمي النافورة","upgrades.fountain_toss.tooltip":"احصل على بعض المجموعات عندما تفوت بعض العملات المعدنية.","upgrades.fountain_toss.verbose_description":"عندما تفوتك عملة معدنية وكان مجموعتك أقل من {{max}}، فإن مجموعتك لديها احتمالية {{lvl}}/مجموعة لتنمو بمقدار واحد.","upgrades.ghost_coins.name":"عملات الأشباح","upgrades.ghost_coins.tooltip":"تمر العملات المعدنية ببطء عبر الطوب","upgrades.ghost_coins.verbose_description":"إنها ليست مشكلة، بل ميزة! تتحرك العملات المعدنية ببطء عبر الطوب. المستويات الأعلى تسمح لها بالتحرك بشكل أسرع.","upgrades.helium.name":"الهيليوم","upgrades.helium.tooltip":"انعكست الجاذبية إلى اليسار واليمين من المجداف","upgrades.helium.verbose_description":"يؤثر هذا على العملات المعدنية وسيسمح لها بالطفو حتى تصبح جاهزًا لالتقاطها.","upgrades.hot_start.name":"بداية ساخنة","upgrades.hot_start.tooltip":"ابدأ عند المجموعة {{start}}، -{{loss}} مجموعة في الثانية","upgrades.hot_start.verbose_description":"في بداية كل مستوى، تبدأ مجموعتك بـ +٣٠ نقطة، ثم تنخفض نقطة واحدة كل ثانية. يتراكم هذا التأثير مع مزايا أخرى.","upgrades.hypnosis.name":"التنويم المغناطيسي","upgrades.hypnosis.tooltip":"عندما يتغير لون الطوب، قم بنقل تلك العملة إلى الكرة الأقرب وقم بإعادة شحن قدرتها على تلطيخ الطوب.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"الانفجارات","upgrades.implosions.tooltip":"تؤدي الانفجارات إلى امتصاص العملات المعدنية بدلاً من تفجيرها","upgrades.implosions.verbose_description":"تُطبّق قوة الانفجار بطريقة أخرى. المستويات الأخرى تُشكّل \\"انفجارًا أكبر\\".","upgrades.instant_upgrade.name":"ترقية فورية","upgrades.instant_upgrade.tooltip":"+2 ترقية الآن، -1 اختيار حتى نهاية اللعبة.","upgrades.instant_upgrade.verbose_description":"اختر ترقيتين فورًا، لتحصل على واحدة مجانية وأخرى لاسترداد قيمة الميزة التي استخدمتها. مع كل قائمة تالية لاختيار الترقيات، ستجد خيارات أقل.","upgrades.left_is_lava.name":"تجنب الجانب الأيسر","upgrades.left_is_lava.tooltip":"+{{lvl}} مجموعة لكل طوبة مكسورة. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.left_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ بمجرد أن تصطدم كرتكَ بالجانب الأيسر.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيسر أحمر لتذكيرك بضرورة تجنب ضربها.\\n\\n","upgrades.limitless.name":"بلا حدود","upgrades.limitless.tooltip":"رفع المستوى الأقصى لجميع الترقيات بمقدار {{lvl}} ","upgrades.limitless.verbose_description":"يؤدي اختيار هذه الميزة أيضًا إلى رفع الحد الأقصى الخاص به بمقدار واحد، مما يتيح لك اختيارها مرة أخرى.","upgrades.metamorphosis.name":"التحول","upgrades.metamorphosis.tooltip":"يمكن لكل عملة أن تصبغ {{lvl}} من الطوب بلونها","upgrades.metamorphosis.verbose_description":"مع هذه الميزة، ستكون العملات بلون الطوبة التي أتت منها، وستُلوّن أول طوبة تلمسها بنفس اللون. تظهر العملات بسرعة الكرة التي كسرتها، ما يعني أنه يمكنك التصويب قليلاً باتجاه الطوب الذي تريد \\"طلائه\\". في المستوى 1، يُمكن لكل عملة تلوين طوبة واحدة قبل أن \\"تُستهلك\\" وتظهر فارغة.","upgrades.minefield.name":"حقل ألغام","upgrades.minefield.tooltip":"+{{lvl}} مجموعة لكل قنبلة على الشاشة","upgrades.minefield.verbose_description":"يضيف +lvl إلى المجموعة عند وضع لبنة، و-lvl عند تدميرها، ويرفع المجموعة الأساسية بمقدار عدد الطوب مضروبًا في المستوى","upgrades.multiball.name":"كرة متعددة","upgrades.multiball.tooltip":"ابدأ كل المستويات بـ {{count}} كرة.","upgrades.multiball.verbose_description":"بمجرد أن تسقط الكرة في Breakout 71، ستخسر.\\n\\nمع هذه الميزة، ستحصل على كرتين، ما يعني أنك قادر على تحمل خسارة إحداهما.\\n\\nتعود الكرات المفقودة في المستوى التالي.\\n\\nامتلاك أكثر من كرة واحدة يتيح لك الحصول على مزايا إضافية، وبالطبع يُسرّع من إنهاء المستوى.","upgrades.nbricks.name":"حجم العينة الصارم","upgrades.nbricks.tooltip":"اضرب {{lvl}} طوبة بالضبط لكل ارتداد للمجداف للحصول على +{{lvl}} مجموعة، وإلا فسيتم إعادة تعيينها","upgrades.nbricks.verbose_description":"ليس بالضرورة تدمير تلك الطوب، لكن عليك ضربها. الطوب المدمر بالانفجارات لا يُحتسب.","upgrades.one_more_choice.name":"خيار إضافي","upgrades.one_more_choice.tooltip":"ستوفر عمليات رفع المستوى الإضافية {{lvl}} خيارًا إضافيًا في القائمة","upgrades.one_more_choice.verbose_description":"ستحتوي كل قائمة ترقية على خيار إضافي. هذا لا يزيد من عدد الترقيات المتاحة.","upgrades.passive_income.name":"الدخل السلبي","upgrades.passive_income.tooltip":"+{{lvl}} مجموعة / لبنة، ما لم يتم تحريك المجداف في آخر {{time}}ثانية، ثم يتم إعادة تعيينه بدلاً من ذلك","upgrades.passive_income.verbose_description":"يمكن لبعض الامتيازات أن تساعد الكرات على القيام بما تريد دون الحاجة إلى القيام بأي شيء.","upgrades.picky_eater.name":"آكل انتقائي","upgrades.picky_eater.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة، يتم إعادة تعيينها عند تغير لون الكرة","upgrades.picky_eater.verbose_description":"كلما كسرتَ لبنة من نفس لون كرتك، تزداد مجموعتك بمقدار كرة واحدة.\\n\\nإذا كان لونها مختلفًا، تأخذ الكرة اللون الجديد، لكن المجموعة تُعاد ضبطها، إلا في حال عدم وجود أي طوب متبقي من لون الكرة.\\n\\nبمجرد حصولك على مجموعة أعلى من الحد الأدنى، ستُحاط الطوب ذات اللون غير المناسب بإطار أحمر.\\n\\nإذا كان لديك أكثر من كرة، فسيتغير لونها جميعًا عند اصطدام إحداها بطوبة.","upgrades.pierce.name":"ثقب","upgrades.pierce.tooltip":"الكرة تخترق {{count}} طوبة بعد ارتداد المضرب","upgrades.pierce.verbose_description":"عادةً ما ترتد الكرة بمجرد ملامستها لأي شيء. مع هذه الميزة، ستواصل مسارها حتى كسر ثلاث طوبات.\\n\\nبعد ذلك، ترتد على الطوبة الرابعة، وستحتاج إلى لمس المضرب لإعادة ضبط العداد.","upgrades.pierce_color.name":"ثقب اللون","upgrades.pierce_color.tooltip":"+{{lvl}} ضرر للطوب من لون الكرة","upgrades.pierce_color.verbose_description":"كلما اصطدمت الكرة بقطعة من نفس اللون، ستمرّ دون عائق.\\n\\nوإذا اصطدمت بقطعة من لون مختلف، فستكسرها، وتأخذ لونها، وترتد.\\n\\nإذا كانت لديك قطع متينة، فقد ترتد الكرة عن قطعة من نفس اللون.","upgrades.puck_repulse_ball.help_plural":"قوة تنافر أقوى","upgrades.puck_repulse_ball.name":"هبوط ناعم","upgrades.puck_repulse_ball.tooltip":"المجداف يصد الكرات","upgrades.puck_repulse_ball.verbose_description":"عندما تقترب الكرة من المضرب، فإنها تبدأ في التباطؤ، وربما ترتد دون أن تلمس المضرب.","upgrades.rainbow.name":"قوس قزح","upgrades.rainbow.tooltip":"تظهر العملات المعدنية بألوان قوس قزح.","upgrades.rainbow.verbose_description":"مع كل مستوى، تزداد نسبة العملات الملونة. يعتمد اللون على وقت المستوى.","upgrades.reach.name":"من أعلى إلى أسفل","upgrades.reach.tooltip":"لمس مكعبات N في الصف السفلي يُعيد ضبط المجموعة. وإلا، فإن +N مجموعة","upgrades.reach.verbose_description":"إذا كان هناك صف واحد فقط من الطوب، أو إذا غطى الصف السفلي عرض اللعبة بالكامل، فلن تُحدث هذه الميزة أي فرق. وإلا، فإن كسر هذا الصف السفلي يُعيد ضبط المجموعة، بينما يؤدي كسر أي شيء آخر إلى زيادة المجموعة بمقدار عدد الطوب الموجود في ذلك الصف السفلي.\\n\\nسيتم تمييز الصف السفلي باللون الأحمر.","upgrades.respawn.name":"إعادة الظهور","upgrades.respawn.tooltip":"{{percent}}% من الطوب يظهر مرة أخرى بعد {{delay}}ثانية.","upgrades.respawn.verbose_description":"سوف يساعدك تأثير الجسيمات على معرفة مكان ظهور الطوب.","upgrades.right_is_lava.name":"تجنب الجانب الأيمن","upgrades.right_is_lava.tooltip":"+{{lvl}} مجموعة لكل مكعب. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.right_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ حالما تصطدم كرتكَ بالجانب الأيمن.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيمن أحمر لتذكيرك بضرورة تجنب ضربها.\\n\\n","upgrades.sacrifice.help_l1":"فقدان الحياة يزيل كل الطوب","upgrades.sacrifice.help_over":"خسارة حياة {{lvl}}× المجموعة ثم إزالة كل الطوب","upgrades.sacrifice.name":"تصحية","upgrades.sacrifice.verbose_description":"قد يؤدي هذا إلى ارتفاع المجموعة إلى حد كبير.","upgrades.sapper.help_plural":"أول {{lvl}} طوبة مكسورة تصبح قنابل.","upgrades.sapper.name":"مهندس","upgrades.sapper.tooltip":"الطوبة الأولى المكسورة تصبح قنبلة.","upgrades.sapper.verbose_description":"بدلاً من مجرد الاختفاء، ستُستبدل أول لبنة تكسرها ببنة قنبلة. ارتطام الكرة بالمضرب يُعيد تفعيل التأثير. رفع مستوى هذه الميزة سيسمح لك بوضع المزيد من القنابل.","upgrades.shocks.name":"الصدمات","upgrades.shocks.tooltip":"تصادمات الكرات المتفجرة","upgrades.shocks.verbose_description":"عندما تصطدم كرتان، فإنهما تتبادلان سرعتهما، ويحدث انفجار، ويكتسبان سرعة إضافية لفصلهما.","upgrades.shunt.name":"ناور","upgrades.shunt.tooltip":"احتفظ بـ {{percent}}% من مجموعتك بين المستويات","upgrades.shunt.verbose_description":"إذا كان لديك أيضًا بداية ساخنة، فسيتم إضافة البداية الساخنة إلى المجموعة الحالية","upgrades.side_flip.name":"اليد اليمنى","upgrades.side_flip.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة من اليمين، -{{loss}} بخلاف ذلك","upgrades.side_flip.verbose_description":"اضرب الطوبة على جانبها الأيمن لتحصل على ضربة كومبو واحدة، لكن تجنب ضربها على الجانب الأيسر لأن ذلك سيُزيل ضربتين كومبو. الضرب من الأعلى والأسفل لا يُجدي نفعًا.","upgrades.side_kick.name":"عسراء","upgrades.side_kick.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة من اليسار، -{{loss}} خلاف ذلك","upgrades.side_kick.verbose_description":"اضرب الطوبة على جانبها الأيسر لتحصل على ضربة كومبو واحدة، لكن تجنب ضربها على الجانب الأيمن لأن ذلك سيُزيل ضربتين كومبو. الضرب من الأعلى والأسفل لا }} من الطوب نقاط الصحة، +{{percent}}% من العملات المعدنية التي تظهر عند الكسر","upgrades.sturdy_bricks.verbose_description":"كل مستوى من هذه الميزة يُضيف نقطة صحة واحدة لجميع الطوب. يمكنك رؤية عدد نقاط الصحة باستخدام ميزة \\"الاستبصار\\". يمكنك زيادة ضرر الكرة بالحصول على ميزة \\"الثاقب\\". كل مستوى من الميزة يُضيف +٥٠٪ من العملات المعدنية.","upgrades.superhot.name":"حار جدًا","upgrades.superhot.tooltip":"يتحرك الزمن عندما يتحرك المجداف.","upgrades.superhot.verbose_description":"سوبر هوت سوبر هوت سوبر هوت سوبر هوت سوبر هوت","upgrades.telekinesis.help_plural":"تأثير أقوى على الكرة","upgrades.telekinesis.name":"التحريك الذهني","upgrades.telekinesis.tooltip":"يتحكم المضرب في مسار الكرة","upgrades.telekinesis.verbose_description":"تتحكم بالكرة أثناء صعودها.","upgrades.top_is_lava.name":"السماء هي الحد","upgrades.top_is_lava.tooltip":"+{{lvl}} مجموعة لكل لبنة، يتم إعادة ضبطها عند الوصول إلى الجزء العلوي","upgrades.top_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتك بمقدار واحد. مع ذلك، ستُعاد ضبط مجموعتك بمجرد وصول الكرة إلى أعلى الشاشة.\\n\\nعندما تتجاوز مجموعتك الحد الأدنى، سيظهر شريط أحمر في الأعلى لتذكيرك بتجنب ضربها.","upgrades.trampoline.name":"الترامبولين","upgrades.trampoline.tooltip":"+{{lvl}} مجموعة لكل ارتداد للمضرب، -{{lvl}} مجموعة لكل ارتداد على أي حدود","upgrades.trampoline.verbose_description":"أحد ترقيات المجموعات النادرة التي لا تضيف شرط إعادة الضبط","upgrades.transparency.name":"الشفافية","upgrades.transparency.tooltip":"كلما كانت الكرة أعلى على الشاشة، زادت شفافيتها. وكلما زادت شفافيتها، زادت العملات التي تنتجها.","upgrades.transparency.verbose_description":"المستويات الأعلى تجعل الكرة شفافة بشكل أسرع وتزيد من مكافأة النقاط.","upgrades.trickledown.name":"اقتصاد التسرب","upgrades.trickledown.tooltip":"تظهر العملات المعدنية في الجزء العلوي من الشاشة.","upgrades.trickledown.verbose_description":"قد يساعدك هذا على وضع بعض العملات المعدنية جانبًا. ","upgrades.unbounded.name":"غير محدود","upgrades.unbounded.tooltip":"يضيف مساحة إلى يسار ويمين ا
