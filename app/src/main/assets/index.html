{{size}} Level mit {{bricks}} Steinen, {{colors}} Farben und {{bombs}} Bomben.","unlocks.minScore":"Erreiche ${{minScore}} in einem Lauf, um freizuschalten.","unlocks.minScoreWithPerks":"Erreiche ${{minScore}} in einem Durchgang mit {{required}} , aber ohne {{forbidden}} zu entsperren.","unlocks.minTotalScore":"Kumulieren Sie insgesamt ${{score}}","unlocks.reached":"Ihr bestes Ergebnis war {{reached}}.","unlocks.title_upgrades":"Du hast {{unlocked}} Upgrades von {{out_of}}freigeschaltet.","upgrades.addiction.name":"Sucht","upgrades.addiction.tooltip":"+{{lvl}} Combo / Stein, Combo wird {{delay}}s nach Zerbrechen eines Steins zurückgesetzt.","upgrades.addiction.verbose_description":"Der Countdown beginnt erst nach dem Zerbrechen des ersten Steins eines jeden Levels. Er stoppt, sobald alle Ziegel zerstört sind.","upgrades.asceticism.name":"Askese","upgrades.asceticism.tooltip":"+{{combo}} Combo / Ziegel, - {{combo}} bei Münzfang","upgrades.asceticism.verbose_description":"Sie müssen die Münzen irgendwo aufbewahren, während Ihre Combo aufsteigt.","upgrades.ball_attract_ball.help_plural":"Stärkere Anziehungskraft","upgrades.ball_attract_ball.name":"Schwerkraft","upgrades.ball_attract_ball.tooltip":"Bälle ziehen Bälle an","upgrades.ball_attract_ball.verbose_description":"Bälle, die mehr als \\"3/4 der Spielfeldbreite\\" entfernt sind, beginnen sich gegenseitig anzuziehen.\\n\\nDie Anziehungskraft ist stärker, wenn sie am weitesten voneinander entfernt sind.\\n\\nUm die Anziehungskraft zu symbolisieren, fliegen Regenbogenpartikel. Dieser Vorteil wird nur angeboten, wenn du bereits mehr als einen Ball hast.","upgrades.ball_attracts_coins.name":"Bälle ziehen Münzen an","upgrades.ball_attracts_coins.tooltip":"Die Münzen folgen der nächstgelegenen Kugel und fallen langsamer herunter.","upgrades.ball_attracts_coins.verbose_description":"Dies könnte verwendet werden, um die Kugeln mit Münzen \\"anzumalen\\", wenn man es mit \\"Flecken\\" und \\"Geistermünzen\\" kombiniert. Es funktioniert auch als Ersatz für einen Münzmagneten.","upgrades.ball_repulse_ball.help_plural":"Stärkere Abstoßungskraft","upgrades.ball_repulse_ball.name":"Persönlicher Raum","upgrades.ball_repulse_ball.tooltip":"Bälle stoßen Bälle ab","upgrades.ball_repulse_ball.verbose_description":"Kugeln, die weniger als ein Viertel der Bildschirmbreite entfernt sind, stoßen sich gegenseitig ab. Die Abstoßungskraft ist stärker, wenn sie sich nahe beieinander befinden. Um diese Kraft zu symbolisieren, werden Partikel herausgeschleudert. Dieser Vorteil wird nur angeboten, wenn Sie bereits mehr als einen Ball haben.","upgrades.base_combo.name":"Starke Grundlagen","upgrades.base_combo.tooltip":"Combo beginnt bei {{coins}} statt bei 1.","upgrades.base_combo.verbose_description":"Deine Combo beginnt normalerweise bei 1 am Anfang des Levels und wird auf 1 zurückgesetzt, wenn du herumspringst, ohne etwas zu treffen. Mit diesem Vorteil beginnt die Kombo 3 Punkte höher, sodass du immer mindestens 4 Münzen pro Stein erhältst. Immer, wenn deine Kombo zurückgesetzt wird, steht sie wieder bei 4 und nicht bei 1. Dein Ball wird ein wenig glitzern, um anzuzeigen, dass sein Combo höher als 1 ist.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Größere Explosionen","upgrades.bigger_explosions.verbose_description":"Die Standardexplosion räumt ein 3x3-Quadrat, mit dieser wird es zu einem 5x5-Quadrat, und der Schlag auf die Münzen ist auch wesentlich stärker. Der Bildschirm blinkt nach jeder Explosion (außer im Basismodus)","upgrades.bigger_puck.name":"Größerer Puck","upgrades.bigger_puck.tooltip":"Einfach mehr Münzen fangen.","upgrades.bigger_puck.verbose_description":"Ein größerer Puck macht es einfacher, den Ball nie zu verfehlen und mehr Münzen zu fangen. Außerdem kann man die Abpraller genau ausrichten (der Winkel des Balls hängt nur davon ab, wo er den Puck trifft).\\n\\nAllerdings ist es mit einem großen Puck schwieriger, die Seiten des Levels zu umspielen, so dass es manchmal unvermeidlich ist, den Ball zu verfehlen.","upgrades.clairvoyant.name":"Hellsichtig","upgrades.clairvoyant.tooltip":"Sehen Sie die nächsten Levels, die HP der Steine und die Ballrichtung","upgrades.clairvoyant.verbose_description":"Hilft dir, die richtigen Upgrades auszuwählen und zu verstehen, was es mit den robusten Steinen auf sich hat. Level 2 und 3 bringen zusätzliches Wissen von zweifelhaftem Nutzen (erreichbar im Loop-Modus)","upgrades.coin_magnet.help_plural":"Stärkere Wirkung auf die Münzen","upgrades.coin_magnet.name":"Magnet für Münzen","upgrades.coin_magnet.tooltip":"Puck zieht Münzen an","upgrades.coin_magnet.verbose_description":"Lenkt die Münzen auf den Puck. Der Effekt ist stärker, wenn die Münze bereits in der Nähe ist. Alle Münzen zu fangen, bringt besondere Boni im Spiel.\\n\\nEine andere Möglichkeit, mehr Münzen zu fangen, besteht darin, Ziegelsteine von unten zu treffen. Die Geschwindigkeit und die Richtung des Balls beeinflussen die Geschwindigkeit der Münzen, die auftauchen.","upgrades.compound_interest.name":"Zinseszins","upgrades.compound_interest.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, Rücksetzung bei verlorener Münze","upgrades.compound_interest.verbose_description":"Mit jedem Ziegelstein, den du zerbrichst, wächst deine Combo um einen Ziegelstein, und mit jedem Ziegelstein, den du zerbrichst, erhältst du mehr und mehr Münzen.\\n\\nAchte jedoch darauf, jede dieser Münzen mit deinem Puck zu fangen, da jede verlorene Münze deine Kombo zurücksetzt.\\n\\nSobald deine Kombo über dem Minimum liegt, erscheint am unteren Rand des Spielfelds eine rote Linie, die dich daran erinnert, dass die Münzen nicht dorthin gelangen sollten.","upgrades.concave_puck.name":"Konkaver Puck","upgrades.concave_puck.tooltip":"Verbessert die vertikale Zielgenauigkeit","upgrades.concave_puck.verbose_description":"Die Bälle gehen zu Beginn des Levels gerade nach oben und prallen in einem geringeren Winkel ab.","upgrades.corner_shot.name":"Eckball","upgrades.corner_shot.tooltip":"Lässt deinen Puck mit den Rändern des Bildschirms überlappen","upgrades.corner_shot.verbose_description":"Hilft beim Zielen in den Kurven. Weitere Stufen lassen Sie weiter hinausgehen.","upgrades.etherealcoins.name":"Münzen, im Weltraum","upgrades.etherealcoins.tooltip":"Münzen werden nicht mehr von der Schwerkraft beeinflusst","upgrades.etherealcoins.verbose_description":"Du musst dafür sorgen, dass die Münzen irgendwie herunterfallen, sonst bekommst du sie nicht.","upgrades.extra_levels.name":"5 min mehr","upgrades.extra_levels.tooltip":"Spielen Sie {{count}} Stufen statt 7","upgrades.extra_levels.verbose_description":"Das Standardspiel kann maximal 7 Stufen dauern, danach ist das Spiel vorbei.\\n\\nMit jeder Stufe dieses Vorteils können Sie eine Stufe höher gehen. Die letzten Level sind oft diejenigen, in denen man die meisten Punkte macht, so dass der Unterschied dramatisch sein kann.","upgrades.extra_life.help_plural":"Dein (letzter) Ball wird auf dem Boden aufspringen, anstatt verloren zu gehen ({{lvl}} mal).","upgrades.extra_life.name":"Extraleben","upgrades.extra_life.tooltip":"Der Ball prallt einmal auf der unteren Linie auf, bevor er verloren ist.","upgrades.extra_life.verbose_description":"Normalerweise hat man nur einen Ball, und das Spiel ist vorbei, sobald man ihn fallen lässt.\\n\\nDieser Vorteil fügt eine weiße Leiste am unteren Rand des Bildschirms hinzu, die einen Ball einmal speichert und dabei zerbricht.\\n\\nJedes Mal, wenn ein Ball am unteren Rand des Bildschirms aufprallt, verlierst du eine Stufe dieses Vorteils.","upgrades.forgiving.name":"Verzeihen","upgrades.forgiving.tooltip":"Durch fehlende Pausen wird die Kombo schrittweise reduziert, anstatt auf einmal.","upgrades.forgiving.verbose_description":"Der erste Fehlschuss pro Level ist kostenlos, dann 10% der Combo, dann 20% ...","upgrades.fountain_toss.name":"Springbrunnen-Wurf","upgrades.fountain_toss.tooltip":"Gewinnen Sie etwas Combo, wenn Sie einige Münzen verpassen.","upgrades.fountain_toss.verbose_description":"Wenn du eine Münze verpasst und deine Combo unter {{max}}war, hat deine Combo eine Wahrscheinlichkeit von {{lvl}}/Combo um eins zu erhöhen.","upgrades.ghost_coins.name":"Geistermünzen","upgrades.ghost_coins.tooltip":"Münzen gehen langsam durch Ziegelsteine","upgrades.ghost_coins.verbose_description":"Das ist kein Bug, sondern ein Feature!  Die Münzen fliegen nur langsam durch die Ziegel. Höhere Stufen lassen sie schneller fliegen.","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Umgekehrte Schwerkraft links und rechts vom Puck","upgrades.helium.verbose_description":"Dies wirkt sich auf die Münzen aus und lässt sie nach oben treiben, bis Sie bereit sind, sie aufzuheben.","upgrades.hot_start.name":"Heißer Start","upgrades.hot_start.tooltip":"Start bei Kombo {{start}}, -{{loss}} Kombo pro Sekunde","upgrades.hot_start.verbose_description":"Zu Beginn eines jeden Levels beginnt deine Kombo mit +30 Punkten, aber dann wird sie jede Sekunde um einen Punkt verringert. Der Effekt ist mit anderen Perks stapelbar.","upgrades.implosions.name":"Implosionen","upgrades.implosions.tooltip":"Explosionen saugen Münzen an, anstatt sie wegzublasen","upgrades.implosions.verbose_description":"Die Explosionskraft wird in die andere Richtung angewendet. Weitere Stufen wirken als \\"größere Explosion\\".","upgrades.instant_upgrade.name":"Sofortiges Upgrade","upgrades.instant_upgrade.tooltip":"+1 Upgrade jetzt, -1 Wahl bis Spielende.","upgrades.instant_upgrade.verbose_description":"Wählen Sie sofort zwei Upgrades aus, so dass Sie ein kostenloses Upgrade erhalten und eines, mit dem Sie das Upgrade, mit dem Sie diese Vergünstigung erhalten haben, zurückzahlen. Bei jedem weiteren Menü zur Auswahl von Upgrades gibt es weniger Optionen zur Auswahl.","upgrades.left_is_lava.name":"Linke Seite meiden","upgrades.left_is_lava.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein. Combo wird zurückgesetzt, wenn der Ball die linke Seite des Bildschirms trifft.","upgrades.left_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erhöht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine Münze mehr bekommst.\\n\\nAllerdings wird deine Combo zurückgesetzt, sobald dein Ball die linke Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die linke Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.limitless.name":"Grenzenlos","upgrades.limitless.tooltip":"Erhöhe die maximale Stufe aller Aufwertungen um {{lvl}} ","upgrades.limitless.verbose_description":"Durch die Wahl dieses Vorteils wird auch sein eigenes Limit um eins erhöht, so dass man es erneut wählen kann.","upgrades.metamorphosis.name":"Metamorphose","upgrades.metamorphosis.tooltip":"Jede Münze kann {{lvl}} Steine mit ihrer Farbe färben","upgrades.metamorphosis.verbose_description":"Mit diesem Vorteil haben die Münzen die Farbe des Steins, aus dem sie stammen, und färben den ersten Stein, den sie berühren, in derselben Farbe.\\n\\nMünzen spawnen mit der Geschwindigkeit des Balls, der sie zerbrochen hat, was bedeutet, dass du ein bisschen in die Richtung der Ziegelsteine zielen kannst, die du \\"malen\\" willst.","upgrades.minefield.name":"Minenfeld","upgrades.minefield.tooltip":"+{{lvl}} Kombo pro Bombenstein auf dem Bildschirm","upgrades.minefield.verbose_description":"Fügt +lvl zur Combo hinzu, wenn ein Ziegelstein platziert wird, -lvl, wenn er zerstört wird, und erhöht die Basiskombo um die Anzahl der Ziegelsteine mal lvl","upgrades.multiball.name":"Multi-Ball","upgrades.multiball.tooltip":"Beginne jedes Level mit {{count}} Bällen.","upgrades.multiball.verbose_description":"Sobald du den Ball in Breakout 71 fallen lässt, hast du verloren.\\n\\nMit diesem Vorteil erhalten Sie zwei Bälle und können es sich daher leisten, einen zu verlieren.\\n\\nDie verlorenen Bälle kommen im nächsten Level zurück.\\n\\nWenn du mehr als einen Ball hast, stehen dir weitere Vergünstigungen zur Verfügung, und du kannst das Level natürlich schneller abschließen.","upgrades.nbricks.name":"Strenger Stichprobenumfang","upgrades.nbricks.tooltip":"Triff genau {{lvl}} Steine pro Puckaufprall für +{{lvl}} Combo, sonst wird er zurückgesetzt","upgrades.nbricks.verbose_description":"Ihr müsst die Steine nicht unbedingt zerstören, aber ihr müsst sie treffen. Durch Explosionen zerstörte Ziegelsteine zählen nicht.","upgrades.one_more_choice.name":"Extra Auswahl","upgrades.one_more_choice.tooltip":"Weitere Stufenaufstiege bieten {{lvl}} weitere Option(en) in der Liste","upgrades.one_more_choice.verbose_description":"Jedes Upgrade-Menü wird eine weitere Option enthalten.  Erhöht nicht die Anzahl der Upgrades, die Sie auswählen können.","upgrades.passive_income.name":"Passives Einkommen","upgrades.passive_income.tooltip":"+{{lvl}} Combo / Brick, es sei denn, der Puck hat sich in den letzten {{time}}s bewegt, dann wird er stattdessen zurückgesetzt","upgrades.passive_income.verbose_description":"Einige Vergünstigungen können den Bällen helfen, das zu tun, was du willst, ohne dass du etwas tun musst.","upgrades.picky_eater.name":"Wählerischer Esser","upgrades.picky_eater.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, wird bei Farbwechsel des Balls zurückgesetzt","upgrades.picky_eater.verbose_description":"Jedes Mal, wenn du einen Stein der gleichen Farbe wie deine Kugel zerstörst, erhöht sich deine Kombination um eins.\\nWenn es eine andere Farbe ist, nimmt der Ball diese neue Farbe an, aber die Kombination wird zurückgesetzt, es sei denn, es sind keine Steine in der Farbe des Balls übrig.\\nSobald du eine höhere Kombination als das Minimum erreicht hast, werden die Steine der falschen Farbe rot umrandet.\\nWenn du mehr als eine Kugel hast, wechseln sie alle die Farbe, sobald eine von ihnen einen Stein trifft.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Ball durchdringt {{count}} Steine nach einem Puckabprall","upgrades.pierce.verbose_description":"Der Ball prallt normalerweise ab, sobald er etwas berührt. Mit diesem Vorteil setzt er seine Flugbahn für bis zu 3 Ziegelsteine gebrochen fort.\\n\\nDanach prallt er am 4. Ziegelstein ab, und du musst den Puck berühren, um den Zähler zurückzusetzen.","upgrades.pierce_color.name":"Farbe durchstechen","upgrades.pierce_color.tooltip":"+{{lvl}} Schaden an Steinen der Farbe der Kugel","upgrades.pierce_color.verbose_description":"Wenn ein Ball auf einen gleichfarbigen Stein trifft, geht er ungehindert durch.\\n\\nSobald er einen andersfarbigen Stein erreicht, zerbricht er ihn, nimmt seine Farbe an und springt auf.\\n\\nWenn du robuste Steine hast, kann es sein, dass der Ball trotzdem an einem gleichfarbigen Stein abprallt.","upgrades.puck_repulse_ball.help_plural":"","upgrades.puck_repulse_ball.name":"Weiche Landung","upgrades.puck_repulse_ball.tooltip":"Puck stößt Bälle ab","upgrades.puck_repulse_ball.verbose_description":"Wenn ein Ball in die Nähe des Pucks kommt, wird er langsamer und springt möglicherweise sogar ab, ohne den Puck zu berühren.","upgrades.reach.name":"Von oben nach unten","upgrades.reach.tooltip":" Das Berühren der N Steine der untersten Reihe setzt die Kombo zurück. Andernfalls: +N Combo","upgrades.reach.verbose_description":"Wenn es nur eine Reihe von Steinen gibt, oder wenn die unterste Reihe von Steinen die gesamte Breite des Spiels abdeckt, dann bewirkt dieser Vorteil nichts. Andernfalls wird die Combo zurückgesetzt, wenn diese unterste Reihe zerstört wird, während alles andere die Combo um die Anzahl der Steine in dieser untersten Reihe erhöht.\\n\\nDie unterste Reihe wird in rot hervorgehoben.","upgrades.respawn.name":"Neu spawnen","upgrades.respawn.tooltip":"{{percent}}% der Steine spawnen nach {{delay}}s erneut.","upgrades.respawn.verbose_description":"Einige Partikeleffekte lassen Sie wissen, wo Ziegelsteine erscheinen werden.","upgrades.right_is_lava.name":"Vermeiden Sie die rechte Seite","upgrades.right_is_lava.tooltip":"+{{lvl}} Kombo pro Stein. Combo wird zurückgesetzt, wenn der Ball die linke Seite des Bildschirms trifft.","upgrades.right_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erhöht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine Münze mehr bekommst.\\n\\nAllerdings wird deine Kombo zurückgesetzt, sobald dein Ball die rechte Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die rechte Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.sacrifice.help_l1":"Der Verlust eines Lebens löscht alle Steine","upgrades.sacrifice.help_over":"Der Verlust eines Lebens {{lvl}}x die Combo löscht dann alle Steine","upgrades.sacrifice.name":"Opfern Sie","upgrades.sacrifice.verbose_description":"Damit könnte die Kombination ziemlich hoch werden.","upgrades.sapper.help_plural":"Die ersten {{lvl}} Steine, die zerbrochen werden, werden zu Bomben.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"Der erste zerbrochene Ziegelstein wird zu einer Bombe.","upgrades.sapper.verbose_description":"Statt einfach zu verschwinden, wird der erste Stein, den du zerbrichst, durch einen Bombenstein ersetzt. Wenn du den Ball auf dem Puck abprallen lässt, wird der Effekt wieder aktiviert. Wenn Sie diese Fähigkeit aufwerten, können Sie mehr Bomben platzieren.\\n\\nDenken Sie daran, dass Bomben die Geschwindigkeit von Münzen in der Nähe beeinflussen, so dass es bei zu vielen Explosionen schwierig werden könnte, die Früchte Ihrer harten Arbeit zu fangen.","upgrades.shocks.name":"Schocks","upgrades.shocks.tooltip":"Kollisionen mit explosiven Kugeln","upgrades.shocks.verbose_description":"Wenn zwei Kugeln zusammenstoßen, tauschen sie ihre Geschwindigkeit aus, lösen eine Explosion aus und gewinnen an Geschwindigkeit, um sie zu trennen.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Behalte {{percent}}% deines Combos zwischen den Levels","upgrades.shunt.verbose_description":"Wenn Sie auch Heißstart haben, wird der Heißstart einfach zur aktuellen Kombination hinzugefügt.","upgrades.side_flip.name":"Rechtshändig","upgrades.side_flip.tooltip":"+{{lvl}} Combo pro von rechts gebrochenem Stein, sonst -{{loss}} ","upgrades.side_flip.verbose_description":"Triff den Ziegelstein auf der rechten Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der linken Seite zu treffen, da dies 2 Combo entfernen würde. Schläge von oben und unten haben keinen Effekt.","upgrades.side_kick.name":"Linkshändig","upgrades.side_kick.tooltip":"+{{lvl}} Combo pro von links gebrochenem Stein, sonst -{{loss}} ","upgrades.side_kick.verbose_description":"Triff den Ziegelstein auf der linken Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der rechten Seite zu treffen, da dies 2 Combo entfernen würde. Schläge von oben und unten haben keinen Effekt.","upgrades.skip_last.help_plural":"Die letzten {{lvl}} Steine werden explodieren.","upgrades.skip_last.name":"Einfaches Aufräumen","upgrades.skip_last.tooltip":"Der letzte Stein wird explodieren.","upgrades.skip_last.verbose_description":"Du musst alle Steine zerbrechen, um die nächste Ebene zu erreichen. Es kann jedoch schwierig sein, die letzten Steine zu bekommen.\\n\\nWenn du ein Level früh beendest, hast du zusätzliche Möglichkeiten, um aufzurüsten. Es ist auch sehr vorteilhaft, nie die Steine zu verpassen.\\n\\nWenn es dir also schwerfällt, die letzten Steine zu zerbrechen, kann es helfen, wenn du diesen Vorteil ein paar Mal bekommst.","upgrades.slow_down.name":"Langsamer Ball","upgrades.slow_down.tooltip":"Der Ball bewegt sich langsamer","upgrades.slow_down.verbose_description":"Der Ball fängt relativ langsam an, aber mit jeder Spielstufe wird er ein bisschen schneller.\\n\\nEr wird auch schneller, wenn du viel Zeit in einem Level verbringst.\\n\\nDieser Vorteil macht ihn überschaubarer.\\n\\nDu kannst ihn jedes Mal beim Start erhalten, indem du den Kindermodus im Menü aktivierst.","upgrades.smaller_puck.help_plural":"Noch kleinerer Puck und höhere Basis-Kombination","upgrades.smaller_puck.name":"Kleinerer Puck","upgrades.smaller_puck.tooltip":"Gibt auch +5 Basis-Kombo","upgrades.smaller_puck.verbose_description":"Dadurch wird der Puck kleiner, was theoretisch einige Eckbälle einfacher macht, aber eigentlich nur den Schwierigkeitsgrad erhöht.\\n\\nDeshalb gibt es auch einen netten Bonus von +5 Münzen pro Ziegelstein für alle Ziegelsteine, die du nach der Auswahl dieses Pucks kaputt machst.","upgrades.soft_reset.name":"Weicher Reset","upgrades.soft_reset.tooltip":"Combo-Rückstellungen halten {{percent}}%","upgrades.soft_reset.verbose_description":"Begrenzen Sie die Auswirkungen eines Combo-Resets.","upgrades.streak_shots.name":"Glückssträhne","upgrades.streak_shots.tooltip":"Mehr Münzen, wenn du viele Steine zerbrichst, bevor du auf den Puck springst.","upgrades.streak_shots.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erhöht sich deine Kombo (Anzahl der Münzen pro Ziegelstein) um eins.\\n\\nSobald der Ball jedoch deinen Puck berührt, wird die Kombination auf ihren Standardwert zurückgesetzt und du erhältst nur noch eine Münze pro Stein.\\n\\nSobald dein Combo den Basiswert übersteigt, wird dein Puck rot, um dich daran zu erinnern, dass deine Combo zerstört wird, wenn du ihn mit dem Ball berührst.","upgrades.sturdy_bricks.name":"Stabile Ziegel","upgrades.sturdy_bricks.tooltip":"+{{lvl}} Ziegel HP, +{{percent}}% Münzen, die beim Zerbrechen erzeugt werden","upgrades.sturdy_bricks.verbose_description":"Jede Stufe dieses Vorteils fügt allen Steinen einen HP hinzu. Du kannst die HP-Zahl mit der Perk \\"Hellseher\\" sehen. Du kannst den Schaden der Kugeln erhöhen, indem du den \\"Piercing\\"-Perk bekommst. Jede Stufe des Vorteils erhöht den Spawn von Münzen um 50 %.","upgrades.telekinesis.help_plural":"Stärkere Wirkung auf den Ball","upgrades.telekinesis.name":"Telekinese","upgrades.telekinesis.tooltip":"Der Puck kontrolliert die Flugbahn des Balls","upgrades.telekinesis.verbose_description":"Du kontrollierst den Ball, während er nach oben fliegt.","upgrades.top_is_lava.name":"Der Himmel ist die Grenze","upgrades.top_is_lava.tooltip":"+{{lvl}} Combo pro Stein, wird zurückgesetzt, wenn die Spitze getroffen wird","upgrades.top_is_lava.verbose_description":"Jedes Mal, wenn du einen Stein zerbrichst, erhöht sich deine Kombo um eins. Allerdings wird deine Kombo zurückgesetzt, sobald dein Ball den oberen Rand des Bildschirms trifft.\\n\\nWenn deine Kombo über dem Minimum liegt, erscheint oben ein roter Balken, der dich daran erinnert, dass du es vermeiden solltest, ihn zu treffen.","upgrades.trampoline.name":"Trampolin","upgrades.trampoline.tooltip":"+{{lvl}} Combo pro Abprall des Pucks,-{{lvl}} Combo pro Abprall an einer beliebigen Grenze","upgrades.trampoline.verbose_description":"Eine der seltenen Combo-Upgrades, die keine Rücksetzbedingung hinzufügen","upgrades.unbounded.help_no_ceiling":"+{{lvl}} Combo pro Stein, keine weiteren Seiten oder Decken","upgrades.unbounded.name":"Unbegrenzt","upgrades.unbounded.tooltip":"+{{lvl}} Combo pro Stein, keine Seiten mehr, um den Ball im Spiel zu halten, Gefahr","upgrades.unbounded.verbose_description":"Ich hoffe, du hast einen Weg gefunden, deinen Ball auf dem Bildschirm zu halten. Es gibt keine Strafen mehr, wenn du die Seiten triffst. Auf Stufe 2+ verschwindet auch die Decke. Dies ist ein fortgeschrittener Vorteil.","upgrades.viscosity.name":"Viskosität","upgrades.viscosity.tooltip":"Langsamerer Münzfall","upgrades.viscosity.verbose_description":"Münzen beschleunigen normalerweise durch Schwerkraft und Explosionen auf ziemlich hohe Geschwindigkeiten.\\n\\nMit dieser Fähigkeit werden sie ständig langsamer, als ob sie sich in einer Art zähflüssiger Flüssigkeit befänden.\\n\\nDas macht es einfacher, sie zu fangen, und lässt sich gut mit Perks kombinieren, die die Bewegung der Münze beeinflussen.","upgrades.wind.help_plural":"Stärkere Windkraft","upgrades.wind.name":"WIND","upgrades.wind.tooltip":"Puckstellung erzeugt Wind","upgrades.wind.verbose_description":"Der Wind hängt von der Position des Pucks ab: links weht links, rechts weht rechts. Wirkt sich sowohl auf Bälle als auch auf Münzen aus.","upgrades.yoyo.name":"Yo-Yo","upgrades.yoyo.tooltip":"Ball fällt in Richtung Puck","upgrades.yoyo.verbose_description":"Es ist das Gegenteil von Telekinese, den Ball zu kontrollieren, während er wieder nach unten fällt.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"+{{lvl}} Combo pro Ziegel, wird bei einer Explosion zurückgesetzt","upgrades.zen.verbose_description":"Schließlich handelt es sich um ein gewaltfreies Spiel."}');var L={};L=JSON.parse('{"confirmRestart.no":"Cancel","confirmRestart.text":"You\'re about to start a new game. Are you sure you want to continue?","confirmRestart.title":"Start a new game?","confirmRestart.yes":"Restart game","gameOver.creative":"This run will not be recorded. ","gameOver.cumulative_total":"Your total cumulative score went from {{startTs}} to {{endTs}}.","gameOver.lost.summary":"You dropped the ball after catching {{score}} coins.","gameOver.lost.title":"Game Over","gameOver.stats.balls_lost":"Balls lost","gameOver.stats.bricks_broken":"Bricks broken","gameOver.stats.bricks_per_minute":"Bricks broken per minute","gameOver.stats.catch_rate":"Catch rate","gameOver.stats.combo_avg":"Average combo","gameOver.stats.combo_max":"Max combo","gameOver.stats.duration_per_level":"Duration per level","gameOver.stats.hit_rate":"Hit rate","gameOver.stats.intro":"Find below your game statistics compared to  your {{count}} best games.","gameOver.stats.level_reached":"Level reached","gameOver.stats.total_score":"Total score","gameOver.stats.upgrades_applied":"Upgrades applied","gameOver.unlocked_perk":"Upgrade unlocked","gameOver.unlocked_perk_plural":"You just unlocked {{count}} perks","gameOver.win.summary":"This game is over. You stashed {{score}} coins. ","gameOver.win.title":"You completed this game","history.columns.score":"Score","history.columns.started":"Date","history.help":"See your {{count}} best games.","history.locked":"Play at least ten games to unlock","history.title":"Runs history","lab.help":"Try any build you want","lab.instructions":"Select upgrades below, then pick a level to play. ","lab.menu_entry":"Creative mode","lab.reset":"Reset all to 0","lab.select_level":"Select a level to play on","lab.unlocks_at":"Unlocks at total score {{score}}","level_up.after_buttons":"You just finished level {{level}}/{{max}}.","level_up.before_buttons":"You caught {{score}} coins {{catchGain}} out of {{levelSpawnedCoins}} in {{time}} seconds {{timeGain}}.\\n\\nYou missed {{levelMisses}} times {{missesGain}} and hit the walls or ceiling {{levelWallBounces}} times{{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Try to catch all coins, never miss the bricks, never hit the walls/ceiling or clear the level under 30s to gain additional upgrades.","level_up.compliment_good":"Well done !","level_up.compliment_perfect":"Impressive, keep it up !","level_up.pick_upgrade_title":"Pick an upgrade","level_up.plus_one_upgrade":"(+1  upgrade)","level_up.plus_one_upgrade_and_reroll":"(+1 upgrade and  +1 re-roll)","level_up.reroll":"Re-roll ({{count}})","level_up.reroll_help":"Offer new choices","level_up.upgrade_perk_to_level":"  lvl {{level}}","main_menu.basic":"Basic graphics","main_menu.basic_help":"Better performance.","main_menu.colorful_coins":"Colorful coins","main_menu.colorful_coins_help":"Coins always spawn of the color of the brick","main_menu.comboIncreaseTexts":"Show +X in gold","main_menu.comboIncreaseTexts_help":"When the combo increase","main_menu.contrast":"High Contrast","main_menu.contrast_help":"More colorful and dark rendering","main_menu.credit_levels":"Levels","main_menu.donate":"You\'ve played for {{hours}} hours","main_menu.donate_help":"How about donating? You can hide this reminder in the settings. ","main_menu.donation_reminder":"Remind me to donate","main_menu.donation_reminder_help":"See time played and donation link in main menu","main_menu.download_save_file":"Download score and stats","main_menu.download_save_file_help":"Get a save file","main_menu.extra_bright":"Extra bright","main_menu.extra_bright_help":"Increases the size of the halo around coins and bricks.","main_menu.fullscreen":"Fullscreen","main_menu.fullscreen_help":"Game will try to go full screen before starting","main_menu.help_content":"## Goal\\n\\nCatch as many coins as possible during 7 levels. \\nCoins appear when you break bricks.\\nCatch them with your paddle to increase your score.\\nYour score is displayed in the top right corner of the screen.\\nDon\'t drop the ball or it\'s game over.\\n\\nAfter destroying all bricks, you\'ll get to pick an upgrade.\\n\\n## Upgrades \\n\\nThe upgrades you pick will apply until the end of the run. \\nSome can be picked multiple times for stronger effect.\\nSome help with aiming, or make the game easier in some other ways. \\nSome are only useful when combined.\\n\\nYou always get one upgrade at the beginning of each game. \\nIts icon will serve as the bricks of the first level. \\nYou can select starting upgrades in the settings.\\n\\nMany upgrades impact your combo. \\n\\n## Combo\\n\\nYour \\"combo\\" is the number of coins spawned when a brick breaks. \\nIt is displayed on your paddle, for example x4 means each brick will spawn 4 coins. \\nMost upgrades that increase the combo also add a condition to reset it. \\nThe combo will also reset if the ball returns to the \\n\\n without hitting any brick.\\nA \\"miss\\" message will be shown when that happens. \\n\\nTry to aim towards a brick every time. \\n\\n## Aiming\\n\\nOnly the ball position on the paddle decides how it will bounce.\\nIf the ball hits the paddle dead center, it will bounce back up vertically. \\nIf you hit more on one side, it will have more angle. \\nThe paddle speed and incoming angle have no impact on the ball direction after bouncing.\\n\\nMany upgrades that help with aiming can be unlocked.\\n\\n## Unlocks\\n\\nWhen playing Breakout 71 for the first time, most upgrades and levels are locked. \\nUpgrades are unlocked by simply playing and catching many coins. \\nThe first levels are unlocked by reaching a high score.\\nLater levels add a condition about which perks you can select. \\n\\nReach high scores is much easier when you get multiple upgrades after each level. \\n\\n## Re-rolls and free upgrades\\n\\nYou\'ll get an extra upgrade to pick when you play well : \\n\\n- Clear the level under {{levelTimeGood}} seconds\\n- Hit the sides or top less than {{wallBouncedGood}} times\\n- Catch {{catchRateGood}}% of coins\\n- Miss the bricks less than {{missesGood}} times \\n\\nYou will also get a re-roll that lets you skip upgrades if you do even better :  \\n\\n-  Clear a level under {{levelTimeBest}} seconds\\n- Hit the sides or top less than {{wallBouncedBest}} times\\n- Catch {{catchRateBest}}% of coins\\n- Miss the bricks less than {{missesBest}} times \\n\\nAn option in the settings lets you display those statistics","main_menu.help_help":"Learn more about the game","main_menu.help_title":"Help","main_menu.help_upgrades":"## Upgrades","main_menu.high_score":"High score : {{score}}","main_menu.kid":"Kids mode","main_menu.kid_help":"Start future games with \\"slower ball\\".","main_menu.language":"Language","main_menu.language_help":"Choose the game\'s language","main_menu.load_save_file":"Load save file","main_menu.load_save_file_help":"Select a save file on your device","main_menu.max_coins":" {{max}} coins on screen maximum","main_menu.max_coins_help":"Cosmetic only, no effect on score","main_menu.max_particles":" {{max}} particles maximum","main_menu.max_particles_help":"Limits the number of particles show on screen for visual effect. ","main_menu.mobile":"Mobile mode","main_menu.mobile_help":"Leaves space under the paddle.","main_menu.normal":"New Game","main_menu.normal_help":"Play 7 levels with a random starting perk","main_menu.pointer_lock":"Mouse pointer lock","main_menu.pointer_lock_help":"Locks and hides the mouse cursor.","main_menu.record":"Record gameplay videos","main_menu.record_download":"Download video ({{size}} MB)","main_menu.record_help":"Get a video of each level.","main_menu.red_miss":"Miss warning","main_menu.red_miss_help":"Show red particles around balls going down without a hit.","main_menu.reset":"Reset Game","main_menu.reset_cancel":"No","main_menu.reset_confirm":"Yes","main_menu.reset_help":"Erase high score, play time and statistics","main_menu.reset_instruction":"You will lose all progress you made in the game, are you sure?","main_menu.save_file_error":"Error loading save file","main_menu.save_file_loaded":"Save file loaded","main_menu.save_file_loaded_help":"The app will now reload to apply your save","main_menu.save_file_loaded_ok":"Ok","main_menu.settings_help":"Tailor the game play to your needs and taste","main_menu.settings_title":"Settings","main_menu.show_fps":"FPS counter","main_menu.show_fps_help":"Monitor the app\'s performance","main_menu.show_stats":"Show real time stats","main_menu.show_stats_help":"Coins, time, bounces, misses","main_menu.sounds":"Game sounds","main_menu.sounds_help":"Can slow down some phones.","main_menu.starting_perks":"Starting perks","main_menu.starting_perks_checked":"When you start a new game, one of those perks will be given to you. Click a perk to exclude it. ","main_menu.starting_perks_help":"Choose possible starting upgrades","main_menu.starting_perks_unchecked":"The perks below are not offered as starting perks, but you can click to add them to the pool. ","main_menu.title":"Breakout 71","main_menu.unlocks":"Unlocked content","main_menu.unlocks_help":"Try perks and levels you unlocked","play.close_modale_window_tooltip":"close ","play.current_lvl":"Level {{level}}/{{max}}","play.menu_label":"menu","play.menu_tooltip":"Open main menu","play.missed_ball":"miss","play.mobile_press_to_play":"Press and hold here to play","play.score_tooltip":"See your score, upgrades and more","play.stats.coins_catch_rate":"Coins catch rate","play.stats.levelMisses":"Missed shots, where you hit nothing","play.stats.levelTime":"Level time","play.stats.levelWallBounces":"Wall bounces","score_panel.close_to_unlock":"Next level unlock :","score_panel.get_upgrades_to_unlock":"Get {{missingUpgrades}} and score {{points}} more points to unlock level \\"{{level}}\\"","score_panel.rerolls_count":"You have accumulated {{rerolls}} rerolls","score_panel.score_to_unlock":"Score {{points}} more points to unlock level \\"{{level}}\\"","score_panel.title":"{{score}} points at level {{level}}/{{max}} ","score_panel.upcoming_levels":"Upcoming levels :","score_panel.upgrades_picked":"Upgrades picked in this game run : ","unlocks.greyed_out_help":"The grayed out upgrades can be unlocked by increasing your total score. The total score increases every time you score in game.","unlocks.intro":"Your total score is {{ts}}. Below are all the upgrades and levels the games has to offer.   Click an upgrade or level below to start a test game with it.","unlocks.just_unlocked":"Level unlocked","unlocks.just_unlocked_plural":"You just unlocked {{count}} levels","unlocks.level":"<h2>You unlocked {{unlocked}} levels out of {{out_of}}</h2>\\n<p>Here are all the game levels, click one to try it out.</p> ","unlocks.level_description":"A {{size}}x{{size}} level with {{bricks}} bricks, {{colors}} colors and {{bombs}} bombs.","unlocks.minScore":"Reach ${{minScore}} in a run to unlock.","unlocks.minScoreWithPerks":"Reach ${{minScore}} in a run with {{required}} but without {{forbidden}} to unlock.","unlocks.minTotalScore":"Accumulate a total of ${{score}}","unlocks.reached":"Your best score was {{reached}}.","unlocks.title_upgrades":"You unlocked {{unlocked}} upgrades out of {{out_of}}","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brick, combo resets {{delay}}s after breaking a brick. ","upgrades.addiction.verbose_description":"The countdown only starts after breaking the first brick of each level. It stops as soon as all bricks are destroyed.","upgrades.asceticism.name":"Asceticism","upgrades.asceticism.tooltip":"+{{combo}} combo / brick,  - {{combo}} on coin catch","upgrades.asceticism.verbose_description":"You\'ll need to store the coins somewhere while your combo climbs. ","upgrades.ball_attract_ball.help_plural":"Stronger attraction force","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attract_ball.tooltip":"Balls attract balls","upgrades.ball_attract_ball.verbose_description":"Balls that are more than \\"3/4 of the game area width\\" away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.","upgrades.ball_attracts_coins.name":"Balls attract coins","upgrades.ball_attracts_coins.tooltip":"Coins follow the nearest ball and fall down slower","upgrades.ball_attracts_coins.verbose_description":"This could be used to \\"paint around\\" the balls with coins if you combined it with \\"stain\\" and \\"ghost coins\\". It also works as a substitute for coin magnet. ","upgrades.ball_repulse_ball.help_plural":"Stronger repulsion force","upgrades.ball_repulse_ball.name":"Personal space","upgrades.ball_repulse_ball.tooltip":"Balls repulse balls","upgrades.ball_repulse_ball.verbose_description":"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.","upgrades.base_combo.name":"Strong foundations","upgrades.base_combo.tooltip":"Combo starts at {{coins}} instead of 1.","upgrades.base_combo.verbose_description":"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you\'ll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Bigger explosions","upgrades.bigger_explosions.verbose_description":"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)","upgrades.bigger_puck.name":"Bigger paddle","upgrades.bigger_puck.tooltip":"Easily catch more coins.","upgrades.bigger_puck.verbose_description":"A bigger paddle makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball\'s angle only depends on where it hits the paddle). ","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"See upcoming levels, bricks HP and ball direction","upgrades.clairvoyant.verbose_description":"Helps you pick the right upgrades and understand what\'s going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)","upgrades.coin_magnet.help_plural":"Stronger effect on the coins","upgrades.coin_magnet.name":"Coins magnet","upgrades.coin_magnet.tooltip":"Paddle attracts coins","upgrades.coin_magnet.verbose_description":"Directs the coins to the paddle. The effect is stronger if the coin is close to it already.","upgrades.compound_interest.name":"Compound interest","upgrades.compound_interest.tooltip":"+{{lvl}} combo per brick broken, resets on coin lost","upgrades.compound_interest.verbose_description":"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\nBe sure however to catch every one of those coins with your paddle, as any lost coin will reset your combo.\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.","upgrades.concave_puck.name":"Concave paddle","upgrades.concave_puck.tooltip":"Improves vertical aiming precision","upgrades.concave_puck.verbose_description":"Balls starts the level going straight up, and bounces with less angle.","upgrades.corner_shot.name":"Corner shot","upgrades.corner_shot.tooltip":"Lets your paddle overlap with the borders of the screen","upgrades.corner_shot.verbose_description":"Helps with aiming in the corners. Further levels let you go further out. ","upgrades.etherealcoins.name":"Coins, in Space","upgrades.etherealcoins.tooltip":"Coins are no  longer affected by gravity","upgrades.etherealcoins.verbose_description":"You\'ll have to make sure that the coins fall down somehow, or you won\'t get any. ","upgrades.extra_levels.name":"5 min more","upgrades.extra_levels.tooltip":"Play {{count}} levels instead of 7","upgrades.extra_levels.verbose_description":"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.","upgrades.extra_life.help_plural":"Your (last) ball will bounce on the bottom instead of being lost ({{lvl}}  times).","upgrades.extra_life.name":"Extra Life","upgrades.extra_life.tooltip":"The ball will bounce once on the bottom line before being lost.","upgrades.extra_life.verbose_description":"Normally, you have one ball, and the game is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou\'ll lose one level of that perk every time a ball bounces at the bottom of the screen.","upgrades.forgiving.name":"Forgiving","upgrades.forgiving.tooltip":"Missing breaks reduces combo progressively instead of all at once.","upgrades.forgiving.verbose_description":"The first miss per level is free, then 10% of the combo, then 20% .. ","upgrades.fountain_toss.name":"Fountain toss","upgrades.fountain_toss.tooltip":"Gain some combo when you miss some coins. ","upgrades.fountain_toss.verbose_description":"When you miss a coin and your combo was under {{max}}, your combo has a probability of {{lvl}}/combo to grow by one.","upgrades.ghost_coins.name":"Ghost coins","upgrades.ghost_coins.tooltip":"Coins slowly pass through bricks","upgrades.ghost_coins.verbose_description":"It\'s not a bug, it\'s a feature !  Coins fly through bricks slowly. Higher levels let them move faster. ","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Gravity reversed left and right of paddle","upgrades.helium.verbose_description":"This affects the coins  and will let the float up until you are ready to pick them up.","upgrades.hot_start.name":"Hot start","upgrades.hot_start.tooltip":"Start at combo {{start}}, -{{loss}} combo per second","upgrades.hot_start.verbose_description":"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one. The effect stacks with other perks. ","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Explosions suck coins in instead of blowing them out","upgrades.implosions.verbose_description":"The explosion force is applied the other way. Further levels act as \\"bigger explosion\\"","upgrades.instant_upgrade.name":"Instant upgrade","upgrades.instant_upgrade.tooltip":"+1 upgrade now, -1 choice until game end.","upgrades.instant_upgrade.verbose_description":"Immediately pick two upgrades, so that you get one free one and one to repay the one used to get this perk. Every further menu to pick upgrades will have fewer options to choose from.","upgrades.left_is_lava.name":"Avoid left side","upgrades.left_is_lava.tooltip":"+{{lvl}} combo per brick broken. Combo resets if ball hits the left side of the screen","upgrades.left_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n","upgrades.limitless.name":"Limitless","upgrades.limitless.tooltip":"Raise all upgrade\'s maximum level by {{lvl}} ","upgrades.limitless.verbose_description":"Choosing this perk also raises his own limit by one, letting you pick it again.","upgrades.metamorphosis.name":"Metamorphosis","upgrades.metamorphosis.tooltip":"Each coin can stain {{lvl}} brick(s) with its color","upgrades.metamorphosis.verbose_description":"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. \\n\\nCoins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\"paint\\".","upgrades.minefield.name":"Minefield","upgrades.minefield.tooltip":"+{{lvl}} combo per bomb brick on screen","upgrades.minefield.verbose_description":"Adds +lvl to the combo when a brick is place, -lvl when it is destroyed, and raises the base combo by the number of bricks times lvl","upgrades.multiball.name":"Multi ball","upgrades.multiball.tooltip":"Start every levels with {{count}} balls.","upgrades.multiball.verbose_description":"As soon as you drop the ball in Breakout 71, you lose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.","upgrades.nbricks.name":"Strict sample size","upgrades.nbricks.tooltip":"Hit exactly {{lvl}} bricks per paddle bounce for +{{lvl}} combo, otherwise it resets","upgrades.nbricks.verbose_description":"You don\'t necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don\'t count","upgrades.one_more_choice.name":"Extra choice","upgrades.one_more_choice.tooltip":"Further level ups will offer {{lvl}} more option(s) in the list","upgrades.one_more_choice.verbose_description":"Every upgrade menu will have one more option.  Doesn\'t increase the number of upgrades you can pick.","upgrades.passive_income.name":"Passive income","upgrades.passive_income.tooltip":"+{{lvl}} combo / brick, unless the paddle moved in the last {{time}}s, then it resets instead","upgrades.passive_income.verbose_description":"Some perks can help the balls do what you want without needing to do anything.","upgrades.picky_eater.name":"Picky eater","upgrades.picky_eater.tooltip":"+{{lvl}} combo per brick broken, resets on ball color change","upgrades.picky_eater.verbose_description":"Whenever you break a brick the same color as your ball, your combo increases by one. \\nIf it\'s a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball\'s color. \\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red border. \\nIf you have more than one ball, they all switch color whenever one of them hits a brick.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Ball pierces {{count}} bricks after a paddle bounce","upgrades.pierce.verbose_description":"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\n\\nAfter that, it will bounce on the 4th brick, and you\'ll need to touch the paddle to reset the counter.","upgrades.pierce_color.name":"Color pierce","upgrades.pierce_color.tooltip":"+{{lvl}} damage to bricks of the ball\'s color","upgrades.pierce_color.verbose_description":"Whenever a ball hits a brick of the same color, it will just go through unimpeded. \\n\\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\n\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.","upgrades.puck_repulse_ball.help_plural":"Stronger repulsion force","upgrades.puck_repulse_ball.name":"Soft landing","upgrades.puck_repulse_ball.tooltip":"Paddle repulses balls","upgrades.puck_repulse_ball.verbose_description":"When a ball gets close to the paddle, it will start slowing down, and even potentially bouncing without touching the paddle.","upgrades.reach.name":"Top down","upgrades.reach.tooltip":" Touching the N bricks of the lowest row resets the combo. Otherwise, +N combo","upgrades.reach.verbose_description":"If there is only one row of bricks, or if the lowest row of bricks cover the whole width of the game,  then this perk does nothing. Otherwise, breaking this lowest row resets the combo, while breaking anything else increases the combo by the number of bricks present on that lowest row. \\n\\nThe lowest row will be highlighted in red. ","upgrades.respawn.name":"Re-spawn","upgrades.respawn.tooltip":"{{percent}}% of bricks re-spawn after {{delay}}s.","upgrades.respawn.verbose_description":"Some particle effect will let you know where bricks will appear. ","upgrades.right_is_lava.name":"Avoid right side","upgrades.right_is_lava.tooltip":"+{{lvl}} combo per brick. Combo resets if ball hits the left side of the screen","upgrades.right_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n","upgrades.sacrifice.help_l1":"Loosing a life clears all bricks","upgrades.sacrifice.help_over":"Loosing a life {{lvl}}x the combo then clears all bricks","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.verbose_description":"This might get the combo pretty high.","upgrades.sapper.help_plural":"The first {{lvl}} bricks broken become bombs.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"The first brick broken becomes a bomb.","upgrades.sapper.verbose_description":"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the paddle re-arms the effect. Leveling-up this perk will allow you to place more bombs.","upgrades.shocks.name":"Shocks","upgrades.shocks.tooltip":"Explosive balls collisions","upgrades.shocks.verbose_description":"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separate them. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Keep {{percent}}% of your combo between levels","upgrades.shunt.verbose_description":"If you also have hot start, the hot start is just added to the current combo","upgrades.side_flip.name":"Right handed","upgrades.side_flip.tooltip":"+{{lvl}} combo per brick broken from the right, -{{loss}} otherwise","upgrades.side_flip.verbose_description":"Impact the brick on its right side to gain one combo, but avoid hitting it on the left side as the would remove 2 combo. Hitting from the top and bottom has no effect. ","upgrades.side_kick.name":"Left handed","upgrades.side_kick.tooltip":"+{{lvl}} combo per brick broken from the left, -{{loss}} otherwise","upgrades.side_kick.verbose_description":"Impact the brick on its left side to gain one combo, but avoid hitting it on the right side as the would remove 2 combo. Hitting from the top and bottom has no effect. ","upgrades.skip_last.help_plural":"The last {{lvl}}  bricks will explode.","upgrades.skip_last.name":"Easy Cleanup","upgrades.skip_last.tooltip":"The last brick will explode.","upgrades.skip_last.verbose_description":"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\n\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help.","upgrades.slow_down.name":"Slower ball","upgrades.slow_down.tooltip":"Ball moves more slowly","upgrades.slow_down.verbose_description":"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.","upgrades.smaller_puck.help_plural":"Even smaller paddle and higher base combo","upgrades.smaller_puck.name":"Smaller paddle","upgrades.smaller_puck.tooltip":"Also gives +5 base combo","upgrades.smaller_puck.verbose_description":"This makes the paddle smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat\'s why you also get a nice bonus of +5 coins per brick for all bricks you\'ll break after picking this. ","upgrades.soft_reset.name":"Soft reset","upgrades.soft_reset.tooltip":"Combo resets keeps {{percent}}%","upgrades.soft_reset.verbose_description":"Limit the impact of a combo reset.","upgrades.streak_shots.name":"Hit streak","upgrades.streak_shots.tooltip":"More coins if you break many bricks before bouncing on the paddle.","upgrades.streak_shots.verbose_description":"Every time you break a brick, your combo increases by one. \\n\\nHowever, as soon as the ball touches your paddle, the combo is reset to its default value.\\n\\nOnce your combo rises above the base value, your paddle will have a red border to remind you that it will destroy your combo to touch it with the ball.","upgrades.sturdy_bricks.name":"Sturdy bricks","upgrades.sturdy_bricks.tooltip":"+{{lvl}} bricks HP, +{{percent}}% coins spawned when broken","upgrades.sturdy_bricks.verbose_description":"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\"clairvoyant\\" perk. You can increase ball damage by getting the \\"piercing\\" perk. Each level of the perk adds +50% coins spawn. ","upgrades.telekinesis.help_plural":"Stronger effect on the ball","upgrades.telekinesis.name":"Telekinesis","upgrades.telekinesis.tooltip":"Paddle controls the ball\'s trajectory","upgrades.telekinesis.verbose_description":"You control the ball while it\'s going up. ","upgrades.top_is_lava.name":"Sky is the limit","upgrades.top_is_lava.tooltip":"+{{lvl}} combo per brick, reset when the top is hit","upgrades.top_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. ","upgrades.trampoline.name":"Trampoline","upgrades.trampoline.tooltip":"+{{lvl}} combo per paddle bounce,-{{lvl}} combo per bounce on any border","upgrades.trampoline.verbose_description":"One of the rare  combo upgrades that don\'t add a reset condition","upgrades.unbounded.help_no_ceiling":"+{{lvl}} combo per brick, no more sides  or ceiling","upgrades.unbounded.name":"Unbounded","upgrades.unbounded.tooltip":"+{{lvl}} combo per brick, no more sides to keep the ball in game, danger","upgrades.unbounded.verbose_description":"I hope you\'ve found a way to keep your ball on screen. Penalties for hitting the sides no longer apply. At level 2+, the ceiling will also disappear. This is an advanced perk. ","upgrades.viscosity.name":"Viscosity","upgrades.viscosity.tooltip":"Slower coin fall","upgrades.viscosity.verbose_description":"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin\'s movement.","upgrades.wind.help_plural":"Stronger wind force","upgrades.wind.name":"Wind","upgrades.wind.tooltip":"Paddle position creates wind","upgrades.wind.verbose_description":"Wind depends on paddle position: left blows left, right blows right. Affects both balls and coins.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"Ball falls toward paddle","upgrades.yoyo.verbose_description":"It\'s the opposite of telekinesis, control the ball while it\'s falling back down.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"+{{lvl}} combo per bricks, reset when there\'s an explosion","upgrades.zen.verbose_description":"After all, this is a non-violent game. "}');var R={};R=JSON.parse('{"confirmRestart.no":"Cancelar","confirmRestart.text":"Estás a punto de empezar un nuevo partido: ¿es esto realmente lo que querías?","confirmRestart.title":"¿Empezar una nueva partida?","confirmRestart.yes":"Empezar una nueva partida","gameOver.creative":"Esta parte de la prueba no se grabará.","gameOver.cumulative_total":"Su puntuación total acumulada ha pasado de {{startTs}} a {{endTs}}.","gameOver.lost.summary":"Se te ha caído la bola después de coger {{score}} monedas.","gameOver.lost.title":"Pelota perdida","gameOver.stats.balls_lost":"Balas perdidas","gameOver.stats.bricks_broken":"Ladrillos rotos","gameOver.stats.bricks_per_minute":"Ladrillos rotos por minuto","gameOver.stats.catch_rate":"Monedas atrapadas","gameOver.stats.combo_avg":"Combo medio","gameOver.stats.combo_max":"Combinación máxima","gameOver.stats.duration_per_level":"Duración por nivel","gameOver.stats.hit_rate":"Precisión","gameOver.stats.intro":"A continuación se muestran las estadísticas de este juego en comparación con sus {{count}} mejores juegos.","gameOver.stats.level_reached":"Nivel alcanzado","gameOver.stats.total_score":"Puntuación total","gameOver.stats.upgrades_applied":"Mejoras aplicadas","gameOver.un  aparecen siempre en el color del ladrillo","main_menu.comboIncreaseTexts":"Mostrar una +X dorada","main_menu.comboIncreaseTexts_help":"Cuando el combo aumenta","main_menu.contrast":"Alto contraste","main_menu.contrast_help":"Más contraste y color","main_menu.credit_levels":"Niveles","main_menu.donate":"Has jugado {{hours}} horas","main_menu.donate_help":"¿Podrías donar unos euros? Puedes ocultar este recordatorio en los ajustes.","main_menu.donation_reminder":"Recuerde dar","main_menu.donation_reminder_help":"Mostrar el tiempo de juego y un enlace para donar en el menú principal","main_menu.download_save_file":"Guardar mis progresos","main_menu.download_save_file_help":"Obtener un archivo de copia de seguridad","main_menu.extra_bright":"Más luz","main_menu.extra_bright_help":"Mayor halo de luz alrededor de ladrillos y piezas.","main_menu.fullscreen":"Pantalla completa","main_menu.fullscreen_help":"El juego intentará cambiar a pantalla completa cuando lo inicies.","main_menu.help_content":"## Objetivo\\n\\nAtrapa tantas monedas como puedas a lo largo de los 7 niveles.\\nLas monedas aparecen cuando rompes ladrillos.\\nAtrápalas con tu disco para aumentar tu puntuación.\\nTu puntuación aparece en la parte superior derecha de la pantalla.\\nNo dejes caer la bola o se acaba el juego.\\n\\nCuando hayas roto todos los ladrillos, podrás elegir una mejora.\\n\\n## Mejoras\\n\\nLas mejoras que elijas serán válidas hasta el final del juego.\\nAlgunas pueden seleccionarse varias veces para conseguir un efecto más potente.\\nOtras ayudan a apuntar o simplifican el juego.\\nAlgunas sólo son útiles cuando se combinan.\\n\\nSiempre obtienes una mejora al principio de cada partida.\\nSu icono forma los ladrillos del primer nivel.\\nPuedes seleccionar las mejoras iniciales en los ajustes.\\n\\nMuchas mejoras influyen en tu combo.\\n\\n## Combo\\n\\nTu \'combo\' es el número de monedas generadas cuando se rompe un ladrillo.\\nSe muestra en tu disco. Por ejemplo, x4 significa que cada ladrillo genera 4 monedas.\\n\\nLa mayoría de las mejoras que aumentan el combo también añaden una condición para restablecerlo.\\nEl combo también se reinicia si la pelota vuelve a la raqueta sin golpear un ladrillo.\\nEntonces se muestra un mensaje de \\"Fallado\\".\\n\\nIntenta golpear un ladrillo en cada rebote.\\n\\n## Apuntar\\n\\nSólo la posición de la pelota en la raqueta determina su ángulo de rebote.\\nSi la pelota golpea la raqueta en el centro, rebotará verticalmente.\\nSi golpea hacia un lado de la raqueta, el ángulo será mayor.\\nLa velocidad de la raqueta y el ángulo de incidencia de la pelota no tienen ningún efecto.\\n\\nSe pueden desbloquear varias mejoras de puntería.\\n\\n## Desbloqueo\\n\\nCuando juegas a Breakout 71 por primera vez, la mayoría de las mejoras y niveles están bloqueados.\\nLas mejoras se desbloquean simplemente jugando y cogiendo muchas monedas.\\nLos primeros niveles se desbloquean consiguiendo una puntuación alta.\\nLos niveles posteriores añaden una condición a las ventajas seleccionadas.\\n\\nConseguir puntuaciones altas es mucho más fácil cuando obtienes varias mejoras después de cada nivel.\\n\\n## Reintentos y mejoras gratis\\n\\nConseguirás una mejora extra si juegas bien:\\n\\n- Completa el nivel en menos de {{levelTimeGood}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedGood}} veces\\n- Atrapa el {{catchRateGood}}% de las monedas\\n- Pierde los ladrillos menos de {{missesGood}} veces\\n\\nTambién obtendrás un potenciador que te permitirá ignorar las mejoras si lo haces aún mejor:\\n\\n- Completa un nivel en menos de {{levelTimeBest}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedBest}} veces\\n- Atrapa {{catchRateBest}} de monedas\\n- Pierde ladrillos menos de {{missesBest}} veces\\n\\nUna opción en los ajustes te permite mostrar estas estadísticas","main_menu.help_help":"Descubra el juego en detalle","main_menu.help_title":"Ayuda","main_menu.help_upgrades":"## Mejoras"
