el":"New level","editor.title":"Level Editor","gameOver.creative":"This run will not be recorded. ","gameOver.cumulative_total":"Your total cumulative score went from {{startTs}} to {{endTs}}.","gameOver.lost.summary":"You dropped the ball after catching {{score}} coins.","gameOver.lost.title":"Game Over","gameOver.stats.balls_lost":"Balls lost","gameOver.stats.bricks_broken":"Bricks broken","gameOver.stats.bricks_per_minute":"Bricks broken per minute","gameOver.stats.catch_rate":"Catch rate","gameOver.stats.combo_avg":"Average combo","gameOver.stats.combo_max":"Max combo","gameOver.stats.duration_per_level":"Duration per level","gameOver.stats.hit_rate":"Hit rate","gameOver.stats.intro":"","gameOver.stats.level_reached":"Level reached","gameOver.stats.total_score":"Total score","gameOver.stats.upgrades_applied":"Upgrades applied","gameOver.stats_intro":"Find below your game statistics compared to  your {{count}} best games.","gameOver.unlocked_perk":"Upgrade unlocked","gameOver.unlocked_perk_plural":"You just unlocked {{count}} perks","gameOver.win.summary":"This game is over. You stashed {{score}} coins. ","gameOver.win.title":"You completed this game","help.content":"## Goal\\n\\nCatch as many coins as possible during 7 levels. \\nCoins appear when you break bricks.\\nCatch them with your paddle to increase your score.\\nYour score is displayed in the top right corner of the screen.\\nDon\'t drop the ball or it\'s game over.\\n\\nAfter destroying all bricks, you\'ll get to pick an upgrade.\\n\\n## Upgrades \\n\\nThe upgrades you pick will apply until the end of the run. \\nSome can be picked multiple times for stronger effect.\\nSome help with aiming, or make the game easier in some other ways. \\nSome are only useful when combined.\\n\\nYou always get one upgrade at the beginning of each game. \\nIts icon will serve as the bricks of the first level. \\nYou can select starting upgrades in the settings.\\n\\nMany upgrades impact your combo. \\n\\n## Combo\\n\\nYour \\"combo\\" is the number of coins spawned when a brick breaks. \\nIt is displayed on your paddle, for example x4 means each brick will spawn 4 coins. \\nMost upgrades that increase the combo also add a condition to reset it. \\nThe combo will also reset if the ball returns to the paddle without hitting any brick.\\nA \\"miss\\" message will be shown when that happens. \\n\\nTry to aim towards a brick every time. \\n\\n## Aiming\\n\\nOnly the ball position on the paddle decides how it will bounce.\\nIf the ball hits the paddle dead center, it will bounce back up vertically. \\nIf you hit more on one side, it will have more angle. \\nThe paddle speed and incoming angle have no impact on the ball direction after bouncing.\\n\\nMany upgrades that help with aiming can be unlocked.\\n\\n## Unlocks\\n\\nWhen playing Breakout 71 for the first time, most upgrades and levels are locked. \\nUpgrades are unlocked by simply playing and catching many coins. \\nThe first levels are unlocked by reaching a high score.\\nLater levels add a condition about which perks you can select. \\n\\nReach high scores is much easier when you get multiple upgrades after each level. \\n\\n## Re-rolls and free upgrades\\n\\nYou\'ll get an extra upgrade to pick when you play well : \\n\\n- Clear the level under {{levelTimeGood}} seconds\\n- Hit the sides or top less than {{wallBouncedGood}} times\\n- Catch {{catchRateGood}}% of coins\\n- Miss the bricks less than {{missesGood}} times \\n\\nYou will also get a re-roll that lets you skip upgrades if you do even better :  \\n\\n-  Clear a level under {{levelTimeBest}} seconds\\n- Hit the sides or top less than {{wallBouncedBest}} times\\n- Catch {{catchRateBest}}% of coins\\n- Miss the bricks less than {{missesBest}} times \\n\\nAn option in the settings lets you display those statistics","help.help":"Learn more about the game","help.levels":"Levels","help.title":"Help","help.upgrades":"## Upgrades","history.columns.score":"Score","history.columns.s e limits of your device.","starting_perks.checked":"When you start a new game, one of those perks will be given to you. Click a perk to exclude it. ","starting_perks.help":"Choose possible starting upgrades","starting_perks.random":"All benefits have been removed, the choice will be random.","starting_perks.title":"Starting perks","starting_perks.unchecked":"The perks below are not offered as starting perks, but you can click to add them to the pool. ","unlocks.category.advanced":"## Advanced upgrades\\n\\nThose are typically not very useful by themselves, but will can become very powerful when combined with the right combo upgrade. ","unlocks.category.beginner":"## Beginner friendly upgrades\\n\\nThose upgrades are very helpful for beginners, they help you play longer and miss the ball less.\\n","unlocks.category.combo":"## Combo upgrades\\n\\nThose upgrades help increase your combo progressively, but also add a combo reset condition. Taking one is a good idea, taking more increases the risk and reward.","unlocks.category.combo_boost":"## Combo booster upgrades\\n\\nThose upgrades increase the combo or combo multiplier without adding a reset condition. ","unlocks.category.simple":"## Helper upgrades\\n\\nThose upgrades are useful in almost any build.\\n","unlocks.greyed_out_help":"The grayed out upgrades can be unlocked by increasing your total score. The total score increases every time you score in game.","unlocks.intro":"Your total score is {{ts}}. Click an upgrade below to start a game with it.","unlocks.just_unlocked":"Level unlocked","unlocks.just_unlocked_plural":"You just unlocked {{count}} levels","unlocks.level":"You unlocked {{unlocked}} levels out of {{out_of}}","unlocks.level_description":"A {{size}}x{{size}} level with {{bricks}} bricks, {{colors}} colors and {{bombs}} bombs.","unlocks.levels":"Unlocked levels","unlocks.minScore":"Reach ${{minScore}} in a run to unlock.","unlocks.minScoreWithPerks":"Reach ${{minScore}} in a run with {{required}} but without {{forbidden}} to unlock.","unlocks.minTotalScore":"Accumulate a total of ${{score}}","unlocks.reached":"Your best score was {{reached}}.","unlocks.title_upgrades":"{{unlocked}} /  {{out_of}} upgrades unlocked","unlocks.upgrades":"Unlocked upgrades","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"More coins if you break bricks without pause","upgrades.addiction.verbose_description":"+{{lvl}} combo / brick broken, combo resets {{delay}}s after breaking a brick.  The countdown only starts after breaking the first brick of each level. It stops as soon as all bricks are destroyed.","upgrades.asceticism.name":"Asceticism","upgrades.asceticism.tooltip":"More coins if you don\'t catch them immediately","upgrades.asceticism.verbose_description":"You\'ll need to store the coins somewhere while your combo climbs. ","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attract_ball.tooltip":"Balls attract balls","upgrades.ball_attract_ball.verbose_description":"Balls that are more than \\"3/4 of the game area width\\" away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.","upgrades.ball_attracts_coins.name":"Balls attract coins","upgrades.ball_attracts_coins.tooltip":"Coins follow the nearest ball ","upgrades.ball_attracts_coins.verbose_description":"This could be used to \\"paint around\\" the balls with coins if you combined it with \\"stain\\" and \\"ghost coins\\". It also works as a substitute for coin magnet. ","upgrades.ball_repulse_ball.name":"Personal space","upgrades.ball_repulse_ball.tooltip":"Balls repulse balls","upgrades.ball_repulse_ball.verbose_description":"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.","upgrades.base_combo.name":"Strong foundations","upgrades.base_combo.tooltip":"3 more coins per brick broken","upgrades.base_combo.verbose_description":"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you\'ll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Bigger explosions","upgrades.bigger_explosions.verbose_description":"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)","upgrades.bigger_puck.name":"Bigger paddle","upgrades.bigger_puck.tooltip":"Easily catch more coins","upgrades.bigger_puck.verbose_description":"A bigger paddle makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball\'s angle only depends on where it hits the paddle). ","upgrades.bricks_attract_ball.name":"Bricks attract balls","upgrades.bricks_attract_ball.tooltip":"Ball goes toward nearby bricks","upgrades.bricks_attract_ball.verbose_description":"Ball goes toward the first {{count}} bricks it will hit. The effect is stronger at higher levels. The number of bricks that can hit before the effect stops is also higher. The effect rearms when the ball hits the puck.","upgrades.bricks_attract_coins.name":"Bricks attract coins","upgrades.bricks_attract_coins.tooltip":"Helps them stay up there","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Buoy","upgrades.buoy.tooltip":"Coins float for {{duration}} seconds on the bottom line. ","upgrades.buoy.verbose_description":"Effect is most visible in mobile mode","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"See upcoming levels, bricks HP and ball direction","upgrades.clairvoyant.verbose_description":"Helps you pick the right upgrades and understand what\'s going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)","upgrades.coin_magnet.name":"Coins magnet","upgrades.coin_magnet.tooltip":"Paddle attracts coins","upgrades.coin_magnet.verbose_description":"Directs the coins to the paddle. The effect is stronger if the coin is close to it already.","upgrades.compound_interest.name":"Compound interest","upgrades.compound_interest.tooltip":"More coins if you catch all coins","upgrades.compound_interest.verbose_description":"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\nBe sure however to catch every one of those coins with your paddle, as any lost coin will reset your combo.\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.","upgrades.concave_puck.name":"Concave paddle","upgrades.concave_puck.tooltip":"Improves vertical aiming precision","upgrades.concave_puck.verbose_description":"Balls starts the level going straight up, and bounces with less angle.","upgrades.corner_shot.name":"Corner shot","upgrades.corner_shot.tooltip":"Lets your paddle overlap with the borders of the screen","upgrades.corner_shot.verbose_description":"Helps with aiming in the corners. Further levels let you go further out. ","upgrades.double_or_nothing.name":"Double or nothing","upgrades.double_or_nothing.tooltip":"Combo climbs {{multiplier}} times faster, but you\'ll loose {{percent}}% of your score at each reset.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"Coins, in Space","upgrades.etherealcoins.tooltip":"Coins are no  longer affected by gravity","upgrades.etherealcoins.verbose_description":"The coins will maintain their speed even after several bounces, and will no longer be affected by gravity.","upgrades.extra_levels.name":"5 min more","upgrades.extra_levels.tooltip":"Play {{count}} levels instead of 7","upgrades.extra_levels.verbose_description":"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.","upgrades.extra_life.name":"Extra Life","upgrades.extra_life.tooltip":"Saves your ball once","upgrades.extra_life.verbose_description":"Normally, you have one ball, and the game is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou\'ll lose one level of that perk every time a ball bounces at the bottom of the screen.\\n\\nIf you have multiple balls, only the last one will be saved by the extra life. ","upgrades.forgiving.name":"Forgiving","upgrades.forgiving.tooltip":"Keep most of your combo when missing","upgrades.forgiving.verbose_description":"The first miss per level is free, then 10% of the combo, then 20% .. ","upgrades.fountain_toss.name":"Fountain toss","upgrades.fountain_toss.tooltip":"Gain combo when you miss coins. ","upgrades.fountain_toss.verbose_description":"When you miss a coin and your combo was under level*30, your combo has a probability of level/combo to grow by one.","upgrades.ghost_coins.name":"Ghost coins","upgrades.ghost_coins.tooltip":"Coins slowly pass through bricks","upgrades.ghost_coins.verbose_description":"It\'s not a bug, it\'s a feature !  Coins fly through bricks slowly. Higher levels let them move faster. ","upgrades.golden_goose.name":"Golden goose","upgrades.golden_goose.tooltip":"Coins teleport to the ball after hitting a brick","upgrades.golden_goose.verbose_description":"Whenever a coin hits a brick, teleport that coin to the nearest ball. At level two, coins teleport after hitting a side too.","upgrades.happy_family.name":"Happy family","upgrades.happy_family.tooltip":"More coins if you keep all balls in game. ","upgrades.happy_family.verbose_description":"+1 combo per extra ball per paddle bounce. Combo resets when a ball is lost.  Only the ball above 1 give combo.","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Gravity limited left and right of paddle","upgrades.helium.verbose_description":"At level 1, gravity is reduced. At level 2, coins slowly float up. At level 3 they really fly.","upgrades.hot_start.name":"Hot start","upgrades.hot_start.tooltip":"More coins if you clear the level under 30s","upgrades.hot_start.verbose_description":"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one. The effect stacks with other perks. ","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Explosions suck coins in instead of blowing them out","upgrades.implosions.verbose_description":"The explosion force is applied the other way. Further levels act as \\"bigger explosion\\"","upgrades.left_is_lava.name":"Avoid left side","upgrades.left_is_lava.tooltip":"More coins if you don\'t touch the left side","upgrades.left_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n\\nAt level 2, the border is completely removed and your balls and coins might get lost. ","upgrades.limitless.name":"Limitless","upgrades.limitless.tooltip":"Raise all upgrade\'s maximum level by {{lvl}} ","upgrades.limitless.verbose_description":"Choosing this perk also raises his own limit by one, letting you pick it again.","upgrades.metamorphosis.name":"Metamorphosis","upgrades.metamorphosis.tooltip":"Each coin can stain {{lvl}} brick(s) with its color","upgrades.metamorphosis.verbose_description":"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. Coins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\"paint\\". At level 1, each coin can color 1 bricks before it is \\"spent\\" and appears hollow. ","upgrades.minefield.name":"Minefield","upgrades.minefield.tooltip":"+{{percent}}% coins per bomb brick on screen","upgrades.minefield.verbose_description":"Bombs are counted while they are exploding too. ","upgrades.multiball.name":"Multi ball","upgrades.multiball.tooltip":"Start every levels with {{count}} balls.","upgrades.multiball.verbose_description":"As soon as you drop the ball in Breakout 71, you lose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.","upgrades.nbricks.name":"Strict sample size","upgrades.nbricks.tooltip":"More coins if you hit bricks one by one.","upgrades.nbricks.verbose_description":"Hit exactly {{lvl}} bricks per paddle bounce for +{{lvl}} combo, otherwise it resets. You don\'t necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don\'t count","upgrades.one_more_choice.name":"Extra choice","upgrades.one_more_choice.tooltip":"More upgrade choices","upgrades.one_more_choice.verbose_description":"Every upgrade menu will have one more option.  Doesn\'t increase the number of upgrades you can pick.","upgrades.ottawa_treaty.name":"Ottawa treaty","upgrades.ottawa_treaty.tooltip":"Breaking a brick near a bomb disarms it","upgrades.ottawa_treaty.verbose_description":"The nearby bomb will be replaced by a colored block. If you have sapper, the ball will loose its sapper effect until next bounce. Only one bomb can be replaced at a time.","upgrades.passive_income.name":"Passive income","upgrades.passive_income.tooltip":"More coins but a moving paddle doesn\'t catch balls or coins","upgrades.passive_income.verbose_description":"+{{lvl}} combo / brick broken, paddle is immaterial {{time}}s after moving. Some perks can help the balls do what you want without needing to do anything.","upgrades.picky_eater.name":"Picky eater","upgrades.picky_eater.tooltip":"More coins if you break bricks color by color","upgrades.picky_eater.verbose_description":"Whenever you break a brick the same color as your ball, your combo increases by one. \\nIf it\'s a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball\'s color. \\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red border. \\nIf you have more than one ball, they all switch color whenever one of them hits a brick.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Ball pierces {{count}} bricks after a paddle bounce","upgrades.pierce.verbose_description":"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\n\\nAfter that, it will bounce on the 4th brick, and you\'ll need to touch the paddle to reset the counter.","upgrades.pierce_color.name":"Color pierce","upgrades.pierce_color.tooltip":"The ball goes through bricks of the same color","upgrades.pierce_color.verbose_description":"Normally, balls do 1 damage and bricks have 1 health point (HP). S\\nEach level of this perk increase the damage balls do to bricks of their color. \\nWhen a ball does more damage than the brick\'s health points, it will continue straight instead of bouncing;\\n\\nWhenever a ball hits a brick of the same color, it will just go through unimpeded. \\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.","upgrades.puck_repulse_ball.name":"Soft landing","upgrades.puck_repulse_ball.tooltip":"Paddle repulses balls","upgrades.puck_repulse_ball.verbose_description":"When a ball gets close to the paddle, it will start slowing down, and even potentially bouncing without touching the paddle.","upgrades.rainbow.name":"Rainbow","upgrades.rainbow.tooltip":"Coins spawn with rainbow color.","upgrades.rainbow.verbose_description":"Each level increases the proportion of colored coins. The color depends on level time. ","upgrades.reach.name":"Top down","upgrades.reach.tooltip":"More coins if you avoid the lowest row of bricks","upgrades.reach.verbose_description":" Touching the N bricks of the lowest row resets the combo. Otherwise, +N combo.\\n\\nIf there is only one row of bricks, or if the lowest row of bricks cover the whole width of the game,  then this perk does nothing. Otherwise, breaking this lowest row resets the combo, while breaking anything else increases the combo by the number of bricks present on that lowest row. \\n\\nThe lowest row will be highlighted in red. ","upgrades.respawn.name":"Re-spawn","upgrades.respawn.tooltip":"{{percent}}% of bricks re-spawn after {{delay}}s.","upgrades.respawn.verbose_description":"Some particle effect will let you know where bricks will appear. ","upgrades.right_is_lava.name":"Avoid right side","upgrades.right_is_lava.tooltip":"More coins if you don\'t touch the right side","upgrades.right_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break. \\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n\\nAt level 2, the border is completely removed and your balls and coins might get lost. \\n","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.tooltip":"Loosing a life clears all bricks","upgrades.sacrifice.verbose_description":"At level 2+, the combo is also multiplied by the perk\'s level before clearing the board. This might get the combo pretty high.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"The first brick broken becomes a bomb.","upgrades.sapper.verbose_description":"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the paddle re-arms the effect. Leveling-up this perk will allow you to place more bombs.","upgrades.shocks.name":"Shocks","upgrades.shocks.tooltip":"Explosive balls collisions","upgrades.shocks.verbose_description":"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separate them. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Keep {{percent}}% of your combo between levels","upgrades.shunt.verbose_description":"If you also have hot start, the hot start is just added to the current combo","upgrades.side_flip.name":"Right handed","upgrades.side_flip.tooltip":"More coins if you hit bricks from the right only","upgrades.side_flip.verbose_description":"+{{lvl}} combo per brick broken from the right, -{{loss}} otherwise. Impact the brick on its right side to gain one combo, but avoid hitting it on the left side as the would remove 2 combo. Hitting from the top and bottom has no effect. ","upgrades.side_kick.name":"Left handed","upgrades.side_kick.tooltip":"More coins if you hit bricks from the left only","upgrades.side_kick.verbose_description":"+{{lvl}} combo per brick broken from the left, -{{loss}} otherwise. Impact the brick on its left side to gain one combo, but avoid hitting it on the right side as the would remove 2 combo. Hitting from the top and bottom has no effect. ","upgrades.skip_last.name":"Easy Cleanup","upgrades.skip_last.tooltip":"The last brick will self destruct","upgrades.skip_last.verbose_description":"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\nEach level of this perk increases the number of bricks that will self destruct.\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help. ","upgrades.slow_down.name":"Slower ball","upgrades.slow_down.tooltip":"Ball moves more slowly","upgrades.slow_down.verbose_description":"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.","upgrades.smaller_puck.name":"Smaller paddle","upgrades.smaller_puck.tooltip":"{{percent}}% more coins","upgrades.smaller_puck.verbose_description":"This makes the paddle smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat\'s why you also get a nice bonus of +50% coins spawn.","upgrades.soft_reset.name":"Soft reset","upgrades.soft_reset.tooltip":"Keep {{percent}}% of your combo when it resets","upgrades.soft_reset.verbose_description":"Limit the impact of a combo reset.","upgrades.sticky_coins.name":"Sticky coins","upgrades.sticky_coins.tooltip":"Coins stick to bricks of the same color","upgrades.sticky_coins.verbose_description":"At level 2, they stick to bricks of any color","upgrades.streak_shots.name":"Hit streak","upgrades.streak_shots.tooltip":"More coins if you break many bricks at once","upgrades.streak_shots.verbose_description":"Every time you break a brick, your combo increases by one. \\n\\nHowever, as soon as the ball touches your paddle, the combo is reset to its default value.\\n\\nOnce your combo rises above the base value, your paddle will have a red border to remind you that it will destroy your combo to touch it with the ball.","upgrades.sturdy_bricks.name":"Sturdy bricks","upgrades.sturdy_bricks.tooltip":"+{{lvl}} bricks HP, +{{percent}}% coins","upgrades.sturdy_bricks.verbose_description":"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\"clairvoyant\\" perk. You can increase ball damage by getting the \\"piercing\\" perk. Each level of the perk adds +50% coins spawn. ","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"Time moves when the paddle moves.","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"Telekinesis","upgrades.telekinesis.tooltip":"The paddle position influences the ball","upgrades.telekinesis.verbose_description":"You control the ball while it\'s going up. The effect is stronger when the ball is in the bottom half of the screen. ","upgrades.three_cushion.name":"Three cushion","upgrades.three_cushion.tooltip":"More coins if you hit bricks only indirectly","upgrades.three_cushion.verbose_description":"+1 combo per hit on sides and top, up to +{{max}} per paddle bounce. \\nEvery hit on a side will raise the combo by one, up to +3.\\n After that,  no combo will be gained until  next paddle bounce. \\n\\nCombo resets when you hit a brick without bouncing first.","upgrades.top_is_lava.name":"Sky is the limit","upgrades.top_is_lava.tooltip":"More coins if you avoid hitting the top","upgrades.top_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. \\n\\nAt level 2, the border is completely removed and your balls and coins might get lost. ","upgrades.trampoline.name":"Trampoline","upgrades.trampoline.tooltip":"More coins if you bounce on bricks and the paddle only","upgrades.trampoline.verbose_description":"+{{lvl}} combo per paddle bounce,-{{lvl}} combo per bounce on any border.  One of the rare  combo upgrades that don\'t add a reset condition","upgrades.transparency.name":"Transparency","upgrades.transparency.tooltip":"+50% coins but the ball is sometimes invisible","upgrades.transparency.verbose_description":"Ball  becomes transparent at the top of the screen.\\n +{{percent}} % coins when all balls are at full transparency. \\nHigher levels make the ball transparent sooner and increase the point bonus.","upgrades.trickledown.name":"Trickle down","upgrades.trickledown.tooltip":"Coins appear at the top of the screen.","upgrades.trickledown.verbose_description":"The coins might sit on top of a brick if there are bricks on the top row, in that case they will fall down after you break that brick. ","upgrades.unbounded.name":"Padding","upgrades.unbounded.tooltip":"Adds space left and right of the level, but your paddle can\'t go that far. ","upgrades.unbounded.verbose_description":"Another upgrade might help you extends the reach of your paddle. ","upgrades.viscosity.name":"Viscosity","upgrades.viscosity.tooltip":"Slower coin fall","upgrades.viscosity.verbose_description":"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin\'s movement.","upgrades.wind.name":"Wind","upgrades.wind.tooltip":"Paddle position creates wind","upgrades.wind.verbose_description":"Wind depends on paddle position: left blows left, right blows right. Affects both balls and coins.","upgrades.wrap_left.name":"Wrap left","upgrades.wrap_left.tooltip":"Hitting the left side teleports the ball to the right side","upgrades.wrap_left.verbose_description":"Higher levels teleport coins too.","upgrades.wrap_right.name":"Wrap right","upgrades.wrap_right.tooltip":"Hitting the right side teleports the ball to the left side","upgrades.wrap_right.verbose_description":"Higher levels teleport coins too.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"The ball falls toward the paddle","upgrades.yoyo.verbose_description":"It\'s the opposite of telekinesis, control the ball while it\'s falling back down.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"More coins if you don\'t trigger bombs","upgrades.zen.verbose_description":"+{{lvl}} combo every 3s, reset when there\'s an explosion"}');var C={};C=JSON.parse('{"confirmRestart.no":"Annuler","confirmRestart.text":"Vous êtes sur le point de commencer une nouvelle partie, est-ce vraiment ce que vous vouliez ?","confirmRestart.title":"Démarrer une nouvelle partie ?","confirmRestart.yes":"Commencer une nouvelle partie","editor.editing.bigger":"Augmenter la taille du niveau","editor.editing.color":"Choisissez une couleur dans la liste des couleurs (max 5 par niveau)","editor.editing.copied":"","editor.editing.copy":"Copier le code du niveau","editor.editing.copy_help":"Collez-le dans le canal #levels de notre discord","editor.editing.credit":"Crédits et source","editor.editing.credit_prompt":"Entrez l\'url source ou l\'explication de votre niveau.","editor.editing.delete":"Supprimer le niveau","editor.editing.down":"Déplacez toutes les briques vers le bas","editor.editing.help":"Cliquez ensuite sur une tuile pour la colorier.","editor.editing.left":"Déplacer toutes les briques vers la gauche","editor.editing.play":"Jouez à ce niveau","editor.editing.rename":"Nom du niveau","editor.editing.rename_prompt":"Veuillez saisir un nouveau nom pour le niveau","editor.editing.right":"Déplacer toutes les briques vers la droite","editor.editing.show_code":"","editor.editing.show_code_help":"","editor.editing.smaller":"Diminuer la taille du niveau","editor.editing.tit alle, sinon la partie est terminée.\\n\\nAprès avoir détruit toutes les briques, vous pourrez choisir une amélioration.\\n\\n## Améliorations\\n\\nLes améliorations que vous choisissez seront valables jusqu\'à la fin de la partie.\\nCertaines peuvent être sélectionnées plusieurs fois pour un effet plus puissant.\\nD\'autres aident à viser ou simplifient le jeu.\\nCertaines ne sont utiles que lorsqu\'elles sont combinées.\\n\\nVous obtenez toujours une amélioration au début de chaque partie.\\nSon icône forme les briques du premier niveau.\\nVous pouvez sélectionner les améliorations de départ dans les paramètres.\\n\\nDe nombreuses améliorations influencent votre combo.\\n\\n## Combo\\n\\nVotre « combo » correspond au nombre de pièces générées lorsqu\'une brique se casse.\\nIl est affiché sur votre palet. Par exemple, x4 signifie que chaque brique rapporte 4 pièces.\\n\\nLa plupart des améliorations qui augmentent le combo ajoutent également une condition pour le réinitialiser.\\nLe combo se réinitialise également si la balle revient sur la raquette sans toucher de brique.\\nUn message « Manqué » s\'affiche alors.\\n\\nEssayez de viser vers un brique à chaque rebond.\\n\\n## Visée\\n\\nSeule la position de la balle sur la raquette détermine son angle de rebond.\\nSi la balle touche la raquette en plein centre, elle rebondira verticalement.\\nSi vous frappez sur le côté de la raquette, l\'angle sera plus grand.\\nLa vitesse de la raquette et l\'angle d\'incidence de la balle n\'ont pas d\'effet.\\n\\nDe nombreuses améliorations facilitant la visée peuvent être débloquées.\\n\\n## Déblocages\\n\\nLorsque vous jouez à Breakout 71 pour la première fois, la plupart des améliorations et des niveaux sont verrouillés.\\nLes améliorations se débloquent simplement en jouant et en attrapant beaucoup de pièces.\\nLes premiers niveaux se débloquent en atteignant un score élevé.\\nLes niveaux suivants ajoutent une condition concernant les avantages sélectionnés.\\n\\nAtteindre des scores élevés est beaucoup plus facile lorsque vous obtenez plusieurs améliorations après chaque niveau.\\n\\n## Relances et améliorations gratuites\\n\\nVous obtiendrez une amélioration supplémentaire si vous jouez bien :\\n\\n- Terminez le niveau en moins de {{levelTimeGood}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedGood}} fois\\n- Attrapez {{catchRateGood}} % de pièces\\n- Manquez les briques moins de {{missesGood}} fois\\n\\nVous bénéficierez également d\'une relance qui vous permettra d\'ignorer les améliorations  si vous faites  encore mieux :\\n\\n- Terminez un niveau en moins de {{levelTimeBest}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedBest}} fois\\n- Attrapez {{catchRateBest}} % de pièces\\n- Manquez les briques moins de {{missesBest}} fois\\n\\nUne option dans les paramètres vous permet d\'afficher ces statistiques ","help.help":"Découvrez le jeu en détail","help.levels":"Niveaux","help.title":"Aide","help.upgrades":"## Améliorations","history.columns.score":"Score","history.columns.started":"Date","history.help":"Liste vos {{count}} meilleurs parties.","history.include_past_versions":"Afficher également les versions antérieures","history.locked":"Jouez d\'abord au moins dix parties","history.title":"Historique","lab.help":"Essayez n\'importe quel combinaison d\'améliorations et de niveaux.","lab.instructions":"Sélectionnez les améliorations et un niveau, puis cliquez sur le bouton \\"jouer\\" ci-dessus","lab.menu_entry":"Mode créatif","lab.play":"Jouer","lab.reset":"Réinitialiser","lab.select_level":"Sélectionnez un niveau sur lequel jouer","lab.unlocks_at":"Déverrouillé à partir d\'un score total de {{score}}","level_up.after_buttons":"Vous venez de terminer le niveau {{level}}/{{max}}.","level_up.before_buttons":"Vous avez attrapé {{score}} pièces {{catchGain}} sur {{levelSpawnedCoins}} en {{time}} secondes {{timeGain}}.\\n\\nVous avez raté les briques {{levelMisses}} fois {{missesGain}} et touché les bor settings.precise_lighting_help":"Utilisez une grille plus petite pour l\'effet de lumière d\'arrière-plan","settings.probabilistic_lighting":"Persistance de la vision","settings.probabilistic_lighting_help":"Améliorez les performances lorsqu\'il y a plus de 150 pièces en réutilisant une partie de la lumière de l\'image précédente","settings.record":"Enregistrer des vidéos de jeu","settings.record_download":"Télécharger la vidéo ({{size}} MB)","settings.record_help":"Obtenez une vidéo de chaque niveau.","settings.red_miss":"Balles ratées","settings.red_miss_help":"Afficher des particules rouges autours des balles qui redescendent sans avoir touché une brique.","settings.reset":"Réinitialiser le jeu","settings.reset_cancel":"Non","settings.reset_confirm":"Oui","settings.reset_help":"Effacer les scores, statistiques et temps de jeu","settings.reset_instruction":"Vous perdrez tous les progrès que vous avez faits dans le jeu, êtes-vous sûr ?","settings.save_file_error":"Erreur lors du chargement du fichier de sauvegarde","settings.save_file_loaded":"Sauvegarde chargée","settings.save_file_loaded_help":"L\'appli va redémarrer","settings.save_file_loaded_ok":"Ok","settings.show_fps":"Compteur de FPS","settings.show_fps_help":"Surveiller la performance du jeu","settings.show_stats":"Statistiques en temps réel","settings.show_stats_help":"Pièces, temps, rebonds, ratés","settings.smooth_lighting":"Éclairage doux","settings.smooth_lighting_help":"Floutez les effets de lumière d\'arrière-plan pour les rendre moins carrés. Augmente le décalage.","settings.sounds":"Sons du jeu","settings.sounds_help":"Bips, bloops et brrrr","settings.stress_test":"Test de stress","settings.stress_test_help":"Démarrez un jeu contrôlé par un bot avec un nombre très élevé de pièces, pour tester les limites de performances de votre appareil.","starting_perks.checked":"Lorsque vous démarrez une nouvelle partie, l\'un de ces avantages vous sera attribué. Cliquez sur un avantage pour l\'exclure.","starting_perks.help":"Choisissez les avantages de départ","starting_perks.random":"Tous les avantages ont été retirés, le choix sera aléatoire.","starting_perks.title":"Avantages de départ","starting_perks.unchecked":"Les avantages ci-dessous ne sont pas proposés comme avantages de départ, mais vous pouvez cliquer pour les ajouter aux avantages de départ possibles.","unlocks.category.advanced":"## Améliorations avancées\\n\\nElles ne sont généralement pas très utiles en elles-mêmes, mais peuvent devenir très puissantes lorsqu\'elles sont combinées avec la bonne amélioration combinée.","unlocks.category.beginner":"## Améliorations adaptées aux débutants\\n\\nCes améliorations sont très utiles aux débutants : elles vous aident à jouer plus longtemps et à moins rater la balle.","unlocks.category.combo":"## Améliorations de combo\\n\\nCes améliorations permettent d\'augmenter progressivement votre combo, mais ajoutent également une condition de réinitialisation. En choisir une est une bonne idée, en choisir plusieurs augmente le risque et la récompense.","unlocks.category.combo_boost":"## Améliorations du booster de combo\\n\\nCes améliorations augmentent le combo ou le multiplicateur de combo sans ajouter de condition de réinitialisation.","unlocks.category.simple":"## Améliorations d\'assistance\\n\\nCes améliorations sont utiles dans presque toutes les versions.","unlocks.greyed_out_help":"Les éléments grisées peuvent être débloquées en augmentant votre score total. Le score total augmente à chaque fois que vous marquez des points dans le jeu.","unlocks.intro":"Votre score total est de {{ts}}. Cliquez sur une amélioration ci-dessous pour commencer une partie.","unlocks.just_unlocked":"Niveau débloqué","unlocks.just_unlocked_plural":"Vous venez de débloquer {{count}} niveaux","unlocks.level":"Vous avez débloqué {{unlocked}} niveaux sur {{out_of}}","unlocks.level_description":"Un niveau {{size}}x{{size}} avec {{bricks}} briques, {{colors}} couleurs et {{bombs}} bombes.","unlocks.levels":"Niveaux débloqués","unlocks.minScore":"Atteignez un score de ${{minScore}} dans une partie pour débloquer.","unlocks.minScoreWithPerks":"Atteignez ${{minScore}} dans une partie avec {{required}} mais sans {{forbidden}}.","unlocks.minTotalScore":"Accumuler un total de ${{score}}","unlocks.reached":"Votre meilleur score pour l\'instant est {{reached}}.","unlocks.title_upgrades":"Vous avez débloqué {{unlocked}} améliorations sur {{out_of}}","unlocks.upgrades":"Mises à niveau débloquées","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brique cassée, combo perdu après {{delay}}s sans casser de briques","upgrades.addiction.verbose_description":"Le décompte ne commence qu\'à parti de la  destruction de la première brique du niveau, et s\'arrête dès qu\'il n\'y a plus de briques. ","upgrades.asceticism.name":"Ascétisme","upgrades.asceticism.tooltip":"+{{combo}} combo par brique cassée, - {{combo}} quand une pièce est attrapée","upgrades.asceticism.verbose_description":"Il faudra trouver un moyen de stocker les pièces pendant que le combo grandis. ","upgrades.ball_attract_ball.name":"Gravité","upgrades.ball_attract_ball.tooltip":"Les balles attirent les balles","upgrades.ball_attract_ball.verbose_description":"Les balles qui sont éloignées de plus de 3/4 de la largeur d\'écran commencent à s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus éloignées l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle en jeu.","upgrades.ball_attracts_coins.name":"Balles fortunées","upgrades.ball_attracts_coins.tooltip":"Les pièces accompagnent la balle la plus proche ","upgrades.ball_attracts_coins.verbose_description":"Vous pourriez l\'utiliser pour que les pièces orbitent autours de la balle et colorent les briques à proximité, ou comme une sorte de coin magnet. ","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.ball_repulse_ball.tooltip":"Les balles repoussent les balles","upgrades.ball_repulse_ball.verbose_description":"Les balles qui se trouvent à moins d\'un quart de largeur d\'écran commencent à se repousser les unes les autres. La force de répulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affichées pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle.","upgrades.base_combo.name":"Meilleur base","upgrades.base_combo.tooltip":"3 pièces supplémentaires par brique cassée","upgrades.base_combo.verbose_description":"Votre combo commence normalement à 1 au début du niveau et revient à 1 lorsque vous rebondissez sans rien toucher. Avec cette caractéristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pièces par brique. Lorsque votre combo est réinitialisé, il revient à 4 et non à 1.  Votre balle scintillera un peu pour indiquer que son combo est supérieur à 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosions plus violentes","upgrades.bigger_explosions.verbose_description":"L\'explosion par défaut efface un carré de 3x3 briques, avec cette amélioration un carré de 5x5. Le vent soufflant les pièces est également beaucoup plus fort. L\'écran clignotera un peu après chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_puck.name":"Raquette plus grande","upgrades.bigger_puck.tooltip":"Attrapez facilement plus de pièces.","upgrades.bigger_puck.verbose_description":"Une grande raquette permet de ne jamais rater la balle et d\'attraper plus de pièces, ainsi que d\'orienter précisément les rebonds. Cependant, une grande raquette est plus difficile à utiliser sur les côtés du niveau.","upgrades.bricks_attract_ball.name":"Les briques attirent les balles","upgrades.bricks_attract_ball.tooltip":"La balle se dirige vers les {{count}} premières briques qu\'elle touchera.","upgrades.bricks_attract_ball.verbose_description":"L\'effet est plus fort à des niveaux plus élevés. Le nombre de briques pouvant être touchées avant que l\'effet ne s\'arrête est également plus élevé. L\'effet se réarme lorsque la balle touche le palet.","upgrades.bricks_attract_coins.name":"Briques attirent les pièces","upgrades.bricks_attract_coins.tooltip":"Aide à garder les pièces en suspension","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Bouée","upgrades.buoy.tooltip":"Les pièces flottent pendant {{duration}} secondes sur la ligne du bas.","upgrades.buoy.verbose_description":"L\'effet est plus visible en mode mobile","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"Révèle les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.verbose_description":"Vous aide à choisir les bonnes améliorations et à comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) amènent des informations complémentaires d\'une utilité douteuse. ","upgrades.coin_magnet.name":"Aimant pour pièces","upgrades.coin_magnet.tooltip":"La raquette attire les pièces","upgrades.coin_magnet.verbose_description":"Dirige les pièces vers la raquette. L\'effet est plus fort sur les pièces déjà proche de la raquette. ","upgrades.compound_interest.name":"Intérêts composés","upgrades.compound_interest.tooltip":"+{{lvl}} combo par brique cassée, remise à zéro quand une pièce est perdu","upgrades.compound_interest.verbose_description":"Votre combo augmentera d\'une unité à chaque fois que vous casserez une brique. Toute pièce perdue remettra votre combo à zéro. \\n\\nSi votre combo est supérieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pièces ne doivent pas aller à cet endroit.","upgrades.concave_puck.name":"Raquette concave","upgrades.concave_puck.tooltip":"Aide à éviter les bords.","upgrades.concave_puck.verbose_description":"Les balles démarrent verticalement en début de niveau, et rebondi sur la raquette de manière plus verticale et inversée.","upgrades.corner_shot.name":"Tir en coin","upgrades.corner_shot.tooltip":"Laisse votre raquette sortir de la zone encadrée","upgrades.corner_shot.verbose_description":"Aide à viser dans les coins","upgrades.double_or_nothing.name":"Double ou rien","upgrades.double_or_nothing.tooltip":"Le combo grimpe {{multiplier}} fois plus vite, mais vous perdrez {{percent}}% de votre score à chaque réinitialisation.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.etherealcoins.tooltip":"Les pièces ne subissent plus la gravité ou la friction","upgrades.etherealcoins.verbose_description":"Les pièces garderont leur vitesse même après plusieurs rebonds, et ne subirons plus la gravité. ","upgrades.extra_levels.name":"Encore 5 minutes","upgrades.extra_levels.tooltip":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.verbose_description":"La partie dure normalement 7 niveaux, après quoi le jeu est terminé et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette amélioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux où vous faites le plus de points, la différence peut donc être spectaculaire.","upgrades.extra_life.name":"Seconde chance","upgrades.extra_life.tooltip":"La balle rebondit une fois avant d\'être perdue.","upgrades.extra_life.verbose_description":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est terminée dès que vous la laissez tomber.\\n\\nCette compétence ajoute une barre blanche en bas de l\'écran qui sauvera une balle une fois, et se brisera au cours du processus.\\n\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilisées à chaque fois qu\'une balle est sur le point d\'être perdue. ","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.forgiving.tooltip":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.verbose_description":" La première brique ratée par niveau ne coûte rien, la suivante 10%, 20%, etc.","upgrades.fountain_toss.name":"Pièce dans la fontaine","upgrades.fountain_toss.tooltip":"Gagnez parfois un peu de combo quand vous perdez des pièces.","upgrades.fountain_toss.verbose_description":"Lorsque vous manquez une pièce et que votre combo était inférieur au niveau*30, votre combo a une probabilité de niveau/combo d\'augmenter d\'un.","upgrades.ghost_coins.name":"Pièces fantôme","upgrades.ghost_coins.tooltip":"Les pièces traversent les briques doucement","upgrades.ghost_coins.verbose_description":"Ce n\'est pas une bug, c\'est une fonctionnalité ! Les pièces passent à travers les briques doucement. Les niveaux plus élevés permettent aux pièce de traverser les briques plus vite.","upgrades.golden_goose.name":"Oie d\'or","upgrades.golden_goose.tooltip":"Les pièces se téléportent vers la balle après avoir touché une brique","upgrades.golden_goose.verbose_description":"Lorsqu\'une pièce touche une brique, elle est téléportée vers la boule la plus proche. Au niveau 2, les pièces se téléportent également après avoir touché un côté.","upgrades.happy_family.name":"Famille heureuse","upgrades.happy_family.tooltip":"Plus de pièces si vous gardez toutes les boules dans le jeu.","upgrades.happy_family.verbose_description":"+1 combo par balle supplémentaire et par rebond de raquette. Le combo est réinitialisé lorsqu\'une balle est perdue. Seule la balle au-dessus de 1 donne le combo.","upgrades.helium.name":"Hélium","upgrades.helium.tooltip":"Les pièce flottent au lieu de tomber autours de la raquette.","upgrades.helium.verbose_description":"Au niveau 1, la gravité est réduite. Au niveau 2, les pièces flottent lentement. Au niveau 3, elles volent vraiment.","upgrades.hot_start.name":"Démarrage à chaud","upgrades.hot_start.tooltip":"Combo à {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.verbose_description":"Au début de chaque niveau, votre combo commencera à +30 points, mais à chaque seconde, il sera diminué d\'un point.  ","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Les explosions aspirent les pièces au lieu de les faire exploser.","upgrades.implosions.verbose_description":"La force d’explosion est appliquée dans l’autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.left_is_lava.name":"Éviter le côté gauche","upgrades.left_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en touchant le bord gauche","upgrades.left_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté gauche.\\n\\nDès que votre combo augmente, le côté gauche devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.limitless.name":"Sans limites","upgrades.limitless.tooltip":"Augmenter le niveau maximum de toutes les mises à niveau de {{lvl}} ","upgrades.limitless.verbose_description":"Choisir cet avantage augmente également sa propre limite d\'un point, vous permettant de le choisir à nouveau.","upgrades.metamorphosis.name":"Métamorphose","upgrades.metamorphosis.tooltip":"Chaque pièce peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.verbose_description":"Avec cette amélioration, les pièces seront de la couleur de la brique d\'où elles proviennent et coloreront la première brique qu\'elles toucheront. Les pièces apparaissent à la vitesse de la balle qui les a cassées, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\". Au à chaque niveau, chaque pièce peut colorier une brique de plus avant d\'être \\"épuisée\\" et d\'apparaître vide.","upgrades.minefield.name":"Terrain miné","upgrades.minefield.tooltip":"+{{percent}}% de pièces par brique de bombe à l\'écran","upgrades.minefield.verbose_description":"Les bombes sont également comptées pendant qu\'elles explosent.","upgrades.multiball.name":"Multi balle","upgrades.multiball.tooltip":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.verbose_description":"Dès que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien sûr, de franchir le niveau plus rapidement.","upgrades.nbricks.name":"Prélèvement","upgrades.nbricks.tooltip":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon combo perdu","upgrades.nbricks.verbose_description":"Si votre balle rebondis sans casser une brique, ça compte quand même comme une frappe.  Les briques détruites par des explosions ne comptent pas.","upgrades.one_more_choice.name":"La réponse D","upgrades.one_more_choice.tooltip":"Plus de choix d\'amélioration","upgrades.one_more_choice.verbose_description":"Chaque menu d\'amélioration comportera une option supplémentaire.  Cela n\'augmente pas le nombre d\'améliorations que vous pouvez choisir, mais vous aide à créer le profile idéal. \\"La réponse D\\" est une référence à un sketch classique. ","upgrades.ottawa_treaty.name":"Traité d\'Ottawa","upgrades.ottawa_treaty.tooltip":"Casser une brique près d\'une bombe la désamorce","upgrades.ottawa_treaty.verbose_description":"La bombe à proximité sera remplacée par un bloc coloré. Si vous possédez un sapeur, la balle perdra son effet sapeur jusqu\'au prochain rebond. Une seule bombe peut être remplacée à la fois.","upgrades.passive_income.name":"Revenu passif","upgrades.passive_income.tooltip":"+{{lvl}} combo / brique cassée, la raquette est immatérielle {{time}}s après le déplacement","upgrades.passive_income.verbose_description":"Certaines amélioration font bouger les balles sans avoir besoin de mettre la raquette en mouvement.","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.picky_eater.tooltip":"+{{lvl}} combo par brique cassée la couleur de la balle,  combo perdu sinon","upgrades.picky_eater.verbose_description":"Chaque fois que vous cassez une brique de la même couleur que votre balle, votre combo augmente d\'une unité.\\nS\'il s\'agit d\'une couleur différente, la balle adopte cette nouvelle couleur, mais la combinaison est réinitialisée, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle. Les briques de la mauvaise couleur sont entourées en rouge. Si vous avez plus d\'une balle, elles changent toutes de couleur en même temps lorsque l\'une d\'entre elles touche une brique.","upgrades.pierce.name":"Balle perçante","upgrades.pierce.tooltip":"La balle perce {{count}} briques après chaque rebond  sur la raquette.","upgrades.pierce.verbose_description":"Normalement , la balle rebondit dès qu\'elle touche une brique. Avec cette amélioration, elle continuera sa trajectoire jusqu\'à avoir cassées 3 briques.\\n\\nAprès cela, elle rebondira sur la quatrième brique et devra toucher la raquette pour remettre le compteur à zéro.","upgrades.pierce_color.name":"Perceur de couleur","upgrades.pierce_color.tooltip":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.verbose_description":"Chaque fois qu\'une balle touche une brique de la même couleur, elle la traverse sans encombre.\\n\\nLorsqu\'elle atteint une brique de couleur différente, elle la casse, prend sa couleur et rebondit. \\n\\nSi vous avez des briques solides, le fonctionnement est un peu différent. ","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.puck_repulse_ball.tooltip":"La raquette repousse les balles","upgrades.puck_repulse_ball.verbose_description":"Lorsqu\'une balle s\'approche de la raquette, elle commence à ralentir, voire à rebondir sans toucher le palet.","upgrades.rainbow.name":"Arc en ciel","upgrades.rainbow.tooltip":"Les pièces apparaissent avec la couleur de l\'arc en ciel.","upgrades.rainbow.verbose_description":"Chaque niveau augment la proportion de pièces colorée. La couleur dépends du temps de jeu. ","upgrades.reach.name":"Attaque aérienne","upgrades.reach.tooltip":"Casser une des N briques de la ligne la plus basse détruit le combo. Sinon, +N combo.","upgrades.reach.verbose_description":"S\'il n\'y a qu\'une seule rangée de briques, ou si la rangée la plus basse couvre toute la largeur du jeu, cet avantage est sans effet. Sinon, briser cette rangée la plus basse réinitialise le combo ; briser toute autre rangée augmente le combo du nombre de briques présentes sur cette rangée.\\n\\nLa rangée de briques du bas sera entourée en rouge pour vous rappeler de ne pas la toucher. ","upgrades.respawn.name":"Réapparition ","upgrades.respawn.tooltip":"{{percent}}% des briques réapparaissent après {{delay}}s.","upgrades.respawn.verbose_description":"Des effets de particules vous indiqueront où les briques apparaîtront. ","upgrades.right_is_lava.name":"Éviter le côté droit","upgrades.right_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de choc avec le coté droit","upgrades.right_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté droit de la zone de jeu.\\n\\nDès que votre combo augmente, le côté droit devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.tooltip":"Perdre une vie détruit toutes les briques à l\'écran","upgrades.sacrifice.verbose_description":"Au niveau 2, le combo est multiplié par le 2 avant de détruire toutes les briques. Cela peut augmenter considérablement le combo.","upgrades.sapper.name":"Sapeur","upgrades.sapper.tooltip":"La première brique cassée devient une bombe.","upgrades.sapper.verbose_description":"Au lieu de disparaître, la première brique cassée est remplacée par une bombe. Faire rebondir la balle sur la raquette réarme l\'effet.  En montant en niveau, vous pourrez placer plus de bombes.","upgrades.shocks.name":"Choc","upgrades.shocks.tooltip":"Collision explosive entre les balles","upgrades.shocks.verbose_description":"Quand deux balles entrent en collision,  elles échangent leurs vitesse, créent une explosion et gagnent un peu de vitesse qui les sépare. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.verbose_description":"Démarrage à chaud sera simplement ajouté au combo actuel","upgrades.side_flip.name":"Droitier","upgrades.side_flip.tooltip":"+{{lvl}} combo par brique cassé de la droite, -{{loss}} sinon","upgrades.side_flip.verbose_description":"Impactez la brique sur son côté droit pour obtenir un combo, mais évitez de la frapper sur son côté gauche, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.side_kick.name":"Gaucher","upgrades.side_kick.tooltip":"+{{lvl}} combo par brique cassé de la gauche, -{{loss}} sinon","upgrades.side_kick.verbose_description":"Impactez la brique sur son côté gauche pour obtenir un combo, mais évitez de la frapper sur son côté droit, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.skip_last.name":"Nettoyage facile","upgrades.skip_last.tooltip":"La dernière brique s\'autodétruit.","upgrades.skip_last.verbose_description":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut être difficile d\'obtenir les dernières briques.\\n\\nTerminer un niveau plus tôt permet d\'obtenir des choix supplémentaires lors de la mise à niveau. \\n\\nNe jamais manquer de briques est également très avantageux.\\n\\nDonc, si vous avez du mal à casser les dernières briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.slow_down.name":"Balle lente","upgrades.slow_down.tooltip":"La balle se déplace plus lentement","upgrades.slow_down.verbose_description":"La balle démarre relativement lentement, mais à chaque niveau de votre partie, elle démarre un peu plus vite, et elle accélère également si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile à gérer. \\n\\nVous pouvez l\'obtenir au début de chaque partie en activant le mode enfant dans le menu.","upgrades.smaller_puck.name":"Raquette plus petite","upgrades.smaller_puck.tooltip":"+{{percent}}% de pièces","upgrades.smaller_puck.verbose_description":"Cela réduit la taille de la raquette, ce qui, en théorie, facilite certains tirs en coin, mais augmente en réalité la difficulté.\\n\\nC\'est pourquoi vous obtenez également un bonus intéressant de +50 % d\'apparition de pièces.","upgrades.soft_reset.name":"Réinitialisation progressive","upgrades.soft_reset.tooltip":"La remise à zéro du combo conserve {{percent}}% des points","upgrades.soft_reset.verbose_description":"Limite l\'impact d\'une réinitialisation du combo.","upgrades.sticky_coins.name":"Pièces collantes","upgrades.sticky_coins.tooltip":"Les pièces collent aux briques de la même couleur","upgrades.sticky_coins.verbose_description":"Au niveau 2, ils collent aux briques de n\'importe quelle couleur","upgrades.streak_shots.name":"Séquence de destruction","upgrades.streak_shots.tooltip":"Plus de pièces si vous cassez plusieurs briques à la fois.","upgrades.streak_shots.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente. Le combo est remis à zéro quand la balle touche la raquette. Une fois que votre combo dépasse la valeur de base, votre raquette devient rouge pour vous rappeler que le fait de la toucher avec la balle détruira votre combo.","upgrades.sturdy_bricks.name":"Briques solides","upgrades.sturdy_bricks.tooltip":"+{{lvl}} PV des briques, +{{percent}}% pièces","upgrades.sturdy_bricks.verbose_description":"Chaque niveau de cet amélioration ajoute un PV à toutes les briques. Vous pouvez consulter le nombre de PV avec l\'avantage \\"clairvoyant\\". Vous pouvez augmenter les dégâts des balles en obtenant l\'amélioration \\"Balle perçante\\". Chaque niveau de cet amélioration ajoute 50% de pièces en plus.","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"Le temps avance quand la raquette bouge. ","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"Télékinésie","upgrades.telekinesis.tooltip":"Contrôler la trajectoire de la balle","upgrades.telekinesis.verbose_description":"Vous contrôlez la balle pendant qu\'elle monte.","upgrades.three_cushion.name":"Trois coussins","upgrades.three_cushion.tooltip":"+1 combo par coup sur les côtés et le dessus, jusqu\'à +{{max}} par rebond de la raquette. Le combo se réinitialise lorsque vous touchez une brique sans rebondir au préalable.","upgrades.three_cushion.verbose_description":"Chaque coup porté d\'un côté augmente le combo d\'un point, jusqu\'à +3. Après cela, aucun combo ne sera obtenu jusqu\'au prochain rebond de la raquette.","upgrades.top_is_lava.name":"Icare ","upgrades.top_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de rebond au plafond","upgrades.top_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité. Cependant, votre combo sera réinitialisé dès que votre balle atteindra le haut de l\'écran.\\n\\nLorsque votre combo est supérieur au minimum, une barre rouge apparaît en haut de l\'écran pour vous rappeler que vous devez éviter de la frapper.","upgrades.trampoline.name":"Trampoline","upgrades.trampoline.tooltip":"+{{lvl}} combo à chaque rebond d\'une balle sur la raquette,-{{lvl}} combo à chaque rebond sur un des bords","upgrades.trampoline.verbose_description":"Une des rares améliorations à ne pas avoir de condition de remise à zéro","upgrades.transparency.name":"Camouflage","upgrades.transparency.tooltip":"La balle devient transparente en haut de l\'écran. +{{percent}} % de pièces lorsque toutes les balles sont en transparence totale","upgrades.transparency.verbose_description":"Les niveaux plus élevés rendent la balle transparente plus tôt et augmentent le bonus de points.","upgrades.trickledown.name":"Ruissellement","upgrades.trickledown.tooltip":"Les pièces apparaissent en haut de l\'écran.","upgrades.trickledown.verbose_description":"Ça pourrait vous aider à mettre des pièces de coté. ","upgrades.unbounded.name":"Besoin d\'espace","upgrades.unbounded.tooltip":"Plus d\'espace autour des briques, mais la raquette ne peut pas aller aussi loin.","upgrades.unbounded.verbose_description":"Une autre amélioration pourrait vous permettre d\'étendre la portée de votre raquette.","upgrades.viscosity.name":"Fluide visqueux ","upgrades.viscosity.tooltip":"Chute plus lente des pièces","upgrades.viscosity.verbose_description":"Les pièces accélèrent normalement avec la gravité et les explosions pour atteindre des vitesses assez élevées. \\n\\nCette compétence les ralentit constamment, comme si elles se trouvaient dans une sorte de liquide visqueux.\\n\\nCela permet de les attraper plus facilement et se combine bien avec les améliorations qui influencent le mouvement de la pièce.","upgrades.wind.name":"Vive le vent","upgrades.wind.tooltip":"La position de la raquette crée du vent","upgrades.wind.verbose_description":"Le vent dépend de la position de la raquette à l\'écran,  vers la gauche s\'il est à gauche, vers la droite s\'il est à droite. \\nAffecte les balles et les pièces.","upgrades.wrap_left.name":"Envelopper à gauche","upgrades.wrap_left.tooltip":"Frapper le côté gauche téléporte la balle vers le côté droit","upgrades.wrap_left.verbose_description":"Les niveaux supérieurs téléportent également  الترقيات على مجموعتك.\\n\\n## المجموعة\\n\\n\\"مجموعتك\\" هي عدد العملات المعدنية التي تظهر عند كسر طوبة.\\nيظهر ذلك على مجدافك، على سبيل المثال، x4 يعني أن كل مكعب سيُنتج 4 عملات.\\n\\nمعظم الترقيات التي تزيد من قوة المجموعة تُضيف شرطًا لإعادة ضبطها.\\n\\nكما يُعاد ضبط المجموعة إذا عادت الكرة إلى\\n\\nدون أن تصطدم بأي مكعب.\\n\\nستظهر رسالة \\"خطأ\\" عند حدوث ذلك.\\n\\nحاول التصويب نحو مكعب في كل مرة.\\n\\n## التصويب\\n\\nموضع الكرة على المجداف هو ما يُحدد كيفية ارتدادها.\\n\\nإذا اصطدمت الكرة بالمجداف في منتصفه تمامًا، سترتد عموديًا.\\n\\nإذا ضربت أكثر على جانب واحد، ستكون زاوية ارتدادها أكبر.\\n\\nلا تؤثر سرعة المجداف وزاوية دخوله على اتجاه الكرة بعد ارتدادها.\\n\\nيمكن فتح العديد من الترقيات التي تُساعد في التصويب.\\n\\n## الفتح\\n\\nعند لعب Breakout 71 لأول مرة، تكون معظم الترقيات والمستويات مقفلة.\\n\\nيتم فتح الترقيات بمجرد اللعب وجمع العديد من العملات.\\nتُفتح المستويات الأولى عند تحقيق أعلى نتيجة.\\n\\nتُضيف المستويات اللاحقة شرطًا لاختيار المزايا.\\n\\nيصبح تحقيق أعلى النتائج أسهل بكثير عند حصولك على ترقيات متعددة بعد كل مستوى.\\n\\n## إعادة رمي النرد والترقيات المجانية\\n\\nستحصل على ترقية إضافية لاختيارها عند لعبك الجيد:\\n\\n- إكمال المستوى في أقل من {{levelTimeGood}} ثانية\\n- ضرب الجوانب أو القمة أقل من {{wallBouncedGood}} مرة\\n- التقاط {{catchRateGood}}% من العملات\\n- تفويت الطوب أقل من {{missesGood}} مرات\\n\\nستحصل أيضًا على إعادة رمي نرد تتيح لك تخطي الترقيات إذا كان أداؤك أفضل:\\n\\n- إكمال المستوى في أقل من {{levelTimeBest}} ثانية\\n- ضرب الجوانب أو القمة أقل من {{wallBouncedBest}} مرات\\n- التقاط {{catchRateBest}}% من العملات\\n- تفويت الطوب أقل من {{missesBest}} مرات\\n\\nيُتيح لك خيار في الإعدادات عرض هذه الإحصائيات","help.help":"تعرف على المزيد حول اللعبة","help.levels":"المستويات","help.title":"يساعد","help.upgrades":"## الترقيات","history.columns.score":"نتيجة","history.columns.started":"تاريخ","history.help":"شاهد أفضل ألعابك {{count}} .","history.include_past_versions":"إظهار الإصدارات السابقة أيضًا","history.locked":"العب عشر مباريات
