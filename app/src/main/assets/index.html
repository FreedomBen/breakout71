 it\'s game over.\\n\\nAfter destroying all bricks, you\'ll get to pick an upgrade.\\n\\n## Upgrades \\n\\nThe upgrades you pick will apply until the end of the run. \\nSome can be picked multiple times for stronger effect.\\nSome help with aiming, or make the game easier in some other ways. \\nSome are only useful when combined.\\n\\nYou always get one upgrade at the beginning of each game. \\nIts icon will serve as the bricks of the first level. \\nYou can select starting upgrades in the settings.\\n\\nMany upgrades impact your combo. \\n\\n## Combo\\n\\nYour \\"combo\\" is the number of coins spawned when a brick breaks. \\nIt is displayed on your paddle, for example x4 means each brick will spawn 4 coins. \\nMost upgrades that increase the combo also add a condition to reset it. \\nThe combo will also reset if the ball returns to the paddle without hitting any brick.\\nA \\"miss\\" message will be shown when that happens. \\n\\nTry to aim towards a brick every time. \\n\\n## Aiming\\n\\nOnly the ball position on the paddle decides how it will bounce.\\nIf the ball hits the paddle dead center, it will bounce back up vertically. \\nIf you hit more on one side, it will have more angle. \\nThe paddle speed and incoming angle have no impact on the ball direction after bouncing.\\n\\nMany upgrades that help with aiming can be unlocked.\\n\\n## Unlocks\\n\\nWhen playing Breakout 71 for the first time, most upgrades and levels are locked. \\nUpgrades are unlocked by simply playing and catching many coins. \\nThe first levels are unlocked by reaching a high score.\\nLater levels add a condition about which perks you can select. \\n\\nReach high scores is much easier when you get multiple upgrades after each level. \\n\\n## Re-rolls and free upgrades\\n\\nYou\'ll get an extra upgrade to pick when you play well : \\n\\n- Clear the level under {{levelTimeGood}} seconds\\n- Hit the sides or top less than {{wallBouncedGood}} times\\n- Catch {{catchRateGood}}% of coins\\n- Miss the bricks less than {{missesGood}} times \\n\\nYou will also get a re-roll that lets you skip upgrades if you do even better :  \\n\\n-  Clear a level under {{levelTimeBest}} seconds\\n- Hit the sides or top less than {{wallBouncedBest}} times\\n- Catch {{catchRateBest}}% of coins\\n- Miss the bricks less than {{missesBest}} times \\n\\nAn option in the settings lets you display those statistics","help.help":"Learn more about the game","help.levels":"Levels","help.title":"Help","help.upgrades":"## Upgrades","history.columns.score":"Score","history.columns.started":"Date","history.help":"See your {{count}} best games.","history.locked":"Play at least ten games to unlock","history.title":"Runs history","lab.help":"Try any build you want","lab.instructions":"Select upgrades below, then pick a level to play. ","lab.menu_entry":"Creative mode","lab.reset":"Reset all to 0","lab.select_level":"Select a level to play on","lab.unlocks_at":"Unlocks at total score {{score}}","level_up.after_buttons":"You just finished level {{level}}/{{max}}.","level_up.before_buttons":"You caught {{score}} coins {{catchGain}} out of {{levelSpawnedCoins}} in {{time}} seconds {{timeGain}}.\\n\\nYou missed {{levelMisses}} times {{missesGain}} and hit the walls or ceiling {{levelWallBounces}} times{{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Try to catch all coins, never miss the bricks, never hit the walls/ceiling or clear the level under 30s to gain additional upgrades.","level_up.compliment_good":"Well done !","level_up.compliment_perfect":"Impressive, keep it up !","level_up.pick_upgrade_title":"Pick an upgrade","level_up.plus_one_upgrade":"(+1  upgrade)","level_up.plus_one_upgrade_and_reroll":"(+1 upgrade and  +1 re-roll)","level_up.reroll":"Re-roll ({{count}})","level_up.reroll_help":"Offer new choices","level_up.upgrade_perk_to_level":"  lvl {{level}}","main_menu.basic":"","main_menu.basic_help":"","main_menu.colorful_coins":"","main_menu.colorful_coins_help":"", rting_perks.help":"Choose possible starting upgrades","starting_perks.random":"All benefits have been removed, the choice will be random.","starting_perks.title":"Starting perks","starting_perks.unchecked":"The perks below are not offered as starting perks, but you can click to add them to the pool. ","unlocks.greyed_out_help":"The grayed out upgrades can be unlocked by increasing your total score. The total score increases every time you score in game.","unlocks.intro":"Your total score is {{ts}}. Below are all the upgrades and levels the games has to offer.   Click an upgrade or level below to start a test game with it.","unlocks.just_unlocked":"Level unlocked","unlocks.just_unlocked_plural":"You just unlocked {{count}} levels","unlocks.level":"<h2>You unlocked {{unlocked}} levels out of {{out_of}}</h2>\\n<p>Here are all the game levels, click one to try it out.</p> ","unlocks.level_description":"A {{size}}x{{size}} level with {{bricks}} bricks, {{colors}} colors and {{bombs}} bombs.","unlocks.minScore":"Reach ${{minScore}} in a run to unlock.","unlocks.minScoreWithPerks":"Reach ${{minScore}} in a run with {{required}} but without {{forbidden}} to unlock.","unlocks.minTotalScore":"Accumulate a total of ${{score}}","unlocks.reached":"Your best score was {{reached}}.","unlocks.title_upgrades":"You unlocked {{unlocked}} upgrades out of {{out_of}}","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brick, combo resets {{delay}}s after breaking a brick. ","upgrades.addiction.verbose_description":"The countdown only starts after breaking the first brick of each level. It stops as soon as all bricks are destroyed.","upgrades.asceticism.name":"Asceticism","upgrades.asceticism.tooltip":"+{{combo}} combo / brick,  - {{combo}} on coin catch","upgrades.asceticism.verbose_description":"You\'ll need to store the coins somewhere while your combo climbs. ","upgrades.ball_attract_ball.help_plural":"Stronger attraction force","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attract_ball.tooltip":"Balls attract balls","upgrades.ball_attract_ball.verbose_description":"Balls that are more than \\"3/4 of the game area width\\" away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.","upgrades.ball_attracts_coins.name":"Balls attract coins","upgrades.ball_attracts_coins.tooltip":"Coins follow the nearest ball and fall down slower","upgrades.ball_attracts_coins.verbose_description":"This could be used to \\"paint around\\" the balls with coins if you combined it with \\"stain\\" and \\"ghost coins\\". It also works as a substitute for coin magnet. ","upgrades.ball_repulse_ball.help_plural":"Stronger repulsion force","upgrades.ball_repulse_ball.name":"Personal space","upgrades.ball_repulse_ball.tooltip":"Balls repulse balls","upgrades.ball_repulse_ball.verbose_description":"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.","upgrades.base_combo.name":"Strong foundations","upgrades.base_combo.tooltip":"Combo starts at {{coins}} instead of 1.","upgrades.base_combo.verbose_description":"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you\'ll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Bigger explosions","upgrades.bigger_explosions.verbose_description":"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)","upgrades.bigger_puck.name":"Bigger paddle","upgrades.bigger_puck.tooltip":"Easily catch more coins.","upgrades.bigger_puck.verbose_description":"A bigger paddle makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball\'s angle only depends on where it hits the paddle). ","upgrades.bricks_attract_ball.name":"Bricks attract balls","upgrades.bricks_attract_ball.tooltip":"Ball goes toward the first {{count}} bricks it will hit.","upgrades.bricks_attract_ball.verbose_description":"The effect is stronger at higher levels. The number of bricks that can hit before the effect stops is also higher. The effect rearms when the ball hits the puck.","upgrades.bricks_attract_coins.name":"Bricks attract coins","upgrades.bricks_attract_coins.tooltip":"Helps them stay up there","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"See upcoming levels, bricks HP and ball direction","upgrades.clairvoyant.verbose_description":"Helps you pick the right upgrades and understand what\'s going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)","upgrades.coin_magnet.help_plural":"Stronger effect on the coins","upgrades.coin_magnet.name":"Coins magnet","upgrades.coin_magnet.tooltip":"Paddle attracts coins","upgrades.coin_magnet.verbose_description":"Directs the coins to the paddle. The effect is stronger if the coin is close to it already.","upgrades.compound_interest.name":"Compound interest","upgrades.compound_interest.tooltip":"+{{lvl}} combo per brick broken, resets on coin lost","upgrades.compound_interest.verbose_description":"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\nBe sure however to catch every one of those coins with your paddle, as any lost coin will reset your combo.\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.","upgrades.concave_puck.name":"Concave paddle","upgrades.concave_puck.tooltip":"Improves vertical aiming precision","upgrades.concave_puck.verbose_description":"Balls starts the level going straight up, and bounces with less angle.","upgrades.corner_shot.name":"Corner shot","upgrades.corner_shot.tooltip":"Lets your paddle overlap with the borders of the screen","upgrades.corner_shot.verbose_description":"Helps with aiming in the corners. Further levels let you go further out. ","upgrades.etherealcoins.name":"Coins, in Space","upgrades.etherealcoins.tooltip":"Coins are no  longer affected by gravity","upgrades.etherealcoins.verbose_description":"The coins will maintain their speed even after several bounces, and will no longer be affected by gravity.","upgrades.extra_levels.name":"5 min more","upgrades.extra_levels.tooltip":"Play {{count}} levels instead of 7","upgrades.extra_levels.verbose_description":"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.","upgrades.extra_life.help_plural":"Your (last) ball will bounce on the bottom instead of being lost ({{lvl}}  times).","upgrades.extra_life.name":"Extra Life","upgrades.extra_life.tooltip":"The ball will bounce once on the bottom line before being lost.","upgrades.extra_life.verbose_description":"Normally, you have one ball, and the game is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou\'ll lose one level of that perk every time a ball bounces at the bottom of the screen.","upgrades.forgiving.name":"Forgiving","upgrades.forgiving.tooltip":"Missing breaks reduces combo progressively instead of all at once.","upgrades.forgiving.verbose_description":"The first miss per level is free, then 10% of the combo, then 20% .. ","upgrades.fountain_toss.name":"Fountain toss","upgrades.fountain_toss.tooltip":"Gain some combo when you miss some coins. ","upgrades.fountain_toss.verbose_description":"When you miss a coin and your combo was under {{max}}, your combo has a probability of {{lvl}}/combo to grow by one.","upgrades.ghost_coins.name":"Ghost coins","upgrades.ghost_coins.tooltip":"Coins slowly pass through bricks","upgrades.ghost_coins.verbose_description":"It\'s not a bug, it\'s a feature !  Coins fly through bricks slowly. Higher levels let them move faster. ","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Gravity reversed left and right of paddle","upgrades.helium.verbose_description":"This affects the coins  and will let the float up until you are ready to pick them up.","upgrades.hot_start.name":"Hot start","upgrades.hot_start.tooltip":"Start at combo {{start}}, -{{loss}} combo per second","upgrades.hot_start.verbose_description":"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one. The effect stacks with other perks. ","upgrades.hypnosis.name":"Hypnosis","upgrades.hypnosis.tooltip":"Whenever a brick changes color, teleport that coin to the nearest ball and recharge its ability to stain a brick. ","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Explosions suck coins in instead of blowing them out","upgrades.implosions.verbose_description":"The explosion force is applied the other way. Further levels act as \\"bigger explosion\\"","upgrades.instant_upgrade.name":"Instant upgrade","upgrades.instant_upgrade.tooltip":"+2 upgrade now, -1 choice until game end.","upgrades.instant_upgrade.verbose_description":"Immediately pick two upgrades, so that you get one free one and one to repay the one used to get this perk. Every further menu to pick upgrades will have fewer options to choose from.","upgrades.left_is_lava.name":"Avoid left side","upgrades.left_is_lava.tooltip":"+{{lvl}} combo per brick broken. Combo resets if ball hits the left side of the screen","upgrades.left_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n","upgrades.limitless.name":"Limitless","upgrades.limitless.tooltip":"Raise all upgrade\'s maximum level by {{lvl}} ","upgrades.limitless.verbose_description":"Choosing this perk also raises his own limit by one, letting you pick it again.","upgrades.metamorphosis.name":"Metamorphosis","upgrades.metamorphosis.tooltip":"Each coin can stain {{lvl}} brick(s) with its color","upgrades.metamorphosis.verbose_description":"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. Coins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\"paint\\". At level 1, each coin can color 1 bricks before it is \\"spent\\" and appears hollow. ","upgrades.minefield.name":"Minefield","upgrades.minefield.tooltip":"+{{lvl}} combo per bomb brick on screen","upgrades.minefield.verbose_description":"Adds +lvl to the combo when a brick is place, -lvl when it is destroyed, and raises the base combo by the number of bricks times lvl","upgrades.multiball.name":"Multi ball","upgrades.multiball.tooltip":"Start every levels with {{count}} balls.","upgrades.multiball.verbose_description":"As soon as you drop the ball in Breakout 71, you lose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.","upgrades.nbricks.name":"Strict sample size","upgrades.nbricks.tooltip":"Hit exactly {{lvl}} bricks per paddle bounce for +{{lvl}} combo, otherwise it resets","upgrades.nbricks.verbose_description":"You don\'t necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don\'t count","upgrades.one_more_choice.name":"Extra choice","upgrades.one_more_choice.tooltip":"Further level ups will offer {{lvl}} more option(s) in the list","upgrades.one_more_choice.verbose_description":"Every upgrade menu will have one more option.  Doesn\'t increase the number of upgrades you can pick.","upgrades.passive_income.name":"Passive income","upgrades.passive_income.tooltip":"+{{lvl}} combo / brick, unless the paddle moved in the last {{time}}s, then it resets instead","upgrades.passive_income.verbose_description":"Some perks can help the balls do what you want without needing to do anything.","upgrades.picky_eater.name":"Picky eater","upgrades.picky_eater.tooltip":"+{{lvl}} combo per brick broken, resets on ball color change","upgrades.picky_eater.verbose_description":"Whenever you break a brick the same color as your ball, your combo increases by one. \\nIf it\'s a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball\'s color. \\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red border. \\nIf you have more than one ball, they all switch color whenever one of them hits a brick.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Ball pierces {{count}} bricks after a paddle bounce","upgrades.pierce.verbose_description":"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\n\\nAfter that, it will bounce on the 4th brick, and you\'ll need to touch the paddle to reset the counter.","upgrades.pierce_color.name":"Color pierce","upgrades.pierce_color.tooltip":"+{{lvl}} damage to bricks of the ball\'s color","upgrades.pierce_color.verbose_description":"Whenever a ball hits a brick of the same color, it will just go through unimpeded. \\n\\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\n\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.","upgrades.puck_repulse_ball.help_plural":"Stronger repulsion force","upgrades.puck_repulse_ball.name":"Soft landing","upgrades.puck_repulse_ball.tooltip":"Paddle repulses balls","upgrades.puck_repulse_ball.verbose_description":"When a ball gets close to the paddle, it will start slowing down, and even potentially bouncing without touching the paddle.","upgrades.rainbow.name":"Rainbow","upgrades.rainbow.tooltip":"Coins spawn with rainbow color.","upgrades.rainbow.verbose_description":"Each level increases the proportion of colored coins. The color depends on level time. ","upgrades.reach.name":"Top down","upgrades.reach.tooltip":" Touching the N bricks of the lowest row resets the combo. Otherwise, +N combo","upgrades.reach.verbose_description":"If there is only one row of bricks, or if the lowest row of bricks cover the whole width of the game,  then this perk does nothing. Otherwise, breaking this lowest row resets the combo, while breaking anything else increases the combo by the number of bricks present on that lowest row. \\n\\nThe lowest row will be highlighted in red. ","upgrades.respawn.name":"Re-spawn","upgrades.respawn.tooltip":"{{percent}}% of bricks re-spawn after {{delay}}s.","upgrades.respawn.verbose_description":"Some particle effect will let you know where bricks will appear. ","upgrades.right_is_lava.name":"Avoid right side","upgrades.right_is_lava.tooltip":"+{{lvl}} combo per brick. Combo resets if ball hits the right side of the screen","upgrades.right_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n","upgrades.sacrifice.help_l1":"Loosing a life clears all bricks","upgrades.sacrifice.help_over":"Loosing a life {{lvl}}x the combo then clears all bricks","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.verbose_description":"This might get the combo pretty high.","upgrades.sapper.help_plural":"The first {{lvl}} bricks broken become bombs.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"The first brick broken becomes a bomb.","upgrades.sapper.verbose_description":"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the paddle re-arms the effect. Leveling-up this perk will allow you to place more bombs.","upgrades.shocks.name":"Shocks","upgrades.shocks.tooltip":"Explosive balls collisions","upgrades.shocks.verbose_description":"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separate them. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Keep {{percent}}% of your combo between levels","upgrades.shunt.verbose_description":"If you also have hot start, the hot start is just added to the current combo","upgrades.side_flip.name":"Right handed","upgrades.side_flip.tooltip":"+{{lvl}} combo per brick broken from the right, -{{loss}} otherwise","upgrades.side_flip.verbose_description":"Impact the brick on its right side to gain one combo, but avoid hitting it on the left side as the would remove 2 combo. Hitting from the top and bottom has no effect. ","upgrades.side_kick.name":"Left handed","upgrades.side_kick.tooltip":"+{{lvl}} combo per brick broken from the left, -{{loss}} otherwise","upgrades.side_kick.verbose_description":"Impact the brick on its left side to gain one combo, but avoid hitting it on the right side as the would remove 2 combo. Hitting from the top and bottom has no effect. ","upgrades.skip_last.help_plural":"The last {{lvl}}  bricks will explode.","upgrades.skip_last.name":"Easy Cleanup","upgrades.skip_last.tooltip":"The last brick will explode.","upgrades.skip_last.verbose_description":"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\n\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help.","upgrades.slow_down.name":"Slower ball","upgrades.slow_down.tooltip":"Ball moves more slowly","upgrades.slow_down.verbose_description":"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.","upgrades.smaller_puck.help_plural":"Even smaller paddle and higher base combo","upgrades.smaller_puck.name":"Smaller paddle","upgrades.smaller_puck.tooltip":"Also gives +5 base combo","upgrades.smaller_puck.verbose_description":"This makes the paddle smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat\'s why you also get a nice bonus of +5 coins per brick for all bricks you\'ll break after picking this. ","upgrades.soft_reset.name":"Soft reset","upgrades.soft_reset.tooltip":"Combo resets keeps {{percent}}%","upgrades.soft_reset.verbose_description":"Limit the impact of a combo reset.","upgrades.streak_shots.name":"Hit streak","upgrades.streak_shots.tooltip":"More coins if you break many bricks before bouncing on the paddle.","upgrades.streak_shots.verbose_description":"Every time you break a brick, your combo increases by one. \\n\\nHowever, as soon as the ball touches your paddle, the combo is reset to its default value.\\n\\nOnce your combo rises above the base value, your paddle will have a red border to remind you that it will destroy your combo to touch it with the ball.","upgrades.sturdy_bricks.name":"Sturdy bricks","upgrades.sturdy_bricks.tooltip":"+{{lvl}} bricks HP, +{{percent}}% coins spawned when broken","upgrades.sturdy_bricks.verbose_description":"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\"clairvoyant\\" perk. You can increase ball damage by getting the \\"piercing\\" perk. Each level of the perk adds +50% coins spawn. ","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"Time moves when the paddle moves.","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.help_plural":"Stronger effect on the ball","upgrades.telekinesis.name":"Telekinesis","upgrades.telekinesis.tooltip":"Paddle controls the ball\'s trajectory","upgrades.telekinesis.verbose_description":"You control the ball while it\'s going up. ","upgrades.top_is_lava.name":"Sky is the limit","upgrades.top_is_lava.tooltip":"+{{lvl}} combo per brick, reset when the top is hit","upgrades.top_is_lava.verbose_description":"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. ","upgrades.trampoline.name":"Trampoline","upgrades.trampoline.tooltip":"+{{lvl}} combo per paddle bounce,-{{lvl}} combo per bounce on any border","upgrades.trampoline.verbose_description":"One of the rare  combo upgrades that don\'t add a reset condition","upgrades.transparency.name":"Transparency","upgrades.transparency.tooltip":"The higher the ball is on the screen, the more transparent it becomes. The more transparent it is, the more coins it produces.","upgrades.transparency.verbose_description":"Higher levels make the ball transparent sooner and increase the point bonus.","upgrades.trickledown.name":"Trickle down economics","upgrades.trickledown.tooltip":"The coins appear at the top of the screen.","upgrades.trickledown.verbose_description":"It might help you put some coins aside.","upgrades.unbounded.name":"Padding","upgrades.unbounded.tooltip":"Adds space left and right of the level, but your paddle can\'t go that far. ","upgrades.unbounded.verbose_description":"Another upgrade might help you extends the reach of your paddle. ","upgrades.viscosity.name":"Viscosity","upgrades.viscosity.tooltip":"Slower coin fall","upgrades.viscosity.verbose_description":"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin\'s movement.","upgrades.wind.help_plural":"Stronger wind force","upgrades.wind.name":"Wind","upgrades.wind.tooltip":"Paddle position creates wind","upgrades.wind.verbose_description":"Wind depends on paddle position: left blows left, right blows right. Affects both balls and coins.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"Ball falls toward paddle","upgrades.yoyo.verbose_description":"It\'s the opposite of telekinesis, control the ball while it\'s falling back down.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"+{{lvl}} combo per bricks, reset when there\'s an explosion","upgrades.zen.verbose_description":"After all, this is a non-violent game. "}');var L={};L=JSON.parse('{"confirmRestart.no":"Annuler","confirmRestart.text":"Vous êtes sur le point de commencer une nouvelle partie, est-ce vraiment ce que vous vouliez ?","confirmRestart.title":"Démarrer une nouvelle partie ?","confirmRestart.yes":"Commencer une nouvelle partie","gameOver.creative":"Cette partie de test ne sera pas enregistrée.","gameOver.cumulative_total":"Votre score total cumulé est passé de {{startTs}} à {{endTs}}.","gameOver.lost.summary":"Vous avez fait tomber la balle après avoir attrapé {{score}} pièces.","gameOver.lost.title":"Balle perdue","gameOver.stats.balls_lost":"Balles perdues","gameOver.stats.bricks_broken":"Briques cassées","gameOver.stats.bricks_per_minute":"Briques cassées par minute","gameOver.stats.catch_rate":"Pièces attrapées","gameOver.stats.combo_avg":"Combo moyen","gameOver.stats.combo_max":"Combo maximum","gameOver.stats.duration_per_level":"Durée par niveau","gameOver.stats.hit_rate":"Précision","gameOver.stats.intro":"","gameOver.stats.level_reached":"Niveau atteint","gameOver.stats.total_score":"Score total","gameOver.stats.upgrades_applied":"Améliorations appliquées","gameOver.stats_intro":"Vous trouverez ci-dessous les statistiques de cette partie comparées à vos {{count}} meilleures parties.","gameOver.unlocked_perk":"Amélioration débloquée","gameOver.unlocked_perk_plural":"Vous avez débloqué {{count}} améliorations","gameOver.win.summary":"Cette partie est terminée. Vous avez accumulé {{score}} pièces. ","gameOver.win.title":"Vous avez terminé cette partie","help.content":"## Objectif\\n\\nAttrapez un maximum de pièces au cours des 7 niveaux.\\nLes pièces apparaissent lorsque vous cassez des briques.\\nAttrapez-les avec votre palet pour augmenter votre score.\\nVotre score est affiché en haut à droite de l\'écran.\\nNe laissez pas tomber la balle, sinon la partie est terminée.\\n\\nAprès avoir détruit toutes les briques, vous pourrez choisir une amélioration.\\n\\n## Améliorations\\n\\nLes améliorations que vous choisissez seront valables jusqu\'à la fin de la partie.\\nCertaines peuvent être sélectionnées plusieurs fois pour un effet plus puissant.\\nD\'autres aident à viser ou simplifient le jeu.\\nCertaines ne sont utiles que lorsqu\'elles sont combinées.\\n\\nVous obtenez toujours une amélioration au début de chaque partie.\\nSon icône forme les briques du premier niveau.\\nVous pouvez sélectionner les améliorations de départ dans les paramètres.\\n\\nDe nombreuses améliorations influencent votre combo.\\n\\n## Combo\\n\\nVotre « combo » correspond au nombre de pièces générées lorsqu\'une brique se casse.\\nIl est affiché sur votre palet. Par exemple, x4 signifie que chaque brique rapporte 4 pièces.\\n\\nLa plupart des améliorations qui augmentent le combo ajoutent également une condition pour le réinitialiser.\\nLe combo se réinitialise également si la balle revient sur la raquette sans toucher de brique.\\nUn message « Manqué » s\'affiche alors.\\n\\nEssayez de viser vers un brique à chaque rebond.\\n\\n## Visée\\n\\nSeule la position de la balle sur la raquette détermine son angle de rebond.\\nSi la balle touche la raquette en plein centre, elle rebondira verticalement.\\nSi vous frappez sur le côté de la raquette, l\'angle sera plus grand.\\nLa vitesse de la raquette et l\'angle d\'incidence de la balle n\'ont pas d\'effet.\\n\\nDe nombreuses améliorations facilitant la visée peuvent être débloquées.\\n\\n## Déblocages\\n\\nLorsque vous jouez à Breakout 71 pour la première fois, la plupart des améliorations et des niveaux sont verrouillés.\\nLes améliorations se débloquent simplement en jouant et en attrapant beaucoup de pièces.\\nLes premiers niveaux se débloquent en atteignant un score élevé.\\nLes niveaux suivants ajoutent une condition concernant les avantages sélectionnés.\\n\\nAtteindre des scores élevés est beaucoup plus facile lorsque vous obtenez plusieurs améliorations après chaque niveau.\\n\\n## Relances et améliorations gratuites\\n\\nVous obtiendrez une amélioration supplémentaire si vous jouez bien :\\n\\n- Terminez le niveau en moins de {{levelTimeGood}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedGood}} fois\\n- Attrapez {{catchRateGood}} % de pièces\\n- Manquez les briques moins de {{missesGood}} fois\\n\\nVous bénéficierez également d\'une relance qui vous permettra d\'ignorer les améliorations  si vous faites  encore mieux :\\n\\n- Terminez un niveau en moins de {{levelTimeBest}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedBest}} fois\\n- Attrapez {{catchRateBest}} % de pièces\\n- Manquez les briques moins de {{missesBest}} fois\\n\\nUne option dans les paramètres vous permet d\'afficher ces statistiques ","help.help":"Découvrez le jeu en détail","help.levels":"Niveaux","help.title":"Aide","help.upgrades":"## Améliorations","history.columns.score":"Score","history.columns.started":"Date","history.help":"Liste vos {{count}} meilleurs parties.","history.locked":"Jouez d\'abord au moins dix parties","history.title":"Historique","lab.help":"Essayez n\'importe quel combinaison d\'améliorations et de niveaux.","lab.instructions":"Sélectionnez les améliorations ci-dessous, puis choisissez le niveau à jouer. .","lab.menu_entry":"Mode créatif","lab.reset":"Retirer toutes les améliorations","lab.select_level":"Sélectionnez un niveau sur lequel jouer","lab.unlocks_at":"Déverrouillé à partir d\'un score total de {{score}}","level_up.after_buttons":"Vous venez de terminer le niveau {{level}}/{{max}}.","level_up.before_buttons":"Vous avez attrapé {{score}} pièces {{catchGain}} sur {{levelSpawnedCoins}} en {{time}} secondes {{timeGain}}.\\n\\nVous avez raté les briques {{levelMisses}} fois {{missesGain}} et touché les bords de la zone de jeu {{levelWallBounces}} fois {{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Essayez d\'attraper toutes les pièces, de ne jamais rater les briques, de ne pas toucher les murs ou de terminer le niveau en moins de 30 secondes pour obtenir des choix supplémentaires et des améliorations.","level_up.compliment_good":"Bravo !","level_up.compliment_perfect":"Impressionnant, conti ur de la brique","settings.comboIncreaseTexts":"Afficher un +X doré","settings.comboIncreaseTexts_help":"Quand le combo augmente","settings.contrast":"Contraste élevé","settings.contrast_help":"Affichage plus contrasté et coloré","settings.donation_reminder":"Me rappeler de donner","settings.donation_reminder_help":"Afficher le temps de jeu et un lien pour donner dans le menu principal","settings.download_save_file":"Sauvegarder mes progrès","settings.download_save_file_help":"Obtenir un fichier de sauvegarde","settings.extra_bright":"Plus de lumière","settings.extra_bright_help":"Plus grand halo lumineux autours des briques et pièces.","settings.fullscreen":"Plein écran","settings.fullscreen_help":"Le jeu essaiera de passer en plein écran quand vous le démarrez","settings.kid":"Mode enfants","settings.kid_help":"Balle plus lente","settings.language":"Langue","settings.language_help":"Changer la langue d\'affichage","settings.load_save_file":"Charger une sauvegarde","settings.load_save_file_help":"Depuis un fichier ","settings.max_coins":"{{max}} pièces affichées maximum","settings.max_coins_help":"Visuel uniquement, pas d\'impact sur le score","settings.max_particles":" {{max}} particules maximum","settings.max_particles_help":"Limite le nombre de particules affichées à l\'écran pour les effets visuels","settings.mobile":"Mode mobile","settings.mobile_help":"Laisse un espace sous la raquette.","settings.pointer_lock":"Verrouillage du pointeur","settings.pointer_lock_help":"Cache aussi le curseur de la souris.","settings.record":"Enregistrer des vidéos de jeu","settings.record_download":"Télécharger la vidéo ({{size}} MB)","settings.record_help":"Obtenez une vidéo de chaque niveau.","settings.red_miss":"Balles ratées","settings.red_miss_help":"Afficher des particules rouges autours des balles qui redescendent sans avoir touché une brique.","settings.reset":"Réinitialiser le jeu","settings.reset_cancel":"Non","settings.reset_confirm":"Oui","settings.reset_help":"Effacer les scores, statistiques et temps de jeu","settings.reset_instruction":"Vous perdrez tous les progrès que vous avez faits dans le jeu, êtes-vous sûr ?","settings.save_file_error":"Erreur lors du chargement du fichier de sauvegarde","settings.save_file_loaded":"Sauvegarde chargée","settings.save_file_loaded_help":"L\'appli va redémarrer","settings.save_file_loaded_ok":"Ok","settings.show_fps":"Compteur de FPS","settings.show_fps_help":"Surveiller la performance du jeu","settings.show_stats":"Statistiques en temps réel","settings.show_stats_help":"Pièces, temps, rebonds, ratés","settings.sounds":"Sons du jeu","settings.sounds_help":"Ralentis certains téléphones.","starting_perks.checked":"Lorsque vous démarrez une nouvelle partie, l\'un de ces avantages vous sera attribué. Cliquez sur un avantage pour l\'exclure.","starting_perks.help":"Choisissez les avantages de départ","starting_perks.random":"Tous les avantages ont été retirés, le choix sera aléatoire.","starting_perks.title":"Avantages de départ","starting_perks.unchecked":"Les avantages ci-dessous ne sont pas proposés comme avantages de départ, mais vous pouvez cliquer pour les ajouter aux avantages de départ possibles.","unlocks.greyed_out_help":"Les éléments grisées peuvent être débloquées en augmentant votre score total. Le score total augmente à chaque fois que vous marquez des points dans le jeu.","unlocks.intro":"Votre score total est de {{ts}}. Vous trouverez ci-dessous toutes les améliorations et tous les niveaux que le jeu peut offrir. Cliquez sur l\'un d\'entre eux pour les essayer dans une partie de test. ","unlocks.just_unlocked":"Niveau débloqué","unlocks.just_unlocked_plural":"Vous venez de débloquer {{count}} niveaux","unlocks.level":"<h2>Vous avez débloqué {{unlocked}} niveaux sur {{out_of}}</h2>\\n<p>Voici tous les niveaux du jeu, cliquez sur l\'un d\'eux pour l\'essayer. </p> ","unlocks.level_description":"Un niveau {{size}}x{{size}} avec {{bricks}} briques, {{colors}} couleurs et {{bombs}} bombes.","unlocks.minScore":"Atteignez un score de ${{minScore}} dans une partie pour débloquer.","unlocks.minScoreWithPerks":"Atteignez ${{minScore}} dans une partie avec {{required}} mais sans {{forbidden}}.","unlocks.minTotalScore":"Accumuler un total de ${{score}}","unlocks.reached":"Votre meilleur score pour l\'instant est {{reached}}.","unlocks.title_upgrades":"Vous avez débloqué {{unlocked}} améliorations sur {{out_of}}","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brique, combo perdu après {{delay}}s sans casser de briques","upgrades.addiction.verbose_description":"Le décompte ne commence qu\'à parti de la  destruction de la première brique du niveau, et s\'arrête dès qu\'il n\'y a plus de briques. ","upgrades.asceticism.name":"Ascétisme","upgrades.asceticism.tooltip":"+{{combo}} combo par brique cassée, - {{combo}} quand une pièce est attrapée","upgrades.asceticism.verbose_description":"Il faudra trouver un moyen de stocker les pièces pendant que le combo grandis. ","upgrades.ball_attract_ball.help_plural":"Force d\'attraction plus forte","upgrades.ball_attract_ball.name":"Gravité","upgrades.ball_attract_ball.tooltip":"Les balles attirent les balles","upgrades.ball_attract_ball.verbose_description":"Les balles qui sont éloignées de plus de 3/4 de la largeur d\'écran commencent à s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus éloignées l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle en jeu.","upgrades.ball_attracts_coins.name":"Balles fortunées","upgrades.ball_attracts_coins.tooltip":"Les pièces accompagnent la balle la plus proche ","upgrades.ball_attracts_coins.verbose_description":"Vous pourriez l\'utiliser pour que les pièces orbitent autours de la balle et colorent les briques à proximité, ou comme une sorte de coin magnet. ","upgrades.ball_repulse_ball.help_plural":"Force de répulsion plus forte","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.ball_repulse_ball.tooltip":"Les balles repoussent les balles","upgrades.ball_repulse_ball.verbose_description":"Les balles qui se trouvent à moins d\'un quart de largeur d\'écran commencent à se repousser les unes les autres. La force de répulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affichées pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle.","upgrades.base_combo.name":"Meilleur base","upgrades.base_combo.tooltip":"Le combo commence à {{coins}} au lieu de 1.","upgrades.base_combo.verbose_description":"Votre combo commence normalement à 1 au début du niveau et revient à 1 lorsque vous rebondissez sans rien toucher. Avec cette caractéristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pièces par brique. Lorsque votre combo est réinitialisé, il revient à 4 et non à 1.  Votre balle scintillera un peu pour indiquer que son combo est supérieur à 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosions plus violentes","upgrades.bigger_explosions.verbose_description":"L\'explosion par défaut efface un carré de 3x3 briques, avec cette amélioration un carré de 5x5. Le vent soufflant les pièces est également beaucoup plus fort. L\'écran clignotera un peu après chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_puck.name":"Raquette plus grande","upgrades.bigger_puck.tooltip":"Attrapez facilement plus de pièces.","upgrades.bigger_puck.verbose_description":"Une grande raquette permet de ne jamais rater la balle et d\'attraper plus de pièces, ainsi que d\'orienter précisément les rebonds. Cependant, une grande raquette est plus difficile à utiliser sur les côtés du niveau.","upgrades.bricks_attract_ball.name":"Les briques attirent les balles","upgrades.bricks_attract_ball.tooltip":"La balle se dirige vers les {{count}} premières briques qu\'elle touchera.","upgrades.bricks_attract_ball.verbose_description":"L\'effet est plus fort à des niveaux plus élevés. Le nombre de briques pouvant être touchées avant que l\'effet ne s\'arrête est également plus élevé. L\'effet se réarme lorsque la balle touche le palet.","upgrades.bricks_attract_coins.name":"Briques attirent les pièces","upgrades.bricks_attract_coins.tooltip":"Aide à garder les pièces en suspension","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"Révèle les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.verbose_description":"Vous aide à choisir les bonnes améliorations et à comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) amènent des informations complémentaires d\'une utilité douteuse. ","upgrades.coin_magnet.help_plural":"Effet plus marqué sur les pièces","upgrades.coin_magnet.name":"Aimant pour pièces","upgrades.coin_magnet.tooltip":"La raquette attire les pièces","upgrades.coin_magnet.verbose_description":"Dirige les pièces vers la raquette. L\'effet est plus fort sur les pièces déjà proche de la raquette. ","upgrades.compound_interest.name":"Intérêts composés","upgrades.compound_interest.tooltip":"+{{lvl}} combo par brique cassée, remise à zéro quand une pièce est perdu","upgrades.compound_interest.verbose_description":"Votre combo augmentera d\'une unité à chaque fois que vous casserez une brique. Toute pièce perdue remettra votre combo à zéro. \\n\\nSi votre combo est supérieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pièces ne doivent pas aller à cet endroit.","upgrades.concave_puck.name":"Raquette concave","upgrades.concave_puck.tooltip":"Aide à éviter les bords.","upgrades.concave_puck.verbose_description":"Les balles démarrent verticalement en début de niveau, et rebondi sur la raquette de manière plus verticale et inversée.","upgrades.corner_shot.name":"Tir en coin","upgrades.corner_shot.tooltip":"Laisse votre raquette sortir de la zone encadrée","upgrades.corner_shot.verbose_description":"Aide à viser dans les coins","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.etherealcoins.tooltip":"Les pièces ne subissent plus la gravité ou la friction","upgrades.etherealcoins.verbose_description":"Les pièces garderont leur vitesse même après plusieurs rebonds, et ne subirons plus la gravité. ","upgrades.extra_levels.name":"Encore 5 minutes","upgrades.extra_levels.tooltip":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.verbose_description":"La partie dure normalement 7 niveaux, après quoi le jeu est terminé et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette amélioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux où vous faites le plus de points, la différence peut donc être spectaculaire.","upgrades.extra_life.help_plural":"La (dernière) balle rebondit en bas de l\'écran au lieu d\'être perdue ( {{lvl}} fois).","upgrades.extra_life.name":"Seconde chance","upgrades.extra_life.tooltip":"La balle rebondit une fois avant d\'être perdue.","upgrades.extra_life.verbose_description":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est terminée dès que vous la laissez tomber.\\n\\nCette compétence ajoute une barre blanche en bas de l\'écran qui sauvera une balle une fois, et se brisera au cours du processus.\\n\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilisées à chaque fois qu\'une balle est sur le point d\'être perdue. ","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.forgiving.tooltip":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.verbose_description":" La première brique ratée par niveau ne coûte rien, la suivante 10%, 20%, etc.","upgrades.fountain_toss.name":"Pièce dans la fontaine","upgrades.fountain_toss.tooltip":"Gagnez parfois un peu de combo quand vous perdez des pièces.","upgrades.fountain_toss.verbose_description":"Quand une pièce est perdue alors que votre combo était en dessous de {{max}}, votre combo à une probabilité de {{lvl}}/combo d\'être incrémenté","upgrades.ghost_coins.name":"Pièces fantôme","upgrades.ghost_coins.tooltip":"Les pièces traversent les briques doucement","upgrades.ghost_coins.verbose_description":"Ce n\'est pas une bug, c\'est une fonctionnalité ! Les pièces passent à travers les briques doucement. Les niveaux plus élevés permettent aux pièce de traverser les briques plus vite.","upgrades.helium.name":"Hélium","upgrades.helium.tooltip":"Les pièce flottent au lieu de tomber autours de la raquette.","upgrades.helium.verbose_description":"Les pièces attendront d\'être sous la raquette pour tomber. ","upgrades.hot_start.name":"Démarrage à chaud","upgrades.hot_start.tooltip":"Combo à {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.verbose_description":"Au début de chaque niveau, votre combo commencera à +30 points, mais à chaque seconde, il sera diminué d\'un point.  ","upgrades.hypnosis.name":"Hypnose","upgrades.hypnosis.tooltip":"Chaque fois qu\'une brique change de couleur, téléportez cette pièce vers la boule la plus proche et rechargez sa capacité à tacher une brique.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Les explosions aspirent les pièces au lieu de les faire exploser.","upgrades.implosions.verbose_description":"La force d’explosion est appliquée dans l’autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.instant_upgrade.name":"Un tiens vaut deux tu l\'auras","upgrades.instant_upgrade.tooltip":"+2 améliorations, -1 choix jusqu\'à la fin de la partie.","upgrades.instant_upgrade.verbose_description":"Choisissez immédiatement deux améliorations, afin d\'en obtenir une gratuite et une autre pour rembourser celle utilisée pour obtenir cet avantage. Chaque fois que vous choisirez des améliorations dans le menu suivant, vous aurez moins de choix.","upgrades.left_is_lava.name":"Éviter le côté gauche","upgrades.left_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en touchant le bord gauche","upgrades.left_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté gauche.\\n\\nDès que votre combo augmente, le côté gauche devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.limitless.name":"Sans limites","upgrades.limitless.tooltip":"Augmenter le niveau maximum de toutes les mises à niveau de {{lvl}} ","upgrades.limitless.verbose_description":"Choisir cet avantage augmente également sa propre limite d\'un point, vous permettant de le choisir à nouveau.","upgrades.metamorphosis.name":"Métamorphose","upgrades.metamorphosis.tooltip":"Chaque pièce peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.verbose_description":"Avec cette amélioration, les pièces seront de la couleur de la brique d\'où elles proviennent et coloreront la première brique qu\'elles toucheront. Les pièces apparaissent à la vitesse de la balle qui les a cassées, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\". Au à chaque niveau, chaque pièce peut colorier une brique de plus avant d\'être \\"épuisée\\" et d\'apparaître vide.","upgrades.minefield.name":"Terrain miné","upgrades.minefield.tooltip":"+{{lvl}} combo par brique explosive à l\'écran","upgrades.minefield.verbose_description":"Ajoute +lvl au combo lorsqu\'une brique est placée, -lvl lorsqu\'elle est détruite et augmente le combo de base du nombre de briques multiplié par le niveau","upgrades.multiball.name":"Multi balle","upgrades.multiball.tooltip":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.verbose_description":"Dès que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien sûr, de franchir le niveau plus rapidement.","upgrades.nbricks.name":"Prélèvement","upgrades.nbricks.tooltip":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon combo perdu","upgrades.nbricks.verbose_description":"Si votre balle rebondis sans casser une brique, ça compte quand même comme une frappe.  Les briques détruites par des explosions ne comptent pas.","upgrades.one_more_choice.name":"La réponse D","upgrades.one_more_choice.tooltip":"1 choix supplémentaire d\'amélioration proposé jusqu\'à la fin de la partie","upgrades.one_more_choice.verbose_description":"Chaque menu d\'amélioration comportera une option supplémentaire.  Cela n\'augmente pas le nombre d\'améliorations que vous pouvez choisir, mais vous aide à créer le profile idéal. \\"La réponse D\\" est une référence à un sketch classique. ","upgrades.passive_income.name":"Revenu passif","upgrades.passive_income.tooltip":"+{{lvl}} combo / brique, sauf si la raquette à bougé dans les {{time}} dernières secondes, combo perdu dans ce cas","upgrades.passive_income.verbose_description":"Certaines amélioration font bouger les balles sans avoir besoin de mettre la raquette en mouvement.","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.picky_eater.tooltip":"+{{lvl}} combo par brique cassée la couleur de la balle,  combo perdu sinon","upgrades.picky_eater.verbose_description":"Chaque fois que vous cassez une brique de la même couleur que votre balle, votre combo augmente d\'une unité.\\nS\'il s\'agit d\'une couleur différente, la balle adopte cette nouvelle couleur, mais la combinaison est réinitialisée, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle. Les briques de la mauvaise couleur sont entourées en rouge. Si vous avez plus d\'une balle, elles changent toutes de couleur en même temps lorsque l\'une d\'entre elles touche une brique.","upgrades.pierce.name":"Balle perçante","upgrades.pierce.tooltip":"La balle perce {{count}} briques après chaque rebond  sur la raquette.","upgrades.pierce.verbose_description":"Normalement , la balle rebondit dès qu\'elle touche une brique. Avec cette amélioration, elle continuera sa trajectoire jusqu\'à avoir cassées 3 briques.\\n\\nAprès cela, elle rebondira sur la quatrième brique et devra toucher la raquette pour remettre le compteur à zéro.","upgrades.pierce_color.name":"Perceur de couleur","upgrades.pierce_color.tooltip":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.verbose_description":"Chaque fois qu\'une balle touche une brique de la même couleur, elle la traverse sans encombre.\\n\\nLorsqu\'elle atteint une brique de couleur différente, elle la casse, prend sa couleur et rebondit. \\n\\nSi vous avez des briques solides, le fonctionnement est un peu différent. ","upgrades.puck_repulse_ball.help_plural":"La force de répulsion est plus grande","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.puck_repulse_ball.tooltip":"La raquette repousse les balles","upgrades.puck_repulse_ball.verbose_description":"Lorsqu\'une balle s\'approche de la raquette, elle commence à ralentir, voire à rebondir sans toucher le palet.","upgrades.rainbow.name":"Arc en ciel","upgrades.rainbow.tooltip":"Les pièces apparaissent avec la couleur de l\'arc en ciel.","upgrades.rainbow.verbose_description":"Chaque niveau augment la proportion de pièces colorée. La couleur dépends du temps de jeu. ","upgrades.reach.name":"Attaque aérienne","upgrades.reach.tooltip":"Casser une des N briques de la ligne la plus basse détruit le combo. Sinon, +N combo.","upgrades.reach.verbose_description":"S\'il n\'y a qu\'une seule rangée de briques, ou si la rangée la plus basse couvre toute la largeur du jeu, cet avantage est sans effet. Sinon, briser cette rangée la plus basse réinitialise le combo ; briser toute autre rangée augmente le combo du nombre de briques présentes sur cette rangée.\\n\\nLa rangée de briques du bas sera entourée en rouge pour vous rappeler de ne pas la toucher. ","upgrades.respawn.name":"Réapparition ","upgrades.respawn.tooltip":"{{percent}}% des briques réapparaissent après {{delay}}s.","upgrades.respawn.verbose_description":"Des effets de particules vous indiqueront où les briques apparaîtront. ","upgrades.right_is_lava.name":"Éviter le côté droit","upgrades.right_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de choc avec le coté droit","upgrades.right_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté droit de la zone de jeu.\\n\\nDès que votre combo augmente, le côté droit devient rouge pour vous rappeler que vous devez éviter de le frapper.","upgrades.sacrifice.help_l1":"Perdre une vie détruit toutes les briques","upgrades.sacrifice.help_over":"Perdre une vie multiplie le combo par {{lvl}} puis détruit toutes les briques à l\'écran","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.verbose_description":"Le combo pourrait monter assez haut.","upgrades.sapper.help_plural":"Les premières briques {{lvl}} cassées deviennent des bombes.","upgrades.sapper.name":"Sapeur","upgrades.sapper.tooltip":"La première brique cassée devient une bombe.","upgrades.sapper.verbose_description":"Au lieu de disparaître, la première brique cassée est remplacée par une bombe. Faire rebondir la balle sur la raquette réarme l\'effet.  En montant en niveau, vous pourrez placer plus de bombes.","upgrades.shocks.name":"Choc","upgrades.shocks.tooltip":"Collision explosive entre les balles","upgrades.shocks.verbose_description":"Quand deux balles entrent en collision,  elles échangent leurs vitesse, créent une explosion et gagnent un peu de vitesse qui les sépare. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.verbose_description":"Démarrage à chaud sera simplement ajouté au combo actuel","upgrades.side_flip.name":"Droitier","upgrades.side_flip.tooltip":"+{{lvl}} combo par brique cassé de la droite, -{{loss}} sinon","upgrades.side_flip.verbose_description":"Impactez la brique sur son côté droit pour obtenir un combo, mais évitez de la frapper sur son côté gauche, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.side_kick.name":"Gaucher","upgrades.side_kick.tooltip":"+{{lvl}} combo par brique cassé de la gauche, -{{loss}} sinon","upgrades.side_kick.verbose_description":"Impactez la brique sur son côté gauche pour obtenir un combo, mais évitez de la frapper sur son côté droit, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.skip_last.help_plural":"Les {{lvl}} dernières briques restantes s\'autodétruiront","upgrades.skip_last.name":"Nettoyage facile","upgrades.skip_last.tooltip":"La dernière brique s\'autodétruit.","upgrades.skip_last.verbose_description":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut être difficile d\'obtenir les dernières briques.\\n\\nTerminer un niveau plus tôt permet d\'obtenir des choix supplémentaires lors de la mise à niveau. \\n\\nNe jamais manquer de briques est également très avantageux.\\n\\nDonc, si vous avez du mal à casser les dernières briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.slow_down.name":"Balle lente","upgrades.slow_down.tooltip":"La balle se déplace plus lentement","upgrades.slow_down.verbose_description":"La balle démarre relativement lentement, mais à chaque niveau de votre partie, elle démarre un peu plus vite, et elle accélère également si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile à gérer. \\n\\nVous pouvez l\'obtenir au début de chaque partie en activant le mode enfant dans le menu.","upgrades.smaller_puck.help_plural":"La raquette rétrécie encore et le combo augmente encore.","upgrades.smaller_puck.name":"Raquette plus petite","upgrades.smaller_puck.tooltip":"Donne aussi +5 combo","upgrades.smaller_puck.verbose_description":"Vous bénéficiez d\'un bonus permanent de +5 combo pour avoir choisi cette amélioration.","upgrades.soft_reset.name":"Réinitialisation progressive","upgrades.soft_reset.tooltip":"La remise à zéro du combo conserve {{percent}}% des points","upgrades.soft_reset.verbose_description":"Limite l\'impact d\'une réinitialisation du combo.","upgrades.streak_shots.name":"Séquence de destruction","upgrades.streak_shots.tooltip":"Plus de pièces si vous cassez plusieurs briques à la fois.","upgrades.streak_shots.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente. Le combo est remis à zéro quand la balle touche la raquette. Une fois que votre combo dépasse la valeur de base, votre raquette devient rouge pour vous rappeler que le fait de la toucher avec la balle détruira votre combo.","upgrades.sturdy_bricks.name":"Briques solides","upgrades.sturdy_bricks.tooltip":"+{{lvl}} points de vie des briques, +{{percent}}% pièces quand elles sont détruites","upgrades.sturdy_bricks.verbose_description":"Chaque niveau de cet amélioration ajoute un PV à toutes les briques. Vous pouvez consulter le nombre de PV avec l\'avantage \\"clairvoyant\\". Vous pouvez augmenter les dégâts des balles en obtenant l\'amélioration \\"Balle perçante\\". Chaque niveau de cet amélioration ajoute 50% de pièces nded.verbose_description":"Une autre amélioration pourrait vous permettre d\'étendre la portée de votre raquette.","upgrades.viscosity.name":"Fluide visqueux ","upgrades.viscosity.tooltip":"Chute plus lente des pièces","upgrades.viscosity.verbose_description":"Les pièces accélèrent normalement avec la gravité et les explosions pour atteindre des vitesses assez élevées. \\n\\nCette compétence les ralentit constamment, comme si elles se trouvaient dans une sorte de liquide visqueux.\\n\\nCela permet de les attraper plus facilement et se combine bien avec les améliorations qui influencent le mouvement de la pièce.","upgrades.wind.help_plural":"Force du vent plus importante","upgrades.wind.name":"Vive le vent","upgrades.wind.tooltip":"La position de la raquette crée du vent","upgrades.wind.verbose_description":"Le vent dépend de la position de la raquette à l\'écran,  vers la gauche s\'il est à gauche, vers la droite s\'il est à droite. \\nAffecte les balles et les pièces.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"La balle se dirige vers la raquette en descendant.","upgrades.yoyo.verbose_description":"C\'est l\'inverse de Télékinésie, contrôlez la balle alors qu\'elle redescend vers la raquette.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"+{{lvl}} combo par brique, jusqu\'à ce qu\'il y ait une explosion","upgrades.zen.verbose_description":"C\'est quand même un jeu non violent à la base."}');var R={};R=JSON.parse('{"confirmRestart.no":"يلغي","confirmRestart.text":"أنت على وشك بدء لعبة جديدة. هل أنت متأكد من رغبتك في المتابعة؟","confirmRestart.title":"بدء لعبة جديدة؟","confirmRestart.yes":"إعادة تشغيل اللعبة","gameOver.creative":"لن يتم تسجيل هذا التشغيل.","gameOver.cumulative_total":"لقد ارتفع مجموع درجاتك التراكمية من {{startTs}} إلى {{endTs}}.","gameOver.lost.summary":"لقد أسقطت الكرة بعد التقاط {{score}} قطعة نقدية.","gameOver.lost.title":"انتهت اللعبة","gameOver.stats.balls_lost":"الكرات المفقودة","gameOver.stats.bricks_broken":"الطوب المكسور","gameOver.stats.bricks_per_minute":"عدد الطوب المكسور في الدقيقة","gameOver.stats.catch_rate":"معدل الصيد","gameOver.stats.combo_avg":"مجموعة متوسطة","gameOver.stats.combo_max":"أقصى مجموعة","gameOver.stats.duration_per_level":"المدة لكل مستوى","gameOver.stats.hit_rate":"معدل الإصابة","gameOver.stats.intro":"","gameOver.stats.level_reached":"المستوى الذي تم الوصول إليه","gameOver.stats.total_score":"مجموع النقاط","gameOver.stats.upgrades_applied":"تم تطبيق الترقيات","gameOver.stats_intro":"ابحث أدناه عن إحصائيات لعبتك مقارنةً بأفضل {{count}} ألعاب لديك.","gameOver.unlocked_perk":"تم إلغاء قفل الترقية","gameOver.unlocked_perk_plural":"لقد قمت للتو بفتح {{count}} من الامتيازات","gameOver.win.summary":"انتهت اللعبة. لقد جمعت {{score}} عملة.","gameOver.win.title":"لقد أكملت هذه اللعبة","help.content":"## الهدف\\n\\nاجمع أكبر عدد ممكن من العملات المعدنية خلال 7 مستويات.\\n\\nتظهر العملات المعدنية عند كسر الطوب.\\n\\nاجمعها بمجدافك لزيادة نقاطك.\\n\\nتظهر نقاطك في الزاوية العلوية اليمنى من الشاشة.\\n\\nلا تسقط الكرة وإلا ستنتهي اللعبة.\\n\\nبعد تدمير جميع الطوب، ستتمكن من اختيار ترقية.\\n\\n## الترقيات\\n\\nستُطبق الترقيات التي تختارها حتى نهاية الجولة.\\n\\nيمكن اختيار بعضها عدة مرات لتأثير أقوى.\\n\\nبعضها يُساعد في التصويب، أو يُسهّل اللعبة بطرق أخرى.\\n\\nبعضها لا يُفيد إلا عند دمجه.\\n\\nستحصل دائمًا على ترقية واحدة في بداية كل لعبة.\\n\\nسيكون رمزها بمثابة طوب المستوى الأول.\\n\\nيمكنك اختيار ترقيات البدء من الإعدادات.\\n\\nتؤثر العديد من الترقيات على مجموعتك.\\n\\n## المجموعة\\n\\n\\"مجموعتك\\" هي عدد العملات المعدنية التي تظهر عند كسر طوبة.\\nيظهر ذلك على مجدافك، على سبيل المثال، x4 يعني أن كل مكعب سيُنتج 4 عملات.\\n\\nمعظم الترقيات التي تزيد من قوة المجموعة تُضيف شرطًا لإعادة ضبطها.\\n\\nكما يُعاد ضبط المجموعة إذا عادت الكرة إلى\\n\\nدون أن تصطدم بأي مكعب.\\n\\nستظهر رسالة \\"خطأ\\" عند حدوث ذلك.\\n\\nحاول التصويب نحو مكعب في كل مرة.\\n\\n## التصويب\\n\\nموضع الكرة على المجداف هو ما يُحدد كيفية ارتدادها.\\n\\nإذا اصطدمت الكرة بالمجداف في منتصفه تمامًا، سترتد عموديًا.\\n\\nإذا ضربت أكثر على جانب واحد، ستكون زاوية ارتدادها أكبر.\\n\\nلا تؤثر سرعة المجداف وزاوية دخوله على اتجاه الكرة بعد ارتدادها.\\n\\nيمكن فتح العديد من الترقيات التي تُساعد في التصويب.\\n\\n## الفتح\\n\\nعند لعب Breakout 71 لأول مرة، تكون معظم الترقيات والمستويات مقفلة.\\n\\nيتم فتح الترقيات بمجرد اللعب وجمع العديد من العملات.\\nتُفتح المستويات الأولى عند تحقيق أعلى نتيجة.\\n\\nتُضيف المستويات اللاحقة شرطًا لاختيار المزايا.\\n\\nيصبح تحقيق أعلى النتائج أسهل بكثير عند حصولك على ترقيات متعددة بعد كل مستوى.\\n\\n## إعادة رمي النرد والترقيات المجانية\\n\\nستحصل على ترقية إضافية لاختيارها عند لعبك الجيد:\\n\\n- إكمال المستوى في أقل من {{levelTimeGood}} ثانية\\n- ضرب الجوانب أو القمة أقل من {{wallBouncedGood}} مرة\\n- التقاط {{catchRateGood}}% من العملات\\n- تفويت الطوب أقل من {{missesGood}} مرات\\n\\nستحصل أيضًا على إعادة رمي نرد تتيح لك تخطي الترقيات إذا كان أداؤك أفضل:\\n\\n- إكمال المستوى في أقل من {{levelTimeBest}} ثانية\\n- ضرب الجوانب أو القمة أقل من {{wallBouncedBest}} مرات\\n- التقاط {{catchRateBest}}% من العملات\\n- تفويت الطوب أقل من {{missesBest}} مرات\\n\\nيُتيح لك خيار في الإعدادات عرض هذه الإحصائيات","help.help":"تعرف على المزيد حول اللعبة","help.levels":"المستويات","help.title":"يساعد","help.upgrades":"## الترقيات","history.columns.score":"نتيجة","history.columns.started":"تاريخ","history.help":"شاهد أفضل ألعابك {{count}} .","history.locked":"العب عشر مباريات على الأقل لفتح القفل","history.title":"سجل التشغيل","lab.help":"جرب أي بناء تريده","lab.instructions":"قم بتحديد الترقيات أدناه، ثم اختر المستوى للعب.","lab.menu_entry":"الوضع الإبداعي","lab.reset":"إعادة تعيين الكل إلى 0","lab.select_level":"حدد المستوى للعب عليه","lab.unlocks_at":"يتم فتحه عند إجمالي النتيجة {{score}}","level_up.after_buttons":"لقد انتهيت للتو من المستوى {{level}}/{{max}}.","level_up.before_buttons":"لقد اصطدت {{score}} عملة {{catchGain}} من أصل {{levelSpawnedCoins}} في {{time}} ثانية {{timeGain}}.\\n\\nأخطأت {{levelMisses}} مرات {{missesGain}} واصطدمت بالجدران أو السقف {{levelW عة أعلى بثلاث نقاط، لذا ستحصل دائمًا على ٤ عملات على الأقل لكل مكعب. عند إعادة ضبط مجموعتك، تعود إلى ٤ وليس ١. ستتألق كرتك قليلاً للإشارة إلى أن مجموعتها أعلى من ١.","upgrades.bigger_explosions.name":"كابوم","upgrades.bigger_explosions.tooltip":"انفجارات أكبر","upgrades.bigger_explosions.verbose_description":"الانفجار الافتراضي يُزيل مربعًا 3×3، ويصبح مربعًا 5×5، كما أن تأثير الضربة على العملات المعدنية أقوى بكثير. ستومض الشاشة بعد كل انفجار (باستثناء الوضع الأساسي).","upgrades.bigger_puck.name":"مجداف أكبر","upgrades.bigger_puck.tooltip":"احصل على المزيد من العملات المعدنية بسهولة.","upgrades.bigger_puck.verbose_description":"يجعل المضرب الأكبر من السهل عدم تفويت الكرة والتقاط المزيد من العملات المعدنية، كما يساعد أيضًا على تحديد زاوية الارتدادات بدقة (تعتمد زاوية الكرة فقط على المكان الذي تصطدم فيه بالمضرب).","upgrades.bricks_attract_ball.name":"الطوب يجذب الكرات","upgrades.bricks_attract_ball.tooltip":"تتجه الكرة نحو أول {{count}} من الطوب التي ستصطدم بها.","upgrades.bricks_attract_ball.verbose_description":"يكون التأثير أقوى في المستويات الأعلى. كما أن عدد الطوب الذي يمكن أن يصيب قبل توقف التأثير يكون أكبر. ويعود التأثير إلى قوته عندما تصطدم الكرة بالقرص.","upgrades.bricks_attract_coins.name":"الطوب يجذب العملات المعدنية","upgrades.bricks_attract_coins.tooltip":"يساعدهم على البقاء هناك","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"مستبصر","upgrades.clairvoyant.tooltip":"شاهد المستويات القادمة، نقاط الصحة للطوب واتجاه الكرة","upgrades.clairvoyant.verbose_description":"يساعدك على اختيار الترقيات المناسبة وفهم كيفية عمل الطوب المتين. يُضيف المستويان 2 و3 معلومات إضافية حول فائدة مشكوك فيها (متوفرة في وضع الحلقة).","upgrades.coin_magnet.help_plural":"تأثير أقوى على العملات المعدنية","upgrades.coin_magnet.name":"مغناطيس العملات المعدنية","upgrades.coin_magnet.tooltip":"المجداف يجذب العملات المعدنية","upgrades.coin_magnet.verbose_description":"يُوجِّه العملات المعدنية نحو المجداف. يكون التأثير أقوى إذا كانت العملة قريبة منه بالفعل.","upgrades.compound_interest.name":"الفائدة المركبة","upgrades.compound_interest.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة، يتم إعادة تعيينها عند فقدان العملة المعدنية","upgrades.compound_interest.verbose_description":"ستزداد مجموعتك قطعةً قطعةً في كل مرة تكسر فيها لبنة، مما يُنتج المزيد من العملات مع كل قطعة تكسرها.\\n\\nمع ذلك، احرص على التقاط جميع هذه العملات بمجدافك، لأن أي عملة مفقودة ستُعيد ضبط مجموعتك.\\n\\nبمجرد أن تتجاوز مجموعتك الحد الأدنى، سيظهر خط أحمر في أسفل منطقة اللعب لتذكيرك بعدم وضع العملات هناك.","upgrades.concave_puck.name":"مجداف مقعر","upgrades.concave_puck.tooltip":"تحسين دقة التصويب العمودي","upgrades.concave_puck.verbose_description":"تبدأ الكرات المستوى بالصعود مباشرة إلى الأعلى، وترتد بزاوية أقل.","upgrades.corner_shot.name":"ضربة ركنية","upgrades.corner_shot.tooltip":"يسمح للمجداف الخاص بك بالتداخل مع حدود الشاشة","upgrades.corner_shot.verbose_description":"يُساعدك على التصويب في الزوايا. المستويات الأعلى تُتيح لك الوصول إلى مسافات أبعد.","upgrades.etherealcoins.name":"العملات المعدنية في الفضاء","upgrades.etherealcoins.tooltip":"لم تعد العملات المعدنية تتأثر بالجاذبية","upgrades.etherealcoins.verbose_description":"ستحافظ العملات المعدنية على سرعتها حتى بعد عدة ارتدادات، ولن تتأثر بالجاذبية بعد الآن.","upgrades.extra_levels.name":"5 دقائق إضافية","upgrades.extra_levels.tooltip":"العب {{count}} مستوى بدلاً من 7","upgrades.extra_levels.verbose_description":"يمكن أن تستمر اللعبة الافتراضية لسبعة مستويات كحد أقصى، تنتهي بعدها.\\n\\nيتيح لك كل مستوى من هذه الميزة الانتقال إلى مستوى أعلى. غالبًا ما تكون المستويات الأخيرة هي التي تحقق فيها أعلى النقاط، لذا قد يكون الفرق كبيرًا.","upgrades.extra_life.help_plural":"سترتد الكرة (الأخيرة) إلى الأسفل بدلاً من أن تضيع ({{lvl}} مرة).","upgrades.extra_life.name":"حياة إضافية","upgrades.extra_life.tooltip":"سترتد الكرة مرة واحدة على الخط السفلي قبل أن تضيع.","upgrades.extra_life.verbose_description":"عادةً، لديك كرة واحدة، وتنتهي اللعبة بمجرد إسقاطها.\\n\\nتضيف هذه الميزة شريطًا أبيض أسفل الشاشة يحفظ حتى نهاية اللعبة.","upgrades.instant_upgrade.verbose_description":"اختر ترقيتين فورًا، لتحصل على واحدة مجانية وأخرى لاسترداد قيمة الميزة التي استخدمتها. مع كل قائمة تالية لاختيار الترقيات، ستجد خيارات أقل.","upgrades.left_is_lava.name":"تجنب الجانب الأيسر","upgrades.left_is_lava.tooltip":"+{{lvl}} مجموعة لكل طوبة مكسورة. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.left_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ بمجرد أن تصطدم كرتكَ بالجانب الأيسر.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيسر أحمر لتذكيرك بضرورة تجنب ضربها.\\n\\n","upgrades.limitless.name":"بلا حدود","upgrades.limitless.tooltip":"رفع المستوى الأقصى لجميع الترقيات بمقدار {{lvl}} ","upgrades.limitless.verbose_description":"يؤدي اختيار هذه الميزة أيضًا إلى رفع الحد الأقصى الخاص به بمقدار واحد، مما يتيح لك اختيارها مرة أخرى.","upgrades.metamorphosis.name":"التحول","upgrades.metamorphosis.tooltip":"يمكن لكل عملة أن تصبغ {{lvl}} من الطوب بلونها","upgrades.metamorphosis.verbose_description":"مع هذه الميزة، ستكون العملات بلون الطوبة التي أتت منها، وستُلوّن أول طوبة تلمسها بنفس اللون. تظهر العملات بسرعة الكرة التي كسرتها، ما يعني أنه يمكنك التصويب قليلاً باتجاه الطوب الذي تريد \\"طلائه\\". في المستوى 1، يُمكن لكل عملة تلوين طوبة واحدة قبل أن \\"تُستهلك\\" وتظهر فارغة.","upgrades.minefield.name":"حقل ألغام","upgrades.minefield.tooltip":"+{{lvl}} مجموعة لكل قنبلة على الشاشة","upgrades.minefield.verbose_description":"يضيف +lvl إلى المجموعة عند وضع لبنة، و-lvl عند تدميرها، ويرفع المجموعة الأساسية بمقدار عدد الطوب مضروبًا في المستوى","upgrades.multiball.name":"كرة متعددة","upgrades.multiball.tooltip":"ابدأ كل المستويات بـ {{count}} كرة.","upgrades.multiball.verbose_description":"بمجرد أن تسقط الكرة في Breakout 71، ستخسر.\\n\\nمع هذه الميزة، ستحصل على كرتين، ما يعني أنك قادر على تحمل خسارة إحداهما.\\n\\nتعود الكرات المفقودة في المستوى التالي.\\n\\nامتلاك أكثر من كرة واحدة يتيح لك الحصول على مزايا إضافية، وبالطبع يُسرّع من إنهاء المستوى.","upgrades.nbricks.name":"حجم العينة الصارم","upgrades.nbricks.tooltip":"اضرب {{lvl}} طوبة بالضبط لكل ارتداد للمجداف للحصول على +{{lvl}} مجموعة، وإلا فسيتم إعادة تعيينها","upgrades.nbricks.verbose_description":"ليس بالضرورة تدمير تلك الطوب، لكن عليك ضربها. الطوب المدمر بالانفجارات لا يُحتسب.","upgrades.one_more_choice.name":"خيار إضافي","upgrades.one_more_choice.tooltip":"ستوفر عمليات رفع المستوى الإضافية {{lvl}} خيارًا إضافيًا في القائمة","upgrades.one_more_choice.verbose_description":"ستحتوي كل قائمة ترقية على خيار إضافي. هذا لا يزيد من عدد الترقيات المتاحة.","upgrades.passive_income.name":"الدخل السلبي","upgrades.passive_income.tooltip":"+{{lvl}} مجموعة / لبنة، ما لم يتم تحريك المجداف في آخر {{time}}ثانية، ثم يتم إعادة تعيينه بدلاً من ذلك","upgrades.passive_income.verbose_description":"يمكن لبعض الامتيازات أن تساعد الكرات على القيام بما تريد دون الحاجة إلى القيام بأي شيء.","upgrades.picky_eater.name":"آكل انتقائي","upgrades.picky_eater.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة، يتم إعادة تعيينها عند تغير لون الكرة","upgrades.picky_eater.verbose_description":"كلما كسرتَ لبنة من نفس لون كرتك، تزداد مجموعتك بمقدار كرة واحدة.\\n\\nإذا كان لونها مختلفًا، تأخذ الكرة اللون الجديد، لكن المجموعة تُعاد ضبطها، إلا في حال عدم وجود أي طوب متبقي من لون الكرة.\\n\\nبمجرد حصولك على مجموعة أعلى من الحد الأدنى، ستُحاط الطوب ذات اللون غير المناسب بإطار أحمر.\\n\\nإذا كان لديك أكثر من كرة، فسيتغير لونها جميعًا عند اصطدام إحداها بطوبة.","upgrades.pierce.name":"ثقب","upgrades.pierce.tooltip":"الكرة تخترق {{count}} طوبة بعد ارتداد المضرب","upgrades.pierce.verbose_description":"عادةً ما ترتد الكرة بمجرد ملامستها لأي شيء. مع هذه الميزة، ستواصل مسارها حتى كسر ثلاث طوبات.\\n\\nبعد ذلك، ترتد على الطوبة الرابعة، وستحتاج إلى لمس المضرب لإعادة ضبط العداد.","upgrades.pierce_color.name":"ثقب اللون","upgrades.pierce_color.tooltip":"+{{lvl}} ضرر للطوب من لون الكرة","upgrades.pierce_color.verbose_description":"كلما اصطدمت الكرة بقطعة من نفس اللون، ستمرّ دون عائق.\\n\\nوإذا اصطدمت بقطعة من لون مختلف، فستكسرها، وتأخذ لونها، وترتد.\\n\\nإذا كانت لديك قطع متينة، فقد ترتد الكرة عن قطعة من نفس اللون.","upgrades.puck_repulse_ball.help_plural":"قوة تنافر أقوى","upgrades.puck_repulse_ball.name":"هبوط ناعم","upgrades.puck_repulse_ball.tooltip":"المجداف يصد الكرات","upgrades.puck_repulse_ball.verbose_description":"عندما تقترب الكرة من المضرب، فإنها تبدأ في التباطؤ، وربما ترتد دون أن تلمس المضرب.","upgrades.rainbow.name":"قوس قزح","upgrades.rainbow.tooltip":"تظهر العملات المعدنية بألوان قوس قزح.","upgrades.rainbow.verbose_description":"مع كل مستوى، تزداد نسبة العملات الملونة. يعتمد اللون على وقت المستوى.","upgrades.reach.name":"من أعلى إلى أسفل","upgrades.reach.tooltip":"لمس مكعبات N في الصف السفلي يُعيد ضبط المجموعة. وإلا، فإن +N مجموعة","upgrades.reach.verbose_description":"إذا كان هناك صف واحد فقط من الطوب، أو إذا غطى الصف السفلي عرض اللعبة بالكامل، فلن تُحدث هذه الميزة أي فرق. وإلا، فإن كسر هذا الصف السفلي يُعيد ضبط المجموعة، بينما يؤدي كسر أي شيء آخر إلى زيادة المجموعة بمقدار عدد الطوب الموجود في ذلك الصف السفلي.\\n\\nسيتم تمييز الصف السفلي باللون الأحمر.","upgrades.respawn.name":"إعادة الظهور","upgrades.respawn.tooltip":"{{percent}}% من الطوب يظهر مرة أخرى بعد {{delay}}ثانية.","upgrades.respawn.verbose_description":"سوف يساعدك تأثير الجسيمات على معرفة مكان ظهور الطوب.","upgrades.right_is_lava.name":"تجنب الجانب الأيمن","upgrades.right_is_lava.tooltip":"+{{lvl}} مجموعة لكل مكعب. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.right_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ حالما تصطدم كرتكَ بالجانب الأيمن.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيمن أحمر لتذكيرك بضرورة تجنب ضربها.\\n\\n","upgrades.sacrifice.help_l1":"فقدان الحياة يزيل كل الطوب","upgrades.sacrifice.help_over":"خسارة حياة {{lvl}}× المجموعة ثم إزالة كل الطوب","upgrades.sacrifice.name":"تصحية","upgrades.sacrifice.verbose_description":"قد يؤدي هذا إلى ارتفاع المجموعة إلى حد كبير.","upgrades.sapper.help_plural":"أول {{lvl}} طوبة مكسورة تصبح قنابل.","upgrades.sapper.name":"مهندس","upgrades.sapper.tooltip":"الطوبة الأولى المكسورة تصبح قنبلة.","upgrades.sapper.verbose_description":"بدلاً من مجرد الاختفاء، ستُستبدل أول لبنة تكسرها ببنة قنبلة. ارتطام الكرة بالمضرب يُعيد تفعيل التأثير. رفع مستوى هذه الميزة سيسمح لك بوضع المزيد من القنابل.","upgrades.shocks.name":"الصدمات","upgrades.shocks.tooltip":"تصادمات الكرات المتفجرة","upgrades.shocks.verbose_description":"عندما تصطدم كرتان، فإنهما تتبادلان سرعتهما، ويحدث انفجار، ويكتسبان سرعة إضافية لفصلهما.","upgrades.shunt.name":"ناور","upgrades.shunt.tooltip":"احتفظ بـ {{percent}}% من مجموعتك بين المستويات","upgrades.shunt.verbose_description":"إذا كان لديك أيضًا بداية ساخنة، فسيتم إضافة البداية الساخنة إلى المجموعة الحالية","upgrades.side_flip.name":"اليد اليمنى","upgrades.side_flip.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة من اليمين، -{{loss}} بخلاف ذلك","upgrades.side_flip.verbose_description":"اضرب الطوبة على جانبها الأيمن لتحصل على ضربة كومبو واحدة، لكن تجنب ضربها على الجانب الأيسر لأن ذلك سيُزيل ضربتين كومبو. الضرب من الأعلى والأسفل لا يُجدي نفعًا.","upgrades.side_kick.name":"عسراء","upgrades.side_kick.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة من اليسار، -{{loss}} خلاف ذلك","upgrades.side_kick.verbose_description":"اضرب الطوبة على جانبها الأيسر لتحصل على ضربة كومبو واحدة، لكن تجنب ضربها على الجانب الأيمن لأن ذلك سيُزيل ضربتين كومبو. الضرب من الأعلى والأسفل لا يُجدي نفعًا.","upgrades.skip_last.help_plural":"سوف تنفجر آخر {{lvl}} طوبة.","upgrades.skip_last.name":"تنظيف سهل","upgrades.skip_last.tooltip":"الطوبة الاخيرة سوف تنفجر","upgrades.skip_last.verbose_description":"عليك كسر جميع الطوب للانتقال إلى المستوى التالي. مع ذلك، قد يكون من الصعب الحصول على الطوب الأخير.\\n\\nيمنحك إكمال المستوى مبكرًا خيارات إضافية عند الترقية. كما أن عدم تفويت الطوب أبدًا مفيد جدًا.\\n\\nلذا، إذا واجهت صعوبة في كسر الطوب الأخير، فإن الحصول على هذه الميزة بضع مرات قد يساعدك.","upgrades.slow_down.name":"كرة أبطأ","upgrades.slow_down.tooltip":"الكرة تتحرك بشكل أبطأ","upgrades.slow_down.verbose_description":"تبدأ الكرة ببطء نسبيًا، لكنها ستتسارع قليلًا مع كل مستوى.\\n\\nكما ستتسارع إذا قضيت وقتًا طويلًا في مستوى واحد.\\n\\nهذه الميزة تجعلها أسهل في التحكم.\\n\\nيمكنك الحصول عليها في البداية دائمًا بتفعيل وضع الأطفال في القائمة.","upgrades.smaller_puck.help_plural":"مجموعة مجداف أصغر وقاعدة أعلى","upgrades.smaller_puck.name":"مجداف أصغر","upgrades.smaller_puck.tooltip":"يمنح أيضًا +5 مجموعة أساسية","upgrades.smaller_puck.verbose_description":"هذا يُصغّر حجم المجداف، مما يُسهّل نظريًا بعض الضربات الزاوية، ولكنه في الواقع يزيد من الصعوبة.\\n\\nلهذا السبب ستحصل أيضًا على مكافأة رائعة قدرها +٥ عملات لكل طوبة تُكسرها بعد التقاط هذا.","upgrades.soft_reset.name":"إعادة الضبط الناعمة","upgrades.soft_reset.tooltip":"إعادة تعيين المجموعة تحافظ على {{percent}}%","upgrades.soft_reset.verbose_description":"الحد من تأثير إعادة تعيين المجموعة.","upgrades.streak_shots.name":"سلسلة الضربات","upgrades.streak_shots.tooltip":"مزيد من العملات المعدنية إذا قمت بكسر العديد من الطوب قبل القفز على المجداف.","upgrades.streak_shots.verbose_description":"في كل مرة تكسر فيها لبنة، تزداد مجموعتك بمقدار واحد.\\n\\nولكن، بمجرد أن تلمس الكرة مضربك، تُعاد المجموعة إلى قيمتها الافتراضية.\\n\\nبمجرد أن تتجاوز مجموعتك القيمة الأساسية، سيُحاط مضربك بإطار أحمر لتذكيرك بأنه سيدمر مجموعتك إذا لمسته بالكرة.","upgrades.sturdy_bricks.name":"طوب قوي","upgrades.sturdy_bricks.tooltip":"+{{lvl}} من الطوب نقاط الصحة، +{{percent}}% من العملات المعدنية التي تظهر عند الكسر","upgrades.sturdy_bricks.verbose_description":"كل مستوى من هذه الميزة يُضيف نقطة صحة واحدة لجميع الطوب. يمكنك رؤية عدد نقاط الصحة باستخدام ميزة \\"الاستبصار\\". يمكنك زيادة ضرر الكرة بالحصول على ميزة \\"الثاقب\\". كل مستوى من الميزة يُضيف +٥٠٪ من العملات المعدنية.","upgrades.superhot.name":"حار جدًا","upgrades.superhot.tooltip":"يتحرك الزمن عندما ي
