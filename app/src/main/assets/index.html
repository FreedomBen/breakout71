то разблокировали {{count}} привилегий","gameOver.win.summary":"Игра окончена. Вы спрятали {{score}} монет.","gameOver.win.title":"Вы завершили эту игру","help.content":"## Цель\\n\\nПоймайте как можно больше монет на протяжении 7 уровней.\\nМонеты появляются, когда вы разбиваете кирпичи.\\nЛовите их веслом, чтобы увеличить свой счет.\\nВаш счет отображается в правом верхнем углу экрана.\\nНе уроните мяч, иначе игра закончится.\\n\\nУничтожив все кирпичи, вы сможете выбрать улучшение.\\n\\n## Апгрейды\\n\\nВыбранные вами улучшения будут действовать до конца игры.\\nНекоторые из них можно выбирать несколько раз для усиления эффекта.\\nНекоторые помогают в прицеливании или облегчают игру другими способами.\\nНекоторые полезны только в комбинации.\\n\\nВ начале каждой игры вы всегда получаете один апгрейд.\\nЕго иконка будет служить кирпичом первого уровня.\\nВыбрать стартовые апгрейды можно в настройках.\\n\\nМногие апгрейды влияют на ваши комбо.\\n\\n## Комбо\\n\\nВаше \\"комбо\\" - это количество монет, появляющихся при разрушении кирпича.\\nОно отображается на вашем весле, например, x4 означает, что каждый кирпич порождает 4 монеты.\\nБольшинство обновлений, увеличивающих комбо, также добавляют условие для его сброса.\\nкомбо также сбрасывается, если мяч возвращается к ракетке, не задев кирпич.\\n\\nВ этом случае появится сообщение \\"промах\\".\\n\\nСтарайтесь каждый раз целиться в кирпич.\\n\\n## Прицеливание\\n\\nТолько положение мяча на лопатке определяет, как он отскочит.\\nЕсли мяч попадет в центр площадки, он отскочит вертикально вверх.\\nЕсли вы ударите с одной стороны, он отскочит под большим углом.\\nСкорость весла и угол входа не влияют на направление мяча после отскока.\\n\\nМожно открыть множество улучшений, помогающих в прицеливании.\\n\\n## разблокирует\\n\\nПри первой игре в Breakout 71 большинство обновлений и уровней заблокированы.\\nМодификации можно разблокировать, просто играя и собирая много монет.\\nПервые уровни разблокируются при достижении высокого результата.\\nПоследующие уровни добавляют условие, по которому вы можете выбрать те или иные привилегии.\\n\\nДобиваться высоких результатов гораздо проще, если после каждого уровня вы получаете несколько обновлений.\\n\\n## Повторные прокачки и бесплатные улучшения\\n\\nВы получите дополнительный апгрейд, если будете играть хорошо:\\n\\n- Пройдите уровень за {{levelTimeGood}} секунд\\n- Ударьте по бокам или сверху менее {{wallBouncedGood}} раз\\n- Поймайте {{catchRateGood}}% монет\\n- Пропустите кирпичи менее {{missesGood}} раз\\n\\nВы также получите повторную прокачку, которая позволит вам пропустить обновления, если вы справитесь с заданием еще лучше:\\n\\n- Пройдите уровень за {{levelTimeBest}} секунды\\n- Ударьте по бокам или сверху менее {{wallBouncedBest}} раз\\n- Поймать {{catchRateBest}}% монет\\n- Промахнитесь по кирпичам менее {{missesBest}} раз\\n\\nОпция в настройках позволяет отображать эту статистику","help.help":"Узнайте больше об игре","help.levels":"Уровни","help.title":"Помощь","help.upgrades":"## Обновления","history.columns.score":"Оценка","history.columns.started":"Дата","history.help":"Посмотрите свои {{count}} лучшие игры.","history.locked":"Сыграйте не менее десяти игр, чтобы разблокировать","history.title":"История побегов","lab.help":"Попробуйте любую сборку.","lab.instructions":"Выберите апгрейды ниже, а затем выберите уровень для игры.","lab.menu_entry":"Творческий режим","lab.reset":"Сбросить все в 0","lab.select_level":"Выберите уровень для игры","lab.unlocks_at":"Открывается при общем количестве очков {{score}}","level_up.after_buttons":"Вы только что закончили уровень {{level}}/{{max}}.","level_up.before_buttons":"Вы поймали {{score}} монет {{catchGain}} из {{levelSpawnedCoins}} за {{time}} секунды {{timeGain}}.\\n\\nВы промахнулись {{levelMisses}} раз {{missesGain}} и ударились о стены или потолок {{levelWallBounces}} раз{{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Постарайтесь поймать все монеты, ngs.record_help":"Получите видеозапись каждого уровня.","settings.red_miss":"Мисс предупреждение","settings.red_miss_help":"Покажите красные частицы вокруг мячей, падающих без попадания.","settings.reset":"Перезагрузка игры","settings.reset_cancel":"Нет","settings.reset_confirm":"Да","settings.reset_help":"Сотрите высокий результат, время игры и статистику","settings.reset_instruction":"Вы потеряете весь прогресс, достигнутый в игре, вы уверены?","settings.save_file_error":"Ошибка при загрузке файла сохранения","settings.save_file_loaded":"Сохранить загруженный файл","settings.save_file_loaded_help":"Теперь приложение перезагрузится, чтобы применить ваше сохранение","settings.save_file_loaded_ok":"OK","settings.show_fps":"Счетчик FPS","settings.show_fps_help":"Контролируйте работу приложения","settings.show_stats":"Показывайте статистику в реальном времени","settings.show_stats_help":"Монеты, время, отскоки, промахи","settings.sounds":"Звуки игры","settings.sounds_help":"Может замедлять работу некоторых телефонов.","starting_perks.checked":"Когда вы начнете новую игру, вам будет дано одно из этих преимуществ. Щелкните по перку, чтобы исключить его.","starting_perks.help":"Выберите возможные стартовые апгрейды","starting_perks.random":"Все преимущества были убраны, выбор будет случайным.","starting_perks.title":"Стартовые привилегии","starting_perks.unchecked":"Приведенные ниже привилегии не предлагаются в качестве стартовых, но вы можете нажать на них, чтобы добавить в пул.","unlocks.greyed_out_help":"Выделенные серым апгрейды можно разблокировать, увеличив общее количество очков. Общий счет увеличивается каждый раз, когда вы набираете очки в игре.","unlocks.intro":"Ваш общий счет составляет {{ts}}. Ниже представлены все обновления и уровни, которые предлагает игра.   Нажмите на апгрейд или уровень ниже, чтобы начать тестовую игру с ним.","unlocks.just_unlocked":"Уровень разблокирован","unlocks.just_unlocked_plural":"Вы только что разблокировали {{count}} уровней","unlocks.level":"<h2>Вы разблокировали {{unlocked}} уровней из {{out_of}}</h2>\\n<p>Здесь представлены все уровни игры, нажмите на один из них, чтобы опробовать его.</p> ","unlocks.level_description":"Уровень {{size}}x{{size}} с {{bricks}} кирпичами, {{colors}} цветами и {{bombs}} бомбами.","unlocks.minScore":"Достигните ${{minScore}} в беге, чтобы разблокировать игру.","unlocks.minScoreWithPerks":"Достигните ${{minScore}} в беге с {{required}} , но без {{forbidden}} для разблокировки.","unlocks.minTotalScore":"Накопите в общей сложности ${{score}}","unlocks.reached":"Ваш лучший результат - {{reached}}.","unlocks.title_upgrades":"Вы разблокировали {{unlocked}} обновлений из {{out_of}}","upgrades.addiction.name":"Наркомания","upgrades.addiction.tooltip":"+{{lvl}} комбо / кирпич, комбо сбрасывается на {{delay}}с после разрушения кирпича.","upgrades.addiction.verbose_description":"Отсчет начинается только после разрушения первого кирпича на каждом уровне. Он остановится, как только все кирпичи будут уничтожены.","upgrades.asceticism.name":"Аскетизм","upgrades.asceticism.tooltip":"+{{combo}} комбо/кирпич, - {{combo}} при ловле монет","upgrades.asceticism.verbose_description":"Вам нужно будет где-то хранить монеты, пока ваш комбо поднимается.","upgrades.ball_attract_ball.help_plural":"Более сильная сила притяжения","upgrades.ball_attract_ball.name":"Гравитация","upgrades.ball_attract_ball.tooltip":"Мячи притягивают мячи","upgrades.ball_attract_ball.verbose_description":"Шары, находящиеся на расстоянии более \\"3/4 ширины игровой зоны\\", начнут притягиваться друг к другу.\\n\\nСила притяжения сильнее, когда они находятся на наибольшем расстоянии друг от друга.\\n\\nРадужные частицы будут летать, символизируя силу притяжения. Это преимущество можно получить, только если у вас уже есть более одного шара.","upgrades.ball_attracts_coins.name":"Шарики притягивают монеты","upgrades.ball_attracts_coins.tooltip":"Монеты следуют за ближайшим шаром и падают медленнее","upgrades.ball_attracts_coins.verbose_description":"Это можно использовать, чтобы \\"раскрасить\\" шарики монетами, если совместить это с \\"пятном\\" и \\"призрачными монетами\\". Это также подходит в качестве замены магнита для монет.","upgrades.ball_repulse_ball.help_plural":"Более сильные силы отталкивания","upgrades.ball_repulse_ball.name":"Личное пространство","upgrades.ball_repulse_ball.tooltip":"Шарики отталкиваются от шариков","upgrades.ball_repulse_ball.verbose_description":"Шарики, находящиеся на расстоянии менее четверти ширины экрана, начнут отталкиваться друг от друга. Сила отталкивания будет сильнее, если они находятся близко друг к другу. Частицы будут вылетать из шара, символизируя действие этой силы. Эта возможность доступна только в том случае, если у вас уже есть несколько шаров.","upgrades.base_combo.name":"Прочный фундамент","upgrades.base_combo.tooltip":"Комбо начинается с {{coins}} вместо 1.","upgrades.base_combo.verbose_description":"Обычно ваше комбо начинается с 1 в начале уровня и сбрасывается до 1, когда вы подпрыгиваете, не попадая ни во что. С этим перком комбо начинается на 3 пункта выше, поэтому вы всегда будете получать не менее 4 монет за кирпич. Когда ваше комбо обнулится, оно вернется к 4, а не к 1. Ваш шарик будет немного блестеть, чтобы показать, что его комбо выше единицы.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Большие взрывы","upgrades.bigger_explosions.verbose_description":"Взрыв по умолчанию очищает квадрат 3x3, с этим взрывом он становится квадратом 5x5, а удар по монетам также значительно сильнее. После каждого взрыва экран будет мигать (кроме базового режима).","upgrades.bigger_puck.name":"Большое весло","upgrades.bigger_puck.tooltip":"Легко поймать больше монет.","upgrades.bigger_puck.verbose_description":"Большее весло позволяет никогда не промахиваться по мячу и ловить больше монет, а также точно определять угол отскока (угол наклона мяча зависит только от того, куда он попадает при ударе о весло).","upgrades.bricks_attract_ball.name":"Кирпичи притягивают мячи","upgrades.bricks_attract_ball.tooltip":"Мяч летит к первым {{count}} кирпичам, которых он коснется.","upgrades.bricks_attract_ball.verbose_description":"Эффект сильнее на более высоких уровнях. Количество кирпичей, которые могут ударить до того, как эффект прекратится, также больше. Эффект возобновляется, когда мяч касается шайбы.","upgrades.bricks_attract_coins.name":"Кирпичи притягивают монеты","upgrades.bricks_attract_coins.tooltip":"Помогает им оставаться на вершине","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Ясновидящий","upgrades.clairvoyant.tooltip":"Просматривайте предстоящие уровни, количество кирпичей и направление движения мяча","upgrades.clairvoyant.verbose_description":"Поможет выбрать правильные апгрейды и понять, что происходит с прочными кирпичами. Уровни 2 и 3 дают дополнительные знания сомнительной полезности (достигаются в режиме цикла)","upgrades.coin_magnet.help_plural":"Более сильное воздействие на монеты","upgrades.coin_magnet.name":"Магнит для монет","upgrades.coin_magnet.tooltip":"Лопасть притягивает монеты","upgrades.coin_magnet.verbose_description":"Направляет монеты к лопатке. Эффект будет сильнее, если монета уже находится рядом с ним.","upgrades.compound_interest.name":"Сложные проценты","upgrades.compound_interest.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич, сбрасывается при потере монеты","upgrades.compound_interest.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо будет увеличиваться на одну монету, и с каждым разбитым кирпичом будет появляться все больше и больше монет.\\nОднако не забывайте ловить все монеты лопаткой, так как любая потерянная монета обнулит ваше комбо.\\nКак только ваше комбо превысит минимальный уровень, в нижней части игрового поля появится красная линия, напоминающая вам, что монеты не должны попадать туда.","upgrades.concave_puck.name":"Вогнутое весло","upgrades.concave_puck.tooltip":"Повышает точность вертикальной наводки","upgrades.concave_puck.verbose_description":"Мячи начинают уровень, поднимаясь прямо вверх, и отскакивают под меньшим углом.","upgrades.corner_shot.name":"Угловой удар","upgrades.corner_shot.tooltip":"Позволяет накладывать паддл на границы экрана","upgrades.corner_shot.verbose_description":"Помогает прицеливаться на поворотах. Дальние уровни позволят вам выйти дальше.","upgrades.etherealcoins.name":"Монеты, в космосе","upgrades.etherealcoins.tooltip":"На монеты больше не действует гравитация","upgrades.etherealcoins.verbose_description":"Монеты сохранят свою скорость даже после нескольких подпрыгиваний, и на них больше не будет действовать гравитация.","upgrades.extra_levels.name":"Еще 5 минут","upgrades.extra_levels.tooltip":"Играйте {{count}} уровней вместо 7","upgrades.extra_levels.verbose_description":"По умолчанию игра может длиться максимум 7 уровней, после чего игра заканчивается.\\n\\nКаждый уровень этой привилегии позволяет вам подняться на один уровень выше. Последние уровни часто являются теми, где вы набираете больше всего очков, так что разница может быть значительной.","upgrades.extra_life.help_plural":"Ваш (последний) мяч отскочит на дно, а не будет потерян ({{lvl}} раз).","upgrades.extra_life.name":"Экстра жизнь","upgrades.extra_life.tooltip":"Мяч отскочит один раз на нижнюю линию, после чего будет потерян.","upgrades.extra_life.verbose_description":"Обычно у вас один шар, и игра заканчивается, как только вы его бросите.\\n\\nЭто преимущество добавляет белую полоску в нижней части экрана, которая сохранит шарик один раз и разобьется в процессе.\\n\\nВы будете терять один уровень этого перка каждый раз, когда мяч будет отскакивать в нижнюю часть экрана.","upgrades.forgiving.name":"Прощение","upgrades.forgiving.tooltip":"Пропущенные паузы уменьшают комбо постепенно, а не все сразу.","upgrades.forgiving.verbose_description":"Первый промах за уровень - бесплатно, затем 10% от комбо, затем 20%.","upgrades.fountain_toss.name":"Бросок фонтана","upgrades.fountain_toss.tooltip":"Получите несколько комбо, когда пропустите несколько монет.","upgrades.fountain_toss.verbose_description":"Если вы пропустили монету и ваша комбо была меньше {{max}}, то вероятность того, что ваша комбо вырастет на {{lvl}}/ комбо вырастет на единицу.","upgrades.ghost_coins.name":"Призрачные монеты","upgrades.ghost_coins.tooltip":"Монеты медленно проходят сквозь кирпичи","upgrades.ghost_coins.verbose_description":"Это не ошибка, это особенность!  Монеты пролетают сквозь кирпичи медленно. На более высоких уровнях они движутся быстрее.","upgrades.helium.name":"Гелий","upgrades.helium.tooltip":"Гравитация изменяется слева и справа от весла","upgrades.helium.verbose_description":"Это повлияет на монеты и позволит им плавать до тех пор, пока вы не соберете их.","upgrades.hot_start.name":"Горячий старт","upgrades.hot_start.tooltip":"Начните с комбо {{start}}, -{{loss}} комбо в секунду","upgrades.hot_start.verbose_description":"В начале каждого уровня ваше комбо будет начинаться с +30 очков, но затем каждую секунду оно будет уменьшаться на одно. Эффект суммируется с другими перками.","upgrades.hypnosis.name":"Гипноз","upgrades.hypnosis.tooltip":"Когда кирпич меняет цвет, телепортируйте монету на ближайший шар и перезарядите её способность окрашивать кирпич.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Имплозии","upgrades.implosions.tooltip":"Взрывы всасывают монеты, а не выдувают их.","upgrades.implosions.verbose_description":"Сила взрыва действует в обратном направлении. Дальние уровни действуют как \\"больший взрыв\\".","upgrades.instant_upgrade.name":"Мгновенное обновление","upgrades.instant_upgrade.tooltip":"+2 апгрейда сейчас, -1 выбор до конца игры.","upgrades.instant_upgrade.verbose_description":"Сразу же выберите два апгрейда, чтобы получить один бесплатный и один в качестве компенсации за тот, что был использован для получения этого перка. В каждом последующем меню выбора апгрейдов будет все меньше вариантов.","upgrades.left_is_lava.name":"Избегайте левой стороны","upgrades.left_is_lava.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич. Комбо сбрасывается, если мяч попадает в левую часть экрана","upgrades.left_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один, так что вы получите на одну монету больше со всех следующих разбитых кирпичей.\\n\\nОднако ваше комбо обнуляется, как только ваш шарик попадает в левую сторону.\\n\\nКак только ваше комбо увеличится, левая сторона станет красной, чтобы напомнить вам, что вы должны избегать столкновения с ней.\\n","upgrades.limitless.name":"Безграничный","upgrades.limitless.tooltip":"Повысьте максимальный уровень всех апгрейдов на {{lvl}} .","upgrades.limitless.verbose_description":"Выбрав это умение, вы также повышаете свой собственный лимит на один, что позволяет вам выбрать его снова.","upgrades.metamorphosis.name":"Метаморфозы","upgrades.metamorphosis.tooltip":"Каждая монета может окрасить {{lvl}} кирпичей в свой цвет","upgrades.metamorphosis.verbose_description":"С этим перком монеты будут иметь цвет кирпича, из которого они появились, и окрасят первый кирпич, которого они коснутся, в тот же цвет. Монеты рождаются со скоростью разбившего их шара, а значит, вы можете немного прицелиться в направлении кирпичей, которые хотите \\"раскрасить\\". На первом уровне каждая монета может окрасить 1 кирпич, прежде чем она будет \\"потрачена\\" и появится в пустоте.","upgrades.minefield.name":"Минное поле","upgrades.minefield.tooltip":"+{{lvl}} комбо за каждый кирпич с бомбой на экране","upgrades.minefield.verbose_description":"Добавляет +lvl к комбо, когда кирпич находится на месте, -lvl, когда он уничтожается, и повышает базовое комбо на количество кирпичей, умноженное на lvl.","upgrades.multiball.name":"Мультишар","upgrades.multiball.tooltip":"Начинайте каждый уровень с {{count}} шариков.","upgrades.multiball.verbose_description":"Как только вы бросите мяч в игре Breakout 71, вы проиграете.\\n\\nС этим преимуществом вы получаете два мяча, поэтому можете позволить себе потерять один.\\n\\nПотерянные мячи возвращаются на следующем уровне.\\n\\nНаличие более одного шара делает доступными некоторые дополнительные преимущества и, конечно, позволяет быстрее пройти уровень.","upgrades.nbricks.name":"Строгий размер выборки","upgrades.nbricks.tooltip":"Попадите точно в {{lvl}} кирпичей за один удар веслом, чтобы получить +{{lvl}} комбо, иначе оно сбрасывается.","upgrades.nbricks.verbose_description":"Вам не обязательно уничтожать кирпичи, но вы должны попасть в них. Кирпичи, разрушенные взрывами, не считаются.","upgrades.one_more_choice.name":"Дополнительный выбор","upgrades.one_more_choice.tooltip":"При дальнейшем повышении уровня будет предложено на {{lvl}} больше вариантов в списке","upgrades.one_more_choice.verbose_description":"В каждом меню апгрейдов появится еще одна опция.  Это не увеличивает количество апгрейдов, которые вы можете выбрать.","upgrades.passive_income.name":"Пассивный доход","upgrades.passive_income.tooltip":"+{{lvl}} комбо/кирпич, если только паддл не двигался в течение последних {{time}}с, тогда он сбрасывается.","upgrades.passive_income.verbose_description":"Некоторые привилегии могут помочь шарам делать то, что вы хотите, без необходимости что-либо предпринимать.","upgrades.picky_eater.name":"Придирчивый едок","upgrades.picky_eater.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич, сбрасывается при смене цвета шара","upgrades.picky_eater.verbose_description":"Когда вы разбиваете кирпич того же цвета, что и ваш шарик, ваше комбо увеличивается на единицу.\\nЕсли кирпич другого цвета, то мяч принимает новый цвет, но комбо обнуляется, если только не осталось кирпичей того же цвета, что и мяч.\\nКак только вы получите комбо выше минимального, кирпичи неправильного цвета будут обведены красной рамкой.\\nЕсли у вас больше одного шара, они все меняют цвет, когда один из них попадает в кирпич.","upgrades.pierce.name":"Пирсинг","upgrades.pierce.tooltip":"Мяч пробивает {{count}} кирпичей после отскока от площадки","upgrades.pierce.verbose_description":"Обычно мяч отскакивает, как только коснется чего-нибудь. С этим преимуществом он будет продолжать двигаться по траектории до 3 разбитых кирпичей.\\n\\nПосле этого он отскочит на 4-м кирпиче, и вам нужно будет коснуться лопатки, чтобы сбросить счетчик.","upgrades.pierce_color.name":"Цветной пирсинг","upgrades.pierce_color.tooltip":"+{{lvl}} урона кирпичам цвета шара","upgrades.pierce_color.verbose_description":"Если шарик попадает в кирпич того же цвета, он просто беспрепятственно проходит сквозь него.\\n\\nЕсли он попадет в кирпич другого цвета, то разобьет его, возьмет его цвет и отскочит.\\n\\nЕсли у вас прочные кирпичи, мяч все равно может отскочить от кирпича того же цвета.","upgrades.puck_repulse_ball.help_plural":"Более сильные силы отталкивания","upgrades.puck_repulse_ball.name":"Мягкая посадка","upgrades.puck_repulse_ball.tooltip":"Лопасть отталкивает мячи","upgrades.puck_repulse_ball.verbose_description":"Когда мяч приблизится к лопатке, он начнет замедляться и даже может отскочить, не коснувшись лопатки.","upgrades.rainbow.name":"Радуга","upgrades.rainbow.tooltip":"Монеты спаунятся с радужным цветом.","upgrades.rainbow.verbose_description":"С каждым уровнем увеличивается доля цветных монет. Цвет зависит от времени прохождения уровня.","upgrades.reach.name":"Сверху вниз","upgrades.reach.tooltip":" Прикосновение к N кирпичам самого нижнего ряда сбрасывает комбо. В противном случае +N комбо","upgrades.reach.verbose_description":"Если есть только один ряд кирпичей или если самый нижний ряд кирпичей занимает всю ширину игры, то этот перк ничего не делает. В противном случае, разбив этот самый нижний ряд, вы сбрасываете комбо, а разбив любой другой, увеличиваете комбо на количество кирпичей в этом самом нижнем ряду.\\n\\nСамый нижний ряд будет выделен красным цветом.","upgrades.respawn.name":"Перерождение","upgrades.respawn.tooltip":"{{percent}}% кирпичей перерождаются через {{delay}}с.","upgrades.respawn.verbose_description":"Некоторые эффекты частиц позволят вам узнать, где будут появляться кирпичи.","upgrades.right_is_lava.name":"Избегайте правой стороны","upgrades.right_is_lava.tooltip":"+{{lvl}} комбо на кирпич. Комбо сбрасывается, если мяч попадает в правую часть экрана","upgrades.right_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один, так что вы получите на одну монету больше со всех следующих разбитых кирпичей.\\n\\nОднако, как только ваш шарик попадет в правую сторону, ваша комбинация обнулится.\\n\\nКак только ваше комбо увеличится, правая сторона станет красной, чтобы напомнить вам, что вы должны избегать столкновения с ней.\\n","upgrades.sacrifice.help_l1":"Потеря жизни очищает все кирпичи","upgrades.sacrifice.help_over":"Потеряв жизнь {{lvl}}x, комбо затем очищает все кирпичи.","upgrades.sacrifice.name":"Жертвоприношение","upgrades.sacrifice.verbose_description":"Это может поднять комбо довольно высоко.","upgrades.sapper.help_plural":"Первые разбитые {{lvl}} кирпичей становятся бомбами.","upgrades.sapper.name":"Сапёр","upgrades.sapper.tooltip":"Первый разбитый кирпич превращается в бомбу.","upgrades.sapper.verbose_description":"Вместо того чтобы просто исчезнуть, первый разбитый вами кирпич будет заменен кирпичом с бомбой. Если ударить мячом по лопатке, эффект повторится. Повысив уровень этого умения, вы сможете устанавливать больше бомб.","upgrades.shocks.name":"Шоки","upgrades.shocks.tooltip":"Взрывные столкновения шаров","upgrades.shocks.verbose_description":"Когда два шара сталкиваются, они обмениваются скоростью, порождают взрыв и набирают дополнительную скорость, чтобы разделиться.","upgrades.shunt.name":"Шунт","upgrades.shunt.tooltip":"Сохраняйте {{percent}}% вашего комбо между уровнями","upgrades.shunt.verbose_description":"Если у вас также есть горячий старт, горячий старт просто добавляется к текущему комбо.","upgrades.side_flip.name":"Правая рука","upgrades.side_flip.tooltip":"+{{lvl}} комбо за каждый кирпич, разбитый справа, -{{loss}} в противном случае","upgrades.side_flip.verbose_description":"Ударьте кирпич с правой стороны, чтобы получить одно комбо, но избегайте ударов с левой стороны, так как это снимет 2 комбо. Удары сверху и снизу не дают никакого эффекта.","upgrades.side_kick.name":"Левая рука","upgrades.side_kick.tooltip":"+{{lvl}} комбо за каждый кирпич, разбитый слева, -{{loss}} в противном случае","upgrades.side_kick.verbose_description":"Ударьте кирпич с левой стороны, чтобы получить одно комбо, но избегайте ударов с правой стороны, так как это снимет 2 комбо. Удары сверху и снизу не дают никакого эффекта.","upgrades.skip_last.help_plural":"Последние {{lvl}} кирпичей взорвутся.","upgrades.skip_last.name":"Легкая очистка","upgrades.skip_last.tooltip":"Последний кирпич взорвется.","upgrades.skip_last.verbose_description":"Вам нужно разбить все кирпичи, чтобы перейти на следующий уровень. Однако получить последние может быть непросто.\\n\\nРаннее прохождение уровня дает дополнительные возможности при улучшении. Никогда не пропускать кирпичи также очень полезно.\\n\\nТак что если вам трудно разбить последние кирпичи, получите эту привилегию несколько раз.","upgrades.slow_down.name":"Медленный мяч","upgrades.slow_down.tooltip":"Мяч движется медленнее","upgrades.slow_down.verbose_description":"Мяч стартует относительно медленно, но с каждым уровнем вашей игры он будет стартовать все быстрее.\\n\\nОн также ускорится, если вы проведете много времени на одном уровне.\\n\\nЭто преимущество делает его более управляемым.\\n\\nВы можете получать его каждый раз в начале игры, включив детский режим в меню.","upgrades.smaller_puck.help_plural":"Еще меньшее весло и более высокий базовый комбо","upgrades.smaller_puck.name":"Маленькое весло","upgrades.smaller_puck.tooltip":"Также дает +5 базовых комбо","upgrades.smaller_puck.verbose_description":"Это уменьшает размер лепестка, что теоретически облегчает некоторые угловые удары, но на самом деле лишь повышает сложность игры.\\n\\nПоэтому вы также получите приятный бонус в виде +5 монет за кирпич за все кирпичи, которые вы разобьете после этого.","upgrades.soft_reset.name":"Мягкий сброс","upgrades.soft_reset.tooltip":"Комбо-сброс сохраняет {{percent}}%","upgrades.soft_reset.verbose_description":"Ограничьте влияние комбо-сброса.","upgrades.streak_shots.name":"Попадание в полосу","upgrades.streak_shots.tooltip":"Больше монет, если вы разобьете много кирпичей, прежде чем подпрыгнуть на лопатке.","upgrades.streak_shots.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на единицу.\\n\\nОднако как только мяч коснется вашего весла, комбо будет сброшено до стандартного значения.\\n\\nКак только ваше комбо поднимется выше базового значения, на лопатке появится красная рамка, напоминающая о том, что прикосновение мяча к ней уничтожит ваше комбо.","upgrades.sturdy_bricks.name":"Прочные кирпичи","upgrades.sturdy_bricks.tooltip":"+{{lvl}} кирпичей HP, +{{percent}}% монет, выпадающих при разрушении","upgrades.sturdy_bricks.verbose_description":"Каждый уровень этого перка добавляет один HP ко всем кирпичам. Вы можете увидеть количество HP с помощью перка \\"Ясновидящий\\". Вы можете увеличить урон от шаров, получив перк \\"Пронзающий\\". Каждый уровень этого перка добавляет +50% к спауну монет.","upgrades.superhot.name":"СУПЕР ГОРЯЧИЙ","upgrades.superhot.tooltip":"Время движется, когда движется весло.","upgrades.superhot.verbose_description":"СУПЕР ГОРЯЧИЙ СУПЕР ГОРЯЧИЙ СУПЕР ГОРЯЧИЙ СУПЕР ГОРЯЧИЙ","upgrades.telekinesis.help_plural":"Более сильное воздействие на мяч","upgrades.telekinesis.name":"Телекинез","upgrades.telekinesis.tooltip":"Паддл управляет траекторией полета мяча","upgrades.telekinesis.verbose_description":"Вы управляете мячом, пока он поднимается вверх.","upgrades.top_is_lava.name":"Небо - это предел","upgrades.top_is_lava.tooltip":"+{{lvl}} комбо за кирпич, сбрасывается при ударе сверху","upgrades.top_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один. Однако, как только ваш мяч попадет в верхнюю часть экрана, комбо обнуляется.\\n\\nКогда ваше комбо превысит минимальное значение, вверху появится красная полоска, напоминающая о том, что вам следует избегать ударов.","upgrades.trampoline.name":"Батут","upgrades.trampoline.tooltip":"+{{lvl}} комбо за отскок, -{{lvl}} комбо за отскок на любой границе","upgrades.trampoline.verbose_description":"Одно из редких комбо-улучшений, которое не добавляет условие сброса.","upgrades.transparency.name":"Прозрачность","upgrades.transparency.tooltip":"Чем выше шарик находится на экране, тем прозрачнее он становится. Чем прозрачнее шар, тем больше монет он приносит.","upgrades.transparency.verbose_description":"Более высокие уровни делают шар прозрачным быстрее и увеличивают бонус за очки.","upgrades.trickledown.name":"Экономика по принципу \\"копеечной монеты","upgrades.trickledown.tooltip":"Монеты появляются в верхней части экрана.","upgrades.trickledown.verbose_description":"Это может помочь вам отложить несколько монет.","upgrades.unbounded.name":"Набивка","upgrades.unbounded.tooltip":"Добавляет пространство слева и справа от уровня, но ваше весло не может пройти так далеко.","upgrades.unbounded.verbose_description":"Еще одна модернизация может помочь вам увеличить радиус действия весла.","upgrades.viscosity.name":"Вязкость","upgrades.viscosity.tooltip":"Медленное падение монет","upgrades.viscosity.verbose_description":"Монеты обычно разгоняются с помощью гравитации и взрывов до довольно высоких скоростей.\\n\\nЭтот перк постоянно заставляет их замедляться, как будто они находятся в какой-то вязкой жидкости.\\n\\nЭто облегчает их поимку и отлично сочетается с перками, влияющими на движение монет.","upgrades.wind.help_plural":"Более сильная сила ветра","upgrades.wind.name":"Ветер","upgrades.wind.tooltip":"Положение весла создает ветер","upgrades.wind.verbose_description":"Ветер зависит от положения лопасти: левая дует влево, правая - вправо. Влияет как на шарики, так и на монеты.","upgrades.yoyo.name":"Йо-йо","upgrades.yoyo.tooltip":"Мяч падает на лопатку","upgrades.yoyo.verbose_description":"Это противоположность телекинезу: управляйте мячом, пока он падает обратно.","upgrades.zen.name":"Дзен","upgrades.zen.tooltip":"+{{lvl}} комбо за кирпич, сбрасывается при взрыве","upgrades.zen.verbose_description":"В конце концов, это ненасильственная игра."}');var C={};C=JSON.parse('{"confirmRestart.no":"Cancelar","confirmRestart.text":"Estás a punto de empezar un nuevo partido: ¿es esto realmente lo que querías?","confirmRestart.title":"¿Empezar una nueva partida?","confirmRestart.yes":"Empezar una nueva partida","gameOver.creative":"Esta parte de la prueba no se grabará.","gameOver.cumulative_total":"Su puntuación total acumulada ha pasado de {{startTs}} a {{endTs}}.","gameOver.lost.summary":"Se te ha caído la bola después de coger {{score}} monedas.","gameOver.lost.title":"Pelota perdida","gameOver.stats.balls_lost":"Balas perdidas","gameOver.stats.bricks_broken":"Ladrillos rotos","gameOver.stats.bricks_per_minute":"Ladrillos rotos por minuto","gameOver.stats.catch_rate":"Monedas atrapadas","gameOver.stats.combo_avg":"Combo medio","gameOver.stats.combo_max":"Combinación máxima","gameOver.stats.duration_per_level":"Duración por nivel","gameOver.stats.hit_rate":"Precisión","gameOver.stats.intro":"A continuación se muestran las estadísticas de este juego en comparación con sus {{count}} mejores juegos.","gameOver.stats.level_reached":"Nivel alcanzado","gameOver.stats.total_score":"Puntuación total","gameOver.stats.upgrades_applied":"Mejoras aplicadas","gameOver.stats_intro":"Encuentra a continuación tus estadísticas de juego comparadas con tus {{count}} mejores juegos.","gameOver.unlocked_perk":"Actualización desbloqueada","gameOver.unlocked_perk_plural":"Has desbloqueado {{count}} mejoras","gameOver.win.summary":"Este juego ha terminado. Has acumulado {{score}} monedas.","gameOver.win.title":"Ha completado esta parte","help.content":"## Objetivo\\n\\nAtrapa tantas monedas como puedas durante 7 niveles.\\nLas monedas aparecen al romper ladrillos.\\nAtrápalas con tu pala para aumentar tu puntuación.\\nTu puntuación se muestra en la esquina superior derecha de la pantalla.\\nNo dejes caer la bola o se acabará la partida.\\n\\nDespués de destruir todos los ladrillos, podrás elegir una mejora.\\n\\n## Mejoras\\n\\nLas mejoras que elijas se aplicarán hasta el final de la partida.\\n\\nAlgunas se pueden elegir varias veces para un efecto más potente.\\nAlgunas ayudan a apuntar o facilitan el juego de otras maneras.\\n\\nAlgunas solo son útiles al combinarlas.\\n\\nSiempre obtienes una mejora al principio de cada partida.\\n\\nSu icono servirá como los ladrillos del primer nivel.\\n\\nPuedes seleccionar las mejoras iniciales en la configuración.\\n\\nMuchas mejoras afectan a tu combo.\\n\\n## Combo\\n\\nTu \\"combo\\" es la cantidad de monedas que se generan al romper un ladrillo. Se muestra en tu paleta; por ejemplo, x4 significa que cada ladrillo generará 4 monedas.\\nLa mayoría de las mejoras que aumentan el combo también añaden una condición para reiniciarlo.\\nEl combo también se reiniciará si la pelota regresa a la paleta sin tocar ningún ladrillo.\\nSe mostrará un mensaje de \\"fallo\\" cuando esto ocurra.\\n\\nIntenta apuntar a un ladrillo siempre.\\n\\n## Apuntar\\n\\nSolo la posición de la pelota en la paleta determina cómo rebotará.\\nSi la pelota impacta en el centro de la paleta, rebotará verticalmente.\\n\\nSi golpeas más hacia un lado, tendrá mayor ángulo.\\n\\nLa velocidad de la paleta y el ángulo de entrada no afectan la dirección de la pelota después de rebotar.\\n\\nSe pueden desbloquear muchas mejoras que ayudan a apuntar.\\n\\n## Desbloqueos\\n\\nAl jugar Breakout 71 por primera vez, la mayoría de las mejoras y niveles están bloqueados.\\nLas mejoras se desbloquean simplemente jugando y atrapando muchas monedas.\\n\\nLos primeros niveles se desbloquean al alcanzar una puntuación alta. Los niveles posteriores añaden una condición sobre las ventajas que puedes seleccionar.\\n\\nAlcanzar puntuaciones altas es mucho más fácil si consigues varias mejoras después de cada nivel.\\n\\n## Repeticiones y mejoras gratuitas\\n\\nRecibirás una mejora adicional si juegas bien:\\n\\n- Completa el nivel en menos de {{levelTimeGood}} segundos\\n- Golpea los lados o la parte superior menos de {{wallBouncedGood}} veces\\n- Atrapa el {{catchRateGood}}% de monedas\\n- Falla los ladrillos menos de {{missesGood}} veces\\n\\nTambién recibirás una repetición que te permite saltarte mejoras si lo haces aún mejor:\\n\\n- Completa un nivel en menos de {{levelTimeBest}} segundos\\n- Golpea los lados o la parte superior menos de {{wallBouncedBest}} veces\\n- Atrapa el {{catchRateBest}}% de monedas\\n- Falla los ladrillos menos de {{missesBest}} veces\\n\\nUna opción en la configuración te permite ver estas estadísticas","help.help":"Descubre más sobre el juego","help.levels":"Niveles","help.title":"Ayuda","help.upgrades":"## Actualizaciones","history.columns.score":"Puntuación","history.columns.started":"Fecha","history.help":"Enumera tus {{count}} mejores juegos.","history.locked":"Juega primero al menos diez partidos","history.title":"Historia","lab.help":"Prueba cualquier combinación de mejoras y niveles.","lab.instructions":"Selecciona las mejoras que aparecen a continuación y elige el nivel al que quieres jugar. .","lab.menu_entry":"Modo creativo","lab.reset":"Eliminar todas las mejoras","lab.select_level":"Selecciona un nivel para jugar","lab.unlocks_at":"Desbloqueado a partir de una puntuación total de {{score}}.","level_up.after_buttons":"Acabas de completar el nivel {{level}}/{{max}}.","level_up.before_buttons":"Has cogido {{score}} monedas {{catchGain}} en {{levelSpawnedCoins}} en {{time}} segun \nAtrapa tantas monedas como puedas a lo largo de los 7 niveles.\\nLas monedas aparecen cuando rompes ladrillos.\\nAtrápalas con tu disco para aumentar tu puntuación.\\nTu puntuación aparece en la parte superior derecha de la pantalla.\\nNo dejes caer la bola o se acaba el juego.\\n\\nCuando hayas roto todos los ladrillos, podrás elegir una mejora.\\n\\n## Mejoras\\n\\nLas mejoras que elijas serán válidas hasta el final del juego.\\nAlgunas pueden seleccionarse varias veces para conseguir un efecto más potente.\\nOtras ayudan a apuntar o simplifican el juego.\\nAlgunas sólo son útiles cuando se combinan.\\n\\nSiempre obtienes una mejora al principio de cada partida.\\nSu icono forma los ladrillos del primer nivel.\\nPuedes seleccionar las mejoras iniciales en los ajustes.\\n\\nMuchas mejoras influyen en tu combo.\\n\\n## Combo\\n\\nTu \'combo\' es el número de monedas generadas cuando se rompe un ladrillo.\\nSe muestra en tu disco. Por ejemplo, x4 significa que cada ladrillo genera 4 monedas.\\n\\nLa mayoría de las mejoras que aumentan el combo también añaden una condición para restablecerlo.\\nEl combo también se reinicia si la pelota vuelve a la raqueta sin golpear un ladrillo.\\nEntonces se muestra un mensaje de \\"Fallado\\".\\n\\nIntenta golpear un ladrillo en cada rebote.\\n\\n## Apuntar\\n\\nSólo la posición de la pelota en la raqueta determina su ángulo de rebote.\\nSi la pelota golpea la raqueta en el centro, rebotará verticalmente.\\nSi golpea hacia un lado de la raqueta, el ángulo será mayor.\\nLa velocidad de la raqueta y el ángulo de incidencia de la pelota no tienen ningún efecto.\\n\\nSe pueden desbloquear varias mejoras de puntería.\\n\\n## Desbloqueo\\n\\nCuando juegas a Breakout 71 por primera vez, la mayoría de las mejoras y niveles están bloqueados.\\nLas mejoras se desbloquean simplemente jugando y cogiendo muchas monedas.\\nLos primeros niveles se desbloquean consiguiendo una puntuación alta.\\nLos niveles posteriores añaden una condición a las ventajas seleccionadas.\\n\\nConseguir puntuaciones altas es mucho más fácil cuando obtienes varias mejoras después de cada nivel.\\n\\n## Reintentos y mejoras gratis\\n\\nConseguirás una mejora extra si juegas bien:\\n\\n- Completa el nivel en menos de {{levelTimeGood}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedGood}} veces\\n- Atrapa el {{catchRateGood}}% de las monedas\\n- Pierde los ladrillos menos de {{missesGood}} veces\\n\\nTambién obtendrás un potenciador que te permitirá ignorar las mejoras si lo haces aún mejor:\\n\\n- Completa un nivel en menos de {{levelTimeBest}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedBest}} veces\\n- Atrapa {{catchRateBest}} de monedas\\n- Pierde ladrillos menos de {{missesBest}} veces\\n\\nUna opción en los ajustes te permite mostrar estas estadísticas","main_menu.help_help":"Descubra el juego en detalle","main_menu.help_title":"Ayuda","main_menu.help_upgrades":"## Mejoras","main_menu.high_score":"Puntuación máxima : {{score}}","main_menu.kid":"Modo Niños","main_menu.kid_help":"Bola más lenta","main_menu.language":"Idioma","main_menu.language_help":"Cambiar el idioma de la pantalla","main_menu.load_save_file":"Cargar una copia de seguridad","main_menu.load_save_file_help":"Desde un archivo","main_menu.max_coins":"{{max}} partes mostradas máximo","main_menu.max_coins_help":"Sólo visual, sin impacto en la puntuación","main_menu.max_particles":" {{max}} partículas máximas","main_menu.max_particles_help":"Limita el número de partículas mostradas en pantalla para efectos visuales","main_menu.mobile":"Modo móvil","main_menu.mobile_help":"Deja un espacio debajo de la raqueta.","main_menu.normal":"Pieza nueva","main_menu.normal_help":"Con una ventaja inicial aleatoria","main_menu.pointer_lock":"Bloqueo de puntero","main_menu.pointer_lock_help":"También oculta el cursor del ratón.","main_menu.record":"Grabar vídeos de partidos","main_menu.record_download":"Descargar el vídeo ({{size rting_perks.checked":"Al empezar una partida nueva, recibirás una de esas ventajas. Haz clic en una ventaja para excluirla.","starting_perks.help":"Elija posibles actualizaciones iniciales","starting_perks.random":"Se han eliminado todos los beneficios, la elección será aleatoria.","starting_perks.title":"Beneficios iniciales","starting_perks.unchecked":"Los beneficios a continuación no se ofrecen como beneficios iniciales, pero puedes hacer clic para agregarlos al grupo.","unlocks.greyed_out_help":"Los objetos en gris pueden desbloquearse aumentando tu puntuación total. La puntuación total aumenta cada vez que consigues puntos en el juego.","unlocks.intro":"Tu puntuación total es {{ts}}. A continuación encontrarás todas las mejoras y niveles que ofrece el juego. Haz clic en uno de ellos para probarlo en una partida de prueba.","unlocks.just_unlocked":"Nivel desbloqueado","unlocks.just_unlocked_plural":"Acabas de desbloquear {{count}} niveles","unlocks.level":"<h2>Has desbloqueado {{unlocked}} niveles en {{out_of}}</h2>\\n<p>Aquí están todos los niveles del juego, haz clic en uno para probarlo. </p> ","unlocks.level_description":"Un nivel {{size}}x{{size}} con {{bricks}} ladrillos, {{colors}} colores y {{bombs}} bombas.","unlocks.minScore":"Alcanza una puntuación de ${{minScore}} en una partida para desbloquearla.","unlocks.minScoreWithPerks":"Alcanzar ${{minScore}} en un juego con {{required}} pero sin {{forbidden}}.","unlocks.minTotalScore":"Acumula un total de ${{score}}","unlocks.reached":"Tu mejor puntuación hasta ahora es {{reached}}.","unlocks.title_upgrades":"Has desbloqueado {{unlocked}} mejoras en {{out_of}}.","upgrades.addiction.name":"Adicción","upgrades.addiction.tooltip":"+{{lvl}} combo / ladrillo, combo perdido después de {{delay}}s sin romper ningún ladrillo","upgrades.addiction.verbose_description":"La cuenta atrás sólo comienza una vez que se ha destruido el primer ladrillo del nivel, y se detiene en cuanto no hay más ladrillos.","upgrades.asceticism.name":"Ascetismo","upgrades.asceticism.tooltip":"+{{combo}} combo por ladrillo roto, - {{combo}} cuando una pieza es atrapada","upgrades.asceticism.verbose_description":"Tendremos que encontrar una forma de almacenar las piezas mientras crece el combo.","upgrades.ball_attract_ball.help_plural":"Mayor fuerza de atracción","upgrades.ball_attract_ball.name":"Gravedad","upgrades.ball_attract_ball.tooltip":"Las pelotas atraen a las pelotas","upgrades.ball_attract_ball.verbose_description":"Las bolas que están separadas más de 3/4 de la anchura de la pantalla empiezan a atraerse. La fuerza de atracción es mayor cuanto más separadas están las bolas. Las partículas del arco iris volarán para simbolizar la fuerza de atracción. Esta ventaja sólo está disponible si ya tienes más de una bola en juego.","upgrades.ball_attracts_coins.name":"Balas de la suerte","upgrades.ball_attracts_coins.tooltip":"Las monedas van con la bola más cercana","upgrades.ball_attracts_coins.verbose_description":"Puedes utilizarlo para que las piezas orbiten la pelota y colorear los ladrillos cercanos, o como una especie de rincón imantado.","upgrades.ball_repulse_ball.help_plural":"Fuerza de repulsión más fuerte","upgrades.ball_repulse_ball.name":"Vuelo en formación","upgrades.ball_repulse_ball.tooltip":"Las balas repelen a las balas","upgrades.ball_repulse_ball.verbose_description":"Las bolas que están a menos de un cuarto de la anchura de la pantalla empiezan a repelerse. La fuerza de repulsión es mayor cuanto más cerca están una de otra. Se mostrarán partículas para simbolizar la aplicación de esta fuerza. Esta ventaja sólo está disponible si ya tienes más de una bola.","upgrades.base_combo.name":"Mejor base","upgrades.base_combo.tooltip":"El combo comienza en {{coins}} en lugar de 1.","upgrades.base_combo.verbose_description":"Tu combo normalmente empieza en 1 al principio del nivel y vuelve a 1 cuando rebotas sin golpear nada. Con esta función, el combo empieza 3 puntos más arriba, por lo que siempre conseguirás al menos 4 monedas por ladrillo. Cuando tu combo se reinicia, vuelve a ser 4 en lugar de 1. Tu bola parpadeará un poco para indicar que su combo es superior a 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosiones más violentas","upgrades.bigger_explosions.verbose_description":"La explosión por defecto arrasa un cuadrado de ladrillos de 3x3; con esta mejora, uno de 5x5. El viento que sopla las piezas también es mucho más fuerte. La pantalla parpadeará un poco después de cada explosión (excepto en el modo de gráficos básicos).","upgrades.bigger_puck.name":"Raqueta más grande","upgrades.bigger_puck.tooltip":"Atrapa más monedas fácilmente.","upgrades.bigger_puck.verbose_description":"Una raqueta grande significa que nunca se te escapa la pelota y que puedes coger más piezas, además de apuntar los rebotes con precisión. Sin embargo, una raqueta grande es más difícil de usar en los laterales del nivel.","upgrades.bricks_attract_ball.name":"Los ladrillos atraen bolas","upgrades.bricks_attract_ball.tooltip":"La pelota va hacia los primeros {{count}} ladrillos que golpea.","upgrades.bricks_attract_ball.verbose_description":"El efecto es más intenso en niveles más altos. La cantidad de ladrillos que pueden impactar antes de que el efecto se detenga también es mayor. El efecto se reactiva cuando el balón impacta el disco.","upgrades.bricks_attract_coins.name":"Los ladrillos atraen monedas","upgrades.bricks_attract_coins.tooltip":"Les ayuda a permanecer allí arriba.","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Perspicaz","upgrades.clairvoyant.tooltip":"Revela los niveles, el PV de los ladrillos y la dirección de las balas","upgrades.clairvoyant.verbose_description":"Te ayuda a elegir las mejoras adecuadas y a entender qué ocurre con los \\"ladrillos macizos\\". Los niveles 2 y 3 (en modo bucle) proporcionan información adicional de dudosa utilidad.","upgrades.coin_magnet.help_plural":"Mayor efecto sobre las piezas","upgrades.coin_magnet.name":"Imán para monedas","upgrades.coin_magnet.tooltip":"La raqueta atrae monedas","upgrades.coin_magnet.verbose_description":"Dirige las piezas hacia la raqueta. El efecto es mayor en las piezas que ya están cerca de la raqueta.","upgrades.compound_interest.name":"Interés compuesto","upgrades.compound_interest.tooltip":"+{{lvl}} combo por ladrillo roto, se pone a cero cuando se pierde una pieza","upgrades.compound_interest.verbose_description":"Tu combo aumentará en uno cada vez que rompas un ladrillo. Si pierdes alguna pieza, tu combo volverá a cero.\\n\\nSi tu combo es superior al mínimo, aparecerá una línea roja en la parte inferior de la zona de juego para recordarte que las monedas no deben ir allí.","upgrades.concave_puck.name":"Raqueta cóncava","upgrades.concave_puck.tooltip":"Ayuda a evitar los bordes.","upgrades.concave_puck.verbose_description":"Las pelotas comienzan verticalmente al principio del nivel y rebotan en la raqueta más verticalmente y al revés.","upgrades.corner_shot.name":"Tiro de esquina","upgrades.corner_shot.tooltip":"Deja que tu raqueta salga del área enmarcada","upgrades.corner_shot.verbose_description":"Te ayuda a apuntar a las esquinas","upgrades.etherealcoins.name":"Moneda espacial","upgrades.etherealcoins.tooltip":"Las piezas ya no se ven afectadas por la gravedad","upgrades.etherealcoins.verbose_description":"Las monedas mantendrán su velocidad incluso después de varios rebotes y ya no se verán afectadas por la gravedad.","upgrades.extra_levels.name":"5 minutos más","upgrades.extra_levels.tooltip":"Juega {{count}} niveles en lugar de 7","upgrades.extra_levels.verbose_description":"El juego suele durar 7 niveles, tras los cuales se acaba la partida y la puntuación que hayas alcanzado es tu puntuación del juego.\\n\\nElegir esta mejora te permite prolongar el juego un nivel. Los últimos niveles suelen ser en los que más puntos consigues, así que la diferencia puede ser espectacular.","upgrades.extra_life.help_plural":"La (última) bola rebota hasta el fondo de la pantalla en lugar de perderse ( {{lvl}} veces).","upgrades.extra_life.name":"Segunda oportunidad","upgrades.extra_life.tooltip":"La pelota rebota una vez antes de perderse.","upgrades.extra_life.verbose_description":"Normalmente, sólo tienes una bola por ronda, y la ronda termina en cuanto la sueltas.\\n\\nEsta habilidad añade una barra blanca en la parte inferior de la pantalla que guardará una bola una vez, y se romperá en el proceso.\\n\\nPuedes coger varias vidas por adelantado, que se usan cada vez que una bola está a punto de perderse.","upgrades.forgiving.name":"Errar es humano","upgrades.forgiving.tooltip":"Perder los ladrillos significa perder una porción progresivamente mayor del combo","upgrades.forgiving.verbose_description":" El primer ladrillo perdido por nivel no cuesta nada, el siguiente 10%, 20% y así sucesivamente.","upgrades.fountain_toss.name":"Moneda en la fuente","upgrades.fountain_toss.tooltip":"A veces ganas un pequeño combo cuando pierdes monedas.","upgrades.fountain_toss.verbose_description":"Cuando se pierde una moneda mientras tu combo estaba por debajo de {{max}}, tu combo tiene una probabilidad de {{lvl}}/combo de incrementarse.","upgrades.ghost_coins.name":"Habitaciones fantasma","upgrades.ghost_coins.tooltip":"Las monedas atraviesan los ladrillos lentamente","upgrades.ghost_coins.verbose_description":"No es un error, ¡es una característica! Las piezas atraviesan los ladrillos lentamente. Los niveles más altos permiten que las monedas pasen más rápido a través de los ladrillos.","upgrades.helium.name":"Helio","upgrades.helium.tooltip":"Las piezas flotan en lugar de caer alrededor de la raqueta.","upgrades.helium.verbose_description":"Las monedas esperarán a estar debajo de la raqueta para caer.","upgrades.hot_start.name":"Arranque en caliente","upgrades.hot_start.tooltip":"Combo a {{start}}, -{{loss}} combo por segundo","upgrades.hot_start.verbose_description":"Al principio de cada nivel, tu combo comenzará con +30 puntos, pero cada segundo se reducirá en un punto.  ","upgrades.hypnosis.name":"Hipnosis","upgrades.hypnosis.tooltip":"Cada vez que un ladrillo cambia de color, teletransporta esa moneda a la bola más cercana y recarga su capacidad para manchar un ladrillo.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Implosiones","upgrades.implosions.tooltip":"Las explosiones absorben las piezas en lugar de hacerlas estallar.","upgrades.implosions.verbose_description":"La fuerza de la explosión se aplica en sentido contrario. El nivel 2+ aumenta la potencia de la implosión.","upgrades.instant_upgrade.name":"Más vale pájaro en mano que ciento volando","upgrades.instant_upgrade.tooltip":"+2 de mejora ahora, -1 de elección hasta el final del juego.","upgrades.instant_upgrade.verbose_description":"Elige inmediatamente dos mejoras para conseguir una gratis y otra para pagar la que usaste para conseguir esta ventaja. Cada vez que elijas mejoras del siguiente menú, tendrás menos opciones.","upgrades.left_is_lava.name":"Evitar el lado izquierdo","upgrades.left_is_lava.tooltip":"+{{lvl}} combo por ladrillo, se pierde al tocar el borde izquierdo","upgrades.left_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, dándote una moneda extra cada vez que rompes un ladrillo.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola golpea el lado izquierdo.\\n\\nEn cuanto tu combo aumenta, el lado izquierdo se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.limitless.name":"Sin límites","upgrades.limitless.tooltip":"Aumenta el nivel máximo de todas las mejoras de {{lvl}} .","upgrades.limitless.verbose_description":"Elegir esta ventaja también aumenta su propio límite en un punto, permitiéndote elegirla de nuevo.","upgrades.metamorphosis.name":"Metamorfosis","upgrades.metamorphosis.tooltip":"Cada pieza puede manchar {{lvl}} ladrillo(s) con su color","upgrades.metamorphosis.verbose_description":"Con esta mejora, las monedas tendrán el color del ladrillo del que proceden y colorearán el primer ladrillo que toquen.\\n\\nLas piezas aparecen a la velocidad de la bola que las rompió, lo que significa que puedes apuntar un poco en la dirección de los ladrillos que quieres \\"pintar\\".","upgrades.minefield.name":"Campo de minas","upgrades.minefield.tooltip":"+{{lvl}} combo por ladrillo explosivo en pantalla","upgrades.minefield.verbose_description":"Añade +lvl al combo cuando se coloca un ladrillo, -lvl cuando se destruye y aumenta el combo básico en el número de ladrillos multiplicado por el nivel.","upgrades.multiball.name":"Bola múltiple","upgrades.multiball.tooltip":"Cada nivel comienza con {{count}} bolas.","upgrades.multiball.verbose_description":"En cuanto sueltas la bola en Breakout 71, pierdes.\\n\\nCon esta ventaja, tienes dos bolas, así que puedes permitirte perder una.\\n\\nLas bolas perdidas vuelven al siguiente nivel.\\n\\nTener más de una bala te permite obtener otras ventajas y, por supuesto, completar el nivel más rápidamente.","upgrades.nbricks.name":"Domiciliación bancaria","upgrades.nbricks.tooltip":"Golpea exactamente {{lvl}} ladrillos por rebote para +{{lvl}} combo, de lo contrario combo perdido","upgrades.nbricks.verbose_description":"Si tu bola rebota sin romper ningún ladrillo, cuenta como golpe.  Los ladrillos destruidos por explosiones no cuentan.","upgrades.one_more_choice.name":"La respuesta D","upgrades.one_more_choice.tooltip":"1 opción de mejora adicional disponible hasta el final del juego","upgrades.one_more_choice.verbose_description":"Cada menú de mejoras tendrá una opción adicional.  Esto no aumenta el número de mejoras que puede elegir, pero le ayuda a crear el perfil ideal. \\"Respuesta D\\" es una referencia a un sketch clásico.","upgrades.passive_income.name":"Ingresos pasivos","upgrades.passive_income.tooltip":"+{{lvl}} combo / ladrillo, a menos que la raqueta se haya movido en los últimos {{time}} segundos, en cuyo caso se pierde el combo.","upgrades.passive_income.verbose_description":"Algunas mejoras hacen que las pelotas se muevan sin necesidad de poner la raqueta en movimiento.","upgrades.picky_eater.name":"Comer por colores","upgrades.picky_eater.tooltip":"+{{lvl}} combo por ladrillo roto del color de la bola, combo perdido en caso contrario","upgrades.picky_eater.verbose_description":"Cada vez que rompes un ladrillo del mismo color que tu bola, tu combinación aumenta en uno.\\nSi es de otro color, la bola adopta este nuevo color, pero la combinación se reinicia, a menos que no queden ladrillos del mismo color que la bola. Los ladrillos de color incorrecto se marcan con un círculo rojo. Si tienes más de una bola, todas cambian de color al mismo tiempo cuando una de ellas toca un ladrillo.","upgrades.pierce.name":"Bola perforadora","upgrades.pierce.tooltip":"La pelota golpea {{count}} ladrillos después de cada rebote en la raqueta.","upgrades.pierce.verbose_description":"Normalmente, la pelota rebota en cuanto golpea un ladrillo. Con esta mejora, continuará su trayectoria hasta que haya roto 3 ladrillos.\\n\\nDespués, rebotará en el cuarto ladrillo y tendrá que tocar la raqueta para poner a cero el contador.","upgrades.pierce_color.name":"Taladro de color","upgrades.pierce_color.tooltip":"+{{lvl}} de daño a los ladrillos del mismo color que la bola","upgrades.pierce_color.verbose_description":"Cada vez que una bola golpea un ladrillo del mismo color, lo atraviesa sin obstáculos.\\n\\nCuando choca contra un ladrillo de otro color, lo rompe, adopta su color y rebota.\\n\\nSi tienes ladrillos macizos, las cosas funcionan de otra manera.","upgrades.puck_repulse_ball.help_plural":"La fuerza de repulsión es mayor","upgrades.puck_repulse_ball.name":"Aterrizaje suave","upgrades.puck_repulse_ball.tooltip":"La raqueta repele las pelotas","upgrades.puck_repulse_ball.verbose_description":"Cuando una pelota se acerca a la raqueta, empieza a frenarse e incluso a botar sin tocar el disco.","upgrades.rainbow.name":"Arcoíris","upgrades.rainbow.tooltip":"Las monedas aparecen con colores del arco iris.","upgrades.rainbow.verbose_description":"Cada nivel aumenta la cantidad de monedas de colores. El color depende del tiempo transcurrido.","upgrades.reach.name":"Ataque aéreo","upgrades.reach.tooltip":"Romper uno de los N ladrillos de la línea inferior destruye el combo. De lo contrario, +N combo.","upgrades.reach.verbose_description":"Si sólo hay una fila de ladrillos, o si la fila más baja cubre todo el ancho del juego, esta ventaja no tiene efecto. De lo contrario, si se rompe esta fila inferior, se reinicia el combo; si se rompe cualquier otra fila, el combo aumenta en el número de ladrillos de esa fila.\\n\\nLa fila inferior de ladrillos se marcará con un círculo rojo para recordarte que no debes tocarla.","upgrades.respawn.name":"Reaparición","upgrades.respawn.tooltip":"{{percent}}% de los ladrillos reaparecen después de {{delay}}s.","upgrades.respawn.verbose_description":"Los efectos de partículas te mostrarán dónde aparecerán los ladrillos.","upgrades.right_is_lava.name":"Evitar el lado derecho","upgrades.right_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el impacto con el lado derecho","upgrades.right_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, dándote una moneda extra cada vez que rompas los ladrillos siguientes.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola toca el lado derecho del área de juego.\\n\\nEn cuanto tu combo aumenta, el lado derecho se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.sacrifice.help_l1":"Perder una vida destruye todos los ladrillos","upgrades.sacrifice.help_over":"Perder una vida multiplica el combo por {{lvl}} y luego destruye todos los ladrillos de la pantalla","upgrades.sacrifice.name":"Sacrificio","upgrades.sacrifice.verbose_description":"El combo podría llegar muy alto.","upgrades.sapper.help_plural":"Los primeros {{lvl}} ladrillos rotos se convierten en bombas.","upgrades.sapper.name":"Zapador","upgrades.sapper.tooltip":"El primer ladrillo roto se convierte en una bomba.","upgrades.sapper.verbose_description":"En lugar de desaparecer, el primer ladrillo roto es sustituido por una bomba. Al rebotar la pelota en la raqueta, se restablece el efecto.  A medida que subas de nivel, podrás colocar más bombas.","upgrades.shocks.name":"Choque","upgrades.shocks.tooltip":"Choque explosivo entre balas","upgrades.shocks.verbose_description":"Cuando dos balas chocan, intercambian velocidades, crean una explosión y ganan un poco de la velocidad que las separaba.","upgrades.shunt.name":"Derivación","upgrades.shunt.tooltip":"Aparca {{percent}}% de combo al cambiar de nivel","upgrades.shunt.verbose_description":"El arranque en caliente simplemente se añadirá a la combinación actual","upgrades.side_flip.name":"Derecha","upgrades.side_flip.tooltip":"+{{lvl}} combo por ladrillo roto de la derecha, -{{loss}} de lo contrario","upgrades.side_flip.verbose_description":"Golpea el ladrillo por su lado derecho para conseguir un combo, pero evita golpearlo por su lado izquierdo ya que esto cancelará dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.side_kick.name":"Zurdos","upgrades.side_kick.tooltip":"+{{lvl}} combo por ladrillo roto de la izquierda, -{{loss}} de lo contrario","upgrades.side_kick.verbose_description":"Golpea el ladrillo por su lado izquierdo para conseguir un combo, pero evita golpearlo por su lado derecho ya que esto cancelará dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.skip_last.help_plural":"Los últimos {{lvl}} ladrillos restantes se autodestruirán","upgrades.skip_last.name":"Fácil de limpiar","upgrades.skip_last.tooltip":"El último ladrillo se autodestruye.","upgrades.skip_last.verbose_description":"Tienes que romper todos los ladrillos para pasar al siguiente nivel.\\n\\nSin embargo, puede ser difícil conseguir los últimos ladrillos.\\n\\nCompletar un nivel antes de tiempo te da opciones extra al subir de nivel.\\n\\nNo quedarte nunca sin ladrillos también es una gran ventaja.\\n\\nAsí que si te cuesta romper los últimos ladrillos, conseguir esta ventaja unas cuantas veces puede ayudarte.","upgrades.slow_down.name":"Bola lenta","upgrades.slow_down.tooltip":"El balón se mueve más despacio","upgrades.slow_down.verbose_description":"La bola empieza relativamente despacio, pero con cada nivel del juego empieza un poco más rápido, y también se acelera si pasas mucho tiempo en un nivel.\\n\\nEsta ventaja hace que la bola sea más fácil de manejar.\\n\\nPuedes conseguirla al principio de cada partida activando el modo niño en el menú.","upgrades.smaller_puck.help_plural":"La raqueta se encoge aún más y el combo vuelve a aumentar.","upgrades.smaller_puck.name":"Raqueta más pequeña","upgrades.smaller_puck.tooltip":"También da +5 combo","upgrades.smaller_puck.verbose_description":"Recibes una bonificación de combo permanente de +5 por elegir esta mejora.","upgrades.soft_reset.name":"Restablecimiento progresivo","upgrades.soft_reset.tooltip":"Al reiniciar el combo se conserva el {{percent}}% de los puntos","upgrades.soft_reset.verbose_description":"Limita el impacto de un reinicio de combo.","upgrades.streak_shots.name":"Secuencia de destrucción","upgrades.streak_shots.tooltip":"Más piezas si rompes varios ladrillos a la vez.","upgrades.streak_shots.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta. El combo se pone a cero cuando la pelota golpea la raqueta. Una vez que tu combo supera el valor base, tu raqueta se vuelve roja para recordarte que tocarla con la pelota destruirá tu combo.","upgrades.sturdy_bricks.name":"Ladrillos macizos","upgrades.sturdy_bricks.tooltip":"+{{lvl}} puntos de vida de los ladrillos, +{{percent}}% monedas cuando se destruyen","upgrades.sturdy_bricks.verbose_description":"Cada nivel de esta mejora añade un PV a todos los ladrillos. Puedes comprobar el número de PV usando la cualificación \\"Clarividente\\". Puedes aumentar el daño de las balas obteniendo la mejora \\"Bala perforante\\". Cada nivel de esta mejora añade un 50% más de monedas.","upgrades.superhot.name":"Súper caliente","upgrades.superhot.tooltip":"El tiempo se mueve cuando se mueve la paleta.","upgrades.superhot.verbose_description":"SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE","upgrades.telekinesis.help_plural":"Mayor efecto sobre el balón","upgrades.telekinesis.name":"Telequinesis","upgrades.telekinesis.tooltip":"Control de la trayectoria del balón","upgrades.telekinesis.verbose_description":"Controla la bola mientras sube.","upgrades.top_is_lava.name":"Icare","upgrades.top_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el rebote del techo","upgrades.top_is_lava.verbose_description":"Cada vez que rompas un ladrillo, tu combo aumentará en uno. Sin embargo, tu combo se reiniciará en cuanto tu bola llegue a la parte superior de la pantalla.\\n\\nCuando tu combo supere el mínimo, aparecerá una barra roja en la parte superior de la pantalla para recordarte que debes evitar golpearla.","upgrades.trampoline.name":"Trampolín","upgrades.trampoline.tooltip":"+{{lvl}} combo cada vez que una pelota rebota en la raqueta,-{{lvl}} combo cada vez que una pelota rebota en uno de los bordes","upgrades.trampoline.verbose_description":"Una de las pocas mejoras que no tiene una condición de reinicio","upgrades.transparency.name":"Transparencia","upgrades.transparency.tooltip":"Cuanto más alta esté la bola en la pantalla, más transparente se volverá. Cuanto más transparente sea, más monedas producirá.","upgrades.transparency.verbose_description":"Los niveles más altos hacen que la pelota se vuelva transparente más rápidamente y aumentan la bonificación de puntos.","upgrades.trickledown.name":"Escorrentía","upgrades.trickledown.tooltip":"Las monedas aparecen en la parte superior de la pantalla.","upgrades.trickledown.verbose_description":"Podría ayudarte a ahorrar algunas monedas. ","upgrades.unbounded.name":"Liberado, entregado","upgrades.unbounded.tooltip":"+{{lvl}} combo por ladrillo, más lados para mantener la pelota en juego, peligro","upgrades.unbounded.verbose_description":"Espero que hayas encontrado la forma de mantener tu bola en la pantalla. En el nivel 2+, el techo también desaparecerá. Se trata de una ventaja avanzada.","upgrades.viscosity.name":"Fluido viscoso","upgrades.viscosity.tooltip":"Las piezas caen más lentamente","upgrades.viscosity.verbose_description":"Las piezas normalmente se aceleran con la gravedad y las explosiones para alcanzar velocidades bastante altas.\\n\\nEsta habilidad las ralentiza constantemente, como si estuvieran en una especie de líquido viscoso.\\n\\nEsto facilita su captura y combina bien con mejoras que influyen en el movimiento de la pieza.","upgrades.wind.help_plural":"Viento más fuerte","upgrades.wind.name":"Viva el viento","upgrades.wind.tooltip":"La posición de la raqueta crea viento","upgrades.wind.verbose_description":"El viento depende de la posición de la raqueta en la pantalla, hacia la izquierda si está a la izquierda, hacia la derecha si está a la derecha.\\nAfecta a pelotas y piezas.","upgrades.yoyo.name":"Yo-Yo","upgrades.yoyo.tooltip":"La pelota desciende hacia la raqueta.","upgrades.yoyo.verbose_description":"Es lo contrario de la Telequinesis: controlar la pelota mientras cae hacia la raqueta.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"+{{lvl}} combo por ladrillo, hasta que haya una explosión","upgrades.zen.verbose_description":"Básicamente es un juego no violento."}');var T={};function j(e,_){if(void 0===T[e])try{var t,a=localStorage.getItem(e);a&&(T[e]=JSON.parse(a))}catch(e){console.warn(e)}return null!==(t=T[e])&&void 0!==t?t:_}function E(e,_){T[e]=_;try{localStorage.setItem(e,JSON.stringify(_))}catch(e){console.warn(e)}}function A(){return j("breakout_71_total_score",0)}function H(){return 200*Math.
