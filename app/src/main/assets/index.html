وف تحتاج إلى تخزين العملات المعدنية في مكان ما أثناء صعود مجموعتك.","upgrades.ball_attract_ball.name":"جاذبية","upgrades.ball_attract_ball.tooltip":"الكرات تجذب الكرات","upgrades.ball_attract_ball.verbose_description":"الكرات التي تبعد أكثر من ثلاثة أرباع مساحة اللعبة ستبدأ بالتجاذب.\\n\\nتزداد قوة التجاذب كلما ابتعدت الكرات عن بعضها.\\n\\nستتطاير جزيئات قوس قزح رمزًا لقوة التجاذب. هذه الميزة متاحة فقط إذا كان لديك أكثر من كرة واحدة.","upgrades.ball_attracts_coins.name":"الكرات تجذب العملات المعدنية","upgrades.ball_attracts_coins.tooltip":"تتبع العملات المعدنية الكرة الأقرب وتسقط بشكل أبطأ","upgrades.ball_attracts_coins.verbose_description":"يمكن استخدام هذا المنتج لطلاء الكرات بالعملات المعدنية إذا تم دمجه مع \\"الصبغة\\" و\\"عملات الأشباح\\". كما أنه بديل لمغناطيس العملات المعدنية.","upgrades.ball_repulse_ball.name":"المساحة الشخصية","upgrades.ball_repulse_ball.tooltip":"الكرات تصد الكرات","upgrades.ball_repulse_ball.verbose_description":"الكرات التي تبعد أقل من ربع عرض الشاشة ستبدأ بالتنافر. تزداد قوة التنافر كلما كانت الكرات قريبة من بعضها. ستنطلق الجسيمات للخارج لترمز إلى تطبيق هذه القوة. هذه الميزة متاحة فقط إذا كان لديك أكثر من كرة واحدة.","upgrades.base_combo.name":"أسس قوية","upgrades.base_combo.tooltip":"3 عملات معدنية إضافية لكل لبنة مكسورة","upgrades.base_combo.verbose_description":"عادةً ما تبدأ مجموعتك من ١ في بداية المستوى، وتُعاد ضبطها إلى ١ عندما تقفز دون أن تصطدم بأي شيء. مع هذه الميزة، تبدأ المجموعة أعلى بثلاث نقاط، لذا ستحصل دائمًا على ٤ عملات على الأقل لكل مكعب. عند إعادة ضبط مجموعتك، تعود إلى ٤ وليس ١. ستتألق كرتك قليلاً للإشارة إلى أن مجموعتها أعلى من ١.","upgrades.bigger_explosions.name":"كابوم","upgrades.bigger_explosions.tooltip":"انفجارات أكبر","upgrades.bigger_explosions.verbose_description":"الانفجار الافتراضي يُزيل مربعًا 3×3، ويصبح مربعًا 5×5، كما أن تأثير الضربة على العملات المعدنية أقوى بكثير. ستومض الشاشة بعد كل انفجار (باستثناء الوضع الأساسي).","upgrades.bigger_puck.name":"مجداف أكبر","upgrades.bigger_puck.tooltip":"احصل على المزيد من العملات المعدنية بسهولة.","upgrades.bigger_puck.verbose_description":"يجعل المضرب الأكبر من السهل عدم تفويت الكرة والتقاط المزيد من العملات المعدنية، كما يساعد أيضًا على تحديد زاوية الارتدادات بدقة (تعتمد زاوية الكرة فقط على المكان الذي تصطدم فيه بالمضرب).","upgrades.bricks_attract_ball.name":"الطوب يجذب الكرات","upgrades.bricks_attract_ball.tooltip":"تتجه الكرة نحو أول {{count}} من الطوب التي ستصطدم بها.","upgrades.bricks_attract_ball.verbose_description":"تتجه الكرة نحو أول {{count}} طوبة تصطدم بها. يزداد التأثير في المستويات الأعلى. كما يزداد عدد الطوب التي يمكن أن تصطدم بها قبل توقف التأثير. ينشط التأثير مجددًا عندما تصطدم الكرة بالمضرب.","upgrades.bricks_attract_coins.name":"الطوب يجذب العملات المعدنية","upgrades.bricks_attract_coins.tooltip":"يساعدهم على البقاء هناك","upgrades.bricks_attract_coins.verbose_description":"سيتم جذب العملات إلى الطوب القريب على مستويات أعلى الجاذبية أقوى.","upgrades.buoy.name":"عوامة","upgrades.buoy.tooltip":"تطفو العملات المعدنية لمدة {{duration}} ثانية على الخط السفلي.","upgrades.buoy.verbose_description":"يكون التأثير أكثر وضوحًا في الوضع المحمول","upgrades.chill.name":"الدجاج","upgrades.chill.tooltip":"لا مزيد من التحديثات، مستويات غير محدودة.","upgrades.chill.verbose_description":"الكرة ستتسارع أيضاً.","upgrades.clairvoyant.name":"مستبصر","upgrades.clairvoyant.tooltip":"شاهد المستويات القادمة، نقاط الصحة للطوب واتجاه الكرة","upgrades.clairvoyant.verbose_description":"يساعدك على اختيار الترقيات المناسبة وفهم كيفية عمل الطوب المتين. يُضيف المستويان 2 و3 معلومات إضافية حول فائدة مشكوك فيها (متوفرة في وضع الحلقة).","upgrades.coin_magnet.name":"مغناطيس العملات المعدنية","upgrades.coin_magnet.tooltip":"المجداف يجذب العملات المعدنية","upgrades.coin_magnet.verbose_description":"يُوجِّه العملات المعدنية نحو المجداف. يكون التأثير أقوى إذا كانت العملة قريبة منه بالفعل.","upgrades.compound_interest.name":"الفائدة المركبة","upgrades.compound_interest.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة، يتم إعادة تعيينها عند فقدان العملة المعدنية","upgrades.compound_interest.verbose_description":"ستزداد مجموعتك قطعةً قطعةً في كل مرة تكسر فيها لبنة، مما يُنتج المزيد من العملات مع كل قطعة تكسرها.\\n\\nمع ذلك، احرص على التقاط جميع هذه العملات بمجدافك، لأن أي عملة مفقودة ستُعيد ضبط مجموعتك.\\n\\nبمجرد أن تتجاوز مجموعتك الحد الأدنى، سيظهر خط أحمر في أسفل منطقة اللعب لتذكيرك بعدم وضع العملات هناك.","upgrades.concave_puck.name":"مجداف مقعر","upgrades.concave_puck.tooltip":"تحسين دقة التصويب العمودي","upgrades.concave_puck.verbose_description":"تبدأ الكرات المستوى بالصعود مباشرة إلى الأعلى، وترتد بزاوية أقل.","upgrades.corner_shot.name":"ضربة ركنية","upgrades.corner_shot.tooltip":"يسمح للمجداف الخاص بك بالتداخل مع حدود الشاشة","upgrades.corner_shot.verbose_description":"يُساعدك على التصويب في الزوايا. المستويات الأعلى تُتيح لك الوصول إلى مسافات أبعد.","upgrades.double_or_nothing.name":"ضعف أو لا شيء","upgrades.double_or_nothing.tooltip":"ترتفع المجموعة أسرع بمقدار {{multiplier}} مرة، ولكنك ستخسر {{percent}}% من نقاطك في كل إعادة تعيين.","upgrades.double_or_nothing.verbose_description":"يتم احتساب إعادة تعيين المجموعة فقط عندما تكون مجموعتك أعلى من الحد الأدنى","upgrades.etherealcoins.name":"العملات المعدنية في الفضاء","upgrades.etherealcoins.tooltip":"لم تعد العملات المعدنية تتأثر بالجاذبية","upgrades.etherealcoins.verbose_description":"ستحافظ العملات المعدنية على سرعتها حتى بعد عدة ارتدادات، ولن تتأثر بالجاذبية بعد الآن.","upgrades.extra_levels.name":"5 دقائق إضافية","upgrades.extra_levels.tooltip":"العب {{count}} مستوى بدلاً من 7","upgrades.extra_levels.verbose_description":"يمكن أن تستمر اللعبة الافتراضية لسبعة مستويات كحد أقصى، تنتهي بعدها.\\n\\nيتيح لك كل مستوى من هذه الميزة الانتقال إلى مستوى أعلى. غالبًا ما تكون المستويات الأخيرة هي التي تحقق فيها أعلى النقاط، لذا قد يكون الفرق كبيرًا.","upgrades.extra_life.name":"حياة إضافية","upgrades.extra_life.tooltip":"يحفظ الكرة الأخيرة إذا كانت على وشك الضياع","upgrades.extra_life.verbose_description":"ستُستهلك الحياة في هذه العملية. تظهر الأرواح الزائدة كخطوط بيضاء خلف القرص.","upgrades.forgiving.name":"غفور","upgrades.forgiving.tooltip":"يؤدي فقدان الفواصل إلى تقليل المجموعة تدريجيًا بدلاً من تقليلها دفعة واحدة.","upgrades.forgiving.verbose_description":"أول خطأ في كل مستوى مجاني، ثم 10% من المجموعة، ثم 20% ..","upgrades.fountain_toss.name":"رمي النافورة","upgrades.fountain_toss.tooltip":"احصل على بعض المجموعات عندما تفوت بعض العملات المعدنية.","upgrades.fountain_toss.verbose_description":"عندما تفوتك عملة معدنية وكان مجموعتك أقل من المستوى*30، فإن مجموعتك لديها احتمالية نمو المستوى/المجموعة بمقدار واحد.","upgrades.ghost_coins.name":"عملات الأشباح","upgrades.ghost_coins.tooltip":"تمر العملات المعدنية ببطء عبر الطوب","upgrades.ghost_coins.verbose_description":"إنها ليست مشكلة، بل ميزة! تتحرك العملات المعدنية ببطء عبر الطوب. المستويات الأعلى تسمح لها بالتحرك بشكل أسرع.","upgrades.golden_goose.name":"أوزة ذهبية","upgrades.golden_goose.tooltip":"تنتقل العملات المعدنية إلى الكرة بعد اصطدامها بالطوب","upgrades.golden_goose.verbose_description":"كلما اصطدمت قطعة نقود بقطعة نرد، انقلها آنيًا إلى أقرب كرة. في المستوى الثاني، تنتقل العملات آنيًا بعد اصطدامها بجانبها أيضًا.","upgrades.happy_family.name":"عائلة سعيدة","upgrades.happy_family.tooltip":"مزيد من العملات المعدنية إذا أبقيت جميع الكرات في اللعبة.","upgrades.happy_family.verbose_description":"+١ مجموعة لكل كرة إضافية مع كل ارتداد للمضرب. تُعاد المجموعة عند فقدان الكرة. فقط الكرة التي تزيد عن ١ تُعطي مجموعة.","upgrades.helium.name":"الهيليوم","upgrades.helium.tooltip":"انعكست الجاذبية إلى اليسار واليمين من المجداف","upgrades.helium.verbose_description":"في المستوى ١، تنخفض الجاذبية. في المستوى ٢، تطفو العملات المعدنية ببطء. في المستوى ٣، تطير فعليًا.","upgrades.hot_start.name":"بداية ساخنة","upgrades.hot_start.tooltip":"ابدأ عند المجموعة {{start}}، -{{loss}} مجموعة في الثانية","upgrades.hot_start.verbose_description":"في بداية كل مستوى، تبدأ مجموعتك بـ +٣٠ نقطة، ثم تنخفض نقطة واحدة كل ثانية. يتراكم هذا التأثير مع مزايا أخرى.","upgrades.implosions.name":"الانفجارات","upgrades.implosions.tooltip":"تؤدي الانفجارات إلى امتصاص العملات المعدنية بدلاً من تفجيرها","upgrades.implosions.verbose_description":"تُطبّق قوة الانفجار بطريقة أخرى. المستويات الأخرى تُشكّل \\"انفجارًا أكبر\\".","upgrades.left_is_lava.name":"تجنب الجانب الأيسر","upgrades.left_is_lava.tooltip":"+{{lvl}} مجموعة لكل طوبة مكسورة. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.left_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ بمجرد أن تصطدم كرتكَ بالجانب الأيسر.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيسر أحمر لتذكيرك بضرورة تجنب ضربها.","upgrades.limitless.name":"بلا حدود","upgrades.limitless.tooltip":"رفع المستوى الأقصى لجميع الترقيات بمقدار {{lvl}}","upgrades.limitless.verbose_description":"يؤدي اختيار هذه الميزة أيضًا إلى رفع الحد الأقصى الخاص به بمقدار واحد، مما يتيح لك اختيارها مرة أخرى.","upgrades.metamorphosis.name":"التحول","upgrades.metamorphosis.tooltip":"يمكن لكل عملة أن تصبغ {{lvl}} من الطوب بلونها","upgrades.metamorphosis.verbose_description":"مع هذه الميزة، ستكون العملات بلون الطوبة التي أتت منها، وستُلوّن أول طوبة تلمسها بنفس اللون. تظهر العملات بسرعة الكرة التي كسرتها، ما يعني أنه يمكنك التصويب قليلاً باتجاه الطوب الذي تريد \\"طلائه\\". في المستوى 1، يُمكن لكل عملة تلوين طوبة واحدة قبل أن \\"تُستهلك\\" وتظهر فارغة.","upgrades.minefield.name":"حقل ألغام","upgrades.minefield.tooltip":"+{{percent}}% عملات معدنية لكل قنبلة على الشاشة","upgrades.minefield.verbose_description":"يتم إحصاء القنابل أثناء انفجارها أيضًا.","upgrades.multiball.name":"كرة متعددة","upgrades.multiball.tooltip":"ابدأ كل المستويات بـ {{count}} كرة.","upgrades.multiball.verbose_description":"بمجرد أن تسقط الكرة في Breakout 71، ستخسر.\\n\\nمع هذه الميزة، ستحصل على كرتين، ما يعني أنك قادر على تحمل خسارة إحداهما.\\n\\nتعود الكرات المفقودة في المستوى التالي.\\n\\nامتلاك أكثر من كرة واحدة يتيح لك الحصول على مزايا إضافية، وبالطبع يُسرّع من إنهاء المستوى.","upgrades.nbricks.name":"حجم العينة الصارم","upgrades.nbricks.tooltip":"اضرب {{lvl}} طوبة بالضبط لكل ارتداد للمجداف للحصول على +{{lvl}} مجموعة، وإلا فسيتم إعادة تعيينها","upgrades.nbricks.verbose_description":"ليس بالضرورة تدمير تلك الطوب، لكن عليك ضربها. الطوب المدمر بالانفجارات لا يُحتسب.","upgrades.one_more_choice.name":"خيار إضافي","upgrades.one_more_choice.tooltip":"ستوفر عمليات رفع المستوى الإضافية {{lvl}} خيارًا إضافيًا في القائمة","upgrades.one_more_choice.verbose_description":"ستحتوي كل قائمة ترقية على خيار إضافي. هذا لا يزيد من عدد الترقيات المتاحة.","upgrades.ottawa_treaty.name":"معاهدة أوتاوا","upgrades.ottawa_treaty.tooltip":"كسر الطوب بالقرب من القنبلة ينزع فتيلها","upgrades.ottawa_treaty.verbose_description":"سيتم استبدال القنبلة القريبة بكتلة ملونة. إذا كان لديك سلاح نووي، فستفقد الكرة تأثيرها حتى الارتداد التالي. لا يمكن استبدال سوى قنبلة واحدة في كل مرة.","upgrades.passive_income.name":"الدخل السلبي","upgrades.passive_income.tooltip":"+{{lvl}} مجموعة / لبنة، المجداف غير مهم {{time}}ثانية بعد التحرك","upgrades.passive_income.verbose_description":"يمكن لبعض الامتيازات أن تساعد الكرات على القيام بما تريد دون الحاجة إلى القيام بأي شيء.","upgrades.picky_eater.name":"آكل انتقائي","upgrades.picky_eater.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة، يتم إعادة تعيينها عند تغير لون الكرة","upgrades.picky_eater.verbose_description":"كلما كسرتَ لبنة من نفس لون كرتك، تزداد مجموعتك بمقدار كرة واحدة.\\n\\nإذا كان لونها مختلفًا، تأخذ الكرة اللون الجديد، لكن المجموعة تُعاد ضبطها، إلا في حال عدم وجود أي طوب متبقي من لون الكرة.\\n\\nبمجرد حصولك على مجموعة أعلى من الحد الأدنى، ستُحاط الطوب ذات اللون غير المناسب بإطار أحمر.\\n\\nإذا كان لديك أكثر من كرة، فسيتغير لونها جميعًا عند اصطدام إحداها بطوبة.","upgrades.pierce.name":"ثقب","upgrades.pierce.tooltip":"الكرة تخترق {{count}} طوبة بعد ارتداد المضرب","upgrades.pierce.verbose_description":"عادةً ما ترتد الكرة بمجرد ملامستها لأي شيء. مع هذه الميزة، ستواصل مسارها حتى كسر ثلاث طوبات.\\n\\nبعد ذلك، ترتد على الطوبة الرابعة، وستحتاج إلى لمس المضرب لإعادة ضبط العداد.","upgrades.pierce_color.name":"ثقب اللون","upgrades.pierce_color.tooltip":"+{{lvl}} ضرر للطوب من لون الكرة","upgrades.pierce_color.verbose_description":"كلما اصطدمت الكرة بقطعة من نفس اللون، ستمرّ دون عائق.\\n\\nوإذا اصطدمت بقطعة من لون مختلف، فستكسرها، وتأخذ لونها، وترتد.\\n\\nإذا كانت لديك قطع متينة، فقد ترتد الكرة عن قطعة من نفس اللون.","upgrades.puck_repulse_ball.name":"هبوط ناعم","upgrades.puck_repulse_ball.tooltip":"المجداف يصد الكرات","upgrades.puck_repulse_ball.verbose_description":"عندما تقترب الكرة من المضرب، فإنها تبدأ في التباطؤ، وربما ترتد دون أن تلمس المضرب.","upgrades.rainbow.name":"قوس قزح","upgrades.rainbow.tooltip":"تظهر العملات المعدنية بألوان قوس قزح.","upgrades.rainbow.verbose_description":"مع كل مستوى، تزداد نسبة العملات الملونة. يعتمد اللون على وقت المستوى.","upgrades.reach.name":"من أعلى إلى أسفل","upgrades.reach.tooltip":"لمس مكعبات N في الصف السفلي يُعيد ضبط المجموعة. وإلا، فإن +N مجموعة","upgrades.reach.verbose_description":"إذا كان هناك صف واحد فقط من الطوب، أو إذا غطى الصف السفلي عرض اللعبة بالكامل، فلن تُحدث هذه الميزة أي فرق. وإلا، فإن كسر هذا الصف السفلي يُعيد ضبط المجموعة، بينما يؤدي كسر أي شيء آخر إلى زيادة المجموعة بمقدار عدد الطوب الموجود في ذلك الصف السفلي.\\n\\nسيتم تمييز الصف السفلي باللون الأحمر.","upgrades.respawn.name":"إعادة الظهور","upgrades.respawn.tooltip":"{{percent}}% من الطوب يظهر مرة أخرى بعد {{delay}}ثانية.","upgrades.respawn.verbose_description":"سوف يساعدك تأثير الجسيمات على معرفة مكان ظهور الطوب.","upgrades.right_is_lava.name":"تجنب الجانب الأيمن","upgrades.right_is_lava.tooltip":"+{{lvl}} مجموعة لكل مكعب. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.right_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ حالما تصطدم كرتكَ بالجانب الأيمن.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيمن أحمر لتذكيرك بضرورة تجنب ضربها.","upgrades.sacrifice.name":"تصحية","upgrades.sacrifice.tooltip":"خسارة حياة {{lvl}}× المجموعة ثم إزالة كل الطوب","upgrades.sacrifice.verbose_description":"قد يؤدي هذا إلى ارتفاع المجموعة إلى حد كبير.","upgrades.sapper.name":"مهندس","upgrades.sapper.tooltip":"الطوبة الأولى المكسورة تصبح قنبلة.","upgrades.sapper.verbose_description":"بدلاً من مجرد الاختفاء، ستُستبدل أول لبنة تكسرها ببنة قنبلة. ارتطام الكرة بالمضرب يُعيد تفعيل التأثير. رفع مستوى هذه الميزة سيسمح لك بوضع المزيد من القنابل.","upgrades.shocks.name":"الصدمات","upgrades.shocks.tooltip":"تصادمات الكرات المتفجرة","upgrades.shocks.verbose_description":"عندما تصطدم كرتان، فإنهما تتبادلان سرعتهما، ويحدث انفجار، ويكتسبان سرعة إضافية لفصلهما.","upgrades.shunt.name":"ناور","upgrades.shunt.tooltip":"احتفظ بـ {{percent}}% من مجموعتك بين المستويات","upgrades.shunt.verbose_description":"إذا كان لديك أيضًا بداية ساخنة، فسيتم إضافة البداية الساخنة إلى المجموعة الحالية","upgrades.side_flip.name":"اليد اليمنى","upgrades.side_flip.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة من اليمين، -{{loss}} بخلاف ذلك","upgrades.side_flip.verbose_description":"اضرب الطوبة على جانبها الأيمن لتحصل على ضربة كومبو واحدة، لكن تجنب ضربها على الجانب الأيسر لأن ذلك سيُزيل ضربتين كومبو. الضرب من الأعلى والأسفل لا يُجدي نفعًا.","upgrades.side_kick.name":"عسراء","upgrades.side_kick.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة من اليسار، -{{loss}} خلاف ذلك","upgrades.side_kick.verbose_description":"اضرب الطوبة على جانبها الأيسر لتحصل على ضربة كومبو واحدة، لكن تجنب ضربها على الجانب الأيمن لأن ذلك سيُزيل ضربتين كومبو. الضرب من الأعلى والأسفل لا يُجدي نفعًا.","upgrades.skip_last.name":"تنظيف سهل","upgrades.skip_last.tooltip":"الطوبة الاخيرة سوف تنفجر","upgrades.skip_last.verbose_description":"عليك كسر جميع الطوب للانتقال إلى المستوى التالي. مع ذلك، قد يكون من الصعب الحصول على الطوب الأخير.\\n\\nيمنحك إكمال المستوى مبكرًا خيارات إضافية عند الترقية. كما أن عدم تفويت الطوب أبدًا مفيد جدًا.\\n\\nلذا، إذا واجهت صعوبة في كسر الطوب الأخير، فإن الحصول على هذه الميزة بضع مرات قد يساعدك.","upgrades.slow_down.name":"كرة أبطأ","upgrades.slow_down.tooltip":"الكرة تتحرك بشكل أبطأ","upgrades.slow_down.verbose_description":"تبدأ الكرة ببطء نسبيًا، لكنها ستتسارع قليلًا مع كل مستوى.\\n\\nكما ستتسارع إذا قضيت وقتًا طويلًا في مستوى واحد.\\n\\nهذه الميزة تجعلها أسهل في التحكم.\\n\\nيمكنك الحصول عليها في البداية دائمًا بتفعيل وضع الأطفال في القائمة.","upgrades.smaller_puck.name":"مجداف أصغر","upgrades.smaller_puck.tooltip":"يمنح أيضًا +{{percent}}% عملات معدنية","upgrades.smaller_puck.verbose_description":"هذا يُصغّر حجم المضرب، مما يُسهّل نظريًا بعض الضربات الزاوية، ولكنه في الواقع يزيد من الصعوبة.\\n\\nلهذا السبب ستحصل أيضًا على مكافأة رائعة تتمثل في ظهور +٥٠٪ من العملات.","upgrades.soft_reset.name":"إعادة الضبط الناعمة","upgrades.soft_reset.tooltip":"إعادة تعيين المجموعة تحافظ على {{percent}}%","upgrades.soft_reset.verbose_description":"الحد من تأثير إعادة تعيين المجموعة.","upgrades.steering.name":"توجيه","upgrades.steering.tooltip":"تدور الكرات عندما تتحرك القرص","upgrades.steering.verbose_description":"يؤثر تغيير موقع القرص مباشرةً على اتجاه حركة الكرات. في المستوى ٢+، يظهر خط يوضح اتجاهات الكرة.","upgrades.sticky_coins.name":"العملات المعدنية اللاصقة","upgrades.sticky_coins.tooltip":"تلتصق العملات المعدنية بالطوب من نفس اللون","upgrades.sticky_coins.verbose_description":"في المستوى 2، يلتصقون بالطوب من أي لون","upgrades.streak_shots.name":"سلسلة الضربات","upgrades.streak_shots.tooltip":"مزيد من العملات المعدنية إذا قمت بكسر العديد من الطوب قبل القفز على المجداف.","upgrades.streak_shots.verbose_description":"في كل مرة تكسر فيها لبنة، تزداد مجموعتك بمقدار واحد.\\n\\nولكن، بمجرد أن تلمس الكرة مضربك، تُعاد المجموعة إلى قيمتها الافتراضية.\\n\\nبمجرد أن تتجاوز مجموعتك القيمة الأساسية، سيُحاط مضربك بإطار أحمر لتذكيرك بأنه سيدمر مجموعتك إذا لمسته بالكرة.","upgrades.sturdy_bricks.name":"طوب قوي","upgrades.sturdy_bricks.tooltip":"+{{lvl}} من الطوب نقاط الصحة، +{{percent}}% من العملات المعدنية التي تظهر عند الكسر","upgrades.sturdy_bricks.verbose_description":"كل مستوى من هذه الميزة يُضيف نقطة صحة واحدة لجميع الطوب. يمكنك رؤية عدد نقاط الصحة باستخدام ميزة \\"الاستبصار\\". يمكنك زيادة ضرر الكرة بالحصول على ميزة \\"الثاقب\\". كل مستوى من الميزة يُضيف +٥٠٪ من العملات المعدنية.","upgrades.superhot.name":"حار جدًا","upgrades.superhot.tooltip":"يتحرك الزمن عندما يتحرك المجداف.","upgrades.superhot.verbose_description":"سوبر هوت سوبر هوت سوبر هوت سوبر هوت سوبر هوت","upgrades.telekinesis.name":"التحريك الذهني","upgrades.telekinesis.tooltip":"يتحكم المضرب في مسار الكرة","upgrades.telekinesis.verbose_description":"تتحكم بالكرة أثناء صعودها.","upgrades.three_cushion.name":"ثلاث وسائد","upgrades.three_cushion.tooltip":"مزيد من العملات المعدنية إذا ضربت الطوب بشكل غير مباشر فقط","upgrades.three_cushion.verbose_description":"كل ضربة على أحد الجانبين تزيد من قوة الضربة بواحد، حتى +٣. بعد ذلك، لن تُكتسب أي ضربة حتى الارتداد التالي للمضرب.","upgrades.top_is_lava.name":"السماء هي الحد","upgrades.top_is_lava.tooltip":"+{{lvl}} مجموعة لكل لبنة، يتم إعادة ضبطها عند الوصول إلى الجزء العلوي","upgrades.top_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتك بمقدار واحد. مع ذلك، ستُعاد ضبط مجموعتك بمجرد وصول الكرة إلى أعلى الشاشة.\\n\\nعندما تتجاوز مجموعتك الحد الأدنى، سيظهر شريط أحمر في الأعلى لتذكيرك بتجنب ضربها.","upgrades.trampoline.name":"الترامبولين","upgrades.trampoline.tooltip":"+{{lvl}} مجموعة لكل ارتداد للمضرب، -{{lvl}} مجموعة لكل ارتداد على أي حدود","upgrades.trampoline.verbose_description":"أحد ترقيات المجموعات النادرة التي لا تضيف شرط إعادة الضبط","upgrades.transparency.name":"الشفافية","upgrades.transparency.tooltip":"تصبح الكرة شفافة في الجزء العلوي من الشاشة. +{{percent}} % عملات معدنية عندما تكون جميع الكرات في حالة الشفافية الكاملة","upgrades.transparency.verbose_description":"المستويات الأعلى تجعل الكرة شفافة بشكل أسرع وتزيد من مكافأة النقاط.","upgrades.trickledown.name":"اقتصاد التسرب","upgrades.trickledown.tooltip":"تظهر العملات المعدنية في الجزء العلوي من الشاشة.","upgrades.trickledown.verbose_desc ration}} секунды. Мяч промахнулся мимо кирпичей {{levelMisses}} раз(а).","gameOver.lost.summary":"Вы уронили мяч, завершив с результатом {{score}} монет.","gameOver.lost.title":"Игра окончена","gameOver.stats.balls_lost":"Мячи потеряны","gameOver.stats.bricks_broken":"Кирпичи разбиты","gameOver.stats.bricks_per_minute":"Разбитых кирпичей в минуту","gameOver.stats.catch_rate":"Уровень улова","gameOver.stats.combo_avg":"Среднее комбо","gameOver.stats.combo_max":"Максимальная комбинация","gameOver.stats.duration_per_level":"Продолжительность за уровень","gameOver.stats.hit_rate":"Скорость попадания","gameOver.stats.level_reached":"Достигнутый уровень","gameOver.stats.total_score":"Общий балл","gameOver.stats.upgrades_applied":"Примененные обновления","gameOver.stats_intro":"Ниже приведена статистика вашей игры по сравнению с вашими {{count}} лучшими играми.","gameOver.unlocked_perk":"Обновление разблокировано","gameOver.unlocked_perk_plural":"Вы только что разблокировали {{count}} привилегий","gameOver.win.summary":"Игра окончена. Вы спрятали {{score}} монет.","gameOver.win.title":"Вы завершили эту игру","help.content":"## Цель игры\\n\\nРазбивая шариком кирпичи,соберите как можно больше монет с помощью шайбы на протяжении 7 уровней. Ваш счет отображается в правом верхнем углу экрана. Если вы уронили шарик, игра заканчивается. \\n\\nУничтожив все кирпичи, вы сможете получить апгрейд.\\n\\n## Апгрейды\\n\\nВыбранные вами улучшения будут действовать до конца игры. Некоторые из них можно использовать несколько раз. Полученные бонусы помогут улучшить прицел или облегчить игру другими способами. Часть из них полезна только в комбинации с другими.\\n\\nВ начале каждой игры вы всегда получаете один бонус. Его иконка будет служить кирпичом первого уровня. Выбрать стартовые улучшения можно в настройках.\\n\\nПолученные улучшения  влияют на\\"комбо\\".\\n\\n## Комбо\\n\\nВаше \\"комбо\\" - это количество монет, появляющихся при разрушении кирпича. Оно отображается на экране, например, x4 означает, что каждый кирпич дает 4 монеты.Вы теряете комбо, если мяч возвращается к шайбе, не попав ни в один кирпич. В этом случае будет показано сообщение \\"промах\\".\\n\\nСтарайтесь каждый раз целиться в кирпич.\\n\\n## Прицеливание\\n\\nТолько положение мяча на шайбе определяет, как он отскочит. Если мяч попадет в центр шайбы, он отскочит вертикально вверх. Если вы ударите с одной стороны, он отскочит под большим углом. Скорость шайбы и угол входа не влияют на направление мяча после отскока.\\n\\nВ режиме апгрейд вы можете выбрать функции, которые улучшают прицел и точность попадания.\\n\\n## Unlocks\\n\\nПри первой игре в Breakout 71 большинство обновлений и уровней заблокированы. Модификации можно разблокировать, просто играя и собирая много монет. Первые уровни разблокируются при достижении высокого результата. Последующие уровни добавляют условие, по которому вы можете выбрать улучшения.\\n\\nС помощью полученных апгрейдов добиваться высоких результатов гораздо легче.\\n\\n## Повторные прокачки и бесплатные улучшения\\n\\nВы получите дополнительные улучшения и выбор, если будете играть хорошо:\\n\\n- Быстро пройти уровень\\n- Поймать все монеты\\n- Всегда ударять по чему-то между отскоками ракетки","help.help":"Узнайте больше об игре","help.levels":"Уровни","help.title":"Инструкция","help.upgrades":"## Апгрейды","history.columns.score":"Оценка","history.columns.started":"Дата","history.help":"Посмотрите свои {{count}} лучшие игры.","history.include_past_versions":"Показать также прошлые версии","history.locked":"Сыграйте не менее десяти игр, чтобы разблокировать","history.title":"История побегов","lab.help":"Попробуйте любую сборку.","lab.instructions":"Выберите улучшения и уровень, затем нажмите кнопку играть выше.","lab.menu_entry":"Творческий режим","lab.play":"Играть","lab.reset":"Перезагрузить","lab.select_level":"Выберите уровень для игры","lab.unlocks_at":"Открывается при общем количестве очков {{score}}","level_up.challenges.catchRateGood ve_file_loaded_ok":"OK","settings.show_fps":"Счетчик FPS","settings.show_fps_help":"Контролируйте работу приложения","settings.show_stats":"Показывайте статистику в реальном времени","settings.show_stats_help":"Монеты, время,  промахи","settings.smooth_lighting":"Плавное освещение","settings.smooth_lighting_help":"Размыть фоновые световые эффекты, чтобы они выглядели менее квадратными. Увеличивает задержку.","settings.sounds":"Звуки игры","settings.sounds_help":"Бипы, блепы и брррр","settings.stress_test":"Стресс-тест","settings.stress_test_help":"Запустите игру, управляемую ботом, с очень большим количеством монет, чтобы проверить пределы производительности вашего устройства.","settings.suggestions.applied":"Предложение по производительности применено!","settings.suggestions.basic_mode":"Предложение: включите базовый режим, чтобы повысить производительность.","settings.suggestions.record":"Предложение: отключите запись видео для повышения производительности.","settings.suggestions.reduce_brightness":"Предложение: уменьшите размер ореола, чтобы улучшить производительность.","settings.suggestions.reduce_coins":"Предложение: улучшить производительность, ограничив количество монет на экране до {{max}}.","settings.suggestions.simpler_lights":"Предложение: упростить расчеты освещения для повышения производительности.","settings.touch_delayed_start":"Отложенный старт на мобильном устройстве","settings.touch_delayed_start_help":"3,2,1,Перейти к началу уровня","starting_perks.checked":"Когда вы начнете новую игру, вам будет дано одно из этих улучшений. Щелкните по улучшению, чтобы исключить его.","starting_perks.help":"Выберите возможные стартовые апгрейды","starting_perks.random":"Все преимущества были убраны, выбор будет случайным.","starting_perks.title":"Стартовые привилегии","starting_perks.unchecked":"Приведенные ниже привилегии не предлагаются в качестве стартовых, но вы можете нажать на них, чтобы добавить в пул.","unlocks.category.advanced":"## Расширенные улучшения\\n\\nОбычно они не очень полезны сами по себе, но могут стать очень мощными в сочетании с правильным комбо-улучшением.","unlocks.category.beginner":"## Улучшения для новичков\\n\\nЭти улучшения очень полезны для новичков, они помогают играть дольше и меньше пропускать мяч.","unlocks.category.combo":"## Улучшения комбо\\n\\nЭти улучшения помогают постепенно увеличивать комбо, но также добавляют условие сброса комбо. Взять одно — хорошая идея, взять больше — увеличивает риск и вознаграждение.","unlocks.category.combo_boost":"## Улучшения усилителя комбо\\n\\nЭти улучшения увеличивают комбо или множитель комбо без добавления условия сброса.","unlocks.category.simple":"## Вспомогательные улучшения\\n\\nЭти улучшения полезны практически в любой сборке.","unlocks.greyed_out_help":"Выделенные серым апгрейды можно разблокировать, увеличив общее количество очков. Общий счет увеличивается каждый раз, когда вы набираете очки в игре.","unlocks.intro":"Ваш общий счет — {{ts}}. Щелкните по улучшению ниже, чтобы начать игру с ним.","unlocks.just_unlocked":"Уровень разблокирован","unlocks.just_unlocked_plural":"Вы только что разблокировали {{count}} уровней","unlocks.level":"Вы разблокировали {{unlocked}} уровней из {{out_of}}","unlocks.level_description":"Уровень {{size}}x{{size}} с {{bricks}} кирпичами, {{colors}} цветами и {{bombs}} бомбами.","unlocks.levels":"Разблокированные уровни","unlocks.minScore":"Достигните ${{minScore}} в беге, чтобы разблокировать игру.","unlocks.minScoreWithPerks":"Достигните ${{minScore}} в беге с {{required}} , но без {{forbidden}} для разблокировки.","unlocks.minScoreWithPerksNoForbidden":"Достигните ${{minScore}} в беге с {{required}} для разблокировки.","unlocks.minTotalScore":"Накопите в общей сложности ${{score}}","unlocks.reached":"Ваш лучший результат - {{reached}}.","unlocks.title_upgrades":"Вы разблокировали {{unlocked}} обновлений из {{out_of}}","unlocks.try":"Пытаться","unlocks.upgrades":"Разблокированные улучшения","unlocks.use":"Использовать","upgrades.addiction.name":"Наркомания","upgrades.addiction.tooltip":"+{{lvl}} комбо / кирпич, комбо сбрасывается на {{delay}}с после разрушения кирпича.","upgrades.addiction.verbose_description":"Отсчет начинается только после разрушения первого кирпича на каждом уровне. Он остановится, как только все кирпичи будут уничтожены.","upgrades.asceticism.name":"Аскетизм","upgrades.asceticism.tooltip":"+{{combo}} комбо/кирпич, - {{combo}} при ловле монет","upgrades.asceticism.verbose_description":"Вам нужно будет где-то хранить монеты, пока ваш комбо поднимается.","upgrades.ball_attract_ball.name":"Гравитация","upgrades.ball_attract_ball.tooltip":"Мячи притягивают мячи","upgrades.ball_attract_ball.verbose_description":"Шары, находящиеся на расстоянии более \\"3/4 ширины игровой зоны\\", начнут притягиваться друг к другу.\\n\\nСила притяжения сильнее, когда они находятся на наибольшем расстоянии друг от друга.\\n\\nРадужные частицы будут летать, символизируя силу притяжения. Это преимущество можно получить, только если у вас уже есть более одного шара.","upgrades.ball_attracts_coins.name":"Шарики притягивают монеты","upgrades.ball_attracts_coins.tooltip":"Монеты следуют за ближайшим шаром и падают медленнее","upgrades.ball_attracts_coins.verbose_description":"Это можно использовать, чтобы \\"раскрасить\\" шарики монетами, если совместить это с \\"пятном\\" и \\"призрачными монетами\\". Это также подходит в качестве замены магнита для монет.","upgrades.ball_repulse_ball.name":"Личное пространство","upgrades.ball_repulse_ball.tooltip":"Шарики отталкиваются от шариков","upgrades.ball_repulse_ball.verbose_description":"Шарики, находящиеся на расстоянии менее четверти ширины экрана, начнут отталкиваться друг от друга. Сила отталкивания будет сильнее, если они находятся близко друг к другу. Частицы будут вылетать из шара, символизируя действие этой силы. Эта возможность доступна только в том случае, если у вас уже есть несколько шаров.","upgrades.base_combo.name":"Прочный фундамент","upgrades.base_combo.tooltip":"Комбо начинается с 4 вместо 1.","upgrades.base_combo.verbose_description":"Обычно ваше комбо начинается с 1 в начале уровня и сбрасывается до 1, когда вы не попадаете ни во что.  Комбо начинается на 3 пункта выше, поэтому вы всегда будете получать не менее 4 монет за кирпич. Когда ваше комбо обнулится, оно вернется к 4, а не к 1. Ваш мяч будет немного блестеть, чтобы показать, что его комбо выше единицы.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Большие взрывы","upgrades.bigger_explosions.verbose_description":"Взрыв по умолчанию очищает квадрат 3x3, с этим взрывом он становится квадратом 5x5, а удар по монетам также значительно сильнее. После каждого взрыва экран будет мигать (кроме базового режима).","upgrades.bigger_puck.name":"Большое весло","upgrades.bigger_puck.tooltip":"Легко поймать больше монет.","upgrades.bigger_puck.verbose_description":"Большее весло позволяет никогда не промахиваться по мячу и ловить больше монет, а также точно определять угол отскока (угол наклона мяча зависит только от того, куда он попадает при ударе о весло).","upgrades.bricks_attract_ball.name":"Кирпичи притягивают мячи","upgrades.bricks_attract_ball.tooltip":"Мяч летит к первым {{count}} кирпичам, которых он коснется.","upgrades.bricks_attract_ball.verbose_description":"Эффект сильнее на более высоких уровнях. Количество кирпичей, которые могут ударить до того, как эффект прекратится, также больше. Эффект возобновляется, когда мяч касается шайбы.","upgrades.bricks_attract_coins.name":"Кирпичи притягивают монеты","upgrades.bricks_attract_coins.tooltip":"Помогает им оставаться на вершине","upgrades.bricks_attract_coins.verbose_description":"Монеты будут притягиваться к соседним кирпичам. На более высоких уровнях притяжение становится сильнее.","upgrades.buoy.name":"Буй","upgrades.buoy.tooltip":"Монеты плавают в течение {{duration}} секунд на нижней строке.","upgrades.buoy.verbose_description":"Эффект наиболее заметен в мобильном режиме.","upgrades.chill.name":"Chill","upgrades.chill.tooltip":"Больше никаких обновлений, неограниченных уровней.","upgrades.chill.verbose_description":"Мяч также будет ускоряться гораздо медленнее.","upgrades.clairvoyant.name":"Ясновидящий","upgrades.clairvoyant.tooltip":"Просматривайте предстоящие уровни, количество кирпичей и направление движения мяча","upgrades.clairvoyant.verbose_description":"Поможет выбрать правильные апгрейды и понять, что происходит с прочными кирпичами. Уровни 2 и 3 дают дополнительные знания сомнительной полезности (достигаются в режиме цикла)","upgrades.coin_magnet.name":"Магнит для монет","upgrades.coin_magnet.tooltip":"Лопасть притягивает монеты","upgrades.coin_magnet.verbose_description":"Направляет монеты к лопатке. Эффект будет сильнее, если монета уже находится рядом с ним.","upgrades.compound_interest.name":"Сложные проценты","upgrades.compound_interest.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич, сбрасывается при потере монеты","upgrades.compound_interest.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо будет увеличиваться на одну монету, и с каждым разбитым кирпичом будет появляться все больше и больше монет.\\nОднако не забывайте ловить все монеты лопаткой, так как любая потерянная монета обнулит ваше комбо.\\nКак только ваше комбо превысит минимальный уровень, в нижней части игрового поля появится красная линия, напоминающая вам, что монеты не должны попадать туда.","upgrades.concave_puck.name":"Вогнутое весло","upgrades.concave_puck.tooltip":"Повышает точность вертикальной наводки","upgrades.concave_puck.verbose_description":"Мячи начинают уровень, поднимаясь прямо вверх, и отскакивают под меньшим углом.","upgrades.corner_shot.name":"Угловой удар","upgrades.corner_shot.tooltip":"Позволяет накладывать паддл на границы экрана","upgrades.corner_shot.verbose_description":"Помогает прицеливаться на поворотах. Дальние уровни позволят вам выйти дальше.","upgrades.double_or_nothing.name":"Двойной или ничего","upgrades.double_or_nothing.tooltip":"Комбо поднимается в {{multiplier}} раз быстрее, но вы будете терять {{percent}}% своего счета при каждом сбросе.","upgrades.double_or_nothing.verbose_description":"Сброс комбо засчитывается только тогда, когда ваше комбо превысило минимум.","upgrades.etherealcoins.name":"Монеты, в космосе","upgrades.etherealcoins.tooltip":"На монеты больше не действует гравитация","upgrades.etherealcoins.verbose_description":"Монеты сохранят свою скорость даже после нескольких подпрыгиваний, и на них больше не будет действовать гравитация.","upgrades.extra_levels.name":"Еще 5 минут","upgrades.extra_levels.tooltip":"Играйте {{count}} уровней вместо 7","upgrades.extra_levels.verbose_description":"По умолчанию игра может длиться максимум 7 уровней, после чего игра заканчивается.\\n\\nКаждый уровень этой привилегии позволяет вам подняться на один уровень выше. Последние уровни часто являются теми, где вы набираете больше всего очков, так что разница может быть значительной.","upgrades.extra_life.name":"Доп. жизнь","upgrades.extra_life.tooltip":"Мяч отскочит один раз на нижнюю линию, после чего будет потерян.","upgrades.extra_life.verbose_description":"Обычно у вас один шар, и игра заканчивается, как только вы его бросите.\\n\\nВ этом случае добавится белая линия в нижней части экрана, которая сохранит шарик один раз и разобьется в процессе.\\n\\nВы будете терять один уровень  каждый раз, когда мяч будет отскакивать в нижнюю часть экрана.","upgrades.forgiving.name":"Прощение","upgrades.forgiving.tooltip":"Пропущенные паузы уменьшают комбо постепенно, а не все сразу.","upgrades.forgiving.verbose_description":"Первый промах за уровень - бесплатно, затем 10% от комбо, затем 20%.","upgrades.fountain_toss.name":"Бросок фонтана","upgrades.fountain_toss.tooltip":"Получите несколько комбо, когда пропустите несколько монет.","upgrades.fountain_toss.verbose_description":"Если вы пропустили монету, а ваша комбинация была ниже уровня*30, у вашей комбинации есть вероятность того, что уровень/комбинация вырастет на единицу.","upgrades.ghost_coins.name":"Призрачные монеты","upgrades.ghost_coins.tooltip":"Монеты медленно проходят сквозь кирпичи","upgrades.ghost_coins.verbose_description":"Это не ошибка, это особенность!  Монеты пролетают сквозь кирпичи медленно. На более высоких уровнях они движутся быстрее.","upgrades.golden_goose.name":"Золотой гусь","upgrades.golden_goose.tooltip":"Монеты телепортируются к мячу после удара о кирпич","upgrades.golden_goose.verbose_description":"Всякий раз, когда монета ударяется о кирпич, телепортируйте эту монету к ближайшему шару. На втором уровне монеты телепортируются и после удара о сторону.","upgrades.happy_family.name":"Счастливая семья.","upgrades.happy_family.tooltip":"Больше монет, если вы оставите все мячи в игре.","upgrades.happy_family.verbose_description":"+1 комбо за каждый дополнительный мяч за отскок ракетки. Комбо сбрасывается при потере мяча. Только мяч выше 1 дает комбо.","upgrades.helium.name":"Гелий","upgrades.helium.tooltip":"Гравитация изменяется слева и справа от весла","upgrades.helium.verbose_description":"На уровне 1 гравитация уменьшается. На уровне 2 монеты медленно всплывают. На уровне 3 они действительно летают.","upgrades.hot_start.name":"Горячий старт","upgrades.hot_start.tooltip":"Начните с комбо {{start}}, -{{loss}} комбо в секунду","upgrades.hot_start.verbose_description":"В начале каждого уровня ваше комбо будет начинаться с +30 очков, но затем каждую секунду оно будет уменьшаться на одно. Эффект суммируется с другими перками.","upgrades.implosions.name":"Имплозии","upgrades.implosions.tooltip":"Взрывы всасывают монеты, а не выдувают их.","upgrades.implosions.verbose_description":"Сила взрыва действует в обратном направлении. Дальние уровни действуют как \\"больший взрыв\\".","upgrades.left_is_lava.name":"Избегайте левой стороны","upgrades.left_is_lava.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич. Комбо сбрасывается, если мяч попадает в левую часть экрана","upgrades.left_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один, так что вы получите на одну монету больше со всех следующих разбитых кирпичей.\\n\\nОднако ваше комбо обнуляется, как только ваш шарик попадает в левую сторону.\\n\\nКак только ваше комбо увеличится, левая сторона станет красной, чтобы напомнить вам, что вы должны избегать столкновения с ней.","upgrades.limitless.name":"Безграничный","upgrades.limitless.tooltip":"Повысьте максимальный уровень всех апгрейдов на {{lvl}} .","upgrades.limitless.verbose_description":"Выбрав это умение, вы также повышаете свой собственный лимит на один, что позволяет вам выбрать его снова.","upgrades.metamorphosis.name":"Метаморфозы","upgrades.metamorphosis.tooltip":"Каждая монета может окрасить {{lvl}} кирпичей в свой цвет","upgrades.metamorphosis.verbose_description":"С этим перком монеты будут иметь цвет кирпича, из которого они появились, и окрасят первый кирпич, которого они коснутся, в тот же цвет. Монеты рождаются со скоростью разбившего их шара, а значит, вы можете немного прицелиться в направлении кирпичей, которые хотите \\"раскрасить\\". На первом уровне каждая монета может окрасить 1 кирпич, прежде чем она будет \\"потрачена\\" и появится в пустоте.","upgrades.minefield.name":"Минное поле","upgrades.minefield.tooltip":"+{{percent}}% монет за кирпич-бомбу на экране","upgrades.minefield.verbose_description":"Подсчет бомб ведется также во время их взрыва.","upgrades.multiball.name":"Мультишар","upgrades.multiball.tooltip":"Начинайте каждый уровень с {{count}} шариков.","upgrades.multiball.verbose_description":"Как только вы бросите мяч в игре Breakout 71, вы проиграете.\\n\\nС этим преимуществом вы получаете два мяча, поэтому можете позволить себе потерять один.\\n\\nПотерянные мячи возвращаются на следующем уровне.\\n\\nНаличие более одного шара делает доступными некоторые дополнительные преимущества и, конечно, позволяет быстрее пройти уровень.","upgrades.nbricks.name":"Строгий размер выборки","upgrades.nbricks.tooltip":"Попадите точно в {{lvl}} кирпичей за один удар веслом, чтобы получить +{{lvl}} комбо, иначе оно сбрасывается.","upgrades.nbricks.verbose_description":"Вам не обязательно уничтожать кирпичи, но вы должны попасть в них. Кирпичи, разрушенные взрывами, не считаются.","upgrades.one_more_choice.name":"Дополнительный выбор","upgrades.one_more_choice.tooltip":"При дальнейшем повышении уровня будет предложено на {{lvl}} больше вариантов в списке","upgrades.one_more_choice.verbose_description":"В каждом меню апгрейдов появится еще одна опция.  Это не увеличивает количество апгрейдов, которые вы можете выбрать.","upgrades.ottawa_treaty.name":"Оттавский договор","upgrades.ottawa_treaty.tooltip":"Разбивание кирпича рядом с бомбой обезвреживает ее.","upgrades.ottawa_treaty.verbose_description":"Ближайшая бомба будет заменена цветным блоком. Если у вас есть сапер, мяч потеряет свой эффект сапера до следующего отскока. За один раз можно заменить только одну бомбу.","upgrades.passive_income.name":"Пассивный доход","upgrades.passive_income.tooltip":"+{{lvl}} комбо / кирпич, весло не имеет значения {{time}}с после перемещения","upgrades.passive_income.verbose_description":"Некоторые привилегии могут помочь шарам делать то, что вы хотите, без необходимости что-либо предпринимать.","upgrades.picky_eater.name":"Придирчивый едок","upgrades.picky_eater.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич, сбрасывается при смене цвета шара","upgrades.picky_eater.verbose_description":"Когда вы разбиваете кирпич того же цвета, что и ваш шарик, ваше комбо увеличивается на единицу.\\nЕсли кирпич другого цвета, то мяч принимает новый цвет, но комбо обнуляется, если только не осталось кирпичей того же цвета, что и мяч.\\nКак только вы получите комбо выше минимального, кирпичи неправильного цвета будут обведены красной рамкой.\\nЕсли у вас больше одного шара, они все меняют цвет, когда один из них попадает в кирпич.","upgrades.pierce.name":"Пирсинг","upgrades.pierce.tooltip":"Мяч пробивает {{count}} кирпичей после отскока от площадки","upgrades.pierce.verbose_description":"Обычно мяч отскакивает, как только коснется чего-нибудь. С этим преимуществом он будет продолжать двигаться по траектории до 3 разбитых кирпичей.\\n\\nПосле этого он отскочит на 4-м кирпиче, и вам нужно будет коснуться лопатки, чтобы сбросить счетчик.","upgrades.pierce_color.name":"Цветной пирсинг","upgrades.pierce_color.tooltip":"+{{lvl}} урона кирпичам цвета шара","upgrades.pierce_color.verbose_description":"Если шарик попадает в кирпич того же цвета, он просто беспрепятственно проходит сквозь него.\\n\\nЕсли он попадет в кирпич другого цвета, то разобьет его, возьмет его цвет и отскочит.\\n\\nЕсли у вас прочные кирпичи, мяч все равно может отскочить от кирпича того же цвета.","upgrades.puck_repulse_ball.name":"Мягкая посадка","upgrades.puck_repulse_ball.tooltip":"Лопасть отталкивает мячи","upgrades.puck_repulse_ball.verbose_description":"Когда мяч приблизится к лопатке, он начнет замедляться и даже может отскочить, не коснувшись лопатки.","upgrades.rainbow.name":"Радуга","upgrades.rainbow.tooltip":"Монеты спаунятся с радужным цветом.","upgrades.rainbow.verbose_description":"С каждым уровнем увеличивается доля цветных монет. Цвет зависит от времени прохождения уровня.","upgrades.reach.name":"Сверху вниз","upgrades.reach.tooltip":"Прикосновение к N кирпичам самого нижнего ряда сбрасывает комбо. В противном случае +N комбо","upgrades.reach.verbose_description":"Если есть только один ряд кирпичей или если самый нижний ряд кирпичей занимает всю ширину игры, то этот перк ничего не делает. В противном случае, разбив этот самый нижний ряд, вы сбрасываете комбо, а разбив любой другой, увеличиваете комбо на количество кирпичей в этом самом нижнем ряду.\\n\\nСамый нижний ряд будет выделен красным цветом.","upgrades.respawn.name":"Перерождение","upgrades.respawn.tooltip":"{{percent}}% кирпичей перерождаются через {{delay}}с.","upgrades.respawn.verbose_description":"Некоторые эффекты частиц позволят вам узнать, где будут появляться кирпичи.","upgrades.right_is_lava.name":"Избегайте правой стороны","upgrades.right_is_lava.tooltip":"+{{lvl}} комбо на кирпич. Комбо сбрасывается, если мяч попадает в правую часть экрана","upgrades.right_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один, так что вы получите на одну монету больше со всех следующих разбитых кирпичей.\\n\\nОднако, как только ваш шарик попадет в правую сторону, ваша комбинация обнулится.\\n\\nКак только ваше комбо увеличится, правая сторона станет красной, чтобы напомнить вам, что вы должны избегать столкновения с ней.","upgrades.sacrifice.name":"Жертвоприношение","upgrades.sacrifice.tooltip":"Потеряв жизнь {{lvl}}x, комбо затем очищает все кирпичи.","upgrades.sacrifice.verbose_description":"Это может поднять комбо довольно высоко.","upgrades.sapper.name":"Сапёр","upgrades.sapper.tooltip":"Первый разбитый кирпич превращается в бомбу.","upgrades.sapper.verbose_description":"Вместо того чтобы просто исчезнуть, первый разбитый вами кирпич будет заменен кирпичом с бомбой. Если ударить мячом по лопатке, эффект повторится. Повысив уровень этого умения, вы сможете устанавливать больше бомб.","upgrades.shocks.name":"Шоки","upgrades.shocks.tooltip":"Взрывные столкновения шаров","upgrades.shocks.verbose_description":"Когда два шара сталкиваются, они обмениваются скоростью, порождают взрыв и набирают дополнительную скорость, чтобы разделиться.","upgrades.shunt.name":"Шунт","upgrades.shunt.tooltip":"Сохраняйте {{percent}}% вашего комбо между уровнями","upgrades.shunt.verbose_description":"Если у вас также есть горячий старт, горячий старт просто добавляется к текущему комбо.","upgrades.side_flip.name":"Правая рука","upgrades.side_flip.tooltip":"+{{lvl}} комбо за каждый кирпич, разбитый справа, -{{loss}} в противном случае","upgrades.side_flip.verbose_description":"Ударьте кирпич с правой стороны, чтобы получить одно комбо, но избегайте ударов с левой стороны, так как это снимет 2 комбо. Удары сверху и снизу не дают никакого эффекта.","upgrades.side_kick.name":"Левая рука","upgrades.side_kick.tooltip":"+{{lvl}} комбо за каждый кирпич, разбитый слева, -{{loss}} в противном случае","upgrades.side_kick.verbose_description":"Ударьте кирпич с левой стороны, чтобы получить одно комбо, но избегайте ударов с правой стороны, так как это снимет 2 комбо. Удары сверху и снизу не дают никакого эффекта.","upgrades.skip_last.name":"Легкая очистка","upgrades.skip_last.tooltip":"Последний кирпич взорвется.","upgrades.skip_last.verbose_description":"Вам нужно разбить все кирпичи, чтобы перейти на следующий уровень. Однако получить последние может быть непросто.\\n\\nРаннее прохождение уровня дает дополнительные возможности при улучшении. Никогда не пропускать кирпичи также очень полезно.\\n\\nТак что если вам трудно разбить последние кирпичи, получите эту привилегию несколько раз.","upgrades.slow_down.name":"Медленный мяч","upgrades.slow_down.tooltip":"Мяч движется медленнее","upgrades.slow_down.verbose_description":"Мяч стартует относительно медленно, но с каждым уровнем вашей игры он будет стартовать все быстрее.\\n\\nОн также ускорится, если вы проведете много времени на одном уровне.\\n\\nЭто преимущество делает его более управляемым.\\n\\nВы можете получать его каждый раз в начале игры, включив детский режим в меню.","upgrades.smaller_puck.name":"Маленькое весло","upgrades.smaller_puck.tooltip":"Также дает +{{percent}}% монет","upgrades.smaller_puck.verbose_description":"Это делает ракетку меньше, что в теории облегчает некоторые угловые удары, но на самом деле просто повышает сложность.\\n\\nВот почему вы также получаете приятный бонус в виде +50% появления монет.","upgrades.soft_reset.name":"Мягкий сброс","upgrades.soft_reset.tooltip":"Комбо-сброс сохраняет {{percent}}%","upgrades.soft_reset.verbose_description":"Ограничьте влияние комбо-сброса.","upgrades.steering.name":"Рулевое управление","upgrades.steering.tooltip":"Шарики вращаются при движении весла","upgrades.steering.verbose_description":"Изменение положения шайбы напрямую влияет на направление движения мячей. На уровне 2+ вы получаете линию, показывающую направление вашего мяча.","upgrades.sticky_coins.name":"Липкие монеты","upgrades.sticky_coins.tooltip":"Монеты прилипают к кирпичам того же цвета.","upgrades.sticky_coins.verbose_description":"На уровне 2 они прилипают к кирпичам любого цвета.","upgrades.streak_shots.name":"Попадание в полосу","upgrades.streak_shots.tooltip":"Больше монет, если вы разобьете много кирпичей, прежде чем подпрыгнуть на лопатке.","upgrades.streak_shots.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на единицу.\\n\\nОднако как только мяч коснется вашего весла, комбо будет сброшено до стандартного значения.\\n\\nКак только ваше комбо поднимется выше базового значения, на лопатке появится красная рамка, напоминающая о том, что прикосновение мяча к ней уничтожит ваше комбо.","upgrades.sturdy_bricks.name":"Прочные кирпичи","upgrades.sturdy_bricks.tooltip":"+{{lvl}} кирпичей HP, +{{percent}}% монет, выпадающих при разрушении","upgrades.sturdy_bricks.verbose_description":"Каждый уровень этого перка добавляет один HP ко всем кирпичам. Вы можете увидеть количество HP с помощью перка \\"Ясновидящий\\". Вы можете увеличить урон от шаров, получив перк \\"Пронзающий\\". Каждый уровень этого перка добавляет +50% к спауну монет.","upgrades.superhot.name":"СУПЕР ГОРЯЧИЙ","upgrades.superhot.tooltip":"Время движется, когда движется весло.","upgrades.superhot.verbose_description":"СУПЕР ГОРЯЧИЙ СУПЕР ГОРЯЧИЙ СУПЕР ГОРЯЧИЙ СУПЕР ГОРЯЧИЙ","upgrades.telekinesis.name":"Телекинез","upgrades.telekinesis.tooltip":"Паддл управляет траекторией полета мяча","upgrades.telekinesis.verbose_description":"Вы управляете мячом, пока он поднимается вверх.","upgrades.three_cushion.name":"Три подушки","u sity.verbose_description":"Монеты обычно разгоняются с помощью гравитации и взрывов до довольно высоких скоростей.\\n\\nЭтот перк постоянно заставляет их замедляться, как будто они находятся в какой-то вязкой жидкости.\\n\\nЭто облегчает их поимку и отлично сочетается с перками, влияющими на движение монет.","upgrades.wind.name":"Ветер","upgrades.wind.tooltip":"Положение весла создает ветер","upgrades.wind.verbose_description":"Ветер зависит от положения лопасти: левая дует влево, правая - вправо. Влияет как на шарики, так и на монеты.","upgrades.wrap_left.name":"Обернуть влево","upgrades.wrap_left.tooltip":"Удар по левой стороне телепортирует мяч на правую сторону.","upgrades.wrap_left.verbose_description":"Более высокие уровни также телепортируют монеты.","upgrades.wrap_right.name":"Обернуть вправо","upgrades.wrap_right.tooltip":"Удар по правой стороне телепортирует мяч на левую сторону.","upgrades.wrap_right.verbose_description":"Более высокие уровни также телепортируют монеты.","upgrades.wrap_up.name":"Заворачивать","upgrades.wrap_up.tooltip":"Прикосновение к верхней части экрана телепортирует мяч чуть выше ракетки.","upgrades.wrap_up.verbose_description":"Это не будет считаться попаданием шайбы. На уровне 2 монеты тоже телепортируются.","upgrades.yoyo.name":"Йо-йо","upgrades.yoyo.tooltip":"Мяч падает на лопатку","upgrades.yoyo.verbose_description":"Это противоположность телекинезу: управляйте мячом, пока он падает обратно.","upgrades.zen.name":"Дзен","upgrades.zen.tooltip":"Больше монет, если не активировать бомбы","upgrades.zen.verbose_description":"+{{lvl}} комбо каждые 3 с, сбрасывается при взрыве"}');var L={};L=JSON.parse('{"confirmRestart.no":"Cancelar","confirmRestart.text":"Estás a punto de empezar un nuevo partido: ¿es esto realmente lo que querías?","confirmRestart.title":"¿Empezar una nueva partida?","confirmRestart.yes":"Empezar una nueva partida","editor.editing.bigger":"Aumentar el tamaño del nivel","editor.editing.color":"Elige un color de la list s.balls_lost":"Balas perdidas","gameOver.stats.bricks_broken":"Ladrillos rotos","gameOver.stats.bricks_per_minute":"Ladrillos rotos por minuto","gameOver.stats.catch_rate":"Monedas atrapadas","gameOver.stats.combo_avg":"Combo medio","gameOver.stats.combo_max":"Combinación máxima","gameOver.stats.duration_per_level":"Duración por nivel","gameOver.stats.hit_rate":"Precisión","gameOver.stats.level_reached":"Nivel alcanzado","gameOver.stats.total_score":"Puntuación total","gameOver.stats.upgrades_applied":"Mejoras aplicadas","gameOver.stats_intro":"Encuentra a continuación tus estadísticas de juego comparadas con tus {{count}} mejores juegos.","gameOver.unlocked_perk":"Actualización desbloqueada","gameOver.unlocked_perk_plural":"Has desbloqueado {{count}} mejoras","gameOver.win.summary":"Este juego ha terminado. Has acumulado {{score}} monedas.","gameOver.win.title":"Ha completado esta parte","help.content":"## Objetivo\\n\\nAtrapa tantas monedas como puedas durante 7 niveles.\\nLas monedas aparecen al romper ladrillos.\\nAtrápalas con la pala para aumentar tu puntuación.\\nTu puntuación se muestra en la esquina superior derecha de la pantalla.\\nNo dejes caer la bola o se acabará la partida.\\n\\nDespués de destruir todos los ladrillos, podrás elegir una mejora.\\n\\n## Mejoras\\n\\nLas mejoras que elijas se aplicarán hasta el final de la partida.\\n\\nAlgunas se pueden elegir varias veces para un efecto más potente.\\nAlgunas ayudan a apuntar o facilitan el juego de otras maneras.\\n\\nAlgunas solo son útiles al combinarlas.\\n\\nSiempre obtienes una mejora al principio de cada partida.\\n\\nSu icono servirá como los ladrillos del primer nivel.\\n\\nPuedes seleccionar las mejoras iniciales en la configuración.\\n\\nMuchas mejoras afectan a tu combo.\\n\\n## Combo\\n\\nTu \\"combo\\" es la cantidad de monedas que se generan al romper un ladrillo. Se muestra en tu pala; por ejemplo, \uD83E\uDE994 significa que cada ladrillo generará 4 monedas.\\nLa mayoría de las mejoras que aumentan el combo también añaden una condición para reiniciarlo.\\nEl combo también se reiniciará si la pelota regresa a la pala sin tocar ningún ladrillo.\\nCuando esto ocurra, se mostrará un mensaje de \\"fallo\\".\\n\\nIntenta apuntar a un ladrillo siempre.\\n\\n## Apuntar\\n\\nSolo la posición de la pelota en la pala determina cómo rebotará.\\nSi la pelota impacta en el centro de la pala, rebotará verticalmente.\\n\\nSi golpeas más hacia un lado, tendrá más ángulo.\\n\\nLa velocidad de la pala y el ángulo de entrada no afectan la dirección de la pelota después de rebotar.\\n\\nSe pueden desbloquear muchas mejoras que ayudan a apuntar.\\n\\n## Desbloqueos\\n\\nAl jugar Breakout 71 por primera vez, la mayoría de las mejoras y niveles están bloqueados.\\nLas mejoras se desbloquean simplemente jugando y atrapando muchas monedas.\\n\\nLos primeros niveles se desbloquean al alcanzar una puntuación alta. Los niveles superiores añaden una condición sobre las ventajas que puedes seleccionar.\\n\\nAlcanzar puntuaciones altas es mucho más fácil cuando consigues varias mejoras por nivel gracias a las medallas.\\n\\n## Medallas\\n\\nObtendrás mejoras y opciones adicionales si juegas bien:\\n\\n- Completa el nivel rápidamente\\n- Atrapa todas las monedas\\n- Golpea siempre algo entre cada rebote de la pala","help.help":"Descubre más sobre el juego","help.levels":"Niveles","help.title":"Ayuda","help.upgrades":"## Actualizaciones","history.columns.score":"Puntuación","history.columns.started":"Fecha","history.help":"Enumera tus {{count}} mejores juegos.","history.include_past_versions":"Mostrar versiones anteriores también","history.locked":"Juega primero al menos diez partidos","history.title":"Historia","lab.help":"Prueba cualquier combinación de mejoras y niveles.","lab.instructions":"Selecciona mejoras y un nivel, luego haz clic en el botón de reproducción de arriba.","lab.menu_entry":"Modo creativo","lab.play":"Jugar","lab.reset":"Reiniciar","lab.select_level":"Selec
