e_press_to_play":"Нажмите и удерживайте здесь, чтобы играть","play.score_tooltip":"Узнайте о своих оценках, обновлениях и многом другом","play.stats.coins_catch_rate":"Скорость добычи монет","play.stats.levelMisses":"Пропущенные выстрелы, когда вы не попали ни в кого","play.stats.levelTime":"Время уровня","play.stats.levelWallBounces":"Отскоки от стены","score_panel.close_to_unlock":"Разблокировка следующего уровня:","score_panel.get_upgrades_to_unlock":"Наберите {{missingUpgrades}} и наберите {{points}} больше очков, чтобы разблокировать уровень \\"{{level}}\\"","score_panel.rerolls_count":"Вы накопили {{rerolls}} повторных бросков","score_panel.score_to_unlock":"Наберите {{points}} больше очков, чтобы разблокировать уровень \\"{{level}}\\"","score_panel.title":"{{score}} очков на уровне {{level}}/{{max}} ","score_panel.upcoming_levels":"Предстоящие уровни :","score_panel.upgrades_picked":"Обновления, выбранные в этой игре, запускаются :","unlocks.greyed_out_help":"Выделенные серым апгрейды можно разблокировать, увеличив общее количество очков. Общий счет увеличивается каждый раз, когда вы набираете очки в игре.","unlocks.intro":"Ваш общий счет составляет {{ts}}. Ниже представлены все обновления и уровни, которые предлагает игра.   Нажмите на апгрейд или уровень ниже, чтобы начать тестовую игру с ним.","unlocks.just_unlocked":"Уровень разблокирован","unlocks.just_unlocked_plural":"Вы только что разблокировали {{count}} уровней","unlocks.level":"<h2>Вы разблокировали {{unlocked}} уровней из {{out_of}}</h2>\\n<p>Здесь представлены все уровни игры, нажмите на один из них, чтобы опробовать его.</p> ","unlocks.level_description":"Уровень {{size}}x{{size}} с {{bricks}} кирпичами, {{colors}} цветами и {{bombs}} бомбами.","unlocks.minScore":"Достигните ${{minScore}} в беге, чтобы разблокировать игру.","unlocks.minScoreWithPerks":"Достигните ${{minScore}} в беге с {{required}} , но без {{forbidden}} для разблокировки.","unlocks.minTotalScore":"Накопите в общей сложности ${{score}}","unlocks.reached":"Ваш лучший результат - {{reached}}.","unlocks.title_upgrades":"Вы разблокировали {{unlocked}} обновлений из {{out_of}}","upgrades.addiction.name":"Наркомания","upgrades.addiction.tooltip":"+{{lvl}} комбо / кирпич, комбо сбрасывается на {{delay}}с после разрушения кирпича.","upgrades.addiction.verbose_description":"Отсчет начинается только после разрушения первого кирпича на каждом уровне. Он остановится, как только все кирпичи будут уничтожены.","upgrades.asceticism.name":"Аскетизм","upgrades.asceticism.tooltip":"+{{combo}} комбо/кирпич, - {{combo}} при ловле монет","upgrades.asceticism.verbose_description":"Вам нужно будет где-то хранить монеты, пока ваш комбо поднимается.","upgrades.ball_attract_ball.help_plural":"Более сильная сила притяжения","upgrades.ball_attract_ball.name":"Гравитация","upgrades.ball_attract_ball.tooltip":"Мячи притягивают мячи","upgrades.ball_attract_ball.verbose_description":"Шары, находящиеся на расстоянии более \\"3/4 ширины игровой зоны\\", начнут притягиваться друг к другу.\\n\\nСила притяжения сильнее, когда они находятся на наибольшем расстоянии друг от друга.\\n\\nРадужные частицы будут летать, символизируя силу притяжения. Это преимущество можно получить, только если у вас уже есть более одного шара.","upgrades.ball_attracts_coins.name":"Шарики притягивают монеты","upgrades.ball_attracts_coins.tooltip":"Монеты следуют за ближайшим шаром и падают медленнее","upgrades.ball_attracts_coins.verbose_description":"Это можно использовать, чтобы \\"раскрасить\\" шарики монетами, если совместить это с \\"пятном\\" и \\"призрачными монетами\\". Это также подходит в качестве замены магнита для монет.","upgrades.ball_repulse_ball.help_plural":"Более сильные силы отталкивания","upgrades.ball_repulse_ball.name":"Личное пространство","upgrades.ball_repulse_ball.tooltip":"Шарики отталкиваются от шариков","upgrades.ball_repulse_ball.verbose_description":"Шарики, находящиеся на расстоянии менее четверти ширины экрана, начнут отталкиваться друг от друга. Сила отталкивания будет сильнее, если они находятся близко друг к другу. Частицы будут вылетать из шара, символизируя действие этой силы. Эта возможность доступна только в том случае, если у вас уже есть несколько шаров.","upgrades.base_combo.name":"Прочный фундамент","upgrades.base_combo.tooltip":"Комбо начинается с {{coins}} вместо 1.","upgrades.base_combo.verbose_description":"Обычно ваше комбо начинается с 1 в начале уровня и сбрасывается до 1, когда вы подпрыгиваете, не попадая ни во что. С этим перком комбо начинается на 3 пункта выше, поэтому вы всегда будете получать не менее 4 монет за кирпич. Когда ваше комбо обнулится, оно вернется к 4, а не к 1. Ваш шарик будет немного блестеть, чтобы показать, что его комбо выше единицы.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Большие взрывы","upgrades.bigger_explosions.verbose_description":"Взрыв по умолчанию очищает квадрат 3x3, с этим взрывом он становится квадратом 5x5, а удар по монетам также значительно сильнее. После каждого взрыва экран будет мигать (кроме базового режима).","upgrades.bigger_puck.name":"Большая шайба","upgrades.bigger_puck.tooltip":"Легко поймать больше монет.","upgrades.bigger_puck.verbose_description":"Большая шайба позволяет не промахиваться по мячу и ловить больше монет, а также точно определять угол отскока (угол наклона мяча зависит только от того, куда он попадает).\\n\\nОднако большую шайбу сложнее использовать по сторонам уровня, и иногда промах будет неизбежен.","upgrades.clairvoyant.name":"Ясновидящий","upgrades.clairvoyant.tooltip":"Просматривайте предстоящие уровни, количество кирпичей и направление движения мяча","upgrades.clairvoyant.verbose_description":"Поможет выбрать правильные апгрейды и понять, что происходит с прочными кирпичами. Уровни 2 и 3 дают дополнительные знания сомнительной полезности (достигаются в режиме цикла)","upgrades.coin_magnet.help_plural":"Более сильное воздействие на монеты","upgrades.coin_magnet.name":"Магнит для монет","upgrades.coin_magnet.tooltip":"Шайба притягивает монеты","upgrades.coin_magnet.verbose_description":"Направляет монеты к шайбе. Эффект будет сильнее, если монета уже находится рядом с ней. Поимка всех монет приносит специальные бонусы в игре.\\n\\nДругой способ поймать больше монет - бить по кирпичам снизу. Скорость и направление полета шарика влияют на скорость полета монеты.","upgrades.compound_interest.name":"Сложные проценты","upgrades.compound_interest.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич, сбрасывается при потере монеты","upgrades.compound_interest.verbose_description":"Ваш комбо будет увеличиваться на единицу каждый раз, когда вы разбиваете кирпич, и с каждым разбитым кирпичом будет появляться все больше и больше монет.\\n\\nОднако не забывайте ловить шайбой каждую монетку, ведь любая потерянная монетка обнулит ваше комбо.\\n\\nКак только ваше комбо превысит минимальный уровень, в нижней части игрового поля появится красная линия, которая напомнит вам, что монеты не должны попадать туда.","upgrades.concave_puck.name":"Вогнутая шайба","upgrades.concave_puck.tooltip":"Повышает точность вертикальной наводки","upgrades.concave_puck.verbose_description":"Мячи начинают уровень, поднимаясь прямо вверх, и отскакивают под меньшим углом.","upgrades.corner_shot.name":"Угловой удар","upgrades.corner_shot.tooltip":"Позволяет вашей шайбе перекрывать границы экрана","upgrades.corner_shot.verbose_description":"Помогает прицеливаться на поворотах. Дальние уровни позволят вам выйти дальше.","upgrades.etherealcoins.name":"Монеты, в космосе","upgrades.etherealcoins.tooltip":"На монеты больше не действует гравитация","upgrades.etherealcoins.verbose_description":"Вам придется следить за тем, чтобы монеты падали вниз, иначе вы не получите ни одной.","upgrades.extra_levels.name":"Еще 5 минут","upgrades.extra_levels.tooltip":"Играйте {{count}} уровней вместо 7","upgrades.extra_levels.verbose_description":"По умолчанию игра может длиться максимум 7 уровней, после чего игра заканчивается.\\n\\nКаждый уровень этой привилегии позволяет вам подняться на один уровень выше. Последние уровни часто являются теми, где вы набираете больше всего очков, так что разница может быть значительной.","upgrades.extra_life.help_plural":"Ваш (последний) мяч отскочит на дно, а не будет потерян ({{lvl}} раз).","upgrades.extra_life.name":"Экстра жизнь","upgrades.extra_life.tooltip":"Мяч отскочит один раз на нижнюю линию, после чего будет потерян.","upgrades.extra_life.verbose_description":"Обычно у вас один шар, и игра заканчивается, как только вы его бросите.\\n\\nЭто преимущество добавляет белую полоску в нижней части экрана, которая сохранит шарик один раз и разобьется в процессе.\\n\\nВы будете терять один уровень этого перка каждый раз, когда мяч будет отскакивать в нижнюю часть экрана.","upgrades.forgiving.name":"Прощение","upgrades.forgiving.tooltip":"Пропущенные паузы уменьшают комбо постепенно, а не все сразу.","upgrades.forgiving.verbose_description":"Первый промах за уровень - бесплатно, затем 10% от комбо, затем 20%.","upgrades.fountain_toss.name":"Бросок фонтана","upgrades.fountain_toss.tooltip":"Получите несколько комбо, когда пропустите несколько монет.","upgrades.fountain_toss.verbose_description":"Если вы пропустили монету и ваша комбо была меньше {{max}}, то вероятность того, что ваша комбо вырастет на {{lvl}}/ комбо вырастет на единицу.","upgrades.ghost_coins.name":"Призрачные монеты","upgrades.ghost_coins.tooltip":"Монеты медленно проходят сквозь кирпичи","upgrades.ghost_coins.verbose_description":"Это не ошибка, это особенность!  Монеты пролетают сквозь кирпичи медленно. На более высоких уровнях они движутся быстрее.","upgrades.helium.name":"Гелий","upgrades.helium.tooltip":"Гравитация изменяется слева и справа от шайбы","upgrades.helium.verbose_description":"Это повлияет на монеты и позволит им плавать до тех пор, пока вы не соберете их.","upgrades.hot_start.name":"Горячий старт","upgrades.hot_start.tooltip":"Начните с комбо {{start}}, -{{loss}} комбо в секунду","upgrades.hot_start.verbose_description":"В начале каждого уровня ваше комбо будет начинаться с +30 очков, но затем каждую секунду оно будет уменьшаться на одно. Эффект суммируется с другими перками.","upgrades.implosions.name":"Имплозии","upgrades.implosions.tooltip":"Взрывы всасывают монеты, а не выдувают их.","upgrades.implosions.verbose_description":"Сила взрыва действует в обратном направлении. Дальние уровни действуют как \\"больший взрыв\\".","upgrades.instant_upgrade.name":"Мгновенное обновление","upgrades.instant_upgrade.tooltip":"+1 апгрейд сейчас, -1 выбор до конца игры.","upgrades.instant_upgrade.verbose_description":"Сразу же выберите два апгрейда, чтобы получить один бесплатный и один в качестве компенсации за тот, что был использован для получения этого перка. В каждом последующем меню выбора апгрейдов будет все меньше вариантов.","upgrades.left_is_lava.name":"Избегайте левой стороны","upgrades.left_is_lava.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич. Комбо сбрасывается, если мяч попадает в левую часть экрана","upgrades.left_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один, так что вы получите на одну монету больше со всех следующих разбитых кирпичей.\\n\\nОднако ваше комбо обнуляется, как только ваш шарик попадает в левую сторону.\\n\\nКак только ваше комбо увеличится, левая сторона станет красной, чтобы напомнить вам, что вы должны избегать столкновения с ней.\\n","upgrades.limitless.name":"Безграничный","upgrades.limitless.tooltip":"Повысьте максимальный уровень всех апгрейдов на {{lvl}} .","upgrades.limitless.verbose_description":"Выбрав это умение, вы также повышаете свой собственный лимит на один, что позволяет вам выбрать его снова.","upgrades.metamorphosis.name":"Метаморфозы","upgrades.metamorphosis.tooltip":"Каждая монета может окрасить {{lvl}} кирпичей в свой цвет","upgrades.metamorphosis.verbose_description":"С этим перком монеты будут иметь цвет кирпича, из которого они взяты, и окрасят первый кирпич, которого они коснутся, в тот же цвет.\\n\\nМонеты появляются со скоростью разбившего их шара, а значит, вы можете немного прицелиться в направлении кирпичей, которые хотите \\"покрасить\\".","upgrades.minefield.name":"Минное поле","upgrades.minefield.tooltip":"+{{lvl}} комбо за каждый кирпич с бомбой на экране","upgrades.minefield.verbose_description":"Добавляет +lvl к комбо, когда кирпич находится на месте, -lvl, когда он уничтожается, и повышает базовое комбо на количество кирпичей, умноженное на lvl.","upgrades.multiball.name":"Мультишар","upgrades.multiball.tooltip":"Начинайте каждый уровень с {{count}} шариков.","upgrades.multiball.verbose_description":"Как только вы бросите мяч в игре Breakout 71, вы проиграете.\\n\\nС этим преимуществом вы получаете два мяча, поэтому можете позволить себе потерять один.\\n\\nПотерянные мячи возвращаются на следующем уровне.\\n\\nНаличие более одного шара делает доступными некоторые дополнительные преимущества и, конечно, позволяет быстрее пройти уровень.","upgrades.nbricks.name":"Строгий размер выборки","upgrades.nbricks.tooltip":"Попадите точно в {{lvl}} кирпичей за отскок шайбы, чтобы получить +{{lvl}} комбо, иначе он сбрасывается.","upgrades.nbricks.verbose_description":"Вам не обязательно уничтожать кирпичи, но вы должны попасть в них. Кирпичи, разрушенные взрывами, не считаются.","upgrades.one_more_choice.name":"Дополнительный выбор","upgrades.one_more_choice.tooltip":"При дальнейшем повышении уровня будет предложено на {{lvl}} больше вариантов в списке","upgrades.one_more_choice.verbose_description":"В каждом меню апгрейдов появится еще одна опция.  Это не увеличивает количество апгрейдов, которые вы можете выбрать.","upgrades.passive_income.name":"Пассивный доход","upgrades.passive_income.tooltip":"+{{lvl}} комбо/кирпич, если только шайба не двигалась в течение последних {{time}}с, тогда она сбрасывается.","upgrades.passive_income.verbose_description":"Некоторые привилегии могут помочь шарам делать то, что вы хотите, без необходимости что-либо предпринимать.","upgrades.picky_eater.name":"Придирчивый едок","upgrades.picky_eater.tooltip":"+{{lvl}} комбо за каждый разбитый кирпич, сбрасывается при смене цвета шара","upgrades.picky_eater.verbose_description":"Когда вы разбиваете кирпич того же цвета, что и ваш шарик, ваше комбо увеличивается на единицу.\\nЕсли кирпич другого цвета, то мяч принимает новый цвет, но комбо обнуляется, если только не осталось кирпичей того же цвета, что и мяч.\\nКак только вы получите комбо выше минимального, кирпичи неправильного цвета будут обведены красной рамкой.\\nЕсли у вас больше одного шара, они все меняют цвет, когда один из них попадает в кирпич.","upgrades.pierce.name":"Пирсинг","upgrades.pierce.tooltip":"Мяч пробивает {{count}} кирпичей после отскока шайбы","upgrades.pierce.verbose_description":"Обычно мяч отскакивает, как только коснется чего-нибудь. С этим преимуществом он будет продолжать двигаться по траектории до 3 разбитых кирпичей.\\n\\nПосле этого он отскочит на 4-й кирпич, и вам нужно будет коснуться шайбы, чтобы сбросить счетчик.","upgrades.pierce_color.name":"Цветной пирсинг","upgrades.pierce_color.tooltip":"+{{lvl}} урона кирпичам цвета шара","upgrades.pierce_color.verbose_description":"Если шарик попадает в кирпич того же цвета, он просто беспрепятственно проходит сквозь него.\\n\\nЕсли он попадет в кирпич другого цвета, то разобьет его, возьмет его цвет и отскочит.\\n\\nЕсли у вас прочные кирпичи, мяч все равно может отскочить от кирпича того же цвета.","upgrades.puck_repulse_ball.help_plural":"","upgrades.puck_repulse_ball.name":"Мягкая посадка","upgrades.puck_repulse_ball.tooltip":"Шайба отбивает мячи","upgrades.puck_repulse_ball.verbose_description":"Когда мяч приближается к шайбе, он начинает замедляться и даже может отскочить, не коснувшись шайбы.","upgrades.reach.name":"Сверху вниз","upgrades.reach.tooltip":" Прикосновение к N кирпичам самого нижнего ряда сбрасывает комбо. В противном случае +N комбо","upgrades.reach.verbose_description":"Если есть только один ряд кирпичей или если самый нижний ряд кирпичей занимает всю ширину игры, то этот перк ничего не делает. В противном случае, разбив этот самый нижний ряд, вы сбрасываете комбо, а разбив любой другой, увеличиваете комбо на количество кирпичей в этом самом нижнем ряду.\\n\\nСамый нижний ряд будет выделен красным цветом.","upgrades.respawn.name":"Перерождение","upgrades.respawn.tooltip":"{{percent}}% кирпичей перерождаются через {{delay}}с.","upgrades.respawn.verbose_description":"Некоторые эффекты частиц позволят вам узнать, где будут появляться кирпичи.","upgrades.right_is_lava.name":"Избегайте правой стороны","upgrades.right_is_lava.tooltip":"+{{lvl}} комбо за кирпич. Комбо сбрасывается, если мяч попадает в левую часть экрана","upgrades.right_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один, так что вы получите на одну монету больше со всех следующих разбитых кирпичей.\\n\\nОднако, как только ваш шарик попадет в правую сторону, ваша комбинация обнулится.\\n\\nКак только ваше комбо увеличится, правая сторона станет красной, чтобы напомнить вам, что вы должны избегать столкновения с ней.\\n","upgrades.sacrifice.help_l1":"Потеря жизни очищает все кирпичи","upgrades.sacrifice.help_over":"Потеряв жизнь {{lvl}}x, комбо затем очищает все кирпичи.","upgrades.sacrifice.name":"Жертвоприношение","upgrades.sacrifice.verbose_description":"Это может поднять комбо довольно высоко.","upgrades.sapper.help_plural":"Первые разбитые {{lvl}} кирпичей становятся бомбами.","upgrades.sapper.name":"Сапёр","upgrades.sapper.tooltip":"Первый разбитый кирпич превращается в бомбу.","upgrades.sapper.verbose_description":"Вместо того чтобы просто исчезнуть, первый разбитый вами кирпич будет заменен кирпичом с бомбой. Если подпрыгнуть на шайбе, то эффект повторится. Повысив уровень этого умения, вы сможете устанавливать больше бомб.\\n\\nПомните, что бомбы влияют на скорость близлежащих монет, поэтому слишком большое количество взрывов может затруднить ловлю плодов ваших трудов.","upgrades.shocks.name":"Шоки","upgrades.shocks.tooltip":"Взрывные столкновения шаров","upgrades.shocks.verbose_description":"Когда два шара сталкиваются, они обмениваются скоростью, порождают взрыв и набирают дополнительную скорость, чтобы разделиться.","upgrades.shunt.name":"Шунт","upgrades.shunt.tooltip":"Сохраняйте {{percent}}% вашего комбо между уровнями","upgrades.shunt.verbose_description":"Если у вас также есть горячий старт, горячий старт просто добавляется к текущему комбо.","upgrades.side_flip.name":"Правая рука","upgrades.side_flip.tooltip":"+{{lvl}} комбо за каждый кирпич, разбитый справа, -{{loss}} в противном случае","upgrades.side_flip.verbose_description":"Ударьте кирпич с правой стороны, чтобы получить одно комбо, но избегайте ударов с левой стороны, так как это снимет 2 комбо. Удары сверху и снизу не дают никакого эффекта.","upgrades.side_kick.name":"Левая рука","upgrades.side_kick.tooltip":"+{{lvl}} комбо за каждый кирпич, разбитый слева, -{{loss}} в противном случае","upgrades.side_kick.verbose_description":"Ударьте кирпич с левой стороны, чтобы получить одно комбо, но избегайте ударов с правой стороны, так как это снимет 2 комбо. Удары сверху и снизу не дают никакого эффекта.","upgrades.skip_last.help_plural":"Последние {{lvl}} кирпичей взорвутся.","upgrades.skip_last.name":"Легкая очистка","upgrades.skip_last.tooltip":"Последний кирпич взорвется.","upgrades.skip_last.verbose_description":"Вам нужно разбить все кирпичи, чтобы перейти на следующий уровень. Однако получить последние может быть непросто.\\n\\nРаннее прохождение уровня дает дополнительные возможности при улучшении. Никогда не пропускать кирпичи также очень полезно.\\n\\nТак что если вам трудно разбить последние кирпичи, получите эту привилегию несколько раз.","upgrades.slow_down.name":"Медленный мяч","upgrades.slow_down.tooltip":"Мяч движется медленнее","upgrades.slow_down.verbose_description":"Мяч стартует относительно медленно, но с каждым уровнем вашей игры он будет стартовать все быстрее.\\n\\nОн также ускорится, если вы проведете много времени на одном уровне.\\n\\nЭто преимущество делает его более управляемым.\\n\\nВы можете получать его каждый раз в начале игры, включив детский режим в меню.","upgrades.smaller_puck.help_plural":"Еще меньшая шайба и более высокий базовый комбо","upgrades.smaller_puck.name":"Меньшая шайба","upgrades.smaller_puck.tooltip":"Также дает +5 базовых комбо","upgrades.smaller_puck.verbose_description":"Это делает шайбу меньше, что теоретически облегчает некоторые угловые броски, но на самом деле лишь повышает сложность игры.\\n\\nПоэтому вы также получите приятный бонус в виде +5 монет за каждый кирпич за все кирпичи, которые вы разобьете после этого.","upgrades.soft_reset.name":"Мягкий сброс","upgrades.soft_reset.tooltip":"Комбо-сброс сохраняет {{percent}}%","upgrades.soft_reset.verbose_description":"Ограничьте влияние комбо-сброса.","upgrades.streak_shots.name":"Попадание в полосу","upgrades.streak_shots.tooltip":"Больше монет, если разбить много кирпичей перед тем, как отскочить к шайбе.","upgrades.streak_shots.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо (количество монет за кирпич) увеличивается на один.\\n\\nОднако как только мяч коснется вашей шайбы, комбо вернется к стандартному значению, и вы получите только одну монету за кирпич.\\n\\nКак только ваше комбо поднимется выше базового значения, шайба станет красной, чтобы напомнить вам, что прикосновение мяча к ней уничтожит ваше комбо.","upgrades.sturdy_bricks.name":"Прочные кирпичи","upgrades.sturdy_bricks.tooltip":"+{{lvl}} кирпичей HP, +{{percent}}% монет, выпадающих при разрушении","upgrades.sturdy_bricks.verbose_description":"Каждый уровень этого перка добавляет один HP ко всем кирпичам. Вы можете увидеть количество HP с помощью перка \\"Ясновидящий\\". Вы можете увеличить урон от шаров, получив перк \\"Пронзающий\\". Каждый уровень этого перка добавляет +50% к спауну монет.","upgrades.telekinesis.help_plural":"Более сильное воздействие на мяч","upgrades.telekinesis.name":"Телекинез","upgrades.telekinesis.tooltip":"Шайба контролирует траекторию полета мяча","upgrades.telekinesis.verbose_description":"Вы управляете мячом, пока он поднимается вверх.","upgrades.top_is_lava.name":"Небо - это предел","upgrades.top_is_lava.tooltip":"+{{lvl}} комбо за кирпич, сбрасывается при ударе сверху","upgrades.top_is_lava.verbose_description":"Каждый раз, когда вы разбиваете кирпич, ваше комбо увеличивается на один. Однако, как только ваш мяч попадет в верхнюю часть экрана, комбо обнуляется.\\n\\nКогда ваше комбо превысит минимальное значение, вверху появится красная полоска, напоминающая о том, что вам следует избегать ударов.","upgrades.trampoline.name":"Батут","upgrades.trampoline.tooltip":"+{{lvl}} комбо за отскок шайбы, -{{lvl}} комбо за отскок на любой границе","upgrades.trampoline.verbose_description":"Одно из редких комбо-улучшений, которое не добавляет условие сброса.","upgrades.unbounded.help_no_ceiling":"+{{lvl}} комбо на кирпич, не больше сторон или потолка","upgrades.unbounded.name":"Без ограничений","upgrades.unbounded.tooltip":"+{{lvl}} комбо за кирпич, больше нет сторон, чтобы держать мяч в игре, опасность","upgrades.unbounded.verbose_description":"Надеюсь, вы нашли способ держать мяч на экране. Штрафы за удары по бокам больше не применяются. На уровне 2+ потолок также исчезнет. Это продвинутый перк.","upgrades.viscosity.name":"Вязкость","upgrades.viscosity.tooltip":"Медленное падение монет","upgrades.viscosity.verbose_description":"Монеты обычно разгоняются с помощью гравитации и взрывов до довольно высоких скоростей.\\n\\nЭтот перк постоянно заставляет их замедляться, как будто они находятся в какой-то вязкой жидкости.\\n\\nЭто облегчает их поимку и отлично сочетается с перками, влияющими на движение монет.","upgrades.win عمودی طور پر اوپر کی طرف اچھال جائے گی۔ \\nاگر آپ ایک طرف زیادہ مارتے ہیں تو اس کا زاویہ زیادہ ہوگا۔ \\nپک کی رفتار اور آنے والے زاویہ کا اچھالنے کے بعد گیند کی سمت پر کوئی اثر نہیں ہوتا ہے۔\\n\\nبہت سے اپ گریڈ جو مقصد میں مدد کرتے ہیں ان کو غیر مقفل کیا جا سکتا ہے۔\\n\\n## کھولتا ہے۔\\n\\nپہلی بار بریک آؤٹ 71 کھیلتے وقت، زیادہ تر اپ گریڈ اور لیولز مقفل ہوتے ہیں۔ \\nاپ گریڈ صرف کھیل کر اور بہت سے سکے پکڑ کر انلاک ہو جاتے ہیں۔ \\nاعلی اسکور پر پہنچ کر پہلی سطحیں کھل جاتی ہیں۔\\nبعد کی سطحیں ایک شرط شامل کرتی ہیں کہ آپ کون سے مراعات منتخب کر سکتے ہیں۔ \\n\\nجب آپ ہر سطح کے بعد متعدد اپ گریڈ حاصل کرتے ہیں تو اعلی اسکور تک پہنچنا بہت آسان ہوتا ہے۔ \\n\\n## دوبارہ رول اور مفت اپ گریڈ\\n\\nجب آپ اچھی طرح کھیلیں گے تو آپ کو چننے کے لیے ایک اضافی اپ گریڈ ملے گا: \\n\\n- {{levelTimeGood}} سیکنڈ کے نیچے کی سطح کو صاف کریں۔\\n- اطراف یا اوپر کو {{wallBouncedGood}} سے کم بار ماریں۔\\n- سکے کا {{catchRateGood}}% پکڑیں۔\\n- اینٹوں کو {{missesGood}} سے کم بار چھوڑیں۔ \\n\\nآپ کو ایک ری رول بھی ملے گا جو آپ کو اپ گریڈز کو چھوڑنے دیتا ہے اگر آپ اور بھی بہتر کرتے ہیں:  \\n\\n- {{levelTimeBest}} سیکنڈ سے کم کی سطح کو صاف کریں۔\\n- اطراف یا اوپر کو {{wallBouncedBest}} سے کم بار ماریں۔\\n- سکے کا {{catchRateBest}}% پکڑیں۔\\n- اینٹوں کو {{missesBest}} سے کم بار چھوڑیں۔ \\n\\nترتیبات میں ایک آپشن آپ کو ان اعدادوشمار کو ظاہر کرنے دیتا ہے۔","main_menu.help_help":"گیم کے بارے میں مزید جانیں۔","main_menu.help_title":"مدد","main_menu.help_upgrades":"## اپ گریڈ","main_menu.high_score":"اعلی اسکور: {{score}}","main_menu.kid":"بچوں کا موڈ","main_menu.kid_help":"\\"سست گیند\\" کے ساتھ مستقبل کے کھیل شروع کریں۔","main_menu.language":"زبان","main_menu.language_help":"گیم کی زبان کا انتخاب کریں۔","main_menu.load_save_file":"محفوظ فائل لوڈ کریں۔","main_menu.load_save_file_help":"اپنے آلے پر محفوظ فائل منتخب کریں۔","main_menu.max_coins":" اسکرین پر زیادہ سے زیادہ {{max}} سکے","main_menu.max_coins_help":"صرف کاسمیٹک، سکور پر کوئی اثر نہیں","main_menu.max_particles":" {{max}} ذرات زیادہ سے زیادہ","main_m ades.picky_eater.tooltip":"+{{lvl}} کومبو فی اینٹ ٹوٹا ہوا، گیند کے رنگ کی تبدیلی پر ری سیٹ","upgrades.picky_eater.verbose_description":"جب بھی آپ اپنی گیند کے رنگ کی اینٹ کو توڑتے ہیں تو آپ کا کمبو ایک سے بڑھ جاتا ہے۔ \\nاگر یہ ایک مختلف رنگ ہے، تو گیند وہ نیا رنگ لیتی ہے، لیکن کومبو دوبارہ سیٹ ہو جاتا ہے، جب تک کہ گیند کے رنگ کی کوئی اینٹ نہ بچ جائے۔ \\nایک بار جب آپ کو کم سے کم سے زیادہ کامبو مل جاتا ہے، تو غلط رنگ کی اینٹوں کو سرخ بارڈر مل جائے گا۔ \\nاگر آپ کے پاس ایک سے زیادہ گیند ہیں، تو جب بھی ان میں سے کوئی ایک اینٹ سے ٹکراتی ہے تو وہ سب رنگ بدل جاتے ہیں۔","upgrades.pierce.name":"چھیدنا","upgrades.pierce.tooltip":"گیند پک باؤنس کے بعد {{count}} اینٹوں کو چھیدتی ہے۔","upgrades.pierce.verbose_description":"گیند عام طور پر جیسے ہی کسی چیز کو چھوتی ہے اچھال جاتی ہے۔ اس پرک کے ساتھ، یہ ٹوٹی ہوئی 3 اینٹوں تک اپنی رفتار کو جاری رکھے گا۔ \\n\\nاس کے بعد، یہ چوتھی اینٹ پر اچھال دے گا، اور کاؤنٹر کو دوبارہ ترتیب دینے کے لیے آپ کو پک کو چھونے کی ضرورت ہوگی۔","upgrades.pierce_color.name":"رنگ چھیدنا","upgrades.pierce_color.tooltip":"+{{lvl}} گیند کے رنگ کی اینٹوں کو نقصان","upgrades.pierce_color.verbose_description":"جب بھی کوئی گیند ایک ہی رنگ کی اینٹ سے ٹکرائے گی تو وہ بغیر کسی رکاوٹ کے گزرے گی۔ \\n\\nایک بار جب یہ کسی دوسرے رنگ کی اینٹ تک پہنچ جائے گا، تو وہ اسے توڑ دے گا، اس کا رنگ لے گا اور اچھال دے گا۔\\n\\nاگر آپ کے پاس مضبوط اینٹیں ہیں تو گیند اب بھی ایک ہی رنگ کی اینٹ سے اچھال سکتی ہے۔","upgrades.puck_repulse_ball.help_plural":"","upgrades.puck_repulse_ball.name":"نرم لینڈنگ","upgrades.puck_repulse_ball.tooltip":"پک گیندوں کو پیچھے ہٹاتا ہے۔","upgrades.puck_repulse_ball.verbose_description":"جب ایک گیند پک کے قریب آتی ہے، تو یہ سست ہونا شروع ہو جاتی ہے، اور پک کو چھوئے بغیر بھی ممکنہ طور پر اچھالنا شروع کر دیتی ہے۔","upgrades.reach.name":"اوپر نیچے","upgrades.reach.tooltip":" سب سے نچلی قطار کی N اینٹوں کو چھونے سے کامبو ری سیٹ ہو جاتا ہے۔ بصورت دیگر، +N کومبو","upgrades.reach.verbose_description":"اگر اینٹوں کی صرف ایک قطار ہے، یا اگر اینٹوں کی سب سے کم قطار _description":"جب بھی دو گیندیں آپس میں ٹکراتی ہیں، وہ اپنی رفتار کا تبادلہ کرتے ہیں، ایک دھماکہ کرتے ہیں، اور انہیں الگ کرنے کے لیے اضافی رفتار حاصل کرتے ہیں۔ ","upgrades.shunt.name":"شنٹ","upgrades.shunt.tooltip":"سطحوں کے درمیان اپنے طومار کا {{percent}}% رکھیں","upgrades.shunt.verbose_description":"اگر آپ کے پاس بھی ہاٹ سٹارٹ ہے تو ہاٹ سٹارٹ کو ابھی موجودہ کومبو میں شامل کیا گیا ہے۔","upgrades.side_flip.name":"دائیں ہاتھ","upgrades.side_flip.tooltip":"+{{lvl}} کومبو فی اینٹ دائیں سے ٹوٹی ہوئی، -{{loss}} دوسری صورت میں","upgrades.side_flip.verbose_description":"ایک طومار حاصل کرنے کے لیے اس کے دائیں طرف کی اینٹ کو متاثر کریں، لیکن اسے بائیں جانب مارنے سے گریز کریں کیونکہ یہ 2 کومبو کو ہٹا دے گا۔ اوپر اور نیچے سے مارنے کا کوئی اثر نہیں ہوتا۔ ","upgrades.side_kick.name":"بائیں ہاتھ","upgrades.side_kick.tooltip":"+{{lvl}} کومبو فی اینٹ بائیں سے ٹوٹی ہوئی، -{{loss}} دوسری صورت میں","upgrades.side_kick.verbose_description":"ایک طومار حاصل کرنے کے لیے اس کے بائیں جانب کی اینٹ کو متاثر کریں، لیکن اسے دائیں جانب مارنے سے گریز کریں کیونکہ یہ 2 کومبو کو ہٹا دے گا۔ اوپر اور نیچے سے مارنے کا کوئی اثر نہیں ہوتا۔ ","upgrades.skip_last.help_plural":"آخری {{lvl}} اینٹیں پھٹ جائیں گی۔","upgrades.skip_last.name":"آسان صفائی","upgrades.skip_last.tooltip":"آخری اینٹ پھٹ جائے گی۔","upgrades.skip_last.verbose_description":"اگلی سطح پر جانے کے لیے آپ کو تمام اینٹوں کو توڑنے کی ضرورت ہے۔ تاہم، آخری کو حاصل کرنا مشکل ہو سکتا ہے۔ \\n\\nسطح کو جلد صاف کرنے سے اپ گریڈ کرتے وقت اضافی انتخاب ہوتے ہیں۔ اینٹوں کو کبھی نہ چھوڑنا بھی بہت فائدہ مند ہے۔ \\n\\nاس لیے اگر آپ کو آخری اینٹوں کو توڑنا مشکل ہو، تو اس پرک کو کچھ وقت حاصل کرنے سے مدد مل سکتی ہے۔","upgrades.slow_down.name":"سست گیند","upgrades.slow_down.tooltip":"گیند زیادہ آہستہ حرکت کرتی ہے۔","upgrades.slow_down.verbose_description":"گیند نسبتاً سست شروع ہوتی ہے، لیکن آپ کے کھیل کے ہر سطح پر یہ قدرے تیزی سے شروع ہوگی۔ \\n\\nاگر آپ ایک سطح پر بہت زیادہ وقت گزارتے ہیں تو یہ بھی تیز ہو جائے گا۔ \\n\\nیہ فائدہ اسے زیادہ قابل انتظام بناتا ہے۔ lating","main_menu.donation_reminder_help":"Asosiy menyuda oʻynagan vaqt va xayriya havolasini koʻring","main_menu.download_save_file":"Hisob va statistikani yuklab oling","main_menu.download_save_file_help":"Saqlash faylini oling","main_menu.extra_bright":"Qo\'shimcha yorqin","main_menu.extra_bright_help":"Tangalar va g\'ishtlar atrofidagi halo hajmini oshiradi.","main_menu.fullscreen":"Toʻliq ekran","main_menu.fullscreen_help":"O\'yin boshlanishidan oldin to\'liq ekranga o\'tishga harakat qiladi","main_menu.help_content":"## Maqsad\\n\\n7 daraja davomida iloji boricha ko\'proq tanga oling. \\nG\'ishtlarni sindirishda tangalar paydo bo\'ladi.\\nBallaringizni oshirish uchun ularni shaybangiz bilan tuting.\\nSizning ballingiz ekranning yuqori o\'ng burchagida ko\'rsatiladi.\\nTo\'pni tashlamang, aks holda o\'yin tugadi.\\n\\nBarcha g\'ishtlarni yo\'q qilgandan so\'ng, siz yangilanishni tanlashingiz mumkin.\\n\\n## Yangilanishlar \\n\\nSiz tanlagan yangilanishlar ish oxirigacha amal qiladi. \\nBa\'zilari kuchliroq ta\'sir qilish uchun bir necha marta tanlanishi mumkin.\\nBa\'zilar maqsadga erishishda yordam beradi yoki boshqa yo\'llar bilan o\'yinni osonlashtiradi. \\nBa\'zilari faqat birlashganda foydali bo\'ladi.\\n\\nHar bir o\'yin boshida har doim bitta yangilanish olasiz. \\nUning belgisi birinchi darajadagi g\'isht sifatida xizmat qiladi. \\nSozlamalarda yangilanishlarni boshlashni tanlashingiz mumkin.\\n\\nKo\'pgina yangilanishlar kombinatsiyangizga ta\'sir qiladi. \\n\\n## Kombo\\n\\nSizning \\"kombo\\" - bu g\'isht sindirilganda paydo bo\'lgan tangalar soni. \\nU shaybangizda ko\'rsatiladi, masalan, x4 har bir g\'ishtdan 4 ta tanga chiqishini bildiradi. \\nKomboni oshiradigan ko\'pgina yangilanishlar uni qayta tiklash shartini ham qo\'shadi. \\nAgar to\'p hech qanday g\'ishtga tegmasdan shaybaga qaytsa, kombinatsiya ham tiklanadi.\\nBu sodir bo\'lganda \\"o\'tkazib yuborilgan\\" xabari ko\'rsatiladi. \\n\\nHar safar g\'isht tomon intiling. \\n\\n## Maqsad\\n\\nFaqat to\'pning shaybadagi holati uning qanday sakrashini hal qiladi.\\nAgar to\'p shaybaning o\'lik markaziga tegsa, u yana vertikal ravishda yuqoriga qaytadi. \\nAgar siz bir tomondan ko\'proq ursangiz, u ko\'proq burchakka ega bo\'ladi. \\nShayba tezligi va kiruvchi burchak sakrashdan keyin to\'p yo\'nalishiga ta\'sir qilmaydi.\\n\\nMaqsadga erishishga yordam beradigan ko\'plab yangilanishlar qulfdan chiqarilishi mumkin.\\n\\n## Qulfni ochadi\\n\\nBreakout 71 birinchi marta o‘ynalganda, ko‘pchilik yangilanishlar va darajalar qulflanadi. \\nYangilanishlar shunchaki o\'ynash va ko\'plab tangalarni olish orqali ochiladi. \\nBirinchi darajalar yuqori ballga erishish orqali ochiladi.\\nKeyingi darajalarda qaysi imtiyozlarni tanlashingiz mumkinligi haqida shart qo‘shiladi. \\n\\nHar bir darajadan keyin bir nechta yangilanishlarni olsangiz, yuqori ballga erishish osonroq bo\'ladi. \\n\\n## Qayta roliklar va bepul yangilanishlar\\n\\nYaxshi o\'ynaganingizda qo\'shimcha yangilanish olasiz: \\n\\n- Darajani {{levelTimeGood}} soniya ichida tozalang\\n- Yon tomonlarga yoki tepaga {{wallBouncedGood}} martadan kamroq urish\\n- Tangalarning {{catchRateGood}}foizini ushlang\\n- G\'ishtlarni {{missesGood}} martadan kamroq o\'tkazib yuboring \\n\\nBundan tashqari, agar siz yanada yaxshi ishlasangiz, yangilanishlarni o\'tkazib yuborishga imkon beruvchi qayta rolik olasiz:  \\n\\n- {{levelTimeBest}} soniyadan kamroq darajani tozalang\\n- Yon tomonlarga yoki tepaga {{wallBouncedBest}} martadan kamroq urish\\n- Tangalarning {{catchRateBest}}foizini ushlang\\n- G\'ishtlarni {{missesBest}} martadan kamroq o\'tkazib yuboring \\n\\nSozlamalardagi parametr ushbu statistikani ko\'rsatish imkonini beradi","main_menu.help_help":"O\'yin haqida ko\'proq bilib oling","main_menu.help_title":"Yordam","main_menu.help_upgrades":"## Yangilanishlar","main_menu.high_score":"Yuqori ball: {{score}}","main_menu.kid":"Bolalar rejimi","main_menu.kid_help":"Kelgusi o\'yinlarni \\"sekinroq to\'p\\" bilan bo larni umumiy ballingizni oshirish orqali ochish mumkin. O\'yinda har safar to\'p kiritganingizda umumiy ball ortadi.","unlocks.intro":"Sizning umumiy ballingiz: {{ts}}. Quyida o\'yinlar taklif qiladigan barcha yangilanishlar va darajalar mavjud.   U bilan sinov o\'yinini boshlash uchun pastdagi yangilanish yoki darajani bosing.","unlocks.just_unlocked":"Daraja qulfdan chiqarildi","unlocks.just_unlocked_plural":"Siz hozirgina {{count}} darajani ochdingiz","unlocks.level":"<h2>Siz {{out_of}}</h2>\\n<p>darajasidan {{unlocked}} tasini ochdingiz. Mana barcha oʻyin darajalari, sinab koʻrish uchun bittasini bosing.</p> ","unlocks.level_description":" {{bricks}} ta gʻisht, {{colors}} ta rang va {{bombs}} ta bombadan iborat {{size}}x{{size}} daraja.","unlocks.minScore":"Qulfni ochish uchun yugurishda ${{minScore}} ga erishing.","unlocks.minScoreWithPerks":"Qulfni ochish uchun {{required}} bilan, lekin {{forbidden}} siz yugurishda{{minScore}} dollarga erishing.","unlocks.minTotalScore":"Jami ${{score}}toʻplang ","unlocks.reached":"Eng yaxshi ballingiz: {{reached}}.","unlocks.title_upgrades":"Siz {{out_of}}ta yangilanishdan {{unlocked}} tasini ochdingiz ","upgrades.addiction.name":"Giyohvandlik","upgrades.addiction.tooltip":"+{{lvl}} kombinatsiya / g\'isht, g\'ishtni sindirgandan keyin {{delay}}soniyadan so\'ng kombinatsiya qayta tiklanadi. ","upgrades.addiction.verbose_description":"Ortga hisoblash faqat har bir darajadagi birinchi g\'ishtni sindirishdan keyin boshlanadi. Barcha g\'ishtlar vayron bo\'lishi bilanoq to\'xtaydi.","upgrades.asceticism.name":"Asketizm","upgrades.asceticism.tooltip":"+{{combo}} kombinatsiya / g\'isht, - tanga ushlashda {{combo}} ","upgrades.asceticism.verbose_description":"Kombo ko\'tarilayotganda siz tangalarni biror joyda saqlashingiz kerak bo\'ladi. ","upgrades.ball_attract_ball.help_plural":"Kuchli tortish kuchi","upgrades.ball_attract_ball.name":"Gravitatsiya","upgrades.ball_attract_ball.tooltip":"To\'plar to\'plarni tortadi","upgrades.ball_attract_ball.verbose_description":"“O‘yin maydoni kengligining 3/4 qismidan” ko‘proq masofada joylashgan to‘plar bir-birini o‘ziga torta boshlaydi. \\n\\nUlar bir-biridan eng uzoqda bo\'lganda, tortishish kuchi kuchliroq bo\'ladi.\\n\\nKamalak zarralari tortishish kuchini ifodalash uchun uchadi. Agar sizda bir nechta to\'p bo\'lsa, bu imtiyoz faqat taqdim etiladi.","upgrades.ball_attracts_coins.name":"To\'plar tangalarni tortadi","upgrades.ball_attracts_coins.tooltip":"Tangalar eng yaqin to\'pni kuzatib boradi va sekinroq tushadi","upgrades.ball_attracts_coins.verbose_description":"Bu to\'plarni tangalar bilan \\"bo\'yash\\" uchun ishlatilishi mumkin, agar siz uni \\"dog\'\\" va \\"arvoh tangalar\\" bilan birlashtirsangiz. Shuningdek, u tanga magnitining o\'rnini bosuvchi vosita sifatida ishlaydi. ","upgrades.ball_repulse_ball.help_plural":"Kuchli itarilish kuchi","upgrades.ball_repulse_ball.name":"Shaxsiy maydon","upgrades.ball_repulse_ball.tooltip":"To\'plar to\'plarni qaytaradi","upgrades.ball_repulse_ball.verbose_description":"Ekranning to‘rtdan bir qismidan kamroq masofada joylashgan to‘plar bir-birini qaytara boshlaydi. Agar ular bir-biriga yaqin bo\'lsa, itarilish kuchi kuchliroq bo\'ladi. Zarrachalar bu kuch qo\'llanilishini ramziy qilish uchun tashqariga chiqadi. Agar sizda bir nechta to\'p bo\'lsa, bu imtiyoz faqat taqdim etiladi.","upgrades.base_combo.name":"Kuchli asoslar","upgrades.base_combo.tooltip":"Kombo 1 oʻrniga {{coins}} da boshlanadi.","upgrades.base_combo.verbose_description":"Sizning kombinatsiyangiz odatda daraja boshida 1 dan boshlanadi va hech narsaga tegmasdan sakrab o\'tganingizda 1 ga qaytadi. Ushbu imtiyoz bilan kombinatsiya 3 ball yuqoriroq boshlanadi, shuning uchun siz har doim g\'isht uchun kamida 4 tanga olasiz. Kombo qayta o\'rnatilganda, u 1 emas, 4 ga qaytadi. Sizning to\'pingiz bir oz yaltiroq bo\'lib, uning kombinatsiyasi birdan yuqori ekanligini bildiradi.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Kattaroq portlashlar","upgrades.bigger_explosions.verbose_description":"Standart portlash 3x3 kvadratni tozalaydi, bu bilan u 5x5 kvadratga aylanadi va tangalardagi zarba ham sezilarli darajada kuchliroq bo\'ladi. Har bir portlashdan keyin ekran miltillaydi (asosiy rejimdan tashqari)","upgrades.bigger_puck.name":"Kattaroq shayba","upgrades.bigger_puck.tooltip":"Ko\'proq tangalarni osongina ushlang.","upgrades.bigger_puck.verbose_description":"Kattaroq shayba to\'pni hech qachon o\'tkazib yubormaslik va ko\'proq tanga ushlashni osonlashtiradi, shuningdek, sakrashlarni aniq burchak bilan o\'tkazishni osonlashtiradi (to\'pning burchagi faqat uning qayerga tegishiga bog\'liq). \\n\\nBiroq, katta shaybani sathning yon tomonlarida ishlatish qiyinroq va uni ba\'zan o\'tkazib yuborishdan qochib bo\'lmaydi.","upgrades.clairvoyant.name":"Ko\'ruvchi","upgrades.clairvoyant.tooltip":"Kelgusi darajalarni, HP g\'ishtlarini va to\'p yo\'nalishini ko\'ring","upgrades.clairvoyant.verbose_description":"To\'g\'ri yangilanishlarni tanlash va mustahkam g\'isht bilan nima sodir bo\'layotganini tushunishga yordam beradi. 2 va 3-darajalar shubhali yordam dasturi haqida qo\'shimcha ma\'lumot beradi (loop rejimida foydalanish mumkin)","upgrades.coin_magnet.help_plural":"Tangalarga kuchli ta\'sir","upgrades.coin_magnet.name":"Tangalar magniti","upgrades.coin_magnet.tooltip":"Pak tangalarni tortadi","upgrades.coin_magnet.verbose_description":"Tangalarni shaybaga yo\'naltiradi. Agar tanga allaqachon unga yaqin bo\'lsa, ta\'sir kuchliroq bo\'ladi. Barcha tangalarni ushlash o\'yinda maxsus bonuslarni olib keladi. \\n\\nKo\'proq tangalarni qo\'lga olishning yana bir usuli - pastdan g\'ishtlarni urish. To\'pning tezligi va yo\'nalishi chiqarilgan tanga tezligiga ta\'sir qiladi. ","upgrades.compound_interest.name":"Murakkab foiz","upgrades.compound_interest.tooltip":"+{{lvl}} ta gʻisht singan, tanga yoʻqolganida asl holatini tiklash","upgrades.compound_interest.verbose_description":"Har bir g\'ishtni sindirganingizda sizning kombinatingiz bittaga o\'sadi va har bir sindirgan g\'isht bilan ko\'proq tanga tug\'iladi. \\n\\nShu bilan birga, o\'sha tangalarning har birini o\'z shaybangiz bilan ushlaganingizga ishonch hosil qiling, chunki har qanday yo\'qolgan tanga kombinatingizni qayta tiklaydi. \\n\\nKombinatsiyangiz minimal qiymatdan oshib ketgandan so\'ng, o\'yin maydonining pastki qismida tangalar u erga tushmasligi kerakligini eslatish uchun qizil chiziq paydo bo\'ladi.","upgrades.concave_puck.name":"Botiq shayba","upgrades.concave_puck.tooltip":"Vertikal nishonning aniqligini yaxshilaydi","upgrades.concave_puck.verbose_description":"To\'plar balandlikni to\'g\'ridan-to\'g\'ri yuqoriga ko\'tarishni boshlaydi va kamroq burchak bilan sakraydi.","upgrades.corner_shot.name":"Burchak zarbasi","upgrades.corner_shot.tooltip":"Shaybani ekran chegaralari bilan qoplash imkonini beradi","upgrades.corner_shot.verbose_description":"Burchaklarni nishonga olishga yordam beradi. Qo\'shimcha darajalar sizga uzoqroqqa borish imkonini beradi. ","upgrades.etherealcoins.name":"Kosmosda tangalar","upgrades.etherealcoins.tooltip":"Tangalar endi tortishish kuchiga ta\'sir qilmaydi","upgrades.etherealcoins.verbose_description":"Siz tangalar qandaydir tarzda tushib ketishiga ishonch hosil qilishingiz kerak, aks holda siz hech narsa olmaysiz. ","upgrades.extra_levels.name":"yana 5 daqiqa","upgrades.extra_levels.tooltip":"7 oʻrniga {{count}} daraja oʻynang","upgrades.extra_levels.verbose_description":"Standart o\'yin maksimal 7 darajada davom etishi mumkin, shundan so\'ng o\'yin tugaydi. \\n\\nUshbu imtiyozning har bir darajasi bir daraja yuqoriga ko\'tarilishingizga imkon beradi. Oxirgi darajalar ko\'pincha siz eng ko\'p ball to\'playdigan darajalardir, shuning uchun farq keskin bo\'lishi mumkin.","upgrades.extra_life.help_plural":"Sizning (oxirgi) to\'pingiz yo\'qolib ketish o\'rniga pastki qismga sakraydi ({{lvl}} marta).","upgrades.extra_life.name":"Qo\'shimcha hayot","upgrades.extra_life.tooltip":"To\'p yo\'qolishidan oldin pastki chiziqqa bir marta sakrab tushadi.","upgrades.extra_life.verbose_description":"Odatda, sizda bitta to\'p bor va uni tushirishingiz bilan o\'yin tugaydi.\\n\\nUshbu imtiyoz ekranning pastki qismida to\'pni bir marta saqlaydigan va jarayonda buziladigan oq chiziqni qo\'shadi. \\n\\nHar safar to‘p ekranning pastki qismida sakraganda, siz ushbu imtiyozning bir darajasini yo‘qotasiz.","upgrades.forgiving.name":"Kechirimli","upgrades.forgiving.tooltip":"Yo\'qolgan tanaffuslar kombinatsiyani birdaniga emas, asta-sekin kamaytiradi.","upgrades.forgiving.verbose_description":"Har bir daraja uchun birinchi o\'tkazib yuborish bepul, keyin kombinatsiyaning 10%, keyin esa 20% .. ","upgrades.fountain_toss.name":"Favvora otish","upgrades.fountain_toss.tooltip":"Ba\'zi tangalarni o\'tkazib yuborganingizda, bir oz kombo oling. ","upgrades.fountain_toss.verbose_description":"Agar tangani o‘tkazib yuborsangiz va kombinatingiz {{max}}dan past bo‘lsa, kombinatingiz birga o‘sishi {{lvl}}/kombo ehtimoliga ega bo‘ladi.","upgrades.ghost_coins.name":"Arvoh tangalar","upgrades.ghost_coins.tooltip":"Tangalar asta-sekin g\'ishtlardan o\'tadi","upgrades.ghost_coins.verbose_description":"Bu xato emas, bu xususiyat!  Tangalar g\'ishtlar orasidan asta-sekin uchadi. Yuqori darajalar ularga tezroq harakat qilish imkonini beradi. ","upgrades.helium.name":"Geliy","upgrades.helium.tooltip":"Gravitatsiya shaybaning chap va o\'ng tomoniga teskari","upgrades.helium.verbose_description":"Bu tangalarga ta\'sir qiladi va siz ularni olishga tayyor bo\'lguningizcha suzishga imkon beradi.","upgrades.hot_start.name":"Issiq boshlanish","upgrades.hot_start.tooltip":"Kombodan boshlang {{start}}, - soniyada{{loss}} kombinatsiya","upgrades.hot_start.verbose_description":"Har bir darajaning boshida sizning kombinatsiyangiz +30 balldan boshlanadi, lekin keyin har soniyada u bittaga kamayadi. Effekt boshqa imtiyozlar bilan birga keladi. ","upgrades.implosions.name":"Portlashlar","upgrades.implosions.tooltip":"Portlashlar tangalarni puflash o\'rniga ularni so\'radi","upgrades.implosions.verbose_description":"Portlash kuchi boshqa yo\'l bilan qo\'llaniladi. Keyingi darajalar \\"katta portlash\\" rolini o\'ynaydi","upgrades.instant_upgrade.name":"Darhol yangilash","upgrades.instant_upgrade.tooltip":"Endi +1 yangilang, o\'yin oxirigacha -1 tanlov.","upgrades.instant_upgrade.verbose_description":"Darhol ikkita yangilanishni tanlang, shunda siz bitta bepulga ega bo\'lasiz, ikkinchisi esa ushbu imtiyozni olish uchun ishlatilganini to\'lash uchun. Yangilanishlarni tanlash uchun har bir keyingi menyuda tanlash uchun kamroq imkoniyatlar bo\'ladi.","upgrades.left_is_lava.name":"Chap tomondan qoching","upgrades.left_is_lava.tooltip":"+ Har bir g‘isht uchun{{lvl}} ta singan. Agar to\'p ekranning chap tomoniga tegsa, kombinatsiya tiklanadi","upgrades.left_is_lava.verbose_description":"Har safar g\'ishtni sindirganingizda, kombinatsiyangiz bittaga ko\'payadi, shuning uchun siz sindirgan barcha g\'ishtlardan yana bitta tanga olasiz.\\n\\nBiroq, sizning to\'pingiz chap tomonga tegishi bilanoq sizning kombinatsiyangiz qayta tiklanadi. \\n\\nKombinatsiyangiz ko\'tarilgach, chap tomon qizil rangga aylanib, ularga tegmaslik kerakligini eslatadi. \\n","upgrades.limitless.name":"Cheksiz","upgrades.limitless.tooltip":"Barcha yangilanishning maksimal darajasini {{lvl}} ga oshiring ","upgrades.limitless.verbose_description":"Bu imtiyozni tanlash, shuningdek, o‘z chegarasini bir marta oshirib, uni yana tanlash imkonini beradi.","upgrades.metamorphosis.name":"Metamorfoz","upgrades.metamorphosis.tooltip":"Har bir tanga oʻz rangi bilan {{lvl}} ta gʻishtni boʻyash mumkin","upgrades.metamorphosis.verbose_description":"Ushbu imtiyoz bilan tangalar ular kelgan g\'isht rangida bo\'ladi va ular tegib turgan birinchi g\'ishtni bir xil rangda bo\'yashadi. \\n\\nTangalar ularni sindirib tashlagan to\'pning tezligi bilan tug\'iladi, ya\'ni siz \\"bo\'yash\\" kerak bo\'lgan g\'ishtlar yo\'nalishi bo\'yicha bir oz mo\'ljal olishingiz mumkin.","upgrades.minefield.name":"Minalar maydoni","upgrades.minefield.tooltip":"Ekranda har bir bomba gʻishtiga +{{lvl}} ta kombinatsiya","upgrades.minefield.verbose_description":"G\'isht qo\'yilganda kombinatsiyaga +lvl qo\'shadi, vayron bo\'lganda -lvl va asosiy kombinatsiyani g\'ishtlar soniga lvl marta oshiradi","upgrades.multiball.name":"Ko\'p to\'p","upgrades.multiball.tooltip":"Har bir darajani {{count}} ball bilan boshlang.","upgrades.multiball.verbose_description":"Breakout 71da to\'pni tashlaganingizdan so\'ng yutqazasiz. \\n\\nUshbu imtiyoz bilan siz ikkita to\'pga ega bo\'lasiz va shuning uchun siz bitta to\'pni yo\'qotishingiz mumkin. \\n\\nYo\'qotilgan to\'plar keyingi bosqichga qaytadi. \\n\\nBir nechta to\'pga ega bo\'lish qo\'shimcha imtiyozlarni beradi va, albatta, darajani tezroq tozalaydi.","upgrades.nbricks.name":"Qattiq namuna o\'lchami","upgrades.nbricks.tooltip":"+{{lvl}} ta kombo uchun har bir shaybaga aniq {{lvl}} gʻisht bosing, aks holda u qayta tiklanadi","upgrades.nbricks.verbose_description":"Siz bu g\'ishtlarni yo\'q qilishingiz shart emas, lekin ularni urishingiz kerak. Portlashlar natijasida vayron bo\'lgan g\'ishtlar hisobga olinmaydi","upgrades.one_more_choice.name":"Qo\'shimcha tanlov","upgrades.one_more_choice.tooltip":"Keyingi darajaga koʻtarilganlar roʻyxatda yana {{lvl}} ta variantni taklif qiladi","upgrades.one_more_choice.verbose_description":"Har bir yangilash menyusida yana bitta variant bo\'ladi.  Siz tanlay oladigan yangilanishlar sonini oshirmaydi.","upgrades.passive_income.name":"Passiv daromad","upgrades.passive_income.tooltip":"+{{lvl}} kombinatsiya / g\'isht, agar pak oxirgi {{time}}soniyada harakatlanmasa, uning o\'rniga qayta tiklanadi","upgrades.passive_income.verbose_description":"Ba\'zi imtiyozlar to\'plarga hech narsa qilmasdan xohlagan narsani qilishga yordam beradi.","upgrades.picky_eater.name":"Tanlangan yeyuvchi","upgrades.picky_eater.tooltip":"Har bir gʻisht singan +{{lvl}} kombinatsiya, toʻp rangi oʻzgarganda tiklanadi","upgrades.picky_eater.verbose_description":"Har safar to\'pingiz bilan bir xil rangdagi g\'ishtni sindirsangiz, kombinatsiyangiz bittaga ko\'payadi. \\nAgar u boshqa rangda bo\'lsa, to\'p yangi rangni oladi, lekin agar to\'p rangidan g\'isht qolmagan bo\'lsa, kombinatsiya qayta o\'rnatiladi. \\nMinimaldan yuqori kombinatsiyani olganingizdan so\'ng, noto\'g\'ri rangdagi g\'ishtlar qizil chegaraga ega bo\'ladi. \\nAgar sizda bir nechta to\'p bo\'lsa, ulardan biri g\'ishtga tegsa, ularning barchasi rangi o\'zgaradi.","upgrades.pierce.name":"Pirsing","upgrades.pierce.tooltip":"To‘p sakrashdan keyin {{count}} ta g‘ishtni teshib o‘tadi","upgrades.pierce.verbose_description":"To\'p odatda biror narsaga tegishi bilanoq sakraydi. Ushbu imtiyoz bilan u 3 tagacha singan g\'isht uchun traektoriyasini davom ettiradi. \\n\\nShundan so\'ng, u 4-g\'isht ustida sakrab chiqadi va hisoblagichni qayta o\'rnatish uchun shaybaga teginishingiz kerak bo\'ladi.","upgrades.pierce_color.name":"Rangli pirs","upgrades.pierce_color.tooltip":"+{{lvl}} shar rangidagi g\'ishtlarga zarar","upgrades.pierce_color.verbose_description":"To\'p bir xil rangdagi g\'ishtga tegsa, u to\'siqsiz o\'tib ketadi. \\n\\nBoshqa rangdagi g\'ishtga etib borgach, uni buzadi, rangini oladi va sakrab chiqadi.\\n\\nAgar sizda mustahkam g\'isht bo\'lsa, to\'p hali ham bir xil rangdagi g\'ishtdan sakrab tushishi mumkin.","upgrades.puck_repulse_ball.help_plural":"","upgrades.puck_repulse_ball.name":"Yumshoq qo\'nish","upgrades.puck_repulse_ball.tooltip":"Shayba to\'plarni qaytaradi","upgrades.puck_repulse_ball.verbose_description":"To\'p shaybaga yaqinlashganda, u sekinlashadi va hatto shaybaga tegmasdan sakrab tushishi mumkin.","upgrades.reach.name":"Yuqoridan pastga","upgrades.reach.tooltip":" Eng past qatordagi N ta g\'ishtga teginish kombinatsiyani tiklaydi. Aks holda, +N kombinatsiyasi","upgrades.reach.verbose_description":"Agar faqat bitta g\'isht qatori bo\'lsa yoki eng past g\'isht qatori o\'yinning butun kengligini qoplasa, unda bu perk hech narsa qilmaydi. Aks holda, bu eng past qatorni buzish kombinatsiyani qayta o\'rnatadi, boshqa narsalarni buzish esa kombinatsiyani eng pastki qatordagi g\'ishtlar soniga oshiradi. \\n\\nEng pastki qator qizil rang bilan ta\'kidlanadi. ","upgrades.respawn.name":"Qayta tug\'ilish","upgrades.respawn.tooltip":"{{percent}}% gʻisht {{delay}}soniyadan keyin qayta tiklanadi.","upgrades.respawn.verbose_description":"Ba\'zi zarracha effektlari g\'ishtlar qaerda paydo bo\'lishini sizga ma\'lum qiladi. ","upgrades.right_is_lava.name":"O\'ng tomondan qoching","upgrades.right_is_lava.tooltip":"Har bir gʻisht uchun +{{lvl}} ta kombinatsiya. Agar to\'p ekranning chap tomoniga tegsa, kombinatsiya tiklanadi","upgrades.right_is_lava.verbose_description":"Har safar g\'ishtni sindirganingizda, kombinatsiyangiz bittaga ko\'payadi, shuning uchun siz sindirgan barcha g\'ishtlardan yana bitta tanga olasiz.\\n\\nBiroq, sizning to\'pingiz o\'ng tomonga tegishi bilanoq sizning kombinatsiyangiz qayta tiklanadi. \\n\\nKombinatsiyangiz ko\'tarilgach, o\'ng tomon qizil rangga ega bo\'lib, ularga tegmaslik kerakligini eslatadi.\\n","upgrades.sacrifice.help_l1":"Hayotni yo\'qotish barcha g\'ishtlarni tozalaydi","upgrades.sacrifice.help_over":"Komboni {{lvl}}marta yo\'qotish barcha g\'ishtlarni tozalaydi","upgrades.sacrifice.name":"Qurbonlik","upgrades.sacrifice.verbose_description":"Bu kombinatsiyani juda yuqori darajaga olib kelishi mumkin.","upgrades.sapper.help_plural":"Birinchi singan {{lvl}} ta g\'isht bombaga aylanadi.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"Birinchi singan g\'isht bombaga aylanadi.","upgrades.sapper.verbose_description":"Faqat g\'oyib bo\'lish o\'rniga, siz sindirgan birinchi g\'isht bomba g\'ishtiga almashtiriladi. To\'pni shaybaga tepish effektni qaytadan kuchaytiradi. Ushbu imtiyozni yuqori darajaga ko\'tarish sizga ko\'proq bomba joylashtirish imkonini beradi.\\n\\nYodingizda bo\'lsin, bombalar yaqin atrofdagi tangalarning tezligiga ta\'sir qiladi, shuning uchun juda ko\'p portlashlar sizning mashaqqatli mehnatingiz samarasini qo\'lga kiritishni qiyinlashtirishi mumkin.","upgrades.shocks.name":"Shoklar","upgrades.shocks.tooltip":"Portlovchi to\'plarning to\'qnashuvi","upgrades.shocks.verbose_description":"Har safar ikkita to\'p to\'qnashganda, ular tezligini almashtiradilar, portlash chiqaradilar va ularni ajratish uchun qo\'shimcha tezlikka ega bo\'ladilar. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Darajalar oʻrtasida kombinatsiyangizning {{percent}}foizini saqlang","upgrades.shunt.verbose_description":"Agar sizda ham issiq start mavjud bo\'lsa, issiq ishga tushirish joriy kombinatsiyaga qo\'shiladi","upgrades.side_flip.name":"O\'ng qo\'l","upgrades.side_flip.tooltip":"+ o\'ngdan singan har bir g\'isht uchun{{lvl}} kombinatsiya, - aks holda{{loss}} ","upgrades.side_flip.verbose_description":"Bitta kombinatsiyaga ega bo\'lish uchun g\'ishtni o\'ng tomoniga uring, lekin uni chap tomonga urmang, chunki bu 2 ta kombinatsiyani olib tashlaydi. Yuqoridan va pastdan urish hech qanday ta\'sir qilmaydi. ","upgrades.side_kick.name":"Chapaqay","upgrades.side_kick.tooltip":"+{{lvl}} har bir g\'isht chapdan singan, - aks holda{{loss}} ","upgrades.side_kick.verbose_description":"Bitta kombinatsiyaga ega bo\'lish uchun g\'ishtni chap tomoniga uring, lekin uni o\'ng tomonga urmang, chunki bu 2 ta kombinatsiyani olib tashlaydi. Yuqoridan va pastdan urish hech qanday ta\'sir qilmaydi. ","upgrades.skip_last.help_plural":"Oxirgi {{lvl}} ta g\'isht portlaydi.","upgrades.skip_last.name":"Oson tozalash","upgrades.skip_last.tooltip":"Oxirgi g\'isht portlaydi.","upgrades.skip_last.verbose_description":"Keyingi bosqichga o\'tish uchun barcha g\'ishtlarni sindirish kerak. Biroq, oxirgilarini olish qiyin bo\'lishi mumkin. \\n\\nDarajani erta tozalash yangilashda qo\'shimcha tanlovlarni olib keladi. G\'ishtlarni hech qachon o\'tkazib yubormaslik ham juda foydali. \\n\\nShunday qilib, agar siz oxirgi g\'ishtlarni sindirish qiyin bo\'lsa, bu imtiyozni bir necha marta olish yordam berishi mumkin.","upgrades.slow_down.name":"Sekinroq to\'p","upgrades.slow_down.tooltip":"To\'p sekinroq harakat qiladi","upgrades.slow_down.verbose_description":"To\'p nisbatan sekin boshlanadi, lekin o\'yiningizning har bir darajasi biroz tezroq boshlanadi. \\n\\nAgar siz bir darajada ko\'p vaqt sarflasangiz, u ham tezlashadi. \\n\\nUshbu imtiyoz uni yanada qulayroq qiladi. \\n\\nMenyuda bola rejimini yoqish orqali uni har safar boshida olishingiz mumkin.","upgrades.smaller_puck.help_plural":"Hatto kichikroq shayba va yuqori tayanch kombinatsiyasi","upgrades.smaller_puck.name":"Kichikroq shayba","upgrades.smaller_puck.tooltip":"Shuningdek, +5 ta asosiy kombinatsiyani beradi","upgrades.smaller_puck.verbose_description":"Bu shaybani kichikroq qiladi, bu nazariy jihatdan ba\'zi burchak zarbalarini osonlashtiradi, lekin haqiqatan ham qiyinchilikni oshiradi.\\n\\nShuning uchun siz tanlaganingizdan keyin sindiradigan barcha g\'ishtlar uchun har bir g\'isht uchun +5 tangadan iborat yoqimli bonusga ega bo\'lasiz. ","upgrades.soft_reset.name":"Yumshoq tiklash","upgrades.soft_reset.tooltip":"Kombo sozlamalari {{percent}}% saqlaydi","upgrades.soft_reset.verbose_description":"Kombo qayta o\'rnatishning ta\'sirini cheklang.","upgrades.streak_shots.name":"Hit chizig\'i","upgrades.streak_shots.tooltip":"Shaybaga sakrashdan oldin ko\'p g\'ishtlarni sindirib tashlasangiz, ko\'proq tangalar.","upgrades.streak_shots.verbose_description":"Har safar g\'ishtni sindirganingizda, kombinatsiyangiz (bir g\'isht uchun tangalar soni) bittaga ortadi. \\n\\nBiroq, to\'p sizning shaybangizga tegishi bilanoq, kombo o\'zining standart qiymatiga qayta tiklanadi va siz har bir g\'isht uchun bitta tanga olasiz.\\n\\nKombinatsiyangiz asosiy qiymatdan yuqoriga ko\'tarilgach, shaybangiz qizil rangga aylanadi, bu sizga to\'p bilan teginish uchun kombinatsiyangizni yo\'q qilishini eslatadi.","upgrades.sturdy_bricks.name":"Qattiq g\'ishtlar","upgrades.sturdy_bricks.tooltip":"+{{lvl}} gʻisht HP, +{{percent}}% tangalar singanida paydo boʻladi","upgrades.sturdy_bricks.verbose_description":"Ushbu imtiyozning har bir darajasi barcha g\'ishtlarga bitta HP qo\'shadi. Siz HP raqamini \\"ko\'rsatuvchi\\" imtiyoz bilan ko\'rishingiz mumkin. \\"Percing\\" imtiyozini qo\'lga kiritish orqali to\'pga yetkazilgan zararni oshirishingiz mumkin. Perkning har bir darajasi +50% tangalar paydo bo\'lishini qo\'shadi. ","upgrades.telekinesis.help_plural":"To\'pga kuchli ta\'sir","upgrades.telekinesis.name":"Telekinez","upgrades.telekinesis.tooltip":"Shayba to\'pning harakatini boshqaradi","upgrades.telekinesis.verbose_description":"Siz to\'pni yuqoriga ko\'tarilayotganda nazorat qilasiz. ","upgrades.top_is_lava.name":"Osmon chegaradir","upgrades.top_is_lava.tooltip":"Har bir gʻisht uchun +{{lvl}} kombinatsiyasi, tepaga urilganda asl holatini tiklash","upgrades.top_is_lava.verbose_description":"Qachonki siz g\'ishtni sindirsangiz, kombinatingiz bittaga ko\'payadi. Biroq, sizning to\'pingiz ekranning yuqori qismiga tegishi bilan sizning kombinatsiyangiz qayta tiklanadi. \\n\\nKombinatsiyangiz minimal qiymatdan yuqori bo\'lsa, tepada qizil chiziq paydo bo\'lib, unga tegmaslik kerakligini eslatadi. ","upgrades.trampoline.name":"Trampolin","upgrades.trampoline.tooltip":"+ har bir shaybaga sakrash uchun{{lvl}} kombinatsiya,- istalgan chegarada har bir sakrash uchun{{lvl}} ta kombinatsiya","upgrades.trampoline.verbose_description":"Qayta tiklash shartini qo\'shmaydigan noyob kombinatsiyalangan yangilanishlardan biri","upgrades.unbounded.help_no_ceiling":"Har bir gʻisht uchun +{{lvl}} kombinatsiya, boshqa yon tomonlar yoki shiftlar yoʻq","upgrades.unbounded.name":"Cheklanmagan","upgrades.unbounded.tooltip":"Har bir g\'isht uchun +{{lvl}} kombinati, to\'pni o\'yinda ushlab turish uchun boshqa tomonlar yo\'q, xavf","upgrades.unbounded.verbose_description":"Umid qilamanki, siz to\'pingizni ekranda ushlab turish yo\'lini topdingiz. Yon tomonlarga zarba berish uchun jazo endi qo\'llanilmaydi. 2+ darajasida shift ham yo\'qoladi. Bu rivojlangan imtiyoz. ","upgrades.viscosity.name":"Yopishqoqlik","upgrades.viscosity.tooltip":"Tanganing tushishi sekinroq","upgrades.viscosity.verbose_description":"Tangalar odatda tortishish va portlashlar bilan juda yuqori tezlikka tezlashadi. \\n\\nBu imtiyoz ularni doimo sekinlashtiradi, go\'yo ular qandaydir yopishqoq suyuqlikda bo\'lgandek. \\n\\nBu ularni ushlashni osonlashtiradi va tanga harakatiga ta\'sir qiluvchi imtiyozlar bilan yaxshi uyg\'unlashadi.","upgrades.wind.help_plural":"Kuchli shamol kuchi","upgrades.wind.name":"Shamol","upgrades.wind.tooltip":"Shayba holati shamol hosil qiladi","upgrades.wind.verbose_description":"Shamol shayba holatiga bog\'liq: chap chapga, o\'ngga esa o\'ngga. To\'plarga ham, tangalarga ham ta\'sir qiladi.","upgrades.yoyo.name":"Yo-yo","upgrades.yoyo.tooltip":"To\'p shayba tomon tushadi","upgrades.yoyo.verbose_description":"Bu telekinezning teskarisi, to\'p pastga tushayotganda uni boshqaring.","upgrades.zen.name":"Zen","upgrades.zen.tooltip":"Har bir gʻisht uchun +{{lvl}} kombinatsiya, portlash sodir boʻlganda asliga qaytariladi","upgrades.zen.verbose_description":"Axir, bu zo\'ravonliksiz o\'yin. "}');var H={};H=JSON.parse('{"confirmRestart.no":"取消","confirmRestart.text":"您即将开始一个新游戏。您确定要继续吗？","confirmRestart.title":"开始新游戏？","confirmRestart.yes":"重启游戏","gameOver.creative":"本次运行将不记录在案。","gameOver.cumulative_total":"您的累计总分从 {{startTs}} 升至 {{endTs}}。","gameOver.lost.summary":"您在抓到 {{score}} 枚硬币后掉了球。","gameOver.lost.title":"游戏结束","gameOver.stats.balls_lost":"失球","gameOver.stats.bricks_broken":"碎砖","gameOver.stats.bricks_per_minute":"每分钟碎砖量","gameOver.stats.catch_rate":"捕获率","gameOver.stats.combo_avg":"平均组合","gameOver.stats.combo_max":"最大组合","gameOver.stats.duration_per_level":"每级持续时间","gameOver.stats.hit_rate":"命中率","gameOver. 币和砖块周围的光环。","main_menu.fullscreen":"全屏","main_menu.fullscreen_help":"游戏开始前会尝试全屏","main_menu.help_content":"## 目标\\n\\n在 7 个关卡中尽可能多地捕捉硬币。\\n打碎砖块时会出现金币。\\n用冰球接住它们，以提高得分。\\n您的分数显示在屏幕右上角。\\n不要掉球，否则游戏结束。\\n\\n摧毁所有砖块后，您可以选择升级。\\n\\n## 升级\\n\\n你选择的升级会一直持续到运行结束。\\n有些升级可以多次选择，以获得更强的效果。\\n有些升级有助于瞄准，或在其他方面让游戏更轻松。\\n有些只有在组合时才有用。\\n\\n每局游戏开始时，你总会获得一种升级。\\n它的图标将作为第一关的砖块。\\n您可以在设置中选择初始升级。\\n\\n许多升级会影响您的连击。\\n\\n## 组合\\n\\n您的 \\"连击 \\"是指砖块破碎时产生的金币数量。\\n它显示在你的冰球上，例如 x4 表示每块砖会产生 4 枚硬币。\\n大多数增加连击数的升级还会添加重置连击数的条件。\\n如果球回到冰球上时没有击中任何砖块，连击也会重置。\\n此时会显示 \\"未击中 \\"信息。\\n\\n尽量每次都瞄准砖块。\\n\\n## 瞄准\\n\\n只有球在冰球上的位置才能决定它的反弹方式。\\n如果球击中冰球的正中间，它将垂直弹起。\\n如果击中一侧较多，则角度会更大。\\n冰球速度和入球角度对球反弹后的方向没有影响。\\n\\n可以解锁许多有助于瞄准的升级。\\n\\n## 解锁\\n\\n第一次玩《突围 71》时，大部分升级和关卡都是锁定的。\\n升级可通过简单的游戏和捕捉许多硬币来解锁。\\n达到高分即可解锁第一个关卡。\\n后面的关卡会增加一个条件，规定你可以选择哪些福利。\\n\\n如果在每个关卡后都能获得多种升级，那么获得高分就容易多了。\\n\\n## 重卷和免费升级\\n\\n当你发挥出色时，你将获得额外的升级选项：\\n\\n- 在 {{levelTimeGood}} 秒内通关\\n- 击中两侧或顶部少于 {{wallBouncedGood}} 次\\n- 捕获 {{catchRateGood}}%的金币\\n- 错过砖块少于 {{missesGood}} 次\\n\\n如果您做得更好，您还会获得一次重新滚动的机会，让您可以跳过升级：\\n\\n- 在 {{levelTimeBest}} 秒内通关\\n- 击中两侧或顶部少于 {{wallBouncedBest}} 次\\n- 捕获 {{catchRateBest}}个%的金币\\n- 错过砖块少于 {{missesBest}} 次\\n\\n设置中的一个选项可让您显示这些统计数据","main_menu.help_help":"了解更多游戏信息","main_menu.help_title":"帮助","main_menu.help_upgrades":"## Upgrades","main_menu.high_score":"最高分 : {{score}}","main_menu.kid":"儿童模式","main_menu.kid_help":"用 \\"慢速球 \\"开始今后的比赛。","main_menu.language":"语言","main_menu.language_help":"选择游戏语言","main_menu.load_save_file":"加载保存文件","main_menu.load_save_file_help":"选择设备上的保存文件","main_menu.max_coins":" {{max}} 屏幕上的硬币最大值","main_menu.max_coins_help":"仅用于美容，不影响评分","main_menu.max_particles":" {{max}} 粒子最大值","main_menu.max_particles_help":"限制屏幕上显示的粒子数量，以达到视觉效果。","main_menu.mobile":"移动模式","main_menu.mobile_help":"在冰球下方留出空间。","main_menu.normal":"新游戏","main_menu.normal_help":"玩 7 个关卡，随机获得初始装备","main_menu.pointer_lock":"鼠标指针锁定","main_menu.pointer_lock_help":"锁定和隐藏鼠标指针。","main_menu.record":"录制游戏视频","main_menu.record_download":"下载视频 ( 试游戏。","unlocks.just_unlocked":"等级已解锁","unlocks.just_unlocked_plural":"您刚刚解锁了 {{count}} 个关卡","unlocks.level":"<h2>你解锁了 {{unlocked}} 个关卡中的 {{out_of}}个关卡 </h2>\\n<p>以下是所有游戏关卡，点击其中一个即可体验。</p> ","unlocks.level_description":"一个有 {{bricks}} 块砖、 {{colors}} 种颜色和 {{bombs}} 个炸弹的 {{size}}x{{size}} 关卡。","unlocks.minScore":"在运行中达到{{minScore}} 美元即可解锁。","unlocks.minScoreWithPerks":"在有 {{required}} 但没有 {{forbidden}} 解锁的情况下，达到{{minScore}} 美元。","unlocks.minTotalScore":"累计共计{{score}}美元","unlocks.reached":"你的最好成绩是 {{reached}}。","unlocks.title_upgrades":"您解锁了 {{out_of}}中的 {{unlocked}} 项升级","upgrades.addiction.name":"成瘾","upgrades.addiction.tooltip":"+{{lvl}} 连击/砖块，击碎砖块后连击重置 {{delay}}秒。","upgrades.addiction.verbose_description":"倒计时只在打碎每个关卡的第一块砖后开始。一旦所有砖块都被摧毁，倒计时就会停止。","upgrades.asceticism.name":"禁欲主义","upgrades.asceticism.tooltip":"+{{combo}} 连击/砖块，- {{combo}} 接住硬币","upgrades.asceticism.verbose_description":"在您的组合攀升时，您需要将金币存放在某个地方。","upgrades.ball_attract_ball.help_plural":"更强的吸引力","upgrades.ball_attract_ball.name":"重力","upgrades.ball_attract_ball.tooltip":"球吸引球","upgrades.ball_attract_ball.verbose_description":"距离超过 \\"游戏区域宽度的 3/4 \\"的球将开始相互吸引。\\n\\n相距最远时，吸引力更强。\\n\\n彩虹粒子会飞起，象征着吸引力。只有当您已经拥有一个以上的球时，才会获得此福利。","upgrades.ball_attracts_coins.name":"球吸引硬币","upgrades.ball_attracts_coins.tooltip":"硬币跟随最近的球，下落速度较慢","upgrades.ball_attracts_coins.verbose_description":"如果将它与 \\"染色剂 \\"和 \\"幽灵硬币 \\"结合起来，就可以在球周围 \\"涂满 \\"硬币。它还可以代替硬币磁铁。","upgrades.ball_repulse_ball.help_plural":"更强的斥力","upgrades.ball_repulse_ball.name":"个人空间","upgrades.ball_repulse_ball.tooltip":"球击退球","upgrades.ball_repulse_ball.verbose_description":"距离小于四分之一屏幕宽度的球将开始相互排斥。如果彼此距离较近，斥力会更大。粒子会喷射而出，象征着这种力量的作用。只有当你已经拥有一个以上的小球时，才会获得此福利。","upgrades.base_combo.name":"坚实的基础","upgrades.base_combo.tooltip":"连击从 {{coins}} 开始，而不是从 1 开始。","upgrades.base_combo.verbose_description":"在关卡开始时，您的连击数通常从 1 开始，当您在没有击中任何东西的情况下四处弹跳时，连击数会重置为 1。有了这个装备，连击开始时会高出 3 点，因此每块砖至少能得到 4 个金币。每当你的连击重置时，它就会回到 4 而不是 1。你的小球会闪烁一下，表示连击数高于 1。","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"更大的爆炸","upgrades.bigger_explosions.verbose_description":"默认爆炸清除的是 3x3 的正方形，而这个爆炸则变成了 5x5 的正方形，对硬币的冲击力也明显增强。每次爆炸后屏幕都会闪烁（基本模式除外）","upgrades.bigger_puck.name":"更大的冰球","upgrades.bigger_puck.tooltip":"轻松捕捉更多硬币","upgrades.bigger_puck.verbose_description":"冰球越大，就越不容易失球，也就越容易抓到更多的硬币，还能精确地调整反弹的角度（球的角度只取决于它击中冰球的位置）。\\n\\n不过，大冰球在关卡两侧比较难用，有时难免会失误。","upgrades.clairvoyant.name":"千里眼","upgrades.clairvoyant.tooltip":"查看即将到来的关卡、砖块 HP 和球的方向","upgrades.clairvoyant.verbose_description":"帮助你选择正确的升级方式，了解坚固砖块的作用。第 2 级和第 3 级将带来更多有用性存疑的知识（可在循环模式中达到）","upgrades.coin_magnet.help_plural":"对硬币的影响更强","upgrades.coin_magnet.name":"硬币磁铁","upgrades.coin_magnet.tooltip":"冰球吸引硬币","upgrades.coin_magnet.verbose_description":"将硬币导向冰球。如果硬币已经接近冰球，效果会更强。捕捉到所有硬币可在游戏中获得特殊奖励。\\n\\n另一种捕捉更多硬币的方法是从底部击打砖块。球的速度和方向会影响产生硬币的速度。","upgrades.compound_interest.name":"复利","upgrades.compound_interest.tooltip":"每击碎一块砖+{{lvl}} 连击，丢失硬币时重置","upgrades.compound_interest.verbose_description":"每打破一块砖，你的连击数就会增加一个，每打破一块砖，就会产生越来越多的硬币。\\n\\n不过，一定要用冰球接住每一枚硬币，因为丢失的任何一枚硬币都会重置您的连击。\\n\\n一旦您的连击数超过最低连击数，游戏区域的底部就会出现一条红线，提醒您硬币不能放在那里。","upgrades.concave_puck.name":"凹面冰球","upgrades.concave_puck.tooltip":"提高垂直瞄准精度","upgrades.concave_puck.verbose_description":"球在关卡开始时直线上升，反弹角度较小。","upgrades.corner_shot.name":"角球射门","upgrades.corner_shot.tooltip":"让冰球与屏幕边界重叠","upgrades.corner_shot.verbose_description":"有助于在拐角处瞄准。更高的级别可以让你走得更远。","upgrades.etherealcoins.name":"太空硬币","upgrades.etherealcoins.tooltip":"硬币不再受重力影响","upgrades.etherealcoins.verbose_description":"您必须确保硬币以某种方式掉落下来，否则您一个也得不到。","upgrades.extra_levels.name":"再过 5 分钟","upgrades.extra_levels.tooltip":"玩 {{count}} 关，而不是7关","upgrades.extra_levels.verbose_description":"默认游戏最多可持续 7 个关卡，之后游戏结束。\\n\\n每升一级就能提高一级。最后一关往往是你得分最多的关卡，因此差别会非常大。","upgrades.extra_life.help_plural":"您的（最后一个）球将弹到底部，而不是丢失（{{lvl}} 次）。","upgrades.extra_life.name":"额外生活","upgrades.extra_life.tooltip":"球会在底线反弹一次，然后就会丢失。","upgrades.extra_life.verbose_description":"通常情况下，您只有一个球，一旦掉落，游戏就结束了。\\n\\n这项功能在屏幕下方增加了一个白色条，可以保存一个球，并在保存过程中断开。\\n\\n每当有一个球弹到屏幕底部，你就会失去一级特权。","upgrades.forgiving.name":"宽容","upgrades.forgiving.tooltip":"缺少休息时间会逐渐减少连击次数，而不是一次性减少。","upgrades.forgiving.verbose_description":"每级的第一次失误是免费的，然后是连击的 10%，接着是 20%。","upgrades.fountain_toss.name":"喷泉抛掷","upgrades.fountain_toss.tooltip":"当你错过一些硬币时，可以获得一些连击。","upgrades.fountain_toss.verbose_description":"当您错过一枚硬币且您的连击低于 {{max}}时，您的连击概率为 {{lvl}}/连击增长 1。/连击数增加 1。","upgrades.ghost_coins.name":"幽灵硬币","upgrades.ghost_coins.tooltip":"硬币慢慢穿过砖块","upgrades.ghost_coins.verbose_description":"这不是一个错误，而是一个功能！  硬币穿过砖块的速度很慢。级别越高，速度越快。","upgrades.helium.name":"氦气","upgrades.helium.tooltip":"冰球左右重力反转","upgrades.helium.verbose_description":"这会影响硬币，让它们浮起来，直到您准备好拾取它们。","upgrades.hot_start.name":"热启动","upgrades.hot_start.tooltip":"从连击 {{start}}开始，-每秒{{loss}} 次连击","upgrades.hot_start.verbose_description":"在每级开始时，你的连击会从 +30 点开始，但之后每秒会减少一点。该效果可与其他特殊效果叠加。","upgrades.implosions.name":"爆破","upgrades.implosions.tooltip":"爆炸将硬币吸入而不是炸出","upgrades.implosions.verbose_description":"爆炸力是反向作用的。更高的楼层起到 \\"更大爆炸 \\"的作用","upgrades.instant_upgrade.name":"即时升级","upgrades.instant_upgrade.tooltip":"现在+1升级，游戏结束前-1选择。","upgrades.instant_upgrade.verbose_description":"立即选择两项升级，这样你就可以获得一项免费升级和一项用来偿还获得这项福利的升级。以后每次选择升级的菜单可选项都会减少。","upgrades.left_is_lava.name":"避免左侧","upgrades.left_is_lava.tooltip":"每击碎一块砖块可获得 +{{lvl}} 连击。如果球击中屏幕左侧，连击会重置","upgrades.left_is_lava.verbose_description":"每击碎一块砖，您的连击数就会增加一个，这样您就能从接下来击碎的所有砖块中多获得一个硬币。\\n\\n不过，一旦您的球击中左边的砖块，您的连击数就会重置。\\n\\n当您的连击数上升时，左侧的砖块就会变成红色，提醒您应避免击中它们。\\n","upgrades.limitless.name":"无限","upgrades.limitless.tooltip":"将所有升级的最高等级提高 {{lvl}} ","upgrades.limitless.verbose_description":"选择该装备还能将自己的上限提高一个，让你再次选择。","upgrades.metamorphosis.name":"变形记","upgrades.metamorphosis.tooltip":"每枚硬币可以给 {{lvl}} 块砖染上它的颜色","upgrades.metamorphosis.verbose_description":"有了这项功能，硬币就会变成它们所来自的砖块的颜色，并会给它们接触到的第一块砖块染上相同的颜色。\\n\\n硬币的生成速度与打碎它们的球的速度相同，这意味着你可以稍微瞄准一下你想要 \\"上色 \\"的砖块的方向。","upgrades.minefield.name":"雷区","upgrades.minefield.tooltip":"屏幕上每块炸弹砖 +{{lvl}} 连击","upgrades.minefield.verbose_description":"放置砖块时，连击加成+lvl；摧毁砖块时，连击加成-lvl，并通过砖块数量乘以 lvl 来提升基础连击。","upgrades.multiball.name":"多球","upgrades.multiball.tooltip":"每关开始时都有 {{count}} 个球。","upgrades.multiball.verbose_description":"在 \\"突围 71 \\"游戏中，只要你掉了球，你就输了。\\n\\n有了这项福利，您可以得到两个球，因此您可以承受失去一个球的代价。\\n\\n失去的球会在下一关重新出现。\\n\\n拥有一个以上的球就能获得更多特权，当然也能更快通关。","upgrades.nbricks.name":"严格的样本量","upgrades.nbricks.tooltip":"每次冰球反弹正好击中 {{lvl}} 块砖头，可获得+{{lvl}} 连击，否则重置","upgrades.nbricks.verbose_description":"您不一定要摧毁这些砖块，但您需要击中它们。被爆炸摧毁的砖块不算数","upgrades.one_more_choice.name":"额外选择","upgrades.one_more_choice.tooltip":"进一步提升等级后，列表中将增加 {{lvl}} 个选项","upgrades.one_more_choice.verbose_description":"每个升级菜单都将增加一个选项。  不会增加可选择的升级次数。","upgrades.passive_income.name":"被动收入","upgrades.passive_income.tooltip":"+{{lvl}} 连击/砖块，除非冰球在最后 {{time}}秒内移动，否则会重置","upgrades.passive_income.verbose_description":"有些福利可以帮助球做你想做的事情，而不需要做任何事情。","upgrades.picky_eater.name":"挑食","upgrades.picky_eater.tooltip":"每击碎一块砖+{{lvl}} 连击，球颜色改变时重置","upgrades.picky_eater.verbose_description":"每当您击碎一块与小球颜色相同的砖块时，您的连击次数就会增加一次。\\n如果是不同颜色的砖块，球就会变成新的颜色，但连击数会重置，除非没有与球颜色相同的砖块了。\\n一旦您的连击数高于最低连击数，错误颜色的砖块就会出现红色边框。\\n如果您有多个球，每当其中一个球击中砖块时，它们都会转换颜色。","upgrades.pierce.name":"穿孔","upgrades.pierce.tooltip":"冰球反弹后击穿 {{count}} 块砖","upgrades.pierce.verbose_description":"通常情况下，球一碰到东西就会弹起。有了这个特殊效果，它的弹跳轨迹将持续长达 3 砖块。\\n\\n之后，它会在第 4 块砖头上弹起，你需要触碰冰球来重置计数器。","upgrades.pierce_color.name":"颜色穿刺","upgrades.pierce_color.tooltip":"+ 对球颜色的砖块造成{{lvl}} 伤害","upgrades.pierce_color.verbose_description":"每当小球击中一块相同颜色的砖块时，它就会毫无阻碍地穿过砖块。\\n\\n一旦球碰到不同颜色的砖块，它就会打破砖块，拿走砖块的颜色并反弹。\\n\\n如果你有坚固的砖块，小球仍有可能从相同颜色的砖块上弹起。","upgrades.puck_repulse_ball.help_plural":"斥力更大","upgrades.puck_repulse_ball.name":"软着陆","upgrades.puck_repulse_ball.tooltip":"冰球击退小球","upgrades.puck_repulse_ball.verbose_description":"当球接近冰球时，速度会开始减慢，甚至有可能在不接触冰球的情况下反弹。","upgrades.reach.name":"自上而下","upgrades.reach.tooltip":"触碰最下面一行的 N 块砖会重置连击。否则，+N 连击","upgrades.reach.verbose_description":"如果只有一排砖块，或者最下面一排砖块覆盖了游戏的整个宽度，那么这个特权就不起任何作用。否则，击碎最低一排砖块会重置连击，而击碎其他砖块则会增加连击，增加的幅度为最低一排砖块的数量。\\n\\n最低一排将以红色标示。","upgrades.respawn.name":"重生","upgrades.respawn.tooltip":"{{percent}}% 的砖块会在 {{delay}}秒后重新生成。","upgrades.respawn.verbose_description":"一些粒子效果会让你知道砖块会出现在哪里。","upgrades.right_is_lava.name":"避免右侧","upgrades.right_is_lava.tooltip":"每块砖头 +{{lvl}} 连击。如果球击中屏幕左侧，连击会重置","upgrades.right_is_lava.verbose_description":"每击碎一块砖，您的连击数就会增加一个，这样您就能从接下来击碎的所有砖块中多获得一个硬币。\\n\\n不过，只要您的球击中右侧，您的连击数就会重置。\\n\\n当您的连击数上升时，右边的砖块就会变成红色，提醒您应避免击中它们。\\n","upgrades.sacrifice.help_l1":"失去生命能清除所有砖块","upgrades.sacrifice.help_over":"失去一条生命 {{lvl}}x 连击后清除所有砖块","upgrades.sacrifice.name":"牺牲","upgrades.sacrifice.verbose_description":"这可能会让组合非常高。","upgrades.sapper.help_plural":"第一块被击碎的 {{lvl}} 砖会变成炸弹。","upgrades.sapper.name":"军士","upgrades.sapper.tooltip":"第一块砖头碎了就会变成炸弹。","upgrades.sapper.verbose_description":"你打碎的第一块砖头不会消失，取而代之的是一块炸弹砖。将球反弹到冰球上可重新获得效果。提升该装备的等级可以让你放置更多的炸弹。\\n\\n请记住，炸弹会影响附近硬币的速度，因此过多的爆炸会让您很难捕捉到您辛勤工作的成果。","upgrades.shocks.name":"减震器","upgrades.shocks.tooltip":"爆炸球碰撞","upgrades.shocks.verbose_description":"每当两个球相撞，它们就会交换速度，产生爆炸，并获得额外的速度将它们分开。","upgrades.shunt.name":"分流器","upgrades.shunt.tooltip":"在各关卡之间保持 {{percent}}%的连击率","upgrades.shunt.verbose_description":"如果您也有热启动，则热启动会添加到当前组合中","upgrades.side_flip.name":"右手","upgrades.side_flip.tooltip":"每块砖块从右侧被击碎时，连击数+{{lvl}} ，否则-{{loss}} 。","upgrades.side_flip.verbose_description":"撞击砖块的右侧可获得一次连击，但要避免撞击其左侧，因为这样会消除 2 次连击。从顶部和底部击打没有效果。","upgrades.side_kick.name":"左撇子","upgrades.side_kick.tooltip":"每从左侧击碎一块砖+{{lvl}} 连击，否则-{{loss}} 连击","upgrades.side_kick.verbose_description":"撞击砖块的左侧可获得一次连击，但要避免撞击砖块的右侧，因为这样会消除两次连击。从顶部和底部击打没有效果。","upgrades.skip_last.help_plural":"最后 {{lvl}} 块砖头将爆炸。","upgrades.skip_last.name":"轻松清理","upgrades.skip_last.tooltip":"最后一块砖会爆炸。","upgrades.skip_last.verbose_description":"您需要打破所有砖块才能进入下一关。不过，要拿到最后一块砖可能很难。\\n\\n提前通关会在升级时带来额外的选择。绝不漏掉砖块也非常有益。\\n\\n因此，如果你觉得很难打碎最后一块砖，那么多打几次就会有帮助。","upgrades.slow_down.name":"球速较慢","upgrades.slow_down.tooltip":"球移动更慢","upgrades.slow_down.verbose_description":"球的启动速度相对较慢，但每升一级，球的启动速度就会加快一些。\\n\\n如果您在一个关卡中花费大量时间，球速也会加快。\\n\\n这项功能让您更容易掌握。\\n\\n每次开始时，您都可以通过在菜单中启用儿童模式来获得它。","upgrades.smaller_puck.help_plural":"更小的冰球和更高的底座组合","upgrades.smaller_puck.name":"更小的冰球","upgrades.smaller_puck.tooltip":"同时提供 +5 基础连击","upgrades.smaller_puck.verbose_description":"这使得冰球变小，理论上可以让一些角球射门变得更容易，但实际上只是提高了难度。\\n\\n这就是为什么你在选中这个选项后，还能获得每块砖+5金币的额外奖励。","upgrades.soft_reset.name":"软重置","upgrades.soft_reset.tooltip":"组合重置保持 {{percent}}%。","upgrades.soft_reset.verbose_description":"限制组合重置的影响。","upgrades.streak_shots.name":"连击","upgrades.streak_shots.tooltip":"如果在弹上冰球前打破很多砖块，就能获得更多金币。","upgrades.streak_shots.verbose_description":"每击碎一块砖，您的连击数（每块砖的金币数）就会增加一个。\\n\\n不过，只要球碰到你的冰球，连击数就会重置为默认值，每块砖头只能获得一枚硬币。\\n\\n一旦你的连击数超过了基础值，你的冰球就会变成红色，提醒你用球碰到它将会破坏你的连击数。","upgrades.sturdy_bricks.name":"坚固的砖块","upgrades.sturdy_bricks.tooltip":"+{{lvl}} 砖块 HP，+{{percent}}破碎时产生的 % 硬币","upgrades.sturdy_bricks.verbose_description":"每升一级，所有砖块都会增加一级 HP。您可以通过 \\"千里眼 \\"装备查看 HP 数值。获得 \\"穿刺 \\"装备可以增加球的伤害。该装备每升一级都会增加 50% 的金币。","upgrades.telekinesis.help_plural":"对球的影响更强","upgrades.telekinesis.name":"遥感","upgrades.telekinesis.tooltip":"冰球控制球的轨迹","upgrades.telekinesis.verbose_description":"球上升时由你控制。","upgrades.top_is_lava.name":"天高任鸟飞","upgrades.top_is_lava.tooltip":"每块砖+{{lvl}} 连击，击中顶部后重置","upgrades.top_is_lava.verbose_description":"每打破一块砖，您的连击次数就会增加一次。不过，一旦您的球击中屏幕上方，您的连击数就会重置。\\n\\n当您的连击数超过最低连击数时，顶部会出现一个红条，提醒您应避免撞击。","upgrades.trampoline.name":"蹦床","upgrades.trampoline.tooltip":"每次冰球反弹+{{lvl}} 连击，每次反弹在任何边界上-{{lvl}} 连击","upgrades.trampoline.verbose_description":"罕见的不增加重置条件的组合升级之一","upgrades.unbounded.help_no_ceiling":"每块砖+{{lvl}} 组合，没有更多的侧面或天花板","upgrades.unbounded.name":"无界","upgrades.unbounded.tooltip":"每块砖+{{lvl}} 连击，没有更多的边来保持球在游戏中，危险","upgrades.unbounded.verbose_description":"我希望你们已经找到了让球保持在屏幕上的方法。击中边线的惩罚不再适用。2 级以上时，天花板也会消失。这是一项高级福利。","upgrades.viscosity.name":"粘度","upgrades.viscosity.tooltip":"硬币下落速度减慢","upgrades.viscosity.verbose_description":"硬币通常会在重力和爆炸的作用下加速到相当高的速度。\\n\\n而这项功能会让它们不断减速，就像在某种粘性液体中一样。\\n\\n这样就能更容易地捕捉它们，并与影响硬币移动的特效完美结合。","upgrades.wind.help_plural":"更强的风力","upgrades.wind.name":"风","upgrades.wind.tooltip":"冰球位置产生风","upgrades.wind.verbose_description":"风力取决于冰球的位置：左风吹左，右风吹右。对球和硬币都有影响。","upgrades.yoyo.name":"溜溜球","upgrades.yoyo.tooltip":"球落向冰球","upgrades.yoyo.verbose_description":"它与心灵遥感相反，在球回落时对其进行控制。","upgrades.zen.name":"禅宗","upgrades.zen.tooltip":"每个砖块 +{{lvl}} 连击，爆炸时重置","upgrades.zen.verbose_description":"毕竟，这是一款非暴力游戏。"}');var D={};function F(e,a){if(void 0===D[e])try{var n,r=localStorage.getItem(e);r&&(D[e]=JSON.parse(r))}catch(e){console.warn(e)}return null!==(n=D[e])&&void 0!==n?n:a}function I(e,a){D[e]=a;try{localStorage.setItem(e,JSON.stringify(a))}catch(e){console.warn(e)}}function V(){return F("breakout_71_total_score",0)}function Z(){return 200*Math.pow(2,F("max_coins",1))}function N(){return 200*Math.pow(2,F("max_particles",1))}var U=[{text:"English",value:"en",strings:a(L),levelName:"UK"},{text:"Français",value:"fr",strings:a(T),levelName:"France"},{text:"عربي",value:"ar",strings:a(P),levelName:"Lebanon"},{text:"Español",value:"es",strings:a(R),levelName:"Spain"},{text:"Русский",value:"ru",strings:a(j),levelName:"Russia"},{text:"Deutsch",value:"de",strings:a(G),levelName:"Germany"},{text:"汉语",value:"zh",strings:a(H),levelName:"China"},{text:"o'zbek tili",value:"uz",strings:a(E),levelName:"Uzbekistan"},{text:"اردو",value:"ur",strings:a(A),levelName:"Pakistan"},{text:"한국인",value:"ko",strings:a(C),levelName:"Korea"}],K={};function Y(){var e,a;return F("lang",(e=x(navigator.languages).concat([navigator.language,"en"]).filter(function(e){return e}).map(function(e){return e.slice(0,2).toLowerCase()}),a=Object.keys(K),e.find(function(e){return a.includes(e)})||"en"))}function X(e){var a,n=arguments.length>1&&void 0!==arguments[1]?arguments[1]:{},r=(null===(a=K[Y()])||void 0===a?void 0:a[e])||K.en[e];for(var i in n)r=r.split("{{"+i+"}}").join("".concat(n[i]));return r}f
