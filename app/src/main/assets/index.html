enu.colorful_coins":"عملات معدنية ملونة","main_menu.colorful_coins_help":"تظهر العملات المعدنية دائمًا بلون الطوب","main_menu.comboIncreaseTexts":"إظهار +X باللون الذهبي","main_menu.comboIncreaseTexts_help":"عندما تزيد المجموعة","main_menu.contrast":"تباين عالي","main_menu.contrast_help":"تقديم أكثر ألوانًا وظلامًا","main_menu.credit_levels":"المستويات","main_menu.donate":"لقد لعبت لمدة {{hours}} ساعة","main_menu.donate_help":"ماذا عن التبرع؟ يمكنك إخفاء هذا التذكير في الإعدادات.","main_menu.donation_reminder":"ذكّرني بالتبرع","main_menu.donation_reminder_help":"شاهد وقت اللعب ورابط التبرع في القائمة الرئيسية","main_menu.download_save_file":"تنزيل النتيجة والإحصائيات","main_menu.download_save_file_help":"احصل على ملف الحفظ","main_menu.extra_bright":"مشرق للغاية","main_menu.extra_bright_help":"يزيد من حجم الهالة حول العملات المعدنية والطوب.","main_menu.fullscreen":"تكبير الشاشة","main_menu.fullscreen_help":"ستحاول اللعبة الانتقال إلى وضع ملء الشاشة قبل البدء","main_menu.help_content":"## الهدف\\n\\nاجمع أكبر عدد ممكن من العملات المعدنية خلال 7 مستويات.\\n\\nتظهر العملات المعدنية عند كسر الطوب.\\n\\nاجمعها بقرصك لزيادة نقاطك.\\n\\nتظهر نقاطك في الزاوية العلوية اليمنى من الشاشة.\\n\\nلا تسقط الكرة وإلا ستنتهي اللعبة.\\n\\nبعد تدمير جميع الطوب، ستتمكن من اختيار ترقية.\\n\\n## الترقيات\\n\\nستُطبق الترقيات التي تختارها حتى نهاية الجولة.\\n\\nيمكن اختيار بعضها عدة مرات لتأثير أقوى.\\n\\nبعضها يُساعد في التصويب، أو يُسهّل اللعبة بطرق أخرى.\\n\\nبعضها لا يُفيد إلا عند دمجه.\\n\\nستحصل دائمًا على ترقية واحدة في بداية كل لعبة.\\n\\nسيكون رمزها بمثابة طوب المستوى الأول.\\n\\nيمكنك اختيار ترقيات البدء من الإعدادات.\\n\\nتؤثر العديد من الترقيات على مجموعتك.\\n\\n## المجموعة\\n\\n\\"مجموعتك\\" هي عدد العملات المعدنية التي تظهر عند كسر طوبة.\\nيظهر على قرصك، على سبيل المثال، x4 يعني أن كل مكعب سيُنتج 4 عملات.\\n\\nمعظم الترقيات التي تزيد من قوة المجموعة تُضيف شرطًا لإعادة ضبطها.\\n\\nسيتم إعادة ضبط المجموعة أيضًا إذا عادت الكرة إلى القرص دون أن تصطدم بأي مكعب.\\n\\nستظهر رسالة \\"خطأ\\" عند حدوث ذلك.\\n\\nحاول التصويب نحو مكعب في كل مرة.\\n\\n## التصويب\\n\\nموضع الكرة على القرص هو ما يُحدد كيفية ارتدادها.\\n\\nإذا اصطدمت الكرة بالقرص في منتصفه تمامًا، سترتد عموديًا.\\n\\nإذا ضربت أكثر على جانب واحد، ستكون زاوية ارتدادها أكبر.\\n\\nلا تؤثر سرعة القرص وزاوية دخوله على اتجاه الكرة بعد ارتدادها.\\n\\nيمكن فتح العديد من الترقيات التي تُساعد في التصويب.\\n\\n## الفتح\\n\\nعند لعب Breakout 71 لأول مرة، تكون معظم الترقيات والمستويات مقفلة.\\n\\nيتم فتح الترقيات بمجرد اللعب والتقاط العديد من العملات.\\nتُفتح المستويات الأولى عند تحقيق أعلى نتيجة.\\n\\nتُضيف المستويات اللاحقة شرطًا لاختيار المزايا.\\n\\nيصبح تحقيق أعلى النتائج أسهل بكثير عند حصولك على ترقيات متعددة بعد كل مستوى.\\n\\n## إعادة رمي النرد والترقيات المجانية\\n\\nستحصل على ترقية إضافية لاختيارها عند لعبك الجيد:\\n\\n- إكمال المستوى في أقل من {{levelTimeGood}} ثانية\\n- ضرب الجوانب أو القمة أقل من {{wallBouncedGood}} مرة\\n- التقاط {{catchRateGood}}% من العملات\\n- تفويت الطوب أقل من {{missesGood}} مرات\\n\\nستحصل أيضًا على إعادة رمي نرد تتيح لك تخطي الترقيات إذا كان أداؤك أفضل:\\n\\n- إكمال المستوى في أقل من {{levelTimeBest}} ثانية\\n- ضرب الجوانب أو القمة أقل من {{wallBouncedBest}} مرات\\n- التقاط {{catchRateBest}}% من العملات\\n- تفويت الطوب أقل من {{missesBest}} مرات\\n\\nيُتيح لك خيار في الإعدادات عرض هذه الإحصائيات","main_menu.help_help":"تعرف على المزيد حول اللعبة","main_menu.help_title":"يساعد","main_menu.help_upgrades":"## الترقيات","main_menu.high_score":"أعلى نتيجة : {{score}}","main_menu.kid":"وضع الأطفال","main_menu.kid_help":"ابدأ الألعاب المستقبلية بـ \\"الكرة الأبطأ\\".","main_menu.language":"لغة","main_menu.language_help":"اختر لغة اللعبة","main_menu.load_save_file":"تحميل ملف الحفظ","main_menu.load_save_file_help":"حدد ملف الحفظ على جهازك","main_menu.max_coins":" {{max}} عملات معدنية على الشاشة كحد أقصى","main_menu.max_coins_help":"تجميلي فقط، لا يؤثر على النتيجة","main_menu.max_particles":" {{max}} جسيمات كحد أقصى","main_menu.max_particles_help":"يحدد عدد الجسيمات التي {unlocked}} ترقيات من أصل {{out_of}}","upgrades.addiction.name":"مدمن","upgrades.addiction.tooltip":"+{{lvl}} مجموعة / لبنة، يتم إعادة تعيين المجموعة لمدة {{delay}}ثانية بعد كسر لبنة.","upgrades.addiction.verbose_description":"يبدأ العد التنازلي بعد كسر أول لبنة من كل مستوى، ويتوقف عند تدمير جميع الطوب.","upgrades.asceticism.name":"الزهد","upgrades.asceticism.tooltip":"+{{combo}} مجموعة / لبنة، - {{combo}} عند التقاط العملة المعدنية","upgrades.asceticism.verbose_description":"سوف تحتاج إلى تخزين العملات المعدنية في مكان ما أثناء صعود مجموعتك.","upgrades.ball_attract_ball.help_plural":"قوة جذب أقوى","upgrades.ball_attract_ball.name":"جاذبية","upgrades.ball_attract_ball.tooltip":"الكرات تجذب الكرات","upgrades.ball_attract_ball.verbose_description":"الكرات التي تبعد أكثر من ثلاثة أرباع مساحة اللعبة ستبدأ بالتجاذب.\\n\\nتزداد قوة التجاذب كلما ابتعدت الكرات عن بعضها.\\n\\nستتطاير جزيئات قوس قزح رمزًا لقوة التجاذب. هذه الميزة متاحة فقط إذا كان لديك أكثر من كرة واحدة.","upgrades.ball_attracts_coins.name":"الكرات تجذب العملات المعدنية","upgrades.ball_attracts_coins.tooltip":"تتبع العملات المعدنية الكرة الأقرب وتسقط بشكل أبطأ","upgrades.ball_attracts_coins.verbose_description":"يمكن استخدام هذا المنتج لطلاء الكرات بالعملات المعدنية إذا تم دمجه مع \\"الصبغة\\" و\\"عملات الأشباح\\". كما أنه بديل لمغناطيس العملات المعدنية.","upgrades.ball_repulse_ball.help_plural":"قوة تنافر أقوى","upgrades.ball_repulse_ball.name":"المساحة الشخصية","upgrades.ball_repulse_ball.tooltip":"الكرات تصد الكرات","upgrades.ball_repulse_ball.verbose_description":"الكرات التي تبعد أقل من ربع عرض الشاشة ستبدأ بالتنافر. تزداد قوة التنافر كلما كانت الكرات قريبة من بعضها. ستنطلق الجسيمات للخارج لترمز إلى تطبيق هذه القوة. هذه الميزة متاحة فقط إذا كان لديك أكثر من كرة واحدة.","upgrades.base_combo.name":"أسس قوية","upgrades.base_combo.tooltip":"تبدأ المجموعة عند {{coins}} بدلاً من 1.","upgrades.base_combo.verbose_description":"عادةً ما تبدأ مجموعتك من ١ في بداية المستوى، وتُعاد ضبطها إلى ١ عندما تقفز دون أن تصطدم بأي شيء. مع هذه الميزة، تبدأ المجموعة أعلى بثلاث نقاط، لذا ستحصل دائمًا على ٤ عملات على الأقل لكل مكعب. عند إعادة ضبط مجموعتك، تعود إلى ٤ وليس ١. ستتألق كرتك قليلاً للإشارة إلى أن مجموعتها أعلى من ١.","upgrades.bigger_explosions.name":"كابوم","upgrades.bigger_explosions.tooltip":"انفجارات أكبر","upgrades.bigger_explosions.verbose_description":"الانفجار الافتراضي يُزيل مربعًا 3×3، ويصبح مربعًا 5×5، كما أن تأثير الضربة على العملات المعدنية أقوى بكثير. ستومض الشاشة بعد كل انفجار (باستثناء الوضع الأساسي).","upgrades.bigger_puck.name":"قرص أكبر","upgrades.bigger_puck.tooltip":"احصل على المزيد من العملات المعدنية بسهولة.","upgrades.bigger_puck.verbose_description":"القرص الأكبر حجمًا يُسهّل عدم تفويت الكرة والتقاط المزيد من العملات، كما يُحسّن زاوية ارتدادها (تعتمد زاوية الكرة فقط على مكان اصطدامها بالقرص).\\n\\nمع ذلك، يصعب استخدام القرص الأكبر حجمًا حول جوانب المستوى، مما يجعل تفويت الكرة أمرًا لا مفر منه في بعض الأحيان.","upgrades.clairvoyant.name":"مستبصر","upgrades.clairvoyant.tooltip":"شاهد المستويات القادمة، نقاط الصحة للطوب واتجاه الكرة","upgrades.clairvoyant.verbose_description":"يساعدك على اختيار الترقيات المناسبة وفهم كيفية عمل الطوب المتين. يُضيف المستويان 2 و3 معلومات إضافية حول فائدة مشكوك فيها (متوفرة في وضع الحلقة).","upgrades.coin_magnet.help_plural":"تأثير أقوى على العملات المعدنية","upgrades.coin_magnet.name":"مغناطيس العملات المعدنية","upgrades.coin_magnet.tooltip":"القرص يجذب العملات المعدنية","upgrades.coin_magnet.verbose_description":"يوجه العملات نحو القرص. يكون التأثير أقوى إذا كانت العملة قريبة منه بالفعل. التقاط جميع العملات يمنحك مكافآت خاصة في اللعبة.\\n\\nهناك طريقة أخرى لالتقاط المزيد من العملات وهي ضرب الطوب من الأسفل. تؤثر سرعة الكرة واتجاهها على سرعة العملة الناتجة.","upgrades.compound_interest.name":"الفائدة المركبة","upgrades.compound_interest.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة، يتم إعادة تعيينها عند فقدان العملة المعدنية","upgrades.compound_interest.verbose_description":"ستزداد مجموعتك قطعةً قطعةً في كل مرة تكسر فيها لبنة، مما يُنتج المزيد والمزيد من العملات مع كل قطعة تكسرها.\\n\\nمع ذلك، احرص على التقاط جميع هذه العملات بقرصك، لأن أي عملة مفقودة ستُعيد ضبط مجموعتك.\\n\\nبمجرد أن تتجاوز مجموعتك الحد الأدنى، سيظهر خط أحمر في أسفل منطقة اللعب لتذكيرك بعدم وضع العملات هناك.","upgrades.concave_puck.name":"قرص مقعر","upgrades.concave_puck.tooltip":"تحسين دقة التصويب العمودي","upgrades.concave_puck.verbose_description":"تبدأ الكرات المستوى بالصعود مباشرة إلى الأعلى، وترتد بزاوية أقل.","upgrades.corner_shot.name":"ضربة ركنية","upgrades.corner_shot.tooltip":"يسمح للقرص الخاص بك بالتداخل مع حدود الشاشة","upgrades.corner_shot.verbose_description":"يُساعدك على التصويب في الزوايا. المستويات الأعلى تُتيح لك الوصول إلى مسافات أبعد.","upgrades.etherealcoins.name":"العملات المعدنية في الفضاء","upgrades.etherealcoins.tooltip":"لم تعد العملات المعدنية تتأثر بالجاذبية","upgrades.etherealcoins.verbose_description":"سيتعين عليك التأكد من سقوط العملات المعدنية بطريقة أو بأخرى، وإلا فلن تحصل على أي منها.","upgrades.extra_levels.name":"5 دقائق إضافية","upgrades.extra_levels.tooltip":"العب {{count}} مستوى بدلاً من 7","upgrades.extra_levels.verbose_description":"يمكن أن تستمر اللعبة الافتراضية لسبعة مستويات كحد أقصى، تنتهي بعدها.\\n\\nيتيح لك كل مستوى من هذه الميزة الانتقال إلى مستوى أعلى. غالبًا ما تكون المستويات الأخيرة هي التي تحقق فيها أعلى النقاط، لذا قد يكون الفرق كبيرًا.","upgrades.extra_life.help_plural":"سترتد الكرة (الأخيرة) إلى الأسفل بدلاً من أن تضيع ({{lvl}} مرة).","upgrades.extra_life.name":"حياة إضافية","upgrades.extra_life.tooltip":"سترتد الكرة مرة واحدة على الخط السفلي قبل أن تضيع.","upgrades.extra_life.verbose_description":"عادةً، لديك كرة واحدة، وتنتهي اللعبة بمجرد إسقاطها.\\n\\nتضيف هذه الميزة شريطًا أبيض أسفل الشاشة يحفظ الكرة مرة واحدة، ثم ينكسر أثناء ذلك.\\n\\nستخسر مستوى واحدًا من هذه الميزة في كل مرة ترتد فيها كرة أسفل الشاشة.","upgrades.forgiving.name":"غفور","upgrades.forgiving.tooltip":"يؤدي فقدان الفواصل إلى تقليل المجموعة تدريجيًا بدلاً من تقليلها دفعة واحدة.","upgrades.forgiving.verbose_description":"أول خطأ في كل مستوى مجاني، ثم 10% من المجموعة، ثم 20% ..","upgrades.fountain_toss.name":"رمي النافورة","upgrades.fountain_toss.tooltip":"احصل على بعض المجموعات عندما تفوت بعض العملات المعدنية.","upgrades.fountain_toss.verbose_description":"عندما تفوتك عملة معدنية وكان مجموعتك أقل من {{max}}، فإن مجموعتك لديها احتمالية {{lvl}}/مجموعة لتنمو بمقدار واحد.","upgrades.ghost_coins.name":"عملات الأشباح","upgrades.ghost_coins.tooltip":"تمر العملات المعدنية ببطء عبر الطوب","upgrades.ghost_coins.verbose_description":"إنها ليست مشكلة، بل ميزة! تتحرك العملات المعدنية ببطء عبر الطوب. المستويات الأعلى تسمح لها بالتحرك بشكل أسرع.","upgrades.helium.name":"الهيليوم","upgrades.helium.tooltip":"انعكست الجاذبية إلى اليسار واليمين من القرص","upgrades.helium.verbose_description":"يؤثر هذا على العملات المعدنية وسيسمح لها بالطفو حتى تصبح جاهزًا لالتقاطها.","upgrades.hot_start.name":"بداية ساخنة","upgrades.hot_start.tooltip":"ابدأ عند المجموعة {{start}}، -{{loss}} مجموعة في الثانية","upgrades.hot_start.verbose_description":"في بداية كل مستوى، تبدأ مجموعتك بـ +٣٠ نقطة، ثم تنخفض نقطة واحدة كل ثانية. يتراكم هذا التأثير مع مزايا أخرى.","upgrades.implosions.name":"الانفجارات","upgrades.implosions.tooltip":"تؤدي الانفجارات إلى امتصاص العملات المعدنية بدلاً من تفجيرها","upgrades.implosions.verbose_description":"تُطبّق قوة الانفجار بطريقة أخرى. المستويات الأخرى تُشكّل \\"انفجارًا أكبر\\".","upgrades.instant_upgrade.name":"ترقية فورية","upgrades.instant_upgrade.tooltip":"+1 ترقية الآن، -1 اختيار حتى نهاية اللعبة.","upgrades.instant_upgrade.verbose_description":"اختر ترقيتين فورًا، لتحصل على واحدة مجانية وأخرى لاسترداد قيمة الميزة التي استخدمتها. مع كل قائمة تالية لاختيار الترقيات، ستجد خيارات أقل.","upgrades.left_is_lava.name":"تجنب الجانب الأيسر","upgrades.left_is_lava.tooltip":"+{{lvl}} مجموعة لكل طوبة مكسورة. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.left_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ بمجرد أن تصطدم كرتكَ بالجانب الأيسر.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيسر أحمر لتذكيرك بضرورة تجنب ضربها.\\n\\n","upgrades.limitless.name":"بلا حدود","upgrades.limitless.tooltip":"رفع المستوى الأقصى لجميع الترقيات بمقدار {{lvl}} ","upgrades.limitless.verbose_description":"يؤدي اختيار هذه الميزة أيضًا إلى رفع الحد الأقصى الخاص به بمقدار واحد، مما يتيح لك اختيارها مرة أخرى.","upgrades.metamorphosis.name":"التحول","upgrades.metamorphosis.tooltip":"يمكن لكل عملة أن تصبغ {{lvl}} من الطوب بلونها","upgrades.metamorphosis.verbose_description":"مع هذه الميزة، ستكون العملات بلون الطوبة التي أتت منها، وستُلوّن أول طوبة تلمسها بنفس اللون.\\n\\nتظهر العملات بسرعة الكرة التي كسرتها، ما يعني أنه يمكنك التصويب قليلاً باتجاه الطوب الذي تريد \\"طلائه\\".","upgrades.minefield.name":"حقل ألغام","upgrades.minefield.tooltip":"+{{lvl}} مجموعة لكل قنبلة على الشاشة","upgrades.minefield.verbose_description":"يضيف +lvl إلى المجموعة عند وضع لبنة، و-lvl عند تدميرها، ويرفع المجموعة الأساسية بمقدار عدد الطوب مضروبًا في المستوى","upgrades.multiball.name":"كرة متعددة","upgrades.multiball.tooltip":"ابدأ كل المستويات بـ {{count}} كرة.","upgrades.multiball.verbose_description":"بمجرد أن تسقط الكرة في Breakout 71، ستخسر.\\n\\nمع هذه الميزة، ستحصل على كرتين، ما يعني أنك قادر على تحمل خسارة إحداهما.\\n\\nتعود الكرات المفقودة في المستوى التالي.\\n\\nامتلاك أكثر من كرة واحدة يتيح لك الحصول على مزايا إضافية، وبالطبع يُسرّع من إنهاء المستوى.","upgrades.nbricks.name":"حجم العينة الصارم","upgrades.nbricks.tooltip":"اضرب {{lvl}} طوبة بالضبط لكل ارتداد للقرص للحصول على +{{lvl}} مجموعة، وإلا فسيتم إعادة تعيينها","upgrades.nbricks.verbose_description":"ليس بالضرورة تدمير تلك الطوب، لكن عليك ضربها. الطوب المدمر بالانفجارات لا يُحتسب.","upgrades.one_more_choice.name":"خيار إضافي","upgrades.one_more_choice.tooltip":"ستوفر عمليات رفع المستوى الإضافية {{lvl}} خيارًا إضافيًا في القائمة","upgrades.one_more_choice.verbose_description":"ستحتوي كل قائمة ترقية على خيار إضافي. هذا لا يزيد من عدد الترقيات المتاحة.","upgrades.passive_income.name":"الدخل السلبي","upgrades.passive_income.tooltip":"+{{lvl}} مجموعة / لبنة، ما لم يتم تحريك القرص في آخر {{time}}ثانية، ثم يتم إعادة تعيينه بدلاً من ذلك","upgrades.passive_income.verbose_description":"يمكن لبعض الامتيازات أن تساعد الكرات على القيام بما تريد دون الحاجة إلى القيام بأي شيء.","upgrades.picky_eater.name":"آكل انتقائي","upgrades.picky_eater.tooltip":"+{{lvl}} مجموعة لكل لبنة مكسورة، يتم إعادة تعيينها عند تغير لون الكرة","upgrades.picky_eater.verbose_description":"كلما كسرتَ لبنة من نفس لون كرتك، تزداد مجموعتك بمقدار كرة واحدة.\\n\\nإذا كان لونها مختلفًا، تأخذ الكرة اللون الجديد، لكن المجموعة تُعاد ضبطها، إلا في حال عدم وجود أي طوب متبقي من لون الكرة.\\n\\nبمجرد حصولك على مجموعة أعلى من الحد الأدنى، ستُحاط الطوب ذات اللون غير المناسب بإطار أحمر.\\n\\nإذا كان لديك أكثر من كرة، فسيتغير لونها جميعًا عند اصطدام إحداها بطوبة.","upgrades.pierce.name":"ثقب","upgrades.pierce.tooltip":"الكرة تخترق {{count}} طوبة بعد ارتداد القرص","upgrades.pierce.verbose_description":"عادةً ما ترتد الكرة بمجرد ملامستها لأي شيء. مع هذه الميزة، ستواصل مسارها حتى كسر ثلاث طوبات.\\n\\nبعد ذلك، ترتد على الطوبة الرابعة، وستحتاج إلى لمس القرص لإعادة ضبط العداد.","upgrades.pierce_color.name":"ثقب اللون","upgrades.pierce_color.tooltip":"+{{lvl}} ضرر للطوب من لون الكرة","upgrades.pierce_color.verbose_description":"كلما اصطدمت الكرة بقطعة من نفس اللون، ستمرّ دون عائق.\\n\\nوإذا اصطدمت بقطعة من لون مختلف، فستكسرها، وتأخذ لونها، وترتد.\\n\\nإذا كانت لديك قطع متينة، فقد ترتد الكرة عن قطعة من نفس اللون.","upgrades.puck_repulse_ball.help_plural":"","upgrades.puck_repulse_ball.name":"هبوط ناعم","upgrades.puck_repulse_ball.tooltip":"القرص يصد الكرات","upgrades.puck_repulse_ball.verbose_description":"عندما تقترب الكرة من القرص، فإنها تبدأ في التباطؤ، وربما ترتد دون أن تلمس القرص.","upgrades.reach.name":"من أعلى إلى أسفل","upgrades.reach.tooltip":"لمس مكعبات N في الصف السفلي يُعيد ضبط المجموعة. وإلا، فإن +N مجموعة","upgrades.reach.verbose_description":"إذا كان هناك صف واحد فقط من الطوب، أو إذا غطى الصف السفلي عرض اللعبة بالكامل، فلن تُحدث هذه الميزة أي فرق. وإلا، فإن كسر هذا الصف السفلي يُعيد ضبط المجموعة، بينما يؤدي كسر أي شيء آخر إلى زيادة المجموعة بمقدار عدد الطوب الموجود في ذلك الصف السفلي.\\n\\nسيتم تمييز الصف السفلي باللون الأحمر.","upgrades.respawn.name":"إعادة الظهور","upgrades.respawn.tooltip":"{{percent}}% من الطوب يظهر مرة أخرى بعد {{delay}}ثانية.","upgrades.respawn.verbose_description":"سوف يساعدك تأثير الجسيمات على معرفة مكان ظهور الطوب.","upgrades.right_is_lava.name":"تجنب الجانب الأيمن","upgrades.right_is_lava.tooltip":"+{{lvl}} مجموعة لكل مكعب. تُعاد المجموعة إلى وضعها الطبيعي إذا ضربت الكرة الجانب الأيسر من الشاشة.","upgrades.right_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتكَ بواحدة، ما يعني أنك ستحصل على عملة إضافية من كل لبنة تكسرها لاحقًا.\\n\\nمع ذلك، ستُعاد ضبط مجموعتكَ حالما تصطدم كرتكَ بالجانب الأيمن.\\n\\nبمجرد أن ترتفع مجموعتكَ، يصبح الجانب الأيمن أحمر لتذكيرك بضرورة تجنب ضربها.\\n\\n","upgrades.sacrifice.help_l1":"فقدان الحياة يزيل كل الطوب","upgrades.sacrifice.help_over":"خسارة حياة {{lvl}}× المجموعة ثم إزالة كل الطوب","upgrades.sacrifice.name":"تصحية","upgrades.sacrifice.verbose_description":"قد يؤدي هذا إلى ارتفاع المجموعة إلى حد كبير.","upgrades.sapper.help_plural":"أول {{lvl}} طوبة مكسورة تصبح قنابل.","upgrades.sapper.name":"مهندس","upgrades.sapper.tooltip":"الطوبة الأولى المكسورة تصبح قنبلة.","upgrades.sapper.verbose_description":"بدلاً من مجرد الاختفاء، ستُستبدل أول لبنة تكسرها ببنة قنبلة. ارتطام الكرة بالقرص يُعيد تفعيل التأثير. رفع مستوى هذه الميزة سيسمح لك بوضع المزيد من القنابل.\\n\\nتذكر أن القنابل تؤثر على سرعة العملات القريبة، لذا فإن كثرة الانفجارات قد تُصعّب عليك التقاط ثمار جهدك.","upgrades.shocks.name":"الصدمات","upgrades.shocks.tooltip":"تصادمات الكرات المتفجرة","upgrades.shocks.verbose_description":"عندما تصطدم كرتان، فإنهما تتبادلان سرعتهما، ويحدث انفجار، ويكتسبان سرعة إضافية لفصلهما."," ية، ولكنه في الواقع يزيد من الصعوبة.\\n\\nلهذا السبب ستحصل أيضًا على مكافأة رائعة قدرها +٥ عملات لكل لبنة تُكسرها بعد التقاط هذا.","upgrades.soft_reset.name":"إعادة الضبط الناعمة","upgrades.soft_reset.tooltip":"إعادة تعيين المجموعة تحافظ على {{percent}}%","upgrades.soft_reset.verbose_description":"الحد من تأثير إعادة تعيين المجموعة.","upgrades.streak_shots.name":"سلسلة الضربات","upgrades.streak_shots.tooltip":"مزيد من العملات المعدنية إذا قمت بكسر العديد من الطوب قبل الارتداد على القرص.","upgrades.streak_shots.verbose_description":"في كل مرة تكسر فيها لبنة، تزداد مجموعتك (عدد العملات لكل لبنة) بمقدار عملة واحدة.\\n\\nولكن بمجرد أن تلمس الكرة قرصك، تُعاد المجموعة إلى قيمتها الافتراضية، وستحصل على عملة واحدة فقط لكل لبنة.\\n\\nبمجرد أن تتجاوز مجموعتك القيمة الأساسية، سيتحول لون قرصك إلى الأحمر لتذكيرك بأنه سيدمر مجموعتك إذا لمسته بالكرة.","upgrades.sturdy_bricks.name":"طوب قوي","upgrades.sturdy_bricks.tooltip":"+{{lvl}} من الطوب نقاط الصحة، +{{percent}}% من العملات المعدنية التي تظهر عند الكسر","upgrades.sturdy_bricks.verbose_description":"كل مستوى من هذه الميزة يُضيف نقطة صحة واحدة لجميع الطوب. يمكنك رؤية عدد نقاط الصحة باستخدام ميزة \\"الاستبصار\\". يمكنك زيادة ضرر الكرة بالحصول على ميزة \\"الثاقب\\". كل مستوى من الميزة يُضيف +٥٠٪ من العملات المعدنية.","upgrades.telekinesis.help_plural":"تأثير أقوى على الكرة","upgrades.telekinesis.name":"التحريك الذهني","upgrades.telekinesis.tooltip":"يتحكم القرص في مسار الكرة","upgrades.telekinesis.verbose_description":"تتحكم بالكرة أثناء صعودها.","upgrades.top_is_lava.name":"السماء هي الحد","upgrades.top_is_lava.tooltip":"+{{lvl}} مجموعة لكل لبنة، يتم إعادة ضبطها عند الوصول إلى الجزء العلوي","upgrades.top_is_lava.verbose_description":"كلما كسرتَ لبنة، ستزداد مجموعتك بمقدار واحد. مع ذلك، ستُعاد ضبط مجموعتك بمجرد وصول الكرة إلى أعلى الشاشة.\\n\\nعندما تتجاوز مجموعتك الحد الأدنى، سيظهر شريط أحمر في الأعلى لتذكيرك بتجنب ضربها.","upgrades.trampoline.name":"الترامبولين","upgrades.trampoline.tooltip":"+{{lvl}} مجموعة لكل ارتداد للقرص، -{ Gain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Versuche, alle Münzen zu fangen, verpasse nie die Steine, stoße nie an die Wände/Decke oder schaffe das Level unter 30 Sekunden, um zusätzliche Upgrades zu erhalten.","level_up.compliment_good":"Gut gemacht!","level_up.compliment_perfect":"Beeindruckend, machen Sie weiter so!","level_up.pick_upgrade_title":"Wählen Sie ein Upgrade","level_up.plus_one_upgrade":"(+1 Aufwertung)","level_up.plus_one_upgrade_and_reroll":"(+1 Aufwertung und +1 Neuwurf)","level_up.reroll":"Neu würfeln ({{count}})","level_up.reroll_help":"Neue Wahlmöglichkeiten bieten","level_up.upgrade_perk_to_level":"  lvl {{level}}","main_menu.basic":"Grundlegende Grafiken","main_menu.basic_help":"Bessere Leistung.","main_menu.colorful_coins":"Bunte Münzen","main_menu.colorful_coins_help":"Münzen spawnen immer in der Farbe des Steins","main_menu.comboIncreaseTexts":"+X in Gold anzeigen","main_menu.comboIncreaseTexts_help":"Wenn die Combo zunimmt","main_menu.contrast":"Hoher Kontrast","main_menu.contrast_help":"Buntes und dunkles Rendering","main_menu.credit_levels":"Ebenen","main_menu.donate":"Sie haben seit {{hours}} Stunden gespielt","main_menu.donate_help":"Wie wäre es mit einer Spende? Sie können diese Erinnerung in den Einstellungen ausblenden.","main_menu.donation_reminder":"Erinnern Sie mich an eine Spende","main_menu.donation_reminder_help":"Siehe Spielzeit und Spendenlink im Hauptmenü","main_menu.download_save_file":"Spielstand und Statistiken herunterladen","main_menu.download_save_file_help":"Abrufen einer Speicherdatei","main_menu.extra_bright":"Extra hell","main_menu.extra_bright_help":"Erhöht die Größe des Halos um Münzen und Ziegel.","main_menu.fullscreen":"Vollbild","main_menu.fullscreen_help":"Das Spiel versucht, vor dem Start in den Vollbildmodus zu wechseln","main_menu.help_content":"## Ziel\\n\\nSammle in 7 Levels so viele Münzen wie möglich ein.\\nDie Münzen erscheinen, wenn du Ziegel zerbrichst.\\nFangen Sie sie mit Ihrem Puck, um Ihre Punktzahl zu erhöhen.\\nDein Punktestand wird in der oberen rechten Ecke des Bildschirms angezeigt.\\nLassen Sie den Ball nicht fallen, sonst ist das Spiel vorbei.\\n\\nWenn du alle Ziegel zerstört hast, kannst du dir ein Upgrade aussuchen.\\n\\n## Upgrades\\n\\nDie Upgrades, die du wählst, gelten bis zum Ende des Laufs.\\nEinige können mehrmals ausgewählt werden, um die Wirkung zu verstärken.\\nEinige helfen beim Zielen oder machen das Spiel auf andere Weise einfacher.\\nEinige sind nur in Kombination nützlich.\\n\\nZu Beginn eines jeden Spiels erhältst du immer ein Upgrade.\\nIhr Symbol dient als Baustein für die erste Stufe.\\nDu kannst die Start-Upgrades in den Einstellungen auswählen.\\n\\nViele Upgrades wirken sich auf deine Kombo aus.\\n\\n## Kombo\\n\\nDeine \\"Combo\\" ist die Anzahl der Münzen, die beim Zerbrechen eines Steins entstehen.\\nSie wird auf deinem Puck angezeigt, z. B. x4 bedeutet, dass jeder Stein 4 Münzen hervorbringt.\\nDie meisten Upgrades, die den Combo erhöhen, fügen auch eine Bedingung hinzu, um ihn zurückzusetzen.\\nDie Kombo wird auch zurückgesetzt, wenn der Ball zum Puck zurückkehrt, ohne einen Stein zu treffen.\\nWenn das passiert, wird eine \\"Miss\\"-Meldung angezeigt.\\n\\nVersuche, jedes Mal auf einen Stein zu zielen.\\n\\n## Anvisieren\\n\\nNur die Position des Balls auf dem Puck entscheidet darüber, wie er abprallen wird.\\nWenn der Ball den Puck genau in der Mitte trifft, prallt er senkrecht nach oben zurück.\\nWenn du ihn mehr auf einer Seite triffst, hat er einen größeren Winkel.\\nDie Geschwindigkeit des Pucks und der Auftreffwinkel haben keinen Einfluss auf die Richtung des Balls nach dem Aufprall.\\n\\nViele Upgrades, die beim Zielen helfen, können freigeschaltet werden.\\n\\n## Freischaltungen\\n\\nWenn du Breakout 71 zum ersten Mal spielst, sind die meisten Upgrades und Levels gesperrt.\\nUpgrades werden freigeschaltet, indem du einfach spielst und viele Münzen fängst.\\nDie ersten Level werden durch das Erreichen einer hohen Punktzahl freigeschaltet.\\nSpätere Levels fügen eine Bedingung hinzu, welche Vergünstigungen Sie auswählen können.\\n\\nEine hohe Punktzahl zu erreichen ist viel einfacher, wenn du nach jedem Level mehrere Upgrades erhältst.\\n\\n## Re-Rolls und kostenlose Upgrades\\n\\nDu bekommst ein zusätzliches Upgrade, wenn du gut spielst:\\n\\n- Schaffe das Level in weniger als {{levelTimeGood}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedGood}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateGood}}% der Münzen\\n- Verfehle die Steine weniger als {{missesGood}} Mal\\n\\nDu bekommst auch einen Re-Roll, mit dem du Upgrades überspringen kannst, wenn du noch besser abschneidest:\\n\\n- Schaffe ein Level in weniger als {{levelTimeBest}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedBest}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateBest}}% der Münzen\\n- Verfehle die Steine weniger als {{missesBest}} Mal\\n\\nMit einer Option in den Einstellungen können Sie diese Statistiken anzeigen lassen","main_menu.help_help":"Erfahren Sie mehr über das Spiel","main_menu.help_title":"Hilfe","main_menu.help_upgrades":"## Upgrades","main_menu.high_score":"Hohe Punktzahl : {{score}}","main_menu.kid":"Kinder-Modus","main_menu.kid_help":"Beginnen Sie künftige Spiele mit einem \\"langsameren Ball\\".","main_menu.language":"Sprache","main_menu.language_help":"Wählen Sie die Sprache des Spiels","main_menu.load_save_file":"Speicherdatei laden","main_menu.load_save_file_help":"Wählen Sie eine Speicherdatei auf Ihrem Gerät","main_menu.max_coins":" {{max}} Münzen auf dem Bildschirm maximal","main_menu.max_coins_help":"Nur kosmetisch, keine Auswirkung auf das Ergebnis","main_menu.max_particles":" {{max}} Teilchen maximal","main_menu.max_particles_help":"Begrenzt die Anzahl der auf dem Bildschirm angezeigten Partikel für visuelle Effekte.","main_menu.mobile":"Mobiler Modus","main_menu.mobile_help":"Lässt Raum unter dem Puck.","main_menu.normal":"Neues Spiel"
