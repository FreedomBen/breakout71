ez les éléments débloqués","play.close_modale_window_tooltip":"Fermer","play.current_lvl":"Niveau {{level}}/{{max}}","play.menu_label":"Menu","play.missed_ball":"raté","play.mobile_press_to_play":"Gardez le doigt ici pour jouer","sandbox.help":"Tester n\'importe quelle combinaison d\'améliorations","sandbox.instructions":"Sélectionnez les amélioration ci-dessous et appuyez sur \\"Démarrer la partie de test\\" pour les tester. Les scores et les statistiques ne seront pas enregistrés.","sandbox.start":"Démarrer la partie de test","sandbox.title":"Mode bac à sable","sandbox.unlocks_at":"Déverrouillé à partir d\'un score total de {{score}}","score_panel.restart":"Redémarrer","score_panel.restart_help":"Commencer une nouvelle partie","score_panel.resume":"Continuer la partie","score_panel.resume_help":"Fermer cette fenêtre pour retourner au jeu","score_panel.test_run":"Il s\'agit d\'une partie d\'essai, le score n\'est pas enregistré.","score_panel.title":"{{score}} points au niveau {{level}}/{{max}} ","score_panel.upcoming_levels":"Niveaux de la parties : ","score_panel.upgrades_picked":"Améliorations choisies jusqu\'à présent :","unlocks.greyed_out_help":"Les éléments grisées peuvent être débloquées en augmentant votre score total. Le score total augmente à chaque fois que vous marquez des points dans le jeu.","unlocks.intro":"Votre score total est de {{ts}}. Vous trouverez ci-dessous toutes les améliorations et tous les niveaux que le jeu peut offrir.","unlocks.level_description":"Un niveau {{size}}x{{size}} avec {{bricks}} briques","unlocks.title":"Vous avez débloqué {{percentUnlock}}% du jeu.","unlocks.unlocks_at":"Déverrouillé au score total {{threshold}}.","upgrades.asceticism.fullHelp":"Il faudra trouver un moyen de stocker les pièces pendant que le combo grandis. ","upgrades.asceticism.help":"+1 combo par brique cassée, RAZ quand une pièce est attrapée","upgrades.asceticism.name":"Ascétisme","upgrades.ball_attract_ball.fullHelp":"Les balles qui sont éloignées de plus d\'une demi-largeur d\'écran commencent à s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus éloignées l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle en jeu.","upgrades.ball_attract_ball.help":"Les balles attirent les balles","upgrades.ball_attract_ball.help_plural":"Force d\'attraction plus forte","upgrades.ball_attract_ball.name":"Gravité","upgrades.ball_attracts_coins.fullHelp":"Ne me demandez pas pourquoi ça va que dans une sens. ","upgrades.ball_attracts_coins.help":"Les balles attirent les pièces","upgrades.ball_attracts_coins.name":"Balles de fortune","upgrades.ball_repulse_ball.fullHelp":"Les balles qui se trouvent à moins d\'une demi-largeur d\'écran commencent à se repousser les unes les autres. La force de répulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affichées pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez déjà plus d\'une balle.","upgrades.ball_repulse_ball.help":"Les balles repoussent les balles","upgrades.ball_repulse_ball.help_plural":"Force de répulsion plus forte","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.base_combo.fullHelp":"Votre combo (nombre de pièces par brique) commence normalement à 1 au début du niveau et revient à 1 lorsque vous rebondissez sans rien toucher. Avec cette caractéristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pièces par brique. Lorsque votre combo est réinitialisé, il revient à 4 et non à 1.  Votre balle scintillera un peu pour indiquer que son combo est supérieur à 1.","upgrades.base_combo.help":"Le combo commence à {{coins}}.","upgrades.base_combo.name":"Combo +3","upgrades.bigger_explosions.fullHelp":"L\'explosion par défaut efface un carré de 3x3 briques, avec cette amélioration un carré de 5x5. Le vent soufflant les pièces est également beaucoup plus fort. L\'écran clignotera un peu après chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_explosions.help":"Explosions plus violentes","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_puck.fullHelp":"Un grand palet permet de ne jamais rater la balle et d\'attraper plus de pièces, ainsi que d\'orienter précisément les rebonds (l\'angle de la balle ne dépend que de l\'endroit où elle touche le palet). Cependant, un grand palet est plus difficile à utiliser sur les côtés du niveau.","upgrades.bigger_puck.help":"Attrapez facilement plus de pièces.","upgrades.bigger_puck.name":"Palet plus grand","upgrades.clairvoyant.fullHelp":"Vous aide à choisir les bonnes améliorations et à comprendre ce qu\'il se passe avec \\"briques solides\\"","upgrades.clairvoyant.help":"Révèle les niveaux à venir et les points de vie des briques","upgrades.clairvoyant.name":"Clairvoyant","upgrades.coin_magnet.fullHelp":"Dirige les pièces vers le palet. L\'effet est plus fort si la pièce est déjà proche du palet. Attraper 90 % ou 100 % des pièces apporte des bonus spéciaux dans le jeu.  Une autre façon d\'attraper plus de pièces est de frapper les briques par le bas. La vitesse et la direction de la balle ont un impact sur la vitesse des pièces produites.","upgrades.coin_magnet.help":"Le palet attire les pièces","upgrades.coin_magnet.help_plural":"Effet plus marqué sur les pièces","upgrades.coin_magnet.name":"Aimant pour pièces","upgrades.compound_interest.fullHelp":"Votre combo augmentera d\'une unité à chaque fois que vous casserez une brique, générant de plus en plus de pièces à chaque fois que vous casserez une brique. Veillez cependant à attraper chacune de ces pièces avec votre palet, car toute pièce perdue remettra votre combo à zéro. \\n    \\nSi votre combinaison est supérieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pièces ne doivent pas aller à cet endroit.\\n\\nCet avantage se combine avec d\'autres avantages de combo, le combo augmentera plus rapidement mais se réinitialisera plus souvent.","upgrades.compound_interest.help":"+1 combo par brique cassée, remise à zéro quand une pièce est perdu","upgrades.compound_interest.name":"Intérêts","upgrades.concave_puck.fullHelp":" Les balles démarrent verticalement en début de niveau, et rebondi sur le palet de manière plus verticale et inversée.","upgrades.concave_puck.help":"Aide à éviter les bords.","upgrades.concave_puck.name":"Palet concave","upgrades.corner_shot.fullHelp":"Aide à viser dans les coins","upgrades.corner_shot.help":"Laisse votre palet sortir de la zone encadrée","upgrades.corner_shot.name":"Tir en coin","upgrades.etherealcoins.fullHelp":"Il faudrait vous assurer que les pièces tomberont bien quand même à un moment","upgrades.etherealcoins.help":"Les pièces ne subissent plus la gravité","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.extra_levels.fullHelp":"La partie dure normalement 7 niveaux, après quoi le jeu est terminé et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette amélioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux où vous faites le plus de points, la différence peut donc être spectaculaire.","upgrades.extra_levels.help":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.name":"+1 niveau","upgrades.extra_life.fullHelp":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est terminée dès que vous la laissez tomber.\\nCette compétence ajoute une barre blanche en bas de l\'écran qui sauvera une balle une fois, et se brisera au cours du processus.\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilisées à chaque fois qu\'une balle est sur le point d\'être perdue. ","upgrades.extra_life.help":"La balle rebondit une fois avant d\'être perdue.","upgrades.extra_life.help_plural":"La balle rebondit {{lvl}} fois avant d\'être perdue.","upgrades.extra_life.name":"+1 vie","upgrades.forgiving.fullHelp":" La première brique ratée par niveau ne coûte rien, la suivante 10%, 20%, etc.","upgrades.forgiving.help":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.ghost_coins.fullHelp":"Ce n\'est pas une bug, c\'est une fonctionnalité","upgrades.ghost_coins.help":"Les pièces traversent les briques","upgrades.ghost_coins.name":"Pièces fantôme","upgrades.helium.fullHelp":"Les pièces attendront d\'être sous le palet pour tomber. ","upgrades.helium.help":"Les pièce flottent au lieu de tomber autours du palet","upgrades.helium.name":"Helium","upgrades.hot_start.fullHelp":"Au début de chaque niveau, votre combo commencera à +15 points, mais à chaque seconde, il sera diminué d\'un point. Cela signifie que les 15 premières secondes d\'un niveau produiront beaucoup plus de pièces que les suivantes.\\nVous devez vous assurer de terminer le niveau rapidement. L\'effet se cumule avec d\'autres avantages liés au combo, ce qui vous permet d\'augmenter le combo après les 15 secondes, mais il continuera à diminuer chaque seconde. Chaque fois que vous reprenez la compétence, l\'effet est encore plus prononcé.","upgrades.hot_start.help":"Combo à {{start}}, -{{lvl}} combo par seconde","upgrades.hot_start.name":"Démarrage à chaud","upgrades.implosions.fullHelp":"La force d’explosion est appliquée dans l’autre sens.","upgrades.implosions.help":"Les explosions aspirent les pièces au lieu de les faire exploser.","upgrades.implosions.name":"Implosions","upgrades.instant_upgrade.fullHelp":"Choisissez immédiatement deux améliorations, afin d\'en obtenir une gratuite et une autre pour rembourser celle utilisée pour obtenir cet avantage. Chaque fois que vous choisirez des améliorations dans le menu suivant, vous aurez moins de choix.","upgrades.instant_upgrade.help":"-1 choix jusqu\'à la fin de la course.","upgrades.instant_upgrade.name":"+2 améliorations maintenant","upgrades.left_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté gauche.\\n\\nDès que votre combo augmente, le côté gauche devient rouge pour vous rappeler que vous devez éviter de le frapper.\\n\\nL\'effet se cumule avec d\'autres avantages de combo, le combo augmente plus rapidement avec plus d\'améliorations, mais il se réinitialise également si l\'une ou l\'autre des conditions de réinitialisation est remplie. ","upgrades.left_is_lava.help":"Plus de pièces si vous ne touchez pas le côté gauche.","upgrades.left_is_lava.name":"Éviter le côté gauche","upgrades.metamorphosis.fullHelp":"Avec cette amélioration, les pièces seront de la couleur de la brique d\'où elles proviennent et coloreront la première brique qu\'elles toucheront. \\n\\nLes pièces apparaissent à la vitesse de la balle qui les a cassées, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\".","upgrades.metamorphosis.help":"Les pièces de monnaie tachent les briques qu\'elles touchent","upgrades.metamorphosis.name":"Métamorphose","upgrades.multiball.fullHelp":"Dès que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien sûr, de franchir le niveau plus rapidement.","upgrades.multiball.help":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.name":"+1 balle","upgrades.nbricks.fullHelp":"Si votre balle rebondis sans casser une brique, ça compte quand même comme une frappe.  Les briques détruites par des explosions ne comptent pas.","upgrades.nbricks.help":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon RAZ","upgrades.nbricks.name":"Prélèvement","upgrades.one_more_choice.fullHelp":"Chaque menu d\'amélioration comportera une option supplémentaire.  Cela n\'augmente pas le nombre d\'améliorations que vous pouvez choisir, mais vous aide à créer le profile idéal. ","upgrades.one_more_choice.help":"Les niveaux suivants offriront une option supplémentaire dans la liste d\'améliorations.","upgrades.one_more_choice.name":"+1 choix jusqu\'à la fin de la course","upgrades.passive_income.fullHelp":"Certaines amélioration font bouger les balles sans avoir besoin de mettre le palet en mouvement.","upgrades.passive_income.help":"+1 combo par brique cassée, RAZ quand le palet bouge","upgrades.passive_income.name":"Revenu passif","upgrades.picky_eater.fullHelp":"Chaque fois que vous cassez une brique de la même couleur que votre balle, votre combo augmente d\'une unité.\\n\\nS\'il s\'agit d\'une couleur différente, la balle adopte cette nouvelle couleur, mais la combinaison est réinitialisée.\\n\\nLes briques de la mauvaise couleur sont entourées en rouge.\\n\\nSi vous avez plus d\'une balle, elles changent toutes de couleur lorsque l\'une d\'entre elles touche une brique.","upgrades.picky_eater.help":"Plus de pièces si vous cassez les briques couleur par couleur.","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.pierce.fullHelp":"Normalement , la balle rebondit dès qu\'elle touche une brique. Avec cette caractéristique, elle continuera sa trajectoire jusqu\'à 3 briques cassées.\\n\\nAprès cela, elle rebondira sur la quatrième brique et vous devez toucher le palet pour remettre le compteur à zéro.","upgrades.pierce.help":"La balle perce {{count}} briques après chaque rebond  sur le palet","upgrades.pierce.name":"Balle perçante","upgrades.pierce_color.fullHelp":"Chaque fois qu\'une balle touche une brique de la même couleur, elle la traverse sans encombre.\\nLorsqu\'elle atteint une brique de couleur différente, elle la casse, prend sa couleur et rebondit. \\nSi vous avez des briques solides, le fonctionnement est un peu différent. ","upgrades.pierce_color.help":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.name":"Perceur de couleur","upgrades.puck_repulse_ball.fullHelp":"Lorsqu\'une balle s\'approche du palet, elle commence à ralentir, voire à rebondir sans toucher le palet. Beaucoup de choses sont liées à un passage par le palet dans le jeu, donc ça pourrait ouvrir des possibilités. ","upgrades.puck_repulse_ball.help":"Le palet repousse les balles","upgrades.puck_repulse_ball.help_plural":"La force de répulsion est plus grande","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.reach.fullHelp":"Essayez de bloquer la balle au dessus des briques pour plus de combo","upgrades.reach.help":"+{{lvl}} combo / brique, la plus basse d\'une colonne RAZ le combo","upgrades.reach.name":"Attaque aérienne","upgrades.respawn.fullHelp":"Après avoir cassé deux briques ou plus, lorsque la balle touche le palet, la première brique est remise en place, à condition que l\'espace soit libre et que la brique ne soit pas une bombe.\\n\\nDes effets de particules vous indiqueront où les briques apparaîtront. \\n\\nEn montant en niveau, vous pouvez faire réapparaître jusqu\'à 4 briques à la fois, mais il doit toujours y en avoir au moins une qui reste détruite.","upgrades.respawn.help":"Certaines briques réapparaissent après avoir été détruites.","upgrades.respawn.help_plural":"Plus de briques peuvent réapparaître","upgrades.respawn.name":"Réapparition ","upgrades.right_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité, ce qui vous permet d\'obtenir une pièce de plus à chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se réinitialise dès que votre balle touche le côté droit de la zone de jeu.\\n\\nDès que votre combo augmente, le côté droit devient rouge pour vous rappeler que vous devez éviter de le frapper.\\n\\nL\'effet se cumule avec d\'autres avantages de combo, le combo augmente plus rapidement avec plus d\'améliorations, mais il se réinitialise également si l\'une des conditions de réinitialisation est remplie.","upgrades.right_is_lava.help":"Plus de pièces si vous ne touchez pas le côté droit.","upgrades.right_is_lava.name":"Éviter le côté droit","upgrades.sacrifice.fullHelp":"Ceci n\'est pas toujours représentable visuellement","upgrades.sacrifice.help":"Perdre une vie double la valeur de toutes les pièces à l\'écran","upgrades.sacrifice.name":"Sacrifice","upgrades.sapper.fullHelp":"Au lieu de disparaître, la première brique cassée est remplacée par une bombe. Faire rebondir la balle sur le palet réarme l\'effet.   En montant en niveau, vous pourrez placer plus de bombes. N\'oubliez pas que les bombes ont un impact sur la vitesse des pièces à proximité. Trop d\'explosions peuvent rendre difficile la récupération des fruits de votre dur labeur.","upgrades.sapper.help":"La première brique cassée devient une bombe.","upgrades.sapper.help_plural":"Les premières briques {{lvl}} cassées deviennent des bombes.","upgrades.sapper.name":"Sapeur","upgrades.shocks.fullHelp":"Un peu comme jouer au billard avec des grenades","upgrades.shocks.help":"Collision explosive entre balles","upgrades.shocks.name":"Choc","upgrades.shunt.fullHelp":"Démarrage à chaud sera simplement ajouté au combo actuel","upgrades.shunt.help":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.name":"Shunt","upgrades.side_kick.fullHelp":"Lorsqu\'une brique est touchée, le jeu vérifie la vitesse de la balle et ajoute +1 au combo si sa vitesse horizontale est supérieure à sa vitesse verticale. Dans le cas contraire, le combo diminuera d\'un point. L\'emplacement de l\'impact sur la brique n\'a aucune importance.","upgrades.side_kick.help":"Les briques résistent parfois aux coups mais font tomber plus de pièces.","upgrades.side_kick.help_plural":"+{{lvl}} combo par brique cassé horizontalement, -{{lvl}} sinon","upgrades.side_kick.name":"Un coté positif","upgrades.skip_last.fullHelp":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut être difficile d\'obtenir les dernières briques.\\n\\nTerminer un niveau plus tôt permet d\'obtenir des choix supplémentaires lors de la mise à niveau. \\n\\nNe jamais manquer de briques est également très avantageux.\\n\\nDonc, si vous avez du mal à casser les dernières briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.skip_last.help":"La dernière brique s\'autodétruit.","upgrades.skip_last.help_plural":"Les {{lvl}} dernières briques restantes s\'autodétruiront","upgrades.skip_last.name":"Nettoyage facile","upgrades.slow_down.fullHelp":"La balle démarre relativement lentement, mais à chaque niveau de votre course, elle démarre un peu plus vite, et elle accélère également si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile à gérer. \\n\\nVous pouvez l\'obtenir au début de chaque course en activant le mode enfant dans le menu.","upgrades.slow_down.help":"La balle se déplace plus lentement","upgrades.slow_down.name":"Balle lente","upgrades.smaller_puck.fullHelp":"Le palet est donc plus petit, ce qui, en théorie, facilite certains tirs en coin, mais augmente surtout la difficulté.\\n\\nC\'est pourquoi vous bénéficiez également d\'un bonus de +5 pièces par brique pour toutes les briques que vous casserez après avoir choisi cette option.","upgrades.smaller_puck.help":"Donne aussi +5 combo","upgrades.smaller_puck.help_plural":"Palet encore plus petit et combinaison de base plus élevée","upgrades.smaller_puck.name":"Palet plus petit","upgrades.soft_reset.fullHelp":"Limite l\'impact d\'une réinitialisation du combo.","upgrades.soft_reset.help":"La remise à zéro du combo conserve {{percent}}% des points","upgrades.soft_reset.name":"Réinitialisation progressive","upgrades.streak_shots.fullHelp":"Chaque fois que vous cassez une brique, votre combo (nombre de pièces par brique) augmente d\'une unité. Cependant, dès que la balle touche votre palet,  le combo est remis à sa valeur par défaut, et vous n\'obtiendrez qu\'une seule pièce par brique.\\n\\nUne fois que votre combinaison dépasse la valeur de base, votre palet devient rouge pour vous rappeler que le fait de le toucher avec la balle détruira votre combinaison.\\n\\nCela peut se cumuler avec d\'autres avantages liés au combo, le combo augmentera plus rapidement mais se réinitialisera plus facilement car n\'importe laquelle des conditions suffit à le réinitialiser.","upgrades.streak_shots.help":"Plus de pièces si vous cassez plusieurs briques à la fois.","upgrades.streak_shots.name":"Séquence de destruction","upgrades.sturdy_bricks.fullHelp":"Avec le niveau 1 de cette compétence, la balle a 20 % de chances de rebondir sans casser les briques, mais génère 10% de pièces en plus lorsqu\'elle en casse une.\\n\\nCe +10% n\'est pas indiqué dans le nombre de combos. Au niveau 4, la balle a 80 % de chances de rebondir et rapporte 40 % de pièces en plus.","upgrades.sturdy_bricks.help":"Les briques résistent parfois aux coups mais font tomber plus de pièces.","upgrades.sturdy_bricks.help_plural":"Les briques résistent davantage et font tomber plus de pièces","upgrades.sturdy_bricks.name":"Briques solides","upgrades.telekinesis.fullHelp":"Dès que la balle touche votre palet, vous pouvez la diriger vers la gauche ou la droite en déplaçant votre palet.\\n\\nL\'effet s\'arrête lorsque la balle touche une brique et se réinitialise la prochaine fois qu\'elle touche le palet. Il ne fait rien non plus lorsque la balle descend après avoir rebondi au sommet.","upgrades.telekinesis.help":"Contrôler la trajectoire de la balle","upgrades.telekinesis.help_plural":"Effet plus fort sur la balle","upgrades.telekinesis.name":"Télékinésie","upgrades.top_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unité. Cependant, votre combo sera réinitialisé dès que votre balle atteindra le haut de l\'écran.\\n\\nLorsque votre combo est supérieur au minimum, une barre rouge apparaît en haut de l\'écran pour vous rappeler que vous devez éviter de la frapper.\\n\\nCet effet s\'ajoute aux autres avantages du combo.","upgrades.top_is_lava.help":"Plus de pièces si vous ne touchez pas le haut de la zone de jeu","upgrades.top_is_lava.name":"Icare ","upgrades.trampoline.fullHelp":"Une des rares améliorations à ne pas avoir de condition de remise à zéro","upgrades.trampoline.help":"+{{lvl}} combo à chaque rebond d\'une balle sur le palet,-{{lvl}} combo à chaque rebond au plafond","upgrades.trampoline.name":"Trampoline","upgrades.unbounded.fullHelp":"J\'espère que vous avez prévu un moyen de récupérer vos balles","upgrades.unbounded.help":"+1 combo par brique, plus de cotés","upgrades.unbounded.name":"Libérée, délivrée","upgrades.viscosity.fullHelp":"Les pièces accélèrent normalement avec la gravité et les explosions pour atteindre des vitesses assez élevées. \\n\\nCette compétence les ralentit constamment, comme si elles se trouvaient dans une sorte de liquide visqueux.\\n\\nCela permet de les attraper plus facilement et se combine bien avec les améliorations qui influencent le mouvement de la pièce.","upgrades.viscosity.help":"Chute plus lente des pièces","upgrades.viscosity.name":"Fluide visqueux ","upgrades.wind.fullHelp":"Le vent dépend de l\'endroit où se trouve le palet, s\'il est au centre de l\'écran, il ne se passe rien, s\'il est à gauche, il soufflera vers la gauche, s\'il est à droite de l\'écran, il soufflera vers la droite.\\n\\nLe vent affecte à la fois les balles et les pièces.","upgrades.wind.help":"La position du palet crée du vent","upgrades.wind.help_plural":"Force du vent plus importante","upgrades.wind.name":"Vive le vent","upgrades.yoyo.fullHelp":"C\'est l\'inverse de Télékinésie","upgrades.yoyo.help":"La balle descend vers le palet","upgrades.yoyo.name":"Yo-yo","upgrades.zen.fullHelp":"C\'est quand même un jeu non violent à la base","upgrades.zen.help":"+1 combo par brique, jusqu\'à ce qu\'il y ait une explosion","upgrades.zen.name":"Zen"}');var M={};M=JSON.parse('{"confirmRestart.no":"Cancel","confirmRestart.text":"You\'re about to start a new run, is that really what you wanted ?","confirmRestart.title":"Start a new run ?","confirmRestart.yes":"Restart game","gameOver.cumulative_total":"Your total cumulative score went from {{startTs}} to {{endTs}}.","gameOver.lost.summary":"You dropped the ball after catching {{score}} coins.","gameOver.lost.title":"Game Over","gameOver.next_unlock":"Score {{points}} more points to reach the next unlock","gameOver.restart":"Start a new run","gameOver.stats.balls_lost":"Balls lost","gameOver.stats.bricks_broken":"Bricks broken","gameOver.stats.bricks_per_minute":"Bricks broken per minute","gameOver.stats.catch_rate":"Catch rate","gameOver.stats.combo_avg":"Average combo","gameOver.stats.combo_max":"Max combo","gameOver.stats.duration_per_level":"Duration per level","gameOver.stats.hit_rate":"Hit rate","gameOver.stats.intro":"Find below your run statistics compared to  your {{count}} best runs.","gameOver.stats.level_reached":"Level reached","gameOver.stats.total_score":"Total score","gameOver.stats.upgrades_applied":"Upgrades applied","gameOver.test_run":"This test run and its score are not being recorded","gameOver.unlocked_count":"You unlocked {{count}} item(s) :","gameOver.upgrades_picked":"Upgrades active at the end of the run","gameOver.win.summary":"You cleared all levels for this run, catching {{score}} coins in total.","gameOver.win.title":"Run finished","level_up.after_buttons":"You just finished level {{level}}/{{max}} and picked those upgrades so far :","level_up.before_buttons":"You caught {{score}} coins {{catchGain}} out of {{levelSpawnedCoins}} in {{time}} seconds {{timeGain}}.\\n\\nYou missed {{levelMisses}} times {{mis t not work on some machines","main_menu.kid":"Kids mode","main_menu.kid_help":"Start future runs with \\"slower ball\\".","main_menu.language":"Language","main_menu.language_help":"Choose the game\'s language","main_menu.load_save_file":"Load save file","main_menu.load_save_file_help":"Select a save file on your device","main_menu.max_coins":" {{max}} coins on screen maximum","main_menu.max_coins_help":"Cosmetic only, no effect on score","main_menu.max_particles":" {{max}} particles maximum","main_menu.max_particles_help":"Limits the number of particles show on screen for visual effect. ","main_menu.mobile":"Mobile mode","main_menu.mobile_help":"Leaves space under the puck.","main_menu.pointer_lock":"Mouse pointer lock","main_menu.pointer_lock_help":"Locks and hides the mouse cursor.","main_menu.record":"Record gameplay videos","main_menu.record_download":"Download video ({{size}} MB)","main_menu.record_help":"Get a video of each level.","main_menu.reset":"Reset Game","main_menu.reset_cancel":"No","main_menu.reset_confirm":"Yes","main_menu.reset_help":"Erase high score and statistics","main_menu.reset_instruction":"You will loose all progress you made in the game, are you sure ?","main_menu.resume":"Resume","main_menu.resume_help":"Return to your run","main_menu.save_file_error":"Error loading save file","main_menu.save_file_loaded":"Save file loaded","main_menu.save_file_loaded_help":"The app will now reload to apply your save","main_menu.save_file_loaded_ok":"Ok","main_menu.settings_help":"Tailor the game play to your needs and taste","main_menu.settings_title":"Settings","main_menu.show_fps":"FPS counter","main_menu.show_fps_help":"Monitor the app\'s performance","main_menu.sounds":"Game sounds","main_menu.sounds_help":"Can slow down some phones.","main_menu.title":"Breakout 71","main_menu.unlocks":"Starting perk","main_menu.unlocks_help":"Try perks and levels you unlocked","play.close_modale_window_tooltip":"close ","play.current_lvl":"L{{level}}/{{max}}","play.menu_label":"menu","play.missed_ball":"miss","play.mobile_press_to_play":"Press and hold here to play","sandbox.help":"Test any perk combination","sandbox.instructions":"Select perks below and press \\"start run\\" to try them out in a test run. Scores and stats are not recorded.","sandbox.start":"Start test run","sandbox.title":"Sandbox mode","sandbox.unlocks_at":"Unlocks at total score {{score}}","score_panel.restart":"Restart","score_panel.restart_help":"Start a brand new run","score_panel.resume":"Resume","score_panel.resume_help":"Return to your run","score_panel.test_run":"This is a test run, score is not recorded permanently","score_panel.title":"{{score}} points at level {{level}}/{{max}} ","score_panel.upcoming_levels":"Upcoming levels :","score_panel.upgrades_picked":"Upgrades picked so far : ","unlocks.greyed_out_help":"The greyed out ones can be unlocked by increasing your total score. The total score increases every time you score in game.","unlocks.intro":"Your total score is {{ts}}. Below are all the upgrades and levels the games has to offer.","unlocks.level_description":"A {{size}}x{{size}} level with {{bricks}} bricks","unlocks.title":"You unlocked {{percentUnlock}}% of the game.","unlocks.unlocks_at":"Unlocks at total score {{threshold}}.","upgrades.asceticism.fullHelp":"You\'ll need to store the coins somewhere while your combo climbs. ","upgrades.asceticism.help":"+1 combo / brick, com resets on coin catch","upgrades.asceticism.name":"Asceticism","upgrades.ball_attract_ball.fullHelp":"Balls that are more than half a screen width away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.","upgrades.ball_attract_ball.help":"Balls attract balls","upgrades.ball_attract_ball.help_plural":"Stronger attraction force","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attracts_coins.fullHelp":"Don\'t ask me how that works","upgrades.ball_attracts_coins.help":"Balls attract coins","upgrades.ball_attracts_coins.name":"Fortunate ball","upgrades.ball_repulse_ball.fullHelp":"Balls that are less than half a screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.","upgrades.ball_repulse_ball.help":"Balls repulse balls","upgrades.ball_repulse_ball.help_plural":"Stronger repulsion force","upgrades.ball_repulse_ball.name":"Personal space","upgrades.base_combo.fullHelp":"Your combo (number of coins per bricks) normally starts at 1 at the beginning of the level, and resets to one when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you\'ll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.","upgrades.base_combo.help":"Combo starts at {{coins}}.","upgrades.base_combo.name":"+3 base combo","upgrades.bigger_explosions.fullHelp":"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)","upgrades.bigger_explosions.help":"Bigger explosions","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_puck.fullHelp":"A bigger puck makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball\'s angle only depends on where it hits the puck). \\n        However, a large puck is harder to use around the sides of the level, and will make it sometimes unavoidable to miss (not hit anything) which comes with downsides. ","upgrades.bigger_puck.help":"Easily catch more coins.","upgrades.bigger_puck.name":"Bigger puck","upgrades.clairvoyant.fullHelp":"Helps you pick the right upgrades and understand what\'s going on with sturdy bricks. ","upgrades.clairvoyant.help":"See upcoming levels list and bricks HP","upgrades.clairvoyant.name":"Clairvoyant","upgrades.coin_magnet.fullHelp":"Directs the coins to the puck. The effect is stronger if the coin is close to it already. Catching 90% or 100% of coins bring special bonuses in the game. \\n\\nAnother way to catch more coins is to hit bricks from the bottom. The ball\'s speed and direction impacts the spawned coin\'s velocity. ","upgrades.coin_magnet.help":"Puck attracts coins","upgrades.coin_magnet.help_plural":"Stronger effect on the coins","upgrades.coin_magnet.name":"Coins magnet","upgrades.compound_interest.fullHelp":"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\n\\nBe sure however to catch every one of those coins with your puck, as any lost coin will reset your combo. \\n\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.\\n\\nThis perk combines with other combo perks, the combo will rise faster but reset more easily.","upgrades.compound_interest.help":"+1 combo per brick broken, resets on coin lost","upgrades.compound_interest.name":"Compound interest","upgrades.concave_puck.fullHelp":"Balls starts the level going straight up, and bounces with less angle.","upgrades.concave_puck.help":" Helps with aiming straight up","upgrades.concave_puck.name":"Concave puck","upgrades.corner_shot.fullHelp":"Helps with aiming in the corners","upgrades.corner_shot.help":"Lets your puck overlap with the borders of the screen","upgrades.corner_shot.name":"Corner shot","upgrades.etherealcoins.fullHelp":"You\'ll have to make sure that the coins fall down somehow","upgrades.etherealcoins.help":"Coins are no  longer affected by gravity","upgrades.etherealcoins.name":"Coins, in Space","upgrades.extra_levels.fullHelp":"The default run can last a max of 7 levels, after which the game is over and whatever score you reached is your run score. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.","upgrades.extra_levels.help":"Play {{count}} levels instead of 7","upgrades.extra_levels.name":"+1 level","upgrades.extra_life.fullHelp":"Normally, you have one ball per run, and the run is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou\'ll loose one level of that perk every time a ball bounces at the bottom of the screen.","upgrades.extra_life.help":"The ball will bounce once on the bottom line before being lost.","upgrades.extra_life.help_plural":"The ball will bounce on the bottom {{lvl}} times before being lost.","upgrades.extra_life.name":"+1 life","upgrades.forgiving.fullHelp":"The first miss per level is free, then 10% of the combo, then 20% .. ","upgrades.forgiving.help":"Missing breaks reduces combo progressively instead of all at once.","upgrades.forgiving.name":"Forgiving","upgrades.ghost_coins.fullHelp":"It\'s not a bug, it\'s a feature ! ","upgrades.ghost_coins.help":"Coins pass through bricks","upgrades.ghost_coins.name":"Ghost coins","upgrades.helium.fullHelp":"This affects the coins  and will let the float up until you are ready to pick them up.","upgrades.helium.help":"Gravity reversed left and right of puck","upgrades.helium.name":"Helium","upgrades.hot_start.fullHelp":"At the start of every level, your combo will start at +15 points, but then every second it will be decreased by one.\\n\\nThis means the first 15 seconds in a level will spawn many more coins than the following ones, and you should make sure that you clear the level quickly. \\n\\nThe effect stacks with other combo related perks, so you might be able to raise the combo after the 15s timeout, but it will keep ticking down. \\n\\nEvery time you take the perk again, the effect will be more dramatic.","upgrades.hot_start.help":"Start at combo {{start}}, -{{lvl}} combo per second","upgrades.hot_start.name":"Hot start","upgrades.implosions.fullHelp":"The explosion force is applied the other way. ","upgrades.implosions.help":"Explosions suck coins in instead of blowing them out","upgrades.implosions.name":"Implosions","upgrades.instant_upgrade.fullHelp":"Immediately pick two upgrades, so that you get one free one and one to repay the one used to get this perk. Every further menu to pick upgrades will have fewer options to choose from.","upgrades.instant_upgrade.help":"-1 choice until run end.","upgrades.instant_upgrade.name":"+2 upgrades now","upgrades.left_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n\\nThe effect stacks with other combo perks, combo rises faster with more upgrades but will also reset if any of the reset conditions are met.","upgrades.left_is_lava.help":"+1 combo per brick broken, resets on left side hit","upgrades.left_is_lava.name":"Avoid left side","upgrades.metamorphosis.fullHelp":"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. Coins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\"paint\\".","upgrades.metamorphosis.help":"Coins stain the bricks they touch","upgrades.metamorphosis.name":"Metamorphosis","upgrades.multiball.fullHelp":"As soon as you drop the ball in Breakout 71, you loose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.","upgrades.multiball.help":"Start every levels with {{count}} balls.","upgrades.multiball.name":"+1 ball","upgrades.nbricks.fullHelp":"You don\'t necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don\'t count","upgrades.nbricks.help":"Hit exactly {{lvl}} bricks per puck bounce for +{{lvl}} combo, otherwise it resets","upgrades.nbricks.name":"Strict sample size","upgrades.one_more_choice.fullHelp":"Every upgrade menu will have one more option.  Doesn\'t increase the number of upgrades you can pick.","upgrades.one_more_choice.help":"Further level ups will offer one more option in the list","upgrades.one_more_choice.name":"+1 choice until run end","upgrades.passive_income.fullHelp":"Some perks can help the balls do what you want without needing to do anything.","upgrades.passive_income.help":"+1 combo / brick, combo resets when puck moves","upgrades.passive_income.name":"Passive income","upgrades.picky_eater.fullHelp":"Whenever you break a brick the same color as your ball, your combo increases by one. \\nIf it\'s a different color, the ball takes that new color, but the combo resets.\\nThe bricks with the right color will get a white border. \\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red halo. \\nIf you have more than one ball, they all change color whenever one of them hits a brick.","upgrades.picky_eater.help":"+1 combo per brick broken, resets on ball color change","upgrades.picky_eater.name":"Picky eater","upgrades.pierce.fullHelp":"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\nAfter that, it will bounce on the 4th brick, and you\'ll need to touch the puck to reset the counter.","upgrades.pierce.help":"Ball pierces {{count}} bricks after a puck bounce","upgrades.pierce.name":"Piercing","upgrades.pierce_color.fullHelp":"Whenever a ball hits a brick of the same color, it will just go through unimpeded. \\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.","upgrades.pierce_color.help":"+{{lvl}} damage to bricks of the ball\'s color","upgrades.pierce_color.name":"Color pierce","upgrades.puck_repulse_ball.fullHelp":"When a ball gets close to the puck, it will start slowing down, and even potentially bouncing without touching the puck.","upgrades.puck_repulse_ball.help":"Puck repulses balls","upgrades.puck_repulse_ball.help_plural":"Stronger repulsion force","upgrades.puck_repulse_ball.name":"Soft landing","upgrades.reach.fullHelp":"Try to lock the ball up to earn more combo","upgrades.reach.help":"+{{lvl}} combo / bricks , lowest brick of a pile resets combo","upgrades.reach.name":"Top down","upgrades.respawn.fullHelp":"After breaking two or more bricks, when the ball hits the puck, the first brick will be put back in place, provided that space is free and the brick wasn\'t a bomb.\\n\\nSome particle effect will let you know where bricks will appear. Leveling this up lets you re-spawn up to 4 bricks at a time, but there should always be at least one destroyed.","upgrades.respawn.help":"The first brick hit of two+ will re-spawn","upgrades.respawn.help_plural":"More bricks can re-spawn","upgrades.respawn.name":"Re-spawn","upgrades.right_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the right side . \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them\\n\\nThe effect stacks with other combo perks, combo rises faster with more upgrades but will also reset if any\\nof the reset conditions are met.","upgrades.right_is_lava.help":"+1 combo per brick broken, resets on right side hit","upgrades.right_is_lava.name":"Avoid right side","upgrades.sacrifice.fullHelp":"This is made visual when possible, otherwise it\'s just going to update their score value","upgrades.sacrifice.help":"Loosing a life doubles the value of each coin on screen","upgrades.sacrifice.name":"Sacrifice","upgrades.sapper.fullHelp":"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. \\n\\nBouncing the ball on the puck re-arms the effect. \\n\\nLeveling-up this perk will allow you to place more bombs.\\n\\nRemember that bombs impact the velocity of nearby coins, so too many explosions could make it hard to catch the fruits of your hard work.","upgrades.sapper.help":"The first brick broken becomes a bomb.","upgrades.sapper.help_plural":"The first {{lvl}} bricks broken become bombs.","upgrades.sapper.name":"Sapper","upgrades.shocks.fullHelp":"That would spice up the game of pool","upgrades.shocks.help":"Explosive balls collisions","upgrades.shocks.name":"Shocks","upgrades.shunt.fullHelp":"If you also have hot start, the hot start is just added to the current combo","upgrades.shunt.help":"Keep {{percent}}% of your combo between levels","upgrades.shunt.name":"Shunt","upgrades.side_kick.fullHelp":"When a brick get hit, the game checks the ball\'s velocity, and add +1 to the combo if its horizontal velocity is higher than its vertical velocity. The combo will decrease by one otherwise. The location of the impact on the brick is irrelevant. ","upgrades.side_kick.help":"Bricks sometimes resist hits but drop more coins.","upgrades.side_kick.help_plural":"+{{lvl}} combo per brick broken horizontally, -{{lvl}} otherwise","upgrades.side_kick.name":"Side kick","upgrades.skip_last.fullHelp":"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\n\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help.","upgrades.skip_last.help":"The last brick will explode.","upgrades.skip_last.help_plural":"The last {{lvl}}  bricks will explode.","upgrades.skip_last.name":"Easy Cleanup","upgrades.slow_down.fullHelp":"The ball starts relatively slow, but every level of your run it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.","upgrades.slow_down.help":"Ball moves more slowly","upgrades.slow_down.name":"Slower ball","upgrades.smaller_puck.fullHelp":"This makes the puck smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat\'s why you also get a nice bonus of +5 coins per brick for all bricks you\'ll break after picking this. ","upgrades.smaller_puck.help":"Also gives +5 base combo","upgrades.smaller_puck.help_plural":"Even smaller puck and higher base combo","upgrades.smaller_puck.name":"Smaller puck","upgrades.soft_reset.fullHelp":"Limit the impact of a combo reset.","upgrades.soft_reset.help":"Combo resets keeps {{percent}}%","upgrades.soft_reset.name":"Soft reset","upgrades.streak_shots.fullHelp":"Every time you break a brick, your combo (number of coins per bricks) increases by one. \\n\\nHowever, as soon as the ball touches your puck, the combo is reset to its default value, and you\'ll just get one coin per brick.\\n\\nOnce your combo rises above the base value, your puck will become red to remind you that it will destroy your combo to touch it with the ball.\\n\\nThis can stack with other combo related perks, the combo will rise faster but reset more easily as any of the conditions is enough to reset it. ","upgrades.streak_shots.help":"More coins if you break many bricks at once.","upgrades.streak_shots.name":"Single puck hit streak","upgrades.sturdy_bricks.fullHelp":"With level one of this perk, the ball has a 20% chance to bounce harmlessly on bricks, \\n        but generates 10% more coins when it does break one. \\n        This +10% is not shown in the combo number. At level 4 the ball has 80% chance of bouncing and brings 40% more coins.","upgrades.sturdy_bricks.help":"Bricks sometimes resist hits but drop more coins.","upgrades.sturdy_bricks.help_plural":"Bricks resist more and drop more coins","upgrades.sturdy_bricks.name":"Sturdy bricks","upgrades.telekinesis.fullHelp":"Right after the ball hits your puck, you\'ll be able to direct it left and right by moving your puck. \\n\\n\\nThe effect stops when the ball hits a brick and resets the next time it touches the puck. It also does nothing when the ball is going downward after bouncing at the top.","upgrades.telekinesis.help":"Puck controls the ball\'s trajectory","upgrades.telekinesis.help_plural":"Stronger effect on the ball","upgrades.telekinesis.name":"Telekinesis","upgrades.top_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. \\n\\nThe effect stacks with other combo perks.","upgrades.top_is_lava.help":"More coins if you don\'t touch the top.","upgrades.top_is_lava.name":"Sky is the limit","upgrades.trampoline.fullHelp":"One of the rare  combo upgrades that don\'t add a reset condition","upgrades.trampoline.help":"+{{lvl}} combo per puck bounce,-{{lvl}} combo per ceiling bounce","upgrades.trampoline.name":"Trampoline","upgrades.unbounded.fullHelp":"I hope you\'ve found a way to keep your ball on screen","upgrades.unbounded.help":"+1 combo per brick, no more sides","upgrades.unbounded.name":"Unbounded","upgrades.viscosity.fullHelp":"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin\'s movement.","upgrades.viscosity.help":"Slower coin fall","upgrades.viscosity.name":"Viscosity","upgrades.wind.fullHelp":"The wind depends on where your puck is, if it\'s in the center of the screen nothing happens, if it\'s on the left it will blow left-wise, if it\'s on the right of the screen then it will blow right-wise. \\n\\nThe wind affects both the balls and coins.","upgrades.wind.help":"Puck position creates wind","upgrades.wind.help_plural":"Stronger wind force","upgrades.wind.name":"Wind","upgrades.yoyo.fullHelp":"It\'s the opposite of telekinesis","upgrades.yoyo.help":"Ball falls toward puck","upgrades.yoyo.name":"Yo-yo","upgrades.zen.fullHelp":"After all, this is a non-violent game","upgrades.zen.help":"+1 combo per bricks, reset when there\'s an explosion","upgrades.zen.name":"Zen"}');var G={};function H(e,_){if(void 0===G[e])try{var t,r=localStorage.getItem(e);r&&(G[e]=JSON.parse(r))}catch(e){console.warn(e)}return null!==(t=G[e])&&void 0!==t?t:_}function R(e,_){G[e]=_;try{localStorage.setItem(e,JSON.stringify(_))}catch(e){console.warn(e)}}function B(){return H("breakout_71_total_score",0)}function q(){return 200*Math.pow(2,H("max_coins",1))}function L(){return 200*Math.pow(2,H("max_particles",1))}var O={fr:_(z),en:_(M)};function P(){var e,_;return H("lang",(e=f(navigator.languages).concat([navigator.language,"en"]).filter(function(e){return e}).map(function(e){return e.slice(0,2).toLowerCase()}),_=Object.keys(O),e.find(function(e){return _.includes(e)})||"en"))}function C(e){var _,t=arguments.length>1&&void 0!==arguments[1]?arguments[1]:{},r=(null===(_=O[P()])||void 0===_?void 0:_[e])||O.en[e];for(var a in t)r=r.split("{{"+a+"}}").join("".concat(t[a]));return r}var T=[{requires:"",rejects:"",threshol
