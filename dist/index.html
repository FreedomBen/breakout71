#score {

  right: 0;
}

#score.active .score {

#score span {
  color: #fffc;
}

#score span.great {
  color: #90ee90;
}

#score span.good, #score span.bad {
  color: #fff;
}

#menu {

body.has-alert-open {

}

}

#popup {

}

#popup > div > * {

#popup > div > section {

}

#popup > div > section button {

  color: #fff;
  cursor: pointer;

  border-color: #f1d33b;

}

}

#popup > div > section button > div {
  flex-grow: 1;
}

}

#popup > div > section button.grey-out-unless-hovered:not(:hover) {

}

#popup > div > section button.grey-out-unless-hovered:not(:hover) img {
  filter: saturate(0);
}

#popup.actionsAsGrid > div {

  background: #1c1c2f;

.progress > span {
  z-index: 2;

@keyframes grow {

  }

#level-recording-container {

  max-width: 400px;
  margin: 40px;

}

  position: relative;

}

  transform-origin: 0 100%;

}

h2.histogram-title {
  color: #3b3f75;
  font-size: 18px;
}

h2.histogram-title strong {
  color: #4049ca;
}

.red-icon {
  background: red;

.com/app/262470/Rollers_of_the_Realm/\\n- FTL\xa0: https://www.gog.com/en/game/faster_than_light\\n- Nova Drift\xa0: https://www.gog.com/en/game/nova_drift\\n- Noita\xa0: https://www.gog.com/en/game/noita\\n- Enter the Gungeon\xa0: https://www.gog.com/en/game/enter_the_gungeon\\n- Zero Sivert\xa0: https://store.steampowered.com/app/1782120/ZERO_Sievert/\\n- Factorio\xa0: https://www.factorio.com/\\n- Nuclear throne\xa0: https://store.steampowered.com/app/242680/Nuclear_Throne/ (ne l\'achetez pas sur GOG, c\'est obsol\xe8te)\\n- Brigador\xa0: https://www.gog.com/en/game/brigador\\n- Teleglitch https://www.gog.com/en/game/teleglitch_die_more_edition\\n- Broforce : https://www.gog.com/en/game/broforce\\n- Spelunky : https://www.gog.com/en/game/spelunky","main_menu.donate":"Vous avez jou\xe9 {{hours}} heures","main_menu.donate_help":"Pourriez-vous donner {{suggestion}} \u20AC\xa0? Vous pouvez masquer ce rappel dans les param\xe8tres.","main_menu.donation_reminder":"Me rappeler de donner","main_menu.donation_reminder_help":"Afficher le temps de jeu et un lien pour donner dans le menu principal","main_menu.download_save_file":"Sauvegarder mes progr\xe8s","main_menu.download_save_file_help":"Obtenir un fichier de sauvegarde","main_menu.footer_html":" <p>  \\n<span>Programm\xe9 en France par <a href=\\"https://lecaro.me\\">Renan LE CARO</a>.</span>\\n<a href=\\"https://paypal.me/renanlecaro\\" target=\\"_blank\\">Donner</a>\\n<a href=\\"https://discord.gg/bbcQw4x5zA\\" target=\\"_blank\\">Discord</a>\\n<a href=\\"https://f-droid.org/en/packages/me.lecaro.breakout/\\" target=\\"_blank\\">F-Droid</a>\\n<a href=\\"https://play.google.com/store/apps/details?id=me.lecaro.breakout\\" target=\\"_blank\\">Google Play</a>\\n<a href=\\"https://renanlecaro.itch.io/breakout71\\" target=\\"_blank\\">itch.io</a>\\n<a href=\\"https://gitlab.com/lecarore/breakout71\\" target=\\"_blank\\">Gitlab</a>\\n<a href=\\"https://breakout.lecaro.me/\\" target=\\"_blank\\">Version web</a>\\n<a href=\\"https://news.ycombinator.com/item?id=43183131\\" target=\\"_blank\\">HackerNews</a>\\n<a href=\\"https://breakout.lecaro.me/privacy.html\\" target=\\"_blank\\">Politique de confidentialit\xe9</a> \\n<span>v.{{appVersion}}</span>\\n</p>","main_menu.fullscreen":"Plein \xe9cran","main_menu.fullscreen_help":"Le jeu essaiera de passer en plein \xe9cran quand vous le d\xe9marrez","main_menu.help_content":"# Objectif\\n\\nLe but est d\'attraper un maximum de pi\xe8ces au cours des 7 niveaux.\\nLes pi\xe8ces apparaissent lorsque vous cassez des briques.\\nElles volent, rebondissent et roulent, et vous devez les attraper avec votre palet pour augmenter votre score.\\nVotre score est affich\xe9 en haut \xe0 droite de l\'\xe9cran.\\nVous devez supprimer toutes les briques pour passer au niveau suivant.\\nSi vous laissez tomber la balle, la partie est termin\xe9e, sauf si vous aviez l\'am\xe9lioration \xab\xa0Vie suppl\xe9mentaire\xa0\xbb.\\n\\n# Am\xe9liorations\\n\\nApr\xe8s avoir termin\xe9 un niveau, vous pourrez choisir des am\xe9liorations parmi une petite s\xe9lection qui vous sera pr\xe9sent\xe9e.\\nL\'am\xe9lioration choisie sera valable jusqu\'\xe0 la fin de la partie. Vous aurez plus de choix d\'am\xe9liorations, et m\xeame la possibilit\xe9 d\'en choisir plusieurs \xe0 la fin du niveau si vous jouez bien\xa0: attrapez toutes les pi\xe8ces, terminez le niveau rapidement et ne ratez jamais votre cible.\\nVous obtenez \xe9galement une am\xe9lioration al\xe9atoire gratuite au d\xe9but de chaque partie. Vous pouvez voir vos am\xe9liorations (et quelques d\xe9tails suppl\xe9mentaires) en cliquant sur votre score en haut \xe0 droite de l\'\xe9cran.\\n\\nLes am\xe9liorations s\'appliquent \xe0 l\'ensemble de la partie et peuvent \xeatre synergiques. Par exemple, si vous combinez \xab\xa0sapeur\xa0\xbb et \xab\xa0perforant\xa0\xbb, la premi\xe8re brique que vous touchez apr\xe8s un rebond de palet se transformera imm\xe9diatement en brique explosive et explosera avec la m\xeame balle, vous donnant ainsi une balle explosive.\\n\\nCertaines am\xe9liorations facilitent la vis\xe9e, comme les \xab\xa0balles de contr\xf4le de palet\xa0\xbb. Certaines am\xe9liorations peuvent \xeatre s\xe9lectionn\xe9es plusieurs fois pour augmenter leur effet. Par exemple, \xab\xa0+1 balle niveau 2\xa0\xbb ajoute une troisi\xe8me balle.\\n\\nLors de votre premi\xe8re partie, seules quelques am\xe9liorations sont disponibles\xa0; vous d\xe9bloquez les autres en jouant et en marquant des points. Un m\xe9canisme similaire s\'applique au d\xe9blocage des niveaux. \xc0 la fin d\'une partie, les \xe9l\xe9ments que vous venez de d\xe9bloquer seront affich\xe9s et vous pourrez consulter leur contenu complet dans le menu / D\xe9blocages.\\n\\nDe nombreuses am\xe9liorations influencent votre combo.\\n\\n# Combo\\n\\nVotre \xab\xa0combo\xa0\xbb correspond au nombre de pi\xe8ces g\xe9n\xe9r\xe9es lorsqu\'une brique se brise. L\'affichage est sur votre palet. Par exemple, x4 signifie que chaque brique rapporte 4 pi\xe8ces. Le jeu se r\xe9initialise si vous ratez votre tentative.\\n\\n# Configuration requise\\n\\nBreakout 71 peut fonctionner hors ligne (ajoutez-le \xe0 l\'\xe9cran d\'accueil) et fonctionne bien m\xeame sur les appareils bas de gamme.\\nL\'application est tr\xe8s simple et occupe peu d\'espace de stockage (environ 0,1 Mo).\\nSi l\'application est instable, activez le \xab\xa0mode rapide\xa0\xbb dans les param\xe8tres pour afficher une vue simplifi\xe9e et plus rapide. Il existe \xe9galement un mode facile pour les enfants (balle plus lente).\\n\\n# Boucle\\n\\nUne fois toutes les am\xe9liorations d\xe9bloqu\xe9es, vous aurez la possibilit\xe9 de jouer une partie plus longue.\\nDans ce mode, vous pouvez boucler le jeu jusqu\'\xe0 7 fois apr\xe8s votre premi\xe8re tentative.\\n\\nChaque boucle est plus courte et vous ne pouvez pas utiliser les niveaux d\'avantages utilis\xe9s dans les niveaux pr\xe9c\xe9dents, \xe0 l\'exception d\'un avantage que vous pouvez am\xe9liorer continuellement. Si vous \xe9puisez compl\xe8tement un avantage, il ne sera plus propos\xe9 dans les boucles suivantes. L\'avantage que vous am\xe9liorez gagne instantan\xe9ment +1 niveau et +2 niveaux max.\\n\\nChaque boucle est plus courte d\'un niveau. La balle d\xe9marre l\xe9g\xe8rement plus vite. La partie se termine lorsque vous perdez le ballon ou terminez la 7e boucle.\\n\\n# Vis\xe9e\\n\\nSeule la position du palet frapp\xe9 d\xe9termine la trajectoire du ballon. Si le ballon touche le palet en plein centre, il rebondira verticalement, tandis que si vous frappez davantage d\'un c\xf4t\xe9, l\'angle sera plus grand.\\nLa vitesse du palet et l\'angle d\'arriv\xe9e n\'ont aucun impact sur la direction du ballon apr\xe8s le rebond.\\n\\nUn palet plus petit facilitera peut-\xeatre la vis\xe9e pr\xe8s des coins, mais rendra aussi beaucoup plus difficile la capture de pi\xe8ces.\\nLes options \xab\xa0Vent\xa0\xbb et \xab\xa0T\xe9l\xe9kinesis\xa0\xbb peuvent vous aider \xe0 viser m\xeame apr\xe8s un rebond dans la mauvaise direction.\\n\xab\xa0Balle plus lente\xa0\xbb vous donne un peu plus de temps pour viser, ce qui est particuli\xe8rement utile dans les niveaux avanc\xe9s o\xf9 la balle va plus vite. La balle acc\xe9l\xe8re \xe9galement \xe0 mesure que vous progressez dans chaque niveau.","main_menu.help_help":"D\xe9couvrez le jeu en d\xe9tail","main_menu.help_title":"Aide et cr\xe9dits","main_menu.help_upgrades":"<h2>Am\xe9liorations</h2>","main_menu.high_score":"High score : {{score}}","main_menu.kid":"Mode enfants","main_menu.kid_help":"Balle plus lente","main_menu.language":"Langue","main_menu.language_help":"Changer la langue d\'affichage","main_menu.load_save_file":"Charger une sauvegarde","main_menu.load_save_file_help":"Depuis un fichier ","main_menu.loop_run":"Nouvelle partie longue ","main_menu.loop_run_help":"Permet de boucler le jeu jusqu\'\xe0 7 fois","main_menu.max_coins":"{{max}} pi\xe8ces affich\xe9es maximum","main_menu.max_coins_help":"Visuel uniquement, pas d\'impact sur le score","main_menu.max_particles":" {{max}} particules maximum","main_menu.max_particles_help":"Limite le nombre de particules affich\xe9es \xe0 l\'\xe9cran pour les effets visuels","main_menu.mobile":"Mode mobile","main_menu.mobile_help":"Laisse un espace sous le palet.","main_menu.normal":"Nouvelle partie rapide","main_menu.normal_help":"Avec un avantage de d\xe9part al\xe9atoire","main_menu.pointer_lock":"Verrouillage du pointeur","main_menu.pointer_lock_help":"Cache aussi le curseur de la souris.","main_menu.record":"Enregistrer des vid\xe9os de jeu","main_menu.record_download":"T\xe9l\xe9charger la vid\xe9o ({{size}} MB)","main_menu.record_help":"Obtenez une vid\xe9o de chaque niveau.","main_menu.red_miss":"Balles rat\xe9es","main_menu.red_miss_help":"Afficher des particules rouges autours des balles qui redescendent sans avoir touch\xe9 une brique.","main_menu.reset":"R\xe9initialiser le jeu","main_menu.reset_cancel":"Non","main_menu.reset_confirm":"Oui","main_menu.reset_help":"Effacer les scores, statistiques et temps de jeu","main_menu.reset_instruction":"Vous perdrez tous les progr\xe8s que vous avez faits dans le jeu, \xeates-vous s\xfbr ?","main_menu.save_file_error":"Erreur lors du chargement du fichier de sauvegarde","main_menu.save_file_loaded":"Sauvegarde charg\xe9e","main_menu.save_file_loaded_help":"L\'appli va red\xe9marrer","main_menu.save_file_loaded_ok":"Ok","main_menu.settings_help":"Adaptez le jeu \xe0 vos besoins","main_menu.settings_title":"Param\xe8tre","main_menu.show_fps":"Compteur de FPS","main_menu.show_fps_help":"Surveiller la performance du jeu","main_menu.show_stats":"Statistiques en temps r\xe9el","main_menu.show_stats_help":"Pi\xe8ces, temps, rebonds, rat\xe9s","main_menu.sounds":"Sons du jeu","main_menu.sounds_help":"Ralentis certains t\xe9l\xe9phones.","main_menu.starting_perks":"Avantages de d\xe9part","main_menu.starting_perks_checked":"Lorsque vous d\xe9marrez une nouvelle partie, l\'un de ces avantages vous sera attribu\xe9. Vous pouvez cliquer sur la liste pour exclure certains avantages de la s\xe9lection.","main_menu.starting_perks_help":"Choisissez les avantages de d\xe9part","main_menu.starting_perks_unchecked":"Les avantages ci-dessous ne sont pas propos\xe9s comme avantages de d\xe9part, mais vous pouvez cliquer pour les ajouter aux avantages de d\xe9part possibles.","main_menu.title":"Breakout 71","main_menu.unlocks":"Contenu d\xe9bloqu\xe9","main_menu.unlocks_help":"Essayez les \xe9l\xe9ments d\xe9bloqu\xe9s","play.close_modale_window_tooltip":"Fermer","play.current_lvl":"Niveau {{level}}/{{max}}","play.current_lvl_loop":"Niveau {{level}}/{{max}} boucle {{loop}}","play.menu_label":"Menu","play.menu_tooltip":"Ouvrir le menu principal","play.missed_ball":"rat\xe9","play.mobile_press_to_play":"Gardez le doigt ici pour jouer","play.score_tooltip":"Consultez votre score, am\xe9liorations et plus encore","play.stats.coins_catch_rate":"Taux de capture des pi\xe8ces ","play.stats.levelMisses":"Tirs rat\xe9s, ou vous n\'avez touch\xe9 aucune brique","play.stats.levelTime":"Dur\xe9e du niveau","play.stats.levelWallBounces":"Rebonds sur les murs","score_panel.rerolls_count":"Vous avez accumul\xe9 {{rerolls}} rerolls","score_panel.title":"{{score}} points au niveau {{level}}/{{max}} ","score_panel.title_looped":"{{score}} points au niveau {{level}}/{{max}} ","score_panel.upcoming_levels":"Niveaux de la parties : ","score_panel.upgrades_picked":"Am\xe9liorations choisies jusqu\'\xe0 pr\xe9sent :","unlocks.greyed_out_help":"Les \xe9l\xe9ments gris\xe9es peuvent \xeatre d\xe9bloqu\xe9es en augmentant votre score total. Le score total augmente \xe0 chaque fois que vous marquez des points dans le jeu.","unlocks.intro":"Votre score total est de {{ts}}. Vous trouverez ci-dessous toutes les am\xe9liorations et tous les niveaux que le jeu peut offrir. Cliquez sur l\'un d\'entre eux pour commencer une nouvelle partie rapide. ","unlocks.level":"Voici tous les niveaux du jeu. Cliquez sur un niveau pour commencer une nouvelle partie avec ce niveau de d\xe9part. ","unlocks.level_description":"Un niveau {{size}}x{{size}} avec {{bricks}} briques, {{colors}} couleurs et {{bombs}} bombes.","unlocks.title":"Vous avez d\xe9bloqu\xe9 {{percentUnlock}}% du jeu.","upgrades.addiction.fullHelp":"Le d\xe9compte ne commence qu\'\xe0 parti de la  destruction de la premi\xe8re brique du niveau, et s\'arr\xeate d\xe8s qu\'il n\'y a plus de briques. ","upgrades.addiction.help":"+{{lvl}} combo / brique, le combo RAZ apr\xe8s {{delay}}s sans casser de briques","upgrades.addiction.name":"Addiction","upgrades.asceticism.fullHelp":"Il faudra trouver un moyen de stocker les pi\xe8ces pendant que le combo grandis. ","upgrades.asceticism.help":"+{{combo}} combo par brique cass\xe9e, RAZ quand une pi\xe8ce est attrap\xe9e","upgrades.asceticism.name":"Asc\xe9tisme","upgrades.ball_attract_ball.fullHelp":"Les balles qui sont \xe9loign\xe9es de plus de 3/4 de la largeur d\'\xe9cran commencent \xe0 s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus \xe9loign\xe9es l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle en jeu.","upgrades.ball_attract_ball.help":"Les balles attirent les balles","upgrades.ball_attract_ball.help_plural":"Force d\'attraction plus forte","upgrades.ball_attract_ball.name":"Gravit\xe9","upgrades.ball_attracts_coins.fullHelp":"Vous pourriez l\'utiliser pour que les pi\xe8ces orbitent autours de la balle et colorent les briques \xe0 proximit\xe9.","upgrades.ball_attracts_coins.help":"Les balles attirent les pi\xe8ces","upgrades.ball_attracts_coins.name":"Balles de fortune","upgrades.ball_repulse_ball.fullHelp":"Les balles qui se trouvent \xe0 moins d\'un quart de largeur d\'\xe9cran commencent \xe0 se repousser les unes les autres. La force de r\xe9pulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affich\xe9es pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle.","upgrades.ball_repulse_ball.help":"Les balles repoussent les balles","upgrades.ball_repulse_ball.help_plural":"Force de r\xe9pulsion plus forte","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.base_combo.fullHelp":"Votre combo commence normalement \xe0 1 au d\xe9but du niveau et revient \xe0 1 lorsque vous rebondissez sans rien toucher. Avec cette caract\xe9ristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pi\xe8ces par brique. Lorsque votre combo est r\xe9initialis\xe9, il revient \xe0 4 et non \xe0 1.  Votre balle scintillera un peu pour indiquer que son combo est sup\xe9rieur \xe0 1.","upgrades.base_combo.help":"Le combo commence \xe0 {{coins}}.","upgrades.base_combo.name":"Combo +3","upgrades.bigger_explosions.fullHelp":"L\'explosion par d\xe9faut efface un carr\xe9 de 3x3 briques, avec cette am\xe9lioration un carr\xe9 de 5x5. Le vent soufflant les pi\xe8ces est \xe9galement beaucoup plus fort. L\'\xe9cran clignotera un peu apr\xe8s chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_explosions.help":"Explosions plus violentes","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_puck.fullHelp":"Un grand palet permet de ne jamais rater la balle et d\'attraper plus de pi\xe8ces, ainsi que d\'orienter pr\xe9cis\xe9ment les rebonds (l\'angle de la balle ne d\xe9pend que de l\'endroit o\xf9 elle touche le palet). \\n\\nCependant, un grand palet est plus difficile \xe0 utiliser sur les c\xf4t\xe9s du niveau, sauf si vous le combinez avec une autre am\xe9lioration.","upgrades.bigger_puck.help":"Attrapez facilement plus de pi\xe8ces.","upgrades.bigger_puck.name":"Palet plus grand","upgrades.clairvoyant.fullHelp":"Vous aide \xe0 choisir les bonnes am\xe9liorations et \xe0 comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) am\xe8nent des informations compl\xe9mentaires d\'une utilit\xe9 douteuse. ","upgrades.clairvoyant.help":"R\xe9v\xe8le les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.name":"Clairvoyant","upgrades.coin_magnet.fullHelp":"Dirige les pi\xe8ces vers le palet. L\'effet est plus fort si la pi\xe8ce est d\xe9j\xe0 proche du palet. Attraper toutes les pi\xe8ces apporte des bonus sp\xe9ciaux dans le jeu.  \\n\\nUne autre fa\xe7on d\'attraper plus de pi\xe8ces est de frapper les briques par le bas. La vitesse et la direction de la balle ont un impact sur la vitesse des pi\xe8ces produites.","upgrades.coin_magnet.help":"Le palet attire les pi\xe8ces","upgrades.coin_magnet.help_plural":"Effet plus marqu\xe9 sur les pi\xe8ces","upgrades.coin_magnet.name":"Aimant pour pi\xe8ces","upgrades.compound_interest.fullHelp":"Votre combo augmentera d\'une unit\xe9 \xe0 chaque fois que vous casserez une brique, g\xe9n\xe9rant de plus en plus de pi\xe8ces \xe0 chaque fois que vous casserez une brique. Veillez cependant \xe0 attraper chacune de ces pi\xe8ces avec votre palet, car toute pi\xe8ce perdue remettra votre combo \xe0 z\xe9ro. \\n    \\nSi votre combinaison est sup\xe9rieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pi\xe8ces ne doivent pas aller \xe0 cet endroit.","upgrades.compound_interest.help":"+{{lvl}} combo par brique cass\xe9e, remise \xe0 z\xe9ro quand une pi\xe8ce est perdu","upgrades.compound_interest.name":"Int\xe9r\xeats","upgrades.concave_puck.fullHelp":"Les balles d\xe9marrent verticalement en d\xe9but de niveau, et rebondi sur le palet de mani\xe8re plus verticale et invers\xe9e.","upgrades.concave_puck.help":"Aide \xe0 \xe9viter les bords.","upgrades.concave_puck.name":"Palet concave","upgrades.corner_shot.fullHelp":"Aide \xe0 viser dans les coins","upgrades.corner_shot.help":"Laisse votre palet sortir de la zone encadr\xe9e","upgrades.corner_shot.name":"Tir en coin","upgrades.etherealcoins.fullHelp":"Il faudrait vous assurer que les pi\xe8ces tomberont bien quand m\xeame \xe0 un moment.","upgrades.etherealcoins.help":"Les pi\xe8ces ne subissent plus la gravit\xe9","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.extra_levels.fullHelp":"La partie dure normalement 7 niveaux, apr\xe8s quoi le jeu est termin\xe9 et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette am\xe9lioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux o\xf9 vous faites le plus de points, la diff\xe9rence peut donc \xeatre spectaculaire.","upgrades.extra_levels.help":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.name":"+1 niveau","upgrades.extra_life.fullHelp":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est termin\xe9e d\xe8s que vous la laissez tomber.\\n\\nCette comp\xe9tence ajoute une barre blanche en bas de l\'\xe9cran qui sauvera une balle une fois, et se brisera au cours du processus.\\n\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilis\xe9es \xe0 chaque fois qu\'une balle est sur le point d\'\xeatre perdue. ","upgrades.extra_life.help":"La balle rebondit une fois avant d\'\xeatre perdue.","upgrades.extra_life.help_plural":"La balle rebondit {{lvl}} fois avant d\'\xeatre perdue.","upgrades.extra_life.name":"+1 vie","upgrades.forgiving.fullHelp":" La premi\xe8re brique rat\xe9e par niveau ne co\xfbte rien, la suivante 10%, 20%, etc.","upgrades.forgiving.help":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.ghost_coins.fullHelp":"Ce n\'est pas une bug, c\'est une fonctionnalit\xe9 Les pi\xe8ces passent \xe0 travers les briques doucement. ","upgrades.ghost_coins.help":"Les pi\xe8ces traversent les briques","upgrades.ghost_coins.name":"Pi\xe8ces fant\xf4me","upgrades.helium.fullHelp":"Les pi\xe8ces attendront d\'\xeatre sous le palet pour tomber. ","upgrades.helium.help":"Les pi\xe8ce flottent au lieu de tomber autours du palet","upgrades.helium.name":"Helium","upgrades.hot_start.fullHelp":"Au d\xe9but de chaque niveau, votre combo commencera \xe0 +30 points, mais \xe0 chaque seconde, il sera diminu\xe9 d\'un point. Cela signifie que les 30 premi\xe8res secondes d\'un niveau produiront beaucoup plus de pi\xe8ces que les suivantes.\\nVous devez vous assurer de terminer le niveau rapidement. L\'effet se cumule avec d\'autres avantages li\xe9s au combo, ce qui vous permet d\'augmenter le combo apr\xe8s les 30 secondes, mais il continuera \xe0 diminuer chaque seconde. Chaque fois que vous reprenez la comp\xe9tence, l\'effet est encore plus prononc\xe9.","upgrades.hot_start.help":"Combo \xe0 {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.name":"D\xe9marrage \xe0 chaud","upgrades.implosions.fullHelp":"La force d\u2019explosion est appliqu\xe9e dans l\u2019autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.implosions.help":"Les explosions aspirent les pi\xe8ces au lieu de les faire exploser.","upgrades.implosions.name":"Implosions","upgrades.instant_upgrade.fullHelp":"Choisissez imm\xe9diatement deux am\xe9liorations, afin d\'en obtenir une gratuite et une autre pour rembourser celle utilis\xe9e pour obtenir cet avantage. Chaque fois que vous choisirez des am\xe9liorations dans le menu suivant, vous aurez moins de choix.","upgrades.instant_upgrade.help":"-{{lvl}} choix jusqu\'\xe0 la fin de la course.","upgrades.instant_upgrade.name":"+2 am\xe9liorations maintenant","upgrades.left_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9, ce qui vous permet d\'obtenir une pi\xe8ce de plus \xe0 chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se r\xe9initialise d\xe8s que votre balle touche le c\xf4t\xe9 gauche.\\n\\nD\xe8s que votre combo augmente, le c\xf4t\xe9 gauche devient rouge pour vous rappeler que vous devez \xe9viter de le frapper.","upgrades.left_is_lava.help":"+{{lvl}} combo par brique, RAZ en touchant le bord gauche","upgrades.left_is_lava.name":"\xc9viter le c\xf4t\xe9 gauche","upgrades.metamorphosis.fullHelp":"Avec cette am\xe9lioration, les pi\xe8ces seront de la couleur de la brique d\'o\xf9 elles proviennent et coloreront la premi\xe8re brique qu\'elles toucheront. \\n\\nLes pi\xe8ces apparaissent \xe0 la vitesse de la balle qui les a cass\xe9es, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\".","upgrades.metamorphosis.help":"Chaque pi\xe8ces peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.name":"M\xe9tamorphose","upgrades.multiball.fullHelp":"D\xe8s que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien s\xfbr, de franchir le niveau plus rapidement.","upgrades.multiball.help":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.name":"+1 balle","upgrades.nbricks.fullHelp":"Si votre balle rebondis sans casser une brique, \xe7a compte quand m\xeame comme une frappe.  Les briques d\xe9truites par des explosions ne comptent pas.","upgrades.nbricks.help":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon RAZ","upgrades.nbricks.name":"Pr\xe9l\xe8vement","upgrades.one_more_choice.fullHelp":"Chaque menu d\'am\xe9lioration comportera une option suppl\xe9mentaire.  Cela n\'augmente pas le nombre d\'am\xe9liorations que vous pouvez choisir, mais vous aide \xe0 cr\xe9er le profile id\xe9al. ","upgrades.one_more_choice.help":"Les niveaux suivants offriront  {{lvl}} option(s) suppl\xe9mentaire(s) dans la liste d\'am\xe9liorations.","upgrades.one_more_choice.name":"+1 choix","upgrades.passive_income.fullHelp":"Certaines am\xe9lioration font bouger les balles sans avoir besoin de mettre le palet en mouvement.","upgrades.passive_income.help":"+{{lvl}} combo / brique, sauf si le palet \xe0 boug\xe9 dans les {{time}} derni\xe8res secondes, RAZ dans ce cas","upgrades.passive_income.name":"Revenu passif","upgrades.picky_eater.fullHelp":"Chaque fois que vous cassez une brique de la m\xeame couleur que votre balle, votre combo augmente d\'une unit\xe9.\\n\\nS\'il s\'agit d\'une couleur diff\xe9rente, la balle adopte cette nouvelle couleur, mais la combinaison est r\xe9initialis\xe9e, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle.\\n\\nLes briques de la mauvaise couleur sont entour\xe9es en rouge.\\n\\nSi vous avez plus d\'une balle, elles changent toutes de couleur en m\xeame temps lorsque l\'une d\'entre elles touche une brique.","upgrades.picky_eater.help":"+{{lvl}} combo par brique cass\xe9e la couleur de la balle, RAZ sinon","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.pierce.fullHelp":"Normalement , la balle rebondit d\xe8s qu\'elle touche une brique. Avec cette caract\xe9ristique, elle continuera sa trajectoire jusqu\'\xe0 3 briques cass\xe9es.\\n\\nApr\xe8s cela, elle rebondira sur la quatri\xe8me brique et vous devez toucher le palet pour remettre le compteur \xe0 z\xe9ro.","upgrades.pierce.help":"La balle perce {{count}} briques apr\xe8s chaque rebond  sur le palet","upgrades.pierce.name":"Balle per\xe7ante","upgrades.pierce_color.fullHelp":"Chaque fois qu\'une balle touche une brique de la m\xeame couleur, elle la traverse sans encombre.\\n\\nLorsqu\'elle atteint une brique de couleur diff\xe9rente, elle la casse, prend sa couleur et rebondit. \\n\\nSi vous avez des briques solides, le fonctionnement est un peu diff\xe9rent. ","upgrades.pierce_color.help":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.name":"Perceur de couleur","upgrades.puck_repulse_ball.fullHelp":"Lorsqu\'une balle s\'approche du palet, elle commence \xe0 ralentir, voire \xe0 rebondir sans toucher le palet. Beaucoup de choses sont li\xe9es \xe0 un passage par le palet dans le jeu, donc \xe7a pourrait ouvrir des possibilit\xe9s. ","upgrades.puck_repulse_ball.help":"Le palet repousse les balles","upgrades.puck_repulse_ball.help_plural":"La force de r\xe9pulsion est plus grande","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.reach.fullHelp":"S\'il n\'y a qu\'une seule rang\xe9e de briques, ou si la rang\xe9e la plus basse couvre toute la largeur du jeu, cet avantage est sans effet. Sinon, briser cette rang\xe9e la plus basse r\xe9initialise le combo\xa0; briser toute autre rang\xe9e augmente le combo du nombre de briques pr\xe9sentes sur cette rang\xe9e.\\n\\nLa rang\xe9e de briques du bas sera entour\xe9e en rouge pour vous rappeler de ne pas la toucher. ","upgrades.reach.help":"Casser une des N briques de la ligne la plus basse RAZ le combo. Sinon, +N combo.","upgrades.reach.name":"Attaque a\xe9rienne","upgrades.respawn.fullHelp":"Des effets de particules vous indiqueront o\xf9 les briques appara\xeetront. ","upgrades.respawn.help":"{{percent}}% des briques r\xe9apparaissent apr\xe8s {{delay}}s.","upgrades.respawn.name":"R\xe9apparition ","upgrades.right_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9, ce qui vous permet d\'obtenir une pi\xe8ce de plus \xe0 chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se r\xe9initialise d\xe8s que votre balle touche le c\xf4t\xe9 droit de la zone de jeu.\\n\\nD\xe8s que votre combo augmente, le c\xf4t\xe9 droit devient rouge pour vous rappeler que vous devez \xe9viter de le frapper.","upgrades.right_is_lava.help":"+{{lvl}} combo par brique, RAZ en cas de choc avec le cot\xe9 droit","upgrades.right_is_lava.name":"\xc9viter le c\xf4t\xe9 droit","upgrades.sacrifice.fullHelp":"Le combo pourrait monter assez haut.","upgrades.sacrifice.help_l1":"Perdre une vie d\xe9truit toutes les briques","upgrades.sacrifice.help_over":"Perdre une vie multiplie le combo par {{lvl}} puis d\xe9truit toutes les briques \xe0 l\'\xe9cran","upgrades.sacrifice.name":"Sacrifice","upgrades.sapper.fullHelp":"Au lieu de dispara\xeetre, la premi\xe8re brique cass\xe9e est remplac\xe9e par une bombe. Faire rebondir la balle sur le palet r\xe9arme l\'effet.   En montant en niveau, vous pourrez placer plus de bombes. \\n\\nN\'oubliez pas que les bombes ont un impact sur la vitesse des pi\xe8ces \xe0 proximit\xe9. Trop d\'explosions peuvent rendre difficile la r\xe9cup\xe9ration des fruits de votre dur labeur.","upgrades.sapper.help":"La premi\xe8re brique cass\xe9e devient une bombe.","upgrades.sapper.help_plural":"Les premi\xe8res briques {{lvl}} cass\xe9es deviennent des bombes.","upgrades.sapper.name":"Sapeur","upgrades.shocks.fullHelp":"Quand deux balles entrent en collision,  elles \xe9changent leurs vitesse, cr\xe9ent une explosion et gagnent un peu de vitesse qui les s\xe9pare. ","upgrades.shocks.help":"Collision explosive entre les balles","upgrades.shocks.name":"Choc","upgrades.shunt.fullHelp":"D\xe9marrage \xe0 chaud sera simplement ajout\xe9 au combo actuel","upgrades.shunt.help":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.name":"Shunt","upgrades.side_kick.fullHelp":"Lorsqu\'une brique est touch\xe9e, le jeu v\xe9rifie la vitesse de la balle et ajoute +1 au combo si sa vitesse horizontale est sup\xe9rieure \xe0 sa vitesse verticale. Dans le cas contraire, le combo diminuera d\'un point. L\'emplacement de l\'impact sur la brique n\'a aucune importance.","upgrades.side_kick.help":"+{{lvl}} combo par brique cass\xe9 horizontalement, -{{lvl}} sinon","upgrades.side_kick.name":"Un cot\xe9 positif","upgrades.skip_last.fullHelp":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut \xeatre difficile d\'obtenir les derni\xe8res briques.\\n\\nTerminer un niveau plus t\xf4t permet d\'obtenir des choix suppl\xe9mentaires lors de la mise \xe0 niveau. \\n\\nNe jamais manquer de briques est \xe9galement tr\xe8s avantageux.\\n\\nDonc, si vous avez du mal \xe0 casser les derni\xe8res briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.skip_last.help":"La derni\xe8re brique s\'autod\xe9truit.","upgrades.skip_last.help_plural":"Les {{lvl}} derni\xe8res briques restantes s\'autod\xe9truiront","upgrades.skip_last.name":"Nettoyage facile","upgrades.slow_down.fullHelp":"La balle d\xe9marre relativement lentement, mais \xe0 chaque niveau de votre course, elle d\xe9marre un peu plus vite, et elle acc\xe9l\xe8re \xe9galement si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile \xe0 g\xe9rer. \\n\\nVous pouvez l\'obtenir au d\xe9but de chaque course en activant le mode enfant dans le menu.","upgrades.slow_down.help":"La balle se d\xe9place plus lentement","upgrades.slow_down.name":"Balle lente","upgrades.smaller_puck.fullHelp":"Le palet est donc plus petit, ce qui, en th\xe9orie, facilite certains tirs en coin, mais augmente surtout la difficult\xe9.\\n\\nC\'est pourquoi vous b\xe9n\xe9ficiez \xe9galement d\'un bonus de +5 pi\xe8ces par brique pour toutes les briques que vous casserez apr\xe8s avoir choisi cette option.","upgrades.smaller_puck.help":"Donne aussi +5 combo","upgrades.smaller_puck.help_plural":"Palet encore plus petit et combinaison de base plus \xe9lev\xe9e","upgrades.smaller_puck.name":"Palet plus petit","upgrades.soft_reset.fullHelp":"Limite l\'impact d\'une r\xe9initialisation du combo.","upgrades.soft_reset.help":"La remise \xe0 z\xe9ro du combo conserve {{percent}}% des points","upgrades.soft_reset.name":"R\xe9initialisation progressive","upgrades.streak_shots.fullHelp":"Chaque fois que vous cassez une brique, votre combo (nombre de pi\xe8ces par brique) augmente d\'une unit\xe9. Cependant, d\xe8s que la balle touche votre palet,  le combo est remis \xe0 sa valeur par d\xe9faut, et vous n\'obtiendrez qu\'une seule pi\xe8ce par brique.\\n\\nUne fois que votre combinaison d\xe9passe la valeur de base, votre palet devient rouge pour vous rappeler que le fait de le toucher avec la balle d\xe9truira votre combinaison.","upgrades.streak_shots.help":"Plus de pi\xe8ces si vous cassez plusieurs briques \xe0 la fois.","upgrades.streak_shots.name":"S\xe9quence de destruction","upgrades.sturdy_bricks.fullHelp":"Chaque niveau de cet atout ajoute un PV \xe0 toutes les briques. Vous pouvez consulter le nombre de PV avec l\'avantage \\"clairvoyant\\". Vous pouvez augmenter les d\xe9g\xe2ts des balles en obtenant l\'avantage \\"Balle per\xe7ante\\". Chaque niveau de cet atout ajoute 50% de pi\xe8ces en plus.","upgrades.sturdy_bricks.help":"+{{lvl}} points de vie des briques, +{{percent}}% pi\xe8ces quand elles sont d\xe9truites","upgrades.sturdy_bricks.name":"Briques solides","upgrades.telekinesis.fullHelp":"Vous contr\xf4lez la balle pendant qu\'elle monte.","upgrades.telekinesis.help":"Contr\xf4ler la trajectoire de la balle","upgrades.telekinesis.help_plural":"Effet plus fort sur la balle","upgrades.telekinesis.name":"T\xe9l\xe9kin\xe9sie","upgrades.top_is_lava.fullHelp":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9. Cependant, votre combo sera r\xe9initialis\xe9 d\xe8s que votre balle atteindra le haut de l\'\xe9cran.\\n\\nLorsque votre combo est sup\xe9rieur au minimum, une barre rouge appara\xeet en haut de l\'\xe9cran pour vous rappeler que vous devez \xe9viter de la frapper.","upgrades.top_is_lava.help":"+{{lvl}} combo par brique, RAZ en cas de rebond au plafond","upgrades.top_is_lava.name":"Icare ","upgrades.trampoline.fullHelp":"Une des rares am\xe9liorations \xe0 ne pas avoir de condition de remise \xe0 z\xe9ro","upgrades.trampoline.help":"+{{lvl}} combo \xe0 chaque rebond d\'une balle sur le palet,-{{lvl}} combo \xe0 chaque rebond sur un bord ","upgrades.trampoline.name":"Trampoline","upgrades.unbounded.fullHelp":"J\'esp\xe8re que vous avez trouv\xe9 un moyen de garder votre balle \xe0 l\'\xe9cran. Au niveau 2+, le plafond dispara\xeetra \xe9galement. Il s\'agit d\'un avantage avanc\xe9.","upgrades.unbounded.help":"+{{lvl}} combo par brique, plus de cot\xe9s pour garder la balle en jeu, danger","upgrades.unbounded.help_no_ceiling":"+{{lvl}} combo par brique, plus de cot\xe9s ou de plafond","upgrades.unbounded.name":"Lib\xe9r\xe9e, d\xe9livr\xe9e","upgrades.viscosity.fullHelp":"Les pi\xe8ces acc\xe9l\xe8rent normalement avec la gravit\xe9 et les explosions pour atteindre des vitesses assez \xe9lev\xe9es. \\n\\nCette comp\xe9tence les ralentit constamment, comme si elles se trouvaient dans une sorte de liquide visqueux.\\n\\nCela permet de les attraper plus facilement et se combine bien avec les am\xe9liorations qui influencent le mouvement de la pi\xe8ce.","upgrades.viscosity.help":"Chute plus lente des pi\xe8ces","upgrades.viscosity.name":"Fluide visqueux ","upgrades.wind.fullHelp":"Le vent d\xe9pend de l\'endroit o\xf9 se trouve le palet, s\'il est au centre de l\'\xe9cran, il ne se passe rien, s\'il est \xe0 gauche, il soufflera vers la gauche, s\'il est \xe0 droite de l\'\xe9cran, il soufflera vers la droite.\\n\\nLe vent affecte \xe0 la fois les balles et les pi\xe8ces.","upgrades.wind.help":"La position du palet cr\xe9e du vent","upgrades.wind.help_plural":"Force du vent plus importante","upgrades.wind.name":"Vive le vent","upgrades.yoyo.fullHelp":"C\'est l\'inverse de T\xe9l\xe9kin\xe9sie, contr\xf4lez la balle alors qu\'elle redescend vers le palet.","upgrades.yoyo.help":"La balle descend vers le palet","upgrades.yoyo.name":"Yo-yo","upgrades.zen.fullHelp":"C\'est quand m\xeame un jeu non violent \xe0 la base.","upgrades.zen.help":"+{{lvl}} combo par brique, jusqu\'\xe0 ce qu\'il y ait une explosion","upgrades.zen.name":"Zen"}');

finished level {{level}}/{{max}}.","level_up.before_buttons":"You caught {{score}} coins {{catchGain}} out of {{levelSpawnedCoins}} in {{time}} seconds {{timeGain}}.\\n\\nYou missed {{levelMisses}} times {{missesGain}} and hit the walls or ceiling {{levelWallBounces}} times{{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Try to catch all coins, never miss the bricks, never hit the walls/ceiling or clear the level under 30s to gain additional choices and upgrades.","level_up.compliment_good":"Well done !","level_up.compliment_perfect":"Impressive, keep it up !","level_up.pick_upgrade_title":"Pick an upgrade","level_up.plus_one_upgrade":"(+1  upgrade)","level_up.plus_one_upgrade_and_reroll":"(+1 upgrade and  +1 re-roll)","level_up.reroll":"Re-roll ({{count}})","level_up.reroll_help":"Offer new choices","level_up.unlocked_level":" (Level)","level_up.unlocked_perk":" (Perk)","level_up.upgrade_perk_to_level":"  lvl {{level}}","loop.converted_rerolls":"Your {{n}} leftover re-rolls where converted to +{{n}} base combo.","loop.instructions":"All perks you have now will have lower max levels depending on their current level. You can pick one below that will gain one level and one max level instead. Your pick will be leveled up, even beyond the maximum normally allowed for that perk.","loop.no_rerolls":"You didn\'t have any leftover re-rolls, so your base combo stayed the same. ","loop.title":"Starting loop {{loop}}","main_menu.basic":"Basic graphics","main_menu.basic_help":"Better performance.","main_menu.colorful_coins":"Colorful coins","main_menu.colorful_coins_help":"Coins always spawn of the color of the brick","main_menu.credit_levels":"<h2>Levels source or reference link</h2>","main_menu.credits":"# Credits\\n\\nI pulled many background patterns from https://pattern.monster/\\n\\nSome of the sound generating code was written by ChatGPT, and heavily\\nadapted to my usage over time.\\n\\nI wanted an APK to start in fullscreen and be able to list it on fdroid and the play store. I started with an empty view and went to work trimming it down, with the help of that tutorial : https://github.com/fractalwrench/ApkGolf/blob/master/blog/BLOG_POST.md\\n\\nColin (obigre) brought a lot of fantastic ideas to the game, here\'s his website (in French) : https://colin-crapahute.bearblog.dev/\\n\\n# Breakout games suggestions\\n\\nHere are a few interesting games in the breakout genre :\\n\\n- LBreakoutHD : https://sourceforge.net/p/lgames/code/HEAD/tree/trunk/lbreakouthd/\\n- Wizorb : https://store.steampowered.com/app/207420/Wizorb/\\n- Ricochet infinity : https://www.myabandonware.com/game/ricochet-infinity-dxm\\n- First prototype of B71 : https://breakout-v1.lecaro.me/\\n- Second prototype of B71: https://breakout-v2.lecaro.me/\\n\\n\\n# PC game suggestions\\n\\nHere are a few games i\'ve sank a lot of time in, and that inspired breakout in some way\\n\\n- Heat signature : https://www.humblebundle.com/store/heat-signature\\n- FTL : https://www.gog.com/en/game/faster_than_light\\n- Nova drift :   https://www.gog.com/en/game/nova_drift\\n- Noita : https://www.gog.com/en/game/noita\\n- Enter the gungeon : https://www.gog.com/en/game/enter_the_gungeon\\n- Zero Sivert : https://store.steampowered.com/app/1782120/ZERO_Sievert/\\n- Factorio :  https://www.factorio.com/\\n- Nuclear throne : https://store.steampowered.com/app/242680/Nuclear_Throne/  (don\'t buy on GOG it\'s outdated) \\n- Brigador :  https://www.gog.com/en/game/brigador\\n- Teleglitch https://www.gog.com/en/game/teleglitch_die_more_edition\\n- Rollers of the realm : https://store.steampowered.com/app/262470/Rollers_of_the_Realm/\\n","main_menu.donate":"You\'ve played for {{hours}} hours","main_menu.donate_help":"How about donating {{suggestion}} \u20AC\xa0? You can hide this reminder in the settings. ","main_menu.donation_reminder":"Remind me to donate","main_menu.donation_reminder_help":"See time played and donation link in main menu","main_menu.download_save_file":"Download score and stats","main_menu.download_save_file_help":"Get a save file","main_menu.footer_html":"<p>       \\n<span>Made in France by <a href=\\"https://lecaro.me\\">Renan LE CARO</a>.</span> \\n<a href=\\"https://paypal.me/renanlecaro\\" target=\\"_blank\\">Donate</a>\\n<a href=\\"https://discord.gg/bbcQw4x5zA\\" target=\\"_blank\\">Discord</a>\\n<a href=\\"https://f-droid.org/en/packages/me.lecaro.breakout/\\" target=\\"_blank\\">F-Droid</a>\\n<a href=\\"https://play.google.com/store/apps/details?id=me.lecaro.breakout\\" target=\\"_blank\\">Google Play</a>\\n<a href=\\"https://renanlecaro.itch.io/breakout71\\" target=\\"_blank\\">itch.io</a> \\n<a href=\\"https://gitlab.com/lecarore/breakout71\\" target=\\"_blank\\">Gitlab</a>\\n<a href=\\"https://breakout.lecaro.me/\\" target=\\"_blank\\">Web version</a>\\n<a href=\\"https://news.ycombinator.com/item?id=43183131\\" target=\\"_blank\\">HackerNews</a>\\n<a href=\\"https://breakout.lecaro.me/privacy.html\\" target=\\"_blank\\">Privacy Policy</a>\\n<span>v.{{appVersion}}</span>\\n</p>\\n","main_menu.fullscreen":"Fullscreen","main_menu.fullscreen_help":"Game will try to go full screen before starting","main_menu.help_content":"# Goal\\n\\nThe goal is to catch as many coins as possible during 7 levels. \\nCoins appear when you break bricks.\\nThey fly around, bounce and roll, and you need to catch them with your puck to increase your score. \\nYour score is displayed in the top right corner of the screen.\\nYou must delete all bricks to progress to the next level. \\nIf you drop the ball, it\'s game over, unless you had the \\"extra life\\" upgrade.\\n\\n# Upgrades \\n\\nAfter clearing a level, you\'ll be able to pick upgrades among a small selection presented to you. \\n\\nThe upgrade you pick will apply until the end of the run. You will get more upgrade if you play well : catch all coins, clear the level quickly, never miss the bricks, never bounce on the sides or ceiling.\\n\\nIf you play very well, you\'ll also get \\"rerolls\\" that allow you to shuffle the list of upgrades that are offered to you. Once an upgrade is offered, it\'s less likely to reappear afterward. \\n\\nYou also get a free random upgrade at the beginning of each run. There\'s also an easy mode for kids, where the game will always start with the \\"slower ball\\" upgrade.  You can see which upgrades you have and more by clicking your score at the top right of the screen. \\n\\nUpgrades apply to the whole run and can synergize, or really work against each other. Most of the fun of the game is discovering which ones work best together.\\n\\nSome upgrades help with aiming, like \\"Telekinesis\\". Some upgrades can be picked multiple times to increase the effect, you\'ll see for example \\"+1 ball level 2\\" which adds a third ball.\\n\\nWhen you first play, only a few upgrades are available, you unlock the rest by simply playing and scoring points. There\'s a similar \\nmechanic for levels unlock. At the end of a run, the things you just unlocked will be shown, and you can check the full content in menu / unlocks.\\n\\nMany upgrades impact your combo. \\n\\n# Combo\\n\\nYour \\"combo\\" is the number of coins spawned when a brick breaks. It is displayed on your puck, for example x4 means each\\nbrick will spawn 4 coins. It will reset if you miss. \\n\\nMany upgrades will increase the combo when you break a brick, but also add a condition to reset it. So the more upgrades you pick, the faster it will climb, but the more likely it will be that it returns to it\'s base value. \\n\\n# Aiming\\n\\nWhat decides how the ball flies away is only the position of the puck hit. If the ball hits the puck dead center, it will bounce back up vertically, while in you hit more on one side, it will have more angle. \\n\\nThe puck speed and incoming angle have no impact on the ball direction after bouncing.\\n\\nYou might find that a smaller puck makes it a bit easier to aim near corners, but also makes it much harder to catch coins.\\n\\n\\"Wind\\" and \\"puck controls ball\\" can help you aim even after the ball bounced to the wrong direction.\\n\\n\\"Slower ball\\" gives you a bit more time to aim, particularly useful in later levels where the ball goes faster. The ball also\\naccelerates as you spend time in each level. \\n\\n# System requirements \\n\\nThe game should perform well even on low-end devices.  It\'s very lean and does not take much storage space (Roughly 0.1MB). The web version is supposed to work on iOS safari, Firefox ESR and chrome, on desktop and mobile.\\n\\nIf the app stutters, turn on \\"fast mode\\" in the settings to render a simplified view that should be faster. You can adjust many aspects of the game there, go have a look ! \\n\\n# Playing offline \\n\\nBreakout 71 can work offline in many ways:\\n\\n- play store  : https://play.google.com/store/apps/details?id=me.lecaro.breakout\\n- fdroid : https://f-droid.org/packages/me.lecaro.breakout/\\n- html file on pc : https://renanlecaro.itch.io/breakout71\\n\\n","main_menu.help_help":"Learn more about general aspects of the game","main_menu.help_title":"Help and credits","main_menu.help_upgrades":"<h2>Upgrades</h2>","main_menu.high_score":"High score : {{score}}","main_menu.kid":"Kids mode","main_menu.kid_help":"Start future games with \\"slower ball\\".","main_menu.language":"Language","main_menu.language_help":"Choose the game\'s language","main_menu.load_save_file":"Load save file","main_menu.load_save_file_help":"Select a save file on your device","main_menu.loop_run":"New long game","main_menu.loop_run_help":"Allows you to loop up to 7 times","main_menu.max_coins":" {{max}} coins on screen maximum","main_menu.max_coins_help":"Cosmetic only, no effect on score","main_menu.max_particles":" {{max}} particles maximum","main_menu.max_particles_help":"Limits the number of particles show on screen for visual effect. ","main_menu.mobile":"Mobile mode","main_menu.mobile_help":"Leaves space under the puck.", a width\\" away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.","upgrades.ball_attract_ball.help":"Balls attract balls","upgrades.ball_attract_ball.help_plural":"Stronger attraction force","upgrades.ball_attract_ball.name":"Gravity","upgrades.ball_attracts_coins.fullHelp":"This could be used to \\"paint around\\" the balls with coins if you combined it with \\"stain\\" and \\"ghost coins\\".","upgrades.ball_attracts_coins.help":"Balls attract coins","upgrades.ball_attracts_coins.name":"Fortunate ball","upgrades.ball_repulse_ball.fullHelp":"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.","upgrades.ball_repulse_ball.help":"Balls repulse balls","upgrades.ball_repulse_ball.help_plural":"Stronger repulsion force","upgrades.ball_repulse_ball.name":"Personal space","upgrades.base_combo.fullHelp":"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you\'ll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.","upgrades.base_combo.help":"Combo starts at {{coins}}.","upgrades.base_combo.name":"+3 base combo","upgrades.bigger_explosions.fullHelp":"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)","upgrades.bigger_explosions.help":"Bigger explosions","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_puck.fullHelp":"A bigger puck makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball\'s angle only depends on where it hits the puck). \\n\\nHowever, a large puck is harder to use around the sides of the level, and will make it sometimes unavoidable to miss. You could word around that with other perks.","upgrades.bigger_puck.help":"Easily catch more coins.","upgrades.bigger_puck.name":"Bigger puck","upgrades.clairvoyant.fullHelp":"Helps you pick the right upgrades and understand what\'s going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)","upgrades.clairvoyant.help":"See upcoming levels, bricks HP and ball direction","upgrades.clairvoyant.name":"Clairvoyant","upgrades.coin_magnet.fullHelp":"Directs the coins to the puck. The effect is stronger if the coin is close to it already. Catching all coins bring special bonuses in the game. \\n\\nAnother way to catch more coins is to hit bricks from the bottom. The ball\'s speed and direction impacts the spawned coin\'s velocity. ","upgrades.coin_magnet.help":"Puck attracts coins","upgrades.coin_magnet.help_plural":"Stronger effect on the coins","upgrades.coin_magnet.name":"Coins magnet","upgrades.compound_interest.fullHelp":"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\n\\nBe sure however to catch every one of those coins with your puck, as any lost coin will reset your combo. \\n\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.","upgrades.compound_interest.help":"+{{lvl}} combo per brick broken, resets on coin lost","upgrades.compound_interest.name":"Compound interest","upgrades.concave_puck.fullHelp":"Balls starts the level going straight up, and bounces with less angle.","upgrades.concave_puck.help":" Helps with aiming straight up","upgrades.concave_puck.name":"Concave puck","upgrades.corner_shot.fullHelp":"Helps with aiming in the corners. Further levels let you go further out. ","upgrades.corner_shot.help":"Lets your puck overlap with the borders of the screen","upgrades.corner_shot.name":"Corner shot","upgrades.etherealcoins.fullHelp":"You\'ll have to make sure that the coins fall down somehow, or you won\'t get any. ","upgrades.etherealcoins.help":"Coins are no  longer affected by gravity","upgrades.etherealcoins.name":"Coins, in Space","upgrades.extra_levels.fullHelp":"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.","upgrades.extra_levels.help":"Play {{count}} levels instead of 7","upgrades.extra_levels.name":"+1 level","upgrades.extra_life.fullHelp":"Normally, you have one ball, and the game is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou\'ll loose one level of that perk every time a ball bounces at the bottom of the screen.","upgrades.extra_life.help":"The ball will bounce once on the bottom line before being lost.","upgrades.extra_life.help_plural":"The ball will bounce on the bottom {{lvl}} times before being lost.","upgrades.extra_life.name":"+1 life","upgrades.forgiving.fullHelp":"The first miss per level is free, then 10% of the combo, then 20% .. ","upgrades.forgiving.help":"Missing breaks reduces combo progressively instead of all at once.","upgrades.forgiving.name":"Forgiving","upgrades.ghost_coins.fullHelp":"It\'s not a bug, it\'s a feature !  Coins fly through bricks slowly. Higher levels let them move faster. ","upgrades.ghost_coins.help":"Coins pass through bricks","upgrades.ghost_coins.name":"Ghost coins","upgrades.helium.fullHelp":"This affects the coins  and will let the float up until you are ready to pick them up.","upgrades.helium.help":"Gravity reversed left and right of puck","upgrades.helium.name":"Helium","upgrades.hot_start.fullHelp":"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one.\\n\\nThis means the first 30 seconds in a level will spawn many more coins than the following ones, and you should make sure that you clear the level quickly. \\n\\nThe effect stacks with other combo related perks, so you might be able to raise the combo after the 30s timeout, but it will keep ticking down. \\n\\nEvery time you take the perk again, the effect will be more dramatic.","upgrades.hot_start.help":"Start at combo {{start}}, -{{loss}} combo per second","upgrades.hot_start.name":"Hot start","upgrades.implosions.fullHelp":"The explosion force is applied the other way. Further levels act as \\"bigger explosion\\"","upgrades.implosions.help":"Explosions suck coins in instead of blowing them out","upgrades.implosions.name":"Implosions","upgrades.instant_upgrade.fullHelp":"Immediately pick two upgrades, so that you get one free one and one to repay the one used to get this perk. Every further menu to pick upgrades will have fewer options to choose from.","upgrades.instant_upgrade.help":"-{{lvl}} choice until game end.","upgrades.instant_upgrade.name":"+2 upgrades now","upgrades.left_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n","upgrades.left_is_lava.help":"+{{lvl}} combo per brick broken, resets on left side hit","upgrades.left_is_lava.name":"Avoid left side","upgrades.metamorphosis.fullHelp":"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. \\n\\nCoins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\"paint\\".","upgrades.metamorphosis.help":"Each coins can stain {{lvl}} brick(s) with its color","upgrades.metamorphosis.name":"Metamorphosis","upgrades.multiball.fullHelp":"As soon as you drop the ball in Breakout 71, you loose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.","upgrades.multiball.help":"Start every levels with {{count}} balls.","upgrades.multiball.name":"+1 ball","upgrades.nbricks.fullHelp":"You don\'t necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don\'t count","upgrades.nbricks.help":"Hit exactly {{lvl}} bricks per puck bounce for +{{lvl}} combo, otherwise it resets","upgrades.nbricks.name":"Strict sample size","upgrades.one_more_choice.fullHelp":"Every upgrade menu will have one more option.  Doesn\'t increase the number of upgrades you can pick.","upgrades.one_more_choice.help":"Further level ups will offer {{lvl}} more option(s) in the list","upgrades.one_more_choice.name":"+1 choice","upgrades.passive_income.fullHelp":"Some perks can help the balls do what you want without needing to do anything.","upgrades.passive_income.help":"+{{lvl}} combo / brick, unless the puck moved in the last {{time}}s, then it resets instead","upgrades.passive_income.name":"Passive income","upgrades.picky_eater.fullHelp":"Whenever you break a brick the same color as your ball, your combo increases by one. \\n\\nIf it\'s a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball\'s color. \\n\\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red halo. \\n\\nIf you have more than one ball, they all switch color whenever one of them hits a brick.","upgrades.picky_eater.help":"+{{lvl}} combo per brick broken, resets on ball color change","upgrades.picky_eater.name":"Picky eater","upgrades.pierce.fullHelp":"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\n\\nAfter that, it will bounce on the 4th brick, and you\'ll need to touch the puck to reset the counter.","upgrades.pierce.help":"Ball pierces {{count}} bricks after a puck bounce","upgrades.pierce.name":"Piercing","upgrades.pierce_color.fullHelp":"Whenever a ball hits a brick of the same color, it will just go through unimpeded. \\n\\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\n\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.","upgrades.pierce_color.help":"+{{lvl}} damage to bricks of the ball\'s color","upgrades.pierce_color.name":"Color pierce","upgrades.puck_repulse_ball.fullHelp":"When a ball gets close to the puck, it will start slowing down, and even potentially bouncing without touching the puck.","upgrades.puck_repulse_ball.help":"Puck repulses balls","upgrades.puck_repulse_ball.help_plural":"Stronger repulsion force","upgrades.puck_repulse_ball.name":"Soft landing","upgrades.reach.fullHelp":"If there is only one row of bricks, or if the lowest row of bricks cover the whole width of the game,  then this perk does nothing. Otherwise, breaking this lowest row resets the combo, while breaking anything else increases the combo by the number of bricks present on that lowest row. \\n\\nThe lowest row will be highlighted in red. ","upgrades.reach.help":" Touching the N bricks of the lowest row resets the combo. Otherwise, +N combo","upgrades.reach.name":"Top down","upgrades.respawn.fullHelp":"Some particle effect will let you know where bricks will appear. ","upgrades.respawn.help":"{{percent}}% of bricks re-spawn after {{delay}}s.","upgrades.respawn.name":"Re-spawn","upgrades.right_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one, so you\'ll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n","upgrades.right_is_lava.help":"+{{lvl}} combo per brick broken, resets on right side hit","upgrades.right_is_lava.name":"Avoid right side","upgrades.sacrifice.fullHelp":"This might get the combo pretty high.","upgrades.sacrifice.help_l1":"Loosing a life clears all bricks","upgrades.sacrifice.help_over":"Loosing a life {{lvl}}x the combo then clears all bricks","upgrades.sacrifice.name":"Sacrifice","upgrades.sapper.fullHelp":"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the puck re-arms the effect. Leveling-up this perk will allow you to place more bombs.\\n\\nRemember that bombs impact the velocity of nearby coins, so too many explosions could make it hard to catch the fruits of your hard work.","upgrades.sapper.help":"The first brick broken becomes a bomb.","upgrades.sapper.help_plural":"The first {{lvl}} bricks broken become bombs.","upgrades.sapper.name":"Sapper","upgrades.shocks.fullHelp":"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separated them. ","upgrades.shocks.help":"Explosive balls collisions","upgrades.shocks.name":"Shocks","upgrades.shunt.fullHelp":"If you also have hot start, the hot start is just added to the current combo","upgrades.shunt.help":"Keep {{percent}}% of your combo between levels","upgrades.shunt.name":"Shunt","upgrades.side_kick.fullHelp":"When a brick get hit, the game checks the ball\'s velocity, and add +1 to the combo if its horizontal velocity is higher than its vertical velocity. The combo will decrease by one otherwise. The location of the impact on the brick is irrelevant. ","upgrades.side_kick.help":"+{{lvl}} combo per brick broken horizontally, -{{lvl}} otherwise","upgrades.side_kick.name":"Side kick","upgrades.skip_last.fullHelp":"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\n\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help.","upgrades.skip_last.help":"The last brick will explode.","upgrades.skip_last.help_plural":"The last {{lvl}}  bricks will explode.","upgrades.skip_last.name":"Easy Cleanup","upgrades.slow_down.fullHelp":"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.","upgrades.slow_down.help":"Ball moves more slowly","upgrades.slow_down.name":"Slower ball","upgrades.smaller_puck.fullHelp":"This makes the puck smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat\'s why you also get a nice bonus of +5 coins per brick for all bricks you\'ll break after picking this. ","upgrades.smaller_puck.help":"Also gives +5 base combo","upgrades.smaller_puck.help_plural":"Even smaller puck and higher base combo","upgrades.smaller_puck.name":"Smaller puck","upgrades.soft_reset.fullHelp":"Limit the impact of a combo reset.","upgrades.soft_reset.help":"Combo resets keeps {{percent}}%","upgrades.soft_reset.name":"Soft reset","upgrades.streak_shots.fullHelp":"Every time you break a brick, your combo (number of coins per bricks) increases by one. \\n\\nHowever, as soon as the ball touches your puck, the combo is reset to its default value, and you\'ll just get one coin per brick.\\n\\nOnce your combo rises above the base value, your puck will become red to remind you that it will destroy your combo to touch it with the ball.","upgrades.streak_shots.help":"More coins if you break many bricks at once.","upgrades.streak_shots.name":"Single puck hit streak","upgrades.sturdy_bricks.fullHelp":"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\"clairvoyant\\" perk. You can increase ball damage by getting the \\"piercing\\" perk. Each level of the perk adds +50% coins spawn. ","upgrades.sturdy_bricks.help":"+{{lvl}} bricks HP, +{{percent}}% coins spawned when broken","upgrades.sturdy_bricks.name":"Sturdy bricks","upgrades.telekinesis.fullHelp":"You control the ball while it\'s going up. ","upgrades.telekinesis.help":"Puck controls the ball\'s trajectory","upgrades.telekinesis.help_plural":"Stronger effect on the ball","upgrades.telekinesis.name":"Telekinesis","upgrades.top_is_lava.fullHelp":"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. ","upgrades.top_is_lava.help":"+{{lvl}} combo per brick, reset when the top is hit","upgrades.top_is_lava.name":"Sky is the limit","upgrades.trampoline.fullHelp":"One of the rare  combo upgrades that don\'t add a reset condition","upgrades.trampoline.help":"+{{lvl}} combo per puck bounce,-{{lvl}} combo per bounce on any border","upgrades.trampoline.name":"Trampoline","upgrades.unbounded.fullHelp":"I hope you\'ve found a way to keep your ball on screen. Penalties for hitting the sides no longer apply. At level 2+, the ceiling will also disappear. This is an advanced perk. ","upgrades.unbounded.help":"+{{lvl}} combo per brick, no more sides to keep the ball in game, danger","upgrades.unbounded.help_no_ceiling":"+{{lvl}} combo per brick, no more sides  or ceiling","upgrades.unbounded.name":"Unbounded","upgrades.viscosity.fullHelp":"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin\'s movement.","upgrades.viscosity.help":"Slower coin fall","upgrades.viscosity.name":"Viscosity","upgrades.wind.fullHelp":"The wind depends on where your puck is, if it\'s in the center of the screen nothing happens, if it\'s on the left it will blow left-wise, if it\'s on the right of the screen then it will blow right-wise. \\n\\nThe wind affects both the balls and coins.","upgrades.wind.help":"Puck position creates wind","upgrades.wind.help_plural":"Stronger wind force","upgrades.wind.name":"Wind","upgrades.yoyo.fullHelp":"It\'s the opposite of telekinesis, control the ball while it\'s falling back down.","upgrades.yoyo.help":"Ball falls toward puck","upgrades.yoyo.name":"Yo-yo","upgrades.zen.fullHelp":"After all, this is a non-violent game. ","upgrades.zen.help":"+{{lvl}} combo per bricks, reset when there\'s an explosion","upgrades.zen.name":"Zen"}');
