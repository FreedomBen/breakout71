<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Breakout 71</title>
    <meta name="description" content="A breakout game with roguelite mechanics. Break bricks, catch coins, pick upgrades, repeat. Play for free on mobile and desktop.">
    <style>* {
  box-sizing: border-box;
  font-family: Courier New, Courier, Lucida Sans Typewriter, Lucida Typewriter, monospace;
}

body {
  width: 100vw;
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  color: #fff;
  background-size: 120px 120px;
  background-color: var(--background1);
  --background1: #030c23;
  --background2: #03112a;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#game {
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  width: 100vw;
  position: absolute;
  top: 0;
  left: 0;
}

#score, #menu {
  z-index: 1;
  appearance: none;
  font: inherit;
  color: #fff;
  background: none;
  border: none;
  min-width: 40px;
  min-height: 40px;
  padding: 10px;
  line-height: 20px;
  position: absolute;
  top: 0;
}

#score:hover, #score:focus, #menu:hover, #menu:focus {
  cursor: pointer;
  background: #0000004d;
}

#score {
  right: 0;
}

#menu {
  left: 0;
}

@media screen and (orientation: portrait) {
  #menu > span {
    display: none;
  }
}

.popup {
  z-index: 10;
  background: #000000e6;
  display: flex;
  position: fixed;
  inset: 0;
  overflow: auto;
}

.popup > div {
  transform-origin: center;
  flex-direction: column;
  align-items: stretch;
  width: 100%;
  max-width: 450px;
  margin: auto;
  padding: 20px 10px;
  display: flex;
}

.popup > div > * {
  margin: 0;
  padding: 0;
}

.popup > div > h2, .popup > div > p {
  margin-bottom: 20px;
}

.popup > div > button {
  font: inherit;
  color: #fff;
  cursor: pointer;
  text-align: left;
  background: #000c;
  border: 1px solid #fff;
  gap: 10px;
  margin-top: -1px;
  padding: 10px;
  display: flex;
}

.popup > div > button:not([disabled]):hover, .popup > div > button:not([disabled]):focus {
  z-index: 1;
  border-color: #f1d33b;
  position: relative;
}

.popup button.close-modale {
  color: #fff;
  cursor: pointer;
  background: none;
  border: none;
  width: 60px;
  height: 60px;
  position: absolute;
  top: 0;
  right: 0;
  overflow: hidden;
}

.popup button.close-modale:before {
  content: "+";
  font-size: 80px;
  display: inline-block;
  position: absolute;
  top: 34px;
  left: 26px;
  transform: translate(-50%, -50%)rotate(45deg);
}

.popup button.close-modale:hover {
  background: #000;
  font-weight: bold;
}

.popup > div > button[disabled] {
  opacity: .5;
  filter: saturate(0);
  pointer-events: none;
}

.popup > div > button > div {
  flex-grow: 1;
}

.popup > div > button > div > em {
  opacity: .8;
  display: block;
}

.popup > div > button > span.checks {
  flex-grow: 0;
  flex-shrink: 0;
  gap: 5px;
  width: 40px;
  height: 40px;
  display: inline-flex;
}

.popup > div > button > span.checks > span {
  opacity: .1;
  background: #fff;
  border-radius: 4px;
  flex: 10px;
  align-self: stretch;
}

.popup > div > button > span.checks > span.checked {
  opacity: 1;
}

.popup .textAfterButtons {
  color: #ffffff94;
}

.popup a[href] {
  color: inherit;
}

.popup a[href]:hover, .popup a[href]:focus {
  color: #fff;
}

.progress {
  color: #fff;
  text-align: center;
  background: #1c1c2f;
  border-radius: 5px;
  padding: 5px 10px;
  display: block;
  position: relative;
  overflow: hidden;
  box-shadow: inset 3px 3px 5px #00000080;
}

.progress > .progress_bar_part {
  transform-origin: 0 0;
  z-index: 1;
  background: #4049ca;
  animation: 1s ease-out both grow;
  display: block;
  position: absolute;
  inset: 0;
  box-shadow: inset 3px 3px 5px #00000080;
}

.progress > span {
  z-index: 2;
  display: block;
  position: relative;
}

@keyframes grow {
  0% {
    transform: scale(0, 1);
  }
}

#level-recording-container {
  text-align: center;
  max-width: 400px;
  margin: 40px;
}

#level-recording-container img, #level-recording-container video {
  max-width: 100%;
  height: auto;
}

#level-recording-container a {
  display: block;
}

#level-recording-container a video {
  border-radius: 10px;
  outline: 1px solid #fff;
  margin: 20px auto;
  display: block;
  box-shadow: 2px 2px 5px #000;
}

@media (width >= 1200px) {
  #level-recording-container {
    max-width: calc(50vw - 305px);
    position: absolute;
    top: 40px;
    left: 40px;
  }
}

.histogram {
  align-items: stretch;
  gap: 10px;
  margin: 10px 0 40px;
  display: flex;
}

.histogram > span {
  flex-direction: column;
  flex-grow: 1;
  justify-content: flex-end;
  width: 10px;
  display: flex;
  position: relative;
}

.histogram > span.active > span {
  background: #4049ca;
}

.histogram > span > span {
  background: #1c1c2f;
  border-radius: 5px;
  width: 100%;
  min-height: 1px;
  display: block;
}

.histogram > span > span > span {
  pointer-events: none;
  white-space: nowrap;
  transform-origin: 0 100%;
  text-align: center;
  font-size: 13px;
  display: block;
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translate(-50%);
}

.histogram > span:not(:hover):not(.active) > span > span {
  opacity: 0;
}

h2.histogram-title {
  color: #3b3f75;
  font-size: 18px;
}

h2.histogram-title strong {
  color: #4049ca;
}
</style>

    <span class="progress_bar_part" style="${getDelay()}"></span>

    const nextUnlock = list.find((u)=>u.threshold > endTs);

        });

        if (saveStats) localStorage.setItem("breakout_71_runs_history", JSON.stringify(runsHistory, null, 2));

            let values = runsHistory.map((h)=>getter(h) || 0);
            let min = Math.min(...values);
            let max = Math.max(...values);
            // No point
            if (min === max) return "";
            if (max - min < 10) {
                // This is mostly useful for levels
                min = Math.max(0, max - 10);
                max = Math.max(max, min + 10);
            }
            // One bin per unique value, max 10
            const binsCount = Math.min(values.length, 10);
            if (binsCount < 3) return "";
            const bins = [];
            const binsTotal = [];
            for(let i = 0; i < binsCount; i++){
                bins.push(0);
                binsTotal.push(0);
            }
            const binSize = (max - min) / bins.length;
            const binIndexOf = (v)=>Math.min(bins.length - 1, Math.floor((v - min) / binSize));
            values.forEach((v)=>{
                if (isNaN(v)) return;
                const index = binIndexOf(v);
                bins[index]++;
                binsTotal[index] += v;
            });
            if (bins.filter((b)=>b).length < 3) return "";
            const maxBin = Math.max(...bins);
            const lastValue = values[values.length - 1];
            const activeBin = binIndexOf(lastValue);
            const bars = bins.map((v, vi)=>{
                const style = `height: ${v / maxBin * 80}px`;
                return `<span class="${vi === activeBin ? "active" : ""}"><span style="${style}" title="${v} run${v > 1 ? "s" : ""} between ${Math.floor(min + vi * binSize)} and ${Math.floor(min + (vi + 1) * binSize)}${unit}"
              ><span>${!v && " " || vi == activeBin && lastValue + unit || Math.round(binsTotal[vi] / v) + unit}</span></span></span>`;
