<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Breakout 71</title>
    <meta name="description" content="A breakout game with roguelite mechanics. Break bricks, catch coins, pick upgrades, repeat. Play for free on mobile and desktop.">

    <style>* {
  box-sizing: border-box;
  font-family: Courier New, Courier, Lucida Sans Typewriter, Lucida Typewriter, monospace;
}

body {
  width: 100vw;
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  color: #fff;
  background-size: 120px 120px;
  background-color: var(--background1);
  --background1: #030c23;
  --background2: #03112a;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#game {
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  width: 100vw;
  position: fixed;
  top: 0;
  left: 0;
}

canvas:not(#game) {
  display: none;
}

#score, #menu {
  z-index: 1;
  appearance: none;
  font: inherit;
  color: #fff;
  min-width: 40px;
  max-width: calc(100vw - 80px);
  min-height: 40px;
  text-shadow: 0 0 4px var(--level-background);
  background: none;
  border: none;
  padding: 10px;
  line-height: 20px;
  position: absolute;
  top: 0;
  overflow: hidden;
}

#score:hover, #menu:hover, #score:focus, #menu:focus {
  cursor: pointer;
  background: #0000004d;
}

#score {
  color: #fff;
  transition: color .3s;
  right: 0;
}

#score.active .score {
  color: gold;
  transition: color 10ms;
}

#score.computer_controlled {
  pointer-events: none;
}

#score span {
  color: #fffc;
}

#score span.great {
  color: #90ee90;
}

#score span.good, #score span.bad {
  color: #fff;
}

#menu {
  left: 0;
}

body.has-alert-open {
  height: auto;
  overflow: visible;
}

body:not(.has-alert-open) #popup {
  display: none;
}

#popup {
  display: flex;
  overflow: auto;
}

#popup:before {
  z-index: 10;
  content: "";
  background: #000000e6;
  display: block;
  position: fixed;
  inset: 0;
}

#popup > div {
  z-index: 11;
  transform-origin: center;
  flex-direction: column;
  align-items: stretch;
  width: 100%;
  max-width: 500px;
  margin: auto;
  padding: 20px 10px;
  display: flex;
  position: relative;
}

#popup > div > * {
  margin: 0 0 20px;
  padding: 0;
}

#popup > div > section {
  flex-direction: column;
  align-items: stretch;
  display: flex;
}

#popup > div > section button {
  font: inherit;
  color: #fff;
  cursor: pointer;
  text-align: left;
  background: #000c;
  border: 1px solid #fff;
  gap: 10px;
  margin-top: -1px;
  padding: 10px;
  display: flex;
}

#popup > div > section button:not([disabled]):hover, #popup > div > section button:not([disabled]):focus {
  z-index: 1;
  border-color: #f1d33b;
  position: relative;
}

#popup > div > section button[disabled] {
  opacity: .5;
  filter: saturate(0);
  cursor: not-allowed;
}

#popup > div > section button > div {
  flex-grow: 1;
}

#popup > div > section button > div > em {
  opacity: .8;
  display: block;
}

#popup > div > section button.grey-out-unless-hovered:not(:hover) {
  opacity: .6;
}

#popup > div > section button.grey-out-unless-hovered:not(:hover) img {
  filter: saturate(0);
}

#popup > div > section button.grey-out-unless-hovered[disabled] {
  opacity: .2;
}

#popup.actionsAsGrid > div {
  max-width: none;
}

#popup.actionsAsGrid > div > div, #popup.actionsAsGrid > div > p, #popup.actionsAsGrid > div > h1, #popup.actionsAsGrid > div > h2 {
  width: 100%;
  max-width: 550px;
  margin-left: auto;
  margin-right: auto;
}

#popup.actionsAsGrid > div section {
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  display: grid;
}

#popup button#close-modale {
  color: #fff;
  cursor: pointer;
  z-index: 12;
  background: none;
  border: none;
  width: 60px;
  height: 60px;
  position: fixed;
  top: 0;
  right: 0;
  overflow: hidden;
}

#popup button#close-modale:before {
  content: "+";
  font-size: 80px;
  display: inline-block;
  position: absolute;
  top: 34px;
  left: 26px;
  transform: translate(-50%, -50%)rotate(45deg);
}

#popup button#close-modale:hover {
  background: #000;
  font-weight: bold;
}

#popup .textAfterButtons {
  color: #ffffff94;
}

#popup a[href] {
  color: inherit;
}

#popup a[href]:hover, #popup a[href]:focus {
  color: #fff;
}

@media (width >= 1400px) {
  #popup.settings:before {
    opacity: 0;
  }

  #popup.settings > div {
    max-width: 400px;
    margin-right: 0;
  }
}

.progress {
  color: #fff;
  text-align: center;
  background: #1c1c2f;
  border-radius: 5px;
  padding: 5px 10px;
  display: block;
  position: relative;
  overflow: hidden;
  box-shadow: inset 3px 3px 5px #00000080;
}

.progress > .progress_bar_part {
  transform-origin: 0 0;
  z-index: 1;
  background: #4049ca;
  animation: 1s ease-out both grow;
  display: block;
  position: absolute;
  inset: 0;
  box-shadow: inset 3px 3px 5px #00000080;
}

.progress > span {
  z-index: 2;
  display: block;
  position: relative;
}

@keyframes grow {
  0% {
    transform: scale(0, 1);
  }
}

#level-recording-container {
  text-align: center;
  max-width: 400px;
  margin: 40px;
}

#level-recording-container video {
  max-width: 100%;
  height: auto;
}

#level-recording-container a {
  display: block;
}

#level-recording-container a video {
  border-radius: 10px;
  outline: 1px solid #fff;
  margin: 20px auto;
  display: block;
  box-shadow: 2px 2px 5px #000;
}

.histogram {
  align-items: stretch;
  gap: 10px;
  margin: 10px 0 40px;
  display: flex;
}

.histogram > span {
  flex-direction: column;
  flex-grow: 1;
  justify-content: flex-end;
  width: 10px;
  display: flex;
  position: relative;
}

.histogram > span.active > span {
  background: #4049ca;
}

.histogram > span > span {
  background: #1c1c2f;
  border-radius: 5px;
  width: 100%;
  min-height: 1px;
  display: block;
}

.histogram > span > span > span {
  pointer-events: none;
  white-space: nowrap;
  transform-origin: 0 100%;
  text-align: center;
  font-size: 13px;
  display: block;
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translate(-50%);
}

.histogram > span:not(:hover):not(.active) > span > span {
  opacity: 0;
}

h2.histogram-title {
  color: #3b3f75;
  font-size: 18px;
}

h2.histogram-title strong {
  color: #4049ca;
}

.red-icon {
  background: red;
}

.red-icon img {
  filter: saturate(0);
  mix-blend-mode: luminosity;
}

.upgrade {
  gap: 2px;
  margin: 0 0 10px;
  display: flex;
}

.upgrade img {
  width: 32px;
  height: 32px;
}

.upgrade p {
  color: #fff9;
  flex-grow: 1;
  margin: 0 20px;
}

.upgrade.used p strong {
  color: #fff;
}

.upgrade > span {
  flex-grow: 0;
  flex-shrink: 0;
  align-self: center;
  width: 5px;
  height: 32px;
  display: inline-block;
}

.upgrade > span.used {
  background: #fff;
}

.upgrade > span.free {
  opacity: .25;
  background: #fff;
}

.upgrade > span.banned {
  background: red;
}

.upgrade.used {
  opacity: 1;
}

.upgrade.free, .upgrade.banned {
  opacity: .8;
}

#tooltip {
  color: #fff;
  z-index: 11;
  pointer-events: none;
  user-select: none;
  opacity: 1;
  background: #000;
  border: 1px solid #fff;
  border-radius: 2px;
  max-width: 300px;
  padding: 10px;
  display: block;
  position: fixed;
  top: 0;
  left: 0;
}

#popup.history > div {
  max-width: none;
}

#popup.history > div table th:hover {
  cursor: pointer;
  background: #000;
}

#popup.history > div table td, #popup.history > div table th {
  text-align: right;
  padding: 0 5px;
  line-height: 20px;
}

#popup.history > div table th:first-child, #popup.history > div table td:first-child {
  text-align: left;
}

#popup.history > div table img {
  pointer-events: none;
  width: 20px;
  height: auto;
}

#popup.history > div table tr:nth-child(2n) {
  background: #00000094;
}

.progress-inline {
  background: gray;
  border-radius: 2px;
  height: 7px;
  display: block;
  position: absolute;
  bottom: 2px;
  left: 62px;
  right: 2px;
}

.progress-inline span {
  transform-origin: 0 0;
  background: #fff;
  position: absolute;
  inset: 1px;
}

.toast {
  opacity: .8;
  pointer-events: none;
  background: #000;
  border: 1px solid #fff;
  border-radius: 2px;
  align-items: center;
  gap: 10px;
  padding-right: 10px;
  transition: opacity .2s, transform .2s;
  display: flex;
  position: fixed;
  top: 40px;
  left: 0;
}

.toast.hidden {
  opacity: 0;
  transform: translate(-20px, -20px)scale(.5);
}

.toast.visible {
  opacity: .8;
  transform: none;
}

.gridEdit > div > span, .palette > span {
  cursor: pointer;
  border: 1px solid;
  justify-content: center;
  align-items: center;
  width: 40px;
  height: 40px;
  display: inline-flex;
}

.gridEdit > div > span:hover, .palette > span:hover {
  z-index: 1;
  border-color: gold;
  position: relative;
  box-shadow: inset 2px 2px 4px #0003;
}

.gridEdit > div {
  display: flex;
}

.gridEdit > div > span {
  width: calc(min(500px, 100vw, 100vh - 200px) / var(--grid-size));
  height: calc(min(500px, 100vw, 100vh - 200px) / var(--grid-size));
}

.palette {
  flex-wrap: wrap;
  display: flex;
}

.palette > span[data-selected="true"] {
  border: 2px solid #fff;
}

rick every time. \\n\\n## Aiming\\n\\nOnly the ball position on the paddle decides how it will bounce.\\nIf the ball hits the paddle dead center, it will bounce back up vertically. \\nIf you hit more on one side, it will have more angle. \\nThe paddle speed and incoming angle have no impact on the ball direction after bouncing.\\n\\nMany upgrades that help with aiming can be unlocked.\\n\\n## Unlocks\\n\\nWhen playing Breakout 71 for the first time, most upgrades and levels are locked. \\nUpgrades are unlocked by simply playing and catching many coins. \\nThe first levels are unlocked by reaching a high score.\\nLater levels add a condition about which perks you can select. \\n\\nReach high scores is much easier when you get multiple upgrades after each level. \\n\\n## Re-rolls and free upgrades\\n\\nYou'll get an extra upgrade to pick when you play well : \\n\\n- Clear the level under {{levelTimeGood}} seconds\\n- Hit the sides or top less than {{wallBouncedGood}} times\\n- Catch {{catchRateGood}}% of coins\\n- Miss the bricks less than {{missesGood}} times \\n\\nYou will also get a re-roll that lets you skip upgrades if you do even better :  \\n\\n-  Clear a level under {{levelTimeBest}} seconds\\n- Hit the sides or top less than {{wallBouncedBest}} times\\n- Catch {{catchRateBest}}% of coins\\n- Miss the bricks less than {{missesBest}} times \\n\\nAn option in the settings lets you display those statistics\",\"help.help\":\"Learn more about the game\",\"help.levels\":\"Levels\",\"help.title\":\"Help\",\"help.upgrades\":\"## Upgrades\",\"history.columns.score\":\"Score\",\"history.columns.started\":\"Date\",\"history.help\":\"See your {{count}} best games.\",\"history.locked\":\"Play at least ten games to unlock\",\"history.title\":\"Runs history\",\"lab.help\":\"Try any build you want\",\"lab.instructions\":\"Select upgrades below, then pick a level to play. \",\"lab.menu_entry\":\"Creative mode\",\"lab.reset\":\"Reset all to 0\",\"lab.select_level\":\"Select a level to play on\",\"lab.unlocks_at\":\"Unlocks at total score {{score}}\",\"level_up.after_buttons\":\"You just finished level {{level}}/{{max}}.\",\"level_up.before_buttons\":\"You caught {{score}} coins {{catchGain}} out of {{levelSpawnedCoins}} in {{time}} seconds {{timeGain}}.\\n\\nYou missed {{levelMisses}} times {{missesGain}} and hit the walls or ceiling {{levelWallBounces}} times{{wallHitsGain}}.\\n\\n{{compliment}}\",\"level_up.compliment_advice\":\"Try to catch all coins, never miss the bricks, never hit the walls/ceiling or clear the level under 30s to gain additional upgrades.\",\"level_up.compliment_good\":\"Well done !\",\"level_up.compliment_perfect\":\"Impressive, keep it up !\",\"level_up.pick_upgrade_title\":\"Pick an upgrade\",\"level_up.plus_one_upgrade\":\"(+1  upgrade)\",\"level_up.plus_one_upgrade_and_reroll\":\"(+1 upgrade and  +1 re-roll)\",\"level_up.reroll\":\"Re-roll ({{count}})\",\"level_up.reroll_help\":\"Offer new choices\",\"level_up.upgrade_perk_to_level\":\"  lvl {{level}}\",\"main_menu.basic\":\"\",\"main_menu.basic_help\":\"\",\"main_menu.colorful_coins\":\"\",\"main_menu.colorful_coins_help\":\"\",\"main_menu.comboIncreaseTexts\":\"\",\"main_menu.comboIncreaseTexts_help\":\"\",\"main_menu.contrast\":\"\",\"main_menu.contrast_help\":\"\",\"main_menu.credit_levels\":\"\",\"main_menu.donate\":\"You've played for {{hours}} hours\",\"main_menu.donate_help\":\"How about donating? You can hide this reminder in the settings. \",\"main_menu.donation_reminder\":\"\",\"main_menu.donation_reminder_help\":\"\",\"main_menu.download_save_file\":\"\",\"main_menu.download_save_file_help\":\"\",\"main_menu.extra_bright\":\"\",\"main_menu.extra_bright_help\":\"\",\"main_menu.fullscreen\":\"\",\"main_menu.fullscreen_help\":\"\",\"main_menu.help_content\":\"\",\"main_menu.help_help\":\"\",\"main_menu.help_title\":\"\",\"main_menu.help_upgrades\":\"\",\"main_menu.high_score\":\"High score : {{score}}\",\"main_menu.kid\":\"\",\"main_menu.kid_help\":\"\  coins on screen maximum\",\"settings.max_coins_help\":\"Cosmetic only, no effect on score\",\"settings.mobile\":\"Mobile mode\",\"settings.mobile_help\":\"Leaves space under the paddle.\",\"settings.pointer_lock\":\"Mouse pointer lock\",\"settings.pointer_lock_help\":\"Locks and hides the mouse cursor.\",\"settings.record\":\"Record gameplay videos\",\"settings.record_download\":\"Download video ({{size}} MB)\",\"settings.record_help\":\"Get a video of each level.\",\"settings.red_miss\":\"Miss warning\",\"settings.red_miss_help\":\"Show red particles around balls going down without a hit.\",\"settings.reset\":\"Reset Game\",\"settings.reset_cancel\":\"No\",\"settings.reset_confirm\":\"Yes\",\"settings.reset_help\":\"Erase high score, play time and statistics\",\"settings.reset_instruction\":\"You will lose all progress you made in the game, are you sure?\",\"settings.save_file_error\":\"Error loading save file\",\"settings.save_file_loaded\":\"Save file loaded\",\"settings.save_file_loaded_help\":\"The app will now reload to apply your save\",\"settings.save_file_loaded_ok\":\"Ok\",\"settings.show_fps\":\"FPS counter\",\"settings.show_fps_help\":\"Monitor the app's performance\",\"settings.show_stats\":\"Show real time stats\",\"settings.show_stats_help\":\"Coins, time, bounces, misses\",\"settings.sounds\":\"Game sounds\",\"settings.sounds_help\":\"Can slow down some phones.\",\"starting_perks.checked\":\"When you start a new game, one of those perks will be given to you. Click a perk to exclude it. \",\"starting_perks.help\":\"Choose possible starting upgrades\",\"starting_perks.random\":\"All benefits have been removed, the choice will be random.\",\"starting_perks.title\":\"Starting perks\",\"starting_perks.unchecked\":\"The perks below are not offered as starting perks, but you can click to add them to the pool. \",\"unlocks.greyed_out_help\":\"The grayed out upgrades can be unlocked by increasing your total score. The total score increases every time you score in game.\",\"unlocks.intro\":\"Your total score is {{ts}}. Below are all the upgrades and levels the games has to offer.   Click an upgrade or level below to start a test game with it.\",\"unlocks.just_unlocked\":\"Level unlocked\",\"unlocks.just_unlocked_plural\":\"You just unlocked {{count}} levels\",\"unlocks.level\":\"<h2>You unlocked {{unlocked}} levels out of {{out_of}}</h2>\\n<p>Here are all the game levels, click one to try it out.</p> \",\"unlocks.level_description\":\"A {{size}}x{{size}} level with {{bricks}} bricks, {{colors}} colors and {{bombs}} bombs.\",\"unlocks.minScore\":\"Reach ${{minScore}} in a run to unlock.\",\"unlocks.minScoreWithPerks\":\"Reach ${{minScore}} in a run with {{required}} but without {{forbidden}} to unlock.\",\"unlocks.minTotalScore\":\"Accumulate a total of ${{score}}\",\"unlocks.reached\":\"Your best score was {{reached}}.\",\"unlocks.title_upgrades\":\"You unlocked {{unlocked}} upgrades out of {{out_of}}\",\"upgrades.addiction.name\":\"Addiction\",\"upgrades.addiction.tooltip\":\"+{{lvl}} combo / brick, combo resets {{delay}}s after breaking a brick. \",\"upgrades.addiction.verbose_description\":\"The countdown only starts after breaking the first brick of each level. It stops as soon as all bricks are destroyed.\",\"upgrades.asceticism.name\":\"Asceticism\",\"upgrades.asceticism.tooltip\":\"+{{combo}} combo / brick,  - {{combo}} on coin catch\",\"upgrades.asceticism.verbose_description\":\"You'll need to store the coins somewhere while your combo climbs. \",\"upgrades.ball_attract_ball.help_plural\":\"Stronger attraction force\",\"upgrades.ball_attract_ball.name\":\"Gravity\",\"upgrades.ball_attract_ball.tooltip\":\"Balls attract balls\",\"upgrades.ball_attract_ball.verbose_description\":\"Balls that are more than \\\"3/4 of the game area width\\\" away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.\",\"upgrades.ball_attracts_coins.name\":\"Balls attract coins\",\"upgrades.ball_attracts_coins.tooltip\":\"Coins follow the nearest ball and fall down slower\",\"upgrades.ball_attracts_coins.verbose_description\":\"This could be used to \\\"paint around\\\" the balls with coins if you combined it with \\\"stain\\\" and \\\"ghost coins\\\". It also works as a substitute for coin magnet. \",\"upgrades.ball_repulse_ball.help_plural\":\"Stronger repulsion force\",\"upgrades.ball_repulse_ball.name\":\"Personal space\",\"upgrades.ball_repulse_ball.tooltip\":\"Balls repulse balls\",\"upgrades.ball_repulse_ball.verbose_description\":\"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.\",\"upgrades.base_combo.name\":\"Strong foundations\",\"upgrades.base_combo.tooltip\":\"Combo starts at {{coins}} instead of 1.\",\"upgrades.base_combo.verbose_description\":\"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you'll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.\",\"upgrades.bigger_explosions.name\":\"Kaboom\",\"upgrades.bigger_explosions.tooltip\":\"Bigger explosions\",\"upgrades.bigger_explosions.verbose_description\":\"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)\",\"upgrades.bigger_puck.name\":\"Bigger paddle\",\"upgrades.bigger_puck.tooltip\":\"Easily catch more coins.\",\"upgrades.bigger_puck.verbose_description\":\"A bigger paddle makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball's angle only depends on where it hits the paddle). \",\"upgrades.bricks_attract_ball.name\":\"Bricks attract balls\",\"upgrades.bricks_attract_ball.tooltip\":\"Ball goes toward the first {{count}} bricks it will hit.\",\"upgrades.bricks_attract_ball.verbose_description\":\"The effect is stronger at higher levels. The number of bricks that can hit before the effect stops is also higher. The effect rearms when the ball hits the puck.\",\"upgrades.bricks_attract_coins.name\":\"Bricks attract coins\",\"upgrades.bricks_attract_coins.tooltip\":\"Helps them stay up there\",\"upgrades.bricks_attract_coins.verbose_description\":\"\",\"upgrades.clairvoyant.name\":\"Clairvoyant\",\"upgrades.clairvoyant.tooltip\":\"See upcoming levels, bricks HP and ball direction\",\"upgrades.clairvoyant.verbose_description\":\"Helps you pick the right upgrades and understand what's going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)\",\"upgrades.coin_magnet.help_plural\":\"Stronger effect on the coins\",\"upgrades.coin_magnet.name\":\"Coins magnet\",\"upgrades.coin_magnet.tooltip\":\"Paddle attracts coins\",\"upgrades.coin_magnet.verbose_description\":\"Directs the coins to the paddle. The effect is stronger if the coin is close to it already.\",\"upgrades.compound_interest.name\":\"Compound interest\",\"upgrades.compound_interest.tooltip\":\"+{{lvl}} combo per brick broken, resets on coin lost\",\"upgrades.compound_interest.verbose_description\":\"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\nBe sure however to catch every one of those coins with your paddle, as any lost coin will reset your combo.\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.\",\"upgrades.concave_puck.name\":\"Concave paddle\",\"upgrades.concave_puck.tooltip\":\"Improves vertical aiming precision\",\"upgrades.concave_puck.verbose_description\":\"Balls starts the level going straight up, and bounces with less angle.\",\"upgrades.corner_shot.name\":\"Corner shot\",\"upgrades.corner_shot.tooltip\":\"Lets your paddle overlap with the borders of the screen\",\"upgrades.corner_shot.verbose_description\":\"Helps with aiming in the corners. Further levels let you go further out. \",\"upgrades.etherealcoins.name\":\"Coins, in Space\",\"upgrades.etherealcoins.tooltip\":\"Coins are no  longer affected by gravity\",\"upgrades.etherealcoins.verbose_description\":\"The coins will maintain their speed even after several bounces, and will no longer be affected by gravity.\",\"upgrades.extra_levels.name\":\"5 min more\",\"upgrades.extra_levels.tooltip\":\"Play {{count}} levels instead of 7\",\"upgrades.extra_levels.verbose_description\":\"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.\",\"upgrades.extra_life.help_plural\":\"Your (last) ball will bounce on the bottom instead of being lost ({{lvl}}  times).\",\"upgrades.extra_life.name\":\"Extra Life\",\"upgrades.extra_life.tooltip\":\"The ball will bounce once on the bottom line before being lost.\",\"upgrades.extra_life.verbose_description\":\"Normally, you have one ball, and the game is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou'll lose one level of that perk every time a ball bounces at the bottom of the screen.\",\"upgrades.forgiving.name\":\"Forgiving\",\"upgrades.forgiving.tooltip\":\"Missing breaks reduces combo progressively instead of all at once.\",\"upgrades.forgiving.verbose_description\":\"The first miss per level is free, then 10% of the combo, then 20% .. \",\"upgrades.fountain_toss.name\":\"Fountain toss\",\"upgrades.fountain_toss.tooltip\":\"Gain some combo when you miss some coins. \",\"upgrades.fountain_toss.verbose_description\":\"When you miss a coin and your combo was under {{max}}, your combo has a probability of {{lvl}}/combo to grow by one.\",\"upgrades.ghost_coins.name\":\"Ghost coins\",\"upgrades.ghost_coins.tooltip\":\"Coins slowly pass through bricks\",\"upgrades.ghost_coins.verbose_description\":\"It's not a bug, it's a feature !  Coins fly through bricks slowly. Higher levels let them move faster. \",\"upgrades.helium.name\":\"Helium\",\"upgrades.helium.tooltip\":\"Gravity reversed left and right of paddle\",\"upgrades.helium.verbose_description\":\"This affects the coins  and will let the float up until you are ready to pick them up.\",\"upgrades.hot_start.name\":\"Hot start\",\"upgrades.hot_start.tooltip\":\"Start at combo {{start}}, -{{loss}} combo per second\",\"upgrades.hot_start.verbose_description\":\"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one. The effect stacks with other perks. \",\"upgrades.hypnosis.name\":\"Hypnosis\",\"upgrades.hypnosis.tooltip\":\"Whenever a brick changes color, teleport that coin to the nearest ball and recharge its ability to stain a brick. \",\"upgrades.hypnosis.verbose_description\":\"\",\"upgrades.implosions.name\":\"Implosions\",\"upgrades.implosions.tooltip\":\"Explosions suck coins in instead of blowing them out\",\"upgrades.implosions.verbose_description\":\"The explosion force is applied the other way. Further levels act as \\\"bigger explosion\\\"\",\"upgrades.instant_upgrade.name\":\"Instant upgrade\",\"upgrades.instant_upgrade.tooltip\":\"+2 upgrade now, -1 choice until game end.\",\"upgrades.instant_upgrade.verbose_description\":\"Immediately pick two upgrades, so that you get one free one and one to repay the one used to get this perk. Every further menu to pick upgrades will have fewer options to choose from.\",\"upgrades.left_is_lava.name\":\"Avoid left side\",\"upgrades.left_is_lava.tooltip\":\"+{{lvl}} combo per brick broken. Combo resets if ball hits the left side of the screen\",\"upgrades.left_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one, so you'll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n\",\"upgrades.limitless.name\":\"Limitless\",\"upgrades.limitless.tooltip\":\"Raise all upgrade's maximum level by {{lvl}} \",\"upgrades.limitless.verbose_description\":\"Choosing this perk also raises his own limit by one, letting you pick it again.\",\"upgrades.metamorphosis.name\":\"Metamorphosis\",\"upgrades.metamorphosis.tooltip\":\"Each coin can stain {{lvl}} brick(s) with its color\",\"upgrades.metamorphosis.verbose_description\":\"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. Coins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\\"paint\\\". At level 1, each coin can color 1 bricks before it is \\\"spent\\\" and appears hollow. \",\"upgrades.minefield.name\":\"Minefield\",\"upgrades.minefield.tooltip\":\"+{{lvl}} combo per bomb brick on screen\",\"upgrades.minefield.verbose_description\":\"Adds +lvl to the combo when a brick is place, -lvl when it is destroyed, and raises the base combo by the number of bricks times lvl\",\"upgrades.multiball.name\":\"Multi ball\",\"upgrades.multiball.tooltip\":\"Start every levels with {{count}} balls.\",\"upgrades.multiball.verbose_description\":\"As soon as you drop the ball in Breakout 71, you lose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.\",\"upgrades.nbricks.name\":\"Strict sample size\",\"upgrades.nbricks.tooltip\":\"Hit exactly {{lvl}} bricks per paddle bounce for +{{lvl}} combo, otherwise it resets\",\"upgrades.nbricks.verbose_description\":\"You don't necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don't count\",\"upgrades.one_more_choice.name\":\"Extra choice\",\"upgrades.one_more_choice.tooltip\":\"Further level ups will offer {{lvl}} more option(s) in the list\",\"upgrades.one_more_choice.verbose_description\":\"Every upgrade menu will have one more option.  Doesn't increase the number of upgrades you can pick.\",\"upgrades.passive_income.name\":\"Passive income\",\"upgrades.passive_income.tooltip\":\"+{{lvl}} combo / brick, unless the paddle moved in the last {{time}}s, then it resets instead\",\"upgrades.passive_income.verbose_description\":\"Some perks can help the balls do what you want without needing to do anything.\",\"upgrades.picky_eater.name\":\"Picky eater\",\"upgrades.picky_eater.tooltip\":\"+{{lvl}} combo per brick broken, resets on ball color change\",\"upgrades.picky_eater.verbose_description\":\"Whenever you break a brick the same color as your ball, your combo increases by one. \\nIf it's a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball's color. \\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red border. \\nIf you have more than one ball, they all switch color whenever one of them hits a brick.\",\"upgrades.pierce.name\":\"Piercing\",\"upgrades.pierce.tooltip\":\"Ball pierces {{count}} bricks after a paddle bounce\",\"upgrades.pierce.verbose_description\":\"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\n\\nAfter that, it will bounce on the 4th brick, and you'll need to touch the paddle to reset the counter.\",\"upgrades.pierce_color.name\":\"Color pierce\",\"upgrades.pierce_color.tooltip\":\"+{{lvl}} damage to bricks of the ball's color\",\"upgrades.pierce_color.verbose_description\":\"Whenever a ball hits a brick of the same color, it will just go through unimpeded. \\n\\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\n\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.\",\"upgrades.puck_repulse_ball.help_plural\":\"Stronger repulsion force\",\"upgrades.puck_repulse_ball.name\":\"Soft landing\",\"upgrades.puck_repulse_ball.tooltip\":\"Paddle repulses balls\",\"upgrades.puck_repulse_ball.verbose_description\":\"When a ball gets close to the paddle, it will start slowing down, and even potentially bouncing without touching the paddle.\",\"upgrades.rainbow.name\":\"Rainbow\",\"upgrades.rainbow.tooltip\":\"Coins spawn with rainbow color.\",\"upgrades.rainbow.verbose_description\":\"Each level increases the proportion of colored coins. The color depends on level time. \",\"upgrades.reach.name\":\"Top down\",\"upgrades.reach.tooltip\":\" Touching the N bricks of the lowest row resets the combo. Otherwise, +N combo\",\"upgrades.reach.verbose_description\":\"If there is only one row of bricks, or if the lowest row of bricks cover the whole width of the game,  then this perk does nothing. Otherwise, breaking this lowest row resets the combo, while breaking anything else increases the combo by the number of bricks present on that lowest row. \\n\\nThe lowest row will be highlighted in red. \",\"upgrades.respawn.name\":\"Re-spawn\",\"upgrades.respawn.tooltip\":\"{{percent}}% of bricks re-spawn after {{delay}}s.\",\"upgrades.respawn.verbose_description\":\"Some particle effect will let you know where bricks will appear. \",\"upgrades.right_is_lava.name\":\"Avoid right side\",\"upgrades.right_is_lava.tooltip\":\"+{{lvl}} combo per brick. Combo resets if ball hits the right side of the screen\",\"upgrades.right_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one, so you'll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n\",\"upgrades.sacrifice.help_l1\":\"Loosing a life clears all bricks\",\"upgrades.sacrifice.help_over\":\"Loosing a life {{lvl}}x the combo then clears all bricks\",\"upgrades.sacrifice.name\":\"Sacrifice\",\"upgrades.sacrifice.verbose_description\":\"This might get the combo pretty high.\",\"upgrades.sapper.help_plural\":\"The first {{lvl}} bricks broken become bombs.\",\"upgrades.sapper.name\":\"Sapper\",\"upgrades.sapper.tooltip\":\"The first brick broken becomes a bomb.\",\"upgrades.sapper.verbose_description\":\"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the paddle re-arms the effect. Leveling-up this perk will allow you to place more bombs.\",\"upgrades.shocks.name\":\"Shocks\",\"upgrades.shocks.tooltip\":\"Explosive balls collisions\",\"upgrades.shocks.verbose_description\":\"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separate them. \",\"upgrades.shunt.name\":\"Shunt\",\"upgrades.shunt.tooltip\":\"Keep {{percent}}% of your combo between levels\",\"upgrades.shunt.verbose_description\":\"If you also have hot start, the hot start is just added to the current combo\",\"upgrades.side_flip.name\":\"Right handed\",\"upgrades.side_flip.tooltip\":\"+{{lvl}} combo per brick broken from the right, -{{loss}} otherwise\",\"upgrades.side_flip.verbose_description\":\"Impact the brick on its right side to gain one combo, but avoid hitting it on the left side as the would remove 2 combo. Hitting from the top and bottom has no effect. \",\"upgrades.side_kick.name\":\"Left handed\",\"upgrades.side_kick.tooltip\":\"+{{lvl}} combo per brick broken from the left, -{{loss}} otherwise\",\"upgrades.side_kick.verbose_description\":\"Impact the brick on its left side to gain one combo, but avoid hitting it on the right side as the would remove 2 combo. Hitting from the top and bottom has no effect. \",\"upgrades.skip_last.help_plural\":\"The last {{lvl}}  bricks will explode.\",\"upgrades.skip_last.name\":\"Easy Cleanup\",\"upgrades.skip_last.tooltip\":\"The last brick will explode.\",\"upgrades.skip_last.verbose_description\":\"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\n\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help.\",\"upgrades.slow_down.name\":\"Slower ball\",\"upgrades.slow_down.tooltip\":\"Ball moves more slowly\",\"upgrades.slow_down.verbose_description\":\"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.\",\"upgrades.smaller_puck.help_plural\":\"Even smaller paddle and higher base combo\",\"upgrades.smaller_puck.name\":\"Smaller paddle\",\"upgrades.smaller_puck.tooltip\":\"Also gives +5 base combo\",\"upgrades.smaller_puck.verbose_description\":\"This makes the paddle smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat's why you also get a nice bonus of +5 coins per brick for all bricks you'll break after picking this. \",\"upgrades.soft_reset.name\":\"Soft reset\",\"upgrades.soft_reset.tooltip\":\"Combo resets keeps {{percent}}%\",\"upgrades.soft_reset.verbose_description\":\"Limit the impact of a combo reset.\",\"upgrades.streak_shots.name\":\"Hit streak\",\"upgrades.streak_shots.tooltip\":\"More coins if you break many bricks before bouncing on the paddle.\",\"upgrades.streak_shots.verbose_description\":\"Every time you break a brick, your combo increases by one. \\n\\nHowever, as soon as the ball touches your paddle, the combo is reset to its default value.\\n\\nOnce your combo rises above the base value, your paddle will have a red border to remind you that it will destroy your combo to touch it with the ball.\",\"upgrades.sturdy_bricks.name\":\"Sturdy bricks\",\"upgrades.sturdy_bricks.tooltip\":\"+{{lvl}} bricks HP, +{{percent}}% coins spawned when broken\",\"upgrades.sturdy_bricks.verbose_description\":\"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\\"clairvoyant\\\" perk. You can increase ball damage by getting the \\\"piercing\\\" perk. Each level of the perk adds +50% coins spawn. \",\"upgrades.superhot.name\":\"SUPER HOT\",\"upgrades.superhot.tooltip\":\"Time moves when the paddle moves.\",\"upgrades.superhot.verbose_description\":\"SUPER HOT SUPER HOT SUPER HOT SUPER HOT\",\"upgrades.telekinesis.help_plural\":\"Stronger effect on the ball\",\"upgrades.telekinesis.name\":\"Telekinesis\",\"upgrades.telekinesis.tooltip\":\"Paddle controls the ball's trajectory\",\"upgrades.telekinesis.verbose_description\":\"You control the ball while it's going up. \",\"upgrades.top_is_lava.name\":\"Sky is the limit\",\"upgrades.top_is_lava.tooltip\":\"+{{lvl}} combo per brick, reset when the top is hit\",\"upgrades.top_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. \",\"upgrades.trampoline.name\":\"Trampoline\",\"upgrades.trampoline.tooltip\":\"+{{lvl}} combo per paddle bounce,-{{lvl}} combo per bounce on any border\",\"upgrades.trampoline.verbose_description\":\"One of the rare  combo upgrades that don't add a reset condition\",\"upgrades.transparency.name\":\"Transparency\",\"upgrades.transparency.tooltip\":\"The higher the ball is on the screen, the more transparent it becomes. The more transparent it is, the more coins it produces.\",\"upgrades.transparency.verbose_description\":\"Higher levels make the ball transparent sooner and increase the point bonus.\",\"upgrades.trickledown.name\":\"Trickle down economics\",\"upgrades.trickledown.tooltip\":\"The coins appear at the top of the screen.\",\"upgrades.trickledown.verbose_description\":\"It might help you put some coins aside.\",\"upgrades.unbounded.name\":\"Padding\",\"upgrades.unbounded.tooltip\":\"Adds space left and right of the level, but your paddle can't go that far. \",\"upgrades.unbounded.verbose_description\":\"Another upgrade might help you extends the reach of your paddle. \",\"upgrades.viscosity.name\":\"Viscosity\",\"upgrades.viscosity.tooltip\":\"Slower coin fall\",\"upgrades.viscosity.verbose_description\":\"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin's movement.\",\"upgrades.wind.help_plural\":\"Stronger wind force\",\"upgrades.wind.name\":\"Wind\",\"upgrades.wind.tooltip\":\"Paddle position creates wind\",\"upgrades.wind.verbose_description\":\"Wind depends on paddle position: left blows left, right blows right. Affects both balls and coins.\",\"upgrades.yoyo.name\":\"Yo-yo\",\"upgrades.yoyo.tooltip\":\"Ball falls toward paddle\",\"upgrades.yoyo.verbose_description\":\"It's the opposite of telekinesis, control the ball while it's falling back down.\",\"upgrades.zen.name\":\"Zen\",\"upgrades.zen.tooltip\":\"+{{lvl}} combo per bricks, reset when there's an explosion\",\"upgrades.zen.verbose_description\":\"After all, this is a non-violent game. \"}");

confirm":"Oui","settings.reset_help":"Effacer les scores, statistiques et temps de jeu","settings.reset_instruction":"Vous perdrez tous les progr\xe8s que vous avez faits dans le jeu, \xeates-vous s\xfbr ?","settings.save_file_error":"Erreur lors du chargement du fichier de sauvegarde","settings.save_file_loaded":"Sauvegarde charg\xe9e","settings.save_file_loaded_help":"L\'appli va red\xe9marrer","settings.save_file_loaded_ok":"Ok","settings.show_fps":"Compteur de FPS","settings.show_fps_help":"Surveiller la performance du jeu","settings.show_stats":"Statistiques en temps r\xe9el","settings.show_stats_help":"Pi\xe8ces, temps, rebonds, rat\xe9s","settings.sounds":"Sons du jeu","settings.sounds_help":"Ralentis certains t\xe9l\xe9phones.","starting_perks.checked":"Lorsque vous d\xe9marrez une nouvelle partie, l\'un de ces avantages vous sera attribu\xe9. Cliquez sur un avantage pour l\'exclure.","starting_perks.help":"Choisissez les avantages de d\xe9part","starting_perks.random":"Tous les avantages ont \xe9t\xe9 retir\xe9s, le choix sera al\xe9atoire.","starting_perks.title":"Avantages de d\xe9part","starting_perks.unchecked":"Les avantages ci-dessous ne sont pas propos\xe9s comme avantages de d\xe9part, mais vous pouvez cliquer pour les ajouter aux avantages de d\xe9part possibles.","unlocks.greyed_out_help":"Les \xe9l\xe9ments gris\xe9es peuvent \xeatre d\xe9bloqu\xe9es en augmentant votre score total. Le score total augmente \xe0 chaque fois que vous marquez des points dans le jeu.","unlocks.intro":"Votre score total est de {{ts}}. Vous trouverez ci-dessous toutes les am\xe9liorations et tous les niveaux que le jeu peut offrir. Cliquez sur l\'un d\'entre eux pour les essayer dans une partie de test. ","unlocks.just_unlocked":"Niveau d\xe9bloqu\xe9","unlocks.just_unlocked_plural":"Vous venez de d\xe9bloquer {{count}} niveaux","unlocks.level":"<h2>Vous avez d\xe9bloqu\xe9 {{unlocked}} niveaux sur {{out_of}}</h2>\\n<p>Voici tous les niveaux du jeu, cliquez sur l\'un d\'eux pour l\'essayer. </p> ","unlocks.level_description":"Un niveau {{size}}x{{size}} avec {{bricks}} briques, {{colors}} couleurs et {{bombs}} bombes.","unlocks.minScore":"Atteignez un score de ${{minScore}} dans une partie pour d\xe9bloquer.","unlocks.minScoreWithPerks":"Atteignez ${{minScore}} dans une partie avec {{required}} mais sans {{forbidden}}.","unlocks.minTotalScore":"Accumuler un total de ${{score}}","unlocks.reached":"Votre meilleur score pour l\'instant est {{reached}}.","unlocks.title_upgrades":"Vous avez d\xe9bloqu\xe9 {{unlocked}} am\xe9liorations sur {{out_of}}","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brique, combo perdu apr\xe8s {{delay}}s sans casser de briques","upgrades.addiction.verbose_description":"Le d\xe9compte ne commence qu\'\xe0 parti de la  destruction de la premi\xe8re brique du niveau, et s\'arr\xeate d\xe8s qu\'il n\'y a plus de briques. ","upgrades.asceticism.name":"Asc\xe9tisme","upgrades.asceticism.tooltip":"+{{combo}} combo par brique cass\xe9e, - {{combo}} quand une pi\xe8ce est attrap\xe9e","upgrades.asceticism.verbose_description":"Il faudra trouver un moyen de stocker les pi\xe8ces pendant que le combo grandis. ","upgrades.ball_attract_ball.help_plural":"Force d\'attraction plus forte","upgrades.ball_attract_ball.name":"Gravit\xe9","upgrades.ball_attract_ball.tooltip":"Les balles attirent les balles","upgrades.ball_attract_ball.verbose_description":"Les balles qui sont \xe9loign\xe9es de plus de 3/4 de la largeur d\'\xe9cran commencent \xe0 s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus \xe9loign\xe9es l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle en jeu.","upgrades.ball_attracts_coins.name":"Balles fortun\xe9es","upgrades.ball_attracts_coins.tooltip":"Les pi\xe8ces accompagnent la balle la plus proche ","upgrades.ball_attracts_coins.verbose_description":"Vous pourriez l\'utiliser pour que les pi\xe8ces orbitent autours de la balle et colorent les briques \xe0 proximit\xe9, ou comme une sorte de coin magnet. ","upgrades.ball_repulse_ball.help_plural":"Force de r\xe9pulsion plus forte","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.ball_repulse_ball.tooltip":"Les balles repoussent les balles","upgrades.ball_repulse_ball.verbose_description":"Les balles qui se trouvent \xe0 moins d\'un quart de largeur d\'\xe9cran commencent \xe0 se repousser les unes les autres. La force de r\xe9pulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affich\xe9es pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle.","upgrades.base_combo.name":"Meilleur base","upgrades.base_combo.tooltip":"Le combo commence \xe0 {{coins}} au lieu de 1.","upgrades.base_combo.verbose_description":"Votre combo commence normalement \xe0 1 au d\xe9but du niveau et revient \xe0 1 lorsque vous rebondissez sans rien toucher. Avec cette caract\xe9ristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pi\xe8ces par brique. Lorsque votre combo est r\xe9initialis\xe9, il revient \xe0 4 et non \xe0 1.  Votre balle scintillera un peu pour indiquer que son combo est sup\xe9rieur \xe0 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosions plus violentes","upgrades.bigger_explosions.verbose_description":"L\'explosion par d\xe9faut efface un carr\xe9 de 3x3 briques, avec cette am\xe9lioration un carr\xe9 de 5x5. Le vent soufflant les pi\xe8ces est \xe9galement beaucoup plus fort. L\'\xe9cran clignotera un peu apr\xe8s chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_puck.name":"Raquette plus grande","upgrades.bigger_puck.tooltip":"Attrapez facilement plus de pi\xe8ces.","upgrades.bigger_puck.verbose_description":"Une grande raquette permet de ne jamais rater la balle et d\'attraper plus de pi\xe8ces, ainsi que d\'orienter pr\xe9cis\xe9ment les rebonds. Cependant, une grande raquette est plus difficile \xe0 utiliser sur les c\xf4t\xe9s du niveau.","upgrades.bricks_attract_ball.name":"Les briques attirent les balles","upgrades.bricks_attract_ball.tooltip":"La balle se dirige vers les {{count}} premi\xe8res briques qu\'elle touchera.","upgrades.bricks_attract_ball.verbose_description":"L\'effet est plus fort \xe0 des niveaux plus \xe9lev\xe9s. Le nombre de briques pouvant \xeatre touch\xe9es avant que l\'effet ne s\'arr\xeate est \xe9galement plus \xe9lev\xe9. L\'effet se r\xe9arme lorsque la balle touche le palet.","upgrades.bricks_attract_coins.name":"Briques attirent les pi\xe8ces","upgrades.bricks_attract_coins.tooltip":"Aide \xe0 garder les pi\xe8ces en suspension","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"R\xe9v\xe8le les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.verbose_description":"Vous aide \xe0 choisir les bonnes am\xe9liorations et \xe0 comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) am\xe8nent des informations compl\xe9mentaires d\'une utilit\xe9 douteuse. ","upgrades.coin_magnet.help_plural":"Effet plus marqu\xe9 sur les pi\xe8ces","upgrades.coin_magnet.name":"Aimant pour pi\xe8ces","upgrades.coin_magnet.tooltip":"La raquette attire les pi\xe8ces","upgrades.coin_magnet.verbose_description":"Dirige les pi\xe8ces vers la raquette. L\'effet est plus fort sur les pi\xe8ces d\xe9j\xe0 proche de la raquette. ","upgrades.compound_interest.name":"Int\xe9r\xeats compos\xe9s","upgrades.compound_interest.tooltip":"+{{lvl}} combo par brique cass\xe9e, remise \xe0 z\xe9ro quand une pi\xe8ce est perdu","upgrades.compound_interest.verbose_description":"Votre combo augmentera d\'une unit\xe9 \xe0 chaque fois que vous casserez une brique. Toute pi\xe8ce perdue remettra votre combo \xe0 z\xe9ro. \\n\\nSi votre combo est sup\xe9rieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pi\xe8ces ne doivent pas aller \xe0 cet endroit.","upgrades.concave_puck.name":"Raquette concave","upgrades.concave_puck.tooltip":"Aide \xe0 \xe9viter les bords.","upgrades.concave_puck.verbose_description":"Les balles d\xe9marrent verticalement en d\xe9but de niveau, et rebondi sur la raquette de mani\xe8re plus verticale et invers\xe9e.","upgrades.corner_shot.name":"Tir en coin","upgrades.corner_shot.tooltip":"Laisse votre raquette sortir de la zone encadr\xe9e","upgrades.corner_shot.verbose_description":"Aide \xe0 viser dans les coins","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.etherealcoins.tooltip":"Les pi\xe8ces ne subissent plus la gravit\xe9 ou la friction","upgrades.etherealcoins.verbose_description":"Les pi\xe8ces garderont leur vitesse m\xeame apr\xe8s plusieurs rebonds, et ne subirons plus la gravit\xe9. ","upgrades.extra_levels.name":"Encore 5 minutes","upgrades.extra_levels.tooltip":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.verbose_description":"La partie dure normalement 7 niveaux, apr\xe8s quoi le jeu est termin\xe9 et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette am\xe9lioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux o\xf9 vous faites le plus de points, la diff\xe9rence peut donc \xeatre spectaculaire.","upgrades.extra_life.help_plural":"La (derni\xe8re) balle rebondit en bas de l\'\xe9cran au lieu d\'\xeatre perdue ( {{lvl}} fois).","upgrades.extra_life.name":"Seconde chance","upgrades.extra_life.tooltip":"La balle rebondit une fois avant d\'\xeatre perdue.","upgrades.extra_life.verbose_description":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est termin\xe9e d\xe8s que vous la laissez tomber.\\n\\nCette comp\xe9tence ajoute une barre blanche en bas de l\'\xe9cran qui sauvera une balle une fois, et se brisera au cours du processus.\\n\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilis\xe9es \xe0 chaque fois qu\'une balle est sur le point d\'\xeatre perdue. ","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.forgiving.tooltip":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.verbose_description":" La premi\xe8re brique rat\xe9e par niveau ne co\xfbte rien, la suivante 10%, 20%, etc.","upgrades.fountain_toss.name":"Pi\xe8ce dans la fontaine","upgrades.fountain_toss.tooltip":"Gagnez parfois un peu de combo quand vous perdez des pi\xe8ces.","upgrades.fountain_toss.verbose_description":"Quand une pi\xe8ce est perdue alors que votre combo \xe9tait en dessous de {{max}}, votre combo \xe0 une probabilit\xe9 de {{lvl}}/combo d\'\xeatre incr\xe9ment\xe9","upgrades.ghost_coins.name":"Pi\xe8ces fant\xf4me","upgrades.ghost_coins.tooltip":"Les pi\xe8ces traversent les briques doucement","upgrades.ghost_coins.verbose_description":"Ce n\'est pas une bug, c\'est une fonctionnalit\xe9 ! Les pi\xe8ces passent \xe0 travers les briques doucement. Les niveaux plus \xe9lev\xe9s permettent aux pi\xe8ce de traverser les briques plus vite.","upgrades.helium.name":"H\xe9lium","upgrades.helium.tooltip":"Les pi\xe8ce flottent au lieu de tomber autours de la raquette.","upgrades.helium.verbose_description":"Les pi\xe8ces attendront d\'\xeatre sous la raquette pour tomber. ","upgrades.hot_start.name":"D\xe9marrage \xe0 chaud","upgrades.hot_start.tooltip":"Combo \xe0 {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.verbose_description":"Au d\xe9but de chaque niveau, votre combo commencera \xe0 +30 points, mais \xe0 chaque seconde, il sera diminu\xe9 d\'un point.  ","upgrades.hypnosis.name":"Hypnose","upgrades.hypnosis.tooltip":"Chaque fois qu\'une brique change de couleur, t\xe9l\xe9portez cette pi\xe8ce vers la boule la plus proche et rechargez sa capacit\xe9 \xe0 tacher une brique.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Les explosions aspirent les pi\xe8ces au lieu de les faire exploser.","upgrades.implosions.verbose_description":"La force d\u2019explosion est appliqu\xe9e dans l\u2019autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.instant_upgrade.name":"Un tiens vaut deux tu l\'auras","upgrades.instant_upgrade.tooltip":"+2 am\xe9liorations, -1 choix jusqu\'\xe0 la fin de la partie.","upgrades.instant_upgrade.verbose_description":"Choisissez imm\xe9diatement deux am\xe9liorations, afin d\'en obtenir une gratuite et une autre pour rembourser celle utilis\xe9e pour obtenir cet avantage. Chaque fois que vous choisirez des am\xe9liorations dans le menu suivant, vous aurez moins de choix.","upgrades.left_is_lava.name":"\xc9viter le c\xf4t\xe9 gauche","upgrades.left_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en touchant le bord gauche","upgrades.left_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9, ce qui vous permet d\'obtenir une pi\xe8ce de plus \xe0 chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se r\xe9initialise d\xe8s que votre balle touche le c\xf4t\xe9 gauche.\\n\\nD\xe8s que votre combo augmente, le c\xf4t\xe9 gauche devient rouge pour vous rappeler que vous devez \xe9viter de le frapper.","upgrades.limitless.name":"Sans limites","upgrades.limitless.tooltip":"Augmenter le niveau maximum de toutes les mises \xe0 niveau de {{lvl}} ","upgrades.limitless.verbose_description":"Choisir cet avantage augmente \xe9galement sa propre limite d\'un point, vous permettant de le choisir \xe0 nouveau.","upgrades.metamorphosis.name":"M\xe9tamorphose","upgrades.metamorphosis.tooltip":"Chaque pi\xe8ce peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.verbose_description":"Avec cette am\xe9lioration, les pi\xe8ces seront de la couleur de la brique d\'o\xf9 elles proviennent et coloreront la premi\xe8re brique qu\'elles toucheront. Les pi\xe8ces apparaissent \xe0 la vitesse de la balle qui les a cass\xe9es, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\". Au \xe0 chaque niveau, chaque pi\xe8ce peut colorier une brique de plus avant d\'\xeatre \\"\xe9puis\xe9e\\" et d\'appara\xeetre vide.","upgrades.minefield.name":"Terrain min\xe9","upgrades.minefield.tooltip":"+{{lvl}} combo par brique explosive \xe0 l\'\xe9cran","upgrades.minefield.verbose_description":"Ajoute +lvl au combo lorsqu\'une brique est plac\xe9e, -lvl lorsqu\'elle est d\xe9truite et augmente le combo de base du nombre de briques multipli\xe9 par le niveau","upgrades.multiball.name":"Multi balle","upgrades.multiball.tooltip":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.verbose_description":"D\xe8s que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien s\xfbr, de franchir le niveau plus rapidement.","upgrades.nbricks.name":"Pr\xe9l\xe8vement","upgrades.nbricks.tooltip":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon combo perdu","upgrades.nbricks.verbose_description":"Si votre balle rebondis sans casser une brique, \xe7a compte quand m\xeame comme une frappe.  Les briques d\xe9truites par des explosions ne comptent pas.","upgrades.one_more_choice.name":"La r\xe9ponse D","upgrades.one_more_choice.tooltip":"1 choix suppl\xe9mentaire d\'am\xe9lioration propos\xe9 jusqu\'\xe0 la fin de la partie","upgrades.one_more_choice.verbose_description":"Chaque menu d\'am\xe9lioration comportera une option suppl\xe9mentaire.  Cela n\'augmente pas le nombre d\'am\xe9liorations que vous pouvez choisir, mais vous aide \xe0 cr\xe9er le profile id\xe9al. \\"La r\xe9ponse D\\" est une r\xe9f\xe9rence \xe0 un sketch classique. ","upgrades.passive_income.name":"Revenu passif","upgrades.passive_income.tooltip":"+{{lvl}} combo / brique, sauf si la raquette \xe0 boug\xe9 dans les {{time}} derni\xe8res secondes, combo perdu dans ce cas","upgrades.passive_income.verbose_description":"Certaines am\xe9lioration font bouger les balles sans avoir besoin de mettre la raquette en mouvement.","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.picky_eater.tooltip":"+{{lvl}} combo par brique cass\xe9e la couleur de la balle,  combo perdu sinon","upgrades.picky_eater.verbose_description":"Chaque fois que vous cassez une brique de la m\xeame couleur que votre balle, votre combo augmente d\'une unit\xe9.\\nS\'il s\'agit d\'une couleur diff\xe9rente, la balle adopte cette nouvelle couleur, mais la combinaison est r\xe9initialis\xe9e, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle. Les briques de la mauvaise couleur sont entour\xe9es en rouge. Si vous avez plus d\'une balle, elles changent toutes de couleur en m\xeame temps lorsque l\'une d\'entre elles touche une brique.","upgrades.pierce.name":"Balle per\xe7ante","upgrades.pierce.tooltip":"La balle perce {{count}} briques apr\xe8s chaque rebond  sur la raquette.","upgrades.pierce.verbose_description":"Normalement , la balle rebondit d\xe8s qu\'elle touche une brique. Avec cette am\xe9lioration, elle continuera sa trajectoire jusqu\'\xe0 avoir cass\xe9es 3 briques.\\n\\nApr\xe8s cela, elle rebondira sur la quatri\xe8me brique et devra toucher la raquette pour remettre le compteur \xe0 z\xe9ro.","upgrades.pierce_color.name":"Perceur de couleur","upgrades.pierce_color.tooltip":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.verbose_description":"Chaque fois qu\'une balle touche une brique de la m\xeame couleur, elle la traverse sans encombre.\\n\\nLorsqu\'elle atteint une brique de couleur diff\xe9rente, elle la casse, prend sa couleur et rebondit. \\n\\nSi vous avez des briques solides, le fonctionnement est un peu diff\xe9rent. ","upgrades.puck_repulse_ball.help_plural":"La force de r\xe9pulsion est plus grande","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.puck_repulse_ball.tooltip":"La raquette repousse les balles","upgrades.puck_repulse_ball.verbose_description":"Lorsqu\'une balle s\'approche de la raquette, elle commence \xe0 ralentir, voire \xe0 rebondir sans toucher le palet.","upgrades.rainbow.name":"Arc en ciel","upgrades.rainbow.tooltip":"Les pi\xe8ces apparaissent avec la couleur de l\'arc en ciel.","upgrades.rainbow.verbose_description":"Chaque niveau augment la proportion de pi\xe8ces color\xe9e. La couleur d\xe9pends du temps de jeu. ","upgrades.reach.name":"Attaque a\xe9rienne","upgrades.reach.tooltip":"Casser une des N briques de la ligne la plus basse d\xe9truit le combo. Sinon, +N combo.","upgrades.reach.verbose_description":"S\'il n\'y a qu\'une seule rang\xe9e de briques, ou si la rang\xe9e la plus basse couvre toute la largeur du jeu, cet avantage est sans effet. Sinon, briser cette rang\xe9e la plus basse r\xe9initialise le combo\xa0; briser toute autre rang\xe9e augmente le combo du nombre de briques pr\xe9sentes sur cette rang\xe9e.\\n\\nLa rang\xe9e de briques du bas sera entour\xe9e en rouge pour vous rappeler de ne pas la toucher. ","upgrades.respawn.name":"R\xe9apparition ","upgrades.respawn.tooltip":"{{percent}}% des briques r\xe9apparaissent apr\xe8s {{delay}}s.","upgrades.respawn.verbose_description":"Des effets de particules vous indiqueront o\xf9 les briques appara\xeetront. ","upgrades.right_is_lava.name":"\xc9viter le c\xf4t\xe9 droit","upgrades.right_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de choc avec le cot\xe9 droit","upgrades.right_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9, ce qui vous permet d\'obtenir une pi\xe8ce de plus \xe0 chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se r\xe9initialise d\xe8s que votre balle touche le c\xf4t\xe9 droit de la zone de jeu.\\n\\nD\xe8s que votre combo augmente, le c\xf4t\xe9 droit devient rouge pour vous rappeler que vous devez \xe9viter de le frapper.","upgrades.sacrifice.help_l1":"Perdre une vie d\xe9truit toutes les briques","upgrades.sacrifice.help_over":"Perdre une vie multiplie le combo par {{lvl}} puis d\xe9truit toutes les briques \xe0 l\'\xe9cran","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.verbose_description":"Le combo pourrait monter assez haut.","upgrades.sapper.help_plural":"Les premi\xe8res briques {{lvl}} cass\xe9es deviennent des bombes.","upgrades.sapper.name":"Sapeur","upgrades.sapper.tooltip":"La premi\xe8re brique cass\xe9e devient une bombe.","upgrades.sapper.verbose_description":"Au lieu de dispara\xeetre, la premi\xe8re brique cass\xe9e est remplac\xe9e par une bombe. Faire rebondir la balle sur la raquette r\xe9arme l\'effet.  En montant en niveau, vous pourrez placer plus de bombes.","upgrades.shocks.name":"Choc","upgrades.shocks.tooltip":"Collision explosive entre les balles","upgrades.shocks.verbose_description":"Quand deux balles entrent en collision,  elles \xe9changent leurs vitesse, cr\xe9ent une explosion et gagnent un peu de vitesse qui les s\xe9pare. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.verbose_description":"D\xe9marrage \xe0 chaud sera simplement ajout\xe9 au combo actuel","upgrades.side_flip.name":"Droitier","upgrades.side_flip.tooltip":"+{{lvl}} combo par brique cass\xe9 de la droite, -{{loss}} sinon","upgrades.side_flip.verbose_description":"Impactez la brique sur son c\xf4t\xe9 droit pour obtenir un combo, mais \xe9vitez de la frapper sur son c\xf4t\xe9 gauche, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.side_kick.name":"Gaucher","upgrades.side_kick.tooltip":"+{{lvl}} combo par brique cass\xe9 de la gauche, -{{loss}} sinon","upgrades.side_kick.verbose_description":"Impactez la brique sur son c\xf4t\xe9 gauche pour obtenir un combo, mais \xe9vitez de la frapper sur son c\xf4t\xe9 droit, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.skip_last.help_plural":"Les {{lvl}} derni\xe8res briques restantes s\'autod\xe9truiront","upgrades.skip_last.name":"Nettoyage facile","upgrades.skip_last.tooltip":"La derni\xe8re brique s\'autod\xe9truit.","upgrades.skip_last.verbose_description":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut \xeatre difficile d\'obtenir les derni\xe8res briques.\\n\\nTerminer un niveau plus t\xf4t permet d\'obtenir des choix suppl\xe9mentaires lors de la mise \xe0 niveau. \\n\\nNe jamais manquer de briques est \xe9galement tr\xe8s avantageux.\\n\\nDonc, si vous avez du mal \xe0 casser les derni\xe8res briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.slow_down.name":"Balle lente","upgrades.slow_down.tooltip":"La balle se d\xe9place plus lentement","upgrades.slow_down.verbose_description":"La balle d\xe9marre relativement lentement, mais \xe0 chaque niveau de votre partie, elle d\xe9marre un peu plus vite, et elle acc\xe9l\xe8re \xe9galement si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile \xe0 g\xe9rer. \\n\\nVous pouvez l\'obtenir au d\xe9but de chaque partie en activant le mode enfant dans le menu.","upgrades.smaller_puck.help_plural":"La raquette r\xe9tr\xe9cie encore et le combo augmente encore.","upgrades.smaller_puck.name":"Raquette plus petite","upgrades.smaller_puck.tooltip":"Donne aussi +5 combo","upgrades.smaller_puck.verbose_description":"Vous b\xe9n\xe9ficiez d\'un bonus permanent de +5 combo pour avoir c eOver.stats.balls_lost":"Balas perdidas","gameOver.stats.bricks_broken":"Ladrillos rotos","gameOver.stats.bricks_per_minute":"Ladrillos rotos por minuto","gameOver.stats.catch_rate":"Monedas atrapadas","gameOver.stats.combo_avg":"Combo medio","gameOver.stats.combo_max":"Combinaci\xf3n m\xe1xima","gameOver.stats.duration_per_level":"Duraci\xf3n por nivel","gameOver.stats.hit_rate":"Precisi\xf3n","gameOver.stats.intro":"A continuaci\xf3n se muestran las estad\xedsticas de este juego en comparaci\xf3n con sus {{count}} mejores juegos.","gameOver.stats.level_reached":"Nivel alcanzado","gameOver.stats.total_score":"Puntuaci\xf3n total","gameOver.stats.upgrades_applied":"Mejoras aplicadas","gameOver.stats_intro":"Encuentra a continuaci\xf3n tus estad\xedsticas de juego comparadas con tus {{count}} mejores juegos.","gameOver.unlocked_perk":"Actualizaci\xf3n desbloqueada","gameOver.unlocked_perk_plural":"Has desbloqueado {{count}} mejoras","gameOver.win.summary":"Este juego ha terminado. Has acumulado {{score}} monedas.","gameOver.win.title":"Ha completado esta parte","help.content":"## Objetivo\\n\\nAtrapa tantas monedas como puedas durante 7 niveles.\\nLas monedas aparecen al romper ladrillos.\\nAtr\xe1palas con tu pala para aumentar tu puntuaci\xf3n.\\nTu puntuaci\xf3n se muestra en la esquina superior derecha de la pantalla.\\nNo dejes caer la bola o se acabar\xe1 la partida.\\n\\nDespu\xe9s de destruir todos los ladrillos, podr\xe1s elegir una mejora.\\n\\n## Mejoras\\n\\nLas mejoras que elijas se aplicar\xe1n hasta el final de la partida.\\n\\nAlgunas se pueden elegir varias veces para un efecto m\xe1s potente.\\nAlgunas ayudan a apuntar o facilitan el juego de otras maneras.\\n\\nAlgunas solo son \xfatiles al combinarlas.\\n\\nSiempre obtienes una mejora al principio de cada partida.\\n\\nSu icono servir\xe1 como los ladrillos del primer nivel.\\n\\nPuedes seleccionar las mejoras iniciales en la configuraci\xf3n.\\n\\nMuchas mejoras afectan a tu combo.\\n\\n## Combo\\n\\nTu \\"combo\\" es la cantidad de monedas que se generan al romper un ladrillo. Se muestra en tu paleta; por ejemplo, x4 significa que cada ladrillo generar\xe1 4 monedas.\\nLa mayor\xeda de las mejoras que aumentan el combo tambi\xe9n a\xf1aden una condici\xf3n para reiniciarlo.\\nEl combo tambi\xe9n se reiniciar\xe1 si la pelota regresa a la paleta sin tocar ning\xfan ladrillo.\\nSe mostrar\xe1 un mensaje de \\"fallo\\" cuando esto ocurra.\\n\\nIntenta apuntar a un ladrillo siempre.\\n\\n## Apuntar\\n\\nSolo la posici\xf3n de la pelota en la paleta determina c\xf3mo rebotar\xe1.\\nSi la pelota impacta en el centro de la paleta, rebotar\xe1 verticalmente.\\n\\nSi golpeas m\xe1s hacia un lado, tendr\xe1 mayor \xe1ngulo.\\n\\nLa velocidad de la paleta y el \xe1ngulo de entrada no afectan la direcci\xf3n de la pelota despu\xe9s de rebotar.\\n\\nSe pueden desbloquear muchas mejoras que ayudan a apuntar.\\n\\n## Desbloqueos\\n\\nAl jugar Breakout 71 por primera vez, la mayor\xeda de las mejoras y niveles est\xe1n bloqueados.\\nLas mejoras se desbloquean simplemente jugando y atrapando muchas monedas.\\n\\nLos primeros niveles se desbloquean al alcanzar una puntuaci\xf3n alta. Los niveles posteriores a\xf1aden una condici\xf3n sobre las ventajas que puedes seleccionar.\\n\\nAlcanzar puntuaciones altas es mucho m\xe1s f\xe1cil si consigues varias mejoras despu\xe9s de cada nivel.\\n\\n## Repeticiones y mejoras gratuitas\\n\\nRecibir\xe1s una mejora adicional si juegas bien:\\n\\n- Completa el nivel en menos de {{levelTimeGood}} segundos\\n- Golpea los lados o la parte superior menos de {{wallBouncedGood}} veces\\n- Atrapa el {{catchRateGood}}% de monedas\\n- Falla los ladrillos menos de {{missesGood}} veces\\n\\nTambi\xe9n recibir\xe1s una repetici\xf3n que te permite saltarte mejoras si lo haces a\xfan mejor:\\n\\n- Completa un nivel en menos de {{levelTimeBest}} segundos\\n- Golpea los lados o la parte superior menos de {{wallBouncedBest}} veces\\n- Atrapa el {{catchRateBest}}% de monedas\\n- Falla los ladrillos menos de {{missesBest}} veces\\n\\nUna opci\xf3n en la configuraci\xf3n te permite ver estas estad\xedsticas","help.help":"Descubre m\xe1s sobre el juego","help.levels":"Niveles","help.title":"Ayuda","help.upgrades":"## Actualizaciones","history.columns.score":"Puntuaci\xf3n","history.columns.started":"Fecha","history.help":"Enumera tus {{count}} mejores juegos.","history.locked":"Juega primero al menos diez partidos","history.title":"Historia","lab.help":"Prueba cualquier combinaci\xf3n de mejoras y niveles.","lab.instructions":"Selecciona las mejoras que aparecen a continuaci\xf3n y elige el nivel al que quieres jugar. .","lab.menu_entry":"Modo creativo","lab.reset":"Eliminar todas las mejoras","lab.select_level":"Selecciona un nivel para jugar","lab.unlocks_at":"Desbloqueado a partir de una puntuaci\xf3n total de {{score}}.","level_up.after_buttons":"Acabas de completar el nivel {{level}}/{{max}}.","level_up.before_buttons":"Has cogido {{score}} monedas {{catchGain}} en {{levelSpawnedCoins}} en {{time}} segundos {{timeGain}}.\\n\\nHas fallado los ladrillos {{levelMisses}} veces {{missesGain}} y tocado los bordes del \xe1rea de juego {{levelWallBounces}} veces {{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Intenta coger todas las piezas, no fallar nunca con los ladrillos, no tocar nunca las paredes o terminar el nivel en menos de 30 segundos para conseguir opciones extra y mejoras.","level_up.compliment_good":"\xa1Bien hecho!","level_up.compliment_perfect":"Impresionante, \xa1seguid as\xed!","level_up.pick_upgrade_title":"Elija una mejora","level_up.plus_one_upgrade":"(+1 mejora)","level_up.plus_one_upgrade_and_reroll":"(+1 mejora y +1 relanzamiento)","level_up.reroll":"Relanzamiento ({{count}})","level_up.reroll_help":"Nuevas opciones","level_up.upgrade_perk_to_level":"  nivel {{level}}","main_menu.basic":"Gr\xe1ficos simplificados","main_menu.basic_help":"Mejor rendimiento.","main_menu.colorful_coins":"Piezas de color","main_menu.colorful_coins_help":"Las piezas aparecen siempre en el color del ladrillo","main_menu.comboIncreaseTexts":"Mostrar una +X dorada","main_menu.comboIncreaseTexts_help":"Cuando el combo aumenta","main_menu.contrast":"Alto contraste","main_menu.contrast_help":"M\xe1s contraste y color","main_menu.credit_levels":"Niveles","main_menu.donate":"Has jugado {{hours}} horas","main_menu.donate_help":"\xbfPodr\xedas donar unos euros? Puedes ocultar este recordatorio en los ajustes.","main_menu.donation_reminder":"Recuerde dar","main_menu.donation_reminder_help":"Mostrar el tiempo de juego y un enlace para donar en el men\xfa principal","main_menu.download_save_file":"Guardar mis progresos","main_menu.download_save_file_help":"Obtener un archivo de copia de seguridad","main_menu.extra_bright":"M\xe1s luz","main_menu.extra_bright_help":"Mayor halo de luz alrededor de ladrillos y piezas.","main_menu.fullscreen":"Pantalla completa","main_menu.fullscreen_help":"El juego intentar\xe1 cambiar a pantalla completa cuando lo inicies.","main_menu.help_content":"## Objetivo\\n\\nAtrapa tantas monedas como puedas a lo largo de los 7 niveles.\\nLas monedas aparecen cuando rompes ladrillos.\\nAtr\xe1palas con tu disco para aumentar tu puntuaci\xf3n.\\nTu puntuaci\xf3n aparece en la parte superior derecha de la pantalla.\\nNo dejes caer la bola o se acaba el juego.\\n\\nCuando hayas roto todos los ladrillos, podr\xe1s elegir una mejora.\\n\\n## Mejoras\\n\\nLas mejoras que elijas ser\xe1n v\xe1lidas hasta el final del juego.\\nAlgunas pueden seleccionarse varias veces para conseguir un efecto m\xe1s potente.\\nOtras ayudan a apuntar o simplifican el juego.\\nAlgunas s\xf3lo son \xfatiles cuando se combinan.\\n\\nSiempre obtienes una mejora al principio de cada partida.\\nSu icono forma los ladrillos del primer nivel.\\nPuedes seleccionar las mejoras iniciales en los ajustes.\\n\\nMuchas mejoras influyen en tu combo.\\n\\n## Combo\\n\\nTu \'combo\' es el n\xfamero de monedas generadas cuando se rompe un ladrillo.\\nSe muestra en tu disco. Por ejemplo, x4 significa que cada ladrillo genera 4 monedas.\\n\\nLa mayor\xeda de las mejoras que aumentan el combo tambi\xe9n a\xf1aden una condici\xf3n para restablecerlo.\\nEl combo tambi\xe9n se reinicia si la pelota vuelve a la raqueta sin golpear un ladrillo.\\nEntonces se muestra un mensaje de \\"Fallado\\".\\n\\nIntenta golpear un ladrillo en cada rebote.\\n\\n## Apuntar\\n\\nS\xf3lo la posici\xf3n de la pelota en la raqueta determina su \xe1ngulo de rebote.\\nSi la pelota golpea la raqueta en el centro, rebotar\xe1 verticalmente.\\nSi golpea hacia un lado de la raqueta, el \xe1ngulo ser\xe1 mayor.\\nLa velocidad de la raqueta y el \xe1ngulo de incidencia de la pelota no tienen ning\xfan efecto.\\n\\nSe pueden desbloquear varias mejoras de punter\xeda.\\n\\n## Desbloqueo\\n\\nCuando juegas a Breakout 71 por primera vez, la mayor\xeda de las mejoras y niveles est\xe1n bloqueados.\\nLas mejoras se desbloquean simplemente jugando y cogiendo muchas monedas.\\nLos primeros niveles se desbloquean consiguiendo una puntuaci\xf3n alta.\\nLos niveles posteriores a\xf1aden una condici\xf3n a las ventajas seleccionadas.\\n\\nConseguir puntuaciones altas es mucho m\xe1s f\xe1cil cuando obtienes varias mejoras despu\xe9s de cada nivel.\\n\\n## Reintentos y mejoras gratis\\n\\nConseguir\xe1s una mejora extra si juegas bien:\\n\\n- Completa el nivel en menos de {{levelTimeGood}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedGood}} veces\\n- Atrapa el {{catchRateGood}}% de las monedas\\n- Pierde los ladrillos menos de {{missesGood}} veces\\n\\nTambi\xe9n obtendr\xe1s un potenciador que te permitir\xe1 ignorar las mejoras si lo haces a\xfan mejor:\\n\\n- Completa un nivel en menos de {{levelTimeBest}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedBest}} veces\\n- Atrapa {{catchRateBest}} de monedas\\n- Pierde ladrillos menos de {{missesBest}} veces\\n\\nUna opci\xf3n en los ajustes te permite mostrar estas estad\xedsticas","main_menu.help_help":"Descubra el juego en detalle","main_menu.help_title":"Ayuda","main_menu.help_upgrades":"## Mejoras","main_menu.high_score":"Puntuaci\xf3n m\xe1xima : {{score}}","main_menu.kid":"Modo Ni\xf1os","main_menu.kid_help":"Bola m\xe1s lenta","main_menu.language":"Idioma","main_menu.language_help":"Cambiar el idioma de la pantalla","main_menu.load_save_file":"Cargar una copia de seguridad","main_menu.load_save_file_help":"Desde un archivo","main_menu.max_coins":"{{max}} partes mostradas m\xe1ximo","main_menu.max_coins_help":"S\xf3lo visual, sin impacto en la puntuaci\xf3n","main_menu.max_particles":" {{max}} part\xedculas m\xe1ximas","main_menu.max_particles_help":"Limita el n\xfamero de part\xedculas mostradas en pantalla para efectos visuales","main_menu.mobile":"Modo m\xf3vil","main_menu.mobile_help":"Deja un espacio debajo de la raqueta.","main_menu.normal":"Pieza nueva","main_menu.normal_help":"Con una ventaja inicial aleatoria","main_menu.pointer_lock":"Bloqueo de puntero","main_menu.pointer_lock_help":"Tambi\xe9n oculta el cursor del rat\xf3n.","main_menu.record":"Grabar v\xeddeos de partidos","main_menu.record_download":"Descargar el v\xeddeo ({{size}} MB)","main_menu.record_help":"Consigue un v\xeddeo de cada nivel.","main_menu.red_miss":"Balones perdidos","main_menu.red_miss_help":"Muestra part\xedculas rojas alrededor de las bolas que bajan sin golpear un ladrillo.","main_menu.reset":"Reiniciar el juego","main_menu.reset_cancel":"No","main_menu.reset_confirm":"S\xed","main_menu.reset_help":"Borrar resultados, estad\xedsticas y horarios de los partidos","main_menu.reset_instruction":"\xbfEst\xe1s seguro de que perder\xe1s todos los progresos que hayas hecho en el juego?","main_menu.save_file_error":"Error al cargar el archivo de copia de seguridad","main_menu.save_file_loaded":"Copia de seguridad cargada","main_menu.save_file_loaded_help":"La aplicaci\xf3n se r
