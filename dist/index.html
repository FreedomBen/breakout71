 encontrar\xe1s todas las mejoras y niveles que ofrece el juego. Haz clic en uno de ellos para probarlo en una partida de prueba.","unlocks.just_unlocked":"Nivel desbloqueado","unlocks.just_unlocked_plural":"Acabas de desbloquear {{count}} niveles","unlocks.level":"<h2>Has desbloqueado {{unlocked}} niveles en {{out_of}}</h2>\\n<p>Aqu\xed est\xe1n todos los niveles del juego, haz clic en uno para probarlo. </p> ","unlocks.level_description":"Un nivel {{size}}x{{size}} con {{bricks}} ladrillos, {{colors}} colores y {{bombs}} bombas.","unlocks.minScore":"Alcanza una puntuaci\xf3n de ${{minScore}} en una partida para desbloquearla.","unlocks.minScoreWithPerks":"Alcanzar ${{minScore}} en un juego con {{required}} pero sin {{forbidden}}.","unlocks.minTotalScore":"Acumula un total de ${{score}}","unlocks.reached":"Tu mejor puntuaci\xf3n hasta ahora es {{reached}}.","unlocks.title_upgrades":"Has desbloqueado {{unlocked}} mejoras en {{out_of}}.","upgrades.addiction.name":"Adicci\xf3n","upgrades.addiction.tooltip":"+{{lvl}} combo / ladrillo, combo perdido despu\xe9s de {{delay}}s sin romper ning\xfan ladrillo","upgrades.addiction.verbose_description":"La cuenta atr\xe1s s\xf3lo comienza una vez que se ha destruido el primer ladrillo del nivel, y se detiene en cuanto no hay m\xe1s ladrillos.","upgrades.asceticism.name":"Ascetismo","upgrades.asceticism.tooltip":"+{{combo}} combo por ladrillo roto, - {{combo}} cuando una pieza es atrapada","upgrades.asceticism.verbose_description":"Tendremos que encontrar una forma de almacenar las piezas mientras crece el combo.","upgrades.ball_attract_ball.help_plural":"Mayor fuerza de atracci\xf3n","upgrades.ball_attract_ball.name":"Gravedad","upgrades.ball_attract_ball.tooltip":"Las pelotas atraen a las pelotas","upgrades.ball_attract_ball.verbose_description":"Las bolas que est\xe1n separadas m\xe1s de 3/4 de la anchura de la pantalla empiezan a atraerse. La fuerza de atracci\xf3n es mayor cuanto m\xe1s separadas est\xe1n las bolas. Las part\xedculas del arco iris volar\xe1n para simbolizar la fuerza de atracci\xf3n. Esta ventaja s\xf3lo est\xe1 disponible si ya tienes m\xe1s de una bola en juego.","upgrades.ball_attracts_coins.name":"Balas de la suerte","upgrades.ball_attracts_coins.tooltip":"Las monedas van con la bola m\xe1s cercana","upgrades.ball_attracts_coins.verbose_description":"Puedes utilizarlo para que las piezas orbiten la pelota y colorear los ladrillos cercanos, o como una especie de rinc\xf3n imantado.","upgrades.ball_repulse_ball.help_plural":"Fuerza de repulsi\xf3n m\xe1s fuerte","upgrades.ball_repulse_ball.name":"Vuelo en formaci\xf3n","upgrades.ball_repulse_ball.tooltip":"Las balas repelen a las balas","upgrades.ball_repulse_ball.verbose_description":"Las bolas que est\xe1n a menos de un cuarto de la anchura de la pantalla empiezan a repelerse. La fuerza de repulsi\xf3n es mayor cuanto m\xe1s cerca est\xe1n una de otra. Se mostrar\xe1n part\xedculas para simbolizar la aplicaci\xf3n de esta fuerza. Esta ventaja s\xf3lo est\xe1 disponible si ya tienes m\xe1s de una bola.","upgrades.base_combo.name":"Mejor base","upgrades.base_combo.tooltip":"El combo comienza en {{coins}} en lugar de 1.","upgrades.base_combo.verbose_description":"Tu combo normalmente empieza en 1 al principio del nivel y vuelve a 1 cuando rebotas sin golpear nada. Con esta funci\xf3n, el combo empieza 3 puntos m\xe1s arriba, por lo que siempre conseguir\xe1s al menos 4 monedas por ladrillo. Cuando tu combo se reinicia, vuelve a ser 4 en lugar de 1. Tu bola parpadear\xe1 un poco para indicar que su combo es superior a 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosiones m\xe1s violentas","upgrades.bigger_explosions.verbose_description":"La explosi\xf3n por defecto arrasa un cuadrado de ladrillos de 3x3; con esta mejora, uno de 5x5. El viento que sopla las piezas tambi\xe9n es mucho m\xe1s fuerte. La pantalla parpadear\xe1 un poco despu\xe9s de cada explosi\xf3n (excepto en el modo de gr\xe1ficos b\xe1sicos).","upgrades.bigger_puck.name":"Raqueta m\xe1s grande","upgrades.bigger_puck.tooltip":"Atrapa m\xe1s monedas f\xe1cilmente.","upgrades.bigger_puck.verbose_description":"Una raqueta grande significa que nunca se te escapa la pelota y que puedes coger m\xe1s piezas, adem\xe1s de apuntar los rebotes con precisi\xf3n. Sin embargo, una raqueta grande es m\xe1s dif\xedcil de usar en los laterales del nivel.","upgrades.bricks_attract_ball.name":"Los ladrillos atraen bolas","upgrades.bricks_attract_ball.tooltip":"La pelota va hacia los primeros {{count}} ladrillos que golpea.","upgrades.bricks_attract_ball.verbose_description":"El efecto es m\xe1s intenso en niveles m\xe1s altos. La cantidad de ladrillos que pueden impactar antes de que el efecto se detenga tambi\xe9n es mayor. El efecto se reactiva cuando el bal\xf3n impacta el disco.","upgrades.bricks_attract_coins.name":"Los ladrillos atraen monedas","upgrades.bricks_attract_coins.tooltip":"Les ayuda a permanecer all\xed arriba.","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Perspicaz","upgrades.clairvoyant.tooltip":"Revela los niveles, el PV de los ladrillos y la direcci\xf3n de las balas","upgrades.clairvoyant.verbose_description":"Te ayuda a elegir las mejoras adecuadas y a entender qu\xe9 ocurre con los \\"ladrillos macizos\\". Los niveles 2 y 3 (en modo bucle) proporcionan informaci\xf3n adicional de dudosa utilidad.","upgrades.coin_magnet.help_plural":"Mayor efecto sobre las piezas","upgrades.coin_magnet.name":"Im\xe1n para monedas","upgrades.coin_magnet.tooltip":"La raqueta atrae monedas","upgrades.coin_magnet.verbose_description":"Dirige las piezas hacia la raqueta. El efecto es mayor en las piezas que ya est\xe1n cerca de la raqueta.","upgrades.compound_interest.name":"Inter\xe9s compuesto","upgrades.compound_interest.tooltip":"+{{lvl}} combo por ladrillo roto, se pone a cero cuando se pierde una pieza","upgrades.compound_interest.verbose_description":"Tu combo aumentar\xe1 en uno cada vez que rompas un ladrillo. Si pierdes alguna pieza, tu combo volver\xe1 a cero.\\n\\nSi tu combo es superior al m\xednimo, aparecer\xe1 una l\xednea roja en la parte inferior de la zona de juego para recordarte que las monedas no deben ir all\xed.","upgrades.concave_puck.name":"Raqueta c\xf3ncava","upgrades.concave_puck.tooltip":"Ayuda a evitar los bordes.","upgrades.concave_puck.verbose_description":"Las pelotas comienzan verticalmente al principio del nivel y rebotan en la raqueta m\xe1s verticalmente y al rev\xe9s.","upgrades.corner_shot.name":"Tiro de esquina","upgrades.corner_shot.tooltip":"Deja que tu raqueta salga del \xe1rea enmarcada","upgrades.corner_shot.verbose_description":"Te ayuda a apuntar a las esquinas","upgrades.etherealcoins.name":"Moneda espacial","upgrades.etherealcoins.tooltip":"Las piezas ya no se ven afectadas por la gravedad","upgrades.etherealcoins.verbose_description":"Las monedas mantendr\xe1n su velocidad incluso despu\xe9s de varios rebotes y ya no se ver\xe1n afectadas por la gravedad.","upgrades.extra_levels.name":"5 minutos m\xe1s","upgrades.extra_levels.tooltip":"Juega {{count}} niveles en lugar de 7","upgrades.extra_levels.verbose_description":"El juego suele durar 7 niveles, tras los cuales se acaba la partida y la puntuaci\xf3n que hayas alcanzado es tu puntuaci\xf3n del juego.\\n\\nElegir esta mejora te permite prolongar el juego un nivel. Los \xfaltimos niveles suelen ser en los que m\xe1s puntos consigues, as\xed que la diferencia puede ser espectacular.","upgrades.extra_life.help_plural":"La (\xfaltima) bola rebota hasta el fondo de la pantalla en lugar de perderse ( {{lvl}} veces).","upgrades.extra_life.name":"Segunda oportunidad","upgrades.extra_life.tooltip":"La pelota rebota una vez antes de perderse.","upgrades.extra_life.verbose_description":"Normalmente, s\xf3lo tienes una bola por ronda, y la ronda termina en cuanto la sueltas.\\n\\nEsta habilidad a\xf1ade una barra blanca en la parte inferior de la pantalla que guardar\xe1 una bola una vez, y se romper\xe1 en el proceso.\\n\\nPuedes coger varias vidas por adelantado, que se usan cada vez que una bola est\xe1 a punto de perderse.","upgrades.forgiving.name":"Errar es humano","upgrades.forgiving.tooltip":"Perder los ladrillos significa perder una porci\xf3n progresivamente mayor del combo","upgrades.forgiving.verbose_description":" El primer ladrillo perdido por nivel no cuesta nada, el siguiente 10%, 20% y as\xed sucesivamente.","upgrades.fountain_toss.name":"Moneda en la fuente","upgrades.fountain_toss.tooltip":"A veces ganas un peque\xf1o combo cuando pierdes monedas.","upgrades.fountain_toss.verbose_description":"Cuando se pierde una moneda mientras tu combo estaba por debajo de {{max}}, tu combo tiene una probabilidad de {{lvl}}/combo de incrementarse.","upgrades.ghost_coins.name":"Habitaciones fantasma","upgrades.ghost_coins.tooltip":"Las monedas atraviesan los ladrillos lentamente","upgrades.ghost_coins.verbose_description":"No es un error, \xa1es una caracter\xedstica! Las piezas atraviesan los ladrillos lentamente. Los niveles m\xe1s altos permiten que las monedas pasen m\xe1s r\xe1pido a trav\xe9s de los ladrillos.","upgrades.helium.name":"Helio","upgrades.helium.tooltip":"Las piezas flotan en lugar de caer alrededor de la raqueta.","upgrades.helium.verbose_description":"Las monedas esperar\xe1n a estar debajo de la raqueta para caer.","upgrades.hot_start.name":"Arranque en caliente","upgrades.hot_start.tooltip":"Combo a {{start}}, -{{loss}} combo por segundo","upgrades.hot_start.verbose_description":"Al principio de cada nivel, tu combo comenzar\xe1 con +30 puntos, pero cada segundo se reducir\xe1 en un punto.  ","upgrades.hypnosis.name":"Hipnosis","upgrades.hypnosis.tooltip":"Cada vez que un ladrillo cambia de color, teletransporta esa moneda a la bola m\xe1s cercana y recarga su capacidad para manchar un ladrillo.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Implosiones","upgrades.implosions.tooltip":"Las explosiones absorben las piezas en lugar de hacerlas estallar.","upgrades.implosions.verbose_description":"La fuerza de la explosi\xf3n se aplica en sentido contrario. El nivel 2+ aumenta la potencia de la implosi\xf3n.","upgrades.instant_upgrade.name":"M\xe1s vale p\xe1jaro en mano que ciento volando","upgrades.instant_upgrade.tooltip":"+2 de mejora ahora, -1 de elecci\xf3n hasta el final del juego.","upgrades.instant_upgrade.verbose_description":"Elige inmediatamente dos mejoras para conseguir una gratis y otra para pagar la que usaste para conseguir esta ventaja. Cada vez que elijas mejoras del siguiente men\xfa, tendr\xe1s menos opciones.","upgrades.left_is_lava.name":"Evitar el lado izquierdo","upgrades.left_is_lava.tooltip":"+{{lvl}} combo por ladrillo, se pierde al tocar el borde izquierdo","upgrades.left_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, d\xe1ndote una moneda extra cada vez que rompes un ladrillo.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola golpea el lado izquierdo.\\n\\nEn cuanto tu combo aumenta, el lado izquierdo se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.limitless.name":"Sin l\xedmites","upgrades.limitless.tooltip":"Aumenta el nivel m\xe1ximo de todas las mejoras de {{lvl}} .","upgrades.limitless.verbose_description":"Elegir esta ventaja tambi\xe9n aumenta su propio l\xedmite en un punto, permiti\xe9ndote elegirla de nuevo.","upgrades.metamorphosis.name":"Metamorfosis","upgrades.metamorphosis.tooltip":"Cada pieza puede manchar {{lvl}} ladrillo(s) con su color","upgrades.metamorphosis.verbose_description":"Con esta mejora, las monedas tendr\xe1n el color del ladrillo del que proceden y colorear\xe1n el primer ladrillo que toquen.\\n\\nLas piezas aparecen a la velocidad de la bola que las rompi\xf3, lo que significa que puedes apuntar un poco en la direcci\xf3n de los ladrillos que quieres \\"pintar\\".","upgrades.minefield.name":"Campo de minas","upgrades.minefield.tooltip":"+{{lvl}} combo por ladrillo explosivo en pantalla","upgrades.minefield.verbose_description":"A\xf1ade +lvl al combo cuando se coloca un ladrillo, -lvl cuando se destruye y aumenta el combo b\xe1sico en el n\xfamero de ladrillos multiplicado por el nivel.","upgrades.multiball.name":"Bola m\xfaltiple","upgrades.multiball.tooltip":"Cada nivel comienza con {{count}} bolas.","upgrades.multiball.verbose_description":"En cuanto sueltas la bola en Breakout 71, pierdes.\\n\\nCon esta ventaja, tienes dos bolas, as\xed que puedes permitirte perder una.\\n\\nLas bolas perdidas vuelven al siguiente nivel.\\n\\nTener m\xe1s de una bala te permite obtener otras ventajas y, por supuesto, completar el nivel m\xe1s r\xe1pidamente.","upgrades.nbricks.name":"Domiciliaci\xf3n bancaria","upgrades.nbricks.tooltip":"Golpea exactamente {{lvl}} ladrillos por rebote para +{{lvl}} combo, de lo contrario combo perdido","upgrades.nbricks.verbose_description":"Si tu bola rebota sin romper ning\xfan ladrillo, cuenta como golpe.  Los ladrillos destruidos por explosiones no cuentan.","upgrades.one_more_choice.name":"La respuesta D","upgrades.one_more_choice.tooltip":"1 opci\xf3n de mejora adicional disponible hasta el final del juego","upgrades.one_more_choice.verbose_description":"Cada men\xfa de mejoras tendr\xe1 una opci\xf3n adicional.  Esto no aumenta el n\xfamero de mejoras que puede elegir, pero le ayuda a crear el perfil ideal. \\"Respuesta D\\" es una referencia a un sketch cl\xe1sico.","upgrades.passive_income.name":"Ingresos pasivos","upgrades.passive_income.tooltip":"+{{lvl}} combo / ladrillo, a menos que la raqueta se haya movido en los \xfaltimos {{time}} segundos, en cuyo caso se pierde el combo.","upgrades.passive_income.verbose_description":"Algunas mejoras hacen que las pelotas se muevan sin necesidad de poner la raqueta en movimiento.","upgrades.picky_eater.name":"Comer por colores","upgrades.picky_eater.tooltip":"+{{lvl}} combo por ladrillo roto del color de la bola, combo perdido en caso contrario","upgrades.picky_eater.verbose_description":"Cada vez que rompes un ladrillo del mismo color que tu bola, tu combinaci\xf3n aumenta en uno.\\nSi es de otro color, la bola adopta este nuevo color, pero la combinaci\xf3n se reinicia, a menos que no queden ladrillos del mismo color que la bola. Los ladrillos de color incorrecto se marcan con un c\xedrculo rojo. Si tienes m\xe1s de una bola, todas cambian de color al mismo tiempo cuando una de ellas toca un ladrillo.","upgrades.pierce.name":"Bola perforadora","upgrades.pierce.tooltip":"La pelota golpea {{count}} ladrillos despu\xe9s de cada rebote en la raqueta.","upgrades.pierce.verbose_description":"Normalmente, la pelota rebota en cuanto golpea un ladrillo. Con esta mejora, continuar\xe1 su trayectoria hasta que haya roto 3 ladrillos.\\n\\nDespu\xe9s, rebotar\xe1 en el cuarto ladrillo y tendr\xe1 que tocar la raqueta para poner a cero el contador.","upgrades.pierce_color.name":"Taladro de color","upgrades.pierce_color.tooltip":"+{{lvl}} de da\xf1o a los ladrillos del mismo color que la bola","upgrades.pierce_color.verbose_description":"Cada vez que una bola golpea un ladrillo del mismo color, lo atraviesa sin obst\xe1culos.\\n\\nCuando choca contra un ladrillo de otro color, lo rompe, adopta su color y rebota.\\n\\nSi tienes ladrillos macizos, las cosas funcionan de otra manera.","upgrades.puck_repulse_ball.help_plural":"La fuerza de repulsi\xf3n es mayor","upgrades.puck_repulse_ball.name":"Aterrizaje suave","upgrades.puck_repulse_ball.tooltip":"La raqueta repele las pelotas","upgrades.puck_repulse_ball.verbose_description":"Cuando una pelota se acerca a la raqueta, empieza a frenarse e incluso a botar sin tocar el disco.","upgrades.rainbow.name":"Arco\xedris","upgrades.rainbow.tooltip":"Las monedas aparecen con colores del arco iris.","upgrades.rainbow.verbose_description":"Cada nivel aumenta la cantidad de monedas de colores. El color depende del tiempo transcurrido.","upgrades.reach.name":"Ataque a\xe9reo","upgrades.reach.tooltip":"Romper uno de los N ladrillos de la l\xednea inferior destruye el combo. De lo contrario, +N combo.","upgrades.reach.verbose_description":"Si s\xf3lo hay una fila de ladrillos, o si la fila m\xe1s baja cubre todo el ancho del juego, esta ventaja no tiene efecto. De lo contrario, si se rompe esta fila inferior, se reinicia el combo; si se rompe cualquier otra fila, el combo aumenta en el n\xfamero de ladrillos de esa fila.\\n\\nLa fila inferior de ladrillos se marcar\xe1 con un c\xedrculo rojo para recordarte que no debes tocarla.","upgrades.respawn.name":"Reaparici\xf3n","upgrades.respawn.tooltip":"{{percent}}% de los ladrillos reaparecen despu\xe9s de {{delay}}s.","upgrades.respawn.verbose_description":"Los efectos de part\xedculas te mostrar\xe1n d\xf3nde aparecer\xe1n los ladrillos.","upgrades.right_is_lava.name":"Evitar el lado derecho","upgrades.right_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el impacto con el lado derecho","upgrades.right_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, d\xe1ndote una moneda extra cada vez que rompas los ladrillos siguientes.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola toca el lado derecho del \xe1rea de juego.\\n\\nEn cuanto tu combo aumenta, el lado derecho se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.sacrifice.help_l1":"Perder una vida destruye todos los ladrillos","upgrades.sacrifice.help_over":"Perder una vida multiplica el combo por {{lvl}} y luego destruye todos los ladrillos de la pantalla","upgrades.sacrifice.name":"Sacrificio","upgrades.sacrifice.verbose_description":"El combo podr\xeda llegar muy alto.","upgrades.sapper.help_plural":"Los primeros {{lvl}} ladrillos rotos se convierten en bombas.","upgrades.sapper.name":"Zapador","upgrades.sapper.tooltip":"El primer ladrillo roto se convierte en una bomba.","upgrades.sapper.verbose_description":"En lugar de desaparecer, el primer ladrillo roto es sustituido por una bomba. Al rebotar la pelota en la raqueta, se restablece el efecto.  A medida que subas de nivel, podr\xe1s colocar m\xe1s bombas.","upgrades.shocks.name":"Choque","upgrades.shocks.tooltip":"Choque explosivo entre balas","upgrades.shocks.verbose_description":"Cuando dos balas chocan, intercambian velocidades, crean una explosi\xf3n y ganan un poco de la velocidad que las separaba.","upgrades.shunt.name":"Derivaci\xf3n","upgrades.shunt.tooltip":"Aparca {{percent}}% de combo al cambiar de nivel","upgrades.shunt.verbose_description":"El arranque en caliente simplemente se a\xf1adir\xe1 a la combinaci\xf3n actual","upgrades.side_flip.name":"Derecha","upgrades.side_flip.tooltip":"+{{lvl}} combo por ladrillo roto de la derecha, -{{loss}} de lo contrario","upgrades.side_flip.verbose_description":"Golpea el ladrillo por su lado derecho para conseguir un combo, pero evita golpearlo por su lado izquierdo ya que esto cancelar\xe1 dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.side_kick.name":"Zurdos","upgrades.side_kick.tooltip":"+{{lvl}} combo por ladrillo roto de la izquierda, -{{loss}} de lo contrario","upgrades.side_kick.verbose_description":"Golpea el ladrillo por su lado izquierdo para conseguir un combo, pero evita golpearlo por su lado derecho ya que esto cancelar\xe1 dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.skip_last.help_plural":"Los \xfaltimos {{lvl}} ladrillos restantes se autodestruir\xe1n","upgrades.skip_last.name":"F\xe1cil de limpiar","upgrades.skip_last.tooltip":"El \xfaltimo ladrillo se autodestruye.","upgrades.skip_last.verbose_description":"Tienes que romper todos los ladrillos para pasar al siguiente nivel.\\n\\nSin embargo, puede ser dif\xedcil conseguir los \xfaltimos ladrillos.\\n\\nCompletar un nivel antes de tiempo te da opciones extra al subir de nivel.\\n\\nNo quedarte nunca sin ladrillos tambi\xe9n es una gran ventaja.\\n\\nAs\xed que si te cuesta romper los \xfaltimos ladrillos, conseguir esta ventaja unas cuantas veces puede ayudarte.","upgrades.slow_down.name":"Bola lenta","upgrades.slow_down.tooltip":"El bal\xf3n se mueve m\xe1s despacio","upgrades.slow_down.verbose_description":"La bola empieza relativamente despacio, pero con cada nivel del juego empieza un poco m\xe1s r\xe1pido, y tambi\xe9n se acelera si pasas mucho tiempo en un nivel.\\n\\nEsta ventaja hace que la bola sea m\xe1s f\xe1cil de manejar.\\n\\nPuedes conseguirla al principio de cada partida activando el modo ni\xf1o en el men\xfa.","upgrades.smaller_puck.help_plural":"La raqueta se encoge a\xfan m\xe1s y el combo vuelve a aumentar.","upgrades.smaller_puck.name":"Raqueta m\xe1s peque\xf1a","upgrades.smaller_puck.tooltip":"Tambi\xe9n da +5 combo","upgrades.smaller_puck.verbose_description":"Recibes una bonificaci\xf3n de combo permanente de +5 por elegir esta mejora.","upgrades.soft_reset.name":"Restablecimiento progresivo","upgrades.soft_reset.tooltip":"Al reiniciar el combo se conserva el {{percent}}% de los puntos","upgrades.soft_reset.verbose_description":"Limita el impacto de un reinicio de combo.","upgrades.streak_shots.name":"Secuencia de destrucci\xf3n","upgrades.streak_shots.tooltip":"M\xe1s piezas si rompes varios ladrillos a la vez.","upgrades.streak_shots.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta. El combo se pone a cero cuando la pelota golpea la raqueta. Una vez que tu combo supera el valor base, tu raqueta se vuelve roja para recordarte que tocarla con la pelota destruir\xe1 tu combo.","upgrades.sturdy_bricks.name":"Ladrillos macizos","upgrades.sturdy_bricks.tooltip":"+{{lvl}} puntos de vida de los ladrillos, +{{percent}}% monedas cuando se destruyen","upgrades.sturdy_bricks.verbose_description":"Cada nivel de esta mejora a\xf1ade un PV a todos los ladrillos. Puedes comprobar el n\xfamero de PV usando la cualificaci\xf3n \\"Clarividente\\". Puedes aumentar el da\xf1o de las balas obteniendo la mejora \\"Bala perforante\\". Cada nivel de esta mejora a\xf1ade un 50% m\xe1s de monedas.","upgrades.superhot.name":"S\xfaper caliente","upgrades.superhot.tooltip":"El tiempo se mueve cuando se mueve la paleta.","upgrades.superhot.verbose_description":"SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE","upgrades.telekinesis.help_plural":"Mayor efecto sobre el bal\xf3n","upgrades.telekinesis.name":"Telequinesis","upgrades.telekinesis.tooltip":"Control de la trayectoria del bal\xf3n","upgrades.telekinesis.verbose_description":"Controla la bola mientras sube.","upgrades.top_is_lava.name":"Icare","upgrades.top_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el rebote del techo","upgrades.top_is_lava.verbose_description":"Cada vez que rompas un ladrillo, tu combo aumentar\xe1 en uno. Sin embargo, tu combo se reiniciar\xe1 en cuanto tu bola llegue a la parte superior de la pantalla.\\n\\nCuando tu combo supere el m\xednimo, aparecer\xe1 una barra roja en la parte superior de la pantalla para recordarte que debes evitar golpearla.","upgrades.trampoline.name":"Trampol\xedn","upgrades.trampoline.tooltip":"+{{lvl}} combo cada vez que una pelota rebota en la raqueta,-{{lvl}} combo cada vez que una pelota rebota en uno de los bordes","upgrades.trampoline.verbose_description":"Una de las pocas mejoras que no tiene una condici\xf3n de reinicio","upgrades.transparency.name":"Transparencia","upgrades.transparency.tooltip":"Cuanto m\xe1s alta est\xe9 la bola en la pantalla, m\xe1s transparente se volver\xe1. Cuanto m\xe1s transparente sea, m\xe1s monedas producir\xe1.","upgrades.transparency.verbose_description":"Los niveles m\xe1s altos hacen que la pelota se vuelva transparente m\xe1s r\xe1pidamente y aumentan la bonificaci\xf3n de puntos.","upgrades.trickledown.name":"Escorrent\xeda","upgrades.trickledown.tooltip":"Las monedas aparecen en la parte superior de la pantalla.","upgrades.trickledown.verb s.addiction.name":"Ba\u011F\u0131ml\u0131l\u0131k","upgrades.addiction.tooltip":"+{{lvl}} kombo / tu\u011Fla, kombo bir tu\u011Flay\u0131 k\u0131rd\u0131ktan sonra {{delay}}saniye i\xe7inde s\u0131f\u0131rlan\u0131r.","upgrades.addiction.verbose_description":"Geri say\u0131m yaln\u0131zca her seviyenin ilk tu\u011Flas\u0131 k\u0131r\u0131ld\u0131ktan sonra ba\u015Flar. T\xfcm tu\u011Flalar yok edildi\u011Finde durur.","upgrades.asceticism.name":"Z\xfchd","upgrades.asceticism.tooltip":"+{{combo}} kombo / tu\u011Fla, - {{combo}} jeton yakalamada","upgrades.asceticism.verbose_description":"Kombonuz t\u0131rman\u0131rken paralar\u0131 bir yere saklaman\u0131z gerekecek.","upgrades.ball_attract_ball.help_plural":"Daha g\xfc\xe7l\xfc \xe7ekim kuvveti","upgrades.ball_attract_ball.name":"Yer \xe7ekimi","upgrades.ball_attract_ball.tooltip":"Toplar toplar\u0131n\u0131 \xe7eker","upgrades.ball_attract_ball.verbose_description":"\\"Oyun alan\u0131n\u0131n geni\u015Fli\u011Finin 3/4\'\xfcnden\\" daha uzakta olan toplar birbirini \xe7ekmeye ba\u015Flayacakt\u0131r. \\n\\n\xc7ekim kuvveti, birbirlerinden en uzakta olduklar\u0131nda daha g\xfc\xe7l\xfcd\xfcr. \\n\\nG\xf6kku\u015Fa\u011F\u0131 par\xe7ac\u0131klar\u0131 \xe7ekim kuvvetini sembolize etmek i\xe7in u\xe7acakt\u0131r. Bu avantaj yaln\u0131zca birden fazla topunuz varsa sunulur.","upgrades.ball_attracts_coins.name":"Toplar madeni paralar\u0131 \xe7eker","upgrades.ball_attracts_coins.tooltip":"Madeni paralar en yak\u0131n topu takip eder ve daha yava\u015F d\xfc\u015Fer","upgrades.ball_attracts_coins.verbose_description":"\\"Leke\\" ve \\"hayalet paralar\\" ile birle\u015Ftirdi\u011Finizde, bu, paralarla toplar\u0131n \\"etraf\u0131n\u0131 boyamak\\" i\xe7in kullan\u0131labilir. Ayr\u0131ca, para m\u0131knat\u0131s\u0131 yerine de kullan\u0131labilir.","upgrades.ball_repulse_ball.help_plural":"Daha g\xfc\xe7l\xfc itme kuvveti","upgrades.ball_repulse_ball.name":"Ki\u015Fisel alan","upgrades.ball_repulse_ball.tooltip":"Toplar toplar\u0131 iter","upgrades.ball_repulse_ball.verbose_description":"\xc7eyrek ekran geni\u015Fli\u011Finden daha az uzakl\u0131ktaki toplar birbirini itmeye ba\u015Flayacakt\u0131r. Birbirlerine yak\u0131nlarsa itme kuvveti daha g\xfc\xe7l\xfcd\xfcr. Par\xe7ac\u0131klar bu kuvvetin uyguland\u0131\u011F\u0131n\u0131 sembolize etmek i\xe7in d\u0131\u015Far\u0131 f\u0131rlayacakt\u0131r. Bu avantaj yaln\u0131zca birden fazla topunuz varsa sunulur.","upgrades.base_combo.name":"G\xfc\xe7l\xfc temeller","upgrades.base_combo.tooltip":"Kombo 1 yerine {{coins}} \'dan ba\u015Flar.","upgrades.base_combo.verbose_description":"Kombonuz normalde seviyenin ba\u015F\u0131nda 1\'den ba\u015Flar ve hi\xe7bir \u015Feye \xe7arpmadan z\u0131plad\u0131\u011F\u0131n\u0131zda 1\'e s\u0131f\u0131rlan\u0131r. Bu avantajla, kombo 3 puan daha y\xfcksekte ba\u015Flar, bu y\xfczden her zaman tu\u011Fla ba\u015F\u0131na en az 4 jeton al\u0131rs\u0131n\u0131z. Kombonuz her s\u0131f\u0131rland\u0131\u011F\u0131nda, 1 yerine 4\'e geri d\xf6ner. Topunuz, kombosunun birden y\xfcksek oldu\u011Funu belirtmek i\xe7in biraz par\u0131ldayacakt\u0131r.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Daha b\xfcy\xfck patlamalar","upgrades.bigger_explosions.verbose_description":"Varsay\u0131lan patlama 3x3 kareyi temizler, bununla 5x5 kare olur ve paralara gelen darbe de \xf6nemli \xf6l\xe7\xfcde daha g\xfc\xe7l\xfcd\xfcr. Ekran her patlamadan sonra yan\u0131p s\xf6ner (temel mod hari\xe7)","upgrades.bigger_puck.name":"Daha b\xfcy\xfck k\xfcrek","upgrades.bigger_puck.tooltip":"Kolayca daha fazla para yakalay\u0131n.","upgrades.bigger_puck.verbose_description":"Daha b\xfcy\xfck bir k\xfcrek, topu asla \u0131skalamaman\u0131z\u0131 ve daha fazla jeton yakalaman\u0131z\u0131 kolayla\u015Ft\u0131r\u0131r, ayr\u0131ca topun sekme a\xe7\u0131s\u0131n\u0131 hassas bir \u015Fekilde ayarlaman\u0131z\u0131 sa\u011Flar (topun a\xe7\u0131s\u0131 yaln\u0131zca k\xfcre\u011Fe \xe7arpt\u0131\u011F\u0131 yere ba\u011Fl\u0131d\u0131r).","upgrades.bricks_attract_ball.name":"Tu\u011Flalar toplar\u0131 \xe7eker","upgrades.bricks_attract_ball.tooltip":"Top \xe7arpaca\u011F\u0131 ilk {{count}} tu\u011Flaya do\u011Fru gider.","upgrades.bricks_attract_ball.verbose_description":"Etkisi daha y\xfcksek seviyelerde daha g\xfc\xe7l\xfcd\xfcr. Etki durmadan \xf6nce vurabilecek tu\u011Fla say\u0131s\u0131 da daha y\xfcksektir. Etki, top diske \xe7arpt\u0131\u011F\u0131nda yeniden silahlan\u0131r.","upgrades.bricks_attract_coins.name":"Tu\u011Flalar madeni paralar\u0131 \xe7eker","upgrades.bricks_attract_coins.tooltip":"Onlar\u0131n orada kalmalar\u0131na yard\u0131mc\u0131 olur","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Durug\xf6r\xfc sahibi","upgrades.clairvoyant.tooltip":"Yakla\u015Fan seviyeleri, tu\u011Fla HP\'sini ve top y\xf6n\xfcn\xfc g\xf6r\xfcn","upgrades.clairvoyant.verbose_description":"Do\u011Fru y\xfckseltmeleri se\xe7menize ve sa\u011Flam tu\u011Flalarla neler olup bitti\u011Fini anlaman\u0131za yard\u0131mc\u0131 olur. Seviye 2 ve 3, \u015F\xfcpheli fayda hakk\u0131nda ek bilgi getirir (d\xf6ng\xfc modunda eri\u015Filebilir)","upgrades.coin_magnet.help_plural":"Madeni paralar \xfczerinde daha g\xfc\xe7l\xfc etki","upgrades.coin_magnet.name":"Madeni para m\u0131knat\u0131s\u0131","upgrades.coin_magnet.tooltip":"K\xfcrek paralar\u0131 \xe7ekiyor","upgrades.coin_magnet.verbose_description":"Madeni paralar\u0131 k\xfcre\u011Fe y\xf6nlendirir. Madeni para zaten k\xfcre\u011Fe yak\u0131nsa etkisi daha g\xfc\xe7l\xfcd\xfcr.","upgrades.compound_interest.name":"Bile\u015Fik faiz","upgrades.compound_interest.tooltip":"+{{lvl}} kombo her k\u0131r\u0131lan tu\u011Fla i\xe7in, jeton kaybedildi\u011Finde s\u0131f\u0131rlan\u0131r","upgrades.compound_interest.verbose_description":"Her tu\u011Flay\u0131 k\u0131rd\u0131\u011F\u0131n\u0131zda kombonuz bir artacak ve k\u0131rd\u0131\u011F\u0131n\u0131z her tu\u011Flayla birlikte daha fazla jeton ortaya \xe7\u0131kacakt\u0131r. \\nAncak, bu jetonlar\u0131n her birini k\xfcre\u011Finizle yakalad\u0131\u011F\u0131n\u0131zdan emin olun, \xe7\xfcnk\xfc kaybedilen jeton kombonuzu s\u0131f\u0131rlayacakt\u0131r.\\nKombonuz minimumun \xfczerine \xe7\u0131kt\u0131\u011F\u0131nda, oyun alan\u0131n\u0131n alt k\u0131sm\u0131nda jetonlar\u0131n oraya gitmemesi gerekti\u011Fini hat\u0131rlatan k\u0131rm\u0131z\u0131 bir \xe7izgi olacakt\u0131r.","upgrades.concave_puck.name":"\u0130\xe7b\xfckey k\xfcrek","upgrades.concave_puck.tooltip":"Dikey ni\u015Fan alma hassasiyetini art\u0131r\u0131r","upgrades.concave_puck.verbose_description":"Toplar d\xfcz bir \u015Fekilde yukar\u0131 do\u011Fru \xe7\u0131karak ba\u015Flar ve daha az a\xe7\u0131yla z\u0131plar.","upgrades.corner_shot.name":"K\xf6\u015Fe vuru\u015Fu","upgrades.corner_shot.tooltip":"K\xfcre\u011Finizin ekran\u0131n s\u0131n\u0131rlar\u0131yla \xf6rt\xfc\u015Fmesini sa\u011Flar","upgrades.corner_shot.verbose_description":"K\xf6\u015Felerde ni\u015Fan almaya yard\u0131mc\u0131 olur. Daha ileri seviyeler daha uza\u011Fa gitmenizi sa\u011Flar.","upgrades.etherealcoins.name":"Uzayda Madeni Paralar","upgrades.etherealcoins.tooltip":"Madeni paralar art\u0131k yer \xe7ekiminden etkilenmiyor","upgrades.etherealcoins.verbose_description":"Paralar birka\xe7 kez z\u0131plad\u0131ktan sonra bile h\u0131zlar\u0131n\u0131 koruyacak ve art\u0131k yer \xe7ekiminden etkilenmeyecekler.","upgrades.extra_levels.name":"5 dakika daha","upgrades.extra_levels.tooltip":"7 yerine {{count}} seviye oyna","upgrades.extra_levels.verbose_description":"Varsay\u0131lan oyun en fazla 7 seviye s\xfcrebilir, ard\u0131ndan oyun biter. \\n\\nBu avantaj\u0131n her seviyesi bir seviye daha yukar\u0131 \xe7\u0131kman\u0131z\u0131 sa\u011Flar. Son seviyeler genellikle en fazla puan\u0131 ald\u0131\u011F\u0131n\u0131z seviyelerdir, bu y\xfczden fark dramatik olabilir.","upgrades.extra_life.help_plural":"(Son) topunuz kaybolmak yerine ({{lvl}} kez) dipte sekecektir.","upgrades.extra_life.name":"Ekstra Hayat","upgrades.extra_life.tooltip":"Top, kaybedilmeden \xf6nce alt \xe7izgide bir kez sekecektir.","upgrades.extra_life.verbose_description":"Normalde bir topunuz vard\u0131r ve oyun onu b\u0131rakt\u0131\u011F\u0131n\u0131z anda biter.\\n\\nBu yetenek, ekran\u0131n alt\u0131na bir kez topu kurtaracak ve bu s\xfcre\xe7te k\u0131r\u0131lacak beyaz bir \xe7ubuk ekler. \\n\\nEkran\u0131n alt\u0131nda bir top her z\u0131plad\u0131\u011F\u0131nda bu yetene\u011Fin bir seviyesini kaybedersiniz.","upgrades.forgiving.name":"Ba\u011F\u0131\u015Flay\u0131c\u0131","upgrades.forgiving.tooltip":"Molalar\u0131 ka\xe7\u0131rmak, komboyu bir kerede azaltmak yerine kademeli olarak azalt\u0131r.","upgrades.forgiving.verbose_description":"Her seviyede ilk \u0131skalama bedava, sonra kombonun %10\'u, sonra %20\'si...","upgrades.fountain_toss.name":"\xc7e\u015Fme at\u0131\u015F\u0131","upgrades.fountain_toss.tooltip":"Birka\xe7 jetonu ka\xe7\u0131rd\u0131\u011F\u0131n\u0131zda bir miktar kombo kazan\u0131n.","upgrades.fountain_toss.verbose_description":"Bir jetonu ka\xe7\u0131rd\u0131\u011F\u0131n\u0131zda ve kombonuz {{max}}alt\u0131ndaysa, kombonuzun bir artma olas\u0131l\u0131\u011F\u0131 {{lvl}}/ kombodur.","upgrades.ghost_coins.name":"Hayalet paralar","upgrades.ghost_coins.tooltip":"Madeni paralar yava\u015F\xe7a tu\u011Flalar\u0131n aras\u0131ndan ge\xe7iyor","upgrades.ghost_coins.verbose_description":"Bu bir hata de\u011Fil, bir \xf6zellik! Madeni paralar tu\u011Flalar\u0131n i\xe7inden yava\u015F\xe7a u\xe7ar. Daha y\xfcksek seviyeler daha h\u0131zl\u0131 hareket etmelerini sa\u011Flar.","upgrades.helium.name":"Helyum","upgrades.helium.tooltip":"Yer\xe7ekimi k\xfcre\u011Fin solunda ve sa\u011F\u0131nda tersine d\xf6nd\xfc","upgrades.helium.verbose_description":"Bu, paralar\u0131 etkileyecek ve siz onlar\u0131 almaya haz\u0131r olana kadar paralar\u0131n havada as\u0131l\u0131 kalmas\u0131na neden olacakt\u0131r.","upgrades.hot_start.name":"S\u0131cak ba\u015Flang\u0131\xe7","upgrades.hot_start.tooltip":" {{start}}kombosundan ba\u015Fla, saniyede{{loss}} kombo","upgrades.hot_start.verbose_description":"Her seviyenin ba\u015F\u0131nda kombonuz +30 puanla ba\u015Flayacak, ancak daha sonra her saniye bir puan d\xfc\u015Fecek. Etki di\u011Fer avantajlarla birikiyor.","upgrades.hypnosis.name":"Hipnoz","upgrades.hypnosis.tooltip":"Bir tu\u011Flan\u0131n rengi de\u011Fi\u015Fti\u011Finde, o paray\u0131 en yak\u0131n topa \u0131\u015F\u0131nlay\u0131n ve tu\u011Flay\u0131 lekeleme yetene\u011Fini yeniden y\xfckleyin.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"\u0130\xe7 patlamalar","upgrades.implosions.tooltip":"Patlamalar paralar\u0131 d\u0131\u015Far\u0131 atmak yerine i\xe7eri \xe7ekiyor","upgrades.implosions.verbose_description":"Patlama kuvveti di\u011Fer \u015Fekilde uygulan\u0131r. Daha ileri seviyeler \\"daha b\xfcy\xfck patlama\\" olarak i\u015Flev g\xf6r\xfcr.","upgrades.instant_upgrade.name":"An\u0131nda y\xfckseltme","upgrades.instant_upgrade.tooltip":"\u015Eimdi +2 y\xfckseltme, oyun sonuna kadar -1 se\xe7im.","upgrades.instant_upgrade.verbose_description":"Hemen iki y\xfckseltme se\xe7in, b\xf6ylece birini \xfccretsiz, di\u011Ferini de bu avantaj\u0131 elde etmek i\xe7in kullan\u0131lan\u0131 geri \xf6deyin. Y\xfckseltmeleri se\xe7mek i\xe7in her sonraki men\xfcde se\xe7ebilece\u011Finiz daha az se\xe7enek olacak.","upgrades.left_is_lava.name":"Sol taraftan ka\xe7\u0131n\u0131n","upgrades.left_is_lava.tooltip":"+ K\u0131r\u0131lan tu\u011Fla ba\u015F\u0131na{{lvl}} kombo. Top ekran\u0131n sol taraf\u0131na \xe7arparsa kombo s\u0131f\u0131rlan\u0131r","upgrades.left_is_lava.verbose_description":"Bir tu\u011Flay\u0131 k\u0131rd\u0131\u011F\u0131n\u0131zda, kombonuz bir artacak, b\xf6ylece k\u0131rd\u0131\u011F\u0131n\u0131z sonraki t\xfcm tu\u011Flalardan bir jeton daha alacaks\u0131n\u0131z.\\n\\nAncak, kombonuz topunuz sol tarafa \xe7arpt\u0131\u011F\u0131 anda s\u0131f\u0131rlanacakt\u0131r. \\n\\nKombonuz y\xfckseldi\u011Fi anda, sol taraf k\u0131rm\u0131z\u0131ya d\xf6nerek onlara \xe7arpmaman\u0131z gerekti\u011Fini hat\u0131rlat\u0131r.\\n","upgrades.limitless.name":"S\u0131n\u0131rs\u0131z","upgrades.limitless.tooltip":"T\xfcm y\xfckseltmelerin maksimum seviyesini {{lvl}} kadar art\u0131r\u0131n","upgrades.limitless.verbose_description":"Bu yetene\u011Fi se\xe7mek, onun kendi s\u0131n\u0131r\u0131n\u0131 da bir artt\u0131r\u0131r ve tekrar se\xe7menize olanak tan\u0131r.","upgrades.metamorphosis.name":"Ba\u015Fkala\u015F\u0131m","upgrades.metamorphosis.tooltip":"Her madeni para, {{lvl}} tu\u011Flay\u0131 kendi rengiyle lekeleyebilir","upgrades.metamorphosis.verbose_description":"Bu yetenekle, madeni paralar geldikleri tu\u011Flan\u0131n renginde olacak ve dokunduklar\u0131 ilk tu\u011Flay\u0131 ayn\u0131 renge boyayacak. Madeni paralar onlar\u0131 k\u0131ran topun h\u0131z\u0131yla ortaya \xe7\u0131kar, bu da \\"boyamak\\" istedi\u011Finiz tu\u011Flalara do\u011Fru biraz ni\u015Fan alabilece\u011Finiz anlam\u0131na gelir. 1. seviyede, her madeni para \\"harcanmadan\\" ve i\xe7i bo\u015F g\xf6r\xfcnmeden \xf6nce 1 tu\u011Flay\u0131 boyayabilir.","upgrades.minefield.name":"May\u0131n tarlas\u0131","upgrades.minefield.tooltip":"Ekrandaki bomba tu\u011Flas\u0131 ba\u015F\u0131na +{{lvl}} kombo","upgrades.minefield.verbose_description":"Bir tu\u011Fla yerle\u015Ftirildi\u011Finde komboya +lvl ekler, tu\u011Fla yok edildi\u011Finde -lvl ekler ve temel komboyu tu\u011Fla say\u0131s\u0131yla lvl \xe7arp\u0131m\u0131 kadar y\xfckseltir","upgrades.multiball.name":"\xc7oklu top","upgrades.multiball.tooltip":"Her seviyeye {{count}} topla ba\u015Flay\u0131n.","upgrades.multiball.verbose_description":"Breakout 71\'de topu d\xfc\u015F\xfcrd\xfc\u011F\xfcn\xfcz anda kaybedersiniz. \\n\\nBu avantajla iki top elde edersiniz ve bu y\xfczden birini kaybetmeyi g\xf6ze alabilirsiniz. \\n\\nKaybedilen toplar bir sonraki seviyede geri gelir. \\n\\nBirden fazla topa sahip olmak baz\u0131 ek avantajlar\u0131 kullan\u0131labilir hale getirir ve tabii ki seviyeyi daha h\u0131zl\u0131 temizler.","upgrades.nbricks.name":"S\u0131k\u0131 \xf6rneklem b\xfcy\xfckl\xfc\u011F\xfc","upgrades.nbricks.tooltip":"K\xfcrek s\u0131\xe7ramas\u0131 ba\u015F\u0131na tam olarak {{lvl}} tu\u011Fla vurun +{{lvl}} kombo i\xe7in, aksi takdirde s\u0131f\u0131rlan\u0131r","upgrades.nbricks.verbose_description":"Bu tu\u011Flalar\u0131 yok etmeniz gerekmiyor ancak onlara vurman\u0131z gerekiyor. Patlamalarla yok edilen tu\u011Flalar say\u0131lmaz","upgrades.one_more_choice.name":"Ekstra se\xe7enek","upgrades.one_more_choice.tooltip":"Daha fazla seviye atlama, listede {{lvl}} daha fazla se\xe7enek sunacak","upgrades.one_more_choice.verbose_description":"Her y\xfckseltme men\xfcs\xfc bir se\xe7ene\u011Fe daha sahip olacak. Se\xe7ebilece\u011Finiz y\xfckseltme say\u0131s\u0131n\u0131 art\u0131rmaz.","upgrades.passive_income.name":"Pasif gelir","upgrades.passive_income.tooltip":"+{{lvl}} kombo / tu\u011Fla, k\xfcrek son {{time}}saniyede hareket etmedi\u011Fi s\xfcrece, bunun yerine s\u0131f\u0131rlan\u0131r","upgrades.passive_income.verbose_description":"Baz\u0131 \xf6zellikler, toplar\u0131n hi\xe7bir \u015Fey yapman\u0131za gerek kalmadan istedi\u011Finizi yapmas\u0131na yard\u0131mc\u0131 olabilir.","upgrades.picky_eater.name":"Se\xe7ici yiyen","upgrades.picky_eater.tooltip":"+{{lvl}} kombo her tu\u011Fla k\u0131r\u0131ld\u0131\u011F\u0131nda, top rengi de\u011Fi\u015Fti\u011Finde s\u0131f\u0131rlan\u0131r","upgrades.picky_eater.verbose_description":"Topunuzla ayn\u0131 renkte bir tu\u011Flay\u0131 k\u0131rd\u0131\u011F\u0131n\u0131zda, kombonuz bir artar. \\nE\u011Fer farkl\u0131 bir renkteyse, top yeni rengi al\u0131r, ancak kombo s\u0131f\u0131rlan\u0131r, tabii topun renginde tu\u011Fla kalmam\u0131\u015Fsa. \\nMinimumunuzdan daha y\xfcksek bir kombo elde etti\u011Finizde, yanl\u0131\u015F renkteki tu\u011Flalar k\u0131rm\u0131z\u0131 bir kenarl\u0131k al\u0131r. \\nBirden fazla topunuz varsa, bunlardan biri bir tu\u011Flaya \xe7arpt\u0131\u011F\u0131nda hepsi renk de\u011Fi\u015Ftirir.","upgrades.pierce.name":"Delme","upgrades.pierce.tooltip":"K\xfcrek z\u0131plamas\u0131ndan sonra top {{count}} tu\u011Flay\u0131 deldi","upgrades.pierce.verbose_description":"Top normalde bir \u015Feye dokundu\u011Fu anda z\u0131plar. Bu avantajla, 3 tu\u011Fla k\u0131r\u0131l\u0131ncaya kadar y\xf6r\xfcngesine devam eder. \\n\\nBundan sonra, 4. tu\u011Flada z\u0131plar ve sayac\u0131 s\u0131f\u0131rlamak i\xe7in k\xfcre\u011Fe dokunman\u0131z gerekir.","upgrades.pierce_color.name":"Renk delme","upgrades.pierce_color.tooltip":"+{{lvl}} topun rengindeki tu\u011Flalara hasar","upgrades.pierce_color.verbose_description":"Bir top ayn\u0131 renkteki bir tu\u011Flaya \xe7arpt\u0131\u011F\u0131nda, engellenmeden ge\xe7ecektir. \\n\\nFarkl\u0131 renkteki bir tu\u011Flaya ula\u015Ft\u0131\u011F\u0131nda, onu k\u0131racak, rengini alacak ve sekecektir.\\n\\nSa\u011Flam tu\u011Flalar\u0131n\u0131z varsa, top yine de ayn\u0131 renkteki bir tu\u011Fladan sekebilir.","upgrades.puck_repulse_ball.help_plural":"Daha g\xfc\xe7l\xfc itme kuvveti","upgrades.puck_repulse_ball.name":"Yumu\u015Fak ini\u015F","upgrades.puck_repulse_ball.tooltip":"K\xfcrek toplar\u0131 iter","upgrades.puck_repulse_ball.verbose_description":"Bir top k\xfcre\u011Fe yakla\u015Ft\u0131\u011F\u0131nda yava\u015Flamaya ba\u015Flayacak ve hatta k\xfcre\u011Fe de\u011Fmeden bile z\u0131plamaya ba\u015Flayacakt\u0131r.","upgrades.rainbow.name":"G\xf6kku\u015Fa\u011F\u0131","upgrades.rainbow.tooltip":"Paralar g\xf6kku\u015Fa\u011F\u0131 renklerinde ortaya \xe7\u0131kar.","upgrades.rainbow.verbose_description":"Her seviye renkli jetonlar\u0131n oran\u0131n\u0131 art\u0131r\u0131r. Renk seviye zaman\u0131na ba\u011Fl\u0131d\u0131r.","upgrades.reach.name":"Yukar\u0131dan a\u015Fa\u011F\u0131ya","upgrades.reach.tooltip":"En alt s\u0131radaki N tu\u011Flas\u0131na dokunmak komboyu s\u0131f\u0131rlar. Aksi takdirde, +N kombo","upgrades.reach.verbose_description":"E\u011Fer sadece bir s\u0131ra tu\u011Fla varsa veya en alttaki tu\u011Fla s\u0131ras\u0131 oyunun t\xfcm geni\u015Fli\u011Fini kapl\u0131yorsa, bu avantaj hi\xe7bir i\u015Fe yaramaz. Aksi takdirde, bu en alttaki s\u0131ray\u0131 k\u0131rmak komboyu s\u0131f\u0131rlarken, ba\u015Fka bir \u015Feyi k\u0131rmak komboyu o en alttaki s\u0131rada bulunan tu\u011Fla say\u0131s\u0131 kadar art\u0131r\u0131r. \\n\\nEn alttaki s\u0131ra k\u0131rm\u0131z\u0131yla vurgulanacakt\u0131r.","upgrades.respawn.name":"Yeniden canlanma","upgrades.respawn.tooltip":" {{delay}}saniye sonra tu\u011Flalar\u0131n %{{percent}}\'\u0131 yeniden ortaya \xe7\u0131kar.","upgrades.respawn.verbose_description":"Baz\u0131 par\xe7ac\u0131k efektleri tu\u011Flalar\u0131n nerede belirece\u011Fini size bildirecektir.","upgrades.right_is_lava.name":"Sa\u011F taraftan ka\xe7\u0131n\u0131n","upgrades.right_is_lava.tooltip":"Tu\u011Fla ba\u015F\u0131na +{{lvl}} kombo. Top ekran\u0131n sa\u011F taraf\u0131na \xe7arparsa kombo s\u0131f\u0131rlan\u0131r","upgrades.right_is_lava.verbose_description":"Bir tu\u011Flay\u0131 k\u0131rd\u0131\u011F\u0131n\u0131zda, kombonuz bir artacak, b\xf6ylece k\u0131rd\u0131\u011F\u0131n\u0131z sonraki t\xfcm tu\u011Flalardan bir jeton daha alacaks\u0131n\u0131z.\\n\\nAncak, topunuz sa\u011F tarafa \xe7arpt\u0131\u011F\u0131 anda kombonuz s\u0131f\u0131rlanacakt\u0131r.\\n\\nKombonuz y\xfckseldi\u011Fi anda, onlara \xe7arpmaktan ka\xe7\u0131nman\u0131z gerekti\u011Fini hat\u0131rlatmak i\xe7in sa\u011F taraf k\u0131rm\u0131z\u0131 olur.","upgrades.sacrifice.help_l1":"Bir can\u0131 kaybetmek t\xfcm tu\u011Flalar\u0131 temizler","upgrades.sacrifice.help_over":"Komboya {{lvl}}can eklendi\u011Finde t\xfcm tu\u011Flalar temizlenir","upgrades.sacrifice.name":"Kurban etmek","upgrades.sacrifice.verbose_description":"Bu, komboyu olduk\xe7a y\xfckse\u011Fe \xe7\u0131karabilir.","upgrades.sapper.help_plural":"\u0130lk k\u0131r\u0131lan {{lvl}} tu\u011Fla bombaya d\xf6n\xfc\u015F\xfcr.","upgrades.sapper.name":"Kazmac\u0131","upgrades.sapper.tooltip":"\u0130lk k\u0131r\u0131lan tu\u011Fla bombaya d\xf6n\xfc\u015F\xfcr.","upgrades.sapper.verbose_description":"Sadece ortadan kaybolmak yerine, k\u0131rd\u0131\u011F\u0131n\u0131z ilk tu\u011Fla bir bomba tu\u011Flas\u0131yla de\u011Fi\u015Ftirilecektir. K\xfcrek \xfczerinde topu sektirmek, efekti yeniden etkinle\u015Ftirir. Bu yetene\u011Fi seviyelendirmek, daha fazla bomba yerle\u015Ftirmenize olanak tan\u0131r.","upgrades.shocks.name":"\u015Eoklar","upgrades.shocks.tooltip":"Patlay\u0131c\u0131 top \xe7arp\u0131\u015Fmalar\u0131","upgrades.shocks.verbose_description":"\u0130ki top \xe7arp\u0131\u015Ft\u0131\u011F\u0131nda h\u0131zlar\u0131 de\u011Fi\u015Fir, bir patlama meydana gelir ve onlar\u0131 ay\u0131rmak i\xe7in ek h\u0131z kazan\u0131rlar.","upgrades.shunt.name":"\u015Eant","upgrades.shunt.tooltip":"Kombonuzun {{percent}}%\'sini seviyeler aras\u0131nda tutun","upgrades.shunt.verbose_description":"E\u011Fer s\u0131cak ba\u015Flatma \xf6zelli\u011Finiz de varsa, s\u0131cak ba\u015Flatma \xf6zelli\u011Fi mevcut kombinasyona eklenir","upgrades.side_flip.name":"Sa\u011F elini kullanan","upgrades.side_flip.tooltip":"Sa\u011Fdan k\u0131r\u0131lan tu\u011Fla ba\u015F\u0131na +{{lvl}} kombo, aksi takdirde -{{loss}} ","upgrades.side_flip.verbose_description":"Bir kombo kazanmak i\xe7in tu\u011Flan\u0131n sa\u011F taraf\u0131na vurun, ancak sol taraf\u0131na vurmaktan ka\xe7\u0131n\u0131n \xe7\xfcnk\xfc bu 2 komboyu kald\u0131r\u0131r. \xdcstten ve alttan vurman\u0131n bir etkisi yoktur.","upgrades.side_kick.name":"Solak","upgrades.side_kick.tooltip":"Soldan k\u0131r\u0131lan tu\u011Fla ba\u015F\u0131na +{{lvl}} kombo, aksi takdirde -{{loss}} ","upgrades.side_kick.verbose_description":"Tu\u011Flan\u0131n sol taraf\u0131na vurarak bir kombo elde edin, ancak sa\u011F taraf\u0131na vurma t die Anzahl der M\xfcnzen, die beim Zerbrechen eines Steins entstehen.\\nSie wird auf deinem Paddel angezeigt, zum Beispiel x4 bedeutet, dass jeder Stein 4 M\xfcnzen hervorbringt.\\nDie meisten Upgrades, die den Combo erh\xf6hen, f\xfcgen auch eine Bedingung hinzu, um ihn zur\xfcckzusetzen.\\nDie Kombo wird auch zur\xfcckgesetzt, wenn der Ball zum Schl\xe4ger zur\xfcckkehrt, ohne einen Stein zu treffen.\\nIn diesem Fall wird eine \\"Miss\\"-Meldung angezeigt.\\n\\nVersuchen Sie, jedes Mal auf einen Stein zu zielen.\\n\\n## Anvisieren\\n\\nNur die Position des Balls auf dem Schl\xe4ger entscheidet dar\xfcber, wie der Ball abprallt.\\nWenn der Ball das Paddel genau in der Mitte trifft, prallt er senkrecht nach oben ab.\\nWenn du ihn mehr auf einer Seite triffst, hat er einen gr\xf6\xdferen Winkel.\\nDie Paddelgeschwindigkeit und der Auftreffwinkel haben keinen Einfluss auf die Richtung des Balls nach dem Aufprall.\\n\\nViele Upgrades, die beim Zielen helfen, k\xf6nnen freigeschaltet werden.\\n\\n## Freischaltungen\\n\\nWenn du Breakout 71 zum ersten Mal spielst, sind die meisten Upgrades und Levels gesperrt.\\nUpgrades werden freigeschaltet, indem du einfach spielst und viele M\xfcnzen f\xe4ngst.\\nDie ersten Level werden durch das Erreichen einer hohen Punktzahl freigeschaltet.\\nSp\xe4tere Levels f\xfcgen eine Bedingung hinzu, welche Verg\xfcnstigungen Sie ausw\xe4hlen k\xf6nnen.\\n\\nEine hohe Punktzahl zu erreichen ist viel einfacher, wenn du nach jedem Level mehrere Upgrades erh\xe4ltst.\\n\\n## Re-Rolls und kostenlose Upgrades\\n\\nWenn du gut spielst, bekommst du ein zus\xe4tzliches Upgrade, das du ausw\xe4hlen kannst:\\n\\n- Schaffe das Level in weniger als {{levelTimeGood}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedGood}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateGood}}% der M\xfcnzen\\n- Verfehle die Steine weniger als {{missesGood}} Mal\\n\\nDu bekommst auch einen Re-Roll, mit dem du Upgrades \xfcberspringen kannst, wenn du noch besser abschneidest:\\n\\n- Schaffe ein Level in weniger als {{levelTimeBest}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedBest}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateBest}}% der M\xfcnzen\\n- Verfehle die Steine weniger als {{missesBest}} Mal\\n\\nMit einer Option in den Einstellungen k\xf6nnen Sie diese Statistiken anzeigen lassen","help.help":"Erfahren Sie mehr \xfcber das Spiel","help.levels":"Ebenen","help.title":"Hilfe","help.upgrades":"## Upgrades","history.columns.score":"Ergebnis","history.columns.started":"Datum","history.help":"Sehen Sie Ihre {{count}} besten Spiele.","history.locked":"Mindestens zehn Spiele spielen, um freizuschalten","history.title":"L\xe4uft Geschichte","lab.help":"Versuchen Sie jede beliebige Konstruktion","lab.instructions":"W\xe4hlen Sie unten die Upgrades aus und w\xe4hlen Sie dann ein Level, das Sie spielen m\xf6chten.","lab.menu_entry":"Kreativ-Modus","lab.reset":"Alle auf 0 zur\xfccksetzen","lab.select_level":"W\xe4hlen Sie einen Level zum Spielen","lab.unlocks_at":"Wird freigeschaltet bei Gesamtpunktzahl {{score}}","level_up.after_buttons":"Du hast gerade Level {{level}}/{{max}}beendet.","level_up.before_buttons":"Du hast {{score}} M\xfcnzen {{catchGain}} aus {{levelSpawnedCoins}} in {{time}} Sekunden {{timeGain}}gefangen.\\n\\nDu hast {{levelMisses}} Mal danebengeschossen {{missesGain}} und {{levelWallBounces}} Mal die W\xe4nde oder die Decke getroffen{{wallHitsGain}}.\\n\\n{{compliment}}","level_up.compliment_advice":"Versuche, alle M\xfcnzen zu fangen, verpasse nie die Steine, sto\xdfe nie an die W\xe4nde/Decke oder schaffe das Level unter 30 Sekunden, um zus\xe4tzliche Upgrades zu erhalten.","level_up.compliment_good":"Gut gemacht!","level_up.compliment_perfect":"Beeindruckend, machen Sie weiter so!","level_up.pick_upgrade_title":"W\xe4hlen Sie ein Upgrade","level_up.plus_one_upgrade":"(+1 Aufwertung)","level_up.plus_one_upgrade_and_reroll":"(+1 Aufwertung und +1 Neuwurf)","level_up.reroll":"Neu w\xfcr eim Laden einer Speicherdatei","settings.save_file_loaded":"Geladene Datei speichern","settings.save_file_loaded_help":"Die App wird nun neu geladen, um die Speicherung zu \xfcbernehmen.","settings.save_file_loaded_ok":"Ok","settings.show_fps":"FPS-Z\xe4hler","settings.show_fps_help":"\xdcberwachen Sie die Leistung der Anwendung","settings.show_stats":"Echtzeit-Statistiken anzeigen","settings.show_stats_help":"M\xfcnzen, Zeit, Spr\xfcnge, Fehlsch\xfcsse","settings.sounds":"Spiel-Sounds","settings.sounds_help":"Kann einige Telefone verlangsamen.","starting_perks.checked":"Wenn Sie ein neues Spiel beginnen, wird Ihnen eine dieser Verg\xfcnstigungen angeboten. Klicken Sie auf eine Verg\xfcnstigung, um sie auszuschlie\xdfen.","starting_perks.help":"W\xe4hlen Sie m\xf6gliche Start-Upgrades","starting_perks.random":"Alle Vorteile wurden gestrichen, die Auswahl erfolgt nach dem Zufallsprinzip.","starting_perks.title":"Startvorteile","starting_perks.unchecked":"Die folgenden Verg\xfcnstigungen werden nicht als Startverg\xfcnstigungen angeboten, aber Sie k\xf6nnen sie durch Anklicken zum Pool hinzuf\xfcgen.","unlocks.greyed_out_help":"Die ausgegrauten Upgrades k\xf6nnen freigeschaltet werden, indem Sie Ihre Gesamtpunktzahl erh\xf6hen. Die Gesamtpunktzahl erh\xf6ht sich jedes Mal, wenn Sie im Spiel punkten.","unlocks.intro":"Deine Gesamtpunktzahl ist {{ts}}. Nachfolgend finden Sie alle Upgrades und Levels, die das Spiel zu bieten hat.   Klicken Sie auf ein Upgrade oder eine Stufe, um ein Testspiel damit zu starten.","unlocks.just_unlocked":"Level freigeschaltet","unlocks.just_unlocked_plural":"Du hast soeben {{count}} Stufen freigeschaltet","unlocks.level":"<h2>Du hast {{unlocked}} Stufen von {{out_of}}freigeschaltet </h2>\\n<p>Hier sind alle Spielstufen, klicke eine an, um sie auszuprobieren.</p> ","unlocks.level_description":"Ein {{size}}x{{size}} Level mit {{bricks}} Steinen, {{colors}} Farben und {{bombs}} Bomben.","unlocks.minScore":"Erreiche ${{minScore}} in einem Lauf, um freizuschalten.","unlocks.minScoreWithPerks":"Erreiche ${{minScore}} in einem Durchgang mit {{required}} , aber ohne {{forbidden}} zu entsperren.","unlocks.minTotalScore":"Kumulieren Sie insgesamt ${{score}}","unlocks.reached":"Ihr bestes Ergebnis war {{reached}}.","unlocks.title_upgrades":"Du hast {{unlocked}} Upgrades von {{out_of}}freigeschaltet.","upgrades.addiction.name":"Sucht","upgrades.addiction.tooltip":"+{{lvl}} Combo / Stein, Combo wird {{delay}}s nach Zerbrechen eines Steins zur\xfcckgesetzt.","upgrades.addiction.verbose_description":"Der Countdown beginnt erst nach dem Zerbrechen des ersten Steins eines jeden Levels. Er stoppt, sobald alle Ziegel zerst\xf6rt sind.","upgrades.asceticism.name":"Askese","upgrades.asceticism.tooltip":"+{{combo}} Combo / Ziegel, - {{combo}} bei M\xfcnzfang","upgrades.asceticism.verbose_description":"Sie m\xfcssen die M\xfcnzen irgendwo aufbewahren, w\xe4hrend Ihre Combo aufsteigt.","upgrades.ball_attract_ball.help_plural":"St\xe4rkere Anziehungskraft","upgrades.ball_attract_ball.name":"Schwerkraft","upgrades.ball_attract_ball.tooltip":"B\xe4lle ziehen B\xe4lle an","upgrades.ball_attract_ball.verbose_description":"B\xe4lle, die mehr als \\"3/4 der Spielfeldbreite\\" entfernt sind, beginnen sich gegenseitig anzuziehen.\\n\\nDie Anziehungskraft ist st\xe4rker, wenn sie am weitesten voneinander entfernt sind.\\n\\nUm die Anziehungskraft zu symbolisieren, fliegen Regenbogenpartikel. Dieser Vorteil wird nur angeboten, wenn du bereits mehr als einen Ball hast.","upgrades.ball_attracts_coins.name":"B\xe4lle ziehen M\xfcnzen an","upgrades.ball_attracts_coins.tooltip":"Die M\xfcnzen folgen der n\xe4chstgelegenen Kugel und fallen langsamer herunter.","upgrades.ball_attracts_coins.verbose_description":"Dies k\xf6nnte verwendet werden, um die Kugeln mit M\xfcnzen \\"anzumalen\\", wenn man es mit \\"Flecken\\" und \\"Geisterm\xfcnzen\\" kombiniert. Es funktioniert auch als Ersatz f\xfcr einen M\xfcnzmagneten.","upgrades.ball_repulse_ball.help_plural":"St\xe4rkere Absto\xdfungskraft","upgrades.ball_repulse_ball.name":"Pers\xf6nlicher Raum","upgrades.ball_repulse_ball.tooltip":"B\xe4lle sto\xdfen B\xe4lle ab","upgrades.ball_repulse_ball.verbose_description":"Kugeln, die weniger als ein Viertel der Bildschirmbreite entfernt sind, sto\xdfen sich gegenseitig ab. Die Absto\xdfungskraft ist st\xe4rker, wenn sie sich nahe beieinander befinden. Um diese Kraft zu symbolisieren, werden Partikel herausgeschleudert. Dieser Vorteil wird nur angeboten, wenn Sie bereits mehr als einen Ball haben.","upgrades.base_combo.name":"Starke Grundlagen","upgrades.base_combo.tooltip":"Combo beginnt bei {{coins}} statt bei 1.","upgrades.base_combo.verbose_description":"Deine Combo beginnt normalerweise bei 1 am Anfang des Levels und wird auf 1 zur\xfcckgesetzt, wenn du herumspringst, ohne etwas zu treffen. Mit diesem Vorteil beginnt die Kombo 3 Punkte h\xf6her, sodass du immer mindestens 4 M\xfcnzen pro Stein erh\xe4ltst. Immer, wenn deine Kombo zur\xfcckgesetzt wird, steht sie wieder bei 4 und nicht bei 1. Dein Ball wird ein wenig glitzern, um anzuzeigen, dass sein Combo h\xf6her als 1 ist.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Gr\xf6\xdfere Explosionen","upgrades.bigger_explosions.verbose_description":"Die Standardexplosion r\xe4umt ein 3x3-Quadrat, mit dieser wird es zu einem 5x5-Quadrat, und der Schlag auf die M\xfcnzen ist auch wesentlich st\xe4rker. Der Bildschirm blinkt nach jeder Explosion (au\xdfer im Basismodus)","upgrades.bigger_puck.name":"Gr\xf6\xdferes Paddel","upgrades.bigger_puck.tooltip":"Einfach mehr M\xfcnzen fangen.","upgrades.bigger_puck.verbose_description":"Ein gr\xf6\xdferes Paddel macht es einfacher, den Ball nie zu verfehlen und mehr M\xfcnzen zu fangen. Au\xdferdem kann man die Abpraller genau ausrichten (der Winkel des Balls h\xe4ngt nur davon ab, wo er das Paddel trifft).","upgrades.bricks_attract_ball.name":"Ziegelsteine ziehen B\xe4lle an","upgrades.bricks_attract_ball.tooltip":"Der Ball fliegt zu den ersten {{count}} Steinen, die er trifft.","upgrades.bricks_attract_ball.verbose_description":"Die Wirkung ist bei h\xf6heren Stufen st\xe4rker. Die Anzahl der Steine, die getroffen werden k\xf6nnen, bevor der Effekt aufh\xf6rt, ist ebenfalls h\xf6her. Der Effekt setzt wieder ein, wenn der Ball den Puck trifft.","upgrades.bricks_attract_coins.name":"Ziegelsteine ziehen M\xfcnzen an","upgrades.bricks_attract_coins.tooltip":"Hilft ihnen, dort oben zu bleiben","upgrades.bricks_attract_coins.verbose_description":"","upgrades.clairvoyant.name":"Hellsichtig","upgrades.clairvoyant.tooltip":"Sehen Sie die n\xe4chsten Levels, die HP der Steine und die Ballrichtung","upgrades.clairvoyant.verbose_description":"Hilft dir, die richtigen Upgrades auszuw\xe4hlen und zu verstehen, was es mit den robusten Steinen auf sich hat. Level 2 und 3 bringen zus\xe4tzliches Wissen von zweifelhaftem Nutzen (erreichbar im Loop-Modus)","upgrades.coin_magnet.help_plural":"St\xe4rkere Wirkung auf die M\xfcnzen","upgrades.coin_magnet.name":"Magnet f\xfcr M\xfcnzen","upgrades.coin_magnet.tooltip":"Paddel zieht M\xfcnzen an","upgrades.coin_magnet.verbose_description":"Lenkt die M\xfcnzen auf das Paddel. Der Effekt ist st\xe4rker, wenn die M\xfcnze bereits in der N\xe4he ist.","upgrades.compound_interest.name":"Zinseszins","upgrades.compound_interest.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, R\xfccksetzung bei verlorener M\xfcnze","upgrades.compound_interest.verbose_description":"Deine Combo w\xe4chst jedes Mal um eins, wenn du einen Stein zerbrichst, und bringt mit jedem Stein, den du zerbrichst, mehr und mehr M\xfcnzen hervor.\\nAchten Sie jedoch darauf, jede dieser M\xfcnzen mit Ihrem Paddel aufzufangen, da jede verlorene M\xfcnze Ihre Combo zur\xfccksetzt.\\nSobald deine Kombo \xfcber dem Minimum liegt, wird der Boden des Spielfelds mit einer roten Linie markiert, um dich daran zu erinnern, dass die M\xfcnzen nicht dorthin geh\xf6ren.","upgrades.concave_puck.name":"Konkaves Paddel","upgrades.concave_puck.tooltip":"Verbessert die vertikale Zielgenauigkeit","upgrades.concave_puck.verbose_description":"Die B\xe4lle gehen zu Beginn des Levels gerade nach oben und prallen in einem geringeren Winkel ab.","upgrades.corner_shot.name":"Eckball","upgrades.corner_shot.tooltip":"L\xe4sst Ihr Paddel mit den R\xe4ndern des Bildschirms \xfcberlappen","upgrades.corner_shot.verbose_description":"Hilft beim Zielen in den Kurven. Weitere Stufen lassen Sie weiter hinausgehen.","upgrades.etherealcoins.name":"M\xfcnzen, im Weltraum","upgrades.etherealcoins.tooltip":"M\xfcnzen werden nicht mehr von der Schwerkraft beeinflusst","upgrades.etherealcoins.verbose_description":"Die M\xfcnzen behalten ihre Geschwindigkeit auch nach mehreren Aufprallvorg\xe4ngen bei und werden nicht mehr durch die Schwerkraft beeinflusst.","upgrades.extra_levels.name":"5 min mehr","upgrades.extra_levels.tooltip":"Spielen Sie {{count}} Stufen statt 7","upgrades.extra_levels.verbose_description":"Das Standardspiel kann maximal 7 Stufen dauern, danach ist das Spiel vorbei.\\n\\nMit jeder Stufe dieses Vorteils k\xf6nnen Sie eine Stufe h\xf6her gehen. Die letzten Level sind oft diejenigen, in denen man die meisten Punkte macht, so dass der Unterschied dramatisch sein kann.","upgrades.extra_life.help_plural":"Dein (letzter) Ball wird auf dem Boden aufspringen, anstatt verloren zu gehen ({{lvl}} mal).","upgrades.extra_life.name":"Extraleben","upgrades.extra_life.tooltip":"Der Ball prallt einmal auf der unteren Linie auf, bevor er verloren ist.","upgrades.extra_life.verbose_description":"Normalerweise hat man nur einen Ball, und das Spiel ist vorbei, sobald man ihn fallen l\xe4sst.\\n\\nDieser Vorteil f\xfcgt eine wei\xdfe Leiste am unteren Rand des Bildschirms hinzu, die einen Ball einmal speichert und dabei zerbricht.\\n\\nJedes Mal, wenn ein Ball am unteren Rand des Bildschirms aufprallt, verlierst du eine Stufe dieses Vorteils.","upgrades.forgiving.name":"Verzeihen","upgrades.forgiving.tooltip":"Durch fehlende Pausen wird die Kombo schrittweise reduziert, anstatt auf einmal.","upgrades.forgiving.verbose_description":"Der erste Fehlschuss pro Level ist kostenlos, dann 10% der Combo, dann 20% ...","upgrades.fountain_toss.name":"Springbrunnen-Wurf","upgrades.fountain_toss.tooltip":"Gewinnen Sie etwas Combo, wenn Sie einige M\xfcnzen verpassen.","upgrades.fountain_toss.verbose_description":"Wenn du eine M\xfcnze verpasst und deine Combo unter {{max}}war, hat deine Combo eine Wahrscheinlichkeit von {{lvl}}/Combo um eins zu erh\xf6hen.","upgrades.ghost_coins.name":"Geisterm\xfcnzen","upgrades.ghost_coins.tooltip":"M\xfcnzen gehen langsam durch Ziegelsteine","upgrades.ghost_coins.verbose_description":"Das ist kein Bug, sondern ein Feature!  Die M\xfcnzen fliegen nur langsam durch die Ziegel. H\xf6here Stufen lassen sie schneller fliegen.","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Umgekehrte Schwerkraft links und rechts des Paddels","upgrades.helium.verbose_description":"Dies wirkt sich auf die M\xfcnzen aus und l\xe4sst sie nach oben treiben, bis Sie bereit sind, sie aufzuheben.","upgrades.hot_start.name":"Hei\xdfer Start","upgrades.hot_start.tooltip":"Start bei Kombo {{start}}, -{{loss}} Kombo pro Sekunde","upgrades.hot_start.verbose_description":"Zu Beginn eines jeden Levels beginnt deine Kombo mit +30 Punkten, aber dann wird sie jede Sekunde um einen Punkt verringert. Der Effekt ist mit anderen Perks stapelbar.","upgrades.hypnosis.name":"Hypnose","upgrades.hypnosis.tooltip":"Immer wenn ein Ziegelstein seine Farbe \xe4ndert, teleportierst du diese M\xfcnze zur n\xe4chsten Kugel und l\xe4dst ihre F\xe4higkeit, einen Ziegelstein zu f\xe4rben, wieder auf.","upgrades.hypnosis.verbose_description":"","upgrades.implosions.name":"Implosionen","upgrades.implosions.tooltip":"Explosionen saugen M\xfcnzen an, anstatt sie wegzublasen","upgrades.implosions.verbose_description":"Die Explosionskraft wird in die andere Richtung angewendet. Weitere Stufen wirken als \\"gr\xf6\xdfere Explosion\\".","upgrades.instant_upgrade.name":"Sofortiges Upgrade","upgrades.instant_upgrade.tooltip":"+2 Aufwertung jetzt, -1 Wahl bis Spielende.","upgrades.instant_upgrade.verbose_description":"W\xe4hlen Sie sofort zwei Upgrades aus, so dass Sie ein kostenloses Upgrade erhalten und eines, mit dem Sie das Upgrade, mit dem Sie diese Verg\xfcnstigung erhalten haben, zur\xfcckzahlen. Bei jedem weiteren Men\xfc zur Auswahl von Upgrades gibt es weniger Optionen zur Auswahl.","upgrades.left_is_lava.name":"Linke Seite meiden","upgrades.left_is_lava.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein. Combo wird zur\xfcckgesetzt, wenn der Ball die linke Seite des Bildschirms trifft.","upgrades.left_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erh\xf6ht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine M\xfcnze mehr bekommst.\\n\\nAllerdings wird deine Combo zur\xfcckgesetzt, sobald dein Ball die linke Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die linke Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.limitless.name":"Grenzenlos","upgrades.limitless.tooltip":"Erh\xf6he die maximale Stufe aller Aufwertungen um {{lvl}} ","upgrades.limitless.verbose_description":"Durch die Wahl dieses Vorteils wird auch sein eigenes Limit um eins erh\xf6ht, so dass man es erneut w\xe4hlen kann.","upgrades.metamorphosis.name":"Metamorphose","upgrades.metamorphosis.tooltip":"Jede M\xfcnze kann {{lvl}} Steine mit ihrer Farbe f\xe4rben","upgrades.metamorphosis.verbose_description":"Mit diesem Vorteil haben die M\xfcnzen die Farbe des Ziegels, aus dem sie stammen, und f\xe4rben den ersten Ziegel, den sie ber\xfchren, in derselben Farbe. Die M\xfcnzen spawnen mit der Geschwindigkeit des Balls, der sie zerbrochen hat, was bedeutet, dass du ein bisschen in die Richtung der Ziegelsteine zielen kannst, die du \\"anmalen\\" willst. Auf Stufe 1 kann jede M\xfcnze 1 Ziegelstein einf\xe4rben, bevor sie \\"verbraucht\\" wird und hohl erscheint.","upgrades.minefield.name":"Minenfeld","upgrades.minefield.tooltip":"+{{lvl}} Kombo pro Bombenstein auf dem Bildschirm","upgrades.minefield.verbose_description":"F\xfcgt +lvl zur Combo hinzu, wenn ein Ziegelstein platziert wird, -lvl, wenn er zerst\xf6rt wird, und erh\xf6ht die Basiskombo um die Anzahl der Ziegelsteine mal lvl","upgrades.multiball.name":"Multi-Ball","upgrades.multiball.tooltip":"Beginne jedes Level mit {{count}} B\xe4llen.","upgrades.multiball.verbose_description":"Sobald du den Ball in Breakout 71 fallen l\xe4sst, hast du verloren.\\n\\nMit diesem Vorteil erhalten Sie zwei B\xe4lle und k\xf6nnen es sich daher leisten, einen zu verlieren.\\n\\nDie verlorenen B\xe4lle kommen im n\xe4chsten Level zur\xfcck.\\n\\nWenn du mehr als einen Ball hast, stehen dir weitere Verg\xfcnstigungen zur Verf\xfcgung, und du kannst das Level nat\xfcrlich schneller abschlie\xdfen.","upgrades.nbricks.name":"Strenger Stichprobenumfang","upgrades.nbricks.tooltip":"Triff genau {{lvl}} Steine pro Paddle Bounce f\xfcr +{{lvl}} Combo, sonst wird er zur\xfcckgesetzt","upgrades.nbricks.verbose_description":"Ihr m\xfcsst die Steine nicht unbedingt zerst\xf6ren, aber ihr m\xfcsst sie treffen. Durch Explosionen zerst\xf6rte Ziegelsteine z\xe4hlen nicht.","upgrades.one_more_choice.name":"Extra Auswahl","upgrades.one_more_choice.tooltip":"Weitere Stufenaufstiege bieten {{lvl}} weitere Option(en) in der Liste","upgrades.one_more_choice.verbose_description":"Jedes Upgrade-Men\xfc wird eine weitere Option enthalten.  Erh\xf6ht nicht die Anzahl der Upgrades, die Sie ausw\xe4hlen k\xf6nnen.","upgrades.passive_income.name":"Passives Einkommen","upgrades.passive_income.tooltip":"+{{lvl}} Combo / Brick, es sei denn, das Paddel hat sich in den letzten {{time}}s bewegt, dann wird es stattdessen zur\xfcckgesetzt","upgrades.passive_income.verbose_description":"Einige Verg\xfcnstigungen k\xf6nnen den B\xe4llen helfen, das zu tun, was du willst, ohne dass du etwas tun musst.","upgrades.picky_eater.name":"W\xe4hlerischer Esser","upgrades.picky_eater.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, wird bei Farbwechsel des Balls zur\xfcckgesetzt","upgrades.picky_eater.verbose_description":"Jedes Mal, wenn du einen Stein der gleichen Farbe wie deine Kugel zerst\xf6rst, erh\xf6ht sich deine Kombination um eins.\\nWenn es eine andere Farbe ist, nimmt der Ball diese neue Farbe an, aber die Kombination wird zur\xfcckgesetzt, es sei denn, es sind keine Steine in der Farbe des Balls \xfcbrig.\\nSobald du eine h\xf6here Kombination als das Minimum erreicht hast, werden die Steine der falschen Farbe rot umrandet.\\nWenn du mehr als eine Kugel hast, wechseln sie alle die Farbe, sobald eine von ihnen einen Stein trifft.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Der Ball durchdringt {{count}} Steine nach einem Paddle Bounce","upgrades.pierce.verbose_description":"Der Ball prallt normalerweise ab, sobald er etwas ber\xfchrt. Mit diesem Vorteil setzt er seine Flugbahn f\xfcr bis zu 3 Ziegelsteine gebrochen fort.\\n\\nDanach prallt er am 4. Ziegelstein ab, und du musst das Paddel ber\xfchren, um den Z\xe4hler zur\xfcckzusetzen.","upgrades.pierce_color.name":"Farbe durchstechen","upgrades.pierce_color.tooltip":"+{{lvl}} Schaden an Steinen der Farbe der Kugel","upgrades.pierce_color.verbose_description":"Wenn ein Ball auf einen gleichfarbigen Stein trifft, geht er ungehindert durch.\\n\\nSobald er einen andersfarbigen Stein erreicht, zerbricht er ihn, nimmt seine Farbe an und springt auf.\\n\\nWenn du robuste Steine hast, kann es sein, dass der Ball trotzdem an einem gleichfarbigen Stein abprallt.","upgrades.puck_repulse_ball.help_plural":"St\xe4rkere Absto\xdfungskraft","upgrades.puck_repulse_ball.name":"Weiche Landung","upgrades.puck_repulse_ball.tooltip":"Paddel st\xf6\xdft B\xe4lle ab","upgrades.puck_repulse_ball.verbose_description":"Wenn ein Ball in die N\xe4he des Schl\xe4gers kommt, wird er langsamer und springt m\xf6glicherweise sogar, ohne den Schl\xe4ger zu ber\xfchren.","upgrades.rainbow.name":"Regenbogen","upgrades.rainbow.tooltip":"M\xfcnzen spawnen in Regenbogenfarben.","upgrades.rainbow.verbose_description":"Mit jedem Level steigt der Anteil der farbigen M\xfcnzen. Die Farbe h\xe4ngt von der Levelzeit ab.","upgrades.reach.name":"Von oben nach unten","upgrades.reach.tooltip":" Das Ber\xfchren der N Steine der untersten Reihe setzt die Kombo zur\xfcck. Andernfalls: +N Combo","upgrades.reach.verbose_description":"Wenn es nur eine Reihe von Steinen gibt, oder wenn die unterste Reihe von Steinen die gesamte Breite des Spiels abdeckt, dann bewirkt dieser Vorteil nichts. Andernfalls wird die Combo zur\xfcckgesetzt, wenn diese unterste Reihe zerst\xf6rt wird, w\xe4hrend alles andere die Combo um die Anzahl der Steine in dieser untersten Reihe erh\xf6ht.\\n\\nDie unterste Reihe wird in rot hervorgehoben.","upgrades.respawn.name":"Neu spawnen","upgrades.respawn.tooltip":"{{percent}}% der Steine spawnen nach {{delay}}s erneut.","upgrades.respawn.verbose_description":"Einige Partikeleffekte lassen Sie wissen, wo Ziegelsteine erscheinen werden.","upgrades.right_is_lava.name":"Vermeiden Sie die rechte Seite","upgrades.right_is_lava.tooltip":"+{{lvl}} Kombo pro Stein. Combo wird zur\xfcckgesetzt, wenn der Ball die rechte Seite des Bildschirms trifft.","upgrades.right_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erh\xf6ht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine M\xfcnze mehr bekommst.\\n\\nAllerdings wird deine Kombo zur\xfcckgesetzt, sobald dein Ball die rechte Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die rechte Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.sacrifice.help_l1":"Der Verlust eines Lebens l\xf6scht alle Steine","upgrades.sacrifice.help_over":"Der Verlust eines Lebens {{lvl}}x die Combo l\xf6scht dann alle Steine","upgrades.sacrifice.name":"Opfern Sie","upgrades.sacrifice.verbose_description":"Damit k\xf6nnte die Kombination ziemlich hoch werden.","upgrades.sapper.help_plural":"Die ersten {{lvl}} Steine, die zerbrochen werden, werden zu Bomben.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"Der erste zerbrochene Ziegelstein wird zu einer Bombe.","upgrades.sapper.verbose_description":"Anstatt einfach zu verschwinden, wird der erste Stein, den du zerbrichst, durch einen Bombenstein ersetzt. Wenn du den Ball auf dem Paddel abprallen l\xe4sst, wird der Effekt wieder aktiviert. Wenn Sie diese F\xe4higkeit aufwerten, k\xf6nnen Sie mehr Bomben platzieren.","upgrades.shocks.name":"Schocks","upgrades.shocks.tooltip":"Kollisionen mit explosiven Kugeln","upgrades.shocks.verbose_description":"Wenn zwei Kugeln zusammensto\xdfen, tauschen sie ihre Geschwindigkeit aus, l\xf6sen eine Explosion aus und gewinnen an Geschwindigkeit, um sie zu trennen.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Behalte {{percent}}% deines Combos zwischen den Levels","upgrades.shunt.verbose_description":"Wenn Sie auch Hei\xdfstart haben, wird der Hei\xdfstart einfach zur aktuellen Kombination hinzugef\xfcgt.","upgrades.side_flip.name":"Rechtsh\xe4ndig","upgrades.side_flip.tooltip":"+{{lvl}} Combo pro von rechts gebrochenem Stein, sonst -{{loss}} ","upgrades.side_flip.verbose_description":"Triff den Ziegelstein auf der rechten Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der linken Seite zu treffen, da dies 2 Combo entfernen w\xfcrde. Schl\xe4ge von oben und unten haben keinen Effekt.","upgrades.side_kick.name":"Linksh\xe4ndig","upgrades.side_kick.tooltip":"+{{lvl}} Combo pro von links gebrochenem Stein, sonst -{{loss}} ","upgrades.side_kick.verbose_description":"Triff den Ziegelstein auf der linken Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der rechten Seite zu treffen, da dies 2 Combo entfernen w\xfcrde. Schl\xe4ge von oben und unten haben keinen Effekt.","upgrades.skip_last.help_plural":"Die letzten {{lvl}} Steine werden explodieren.","upgrades.skip_last.name":"Einfaches Aufr\xe4umen","upgrades.skip_last.tooltip":"Der letzte Stein wird explodieren.","upgrades.skip_last.verbose_description":"Du musst alle Steine zerbrechen, um die n\xe4chste Ebene zu erreichen. Es kann jedoch schwierig sein, die letzten Steine zu bekommen.\\n\\nWenn du ein Level fr\xfch beendest, hast du zus\xe4tzliche M\xf6glichkeiten, um aufzur\xfcsten. Es ist auch sehr vorteilhaft, nie die Steine zu verpassen.\\n\\nWenn es dir also schwerf\xe4llt, die letzten Steine zu zerbrechen, kann es helfen, wenn du diesen Vorteil ein paar Mal bekommst.","upgrades.slow_down.name":"Langsamer Ball","upgrades.slow_down.tooltip":"Der Ball bewegt sich langsamer","upgrades.slow_down.verbose_description":"Der Ball f\xe4ngt relativ langsam an, aber mit jeder Spielstufe wird er ein bisschen schneller.\\n\\nEr wird auch schneller, wenn du viel Zeit in einem Level verbringst.\\n\\nDieser Vorteil macht ihn \xfcberschaubarer.\\n\\nDu kannst ihn jedes Mal beim Start erhalten, indem du den Kindermodus im Men\xfc aktivierst.","upgrades.smaller_puck.help_plural":"Noch kleineres Paddel und h\xf6here Basis-Kombination","upgrades.smaller_puck.name":"Kleineres Paddel","upgrades.smaller_puck.tooltip":"Gibt auch +5 Basis-Kombo","upgrades.smaller_puck.verbose_description":"Dadurch wird das Paddel kleiner, was theoretisch einige Ecksch\xfcsse einfacher macht, aber eigentlich nur den Schwierigkeitsgrad erh\xf6ht.\\n\\nDeshalb gibt es auch einen netten Bonus von +5 M\xfcnzen pro Ziegelstein f\xfcr alle Ziegelsteine, die du nach der Auswahl dieser Option zerst\xf6rst.","upgrades.soft_reset.name":"Weicher Reset","upgrades.soft_reset.tooltip":"Combo-R\xfcckstellungen halten {{percent}}%","upgrades.soft_reset.verbose_description":"Begrenzen Sie die Auswirkungen eines Combo-Resets.","up um liegt, erscheint oben ein roter Balken, der dich daran erinnert, dass du es vermeiden solltest, ihn zu treffen.","upgrades.trampoline.name":"Trampolin","upgrades.trampoline.tooltip":"+{{lvl}} Combo pro Paddelabprall, -{{lvl}} Combo pro Abprall an einer beliebigen Grenze","upgrades.trampoline.verbose_description":"Eine der seltenen Combo-Upgrades, die keine R\xfccksetzbedingung hinzuf\xfcgen","upgrades.transparency.name":"Transparenz","upgrades.transparency.tooltip":"Je h\xf6her der Ball auf dem Bildschirm ist, desto transparenter wird er. Je transparenter sie ist, desto mehr M\xfcnzen produziert sie.","upgrades.transparency.verbose_description":"Je h\xf6her die Stufe, desto eher wird der Ball transparent und desto h\xf6her ist der Punktebonus.","upgrades.trickledown.name":"Trickle down economics","upgrades.trickledown.tooltip":"Die M\xfcnzen erscheinen am oberen Rand des Bildschirms.","upgrades.trickledown.verbose_description":"Es k\xf6nnte Ihnen helfen, ein paar M\xfcnzen zur Seite zu legen.","upgrades.unbounded.name":"Polsterung","upgrades.unbounded.tooltip":"F\xfcgt links und rechts des Levels Platz hinzu, aber dein Paddel kann nicht so weit gehen.","upgrades.unbounded.verbose_description":"Ein weiteres Upgrade k\xf6nnte Ihnen helfen, die Reichweite Ihres Paddels zu vergr\xf6\xdfern.","upgrades.viscosity.name":"Viskosit\xe4t","upgrades.viscosity.tooltip":"Langsamerer M\xfcnzfall","upgrades.viscosity.verbose_description":"M\xfcnzen beschleunigen normalerweise durch Schwerkraft und Explosionen auf ziemlich hohe Geschwindigkeiten.\\n\\nMit dieser F\xe4higkeit werden sie st\xe4ndig langsamer, als ob sie sich in einer Art z\xe4hfl\xfcssiger Fl\xfcssigkeit bef\xe4nden.\\n\\nDas macht es einfacher, sie zu fangen, und l\xe4sst sich gut mit Perks kombinieren, die die Bewegung der M\xfcnze beeinflussen.","upgrades.wind.help_plural":"St\xe4rkere Windkraft","upgrades.wind.name":"WIND","upgrades.wind.tooltip":"Paddelstellung erzeugt Wind","upgrades.wind.verbose_description
