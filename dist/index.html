<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Breakout 71</title>
    <meta name="description" content="A breakout game with roguelite mechanics. Break bricks, catch coins, pick upgrades, repeat. Play for free on mobile and desktop.">
    <link rel="manifest" href="/PWA/manifest.webmanifest">
    <meta name="theme-color" content="#000000" id="themeColor">

    <style>* {
  box-sizing: border-box;
  font-family: Courier New, Courier, Lucida Sans Typewriter, Lucida Typewriter, monospace;
}

body {
  width: 100vw;
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  color: #fff;
  background-size: 120px 120px;
  background-color: var(--background1);
  --background1: #030c23;
  --background2: #03112a;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#game {
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  width: 100vw;
  position: fixed;
  top: 0;
  left: 0;
}

canvas:not(#game) {
  display: none;
}

#score, #menu {
  z-index: 1;
  appearance: none;
  font: inherit;
  color: #fff;
  min-width: 40px;
  max-width: calc(100vw - 80px);
  min-height: 40px;
  text-shadow: 0 0 4px var(--level-background);
  background: none;
  border: none;
  padding: 10px;
  line-height: 20px;
  position: absolute;
  top: 0;
  overflow: hidden;
}

#score:hover, #menu:hover, #score:focus, #menu:focus {
  color: #fff;
  cursor: pointer;
  background: #fff3;
}

#score.button-look, #menu.button-look {
  text-shadow: none;
  background: #000000d6;
  border: 1px solid #fff;
  border-radius: 5px;
  margin: 5px;
  padding: 0 6px;
  line-height: 20px;
  box-shadow: 0 2px #fff;
}

#score {
  color: #fff;
  transition: color .3s;
  right: 0;
}

#score.active .score {
  color: gold;
  transition: color 10ms;
}

#score.computer_controlled {
  pointer-events: none;
}

#score span {
  color: #fffc;
}

#score span.great {
  color: #90ee90;
}

#score span.good, #score span.bad {
  color: #fff;
}

#menu {
  left: 0;
}

body.has-alert-open {
  height: auto;
  overflow: visible;
}

body:not(.has-alert-open) #popup {
  display: none;
}

#popup {
  display: flex;
  overflow: auto;
}

#popup:before {
  z-index: 4;
  content: "";
  background: #000000e6;
  display: block;
  position: fixed;
  inset: 0;
}

#popup > div {
  z-index: 5;
  transform-origin: center;
  flex-direction: column;
  align-items: stretch;
  width: 100%;
  max-width: 500px;
  margin: auto;
  padding: 20px 10px;
  display: flex;
  position: relative;
}

#popup > div > * {
  margin: 0 0 20px;
  padding: 0;
}

#popup > div > section {
  flex-direction: column;
  align-items: stretch;
  display: flex;
}

#popup > div > section > div {
  display: flex;
  position: relative;
}

#popup > div > section > div > button.choice-button {
  font: inherit;
  color: #fff;
  cursor: pointer;
  text-align: left;
  background: #000c;
  border: 1px solid #fff;
  flex-grow: 1;
  gap: 10px;
  margin-top: -1px;
  padding: 10px;
  display: flex;
}

#popup > div > section > div > button.choice-button:not([disabled]):hover, #popup > div > section > div > button.choice-button:not([disabled]):focus {
  z-index: 1;
  border-color: #f1d33b;
  position: relative;
}

#popup > div > section > div > button.choice-button[disabled]:not(.no-border) {
  opacity: .5;
  filter: saturate(0);
  cursor: not-allowed;
}

#popup > div > section > div > button.choice-button.no-border {
  border-color: #0000;
}

#popup > div > section > div > button.choice-button > div {
  flex-grow: 1;
}

#popup > div > section > div > button.choice-button > div > em {
  opacity: .8;
  display: block;
}

#popup > div > section > div > button.choice-button.grey-out-unless-hovered:not(:hover) {
  opacity: .6;
}

#popup > div > section > div > button.choice-button.grey-out-unless-hovered:not(:hover) img {
  filter: saturate(0);
}

#popup > div > section > div > button.choice-button.grey-out-unless-hovered[disabled] {
  opacity: .2;
}

#popup > div > section > div.forbidden {
  background: linear-gradient(-45deg, #0000, #ff00004a, #0000);
}

#popup > div > section > div.required {
  background: linear-gradient(-45deg, #0000, #ffd3005c, #0000);
}

#popup > div > section > div > button[data-help-content] {
  user-select: none;
  color: #fff;
  text-align: center;
  background: #5da3ea;
  border: none;
  border-radius: 4px;
  outline: none;
  flex-grow: 0;
  flex-shrink: 0;
  align-self: center;
  width: 30px;
  height: 30px;
  margin: 5px;
  font-size: 22px;
  font-weight: bold;
}

#popup.actionsAsGrid.large > div > section {
  grid-gap: 20px;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
}

#popup.actionsAsGrid > div {
  max-width: none;
}

#popup.actionsAsGrid > div > div, #popup.actionsAsGrid > div > p, #popup.actionsAsGrid > div > h1, #popup.actionsAsGrid > div > h2 {
  width: 100%;
  max-width: 550px;
  margin-left: auto;
  margin-right: auto;
}

#popup.actionsAsGrid > div section {
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  display: grid;
}

#popup button#close-modale {
  color: #fff;
  cursor: pointer;
  z-index: 6;
  background: none;
  border: none;
  width: 60px;
  height: 60px;
  position: fixed;
  top: 0;
  right: 0;
  overflow: hidden;
}

#popup button#close-modale:before {
  content: "+";
  font-size: 80px;
  display: inline-block;
  position: absolute;
  top: 34px;
  left: 26px;
  transform: translate(-50%, -50%)rotate(45deg);
}

#popup button#close-modale:hover {
  background: #000;
  font-weight: bold;
}

#popup .textAfterButtons {
  color: #ffffff94;
}

#popup a[href] {
  color: inherit;
}

#popup a[href]:hover, #popup a[href]:focus {
  color: #fff;
}

@media (width >= 1400px) {
  #popup.settings:before {
    opacity: 0;
  }

  #popup.settings > div {
    max-width: 400px;
    margin-right: 0;
  }
}

#level-recording-container {
  text-align: center;
  max-width: 400px;
  margin: 40px;
}

#level-recording-container video {
  max-width: 100%;
  height: auto;
}

#level-recording-container a {
  display: block;
}

#level-recording-container a video {
  border-radius: 10px;
  outline: 1px solid #fff;
  margin: 20px auto;
  display: block;
  box-shadow: 2px 2px 5px #000;
}

.histogram {
  align-items: stretch;
  gap: 10px;
  margin: 10px 0 40px;
  display: flex;
}

.histogram > span {
  flex-direction: column;
  flex-grow: 1;
  justify-content: flex-end;
  width: 10px;
  display: flex;
  position: relative;
}

.histogram > span.active > span {
  background: #4049ca;
}

.histogram > span > span {
  background: #1c1c2f;
  border-radius: 5px;
  width: 100%;
  min-height: 1px;
  display: block;
}

.histogram > span > span > span {
  pointer-events: none;
  white-space: nowrap;
  transform-origin: 0 100%;
  text-align: center;
  font-size: 13px;
  display: block;
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translate(-50%);
}

.histogram > span:not(:hover):not(.active) > span > span {
  opacity: 0;
}

h2.histogram-title {
  color: #3b3f75;
  font-size: 18px;
}

h2.histogram-title strong {
  color: #4049ca;
}

.red-icon {
  background: red;
}

.red-icon img {
  filter: saturate(0);
  mix-blend-mode: luminosity;
}

.upgrade {
  gap: 2px;
  width: calc(100% + 10px);
  margin: 0 -5px;
  padding: 5px;
  display: flex;
}

.upgrade img {
  width: 32px;
  height: 32px;
}

.upgrade p {
  color: #fff9;
  flex-grow: 1;
  margin: 0 20px;
}

.upgrade.used p strong {
  color: #fff;
}

.upgrade.used {
  opacity: 1;
}

.upgrade.free img {
  opacity: .5;
}

.upgrade.banned {
  opacity: .8;
}

.upgrade.greyed-out {
  opacity: .2;
}

.upgrade button {
  color: #fff;
  cursor: pointer;
  text-shadow: 0 0 2px #185fa8;
  user-select: none;
  background: linear-gradient(#5da3ea, #3e86ce);
  border: 2px solid #fff;
  border-radius: 5px;
  align-self: flex-start;
  padding: 5px;
  font-weight: bold;
  transition: transform .2s, box-shadow .2s;
  box-shadow: inset 0 1px #000, 0 2px #5da3ea, 0 4px #fff;
}

.upgrade button:hover {
  background: #5da3ea;
}

.upgrade button:active {
  transform: translate(0, 4px);
  box-shadow: inset 0 1px #000, 0 0 #5da3ea, 0 0 #fff;
}

.upgrade button[disabled] {
  color: #666;
  text-shadow: 0 0 2px #000;
  background: #222;
  border-color: #666;
  transform: translate(0, 4px);
  box-shadow: inset 0 1px #000;
}

.level {
  color: #000;
  background: #fff;
  border: 1px solid #fff;
  border-radius: 3px;
  font-size: 12px;
  font-style: normal;
  font-weight: bold;
  line-height: 12px;
  display: inline-block;
  position: relative;
  overflow: hidden;
}

.level > span {
  display: inline-block;
  position: relative;
}

.level > span:first-child {
  color: #000;
  background: #fff;
  padding: 3px 6px 0 2px;
}

.level > span:last-child {
  color: #fff;
  background: #000;
  padding: 3px 3px 0 2px;
}

.level > span:last-child:before {
  content: "";
  background: #000;
  width: 4px;
  display: block;
  position: absolute;
  top: 0;
  bottom: 0;
  left: -2px;
  transform: skewX(-10deg);
}

.level.capped {
  opacity: .5;
}

.level.capped > span:first-child {
  color: #fff;
  background: #000;
}

.level.capped > span:last-child:before {
  background: #fff;
  width: 1px;
}

#tooltip {
  color: #fff;
  z-index: 5;
  pointer-events: none;
  user-select: none;
  opacity: 1;
  background: #000;
  border: 1px solid #fff;
  border-radius: 2px;
  padding: 10px;
  display: block;
  position: fixed;
  top: 0;
  left: 0;
}

#tooltip.desktop {
  max-width: 300px;
}

#tooltip.mobile {
  width: 95vw;
  left: 2.5vw;
}

#popup.history > div {
  max-width: none;
}

#popup.history > div table th:hover {
  cursor: pointer;
  background: #000;
}

#popup.history > div table td, #popup.history > div table th {
  text-align: right;
  padding: 0 5px;
  line-height: 20px;
}

#popup.history > div table th:first-child, #popup.history > div table td:first-child {
  text-align: left;
}

#popup.history > div table img {
  pointer-events: none;
  width: 20px;
  height: auto;
}

#popup.history > div table tr:nth-child(2n) {
  background: #00000094;
}

.toast {
  opacity: .8;
  pointer-events: none;
  z-index: 7;
  background: #000;
  border: 1px solid #fff;
  border-radius: 2px;
  align-items: center;
  gap: 10px;
  padding-right: 10px;
  transition: opacity .2s, transform .2s;
  display: flex;
  position: fixed;
  top: 40px;
  left: 0;
}

.toast.hidden {
  opacity: 0;
  transform: translate(-20px, -20px)scale(.5);
}

.toast.visible {
  opacity: .8;
  transform: none;
}

.gridEdit > div > span, .palette > span {
  cursor: pointer;
  border: 1px solid;
  justify-content: center;
  align-items: center;
  width: 40px;
  height: 40px;
  display: inline-flex;
}

.gridEdit > div > span:hover, .palette > span:hover {
  z-index: 1;
  border-color: gold;
  position: relative;
  box-shadow: inset 2px 2px 4px #0003;
}

.gridEdit > div {
  display: flex;
}

.gridEdit > div > span {
  width: calc(min(500px, 100vw, 100vh - 200px) / var(--grid-size));
  height: calc(min(500px, 100vw, 100vh - 200px) / var(--grid-size));
}

.palette {
  flex-wrap: wrap;
  display: flex;
}

.palette > span[data-selected="true"] {
  border: 2px solid #fff;
}

#stats {
  color: #fff;
  z-index: 3;
  pointer-events: none;
  opacity: 1;
  width: 100vw;
  max-width: 400px;
  position: fixed;
  top: 40px;
  left: 0;
}

#stats > div {
  background: #26262680;
  position: relative;
}

#stats > div > div {
  transform-origin: 0 0;
  background: #6262ea;
  position: absolute;
  inset: 0;
}

#stats > div > strong {
  padding: 0 5px;
  position: relative;
}

.highlight {
  position: relative;
}

.highlight:before {
  content: "";
  mix-blend-mode: screen;
  opacity: .3;
  background: linear-gradient(-45deg, #6262ea, #0000);
  position: absolute;
  inset: 0;
}

.not-highlighed {
  opacity: .8;
  color: #8a8a8a;
}

o will also reset if the ball returns to the paddle without hitting any brick.\\nA \\\"miss\\\" message will be shown when that happens. \\n\\nTry to aim towards a brick every time. \\n\\n## Aiming\\n\\nOnly the ball position on the paddle decides how it will bounce.\\nIf the ball hits the paddle dead center, it will bounce back up vertically. \\nIf you hit more on one side, it will have more angle. \\nThe paddle speed and incoming angle have no impact on the ball direction after bouncing.\\n\\nMany upgrades that help with aiming can be unlocked.\\n\\n## Unlocks\\n\\nWhen playing Breakout 71 for the first time, most upgrades and levels are locked. \\nUpgrades are unlocked by simply playing and catching many coins. \\nThe first levels are unlocked by reaching a high score.\\nLater levels add a condition about which perks you can select. \\n\\nReach high scores is much easier when you get multiple upgrades after each level. \\n\\n## Re-rolls and free upgrades\\n\\nYou'll get an extra upgrade to pick when you play well : \\n\\n- Clear the level under {{levelTimeGood}} seconds\\n- Catch {{catchRateGood}}% of coins\\n- Miss the bricks less than {{missesGood}} times \\n\\nYou will also get a re-roll that lets you skip upgrades if you do even better :  \\n\\n-  Clear a level under {{levelTimeBest}} seconds\\n- Catch {{catchRateBest}}% of coins\\n- Miss the bricks less than {{missesBest}} times \\n\\nAn option in the settings lets you display those statistics\",\"help.help\":\"Learn more about the game\",\"help.levels\":\"Levels\",\"help.title\":\"Help\",\"help.upgrades\":\"## Upgrades\",\"history.columns.score\":\"Score\",\"history.columns.started\":\"Date\",\"history.help\":\"See your {{count}} best games.\",\"history.include_past_versions\":\"Show past versions too\",\"history.locked\":\"Play at least ten games to unlock\",\"history.title\":\"Runs history\",\"lab.help\":\"Try any build you want\",\"lab.instructions\":\"Select upgrades and a level, then click the play but tart attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.\",\"upgrades.ball_attracts_coins.name\":\"Balls attract coins\",\"upgrades.ball_attracts_coins.tooltip\":\"Coins follow the nearest ball \",\"upgrades.ball_attracts_coins.verbose_description\":\"This could be used to \\\"paint around\\\" the balls with coins if you combined it with \\\"stain\\\" and \\\"ghost coins\\\". It also works as a substitute for coin magnet. \",\"upgrades.ball_repulse_ball.name\":\"Personal space\",\"upgrades.ball_repulse_ball.tooltip\":\"Balls repulse balls\",\"upgrades.ball_repulse_ball.verbose_description\":\"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.\",\"upgrades.base_combo.name\":\"Strong foundations\",\"upgrades.base_combo.tooltip\":\"3 more coins per brick broken\",\"upgrades.base_combo.verbose_description\":\"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you'll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.\",\"upgrades.bigger_explosions.name\":\"Kaboom\",\"upgrades.bigger_explosions.tooltip\":\"Bigger explosions\",\"upgrades.bigger_explosions.verbose_description\":\"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)\",\"upgrades.bigger_puck.name\":\"Bigger paddle\",\"upgrades.bigger_puck.tooltip\":\"Easily catch more coins\",\"upgrades.bigger_puck.verbose_description\":\"A bigger paddle makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball's angle only depends on where it hits the paddle). \",\"upgrades.bricks_attract_ball.name\":\"Bricks attract balls\",\"upgrades.bricks_attract_ball.tooltip\":\"Ball goes toward nearby bricks\",\"upgrades.bricks_attract_ball.verbose_description\":\"Ball goes toward the first {{count}} bricks it will hit. The effect is stronger at higher levels. The number of bricks that can hit before the effect stops is also higher. The effect rearms when the ball hits the puck.\",\"upgrades.bricks_attract_coins.name\":\"Bricks attract coins\",\"upgrades.bricks_attract_coins.tooltip\":\"Helps them stay up there\",\"upgrades.bricks_attract_coins.verbose_description\":\"\",\"upgrades.buoy.name\":\"Buoy\",\"upgrades.buoy.tooltip\":\"Coins float for {{duration}} seconds on the bottom line. \",\"upgrades.buoy.verbose_description\":\"Effect is most visible in mobile mode\",\"upgrades.clairvoyant.name\":\"Clairvoyant\",\"upgrades.clairvoyant.tooltip\":\"See upcoming levels, bricks HP and ball direction\",\"upgrades.clairvoyant.verbose_description\":\"Helps you pick the right upgrades and understand what's going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)\",\"upgrades.coin_magnet.name\":\"Coins magnet\",\"upgrades.coin_magnet.tooltip\":\"Paddle attracts coins\",\"upgrades.coin_magnet.verbose_description\":\"Directs the coins to the paddle. The effect is stronger if the coin is close to it already.\",\"upgrades.compound_interest.name\":\"Compound interest\",\"upgrades.compound_interest.tooltip\":\"More coins if you catch all coins\",\"upgrades.compound_interest.verbose_description\":\"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\nBe sure however to catch every one of those coins with your paddle, as any lost coin will reset your combo.\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.\",\"upgrades.concave_puck.name\":\"Concave paddle\",\"upgrades.concave_puck.tooltip\":\"Improves vertical aiming precision\",\"upgrades.concave_puck.verbose_description\":\"Balls starts the level going straight up, and bounces with less angle.\",\"upgrades.corner_shot.name\":\"Corner shot\",\"upgrades.corner_shot.tooltip\":\"Lets your paddle overlap with the borders of the screen\",\"upgrades.corner_shot.verbose_description\":\"Helps with aiming in the corners. Further levels let you go further out. \",\"upgrades.double_or_nothing.name\":\"Double or nothing\",\"upgrades.double_or_nothing.tooltip\":\"Combo climbs {{multiplier}} times faster, but you'll loose {{percent}}% of your score at each reset.\",\"upgrades.double_or_nothing.verbose_description\":\"The combo reset only counts when your combo was above the minimum\",\"upgrades.etherealcoins.name\":\"Coins, in Space\",\"upgrades.etherealcoins.tooltip\":\"Coins are no  longer affected by gravity\",\"upgrades.etherealcoins.verbose_description\":\"The coins will maintain their speed even after several bounces, and will no longer be affected by gravity.\",\"upgrades.extra_levels.name\":\"5 min more\",\"upgrades.extra_levels.tooltip\":\"Play {{count}} levels instead of 7\",\"upgrades.extra_levels.verbose_description\":\"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.\",\"upgrades.extra_life.name\":\"Extra life\",\"upgrades.extra_life.tooltip\":\"Saves your last ball if it's about to be lost\",\"upgrades.extra_life.verbose_description\":\"The life will be consumed in the process. Extra lives show as while lines behind the puck.\",\"upgrades.forgiving.name\":\"Forgiving\",\"upgrades.forgiving.tooltip\":\"Keep most of your combo when missing\",\"upgrades.forgiving.verbose_description\":\"The first miss per level is free, then 10% of the combo, then 20% .. \",\"upgrades.fountain_toss.name\":\"Fountain toss\",\"upgrades.fountain_toss.tooltip\":\"Gain combo when you miss coins. \",\"upgrades.fountain_toss.verbose_description\":\"When you miss a coin and your combo was under level*30, your combo has a probability of level/combo to grow by one.\",\"upgrades.ghost_coins.name\":\"Ghost coins\",\"upgrades.ghost_coins.tooltip\":\"Coins slowly pass through bricks\",\"upgrades.ghost_coins.verbose_description\":\"It's not a bug, it's a feature !  Coins fly through bricks slowly. Higher levels let them move faster. \",\"upgrades.golden_goose.name\":\"Golden goose\",\"upgrades.golden_goose.tooltip\":\"Coins teleport to the ball after hitting a brick\",\"upgrades.golden_goose.verbose_description\":\"Whenever a coin hits a brick, teleport that coin to the nearest ball. At level two, coins teleport after hitting a side too.\",\"upgrades.happy_family.name\":\"Happy family\",\"upgrades.happy_family.tooltip\":\"More coins if you keep all balls in game. \",\"upgrades.happy_family.verbose_description\":\"+1 combo per extra ball per paddle bounce. Combo resets when a ball is lost.  Only the ball above 1 give combo.\",\"upgrades.helium.name\":\"Helium\",\"upgrades.helium.tooltip\":\"Gravity limited left and right of paddle\",\"upgrades.helium.verbose_description\":\"At level 1, gravity is reduced. At level 2, coins slowly float up. At level 3 they really fly.\",\"upgrades.hot_start.name\":\"Hot start\",\"upgrades.hot_start.tooltip\":\"More coins if you clear the level under 30s\",\"upgrades.hot_start.verbose_description\":\"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one. The effect stacks with other perks. \",\"upgrades.implosions.name\":\"Implosions\",\"upgrades.implosions.tooltip\":\"Explosions suck coins in instead of blowing them out\",\"upgrades.implosions.verbose_description\":\"The explosion force is applied the other way. Further levels act as \\\"bigger explosion\\\"\",\"upgrades.left_is_lava.name\":\"Avoid left side\",\"upgrades.left_is_lava.tooltip\":\"More coins if you don't touch the left side\",\"upgrades.left_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one, so you'll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n\\nAt level 2, the border is completely removed and your balls and coins might get lost. \",\"upgrades.limitless.name\":\"Limitless\",\"upgrades.limitless.tooltip\":\"Raise all upgrade's maximum level by {{lvl}} \",\"upgrades.limitless.verbose_description\":\"Choosing this perk also raises his own limit by one, letting you pick it again.\",\"upgrades.metamorphosis.name\":\"Metamorphosis\",\"upgrades.metamorphosis.tooltip\":\"Each coin can stain {{lvl}} brick(s) with its color\",\"upgrades.metamorphosis.verbose_description\":\"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. Coins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\\"paint\\\". At level 1, each coin can color 1 bricks before it is \\\"spent\\\" and appears hollow. \",\"upgrades.minefield.name\":\"Minefield\",\"upgrades.minefield.tooltip\":\"+{{percent}}% coins per bomb brick on screen\",\"upgrades.minefield.verbose_description\":\"Bombs are counted while they are exploding too. \",\"upgrades.multiball.name\":\"Multi ball\",\"upgrades.multiball.tooltip\":\"Start every levels with {{count}} balls.\",\"upgrades.multiball.verbose_description\":\"As soon as you drop the ball in Breakout 71, you lose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.\",\"upgrades.nbricks.name\":\"Strict sample size\",\"upgrades.nbricks.tooltip\":\"More coins if you hit bricks one by one.\",\"upgrades.nbricks.verbose_description\":\"Hit exactly {{lvl}} bricks per paddle bounce for +{{lvl}} combo, otherwise it resets. You don't necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don't count\",\"upgrades.one_more_choice.name\":\"Extra choice\",\"upgrades.one_more_choice.tooltip\":\"More upgrade choices\",\"upgrades.one_more_choice.verbose_description\":\"Every upgrade menu will have one more option.  Doesn't increase the number of upgrades you can pick.\",\"upgrades.ottawa_treaty.name\":\"Ottawa treaty\",\"upgrades.ottawa_treaty.tooltip\":\"Breaking a brick near a bomb disarms it\",\"upgrades.ottawa_treaty.verbose_description\":\"The nearby bomb will be replaced by a colored block. If you have sapper, the ball will loose its sapper effect until next bounce. Only one bomb can be replaced at a time.\",\"upgrades.passive_income.name\":\"Passive income\",\"upgrades.passive_income.tooltip\":\"More coins but a moving paddle doesn't catch balls or coins\",\"upgrades.passive_income.verbose_description\":\"+{{lvl}} combo / brick broken, paddle is immaterial {{time}}s after moving. Some perks can help the balls do what you want without needing to do anything.\",\"upgrades.picky_eater.name\":\"Picky eater\",\"upgrades.picky_eater.tooltip\":\"More coins if you break bricks color by color\",\"upgrades.picky_eater.verbose_description\":\"Whenever you break a brick the same color as your ball, your combo increases by one. \\nIf it's a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball's color. \\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red border. \\nIf you have more than one ball, they all switch color whenever one of them hits a brick.\",\"upgrades.pierce.name\":\"Piercing\",\"upgrades.pierce.tooltip\":\"Ball pierces {{count}} bricks after a paddle bounce\",\"upgrades.pierce.verbose_description\":\"The ball normally bounces as soon as it touches something. With this perk, it will continue its trajectory for up to 3 bricks broken. \\n\\nAfter that, it will bounce on the 4th brick, and you'll need to touch the paddle to reset the counter.\",\"upgrades.pierce_color.name\":\"Color pierce\",\"upgrades.pierce_color.tooltip\":\"The ball goes through bricks of the same color\",\"upgrades.pierce_color.verbose_description\":\"Normally, balls do 1 damage and bricks have 1 health point (HP). S\\nEach level of this perk increase the damage balls do to bricks of their color. \\nWhen a ball does more damage than the brick's health points, it will continue straight instead of bouncing;\\n\\nWhenever a ball hits a brick of the same color, it will just go through unimpeded. \\nOnce it reaches a brick of a different color, it will break it, take its color and bounce.\\nIf you have sturdy bricks, the ball might still bounce off a brick of the same color.\",\"upgrades.puck_repulse_ball.name\":\"Soft landing\",\"upgrades.puck_repulse_ball.tooltip\":\"Paddle repulses balls\",\"upgrades.puck_repulse_ball.verbose_description\":\"When a ball gets close to the paddle, it will start slowing down, and even potentially bouncing without touching the paddle.\",\"upgrades.rainbow.name\":\"Rainbow\",\"upgrades.rainbow.tooltip\":\"Coins spawn with rainbow color.\",\"upgrades.rainbow.verbose_description\":\"Each level increases the proportion of colored coins. The color depends on level time. \",\"upgrades.reach.name\":\"Top down\",\"upgrades.reach.tooltip\":\"More coins if you avoid the lowest row of bricks\",\"upgrades.reach.verbose_description\":\" Touching the N bricks of the lowest row resets the combo. Otherwise, +N combo.\\n\\nIf there is only one row of bricks, or if the lowest row of bricks cover the whole width of the game,  then this perk does nothing. Otherwise, breaking this lowest row resets the combo, while breaking anything else increases the combo by the number of bricks present on that lowest row. \\n\\nThe lowest row will be highlighted in red. \",\"upgrades.respawn.name\":\"Re-spawn\",\"upgrades.respawn.tooltip\":\"{{percent}}% of bricks re-spawn after {{delay}}s.\",\"upgrades.respawn.verbose_description\":\"Some particle effect will let you know where bricks will appear. \",\"upgrades.right_is_lava.name\":\"Avoid right side\",\"upgrades.right_is_lava.tooltip\":\"More coins if you don't touch the right side\",\"upgrades.right_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one, so you'll get one more coin from all the next bricks you break. \\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n\\nAt level 2, the border is completely removed and your balls and coins might get lost. \\n\",\"upgrades.sacrifice.name\":\"Sacrifice\",\"upgrades.sacrifice.tooltip\":\"Loosing a life clears all bricks\",\"upgrades.sacrifice.verbose_description\":\"At level 2+, the combo is also multiplied by the perk's level before clearing the board. This might get the combo pretty high.\",\"upgrades.sapper.name\":\"Sapper\",\"upgrades.sapper.tooltip\":\"The first brick broken becomes a bomb.\",\"upgrades.sapper.verbose_description\":\"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the paddle re-arms the effect. Leveling-up this perk will allow you to place more bombs.\",\"upgrades.shocks.name\":\"Shocks\",\"upgrades.shocks.tooltip\":\"Explosive balls collisions\",\"upgrades.shocks.verbose_description\":\"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separate them. \",\"upgrades.shunt.name\":\"Shunt\",\"upgrades.shunt.tooltip\":\"Keep {{percent}}% of your combo between levels\",\"upgrades.shunt.verbose_description\":\"If you also have hot start, the hot start is just added to the current combo\",\"upgrades.side_flip.name\":\"Right handed\",\"upgrades.side_flip.tooltip\":\"More coins if you hit bricks from the right only\",\"upgrades.side_flip.verbose_description\":\"+{{lvl}} combo per brick broken from the right, -{{loss}} otherwise. Impact the brick on its right side to gain one combo, but avoid hitting it on the left side as the would remove 2 combo. Hitting from the top and bottom has no effect. \",\"upgrades.side_kick.name\":\"Left handed\",\"upgrades.side_kick.tooltip\":\"More coins if you hit bricks from the left only\",\"upgrades.side_kick.verbose_description\":\"+{{lvl}} combo per brick broken from the left, -{{loss}} otherwise. Impact the brick on its left side to gain one combo, but avoid hitting it on the right side as the would remove 2 combo. Hitting from the top and bottom has no effect. \",\"upgrades.skip_last.name\":\"Easy Cleanup\",\"upgrades.skip_last.tooltip\":\"The last brick will self destruct\",\"upgrades.skip_last.verbose_description\":\"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\nEach level of this perk increases the number of bricks that will self destruct.\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help. \",\"upgrades.slow_down.name\":\"Slower ball\",\"upgrades.slow_down.tooltip\":\"Ball moves more slowly\",\"upgrades.slow_down.verbose_description\":\"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.\",\"upgrades.smaller_puck.name\":\"Smaller paddle\",\"upgrades.smaller_puck.tooltip\":\"{{percent}}% more coins\",\"upgrades.smaller_puck.verbose_description\":\"This makes the paddle smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat's why you also get a nice bonus of +50% coins spawn.\",\"upgrades.soft_reset.name\":\"Soft reset\",\"upgrades.soft_reset.tooltip\":\"Keep {{percent}}% of your combo when it resets\",\"upgrades.soft_reset.verbose_description\":\"Limit the impact of a combo reset.\",\"upgrades.steering.name\":\"Steering\",\"upgrades.steering.tooltip\":\"Balls turn when puck moves\",\"upgrades.steering.verbose_description\":\"The change of puck location directly influences the direction of the balls's movement. At level 2+, you get a line showing you ball's directions.\",\"upgrades.sticky_coins.name\":\"Sticky coins\",\"upgrades.sticky_coins.tooltip\":\"Coins stick to bricks of the same color\",\"upgrades.sticky_coins.verbose_description\":\"At level 2, they stick to bricks of any color\",\"upgrades.streak_shots.name\":\"Hit streak\",\"upgrades.streak_shots.tooltip\":\"More coins if you break many bricks at once\",\"upgrades.streak_shots.verbose_description\":\"Every time you break a brick, your combo increases by one. \\n\\nHowever, as soon as the ball touches your paddle, the combo is reset to its default value.\\n\\nOnce your combo rises above the base value, your paddle will have a red border to remind you that it will destroy your combo to touch it with the ball.\",\"upgrades.sturdy_bricks.name\":\"Sturdy bricks\",\"upgrades.sturdy_bricks.tooltip\":\"+{{lvl}} bricks HP, +{{percent}}% coins\",\"upgrades.sturdy_bricks.verbose_description\":\"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\\"clairvoyant\\\" perk. You can increase ball damage by getting the \\\"piercing\\\" perk. Each level of the perk adds +50% coins spawn. \",\"upgrades.superhot.name\":\"SUPER HOT\",\"upgrades.superhot.tooltip\":\"Time moves when the paddle moves.\",\"upgrades.superhot.verbose_description\":\"SUPER HOT SUPER HOT SUPER HOT SUPER HOT\",\"upgrades.telekinesis.name\":\"Telekinesis\",\"upgrades.telekinesis.tooltip\":\"The paddle position influences the ball\",\"upgrades.telekinesis.verbose_description\":\"You control the ball while it's going up. The effect is stronger when the ball is in the bottom half of the screen. \",\"upgrades.three_cushion.name\":\"Three cushion\",\"upgrades.three_cushion.tooltip\":\"More coins if you hit bricks only indirectly\",\"upgrades.three_cushion.verbose_description\":\"+1 combo per hit on sides and top, up to +{{max}} per paddle bounce. \\nEvery hit on a side will raise the combo by one, up to +3.\\n After that,  no combo will be gained until  next paddle bounce. \\n\\nCombo resets when you hit a brick without bouncing first.\",\"upgrades.top_is_lava.name\":\"Sky is the limit\",\"upgrades.top_is_lava.tooltip\":\"More coins if you avoid hitting the top\",\"upgrades.top_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. \\n\\nAt level 2, the border is completely removed and your balls and coins might get lost. \",\"upgrades.trampoline.name\":\"Trampoline\",\"upgrades.trampoline.tooltip\":\"More coins if you bounce on bricks and the paddle only\",\"upgrades.trampoline.verbose_description\":\"+{{lvl}} combo per paddle bounce,-{{lvl}} combo per bounce on any border.  One of the rare  combo upgrades that don't add a reset condition\",\"upgrades.transparency.name\":\"Transparency\",\"upgrades.transparency.tooltip\":\"+50% coins. The ball is invisible at the top of the screen.\",\"upgrades.transparency.verbose_description\":\"Ball  becomes transparent at the top of the screen.\\n +{{percent}} % coins.  \\nHigher levels make the ball transparent sooner and increase the point bonus.\",\"upgrades.trickledown.name\":\"Trickle down\",\"upgrades.trickledown.tooltip\":\"Coins appear at the top of the screen.\",\"upgrades.trickledown.verbose_description\":\"The coins might sit on top of a brick if there are bricks on the top row, in that case they will fall down after you break that brick. \",\"upgrades.unbounded.name\":\"Padding\",\"upgrades.unbounded.tooltip\":\"Adds space left and right of the level, but your paddle can't go that far. \",\"upgrades.unbounded.verbose_description\":\"Another upgrade might help you extends the reach of your paddle. \",\"upgrades.viscosity.name\":\"Viscosity\",\"upgrades.viscosity.tooltip\":\"Slower coin fall\",\"upgrades.viscosity.verbose_description\":\"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin's movement.\",\"upgrades.wind.name\":\"Wind\",\"upgrades.wind.tooltip\":\"Paddle position creates wind\",\"upgrades.wind.verbose_description\":\"Wind depends on paddle position: left blows left, right blows right. Affects both balls and coins.\",\"upgrades.wrap_left.name\":\"Wrap left\",\"upgrades.wrap_left.tooltip\":\"Hitting the left side teleports the ball to the right side\",\"upgrades.wrap_left.verbose_description\":\"Higher levels teleport coins too.\",\"upgrades.wrap_right.name\":\"Wrap right\",\"upgrades.wrap_right.tooltip\":\"Hitting the right side teleports the ball to the left side\",\"upgrades.wrap_right.verbose_description\":\"Higher levels teleport coins too.\",\"upgrades.yoyo.name\":\"Yo-yo\",\"upgrades.yoyo.tooltip\":\"The ball falls toward the paddle\",\"upgrades.yoyo.verbose_description\":\"It's the opposite of telekinesis, control the ball while it's falling back down.\",\"upgrades.zen.name\":\"Zen\",\"upgrades.zen.tooltip\":\"More coins if you don't trigger bombs\",\"upgrades.zen.verbose_description\":\"+{{lvl}} combo every 3s, reset when there's an explosion\"}");

module.exports = JSON.parse('{"confirmRestart.no":"Annuler","confirmRestart.text":"Vous \xeates sur le point de commencer une nouvelle partie, est-ce vraiment ce que vous vouliez ?","confirmRestart.title":"D\xe9marrer une nouvelle partie\u202F?","confirmRestart.yes":"Commencer une nouvelle partie","editor.editing.bigger":"Augmenter la taille du niveau","editor.editing.color":"Choisissez une couleur dans la liste des couleurs (max 5 par niveau)","editor.editing.copied":"","editor.editing.copy":"Copier le code du niveau","editor.editing.copy_help":"Collez-le dans le canal #levels de notre discord","editor.editing.credit":"Cr\xe9dits et source","editor.editing.credit_prompt":"Entrez l\'url source ou l\'explication de votre niveau.","editor.editing.delete":"Supprimer le niveau","editor.editing.down":"D\xe9placez toutes les briques vers le bas","editor.editing.help":"Cliquez ensuite sur une tuile pour la colorier.","editor.editing.left":"D\xe9placer toutes les briques vers la gauche","editor.editing.play":"Jouez \xe0 ce niveau","editor.editing.rename":"Nom du niveau","editor.editing.rename_prompt":"Veuillez saisir un nouveau nom pour le niveau","editor.editing.right":"D\xe9placer toutes les briques vers la droite","editor.editing.show_code":"","editor.editing.show_code_help":"","editor.editing.smaller":"Diminuer la taille du niveau","editor.editing.title":"Niveau d\'\xe9dition\xa0: {{name}}","editor.editing.up":"D\xe9placez toutes les briques","editor.help":"Cr\xe9ez des niveaux personnalis\xe9s et partagez-les pour les inclure dans le jeu.","editor.import":"Importer un niveau","editor.import_instruction":"Collez un code de niveau pour l\'importer dans votre liste de niveaux","editor.locked":"Atteignez un score total de {{min}} pour d\xe9bloquer","editor.new_level":"Nouveau niveau","editor.title":"\xc9diteur de niveau","gameOver.creative":"Cette partie de test ne sera pas enregistr\xe9e.","gameOver.cumulative_total":"Votre score total cumul\xe9 est pass\xe9 de {{startTs}} \xe0 {{endTs}}.","gameOver.lost.summary":"Vous avez fait tomber la balle apr\xe8s avoir attrap\xe9 {{score}} pi\xe8ces.","gameOver.lost.title":"Balle perdue","gameOver.stats.balls_lost":"Balles perdues","gameOver.stats.bricks_broken":"Briques cass\xe9es","gameOver.stats.bricks_per_minute":"Briques cass\xe9es par minute","gameOver.stats.catch_rate":"Pi\xe8ces attrap\xe9es","gameOver.stats.combo_avg":"Combo moyen","gameOver.stats.combo_max":"Combo maximum","gameOver.stats.duration_per_level":"Dur\xe9e par niveau","gameOver.stats.hit_rate":"Pr\xe9cision","gameOver.stats.intro":"","gameOver.stats.level_reached":"Niveau atteint","gameOver.stats.total_score":"Score total","gameOver.stats.upgrades_applied":"Am\xe9liorations appliqu\xe9es","gameOver.stats_intro":"Vous trouverez ci-dessous les statistiques de cette partie compar\xe9es \xe0 vos {{count}} meilleures parties.","gameOver.unlocked_perk":"Am\xe9lioration d\xe9bloqu\xe9e","gameOver.unlocked_perk_plural":"Vous avez d\xe9bloqu\xe9 {{count}} am\xe9liorations","gameOver.win.summary":"Cette partie est termin\xe9e. Vous avez accumul\xe9 {{score}} pi\xe8ces. ","gameOver.win.title":"Vous avez termin\xe9 cette partie","help.content":"## Objectif\\n\\nAttrapez un maximum de pi\xe8ces au cours des 7 niveaux.\\nLes pi\xe8ces apparaissent lorsque vous cassez des briques.\\nAttrapez-les avec votre palet pour augmenter votre score.\\nVotre score est affich\xe9 en haut \xe0 droite de l\'\xe9cran.\\nNe laissez pas tomber la balle, sinon la partie est termin\xe9e.\\n\\nApr\xe8s avoir d\xe9truit toutes les briques, vous pourrez choisir une am\xe9lioration.\\n\\n## Am\xe9liorations\\n\\nLes am\xe9liorations que vous choisissez seront valables jusqu\'\xe0 la fin de la partie.\\nCertaines peuvent \xeatre s\xe9lectionn\xe9es plusieurs fois pour un effet plus puissant.\\nD\'autres aident \xe0 viser ou simplifient le jeu.\\nCertaines ne sont utiles que lorsqu\'elles sont combin\xe9es.\\n\\nVous obtenez toujours une am\xe9lioration au d\xe9but de chaque partie.\\nSon ic\xf4ne forme les briques du premier niveau.\\nVous pouvez s\xe9lectionner les am\xe9liorations de d\xe9part dans les param\xe8tres.\\n\\nDe nombreuses am\xe9liorations influencent votre combo.\\n\\n## Combo\\n\\nVotre \xab combo \xbb correspond au nombre de pi\xe8ces g\xe9n\xe9r\xe9es lorsqu\'une brique se casse.\\nIl est affich\xe9 sur votre palet. Par exemple, x4 signifie que chaque brique rapporte 4 pi\xe8ces.\\n\\nLa plupart des am\xe9liorations qui augmentent le combo ajoutent \xe9galement une condition pour le r\xe9initialiser.\\nLe combo se r\xe9initialise \xe9galement si la balle revient sur la raquette sans toucher de brique.\\nUn message \xab\xa0Manqu\xe9\xa0\xbb s\'affiche alors.\\n\\nEssayez de viser vers un brique \xe0 chaque rebond.\\n\\n## Vis\xe9e\\n\\nSeule la position de la balle sur la raquette d\xe9termine son angle de rebond.\\nSi la balle touche la raquette en plein centre, elle rebondira verticalement.\\nSi vous frappez sur le c\xf4t\xe9 de la raquette, l\'angle sera plus grand.\\nLa vitesse de la raquette et l\'angle d\'incidence de la balle n\'ont pas d\'effet.\\n\\nDe nombreuses am\xe9liorations facilitant la vis\xe9e peuvent \xeatre d\xe9bloqu\xe9es.\\n\\n## D\xe9blocages\\n\\nLorsque vous jouez \xe0 Breakout 71 pour la premi\xe8re fois, la plupart des am\xe9liorations et des niveaux sont verrouill\xe9s.\\nLes am\xe9liorations se d\xe9bloquent simplement en jouant et en attrapant beaucoup de pi\xe8ces.\\nLes premiers niveaux se d\xe9bloquent en atteignant un score \xe9lev\xe9.\\nLes niveaux suivants ajoutent une condition concernant les avantages s\xe9lectionn\xe9s.\\n\\nAtteindre des scores \xe9lev\xe9s est beaucoup plus facile lorsque vous obtenez plusieurs am\xe9liorations apr\xe8s chaque niveau.\\n\\n## Relances et am\xe9liorations gratuites\\n\\nVous obtiendrez une am\xe9lioration suppl\xe9mentaire si vous jouez bien\xa0:\\n\\n- Terminez le niveau en moins de {{levelTimeGood}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedGood}} fois\\n- Attrapez {{catchRateGood}}\xa0% de pi\xe8ces\\n- Manquez les briques moins de {{missesGood}} fois\\n\\nVous b\xe9n\xe9ficierez \xe9galement d\'une relance qui vous permettra d\'ignorer les am\xe9liorations  si vous faites  encore mieux\xa0:\\n\\n- Terminez un niveau en moins de {{levelTimeBest}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedBest}} fois\\n- Attrapez {{catchRateBest}}\xa0% de pi\xe8ces\\n- Manquez les briques moins de {{missesBest}} fois\\n\\nUne option dans les param\xe8tres vous permet d\'afficher ces statistiques ","help.help":"D\xe9couvrez le jeu en d\xe9tail","help.levels":"Niveaux","help.title":"Aide","help.upgrades":"## Am\xe9liorations","history.columns.score":"Score","history.columns.started":"Date","history.help":"Liste vos {{count}} meilleurs parties.","history.include_past_versions":"Afficher \xe9galement les versions ant\xe9rieures","history.locked":"Jouez d\'abord au moins dix parties","history.title":"Historique","lab.help":"Essayez n\'importe quel combinaison d\'am\xe9liorations et de niveaux.","lab.instructions":"S\xe9lectionnez les am\xe9liorations et un niveau, puis cliquez sur le bouton \\"jouer\\" ci-dessus","lab.menu_entry":"Mode cr\xe9atif","lab.play":"Jouer","lab.reset":"R\xe9initialiser","lab.select_level":"S\xe9lectionnez un niveau sur lequel jouer","lab.unlocks_at":"D\xe9verrouill\xe9 \xe0 partir d\'un score total de {{score}}","level_up.challenges.catchRateGood.description":"","level_up.challenges.catchRateGood.name":"","level_up.challenges.earned_medal":"","level_up.challenges.earned_medal_plural":"","level_up.challenges.gain":"","level_up.challenges.levelMisses.description":"","level_up.challenges.levelMisses.name":"","level_up.challenges.levelMisses.none":"","level_up.challenges.levelTime.description":"","level_up.challenges.levelTime.name":"","level_up.challenges.no_gain":"","level_up.forbidden":"","level_up.required":"","level_up.title":"Vous venez lorsqu\'elles sont combin\xe9es avec la bonne am\xe9lioration combin\xe9e.","unlocks.category.beginner":"## Am\xe9liorations adapt\xe9es aux d\xe9butants\\n\\nCes am\xe9liorations sont tr\xe8s utiles aux d\xe9butants\xa0: elles vous aident \xe0 jouer plus longtemps et \xe0 moins rater la balle.","unlocks.category.combo":"## Am\xe9liorations de combo\\n\\nCes am\xe9liorations permettent d\'augmenter progressivement votre combo, mais ajoutent \xe9galement une condition de r\xe9initialisation. En choisir une est une bonne id\xe9e, en choisir plusieurs augmente le risque et la r\xe9compense.","unlocks.category.combo_boost":"## Am\xe9liorations du booster de combo\\n\\nCes am\xe9liorations augmentent le combo ou le multiplicateur de combo sans ajouter de condition de r\xe9initialisation.","unlocks.category.simple":"## Am\xe9liorations d\'assistance\\n\\nCes am\xe9liorations sont utiles dans presque toutes les versions.","unlocks.greyed_out_help":"Les \xe9l\xe9ments gris\xe9es peuvent \xeatre d\xe9bloqu\xe9es en augmentant votre score total. Le score total augmente \xe0 chaque fois que vous marquez des points dans le jeu.","unlocks.intro":"Votre score total est de {{ts}}. Cliquez sur une am\xe9lioration ci-dessous pour commencer une partie.","unlocks.just_unlocked":"Niveau d\xe9bloqu\xe9","unlocks.just_unlocked_plural":"Vous venez de d\xe9bloquer {{count}} niveaux","unlocks.level":"Vous avez d\xe9bloqu\xe9 {{unlocked}} niveaux sur {{out_of}}","unlocks.level_description":"Un niveau {{size}}x{{size}} avec {{bricks}} briques, {{colors}} couleurs et {{bombs}} bombes.","unlocks.levels":"Niveaux d\xe9bloqu\xe9s","unlocks.minScore":"Atteignez un score de ${{minScore}} dans une partie pour d\xe9bloquer.","unlocks.minScoreWithPerks":"Atteignez ${{minScore}} dans une partie avec {{required}} mais sans {{forbidden}}.","unlocks.minTotalScore":"Accumuler un total de ${{score}}","unlocks.reached":"Votre meilleur score pour l\'instant est {{reached}}.","unlocks.title_upgrades":"Vous avez d\xe9bloqu\xe9 {{unlocked}} am\xe9liorations sur {{out_of}}","unlocks.try":"","unlocks.upgrades":"Mises \xe0 niveau d\xe9bloqu\xe9es","unlocks.use":"","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brique cass\xe9e, combo perdu apr\xe8s {{delay}}s sans casser de briques","upgrades.addiction.verbose_description":"Le d\xe9compte ne commence qu\'\xe0 parti de la  destruction de la premi\xe8re brique du niveau, et s\'arr\xeate d\xe8s qu\'il n\'y a plus de briques. ","upgrades.asceticism.name":"Asc\xe9tisme","upgrades.asceticism.tooltip":"+{{combo}} combo par brique cass\xe9e, - {{combo}} quand une pi\xe8ce est attrap\xe9e","upgrades.asceticism.verbose_description":"Il faudra trouver un moyen de stocker les pi\xe8ces pendant que le combo grandis. ","upgrades.ball_attract_ball.name":"Gravit\xe9","upgrades.ball_attract_ball.tooltip":"Les balles attirent les balles","upgrades.ball_attract_ball.verbose_description":"Les balles qui sont \xe9loign\xe9es de plus de 3/4 de la largeur d\'\xe9cran commencent \xe0 s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus \xe9loign\xe9es l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle en jeu.","upgrades.ball_attracts_coins.name":"Balles fortun\xe9es","upgrades.ball_attracts_coins.tooltip":"Les pi\xe8ces accompagnent la balle la plus proche ","upgrades.ball_attracts_coins.verbose_description":"Vous pourriez l\'utiliser pour que les pi\xe8ces orbitent autours de la balle et colorent les briques \xe0 proximit\xe9, ou comme une sorte de coin magnet. ","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.ball_repulse_ball.tooltip":"Les balles repoussent les balles","upgrades.ball_repulse_ball.verbose_description":"Les balles qui se trouvent \xe0 moins d\'un quart de largeur d\'\xe9cran commencent \xe0 se repousser les unes les autres. La force de r\xe9pulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affich\xe9es pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle.","upgrades.base_combo.name":"Meilleur base","upgrades.base_combo.tooltip":"3 pi\xe8ces suppl\xe9mentaires par brique cass\xe9e","upgrades.base_combo.verbose_description":"Votre combo commence normalement \xe0 1 au d\xe9but du niveau et revient \xe0 1 lorsque vous rebondissez sans rien toucher. Avec cette caract\xe9ristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pi\xe8ces par brique. Lorsque votre combo est r\xe9initialis\xe9, il revient \xe0 4 et non \xe0 1.  Votre balle scintillera un peu pour indiquer que son combo est sup\xe9rieur \xe0 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosions plus violentes","upgrades.bigger_explosions.verbose_description":"L\'explosion par d\xe9faut efface un carr\xe9 de 3x3 briques, avec cette am\xe9lioration un carr\xe9 de 5x5. Le vent soufflant les pi\xe8ces est \xe9galement beaucoup plus fort. L\'\xe9cran clignotera un peu apr\xe8s chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_puck.name":"Raquette plus grande","upgrades.bigger_puck.tooltip":"Attrapez facilement plus de pi\xe8ces.","upgrades.bigger_puck.verbose_description":"Une grande raquette permet de ne jamais rater la balle et d\'attraper plus de pi\xe8ces, ainsi que d\'orienter pr\xe9cis\xe9ment les rebonds. Cependant, une grande raquette est plus difficile \xe0 utiliser sur les c\xf4t\xe9s du niveau.","upgrades.bricks_attract_ball.name":"Les briques attirent les balles","upgrades.bricks_attract_ball.tooltip":"La balle se dirige vers les {{count}} premi\xe8res briques qu\'elle touchera.","upgrades.bricks_attract_ball.verbose_description":"L\'effet est plus fort \xe0 des niveaux plus \xe9lev\xe9s. Le nombre de briques pouvant \xeatre touch\xe9es avant que l\'effet ne s\'arr\xeate est \xe9galement plus \xe9lev\xe9. L\'effet se r\xe9arme lorsque la balle touche le palet.","upgrades.bricks_attract_coins.name":"Briques attirent les pi\xe8ces","upgrades.bricks_attract_coins.tooltip":"Aide \xe0 garder les pi\xe8ces en suspension","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Bou\xe9e","upgrades.buoy.tooltip":"Les pi\xe8ces flottent pendant {{duration}} secondes sur la ligne du bas.","upgrades.buoy.verbose_description":"L\'effet est plus visible en mode mobile","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"R\xe9v\xe8le les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.verbose_description":"Vous aide \xe0 choisir les bonnes am\xe9liorations et \xe0 comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) am\xe8nent des informations compl\xe9mentaires d\'une utilit\xe9 douteuse. ","upgrades.coin_magnet.name":"Aimant pour pi\xe8ces","upgrades.coin_magnet.tooltip":"La raquette attire les pi\xe8ces","upgrades.coin_magnet.verbose_description":"Dirige les pi\xe8ces vers la raquette. L\'effet est plus fort sur les pi\xe8ces d\xe9j\xe0 proche de la raquette. ","upgrades.compound_interest.name":"Int\xe9r\xeats compos\xe9s","upgrades.compound_interest.tooltip":"+{{lvl}} combo par brique cass\xe9e, remise \xe0 z\xe9ro quand une pi\xe8ce est perdu","upgrades.compound_interest.verbose_description":"Votre combo augmentera d\'une unit\xe9 \xe0 chaque fois que vous casserez une brique. Toute pi\xe8ce perdue remettra votre combo \xe0 z\xe9ro. \\n\\nSi votre combo est sup\xe9rieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pi\xe8ces ne doivent pas aller \xe0 cet endroit.","upgrades.concave_puck.name":"Raquette concave","upgrades.concave_puck.tooltip":"Aide \xe0 \xe9viter les bords.","upgrades.concave_puck.verbose_description":"Les balles d\xe9marrent verticalement en d\xe9but de niveau, et rebondi sur la raquette de mani\xe8re plus verticale et invers\xe9e.","upgrades.corner_shot.name":"Tir en coin","upgrades.corner_shot.tooltip":"Laisse votre raquette sortir de la zone encadr\xe9e","upgrades.corner_shot.verbose_description":"Aide \xe0 viser dans les coins","upgrades.double_or_nothing.name":"Double ou rien","upgrades.double_or_nothing.tooltip":"Le combo grimpe {{multiplier}} fois plus vite, mais vous perdrez {{percent}}% de votre score \xe0 chaque r\xe9initialisation.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.etherealcoins.tooltip":"Les pi\xe8ces ne subissent plus la gravit\xe9 ou la friction","upgrades.etherealcoins.verbose_description":"Les pi\xe8ces garderont leur vitesse m\xeame apr\xe8s plusieurs rebonds, et ne subirons plus la gravit\xe9. ","upgrades.extra_levels.name":"Encore 5 minutes","upgrades.extra_levels.tooltip":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.verbose_description":"La partie dure normalement 7 niveaux, apr\xe8s quoi le jeu est termin\xe9 et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette am\xe9lioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux o\xf9 vous faites le plus de points, la diff\xe9rence peut donc \xeatre spectaculaire.","upgrades.extra_life.name":"","upgrades.extra_life.tooltip":"","upgrades.extra_life.verbose_description":"","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.forgiving.tooltip":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.verbose_description":" La premi\xe8re brique rat\xe9e par niveau ne co\xfbte rien, la suivante 10%, 20%, etc.","upgrades.fountain_toss.name":"Pi\xe8ce dans la fontaine","upgrades.fountain_toss.tooltip":"Gagnez parfois un peu de combo quand vous perdez des pi\xe8ces.","upgrades.fountain_toss.verbose_description":"Lorsque vous manquez une pi\xe8ce et que votre combo \xe9tait inf\xe9rieur au niveau*30, votre combo a une probabilit\xe9 de niveau/combo d\'augmenter d\'un.","upgrades.ghost_coins.name":"Pi\xe8ces fant\xf4me","upgrades.ghost_coins.tooltip":"Les pi\xe8ces traversent les briques doucement","upgrades.ghost_coins.verbose_description":"Ce n\'est pas une bug, c\'est une fonctionnalit\xe9 ! Les pi\xe8ces passent \xe0 travers les briques doucement. Les niveaux plus \xe9lev\xe9s permettent aux pi\xe8ce de traverser les briques plus vite.","upgrades.golden_goose.name":"Oie d\'or","upgrades.golden_goose.tooltip":"Les pi\xe8ces se t\xe9l\xe9portent vers la balle apr\xe8s avoir touch\xe9 une brique","upgrades.golden_goose.verbose_description":"Lorsqu\'une pi\xe8ce touche une brique, elle est t\xe9l\xe9port\xe9e vers la boule la plus proche. Au niveau 2, les pi\xe8ces se t\xe9l\xe9portent \xe9galement apr\xe8s avoir touch\xe9 un c\xf4t\xe9.","upgrades.happy_family.name":"Famille heureuse","upgrades.happy_family.tooltip":"Plus de pi\xe8ces si vous gardez toutes les boules dans le jeu.","upgrades.happy_family.verbose_description":"+1 combo par balle suppl\xe9mentaire et par rebond de raquette. Le combo est r\xe9initialis\xe9 lorsqu\'une balle est perdue. Seule la balle au-dessus de 1 donne le combo.","upgrades.helium.name":"H\xe9lium","upgrades.helium.tooltip":"Les pi\xe8ce flottent au lieu de tomber autours de la raquette.","upgrades.helium.verbose_description":"Au niveau 1, la gravit\xe9 est r\xe9duite. Au niveau 2, les pi\xe8ces flottent lentement. Au niveau 3, elles volent vraiment.","upgrades.hot_start.name":"D\xe9marrage \xe0 chaud","upgrades.hot_start.tooltip":"Combo \xe0 {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.verbose_description":"Au d\xe9but de chaque niveau, votre combo commencera \xe0 +30 points, mais \xe0 chaque seconde, il sera diminu\xe9 d\'un point.  ","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Les explosions aspirent les pi\xe8ces au lieu de les faire exploser.","upgrades.implosions.verbose_description":"La force d\u2019explosion est appliqu\xe9e dans l\u2019autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.left_is_lava.name":"\xc9viter le c\xf4t\xe9 gauche","upgrades.left_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en touchant le bord gauche","upgrades.left_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9, ce qui vous permet d\'obtenir une pi\xe8ce de plus \xe0 chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se r\xe9initialise d\xe8s que votre balle touche le c\xf4t\xe9 gauche.\\n\\nD\xe8s que votre combo augmente, le c\xf4t\xe9 gauche devient rouge pour vous rappeler que vous devez \xe9viter de le frapper.","upgrades.limitless.name":"Sans limites","upgrades.limitless.tooltip":"Augmenter le niveau maximum de toutes les mises \xe0 niveau de {{lvl}} ","upgrades.limitless.verbose_description":"Choisir cet avantage augmente \xe9galement sa propre limite d\'un point, vous permettant de le choisir \xe0 nouveau.","upgrades.metamorphosis.name":"M\xe9tamorphose","upgrades.metamorphosis.tooltip":"Chaque pi\xe8ce peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.verbose_description":"Avec cette am\xe9lioration, les pi\xe8ces seront de la couleur de la brique d\'o\xf9 elles proviennent et coloreront la premi\xe8re brique qu\'elles toucheront. Les pi\xe8ces apparaissent \xe0 la vitesse de la balle qui les a cass\xe9es, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\". Au \xe0 chaque niveau, chaque pi\xe8ce peut colorier une brique de plus avant d\'\xeatre \\"\xe9puis\xe9e\\" et d\'appara\xeetre vide.","upgrades.minefield.name":"Terrain min\xe9","upgrades.minefield.tooltip":"+{{percent}}% de pi\xe8ces par brique de bombe \xe0 l\'\xe9cran","upgrades.minefield.verbose_description":"Les bombes sont \xe9galement compt\xe9es pendant qu\'elles explosent.","upgrades.multiball.name":"Multi balle","upgrades.multiball.tooltip":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.verbose_description":"D\xe8s que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien s\xfbr, de franchir le niveau plus rapidement.","upgrades.nbricks.name":"Pr\xe9l\xe8vement","upgrades.nbricks.tooltip":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon combo perdu","upgrades.nbricks.verbose_description":"Si votre balle rebondis sans casser une brique, \xe7a compte quand m\xeame comme une frappe.  Les briques d\xe9truites par des explosions ne comptent pas.","upgrades.one_more_choice.name":"La r\xe9ponse D","upgrades.one_more_choice.tooltip":"Plus de choix d\'am\xe9lioration","upgrades.one_more_choice.verbose_description":"Chaque menu d\'am\xe9lioration comportera une option suppl\xe9mentaire.  Cela n\'augmente pas le nombre d\'am\xe9liorations que vous pouvez choisir, mais vous aide \xe0 cr\xe9er le profile id\xe9al. \\"La r\xe9ponse D\\" est une r\xe9f\xe9rence \xe0 un sketch classique. ","upgrades.ottawa_treaty.name":"Trait\xe9 d\'Ottawa","upgrades.ottawa_treaty.tooltip":"Casser une brique pr\xe8s d\'une bombe la d\xe9samorce","upgrades.ottawa_treaty.verbose_description":"La bombe \xe0 proximit\xe9 sera remplac\xe9e par un bloc color\xe9. Si vous poss\xe9dez un sapeur, la balle perdra son effet sapeur jusqu\'au prochain rebond. Une seule bombe peut \xeatre remplac\xe9e \xe0 la fois.","upgrades.passive_income.name":"Revenu passif","upgrades.passive_income.tooltip":"+{{lvl}} combo / brique cass\xe9e, la raquette est immat\xe9rielle {{time}}s apr\xe8s le d\xe9placement","upgrades.passive_income.verbose_description":"Certaines am\xe9lioration font bouger les balles sans avoir besoin de mettre la raquette en mouvement.","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.picky_eater.tooltip":"+{{lvl}} combo par brique cass\xe9e la couleur de la balle,  combo perdu sinon","upgrades.picky_eater.verbose_description":"Chaque fois que vous cassez une brique de la m\xeame couleur que votre balle, votre combo augmente d\'une unit\xe9.\\nS\'il s\'agit d\'une couleur diff\xe9rente, la balle adopte cette nouvelle couleur, mais la combinaison est r\xe9initialis\xe9e, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle. Les briques de la mauvaise couleur sont entour\xe9es en rouge. Si vous avez plus d\'une balle, elles changent toutes de couleur en m\xeame temps lorsque l\'une d\'entre elles touche une brique.","upgrades.pierce.name":"Balle per\xe7ante","upgrades.pierce.tooltip":"La balle perce {{count}} briques apr\xe8s chaque rebond  sur la raquette.","upgrades.pierce.verbose_description":"Normalement , la balle rebondit d\xe8s qu\'elle touche une brique. Avec cette am\xe9lioration, elle continuera sa trajectoire jusqu\'\xe0 avoir cass\xe9es 3 briques.\\n\\nApr\xe8s cela, elle rebondira sur la quatri\xe8me brique et devra toucher la raquette pour remettre le compteur \xe0 z\xe9ro.","upgrades.pierce_color.name":"Perceur de couleur","upgrades.pierce_color.tooltip":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.verbose_description":"Chaque fois qu\'une balle touche une brique de la m\xeame couleur, elle la traverse sans encombre.\\n\\nLorsqu\'elle atteint une brique de couleur diff\xe9rente, elle la casse, prend sa couleur et rebondit. \\n\\nSi vous avez des briques solides, le fonctionnement est un peu diff\xe9rent. ","upgrades.puck_repulse_ball.name":"Atterrissage en douceur","upgrades.puck_repulse_ball.tooltip":"La raquette repousse les balles","upgrades.puck_repulse_ball.verbose_description":"Lorsqu\'une balle s\'approche de la raquette, elle commence \xe0 ralentir, voire \xe0 rebondir sans toucher le palet.","upgrades.rainbow.name":"Arc en ciel","upgrades.rainbow.tooltip":"Les pi\xe8ces apparaissent avec la couleur de l\'arc en ciel.","upgrades.rainbow.verbose_description":"Chaque niveau augment la proportion de pi\xe8ces color\xe9e. La couleur d\xe9pends du temps de jeu. ","upgrades.reach.name":"Attaque a\xe9rienne","upgrades.reach.tooltip":"Casser une des N briques de la ligne la plus basse d\xe9truit le combo. Sinon, +N combo.","upgrades.reach.verbose_description":"S\'il n\'y a qu\'une seule rang\xe9e de briques, ou si la rang\xe9e la plus basse couvre toute la largeur du jeu, cet avantage est sans effet. Sinon, briser cette rang\xe9e la plus basse r\xe9initialise le combo\xa0; briser toute autre rang\xe9e augmente le combo du nombre de briques pr\xe9sentes sur cette rang\xe9e.\\n\\nLa rang\xe9e de briques du bas sera entour\xe9e en rouge pour vous rappeler de ne pas la toucher. ","upgrades.respawn.name":"R\xe9apparition ","upgrades.respawn.tooltip":"{{percent}}% des briques r\xe9apparaissent apr\xe8s {{delay}}s.","upgrades.respawn.verbose_description":"Des effets de particules vous indiqueront o\xf9 les briques appara\xeetront. ","upgrades.right_is_lava.name":"\xc9viter le c\xf4t\xe9 droit","upgrades.right_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de choc avec le cot\xe9 droit","upgrades.right_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9, ce qui vous permet d\'obtenir une pi\xe8ce de plus \xe0 chaque fois que vous cassez les briques suivantes.\\n\\nCependant, votre combinaison se r\xe9initialise d\xe8s que votre balle touche le c\xf4t\xe9 droit de la zone de jeu.\\n\\nD\xe8s que votre combo augmente, le c\xf4t\xe9 droit devient rouge pour vous rappeler que vous devez \xe9viter de le frapper.","upgrades.sacrifice.name":"Sacrifice","upgrades.sacrifice.tooltip":"Perdre une vie d\xe9truit toutes les briques \xe0 l\'\xe9cran","upgrades.sacrifice.verbose_description":"Au niveau 2, le combo est multipli\xe9 par le 2 avant de d\xe9truire toutes les briques. Cela peut augmenter consid\xe9rablement le combo.","upgrades.sapper.name":"Sapeur","upgrades.sapper.tooltip":"La premi\xe8re brique cass\xe9e devient une bombe.","upgrades.sapper.verbose_description":"Au lieu de dispara\xeetre, la premi\xe8re brique cass\xe9e est remplac\xe9e par une bombe. Faire rebondir la balle sur la raquette r\xe9arme l\'effet.  En montant en niveau, vous pourrez placer plus de bombes.","upgrades.shocks.name":"Choc","upgrades.shocks.tooltip":"Collision explosive entre les balles","upgrades.shocks.verbose_description":"Quand deux balles entrent en collision,  elles \xe9changent leurs vitesse, cr\xe9ent une explosion et gagnent un peu de vitesse qui les s\xe9pare. ","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Garer {{percent}}%  du combo au changement de niveau ","upgrades.shunt.verbose_description":"D\xe9marrage \xe0 chaud sera simplement ajout\xe9 au combo actuel","upgrades.side_flip.name":"Droitier","upgrades.side_flip.tooltip":"+{{lvl}} combo par brique cass\xe9 de la droite, -{{loss}} sinon","upgrades.side_flip.verbose_description":"Impactez la brique sur son c\xf4t\xe9 droit pour obtenir un combo, mais \xe9vitez de la frapper sur son c\xf4t\xe9 gauche, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.side_kick.name":"Gaucher","upgrades.side_kick.tooltip":"+{{lvl}} combo par brique cass\xe9 de la gauche, -{{loss}} sinon","upgrades.side_kick.verbose_description":"Impactez la brique sur son c\xf4t\xe9 gauche pour obtenir un combo, mais \xe9vitez de la frapper sur son c\xf4t\xe9 droit, car cela annulerait deux combos. Frapper du haut et du bas n\'a aucun effet.","upgrades.skip_last.name":"Nettoyage facile","upgrades.skip_last.tooltip":"La derni\xe8re brique s\'autod\xe9truit.","upgrades.skip_last.verbose_description":"Vous devez casser toutes les briques pour passer au niveau suivant. \\n\\nCependant, il peut \xeatre difficile d\'obtenir les derni\xe8res briques.\\n\\nTerminer un niveau plus t\xf4t permet d\'obtenir des choix suppl\xe9mentaires lors de la mise \xe0 niveau. \\n\\nNe jamais manquer de briques est \xe9galement tr\xe8s avantageux.\\n\\nDonc, si vous avez du mal \xe0 casser les derni\xe8res briques, obtenir cet avantage plusieurs fois peut vous aider.","upgrades.slow_down.name":"Balle lente","upgrades.slow_down.tooltip":"La balle se d\xe9place plus lentement","upgrades.slow_down.verbose_description":"La balle d\xe9marre relativement lentement, mais \xe0 chaque niveau de votre partie, elle d\xe9marre un peu plus vite, et elle acc\xe9l\xe8re \xe9galement si vous passez beaucoup de temps dans un niveau.\\n\\nCet avantage rend la balle plus facile \xe0 g\xe9rer. \\n\\nVous pouvez l\'obtenir au d\xe9but de chaque partie en activant le mode enfant dans le menu.","upgrades.smaller_puck.name":"Raquette plus petite","upgrades.smaller_puck.tooltip":"+{{percent}}% de pi\xe8ces","upgrades.smaller_puck.verbose_description":"Cela r\xe9duit la taille de la raquette, ce qui, en th\xe9orie, facilite certains tirs en coin, mais augmente en r\xe9alit\xe9 la difficult\xe9.\\n\\nC\'est pourquoi vous obtenez \xe9galement un bonus int\xe9ressant de +50\xa0% d\'apparition de pi\xe8ces.","upgrades.soft_reset.name":"R\xe9initialisation progressive","upgrades.soft_reset.tooltip":"La remise \xe0 z\xe9ro du combo conserve {{percent}}% des points","upgrades.soft_reset.verbose_description":"Limite l\'impact d\'une r\xe9initialisation du combo.","upgrades.steering.name":"","upgrades.steering.tooltip":"","upgrades.steering.verbose_description":"","upgrades.sticky_coins.name":"Pi\xe8ces collantes","upgrades.sticky_coins.tooltip":"Les pi\xe8ces collent aux briques de la m\xeame couleur","upgrades.sticky_coins.verbose_description":"Au niveau 2, ils collent aux briques de n\'importe quelle couleur","upgrades.streak_shots.name":"S\xe9quence de destruction","upgrades.streak_shots.tooltip":"Plus de pi\xe8ces si vous cassez plusieurs briques \xe0 la fois.","upgrades.streak_shots.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente. Le combo est remis \xe0 z\xe9ro quand la balle touche la raquette. Une fois que votre combo d\xe9passe la valeur de base, votre raquette devient rouge pour vous rappeler que le fait de la toucher avec la balle d\xe9truira votre combo.","upgrades.sturdy_bricks.name":"Briques solides","upgrades.sturdy_bricks.tooltip":"+{{lvl}} PV des briques, +{{percent}}% pi\xe8ces","upgrades.sturdy_bricks.verbose_description":"Chaque niveau de cet am\xe9lioration ajoute un PV \xe0 toutes les briques. Vous pouvez consulter le nombre de PV avec l\'avantage \\"clairvoyant\\". Vous pouvez augmenter les d\xe9g\xe2ts des balles en obtenant l\'am\xe9lioration \\"Balle per\xe7ante\\". Chaque niveau de cet am\xe9lioration ajoute 50% de pi\xe8ces en plus.","upgrades.superhot.name":"SUPER HOT","upgrades.superhot.tooltip":"Le temps avance quand la raquette bouge. ","upgrades.superhot.verbose_description":"SUPER HOT SUPER HOT SUPER HOT SUPER HOT","upgrades.telekinesis.name":"T\xe9l\xe9kin\xe9sie","upgrades.telekinesis.tooltip":"Contr\xf4ler la trajectoire de la balle","upgrades.telekinesis.verbose_description":"Vous contr\xf4lez la balle pendant qu\'elle monte.","upgrades.three_cushion.name":"Trois coussins","upgrades.three_cushion.tooltip":"+1 combo par coup sur les c\xf4t\xe9s et le dessus, jusqu\'\xe0 +{{max}} par rebond de la raquette. Le combo se r\xe9initialise lorsque vous touchez une brique sans rebondir au pr\xe9alable.","upgrades.three_cushion.verbose_description":"Chaque coup port\xe9 d\'un c\xf4t\xe9 augmente le combo d\'un point, jusqu\'\xe0 +3. Apr\xe8s cela, aucun combo ne sera obtenu jusqu\'au prochain rebond de la raquette.","upgrades.top_is_lava.name":"Icare ","upgrades.top_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en cas de rebond au plafond","upgrades.top_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9. Cependant, votre combo sera r\xe9initialis\xe9 d\xe8s que votre balle atteindra le haut de l\'\xe9cran.\\n\\nLorsque votre combo est sup\xe9rieur au minimum, une barre rouge appara\xeet en haut de l\'\xe9cran pour vous rappeler que vous devez \xe9viter de la frapper.","upgrades.trampoline.name":"Trampoline","upgrades.trampoline.tooltip":"+{{lvl}} combo \xe0 chaque rebond d\'une balle sur la raquette,-{{lvl}} combo \xe0 chaque rebond sur un des bords","upgrades.trampoline.verbose_description":"Une des rares am\xe9liorations \xe0 ne pas avoir de condition de remise \xe0 z\xe9ro","upgrades.transparency.name":"Camouflage","upgrades.transparency.tooltip":"La balle devient transparente en haut de l\'\xe9cran. +{{percent}} % de pi\xe8ces lorsque toutes les balles sont en transparence totale","upgrades.transparency.verbose_description":"Les niveaux plus \xe9lev\xe9s rendent la balle transparente plus t\xf4t et augmentent le bonus de points.","upgrades.trickledown.name":"Ruissellement","upgrades.trickledown.tooltip":"Les pi\xe8ces apparaissent en haut de l\'\xe9cran.","upgrades.trickledown.verbose_description":"\xc7a pourrait vous aider \xe0 mettre des pi\xe8ces de cot\xe9. ","upgrades.unbounded.name":"Besoin d\'espace","upgrades.unbounded.tooltip":"Plus d\'espace autour des briques, mais la raquette ne peut pas aller aussi loin.","upgrades.unbounded.verbose_description":"Une autre am\xe9lioration pourrait vous permettre d\'\xe9tendre la port\xe9e de votre raquette.","upgrades.viscosity.name":"Fluide visqueux ","upgrades.viscosity.tooltip":"Chute plus lente des pi\xe8ces","upgrades.viscosity.verbose_description":"Les pi\xe8ces acc\xe9l\xe8rent normalement avec la gravit\xe9 et les explosions pour atteindre des vitesses assez \xe9lev\xe9es. \\n\\nCette comp\xe9tence les ralentit constamment, comme si elles se trouvaient dans une sorte de liquide visqueux.\ 5\u0440\u0432\u043E\u0433\u043E \u0443\u0440\u043E\u0432\u043D\u044F.\\n\u0412\u044B\u0431\u0440\u0430\u0442\u044C \u0441\u0442\u0430\u0440\u0442\u043E\u0432\u044B\u0435 \u0430\u043F\u0433\u0440\u0435\u0439\u0434\u044B \u043C\u043E\u0436\u043D\u043E \u0432 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0430\u0445.\\n\\n\u041C\u043D\u043E\u0433\u0438\u0435 \u0430\u043F\u0433\u0440\u0435\u0439\u0434\u044B \u0432\u043B\u0438\u044F\u044E\u0442 \u043D\u0430 \u0432\u0430\u0448\u0438 \u043A\u043E\u043C\u0431\u043E.\\n\\n## \u041A\u043E\u043C\u0431\u043E\\n\\n\u0412\u0430\u0448\u0435 \\"\u043A\u043E\u043C\u0431\u043E\\" - \u044D\u0442\u043E \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u043E \u043C\u043E\u043D\u0435\u0442, \u043F\u043E\u044F\u0432\u043B\u044F\u044E\u0449\u0438\u0445\u0441\u044F \u043F\u0440\u0438 \u0440\u0430\u0437\u0440\u0443\u0448\u0435\u043D\u0438\u0438 \u043A\u0438\u0440\u043F\u0438\u0447\u0430.\\n\u041E\u043D\u043E \u043E\u0442\u043E\u0431\u0440\u0430\u0436\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u0432\u0430\u0448\u0435\u043C \u0432\u0435\u0441\u043B\u0435, \u043D\u0430\u043F\u0440\u0438\u043C\u0435\u0440, x4 \u043E\u0437\u043D\u0430\u0447\u0430\u0435\u0442, \u0447\u0442\u043E \u043A\u0430\u0436\u0434\u044B\u0439 \u043A\u0438\u0440\u043F\u0438\u0447 \u043F\u043E\u0440\u043E\u0436\u0434\u0430\u0435\u0442 4 \u043C\u043E\u043D\u0435\u0442\u044B.\\n\u0411\u043E\u043B\u044C\u0448\u0438\u043D\u0441\u0442\u0432\u043E \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\u0439, \u0443\u0432\u0435\u043B\u0438\u0447\u0438\u0432\u0430\u044E\u0449\u0438\u0445 \u043A\u043E\u043C\u0431\u043E, \u0442\u0430\u043A\u0436\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u044F\u044E\u0442 \u0443\u0441\u043B\u043E\u0432\u0438\u0435 \u0434\u043B\u044F \u0435\u0433\u043E \u0441\u0431\u0440\u043E\u0441\u0430.\\n\u043A\u043E\u043C\u0431\u043E \u0442\u0430\u043A\u0436\u0435 \u0441\u0431\u0440\u0430\u0441\u044B\u0432\u0430\u0435\u0442\u0441\u044F, \u0435\u0441\u043B\u0438 \u043C\u044F\u0447 \u0432\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044F \u043A \u0440\u0430\u043A\u0435\u0442\u043A\u0435, \u043D\u0435 \u0437\u0430\u0434\u0435\u0432 \u043A\u0438\u0440\u043F\u0438\u0447.\\n\\n\u0412 \u044D\u0442\u043E\u043C \u0441\u043B\u0443\u0447\u0430\u0435 \u043F\u043E\u044F\u0432\u0438\u0442\u0441\u044F \u0441\u043E\u043E\u0431\u0449\u0435\u043D\u0438\u0435 \\"\u043F\u0440\u043E\u043C\u0430\u0445\\".\\n\\n\u0421\u0442\u0430\u0440\u0430\u0439\u0442\u0435\u0441\u044C \u043A\u0430\u0436\u0434\u044B\u0439 \u0440\u0430\u0437 \u0446\u0435\u043B\u0438\u0442\u044C\u0441\u044F \u0432 \u043A\u0438\u0440\u043F\u0438\u0447.\\n\\n## \u041F\u0440\u0438\u0446\u0435\u043B\u0438\u0432\u0430\u043D\u0438\u0435\\n\\n\u0422\u043E\u043B\u044C\u043A\u043E \u043F\u043E\u043B\u043E\u0436\u0435\u043D\u0438\u0435 \u043C\u044F\u0447\u0430 \u043D\u0430 \u043B\u043E\u043F\u0430\u0442\u043A\u0435 \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u044F\u0435\u0442, \u043A\u0430\u043A \u043E\u043D \u043E\u0442\u0441\u043A\u043E\u0447\u0438\u0442.\\n\u0415\u0441\u043B\u0438 \u043C\u044F\u0447 \u043F\u043E\u043F\u0430\u0434\u0435\u0442 \u0432 \u0446\u0435\u043D\u0442\u0440 \u043F\u043B\u043E\u0449\u0430\u0434\u043A\u0438, \u043E\u043D \u043E\u0442\u0441\u043A\u043E\u0447\u0438\u0442 \u0432\u0435\u0440\u0442\u0438\u043A\u0430\u043B\u044C\u043D\u043E \u0432\u0432\u0435\u0440\u0445.\\n\u0415\u0441\u043B\u0438 \u0432\u044B \u0443\u0434\u0430\u0440\u0438\u0442\u0435 \u0441 \u043E\u0434\u043D\u043E\u0439 \u0441\u0442\u043E\u0440\u043E\u043D\u044B, \u043E\u043D \u043E\u0442\u0441\u043A\u043E\u0447\u0438\u0442 \u043F\u043E\u0434 \u0431\u043E\u043B\u044C\u0448\u0438\u043C \u0443\u0433\u043B\u043E\u043C.\\n\u0421\u043A\u043E\u0440\u043E\u0441\u0442\u044C \u0432\u0435\u0441\u043B\u0430 \u0438 \u0443\u0433\u043E\u043B \u0432\u0445\u043E\u0434\u0430 \u043D\u0435 \u0432\u043B\u0438\u044F\u044E\u0442 \u043D\u0430 \u043D\u0430\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u0438\u
