<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Breakout 71</title>
    <meta name="description" content="A breakout game with roguelite mechanics. Break bricks, catch coins, pick upgrades, repeat. Play for free on mobile and desktop.">
    <link rel="manifest" href="/PWA/manifest.webmanifest">
    <meta name="theme-color" content="#000000" id="themeColor">

    <style>* {
  box-sizing: border-box;
  font-family: Courier New, Courier, Lucida Sans Typewriter, Lucida Typewriter, monospace;
}

body {
  width: 100vw;
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  color: #fff;
  background-size: 120px 120px;
  background-color: var(--background1);
  --background1: #030c23;
  --background2: #03112a;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#game {
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  width: 100vw;
  position: fixed;
  top: 0;
  left: 0;
}

canvas:not(#game) {
  display: none;
}

#score, #menu {
  z-index: 1;
  appearance: none;
  font: inherit;
  color: #fff;
  min-width: 40px;
  max-width: calc(100vw - 80px);
  min-height: 40px;
  text-shadow: 0 0 4px var(--level-background);
  background: none;
  border: none;
  padding: 10px;
  line-height: 20px;
  position: absolute;
  top: 0;
  overflow: hidden;
}

#score:hover, #menu:hover, #score:focus, #menu:focus {
  cursor: pointer;
  background: #0000004d;
}

#score {
  color: #fff;
  transition: color .3s;
  right: 0;
}

#score.active .score {
  color: gold;
  transition: color 10ms;
}

#score span {
  color: #fffc;
}

#score span.great {
  color: #90ee90;
}

#score span.good, #score span.bad {
  color: #fff;
}

#menu {
  left: 0;
}

body.has-alert-open {
  height: auto;
  overflow: visible;
}

body:not(.has-alert-open) #popup {
  display: none;
}

#popup {
  display: flex;
  overflow: auto;
}

#popup:before {
  z-index: 10;
  content: "";
  background: #000000e6;
  display: block;
  position: fixed;
  inset: 0;
}

#popup > div {
  z-index: 11;
  transform-origin: center;
  flex-direction: column;
  align-items: stretch;
  width: 100%;
  max-width: 500px;
  margin: auto;
  padding: 20px 10px;
  display: flex;
  position: relative;
}

#popup > div > * {
  margin: 0 0 20px;
  padding: 0;
}

#popup > div > section {
  flex-direction: column;
  align-items: stretch;
  display: flex;
}

#popup > div > section button {
  font: inherit;
  color: #fff;
  cursor: pointer;
  text-align: left;
  background: #000c;
  border: 1px solid #fff;
  gap: 10px;
  margin-top: -1px;
  padding: 10px;
  display: flex;
}

#popup > div > section button:not([disabled]):hover, #popup > div > section button:not([disabled]):focus {
  z-index: 1;
  border-color: #f1d33b;
  position: relative;
}

#popup > div > section button[disabled] {
  opacity: .5;
  filter: saturate(0);
  cursor: not-allowed;
}

#popup > div > section button > div {
  flex-grow: 1;
}

#popup > div > section button > div > em {
  opacity: .8;
  display: block;
}

#popup > div > section button.grey-out-unless-hovered:not(:hover) {
  opacity: .6;
}

#popup > div > section button.grey-out-unless-hovered:not(:hover) img {
  filter: saturate(0);
}

#popup > div > section button.grey-out-unless-hovered[disabled] {
  opacity: .2;
}

#popup.actionsAsGrid > div {
  max-width: none;
}

#popup.actionsAsGrid > div > div, #popup.actionsAsGrid > div > p, #popup.actionsAsGrid > div > h1, #popup.actionsAsGrid > div > h2 {
  width: 100%;
  max-width: 550px;
  margin-left: auto;
  margin-right: auto;
}

#popup.actionsAsGrid > div section {
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  display: grid;
}

#popup button#close-modale {
  color: #fff;
  cursor: pointer;
  z-index: 12;
  background: none;
  border: none;
  width: 60px;
  height: 60px;
  position: fixed;
  top: 0;
  right: 0;
  overflow: hidden;
}

#popup button#close-modale:before {
  content: "+";
  font-size: 80px;
  display: inline-block;
  position: absolute;
  top: 34px;
  left: 26px;
  transform: translate(-50%, -50%)rotate(45deg);
}

#popup button#close-modale:hover {
  background: #000;
  font-weight: bold;
}

#popup .textAfterButtons {
  color: #ffffff94;
}

#popup a[href] {
  color: inherit;
}

#popup a[href]:hover, #popup a[href]:focus {
  color: #fff;
}

@media (width >= 1400px) {
  #popup.settings:before {
    opacity: 0;
  }

  #popup.settings > div {
    max-width: 400px;
    margin-right: 0;
  }
}

.progress {
  color: #fff;
  text-align: center;
  background: #1c1c2f;
  border-radius: 5px;
  padding: 5px 10px;
  display: block;
  position: relative;
  overflow: hidden;
  box-shadow: inset 3px 3px 5px #00000080;
}

.progress > .progress_bar_part {
  transform-origin: 0 0;
  z-index: 1;
  background: #4049ca;
  animation: 1s ease-out both grow;
  display: block;
  position: absolute;
  inset: 0;
  box-shadow: inset 3px 3px 5px #00000080;
}

.progress > span {
  z-index: 2;
  display: block;
  position: relative;
}

@keyframes grow {
  0% {
    transform: scale(0, 1);
  }
}

#level-recording-container {
  text-align: center;
  max-width: 400px;
  margin: 40px;
}

#level-recording-container video {
  max-width: 100%;
  height: auto;
}

#level-recording-container a {
  display: block;
}

#level-recording-container a video {
  border-radius: 10px;
  outline: 1px solid #fff;
  margin: 20px auto;
  display: block;
  box-shadow: 2px 2px 5px #000;
}

.histogram {
  align-items: stretch;
  gap: 10px;
  margin: 10px 0 40px;
  display: flex;
}

.histogram > span {
  flex-direction: column;
  flex-grow: 1;
  justify-content: flex-end;
  width: 10px;
  display: flex;
  position: relative;
}

.histogram > span.active > span {
  background: #4049ca;
}

.histogram > span > span {
  background: #1c1c2f;
  border-radius: 5px;
  width: 100%;
  min-height: 1px;
  display: block;
}

.histogram > span > span > span {
  pointer-events: none;
  white-space: nowrap;
  transform-origin: 0 100%;
  text-align: center;
  font-size: 13px;
  display: block;
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translate(-50%);
}

.histogram > span:not(:hover):not(.active) > span > span {
  opacity: 0;
}

h2.histogram-title {
  color: #3b3f75;
  font-size: 18px;
}

h2.histogram-title strong {
  color: #4049ca;
}

.red-icon {
  background: red;
}

.red-icon img {
  filter: saturate(0);
  mix-blend-mode: luminosity;
}

.upgrade {
  gap: 2px;
  margin: 0 0 10px;
  display: flex;
}

.upgrade img {
  width: 32px;
  height: 32px;
}

.upgrade p {
  color: #fff9;
  flex-grow: 1;
  margin: 0 20px;
}

.upgrade.used p strong {
  color: #fff;
}

.upgrade > span {
  flex-grow: 0;
  flex-shrink: 0;
  align-self: center;
  width: 5px;
  height: 32px;
  display: inline-block;
}

.upgrade > span.used {
  background: #fff;
}

.upgrade > span.free {
  opacity: .25;
  background: #fff;
}

.upgrade > span.banned {
  background: red;
}

.upgrade.used {
  opacity: 1;
}

.upgrade.free, .upgrade.banned {
  opacity: .8;
}

#tooltip {
  color: #fff;
  z-index: 11;
  pointer-events: none;
  user-select: none;
  opacity: 1;
  background: #000;
  border: 1px solid #fff;
  border-radius: 2px;
  max-width: 300px;
  padding: 10px;
  display: block;
  position: fixed;
  top: 0;
  left: 0;
}

#popup.history > div {
  max-width: none;
}

#popup.history > div table th:hover {
  cursor: pointer;
  background: #000;
}

#popup.history > div table td, #popup.history > div table th {
  text-align: right;
  padding: 0 5px;
  line-height: 20px;
}

#popup.history > div table th:first-child, #popup.history > div table td:first-child {
  text-align: left;
}

#popup.history > div table img {
  pointer-events: none;
  width: 20px;
  height: auto;
}

#popup.history > div table tr:nth-child(2n) {
  background: #00000094;
}

.progress-inline {
  background: gray;
  border-radius: 2px;
  height: 7px;
  display: block;
  position: absolute;
  bottom: 2px;
  left: 62px;
  right: 2px;
}

.progress-inline span {
  transform-origin: 0 0;
  background: #fff;
  position: absolute;
  inset: 1px;
}

.toast {
  opacity: .8;
  pointer-events: none;
  background: #000;
  border: 1px solid #fff;
  border-radius: 2px;
  align-items: center;
  gap: 10px;
  padding-right: 10px;
  animation: forwards toast;
  display: flex;
  position: fixed;
  top: 40px;
  left: 0;
}

@keyframes toast {
  0%, 100% {
    opacity: 0;
    transform: translate(-20px, -20px)scale(.5);
  }

  10%, 90% {
    opacity: .8;
    transform: none;
  }
}

ement si la balle revient sur la raquette sans toucher de brique.\\nUn message \xab\xa0Manqu\xe9\xa0\xbb s\'affiche alors.\\n\\nEssayez de viser vers un brique \xe0 chaque rebond.\\n\\n## Vis\xe9e\\n\\nSeule la position de la balle sur la raquette d\xe9termine son angle de rebond.\\nSi la balle touche la raquette en plein centre, elle rebondira verticalement.\\nSi vous frappez sur le c\xf4t\xe9 de la raquette, l\'angle sera plus grand.\\nLa vitesse de la raquette et l\'angle d\'incidence de la balle n\'ont pas d\'effet.\\n\\nDe nombreuses am\xe9liorations facilitant la vis\xe9e peuvent \xeatre d\xe9bloqu\xe9es.\\n\\n## D\xe9blocages\\n\\nLorsque vous jouez \xe0 Breakout 71 pour la premi\xe8re fois, la plupart des am\xe9liorations et des niveaux sont verrouill\xe9s.\\nLes am\xe9liorations se d\xe9bloquent simplement en jouant et en attrapant beaucoup de pi\xe8ces.\\nLes premiers niveaux se d\xe9bloquent en atteignant un score \xe9lev\xe9.\\nLes niveaux suivants ajoutent une condition concernant les avantages s\xe9lectionn\xe9s.\\n\\nAtteindre des scores \xe9lev\xe9s est beaucoup plus facile lorsque vous obtenez plusieurs am\xe9liorations apr\xe8s chaque niveau.\\n\\n## Relances et am\xe9liorations gratuites\\n\\nVous obtiendrez une am\xe9lioration suppl\xe9mentaire si vous jouez bien\xa0:\\n\\n- Terminez le niveau en moins de {{levelTimeGood}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedGood}} fois\\n- Attrapez {{catchRateGood}}\xa0% de pi\xe8ces\\n- Manquez les briques moins de {{missesGood}} fois\\n\\nVous b\xe9n\xe9ficierez \xe9galement d\'une relance qui vous permettra d\'ignorer les am\xe9liorations  si vous faites  encore mieux\xa0:\\n\\n- Terminez un niveau en moins de {{levelTimeBest}} secondes\\n- Touchez les bords ou le haut moins de {{wallBouncedBest}} fois\\n- Attrapez {{catchRateBest}}\xa0% de pi\xe8ces\\n- Manquez les briques moins de {{missesBest}} fois\\n\\nUne option dans les param\xe8tres vous permet d\'afficher ces statistiques ccumul\xe9 {{rerolls}} rerolls","score_panel.score_to_unlock":"Attrapez {{points}} pi\xe8ces suppl\xe9mentaires pour d\xe9bloquer le niveau \xab\xa0{{level}}\xa0\xbb","score_panel.title":"{{score}} points au niveau {{level}}/{{max}} ","score_panel.upcoming_levels":"Niveaux de la parties : ","score_panel.upgrades_picked":"Am\xe9liorations choisies pendant la partie :","unlocks.greyed_out_help":"Les \xe9l\xe9ments gris\xe9es peuvent \xeatre d\xe9bloqu\xe9es en augmentant votre score total. Le score total augmente \xe0 chaque fois que vous marquez des points dans le jeu.","unlocks.intro":"Votre score total est de {{ts}}. Vous trouverez ci-dessous toutes les am\xe9liorations et tous les niveaux que le jeu peut offrir. Cliquez sur l\'un d\'entre eux pour les essayer dans une partie de test. ","unlocks.just_unlocked":"Niveau d\xe9bloqu\xe9","unlocks.just_unlocked_plural":"Vous venez de d\xe9bloquer {{count}} niveaux","unlocks.level":"<h2>Vous avez d\xe9bloqu\xe9 {{unlocked}} niveaux sur {{out_of}}</h2>\\n<p>Voici tous les niveaux du jeu, cliquez sur l\'un d\'eux pour l\'essayer. </p> ","unlocks.level_description":"Un niveau {{size}}x{{size}} avec {{bricks}} briques, {{colors}} couleurs et {{bombs}} bombes.","unlocks.minScore":"Atteignez un score de ${{minScore}} dans une partie pour d\xe9bloquer.","unlocks.minScoreWithPerks":"Atteignez ${{minScore}} dans une partie avec {{required}} mais sans {{forbidden}}.","unlocks.minTotalScore":"Accumuler un total de ${{score}}","unlocks.reached":"Votre meilleur score pour l\'instant est {{reached}}.","unlocks.title_upgrades":"Vous avez d\xe9bloqu\xe9 {{unlocked}} am\xe9liorations sur {{out_of}}","upgrades.addiction.name":"Addiction","upgrades.addiction.tooltip":"+{{lvl}} combo / brique, combo perdu apr\xe8s {{delay}}s sans casser de briques","upgrades.addiction.verbose_description":"Le d\xe9compte ne commence qu\'\xe0 parti de la  destruction de la premi\xe8re brique du niveau, et s\'arr\xeate d\xe8s qu\'il n\'y a plus de briques. ","upgrades.asceticism.name":"Asc\xe9tisme","upgrades.asceticism.tooltip":"+{{combo}} combo par brique cass\xe9e, - {{combo}} quand une pi\xe8ce est attrap\xe9e","upgrades.asceticism.verbose_description":"Il faudra trouver un moyen de stocker les pi\xe8ces pendant que le combo grandis. ","upgrades.ball_attract_ball.help_plural":"Force d\'attraction plus forte","upgrades.ball_attract_ball.name":"Gravit\xe9","upgrades.ball_attract_ball.tooltip":"Les balles attirent les balles","upgrades.ball_attract_ball.verbose_description":"Les balles qui sont \xe9loign\xe9es de plus de 3/4 de la largeur d\'\xe9cran commencent \xe0 s\'attirer. La force d\'attraction est plus forte lorsque les balles sont plus \xe9loign\xe9es l\'une de l\'autre. Des particules arc-en-ciel voleront pour symboliser la force d\'attraction. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle en jeu.","upgrades.ball_attracts_coins.name":"Balles fortun\xe9es","upgrades.ball_attracts_coins.tooltip":"Les pi\xe8ces accompagnent la balle la plus proche ","upgrades.ball_attracts_coins.verbose_description":"Vous pourriez l\'utiliser pour que les pi\xe8ces orbitent autours de la balle et colorent les briques \xe0 proximit\xe9, ou comme une sorte de coin magnet. ","upgrades.ball_repulse_ball.help_plural":"Force de r\xe9pulsion plus forte","upgrades.ball_repulse_ball.name":"Vol en formation","upgrades.ball_repulse_ball.tooltip":"Les balles repoussent les balles","upgrades.ball_repulse_ball.verbose_description":"Les balles qui se trouvent \xe0 moins d\'un quart de largeur d\'\xe9cran commencent \xe0 se repousser les unes les autres. La force de r\xe9pulsion est plus forte si elles sont proches l\'une de l\'autre. Des particules seront affich\xe9es pour symboliser l\'application de cette force. Cet avantage n\'est offert que si vous avez d\xe9j\xe0 plus d\'une balle.","upgrades.base_combo.name":"Meilleur base","upgrades.base_combo.tooltip":"Le combo commence \xe0 {{coins}} au lieu de 1.","upgrades.base_combo.verbose_description":"Votre combo commence normalement \xe0 1 au d\xe9but du niveau et revient \xe0 1 lorsque vous rebondissez sans rien toucher. Avec cette caract\xe9ristique, le combo commence 3 points plus haut, ce qui fait que vous obtiendrez toujours au moins 4 pi\xe8ces par brique. Lorsque votre combo est r\xe9initialis\xe9, il revient \xe0 4 et non \xe0 1.  Votre balle scintillera un peu pour indiquer que son combo est sup\xe9rieur \xe0 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosions plus violentes","upgrades.bigger_explosions.verbose_description":"L\'explosion par d\xe9faut efface un carr\xe9 de 3x3 briques, avec cette am\xe9lioration un carr\xe9 de 5x5. Le vent soufflant les pi\xe8ces est \xe9galement beaucoup plus fort. L\'\xe9cran clignotera un peu apr\xe8s chaque explosion (sauf en mode graphismes basiques).","upgrades.bigger_puck.name":"Raquette plus grande","upgrades.bigger_puck.tooltip":"Attrapez facilement plus de pi\xe8ces.","upgrades.bigger_puck.verbose_description":"Une grande raquette permet de ne jamais rater la balle et d\'attraper plus de pi\xe8ces, ainsi que d\'orienter pr\xe9cis\xe9ment les rebonds. Cependant, une grande raquette est plus difficile \xe0 utiliser sur les c\xf4t\xe9s du niveau.","upgrades.clairvoyant.name":"Clairvoyant","upgrades.clairvoyant.tooltip":"R\xe9v\xe8le les niveaux, PV des briques et direction des balles","upgrades.clairvoyant.verbose_description":"Vous aide \xe0 choisir les bonnes am\xe9liorations et \xe0 comprendre ce qu\'il se passe avec \\"briques solides\\". Les niveaux 2 et 3 (en mode loop) am\xe8nent des informations compl\xe9mentaires d\'une utilit\xe9 douteuse. ","upgrades.coin_magnet.help_plural":"Effet plus marqu\xe9 sur les pi\xe8ces","upgrades.coin_magnet.name":"Aimant pour pi\xe8ces","upgrades.coin_magnet.tooltip":"La raquette attire les pi\xe8ces","upgrades.coin_magnet.verbose_description":"Dirige les pi\xe8ces vers la raquette. L\'effet est plus fort sur les pi\xe8ces d\xe9j\xe0 proche de la raquette. ","upgrades.compound_interest.name":"Int\xe9r\xeats compos\xe9s","upgrades.compound_interest.tooltip":"+{{lvl}} combo par brique cass\xe9e, remise \xe0 z\xe9ro quand une pi\xe8ce est perdu","upgrades.compound_interest.verbose_description":"Votre combo augmentera d\'une unit\xe9 \xe0 chaque fois que vous casserez une brique. Toute pi\xe8ce perdue remettra votre combo \xe0 z\xe9ro. \\n\\nSi votre combo est sup\xe9rieure au minimum, une ligne rouge s\'affichera au bas de la zone de jeu pour vous le rappeler que les pi\xe8ces ne doivent pas aller \xe0 cet endroit.","upgrades.concave_puck.name":"Raquette concave","upgrades.concave_puck.tooltip":"Aide \xe0 \xe9viter les bords.","upgrades.concave_puck.verbose_description":"Les balles d\xe9marrent verticalement en d\xe9but de niveau, et rebondi sur la raquette de mani\xe8re plus verticale et invers\xe9e.","upgrades.corner_shot.name":"Tir en coin","upgrades.corner_shot.tooltip":"Laisse votre raquette sortir de la zone encadr\xe9e","upgrades.corner_shot.verbose_description":"Aide \xe0 viser dans les coins","upgrades.etherealcoins.name":"Monnaie spatiale ","upgrades.etherealcoins.tooltip":"Les pi\xe8ces ne subissent plus la gravit\xe9 ou la friction","upgrades.etherealcoins.verbose_description":"Les pi\xe8ces garderont leur vitesse m\xeame apr\xe8s plusieurs rebonds, et ne subirons plus la gravit\xe9. ","upgrades.extra_levels.name":"Encore 5 minutes","upgrades.extra_levels.tooltip":"Jouer {{count}} niveaux au lieu de 7","upgrades.extra_levels.verbose_description":"La partie dure normalement 7 niveaux, apr\xe8s quoi le jeu est termin\xe9 et le score que vous avez atteint est votre score de partie.\\n\\nChoisir cette am\xe9lioration vous permet de prolonger la partie d\'un niveau. Les derniers niveaux sont souvent ceux o\xf9 vous faites le plus de points, la diff\xe9rence peut donc \xeatre spectaculaire.","upgrades.extra_life.help_plural":"La (derni\xe8re) balle rebondit en bas de l\'\xe9cran au lieu d\'\xeatre perdue ( {{lvl}} fois).","upgrades.extra_life.name":"Seconde chance","upgrades.extra_life.tooltip":"La balle rebondit une fois avant d\'\xeatre perdue.","upgrades.extra_life.verbose_description":"Normalement, vous n\'avez qu\'une seule balle par manche, et la manche est termin\xe9e d\xe8s que vous la laissez tomber.\\n\\nCette comp\xe9tence ajoute une barre blanche en bas de l\'\xe9cran qui sauvera une balle une fois, et se brisera au cours du processus.\\n\\nVous pouvez prendre plusieurs vies d\'avances, elle seront utilis\xe9es \xe0 chaque fois qu\'une balle est sur le point d\'\xeatre perdue. ","upgrades.forgiving.name":"L\'erreur est humaine","upgrades.forgiving.tooltip":"Rater les briques fait perdre un portion progressivement plu importante du combo","upgrades.forgiving.verbose_description":" La premi\xe8re brique rat\xe9e par niveau ne co\xfbte rien, la suivante 10%, 20%, etc.","upgrades.fountain_toss.name":"Pi\xe8ce dans la fontaine","upgrades.fountain_toss.tooltip":"Gagnez parfois un peu de combo quand vous perdez des pi\xe8ces.","upgrades.fountain_toss.verbose_description":"Quand une pi\xe8ce est perdue alors que votre combo \xe9tait en dessous de {{max}}, votre combo \xe0 une probabilit\xe9 de {{lvl}}/combo d\'\xeatre incr\xe9ment\xe9","upgrades.ghost_coins.name":"Pi\xe8ces fant\xf4me","upgrades.ghost_coins.tooltip":"Les pi\xe8ces traversent les briques doucement","upgrades.ghost_coins.verbose_description":"Ce n\'est pas une bug, c\'est une fonctionnalit\xe9 ! Les pi\xe8ces passent \xe0 travers les briques doucement. Les niveaux plus \xe9lev\xe9s permettent aux pi\xe8ce de traverser les briques plus vite.","upgrades.helium.name":"H\xe9lium","upgrades.helium.tooltip":"Les pi\xe8ce flottent au lieu de tomber autours de la raquette.","upgrades.helium.verbose_description":"Les pi\xe8ces attendront d\'\xeatre sous la raquette pour tomber. ","upgrades.hot_start.name":"D\xe9marrage \xe0 chaud","upgrades.hot_start.tooltip":"Combo \xe0 {{start}}, -{{loss}} combo par seconde","upgrades.hot_start.verbose_description":"Au d\xe9but de chaque niveau, votre combo commencera \xe0 +30 points, mais \xe0 chaque seconde, il sera diminu\xe9 d\'un point.  ","upgrades.implosions.name":"Implosions","upgrades.implosions.tooltip":"Les explosions aspirent les pi\xe8ces au lieu de les faire exploser.","upgrades.implosions.verbose_description":"La force d\u2019explosion est appliqu\xe9e dans l\u2019autre sens. Les niveaux 2+ augmentent la puissance de l\'implosion. ","upgrades.instant_upgrade.name":"Un tiens vaut deux tu l\'auras","upgrades.instant_upgrade.tooltip":"-1 am\xe9lioration maintenant, mais un choix de mois jusqu\'\xe0 la fin de la partie.","upgrades.instant_upgrade.verbose_description":"Choisissez imm\xe9diatement deux am\xe9liorations, afin d\'en obtenir une gratuite et une autre pour rembourser celle utilis\xe9e pour obtenir cet avantage. Chaque fois que vous choisirez des am\xe9liorations dans le menu suivant, vous aurez moins de choix.","upgrades.left_is_lava.name":"\xc9viter le c\xf4t\xe9 gauche","upgrades.left_is_lava.tooltip":"+{{lvl}} combo par brique, perdu en touchant le bord gauche","upgrades.left_is_lava.verbose_description":"Chaque fois que vous cassez une brique, votre combo augmente d\'une unit\xe9, ce qui vous permet d\'obtenir une pi\xe8ce de plus \xe0 chaque fois que vous cassez une brique.\\n\\nCependant, votre combinaison se r\xe9initialise d\xe8s que votre balle touche le c\xf4t\xe9 gauche.\\n\\nD\xe8s que votre combo augmente, le c\xf4t\xe9 gauche devient rouge pour vous rappeler que vous devez \xe9viter de le frapper.","upgrades.limitless.name":"Sans limites","upgrades.limitless.tooltip":"Augmenter le niveau maximum de toutes les mises \xe0 niveau de {{lvl}} ","upgrades.limitless.verbose_description":"Choisir cet avantage augmente \xe9galement sa propre limite d\'un point, vous permettant de le choisir \xe0 nouveau.","upgrades.metamorphosis.name":"M\xe9tamorphose","upgrades.metamorphosis.tooltip":"Chaque pi\xe8ce peut tacher {{lvl}} brique(s) avec sa couleur","upgrades.metamorphosis.verbose_description":"Avec cette am\xe9lioration, les pi\xe8ces seront de la couleur de la brique d\'o\xf9 elles proviennent et coloreront la premi\xe8re brique qu\'elles toucheront. \\n\\nLes pi\xe8ces apparaissent \xe0 la vitesse de la balle qui les a cass\xe9es, ce qui signifie que vous pouvez viser un peu dans la direction des briques que vous voulez \\"peindre\\".","upgrades.minefield.name":"Terrain min\xe9","upgrades.minefield.tooltip":"+{{lvl}} combo par brique explosive \xe0 l\'\xe9cran","upgrades.minefield.verbose_description":"Ajoute +lvl au combo lorsqu\'une brique est plac\xe9e, -lvl lorsqu\'elle est d\xe9truite et augmente le combo de base du nombre de briques multipli\xe9 par le niveau","upgrades.multiball.name":"Multi balle","upgrades.multiball.tooltip":"Chaque niveau commence avec {{count}} balles.","upgrades.multiball.verbose_description":"D\xe8s que vous laissez tomber la balle dans Breakout 71, vous perdez. \\n\\nAvec cet avantage, vous obtenez deux balles, et vous pouvez donc vous permettre d\'en perdre une.\\n\\nLes balles perdues reviennent au niveau suivant. \\n\\nLe fait d\'avoir plus d\'une balle permet d\'obtenir d\'autres avantages et, bien s\xfbr, de franchir le niveau plus rapidement.","upgrades.nbricks.name":"Pr\xe9l\xe8vement","upgrades.nbricks.tooltip":"Frappez exactement {{lvl}} briques par rebond pour +{{lvl}} combo, sinon combo perdu","upgrades.nbricks.verbose_description":"Si votre balle rebondis sans casser une brique, \xe7a compte quand m\xeame comme une frappe.  Les briques d\xe9truites par des explosions ne comptent pas.","upgrades.one_more_choice.name":"La r\xe9ponse D","upgrades.one_more_choice.tooltip":"1 choix suppl\xe9mentaire d\'am\xe9lioration propos\xe9 jusqu\'\xe0 la fin de la partie","upgrades.one_more_choice.verbose_description":"Chaque menu d\'am\xe9lioration comportera une option suppl\xe9mentaire.  Cela n\'augmente pas le nombre d\'am\xe9liorations que vous pouvez choisir, mais vous aide \xe0 cr\xe9er le profile id\xe9al. \\"La r\xe9ponse D\\" est une r\xe9f\xe9rence \xe0 un sketch classique. ","upgrades.passive_income.name":"Revenu passif","upgrades.passive_income.tooltip":"+{{lvl}} combo / brique, sauf si la raquette \xe0 boug\xe9 dans les {{time}} derni\xe8res secondes, combo perdu dans ce cas","upgrades.passive_income.verbose_description":"Certaines am\xe9lioration font bouger les balles sans avoir besoin de mettre la raquette en mouvement.","upgrades.picky_eater.name":"Mangeur par couleur","upgrades.picky_eater.tooltip":"+{{lvl}} combo par brique cass\xe9e la couleur de la balle,  combo perdu sinon","upgrades.picky_eater.verbose_description":"Chaque fois que vous cassez une brique de la m\xeame couleur que votre balle, votre combo augmente d\'une unit\xe9.\\nS\'il s\'agit d\'une couleur diff\xe9rente, la balle adopte cette nouvelle couleur, mais la combinaison est r\xe9initialis\xe9e, sauf s\'il n\'y avais plus aucune brique de la couleur de la balle. Les briques de la mauvaise couleur sont entour\xe9es en rouge. Si vous avez plus d\'une balle, elles changent toutes de couleur en m\xeame temps lorsque l\'une d\'entre elles touche une brique.","upgrades.pierce.name":"Balle per\xe7ante","upgrades.pierce.tooltip":"La balle perce {{count}} briques apr\xe8s chaque rebond  sur la raquette.","upgrades.pierce.verbose_description":"Normalement , la balle rebondit d\xe8s qu\'elle touche une brique. Avec cette am\xe9lioration, elle continuera sa trajectoire jusqu\'\xe0 avoir cass\xe9es 3 briques.\\n\\nApr\xe8s cela, elle rebondira sur la quatri\xe8me brique et devra toucher la raquette pour remettre le compteur \xe0 z\xe9ro.","upgrades.pierce_color.name":"Perceur de couleur","upgrades.pierce_color.tooltip":"+{{lvl}} dommage sur les briques de la couleur de la balle","upgrades.pierce_color.verbose_description":"Chaque fois qu\'une balle touche une brique de la m\x \":\"See your score, upgrades and more\",\"play.stats.coins_catch_rate\":\"Coins catch rate\",\"play.stats.levelMisses\":\"Missed shots, where you hit nothing\",\"play.stats.levelTime\":\"Level time\",\"play.stats.levelWallBounces\":\"Wall bounces\",\"score_panel.close_to_unlock\":\"Next level unlock :\",\"score_panel.get_upgrades_to_unlock\":\"Get {{missingUpgrades}} and score {{points}} more points to unlock level \\\"{{level}}\\\"\",\"score_panel.rerolls_count\":\"You have accumulated {{rerolls}} rerolls\",\"score_panel.score_to_unlock\":\"Score {{points}} more points to unlock level \\\"{{level}}\\\"\",\"score_panel.title\":\"{{score}} points at level {{level}}/{{max}} \",\"score_panel.upcoming_levels\":\"Upcoming levels :\",\"score_panel.upgrades_picked\":\"Upgrades picked in this game run : \",\"unlocks.greyed_out_help\":\"The grayed out upgrades can be unlocked by increasing your total score. The total score increases every time you score in game.\",\"unlocks.intro\":\"Your total score is {{ts}}. Below are all the upgrades and levels the games has to offer.   Click an upgrade or level below to start a test game with it.\",\"unlocks.just_unlocked\":\"Level unlocked\",\"unlocks.just_unlocked_plural\":\"You just unlocked {{count}} levels\",\"unlocks.level\":\"<h2>You unlocked {{unlocked}} levels out of {{out_of}}</h2>\\n<p>Here are all the game levels, click one to try it out.</p> \",\"unlocks.level_description\":\"A {{size}}x{{size}} level with {{bricks}} bricks, {{colors}} colors and {{bombs}} bombs.\",\"unlocks.minScore\":\"Reach ${{minScore}} in a run to unlock.\",\"unlocks.minScoreWithPerks\":\"Reach ${{minScore}} in a run with {{required}} but without {{forbidden}} to unlock.\",\"unlocks.minTotalScore\":\"Accumulate a total of ${{score}}\",\"unlocks.reached\":\"Your best score was {{reached}}.\",\"unlocks.title_upgrades\":\"You unlocked {{unlocked}} upgrades out of {{out_of}}\",\"upgrades.addiction.name\":\"Addiction\",\"upgrades.addiction.tooltip\":\"+{{lvl}} combo / brick, combo resets {{delay}}s after breaking a brick. \",\"upgrades.addiction.verbose_description\":\"The countdown only starts after breaking the first brick of each level. It stops as soon as all bricks are destroyed.\",\"upgrades.asceticism.name\":\"Asceticism\",\"upgrades.asceticism.tooltip\":\"+{{combo}} combo / brick,  - {{combo}} on coin catch\",\"upgrades.asceticism.verbose_description\":\"You'll need to store the coins somewhere while your combo climbs. \",\"upgrades.ball_attract_ball.help_plural\":\"Stronger attraction force\",\"upgrades.ball_attract_ball.name\":\"Gravity\",\"upgrades.ball_attract_ball.tooltip\":\"Balls attract balls\",\"upgrades.ball_attract_ball.verbose_description\":\"Balls that are more than \\\"3/4 of the game area width\\\" away will start attracting each other. \\n\\nThe attraction force is stronger when they are furthest away from each other.\\n\\nRainbow particles will fly to symbolize the attraction force. This perk is only offered if you have more than one ball already.\",\"upgrades.ball_attracts_coins.name\":\"Balls attract coins\",\"upgrades.ball_attracts_coins.tooltip\":\"Coins follow the nearest ball and fall down slower\",\"upgrades.ball_attracts_coins.verbose_description\":\"This could be used to \\\"paint around\\\" the balls with coins if you combined it with \\\"stain\\\" and \\\"ghost coins\\\". It also works as a substitute for coin magnet. \",\"upgrades.ball_repulse_ball.help_plural\":\"Stronger repulsion force\",\"upgrades.ball_repulse_ball.name\":\"Personal space\",\"upgrades.ball_repulse_ball.tooltip\":\"Balls repulse balls\",\"upgrades.ball_repulse_ball.verbose_description\":\"Balls that are less than a quarter screen width away will start repulsing each other. The repulsion force is stronger if they are close to each other. Particles will jet out to symbolize this force being applied. This perk is only offered if you have more than one ball already.\",\"upgrades.base_combo.name\":\"Strong foundations\",\"upgrades.base_combo.tooltip\":\"Combo starts at {{coins}} instead of 1.\",\"upgrades.base_combo.verbose_description\":\"Your combo normally starts at 1 at the beginning of the level, and resets to 1 when you bounce around without hitting anything. With this perk, the combo starts 3 points higher, so you'll always get at least 4 coins per brick. Whenever your combo reset, it will go back to 4 and not 1. Your ball will glitter a bit to indicate that its combo is higher than one.\",\"upgrades.bigger_explosions.name\":\"Kaboom\",\"upgrades.bigger_explosions.tooltip\":\"Bigger explosions\",\"upgrades.bigger_explosions.verbose_description\":\"The default explosion clears a 3x3 square, with this it becomes a 5x5 square, and the blow on the coins is also significantly stronger. The screen will flash after each explosion (except in basic mode)\",\"upgrades.bigger_puck.name\":\"Bigger paddle\",\"upgrades.bigger_puck.tooltip\":\"Easily catch more coins.\",\"upgrades.bigger_puck.verbose_description\":\"A bigger paddle makes it easier to never miss the ball and to catch more coins, and also to precisely angle the bounces (the ball's angle only depends on where it hits the paddle). \",\"upgrades.clairvoyant.name\":\"Clairvoyant\",\"upgrades.clairvoyant.tooltip\":\"See upcoming levels, bricks HP and ball direction\",\"upgrades.clairvoyant.verbose_description\":\"Helps you pick the right upgrades and understand what's going on with sturdy bricks. Level 2 and 3 bring additional knowledge of dubious utility (reachable in loop mode)\",\"upgrades.coin_magnet.help_plural\":\"Stronger effect on the coins\",\"upgrades.coin_magnet.name\":\"Coins magnet\",\"upgrades.coin_magnet.tooltip\":\"Paddle attracts coins\",\"upgrades.coin_magnet.verbose_description\":\"Directs the coins to the paddle. The effect is stronger if the coin is close to it already.\",\"upgrades.compound_interest.name\":\"Compound interest\",\"upgrades.compound_interest.tooltip\":\"+{{lvl}} combo per brick broken, resets on coin lost\",\"upgrades.compound_interest.verbose_description\":\"Your combo will grow by one every time you break a brick, spawning more and more coin with every brick you break. \\nBe sure however to catch every one of those coins with your paddle, as any lost coin will reset your combo.\\nOnce your combo is above the minimum, the bottom of the play area will have a red line to remind you that coins should not go there.\",\"upgrades.concave_puck.name\":\"Concave paddle\",\"upgrades.concave_puck.tooltip\":\"Improves vertical aiming precision\",\"upgrades.concave_puck.verbose_description\":\"Balls starts the level going straight up, and bounces with less angle.\",\"upgrades.corner_shot.name\":\"Corner shot\",\"upgrades.corner_shot.tooltip\":\"Lets your paddle overlap with the borders of the screen\",\"upgrades.corner_shot.verbose_description\":\"Helps with aiming in the corners. Further levels let you go further out. \",\"upgrades.etherealcoins.name\":\"Coins, in Space\",\"upgrades.etherealcoins.tooltip\":\"Coins are no  longer affected by gravity\",\"upgrades.etherealcoins.verbose_description\":\"The coins will maintain their speed even after several bounces, and will no longer be affected by gravity.\",\"upgrades.extra_levels.name\":\"5 min more\",\"upgrades.extra_levels.tooltip\":\"Play {{count}} levels instead of 7\",\"upgrades.extra_levels.verbose_description\":\"The default game can last a max of 7 levels, after which the game is over. \\n\\nEach level of this perk lets you go one level higher. The last levels are often the ones where you make the most score, so the difference can be dramatic.\",\"upgrades.extra_life.help_plural\":\"Your (last) ball will bounce on the bottom instead of being lost ({{lvl}}  times).\",\"upgrades.extra_life.name\":\"Extra Life\",\"upgrades.extra_life.tooltip\":\"The ball will bounce once on the bottom line before being lost.\",\"upgrades.extra_life.verbose_description\":\"Normally, you have one ball, and the game is over as soon as you drop it.\\n\\nThis perk adds a white bar at the bottom of the screen that will save a ball once, and break in the process. \\n\\nYou'll lose one level of that perk every time a ball bounces at the bottom of the screen.\",\"upgrades.forgiving.name\":\"Forgiving\",\"upgrades.forgiving.tooltip\":\"Missing breaks reduces combo progressively instead of all at once.\",\"upgrades.forgiving.verbose_description\":\"The first miss per level is free, then 10% of the combo, then 20% .. \",\"upgrades.fountain_toss.name\":\"Fountain toss\",\"upgrades.fountain_toss.tooltip\":\"Gain some combo when you miss some coins. \",\"upgrades.fountain_toss.verbose_description\":\"When you miss a coin and your combo was under {{max}}, your combo has a probability of {{lvl}}/combo to grow by one.\",\"upgrades.ghost_coins.name\":\"Ghost coins\",\"upgrades.ghost_coins.tooltip\":\"Coins slowly pass through bricks\",\"upgrades.ghost_coins.verbose_description\":\"It's not a bug, it's a feature !  Coins fly through bricks slowly. Higher levels let them move faster. \",\"upgrades.helium.name\":\"Helium\",\"upgrades.helium.tooltip\":\"Gravity reversed left and right of paddle\",\"upgrades.helium.verbose_description\":\"This affects the coins  and will let the float up until you are ready to pick them up.\",\"upgrades.hot_start.name\":\"Hot start\",\"upgrades.hot_start.tooltip\":\"Start at combo {{start}}, -{{loss}} combo per second\",\"upgrades.hot_start.verbose_description\":\"At the start of every level, your combo will start at +30 points, but then every second it will be decreased by one. The effect stacks with other perks. \",\"upgrades.implosions.name\":\"Implosions\",\"upgrades.implosions.tooltip\":\"Explosions suck coins in instead of blowing them out\",\"upgrades.implosions.verbose_description\":\"The explosion force is applied the other way. Further levels act as \\\"bigger explosion\\\"\",\"upgrades.instant_upgrade.name\":\"Instant upgrade\",\"upgrades.instant_upgrade.tooltip\":\"+1 upgrade now, -1 choice until game end.\",\"upgrades.instant_upgrade.verbose_description\":\"Immediately pick two upgrades, so that you get one free one and one to repay the one used to get this perk. Every further menu to pick upgrades will have fewer options to choose from.\",\"upgrades.left_is_lava.name\":\"Avoid left side\",\"upgrades.left_is_lava.tooltip\":\"+{{lvl}} combo per brick broken. Combo resets if ball hits the left side of the screen\",\"upgrades.left_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one, so you'll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the left side . \\n\\nAs soon as your combo rises, the left side becomes red to remind you that you should avoid hitting them. \\n\",\"upgrades.limitless.name\":\"Limitless\",\"upgrades.limitless.tooltip\":\"Raise all upgrade's maximum level by {{lvl}} \",\"upgrades.limitless.verbose_description\":\"Choosing this perk also raises his own limit by one, letting you pick it again.\",\"upgrades.metamorphosis.name\":\"Metamorphosis\",\"upgrades.metamorphosis.tooltip\":\"Each coin can stain {{lvl}} brick(s) with its color\",\"upgrades.metamorphosis.verbose_description\":\"With this perk, coins will be of the color of the brick they come from, and will color the first brick they touch in the same color. \\n\\nCoins spawn with the speed of the ball that broke them, which means you can aim a bit in the direction of the bricks you want to \\\"paint\\\".\",\"upgrades.minefield.name\":\"Minefield\",\"upgrades.minefield.tooltip\":\"+{{lvl}} combo per bomb brick on screen\",\"upgrades.minefield.verbose_description\":\"Adds +lvl to the combo when a brick is place, -lvl when it is destroyed, and raises the base combo by the number of bricks times lvl\",\"upgrades.multiball.name\":\"Multi ball\",\"upgrades.multiball.tooltip\":\"Start every levels with {{count}} balls.\",\"upgrades.multiball.verbose_description\":\"As soon as you drop the ball in Breakout 71, you lose. \\n\\nWith this perk, you get two balls, and so you can afford to lose one. \\n\\nThe lost balls come back on the next level. \\n\\nHaving more than one balls makes some further perks available, and of course clears the level faster.\",\"upgrades.nbricks.name\":\"Strict sample size\",\"upgrades.nbricks.tooltip\":\"Hit exactly {{lvl}} bricks per paddle bounce for +{{lvl}} combo, otherwise it resets\",\"upgrades.nbricks.verbose_description\":\"You don't necessarily need to destroy those bricks, but you need to hit them. Bricks destroyed by explosions don't count\",\"upgrades.one_more_choice.name\":\"Extra choice\",\"upgrades.one_more_choice.tooltip\":\"Further level ups will offer {{lvl}} more option(s) in the list\",\"upgrades.one_more_choice.verbose_description\":\"Every upgrade menu will have one more option.  Doesn't increase the number of upgrades you can pick.\",\"upgrades.passive_income.name\":\"Passive income\",\"upgrades.passive_income.tooltip\":\"+{{lvl}} combo / brick, unless the paddle moved in the last {{time}}s, then it resets instead\",\"upgrades.passive_income.verbose_description\":\"Some perks can help the balls do what you want without needing to do anything.\",\"upgrades.picky_eater.name\":\"Picky eater\",\"upgrades.picky_eater.tooltip\":\"+{{lvl}} combo per brick broken, resets on ball color change\",\"upgrades.picky_eater.verbose_description\":\"Whenever you break a brick the same color as your ball, your combo increases by one. \\nIf it's a different color, the ball takes that new color, but the combo resets, unless there were no bricks left of the ball's color. \\nOnce you get a combo higher than your minimum, the bricks of the wrong color will get a red border. \\nIf you have more than one ball, they all switch color whenever one of them hits a brick.\",\"upgrades.pierce.name\":\"Piercing\",\"upgrades.pierce.tooltip\":\"Ball pierces {{count}} bricks after a paddle bounce\",\" ball hits the left side of the screen\",\"upgrades.right_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one, so you'll get one more coin from all the next bricks you break.\\n\\nHowever, your combo will reset as soon as your ball hits the right side. \\n\\nAs soon as your combo rises, the right side becomes red to remind you that you should avoid hitting them.\\n\",\"upgrades.sacrifice.help_l1\":\"Loosing a life clears all bricks\",\"upgrades.sacrifice.help_over\":\"Loosing a life {{lvl}}x the combo then clears all bricks\",\"upgrades.sacrifice.name\":\"Sacrifice\",\"upgrades.sacrifice.verbose_description\":\"This might get the combo pretty high.\",\"upgrades.sapper.help_plural\":\"The first {{lvl}} bricks broken become bombs.\",\"upgrades.sapper.name\":\"Sapper\",\"upgrades.sapper.tooltip\":\"The first brick broken becomes a bomb.\",\"upgrades.sapper.verbose_description\":\"Instead of just disappearing, the first brick you break will be replaced by a bomb brick. Bouncing the ball on the paddle re-arms the effect. Leveling-up this perk will allow you to place more bombs.\",\"upgrades.shocks.name\":\"Shocks\",\"upgrades.shocks.tooltip\":\"Explosive balls collisions\",\"upgrades.shocks.verbose_description\":\"Whenever two balls collide, they exchange their speed, spawn an explosion, and gain added speed to separate them. \",\"upgrades.shunt.name\":\"Shunt\",\"upgrades.shunt.tooltip\":\"Keep {{percent}}% of your combo between levels\",\"upgrades.shunt.verbose_description\":\"If you also have hot start, the hot start is just added to the current combo\",\"upgrades.side_flip.name\":\"Right handed\",\"upgrades.side_flip.tooltip\":\"+{{lvl}} combo per brick broken from the right, -{{loss}} otherwise\",\"upgrades.side_flip.verbose_description\":\"Impact the brick on its right side to gain one combo, but avoid hitting it on the left side as the would remove 2 combo. Hitting from the top and bottom has no effect. \",\"upgrades.side_kick.name\":\"Left handed\",\"upgrades.side_kick.tooltip\":\"+{{lvl}} combo per brick broken from the left, -{{loss}} otherwise\",\"upgrades.side_kick.verbose_description\":\"Impact the brick on its left side to gain one combo, but avoid hitting it on the right side as the would remove 2 combo. Hitting from the top and bottom has no effect. \",\"upgrades.skip_last.help_plural\":\"The last {{lvl}}  bricks will explode.\",\"upgrades.skip_last.name\":\"Easy Cleanup\",\"upgrades.skip_last.tooltip\":\"The last brick will explode.\",\"upgrades.skip_last.verbose_description\":\"You need to break all bricks to go to the next level. However, it can be hard to get the last ones. \\n\\nClearing a level early brings extra choices when upgrading. Never missing the bricks is also very beneficial. \\n\\nSo if you find it difficult to break the last bricks, getting this perk a few time can help.\",\"upgrades.slow_down.name\":\"Slower ball\",\"upgrades.slow_down.tooltip\":\"Ball moves more slowly\",\"upgrades.slow_down.verbose_description\":\"The ball starts relatively slow, but every level of your game it will start a bit faster. \\n\\nIt will also accelerate if you spend a lot of time in one level. \\n\\nThis perk makes it more manageable. \\n\\nYou can get it at the start every time by enabling kid mode in the menu.\",\"upgrades.smaller_puck.help_plural\":\"Even smaller paddle and higher base combo\",\"upgrades.smaller_puck.name\":\"Smaller paddle\",\"upgrades.smaller_puck.tooltip\":\"Also gives +5 base combo\",\"upgrades.smaller_puck.verbose_description\":\"This makes the paddle smaller, which in theory makes some corner shots easier, but really just raises the difficulty.\\n\\nThat's why you also get a nice bonus of +5 coins per brick for all bricks you'll break after picking this. \",\"upgrades.soft_reset.name\":\"Soft reset\",\"upgrades.soft_reset.tooltip\":\"Combo resets keeps {{percent}}%\",\"upgrades.soft_reset.verbose_description\":\"Limit the impact of a combo reset.\",\"upgrades.streak_shots.name\":\"Hit streak\",\"upgrades.streak_shots.tooltip\":\"More coins if you break many bricks before bouncing on the paddle.\",\"upgrades.streak_shots.verbose_description\":\"Every time you break a brick, your combo increases by one. \\n\\nHowever, as soon as the ball touches your paddle, the combo is reset to its default value.\\n\\nOnce your combo rises above the base value, your paddle will have a red border to remind you that it will destroy your combo to touch it with the ball.\",\"upgrades.sturdy_bricks.name\":\"Sturdy bricks\",\"upgrades.sturdy_bricks.tooltip\":\"+{{lvl}} bricks HP, +{{percent}}% coins spawned when broken\",\"upgrades.sturdy_bricks.verbose_description\":\"Each level of this perk adds one HP to all bricks. You can see the HP number with the \\\"clairvoyant\\\" perk. You can increase ball damage by getting the \\\"piercing\\\" perk. Each level of the perk adds +50% coins spawn. \",\"upgrades.superhot.name\":\"SUPER HOT\",\"upgrades.superhot.tooltip\":\"Time moves when the paddle moves.\",\"upgrades.superhot.verbose_description\":\"SUPER HOT SUPER HOT SUPER HOT SUPER HOT\",\"upgrades.telekinesis.help_plural\":\"Stronger effect on the ball\",\"upgrades.telekinesis.name\":\"Telekinesis\",\"upgrades.telekinesis.tooltip\":\"Paddle controls the ball's trajectory\",\"upgrades.telekinesis.verbose_description\":\"You control the ball while it's going up. \",\"upgrades.top_is_lava.name\":\"Sky is the limit\",\"upgrades.top_is_lava.tooltip\":\"+{{lvl}} combo per brick, reset when the top is hit\",\"upgrades.top_is_lava.verbose_description\":\"Whenever you break a brick, your combo will increase by one. However, your combo will reset as soon as your ball hit the top of the screen. \\n\\nWhen your combo is above the minimum,  a red bar will appear at the top to remind you that you should avoid hitting it. \",\"upgrades.trampoline.name\":\"Trampoline\",\"upgrades.trampoline.tooltip\":\"+{{lvl}} combo per paddle bounce,-{{lvl}} combo per bounce on any border\",\"upgrades.trampoline.verbose_description\":\"One of the rare  combo upgrades that don't add a reset condition\",\"upgrades.transparency.name\":\"Transparency\",\"upgrades.transparency.tooltip\":\"The higher the ball is on the screen, the more transparent it becomes. The more transparent it is, the more coins it produces.\",\"upgrades.transparency.verbose_description\":\"Higher levels make the ball transparent sooner and increase the point bonus.\",\"upgrades.trickledown.name\":\"Trickle down economics\",\"upgrades.trickledown.tooltip\":\"The coins appear at the top of the screen.\",\"upgrades.trickledown.verbose_description\":\"It might help you put some coins aside.\",\"upgrades.unbounded.help_no_ceiling\":\"+{{lvl}} combo per brick, no more sides  or ceiling\",\"upgrades.unbounded.name\":\"Unbounded\",\"upgrades.unbounded.tooltip\":\"+{{lvl}} combo per brick, no more sides to keep the ball in game, danger\",\"upgrades.unbounded.verbose_description\":\"I hope you've found a way to keep your ball on screen. Penalties for hitting the sides no longer apply. At level 2+, the ceiling will also disappear. This is an advanced perk. \",\"upgrades.viscosity.name\":\"Viscosity\",\"upgrades.viscosity.tooltip\":\"Slower coin fall\",\"upgrades.viscosity.verbose_description\":\"Coins normally accelerate with gravity and explosions to pretty high speeds. \\n\\nThis perk constantly makes them slow down, as if they were in some sort of viscous liquid. \\n\\nThis makes catching them easier, and combines nicely with perks that influence the coin's movement.\",\"upgrades.wind.help_plural\":\"Stronger wind force\",\"upgrades.wind.name\":\"Wind\",\"upgrades.wind.tooltip\":\"Paddle position creates wind\",\"upgrades.wind.verbose_description\":\"Wind depends on paddle position: left blows left, right blows right. Affects both balls and coins.\",\"upgrades.yoyo.name\":\"Yo-yo\",\"upgrades.yoyo.tooltip\":\"Ball falls toward paddle\",\"upgrades.yoyo.verbose_description\":\"It's the opposite of telekinesis, control the ball while it's falling back down.\",\"upgrades.zen.name\":\"Zen\",\"upgrades.zen.tooltip\":\"+{{lvl}} combo per bricks, reset when there's an explosion\",\"upgrades.zen.verbose_description\":\"After all, this is a non-violent game. \"}");
