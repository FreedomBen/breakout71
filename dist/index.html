ras iniciales en la configuraci\xf3n.\\n\\nMuchas mejoras afectan a tu combo.\\n\\n## Combo\\n\\nTu \\"combo\\" es la cantidad de monedas que se generan al romper un ladrillo. Se muestra en tu paleta; por ejemplo, x4 significa que cada ladrillo generar\xe1 4 monedas.\\nLa mayor\xeda de las mejoras que aumentan el combo tambi\xe9n a\xf1aden una condici\xf3n para reiniciarlo.\\nEl combo tambi\xe9n se reiniciar\xe1 si la pelota regresa a la paleta sin tocar ning\xfan ladrillo.\\nSe mostrar\xe1 un mensaje de \\"fallo\\" cuando esto ocurra.\\n\\nIntenta apuntar a un ladrillo siempre.\\n\\n## Apuntar\\n\\nSolo la posici\xf3n de la pelota en la paleta determina c\xf3mo rebotar\xe1.\\nSi la pelota impacta en el centro de la paleta, rebotar\xe1 verticalmente.\\n\\nSi golpeas m\xe1s hacia un lado, tendr\xe1 mayor \xe1ngulo.\\n\\nLa velocidad de la paleta y el \xe1ngulo de entrada no afectan la direcci\xf3n de la pelota despu\xe9s de rebotar.\\n\\nSe pueden desbloquear muchas mejoras que ayudan a apuntar.\\n\\n## Desbloqueos\\n\\nAl jugar Breakout 71 por primera vez, la mayor\xeda de las mejoras y niveles est\xe1n bloqueados.\\nLas mejoras se desbloquean simplemente jugando y atrapando muchas monedas.\\n\\nLos primeros niveles se desbloquean al alcanzar una puntuaci\xf3n alta. Los niveles posteriores a\xf1aden una condici\xf3n sobre las ventajas que puedes seleccionar.\\n\\nAlcanzar puntuaciones altas es mucho m\xe1s f\xe1cil si consigues varias mejoras despu\xe9s de cada nivel.\\n\\n## Repeticiones y mejoras gratuitas\\n\\nRecibir\xe1s una mejora adicional si juegas bien:\\n\\n- Completa el nivel en menos de {{levelTimeGood}} segundos\\n- Golpea los lados o la parte superior menos de {{wallBouncedGood}} veces\\n- Atrapa el {{catchRateGood}}% de monedas\\n- Falla los ladrillos menos de {{missesGood}} veces\\n\\nTambi\xe9n recibir\xe1s una repetici\xf3n que te permite saltarte mejoras si lo haces a\xfan mejor:\\n\\n- Completa un nivel en menos de {{levelTimeBest}} segundos\\n- Golpea los lados o la parte superior menos de {{wallBouncedBest}} veces\\n- Atrapa el {{catchRateBest}}% de monedas\\n- Falla los ladrillos menos de {{missesBest}} veces\\n\\nUna opci\xf3n en la configuraci\xf3n te permite ver estas estad\xedsticas","help.help":"Descubre m\xe1s sobre el juego","help.levels":"Niveles","help.title":"Ayuda","help.upgrades":"## Actualizaciones","history.columns.score":"Puntuaci\xf3n","history.columns.started":"Fecha","history.help":"Enumera tus {{count}} mejores juegos.","history.include_past_versions":"Mostrar versiones anteriores tambi\xe9n","history.locked":"Juega primero al menos diez partidos","history.title":"Historia","lab.help":"Prueba cualquier combinaci\xf3n de mejoras y niveles.","lab.instructions":"Selecciona mejoras y un nivel, luego haz clic en el bot\xf3n de reproducci\xf3n de arriba.","lab.menu_entry":"Modo creativo","lab.play":"Jugar","lab.reset":"Reiniciar","lab.select_level":"Selecciona un nivel para jugar","lab.unlocks_at":"Desbloqueado a partir de una puntuaci\xf3n total de {{score}}.","level_up.challenges.catchRateGood.description":"","level_up.challenges.catchRateGood.name":"","level_up.challenges.earned_medal":"","level_up.challenges.earned_medal_plural":"","level_up.challenges.gain":"","level_up.challenges.levelMisses.description":"","level_up.challenges.levelMisses.name":"","level_up.challenges.levelMisses.none":"","level_up.challenges.levelTime.description":"","level_up.challenges.levelTime.name":"","level_up.challenges.no_gain":"","level_up.forbidden":"","level_up.required":"","level_up.title":"Acabas de completar el nivel {{level}}/{{max}}.","level_up.upgrade_perks":"","main_menu.basic":"Gr\xe1ficos simplificados","main_menu.basic_help":"Mejor rendimiento.","main_menu.colorful_coins":"Piezas de color","main_menu.colorful_coins_help":"Las piezas aparecen siempre en el color del ladrillo","main_menu.comboIncreaseTexts":"Mostrar una +X dorada","main_menu.comboIncreaseTexts_help":"Cuando el combo aumenta","main_ 3n para restablecerlo.\\nEl combo tambi\xe9n se reinicia si la pelota vuelve a la raqueta sin golpear un ladrillo.\\nEntonces se muestra un mensaje de \\"Fallado\\".\\n\\nIntenta golpear un ladrillo en cada rebote.\\n\\n## Apuntar\\n\\nS\xf3lo la posici\xf3n de la pelota en la raqueta determina su \xe1ngulo de rebote.\\nSi la pelota golpea la raqueta en el centro, rebotar\xe1 verticalmente.\\nSi golpea hacia un lado de la raqueta, el \xe1ngulo ser\xe1 mayor.\\nLa velocidad de la raqueta y el \xe1ngulo de incidencia de la pelota no tienen ning\xfan efecto.\\n\\nSe pueden desbloquear varias mejoras de punter\xeda.\\n\\n## Desbloqueo\\n\\nCuando juegas a Breakout 71 por primera vez, la mayor\xeda de las mejoras y niveles est\xe1n bloqueados.\\nLas mejoras se desbloquean simplemente jugando y cogiendo muchas monedas.\\nLos primeros niveles se desbloquean consiguiendo una puntuaci\xf3n alta.\\nLos niveles posteriores a\xf1aden una condici\xf3n a las ventajas seleccionadas.\\n\\nConseguir puntuaciones altas es mucho m\xe1s f\xe1cil cuando obtienes varias mejoras despu\xe9s de cada nivel.\\n\\n## Reintentos y mejoras gratis\\n\\nConseguir\xe1s una mejora extra si juegas bien:\\n\\n- Completa el nivel en menos de {{levelTimeGood}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedGood}} veces\\n- Atrapa el {{catchRateGood}}% de las monedas\\n- Pierde los ladrillos menos de {{missesGood}} veces\\n\\nTambi\xe9n obtendr\xe1s un potenciador que te permitir\xe1 ignorar las mejoras si lo haces a\xfan mejor:\\n\\n- Completa un nivel en menos de {{levelTimeBest}} segundos\\n- Toca los bordes o la parte superior menos de {{wallBouncedBest}} veces\\n- Atrapa {{catchRateBest}} de monedas\\n- Pierde ladrillos menos de {{missesBest}} veces\\n\\nUna opci\xf3n en los ajustes te permite mostrar estas estad\xedsticas","main_menu.help_help":"Descubra el juego en detalle","main_menu.help_title":"Ayuda","main_menu.help_upgrades":"## Mejoras","main_menu.high_score":"Puntuac lecci\xf3n ser\xe1 aleatoria.","starting_perks.title":"Beneficios iniciales","starting_perks.unchecked":"Los beneficios a continuaci\xf3n no se ofrecen como beneficios iniciales, pero puedes hacer clic para agregarlos al grupo.","unlocks.category.advanced":"## Mejoras avanzadas\\n\\nNo suelen ser muy \xfatiles por s\xed solas, pero pueden volverse muy poderosas al combinarlas con la mejora combinada adecuada.","unlocks.category.beginner":"Mejoras para principiantes\\n\\nEstas mejoras son muy \xfatiles para principiantes, ya que les ayudan a jugar m\xe1s tiempo y a fallar menos la pelota.","unlocks.category.combo":"## Mejoras de combo\\n\\nEstas mejoras ayudan a aumentar tu combo progresivamente, pero tambi\xe9n a\xf1aden una condici\xf3n de reinicio. Usar una es buena idea, pero usar m\xe1s aumenta el riesgo y la recompensa.","unlocks.category.combo_boost":"Mejoras de combo\\n\\nEstas mejoras aumentan el combo o el multiplicador de combo sin necesidad de reiniciarlo.","unlocks.category.simple":"## Mejoras auxiliares\\n\\nEstas mejoras son \xfatiles en casi cualquier configuraci\xf3n.","unlocks.greyed_out_help":"Los objetos en gris pueden desbloquearse aumentando tu puntuaci\xf3n total. La puntuaci\xf3n total aumenta cada vez que consigues puntos en el juego.","unlocks.intro":"Tu puntuaci\xf3n total es {{ts}}. Haz clic en una mejora a continuaci\xf3n para empezar a jugar con ella.","unlocks.just_unlocked":"Nivel desbloqueado","unlocks.just_unlocked_plural":"Acabas de desbloquear {{count}} niveles","unlocks.level":"Desbloqueaste {{unlocked}} niveles de {{out_of}}","unlocks.level_description":"Un nivel {{size}}x{{size}} con {{bricks}} ladrillos, {{colors}} colores y {{bombs}} bombas.","unlocks.levels":"Niveles desbloqueados","unlocks.minScore":"Alcanza una puntuaci\xf3n de ${{minScore}} en una partida para desbloquearla.","unlocks.minScoreWithPerks":"Alcanzar ${{minScore}} en un juego con {{required}} pero sin {{forbidden}}.","unlocks.minTotalScore":"Acumula un total de ${{score}}","unlocks.reached":"Tu mejor puntuaci\xf3n hasta ahora es {{reached}}.","unlocks.title_upgrades":"Has desbloqueado {{unlocked}} mejoras en {{out_of}}.","unlocks.try":"","unlocks.upgrades":"Mejoras desbloqueadas","unlocks.use":"","upgrades.addiction.name":"Adicci\xf3n","upgrades.addiction.tooltip":"+{{lvl}} combo / ladrillo, combo perdido despu\xe9s de {{delay}}s sin romper ning\xfan ladrillo","upgrades.addiction.verbose_description":"La cuenta atr\xe1s s\xf3lo comienza una vez que se ha destruido el primer ladrillo del nivel, y se detiene en cuanto no hay m\xe1s ladrillos.","upgrades.asceticism.name":"Ascetismo","upgrades.asceticism.tooltip":"+{{combo}} combo por ladrillo roto, - {{combo}} cuando una pieza es atrapada","upgrades.asceticism.verbose_description":"Tendremos que encontrar una forma de almacenar las piezas mientras crece el combo.","upgrades.ball_attract_ball.name":"Gravedad","upgrades.ball_attract_ball.tooltip":"Las pelotas atraen a las pelotas","upgrades.ball_attract_ball.verbose_description":"Las bolas que est\xe1n separadas m\xe1s de 3/4 de la anchura de la pantalla empiezan a atraerse. La fuerza de atracci\xf3n es mayor cuanto m\xe1s separadas est\xe1n las bolas. Las part\xedculas del arco iris volar\xe1n para simbolizar la fuerza de atracci\xf3n. Esta ventaja s\xf3lo est\xe1 disponible si ya tienes m\xe1s de una bola en juego.","upgrades.ball_attracts_coins.name":"Balas de la suerte","upgrades.ball_attracts_coins.tooltip":"Las monedas van con la bola m\xe1s cercana","upgrades.ball_attracts_coins.verbose_description":"Puedes utilizarlo para que las piezas orbiten la pelota y colorear los ladrillos cercanos, o como una especie de rinc\xf3n imantado.","upgrades.ball_repulse_ball.name":"Vuelo en formaci\xf3n","upgrades.ball_repulse_ball.tooltip":"Las balas repelen a las balas","upgrades.ball_repulse_ball.verbose_description":"Las bolas que est\xe1n a menos de un cuarto de la anchura de la pantalla empiezan a repelerse. La fuerza de repulsi\xf3n es mayor cuanto m\xe1s cerca est\xe1n una de otra. Se mostrar\xe1n part\xedculas para simbolizar la aplicaci\xf3n de esta fuerza. Esta ventaja s\xf3lo est\xe1 disponible si ya tienes m\xe1s de una bola.","upgrades.base_combo.name":"Mejor base","upgrades.base_combo.tooltip":"3 monedas m\xe1s por cada ladrillo roto","upgrades.base_combo.verbose_description":"Tu combo normalmente empieza en 1 al principio del nivel y vuelve a 1 cuando rebotas sin golpear nada. Con esta funci\xf3n, el combo empieza 3 puntos m\xe1s arriba, por lo que siempre conseguir\xe1s al menos 4 monedas por ladrillo. Cuando tu combo se reinicia, vuelve a ser 4 en lugar de 1. Tu bola parpadear\xe1 un poco para indicar que su combo es superior a 1.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Explosiones m\xe1s violentas","upgrades.bigger_explosions.verbose_description":"La explosi\xf3n por defecto arrasa un cuadrado de ladrillos de 3x3; con esta mejora, uno de 5x5. El viento que sopla las piezas tambi\xe9n es mucho m\xe1s fuerte. La pantalla parpadear\xe1 un poco despu\xe9s de cada explosi\xf3n (excepto en el modo de gr\xe1ficos b\xe1sicos).","upgrades.bigger_puck.name":"Raqueta m\xe1s grande","upgrades.bigger_puck.tooltip":"Atrapa m\xe1s monedas f\xe1cilmente.","upgrades.bigger_puck.verbose_description":"Una raqueta grande significa que nunca se te escapa la pelota y que puedes coger m\xe1s piezas, adem\xe1s de apuntar los rebotes con precisi\xf3n. Sin embargo, una raqueta grande es m\xe1s dif\xedcil de usar en los laterales del nivel.","upgrades.bricks_attract_ball.name":"Los ladrillos atraen bolas","upgrades.bricks_attract_ball.tooltip":"La pelota va hacia los primeros {{count}} ladrillos que golpea.","upgrades.bricks_attract_ball.verbose_description":"El efecto es m\xe1s intenso en niveles m\xe1s altos. La cantidad de ladrillos que pueden impactar antes de que el efecto se detenga tambi\xe9n es mayor. El efecto se reactiva cuando el bal\xf3n impacta el disco.","upgrades.bricks_attract_coins.name":"Los ladrillos atraen monedas","upgrades.bricks_attract_coins.tooltip":"Les ayuda a permanecer all\xed arriba.","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Boya","upgrades.buoy.tooltip":"Las monedas flotan durante {{duration}} segundos en la l\xednea inferior.","upgrades.buoy.verbose_description":"El efecto es m\xe1s visible en el modo m\xf3vil.","upgrades.clairvoyant.name":"Perspicaz","upgrades.clairvoyant.tooltip":"Revela los niveles, el PV de los ladrillos y la direcci\xf3n de las balas","upgrades.clairvoyant.verbose_description":"Te ayuda a elegir las mejoras adecuadas y a entender qu\xe9 ocurre con los \\"ladrillos macizos\\". Los niveles 2 y 3 (en modo bucle) proporcionan informaci\xf3n adicional de dudosa utilidad.","upgrades.coin_magnet.name":"Im\xe1n para monedas","upgrades.coin_magnet.tooltip":"La raqueta atrae monedas","upgrades.coin_magnet.verbose_description":"Dirige las piezas hacia la raqueta. El efecto es mayor en las piezas que ya est\xe1n cerca de la raqueta.","upgrades.compound_interest.name":"Inter\xe9s compuesto","upgrades.compound_interest.tooltip":"+{{lvl}} combo por ladrillo roto, se pone a cero cuando se pierde una pieza","upgrades.compound_interest.verbose_description":"Tu combo aumentar\xe1 en uno cada vez que rompas un ladrillo. Si pierdes alguna pieza, tu combo volver\xe1 a cero.\\n\\nSi tu combo es superior al m\xednimo, aparecer\xe1 una l\xednea roja en la parte inferior de la zona de juego para recordarte que las monedas no deben ir all\xed.","upgrades.concave_puck.name":"Raqueta c\xf3ncava","upgrades.concave_puck.tooltip":"Ayuda a evitar los bordes.","upgrades.concave_puck.verbose_description":"Las pelotas comienzan verticalmente al principio del nivel y rebotan en la raqueta m\xe1s verticalmente y al rev\xe9s.","upgrades.corner_shot.name":"Tiro de esquina","upgrades.corner_shot.tooltip":"Deja que tu raqueta salga del \xe1rea enmarcada","upgrades.corner_shot.verbose_description":"Te ayuda a apuntar a las esquinas","upgrades.double_or_nothing.name":"Doble o nada","upgrades.double_or_nothing.tooltip":"El combo sube {{multiplier}} veces m\xe1s r\xe1pido, pero perder\xe1s el {{percent}}% de tu puntuaci\xf3n en cada reinicio.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"Moneda espacial","upgrades.etherealcoins.tooltip":"Las piezas ya no se ven afectadas por la gravedad","upgrades.etherealcoins.verbose_description":"Las monedas mantendr\xe1n su velocidad incluso despu\xe9s de varios rebotes y ya no se ver\xe1n afectadas por la gravedad.","upgrades.extra_levels.name":"5 minutos m\xe1s","upgrades.extra_levels.tooltip":"Juega {{count}} niveles en lugar de 7","upgrades.extra_levels.verbose_description":"El juego suele durar 7 niveles, tras los cuales se acaba la partida y la puntuaci\xf3n que hayas alcanzado es tu puntuaci\xf3n del juego.\\n\\nElegir esta mejora te permite prolongar el juego un nivel. Los \xfaltimos niveles suelen ser en los que m\xe1s puntos consigues, as\xed que la diferencia puede ser espectacular.","upgrades.extra_life.name":"","upgrades.extra_life.tooltip":"","upgrades.extra_life.verbose_description":"","upgrades.forgiving.name":"Errar es humano","upgrades.forgiving.tooltip":"Perder los ladrillos significa perder una porci\xf3n progresivamente mayor del combo","upgrades.forgiving.verbose_description":" El primer ladrillo perdido por nivel no cuesta nada, el siguiente 10%, 20% y as\xed sucesivamente.","upgrades.fountain_toss.name":"Moneda en la fuente","upgrades.fountain_toss.tooltip":"A veces ganas un peque\xf1o combo cuando pierdes monedas.","upgrades.fountain_toss.verbose_description":"Cuando pierdes una moneda y tu combo est\xe1 por debajo del nivel*30, tu combo tiene una probabilidad de nivel/combo de crecer en uno.","upgrades.ghost_coins.name":"Habitaciones fantasma","upgrades.ghost_coins.tooltip":"Las monedas atraviesan los ladrillos lentamente","upgrades.ghost_coins.verbose_description":"No es un error, \xa1es una caracter\xedstica! Las piezas atraviesan los ladrillos lentamente. Los niveles m\xe1s altos permiten que las monedas pasen m\xe1s r\xe1pido a trav\xe9s de los ladrillos.","upgrades.golden_goose.name":"Ganso dorado","upgrades.golden_goose.tooltip":"Las monedas se teletransportan a la pelota despu\xe9s de golpear un ladrillo.","upgrades.golden_goose.verbose_description":"Cuando una moneda impacta un ladrillo, se teletransporta a la bola m\xe1s cercana. En el nivel dos, las monedas tambi\xe9n se teletransportan al impactar un lado.","upgrades.happy_family.name":"Familia feliz","upgrades.happy_family.tooltip":"M\xe1s monedas si mantienes todas las bolas en juego.","upgrades.happy_family.verbose_description":"+1 combo por bola extra por rebote de la paleta. El combo se reinicia al perder una bola. Solo la bola superior a 1 otorga combo.","upgrades.helium.name":"Helio","upgrades.helium.tooltip":"Las piezas flotan en lugar de caer alrededor de la raqueta.","upgrades.helium.verbose_description":"En el nivel 1, la gravedad se reduce. En el nivel 2, las monedas flotan lentamente. En el nivel 3, vuelan de verdad.","upgrades.hot_start.name":"Arranque en caliente","upgrades.hot_start.tooltip":"Combo a {{start}}, -{{loss}} combo por segundo","upgrades.hot_start.verbose_description":"Al principio de cada nivel, tu combo comenzar\xe1 con +30 puntos, pero cada segundo se reducir\xe1 en un punto.  ","upgrades.implosions.name":"Implosiones","upgrades.implosions.tooltip":"Las explosiones absorben las piezas en lugar de hacerlas estallar.","upgrades.implosions.verbose_description":"La fuerza de la explosi\xf3n se aplica en sentido contrario. El nivel 2+ aumenta la potencia de la implosi\xf3n.","upgrades.left_is_lava.name":"Evitar el lado izquierdo","upgrades.left_is_lava.tooltip":"+{{lvl}} combo por ladrillo, se pierde al tocar el borde izquierdo","upgrades.left_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, d\xe1ndote una moneda extra cada vez que rompes un ladrillo.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola golpea el lado izquierdo.\\n\\nEn cuanto tu combo aumenta, el lado izquierdo se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.limitless.name":"Sin l\xedmites","upgrades.limitless.tooltip":"Aumenta el nivel m\xe1ximo de todas las mejoras de {{lvl}} .","upgrades.limitless.verbose_description":"Elegir esta ventaja tambi\xe9n aumenta su propio l\xedmite en un punto, permiti\xe9ndote elegirla de nuevo.","upgrades.metamorphosis.name":"Metamorfosis","upgrades.metamorphosis.tooltip":"Cada pieza puede manchar {{lvl}} ladrillo(s) con su color","upgrades.metamorphosis.verbose_description":"Con esta mejora, las monedas tendr\xe1n el color del ladrillo del que proceden y colorear\xe1n el primer ladrillo que toquen.\\n\\nLas piezas aparecen a la velocidad de la bola que las rompi\xf3, lo que significa que puedes apuntar un poco en la direcci\xf3n de los ladrillos que quieres \\"pintar\\".","upgrades.minefield.name":"Campo de minas","upgrades.minefield.tooltip":"+{{percent}}% de monedas por cada ladrillo bomba en la pantalla","upgrades.minefield.verbose_description":"Las bombas tambi\xe9n se cuentan mientras explotan.","upgrades.multiball.name":"Bola m\xfaltiple","upgrades.multiball.tooltip":"Cada nivel comienza con {{count}} bolas.","upgrades.multiball.verbose_description":"En cuanto sueltas la bola en Breakout 71, pierdes.\\n\\nCon esta ventaja, tienes dos bolas, as\xed que puedes permitirte perder una.\\n\\nLas bolas perdidas vuelven al siguiente nivel.\\n\\nTener m\xe1s de una bala te permite obtener otras ventajas y, por supuesto, completar el nivel m\xe1s r\xe1pidamente.","upgrades.nbricks.name":"Domiciliaci\xf3n bancaria","upgrades.nbricks.tooltip":"Golpea exactamente {{lvl}} ladrillos por rebote para +{{lvl}} combo, de lo contrario combo perdido","upgrades.nbricks.verbose_description":"Si tu bola rebota sin romper ning\xfan ladrillo, cuenta como golpe.  Los ladrillos destruidos por explosiones no cuentan.","upgrades.one_more_choice.name":"La respuesta D","upgrades.one_more_choice.tooltip":"1 opci\xf3n de mejora adicional disponible hasta el final del juego","upgrades.one_more_choice.verbose_description":"Cada men\xfa de mejoras tendr\xe1 una opci\xf3n adicional.  Esto no aumenta el n\xfamero de mejoras que puede elegir, pero le ayuda a crear el perfil ideal. \\"Respuesta D\\" es una referencia a un sketch cl\xe1sico.","upgrades.ottawa_treaty.name":"Tratado de Ottawa","upgrades.ottawa_treaty.tooltip":"Romper un ladrillo cerca de una bomba la desarma.","upgrades.ottawa_treaty.verbose_description":"La bomba cercana ser\xe1 reemplazada por un bloque de color. Si tienes zapador, la pelota perder\xe1 su efecto hasta el pr\xf3ximo rebote. Solo se puede reemplazar una bomba a la vez.","upgrades.passive_income.name":"Ingresos pasivos","upgrades.passive_income.tooltip":"+{{lvl}} combo/bloque, la paleta es inmaterial {{time}}s despu\xe9s de mover","upgrades.passive_income.verbose_description":"Algunas mejoras hacen que las pelotas se muevan sin necesidad de poner la raqueta en movimiento.","upgrades.picky_eater.name":"Comer por colores","upgrades.picky_eater.tooltip":"+{{lvl}} combo por ladrillo roto del color de la bola, combo perdido en caso contrario","upgrades.picky_eater.verbose_description":"Cada vez que rompes un ladrillo del mismo color que tu bola, tu combinaci\xf3n aumenta en uno.\\nSi es de otro color, la bola adopta este nuevo color, pero la combinaci\xf3n se reinicia, a menos que no queden ladrillos del mismo color que la bola. Los ladrillos de color incorrecto se marcan con un c\xedrculo rojo. Si tienes m\xe1s de una bola, todas cambian de color al mismo tiempo cuando una de ellas toca un ladrillo.","upgrades.pierce.name":"Bola perforadora","upgrades.pierce.tooltip":"La pelota golpea {{count}} ladrillos despu\xe9s de cada rebote en la raqueta.","upgrades.pierce.verbose_description":"Normalmente, la pelota rebota en cuanto golpea un ladrillo. Con esta mejora, continuar\xe1 su trayectoria hasta que haya roto 3 ladrillos.\\n\\nDespu\xe9s, rebotar\xe1 en el cuarto ladrillo y tendr\xe1 que tocar la raqueta para poner a cero el contador.","upgrades.pierce_color.name":"Taladro de color","upgrades.pierce_color.tooltip":"+{{lvl}} de da\xf1o a los ladrillos del mismo color que la bola","upgrades.pierce_color.verbose_description":"Cada vez que una bola golpea un ladrillo del mismo color, lo atraviesa sin obst\xe1culos.\\n\\nCuando choca contra un ladrillo de otro color, lo rompe, adopta su color y rebota.\\n\\nSi tienes ladrillos macizos, las cosas funcionan de otra manera.","upgrades.puck_repulse_ball.name":"Aterrizaje suave","upgrades.puck_repulse_ball.tooltip":"La raqueta repele las pelotas","upgrades.puck_repulse_ball.verbose_description":"Cuando una pelota se acerca a la raqueta, empieza a frenarse e incluso a botar sin tocar el disco.","upgrades.rainbow.name":"Arco\xedris","upgrades.rainbow.tooltip":"Las monedas aparecen con colores del arco iris.","upgrades.rainbow.verbose_description":"Cada nivel aumenta la cantidad de monedas de colores. El color depende del tiempo transcurrido.","upgrades.reach.name":"Ataque a\xe9reo","upgrades.reach.tooltip":"Romper uno de los N ladrillos de la l\xednea inferior destruye el combo. De lo contrario, +N combo.","upgrades.reach.verbose_description":"Si s\xf3lo hay una fila de ladrillos, o si la fila m\xe1s baja cubre todo el ancho del juego, esta ventaja no tiene efecto. De lo contrario, si se rompe esta fila inferior, se reinicia el combo; si se rompe cualquier otra fila, el combo aumenta en el n\xfamero de ladrillos de esa fila.\\n\\nLa fila inferior de ladrillos se marcar\xe1 con un c\xedrculo rojo para recordarte que no debes tocarla.","upgrades.respawn.name":"Reaparici\xf3n","upgrades.respawn.tooltip":"{{percent}}% de los ladrillos reaparecen despu\xe9s de {{delay}}s.","upgrades.respawn.verbose_description":"Los efectos de part\xedculas te mostrar\xe1n d\xf3nde aparecer\xe1n los ladrillos.","upgrades.right_is_lava.name":"Evitar el lado derecho","upgrades.right_is_lava.tooltip":"+{{lvl}} combo por ladrillo, perdido en el impacto con el lado derecho","upgrades.right_is_lava.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta en uno, d\xe1ndote una moneda extra cada vez que rompas los ladrillos siguientes.\\n\\nSin embargo, tu combo se reinicia en cuanto tu bola toca el lado derecho del \xe1rea de juego.\\n\\nEn cuanto tu combo aumenta, el lado derecho se vuelve rojo para recordarte que debes evitar golpearlo.","upgrades.sacrifice.name":"Sacrificio","upgrades.sacrifice.tooltip":"Perder una vida multiplica el combo por {{lvl}} y luego destruye todos los ladrillos de la pantalla","upgrades.sacrifice.verbose_description":"El combo podr\xeda llegar muy alto.","upgrades.sapper.name":"Zapador","upgrades.sapper.tooltip":"El primer ladrillo roto se convierte en una bomba.","upgrades.sapper.verbose_description":"En lugar de desaparecer, el primer ladrillo roto es sustituido por una bomba. Al rebotar la pelota en la raqueta, se restablece el efecto.  A medida que subas de nivel, podr\xe1s colocar m\xe1s bombas.","upgrades.shocks.name":"Choque","upgrades.shocks.tooltip":"Choque explosivo entre balas","upgrades.shocks.verbose_description":"Cuando dos balas chocan, intercambian velocidades, crean una explosi\xf3n y ganan un poco de la velocidad que las separaba.","upgrades.shunt.name":"Derivaci\xf3n","upgrades.shunt.tooltip":"Aparca {{percent}}% de combo al cambiar de nivel","upgrades.shunt.verbose_description":"El arranque en caliente simplemente se a\xf1adir\xe1 a la combinaci\xf3n actual","upgrades.side_flip.name":"Derecha","upgrades.side_flip.tooltip":"+{{lvl}} combo por ladrillo roto de la derecha, -{{loss}} de lo contrario","upgrades.side_flip.verbose_description":"Golpea el ladrillo por su lado derecho para conseguir un combo, pero evita golpearlo por su lado izquierdo ya que esto cancelar\xe1 dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.side_kick.name":"Zurdos","upgrades.side_kick.tooltip":"+{{lvl}} combo por ladrillo roto de la izquierda, -{{loss}} de lo contrario","upgrades.side_kick.verbose_description":"Golpea el ladrillo por su lado izquierdo para conseguir un combo, pero evita golpearlo por su lado derecho ya que esto cancelar\xe1 dos combos. Golpear desde arriba y desde abajo no tiene efecto.","upgrades.skip_last.name":"F\xe1cil de limpiar","upgrades.skip_last.tooltip":"El \xfaltimo ladrillo se autodestruye.","upgrades.skip_last.verbose_description":"Tienes que romper todos los ladrillos para pasar al siguiente nivel.\\n\\nSin embargo, puede ser dif\xedcil conseguir los \xfaltimos ladrillos.\\n\\nCompletar un nivel antes de tiempo te da opciones extra al subir de nivel.\\n\\nNo quedarte nunca sin ladrillos tambi\xe9n es una gran ventaja.\\n\\nAs\xed que si te cuesta romper los \xfaltimos ladrillos, conseguir esta ventaja unas cuantas veces puede ayudarte.","upgrades.slow_down.name":"Bola lenta","upgrades.slow_down.tooltip":"El bal\xf3n se mueve m\xe1s despacio","upgrades.slow_down.verbose_description":"La bola empieza relativamente despacio, pero con cada nivel del juego empieza un poco m\xe1s r\xe1pido, y tambi\xe9n se acelera si pasas mucho tiempo en un nivel.\\n\\nEsta ventaja hace que la bola sea m\xe1s f\xe1cil de manejar.\\n\\nPuedes conseguirla al principio de cada partida activando el modo ni\xf1o en el men\xfa.","upgrades.smaller_puck.name":"Raqueta m\xe1s peque\xf1a","upgrades.smaller_puck.tooltip":"Tambi\xe9n otorga +{{percent}}% monedas","upgrades.smaller_puck.verbose_description":"Esto hace que la paleta sea m\xe1s peque\xf1a, lo que en teor\xeda facilita algunos tiros de esquina, pero en realidad solo aumenta la dificultad.\\n\\nPor eso tambi\xe9n obtienes una buena bonificaci\xf3n de +50% en la generaci\xf3n de monedas.","upgrades.soft_reset.name":"Restablecimiento progresivo","upgrades.soft_reset.tooltip":"Al reiniciar el combo se conserva el {{percent}}% de los puntos","upgrades.soft_reset.verbose_description":"Limita el impacto de un reinicio de combo.","upgrades.steering.name":"","upgrades.steering.tooltip":"","upgrades.steering.verbose_description":"","upgrades.sticky_coins.name":"Monedas pegajosas","upgrades.sticky_coins.tooltip":"Las monedas se adhieren a los ladrillos del mismo color.","upgrades.sticky_coins.verbose_description":"En el nivel 2, se adhieren a ladrillos de cualquier color.","upgrades.streak_shots.name":"Secuencia de destrucci\xf3n","upgrades.streak_shots.tooltip":"M\xe1s piezas si rompes varios ladrillos a la vez.","upgrades.streak_shots.verbose_description":"Cada vez que rompes un ladrillo, tu combo aumenta. El combo se pone a cero cuando la pelota golpea la raqueta. Una vez que tu combo supera el valor base, tu raqueta se vuelve roja para recordarte que tocarla con la pelota destruir\xe1 tu combo.","upgrades.sturdy_bricks.name":"Ladrillos macizos","upgrades.sturdy_bricks.tooltip":"+{{lvl}} puntos de vida de los ladrillos, +{{percent}}% monedas cuando se destruyen","upgrades.sturdy_bricks.verbose_description":"Cada nivel de esta mejora a\xf1ade un PV a todos los ladrillos. Puedes comprobar el n\xfamero de PV usando la cualificaci\xf3n \\"Clarividente\\". Puedes aumentar el da\xf1o de las balas obteniendo la mejora \\"Bala perforante\\". Cada nivel de esta mejora a\xf1ade un 50% m\xe1s de monedas.","upgrades.superhot.name":"S\xfaper caliente","upgrades.superhot.tooltip":"El tiempo se mueve cuando se mueve la paleta.","upgrades.superhot.verbose_description":"SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE SUPER CALIENTE","upgrades.telekinesis.name":"Telequinesis","upgrades.telekinesis.tooltip":"Control de la trayectoria del bal\xf3n","upgrades.telekinesis.verbose_description":"Controla la bola mientras sube.","upgrades.three_cushion.name":"Tres cojines","upgrades.three_cushion.tooltip":"+1 de combo por gol mbo g\xfc\xe7lendirici y\xfckseltmeleri\\n\\nBu y\xfckseltmeler, s\u0131f\u0131rlama ko\u015Fulu eklemeden komboyu veya kombo \xe7arpan\u0131n\u0131 art\u0131r\u0131r.","unlocks.category.simple":"## Yard\u0131mc\u0131 y\xfckseltmeleri\\n\\nBu y\xfckseltmeler hemen hemen her yap\u0131da faydal\u0131d\u0131r.","unlocks.greyed_out_help":"Grile\u015Ftirilmi\u015F y\xfckseltmeler toplam puan\u0131n\u0131z\u0131 art\u0131rarak a\xe7\u0131labilir. Toplam puan, oyunda her puan ald\u0131\u011F\u0131n\u0131zda artar.","unlocks.intro":"Toplam puan\u0131n\u0131z {{ts}}. A\u015Fa\u011F\u0131daki y\xfckseltmelerden birine t\u0131klayarak onunla bir oyun ba\u015Flatabilirsiniz.","unlocks.just_unlocked":"Seviye kilidi a\xe7\u0131ld\u0131","unlocks.just_unlocked_plural":"Az \xf6nce {{count}} seviyenin kilidini a\xe7t\u0131n\u0131z","unlocks.level":" {{out_of}}seviyeden {{unlocked}} tanesinin kilidini a\xe7t\u0131n","unlocks.level_description":" {{bricks}} tu\u011Fla, {{colors}} renk ve {{bombs}} bombadan olu\u015Fan {{size}}x{{size}} b\xfcy\xfckl\xfc\u011F\xfcnde bir seviye.","unlocks.levels":"Kilidi a\xe7\u0131lm\u0131\u015F seviyeler","unlocks.minScore":"Kilidi a\xe7mak i\xe7in bir ko\u015Fuda ${{minScore}} \'a ula\u015F\u0131n.","unlocks.minScoreWithPerks":" {{required}} ile ancak {{forbidden}} olmadan bir ko\u015Fuda ${{minScore}} \'a ula\u015F\u0131n.","unlocks.minTotalScore":"Toplam ${{score}}biriktirin","unlocks.reached":"En iyi skorunuz {{reached}}idi.","unlocks.title_upgrades":" {{out_of}}y\xfckseltmeden {{unlocked}} tanesinin kilidini a\xe7t\u0131n\u0131z","unlocks.try":"","unlocks.upgrades":"Kilidi a\xe7\u0131lm\u0131\u015F y\xfckseltmeler","unlocks.use":"","upgrades.addiction.name":"Ba\u011F\u0131ml\u0131l\u0131k","upgrades.addiction.tooltip":"+{{lvl}} kombo / tu\u011Fla, kombo bir tu\u011Flay\u0131 k\u0131rd\u0131ktan sonra {{delay}}saniye i\xe7inde s\u0131f\u0131rlan\u0131r.","upgrades.addiction.verbose_description":"Geri say\u0131m yaln\u0131zca her seviyenin ilk tu\u011Flas\u0131 k\u0131r\u0131ld\u0131ktan sonra ba\u015Flar. T\xfcm tu\u011Flalar yok edildi\u011Finde durur.","upgrades.asceticism.name":"Z\xfchd","upgrades.asceticism.tooltip":"+{{combo}} kombo / tu\u011Fla, - {{combo}} jeton yakalamada","upgrades.asceticism.verbose_description":"Kombonuz t\u0131rman\u0131rken paralar\u0131 bir yere saklaman\u0131z gerekecek.","upgrades.ball_attract_ball.name":"Yer \xe7ekimi","upgrades.ball_attract_ball.tooltip":"Toplar toplar\u0131n\u0131 \xe7eker","upgrades.ball_attract_ball.verbose_description":"\\"Oyun alan\u0131n\u0131n geni\u015Fli\u011Finin 3/4\'\xfcnden\\" daha uzakta olan toplar birbirini \xe7ekmeye ba\u015Flayacakt\u0131r. \\n\\n\xc7ekim kuvveti, birbirlerinden en uzakta olduklar\u0131nda daha g\xfc\xe7l\xfcd\xfcr. \\n\\nG\xf6kku\u015Fa\u011F\u0131 par\xe7ac\u0131klar\u0131 \xe7ekim kuvvetini sembolize etmek i\xe7in u\xe7acakt\u0131r. Bu avantaj yaln\u0131zca birden fazla topunuz varsa sunulur.","upgrades.ball_attracts_coins.name":"Toplar madeni paralar\u0131 \xe7eker","upgrades.ball_attracts_coins.tooltip":"Madeni paralar en yak\u0131n topu takip eder ve daha yava\u015F d\xfc\u015Fer","upgrades.ball_attracts_coins.verbose_description":"\\"Leke\\" ve \\"hayalet paralar\\" ile birle\u015Ftirdi\u011Finizde, bu, paralarla toplar\u0131n \\"etraf\u0131n\u0131 boyamak\\" i\xe7in kullan\u0131labilir. Ayr\u0131ca, para m\u0131knat\u0131s\u0131 yerine de kullan\u0131labilir.","upgrades.ball_repulse_ball.name":"Ki\u015Fisel alan","upgrades.ball_repulse_ball.tooltip":"Toplar toplar\u0131 iter","upgrades.ball_repulse_ball.verbose_description":"\xc7eyrek ekran geni\u015Fli\u011Finden daha az uzakl\u0131ktaki toplar birbirini itmeye ba\u015Flayacakt\u0131r. Birbirlerine yak\u0131nlarsa itme kuvveti daha g\xfc\xe7l\xfcd\xfcr. Par\xe7ac\u0131klar bu kuvvetin uyguland\u0131\u011F\u0131n\u0131 sembolize etmek i\xe7in d\u0131\u015Far\u0131 f\u0131rlayacakt\u0131r. Bu avantaj yaln\u0131zca birden fazla topunuz varsa sunulur.","upgrades.base_combo.name":"G\xfc\xe7l\xfc temeller","upgrades.base_combo.tooltip":"K\u0131r\u0131lan her tu\u011Fla i\xe7in 3 jeton daha","upgrades.base_combo.verbose_description":"Kombonuz normalde seviyenin ba\u015F\u0131nda 1\'den ba\u015Flar ve hi\xe7bir \u015Feye \xe7arpmadan z\u0131plad\u0131\u011F\u0131n\u0131zda 1\'e s\u0131f\u0131rlan\u0131r. Bu avantajla, kombo 3 puan daha y\xfcksekte ba\u015Flar, bu y\xfczden her zaman tu\u011Fla ba\u015F\u0131na en az 4 jeton al\u0131rs\u0131n\u0131z. Kombonuz her s\u0131f\u0131rland\u0131\u011F\u0131nda, 1 yerine 4\'e geri d\xf6ner. Topunuz, kombosunun birden y\xfcksek oldu\u011Funu belirtmek i\xe7in biraz par\u0131ldayacakt\u0131r.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Daha b\xfcy\xfck patlamalar","upgrades.bigger_explosions.verbose_description":"Varsay\u0131lan patlama 3x3 kareyi temizler, bununla 5x5 kare olur ve paralara gelen darbe de \xf6nemli \xf6l\xe7\xfcde daha g\xfc\xe7l\xfcd\xfcr. Ekran her patlamadan sonra yan\u0131p s\xf6ner (temel mod hari\xe7)","upgrades.bigger_puck.name":"Daha b\xfcy\xfck k\xfcrek","upgrades.bigger_puck.tooltip":"Kolayca daha fazla para yakalay\u0131n.","upgrades.bigger_puck.verbose_description":"Daha b\xfcy\xfck bir k\xfcrek, topu asla \u0131skalamaman\u0131z\u0131 ve daha fazla jeton yakalaman\u0131z\u0131 kolayla\u015Ft\u0131r\u0131r, ayr\u0131ca topun sekme a\xe7\u0131s\u0131n\u0131 hassas bir \u015Fekilde ayarlaman\u0131z\u0131 sa\u011Flar (topun a\xe7\u0131s\u0131 yaln\u0131zca k\xfcre\u011Fe \xe7arpt\u0131\u011F\u0131 yere ba\u011Fl\u0131d\u0131r).","upgrades.bricks_attract_ball.name":"Tu\u011Flalar toplar\u0131 \xe7eker","upgrades.bricks_attract_ball.tooltip":"Top \xe7arpaca\u011F\u0131 ilk {{count}} tu\u011Flaya do\u011Fru gider.","upgrades.bricks_attract_ball.verbose_description":"Etkisi daha y\xfcksek seviyelerde daha g\xfc\xe7l\xfcd\xfcr. Etki durmadan \xf6nce vurabilecek tu\u011Fla say\u0131s\u0131 da daha y\xfcksektir. Etki, top diske \xe7arpt\u0131\u011F\u0131nda yeniden silahlan\u0131r.","upgrades.bricks_attract_coins.name":"Tu\u011Flalar madeni paralar\u0131 \xe7eker","upgrades.bricks_attract_coins.tooltip":"Onlar\u0131n orada kalmalar\u0131na yard\u0131mc\u0131 olur","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"\u015Eamand\u0131ra","upgrades.buoy.tooltip":"Madeni paralar alt sat\u0131rda {{duration}} saniye boyunca y\xfczer.","upgrades.buoy.verbose_description":"Etkisi mobil modda en iyi \u015Fekilde g\xf6r\xfcl\xfcr","upgrades.clairvoyant.name":"Durug\xf6r\xfc sahibi","upgrades.clairvoyant.tooltip":"Yakla\u015Fan seviyeleri, tu\u011Fla HP\'sini ve top y\xf6n\xfcn\xfc g\xf6r\xfcn","upgrades.clairvoyant.verbose_description":"Do\u011Fru y\xfckseltmeleri se\xe7menize ve sa\u011Flam tu\u011Flalarla neler olup bitti\u011Fini anlaman\u0131za yard\u0131mc\u0131 olur. Seviye 2 ve 3, \u015F\xfcpheli fayda hakk\u0131nda ek bilgi getirir (d\xf6ng\xfc modunda eri\u015Filebilir)","upgrades.coin_magnet.name":"Madeni para m\u0131knat\u0131s\u0131","upgrades.coin_magnet.tooltip":"K\xfcrek paralar\u0131 \xe7ekiyor","upgrades.coin_magnet.verbose_description":"Madeni paralar\u0131 k\xfcre\u011Fe y\xf6nlendirir. Madeni para zaten k\xfcre\u011Fe yak\u0131nsa etkisi daha g\xfc\xe7l\xfcd\xfcr.","upgrades.compound_interest.name":"Bile\u015Fik faiz","upgrades.compound_interest.tooltip":"+{{lvl}} kombo her k\u0131r\u0131lan tu\u011Fla i\xe7in, jeton kaybedildi\u011Finde s\u0131f\u0131rlan\u0131r","upgrades.compound_interest.verbose_description":"Her tu\u011Flay\u0131 k\u0131rd\u0131\u011F\u0131n\u0131zda kombonuz bir artacak ve k\u0131rd\u0131\u011F\u0131n\u0131z her tu\u011Flayla birlikte daha fazla jeton ortaya \xe7\u0131kacakt\u0131r. \\nAncak, bu jetonlar\u0131n her birini k\xfcre\u011Finizle yakalad\u0131\u011F\u0131n\u0131zdan emin olun, \xe7\xfcnk\xfc kaybedilen jeton kombonuzu s\u0131f\u0131rlayacakt\u0131r.\\nKombonuz minimumun \xfczerine \xe7\u0131kt\u0131\u011F\u0131nda, oyun alan\u0131n\u0131n alt k\u0131sm\u0131nda jetonlar\u0131n oraya gitmemesi gerekti\u011Fini hat\u0131rlatan k\u0131rm\u0131z\u0131 bir \xe7izgi olacakt\u0131r.","upgrades.concave_puck.name":"\u0130\xe7b\xfckey k\xfcrek","upgrades.concave_puck.tooltip":"Dikey ni\u015Fan alma hassasiyetini art\u0131r\u0131r","upgrades.concave_puck.verbose_description":"Toplar d\xfcz bir \u015Fekilde yukar\u0131 do\u011Fru \xe7\u0131karak ba\u015Flar ve daha az a\xe7\u0131yla z\u0131plar.","upgrades.corner_shot.name":"K\xf6\u015Fe vuru\u015Fu","upgrades.corner_shot.tooltip":"K\xfcre\u011Finizin ekran\u0131n s\u0131n\u0131rlar\u0131yla \xf6rt\xfc\u015Fmesini sa\u011Flar","upgrades.corner_shot.verbose_description":"K\xf6\u015Felerde ni\u015Fan almaya yard\u0131mc\u0131 olur. Daha ileri seviyeler daha uza\u011Fa gitmenizi sa\u011Flar.","upgrades.double_or_nothing.name":"\xc7ift veya hi\xe7","upgrades.double_or_nothing.tooltip":"Kombo {{multiplier}} kat daha h\u0131zl\u0131 t\u0131rman\u0131r, ancak her s\u0131f\u0131rlamada puan\u0131n\u0131z\u0131n % {{percent}}kadar\u0131n\u0131 kaybedersiniz.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"Uzayda Madeni Paralar","upgrades.etherealcoins.tooltip":"Madeni paralar art\u0131k yer \xe7ekiminden etkilenmiyor","upgrades.etherealcoins.verbose_description":"Paralar birka\xe7 kez z\u0131plad\u0131ktan sonra bile h\u0131zlar\u0131n\u0131 koruyacak ve art\u0131k yer \xe7ekiminden etkilenmeyecekler.","upgrades.extra_levels.name":"5 dakika daha","upgrades.extra_levels.tooltip":"7 yerine {{count}} seviye oyna","upgrades.extra_levels.verbose_description":"Varsay\u0131lan oyun en fazla 7 seviye s\xfcrebilir, ard\u0131ndan oyun biter. \\n\\nBu avantaj\u0131n her seviyesi bir seviye daha yukar\u0131 \xe7\u0131kman\u0131z\u0131 sa\u011Flar. Son seviyeler genellikle en fazla puan\u0131 ald\u0131\u011F\u0131n\u0131z seviyelerdir, bu y\xfczden fark dramatik olabilir.","upgrades.extra_life.name":"","upgrades.extra_life.tooltip":"","upgrades.extra_life.verbose_description":"","upgrades.forgiving.name":"Ba\u011F\u0131\u015Flay\u0131c\u0131","upgrades.forgiving.tooltip":"Molalar\u0131 ka\xe7\u0131rmak, komboyu bir kerede azaltmak yerine kademeli olarak azalt\u0131r.","upgrades.forgiving.verbose_description":"Her seviyede ilk \u0131skalama bedava, sonra kombonun %10\'u, sonra %20\'si...","upgrades.fountain_toss.name":"\xc7e\u015Fme at\u0131\u015F\u0131","upgrades.fountain_toss.tooltip":"Birka\xe7 jetonu ka\xe7\u0131rd\u0131\u011F\u0131n\u0131zda bir miktar kombo kazan\u0131n.","upgrades.fountain_toss.verbose_description":"Bir jetonu ka\xe7\u0131rd\u0131\u011F\u0131n\u0131zda ve kombonuz seviye*30\'un alt\u0131ndaysa, kombonuzun seviye/kombo oran\u0131n\u0131n bir artmas\u0131 olas\u0131l\u0131\u011F\u0131 vard\u0131r.","upgrades.ghost_coins.name":"Hayalet paralar","upgrades.ghost_coins.tooltip":"Madeni paralar yava\u015F\xe7a tu\u011Flalar\u0131n aras\u0131ndan ge\xe7iyor","upgrades.ghost_coins.verbose_description":"Bu bir hata de\u011Fil, bir \xf6zellik! Madeni paralar tu\u011Flalar\u0131n i\xe7inden yava\u015F\xe7a u\xe7ar. Daha y\xfcksek seviyeler daha h\u0131zl\u0131 hareket etmelerini sa\u011Flar.","upgrades.golden_goose.name":"Alt\u0131n yumurtlayan tavuk","upgrades.golden_goose.tooltip":"Madeni paralar bir tu\u011Flaya \xe7arpt\u0131ktan sonra topa \u0131\u015F\u0131nlan\u0131r","upgrades.golden_goose.verbose_description":"Bir madeni para bir tu\u011Flaya \xe7arpt\u0131\u011F\u0131nda, o madeni paray\u0131 en yak\u0131n topa \u0131\u015F\u0131nla. \u0130kinci seviyede, madeni paralar bir tarafa \xe7arpt\u0131ktan sonra da \u0131\u015F\u0131nlan\u0131r.","upgrades.happy_family.name":"Mutlu aile","upgrades.happy_family.tooltip":"E\u011Fer t\xfcm toplar\u0131 oyunda tutarsan\u0131z daha fazla jeton kazan\u0131rs\u0131n\u0131z.","upgrades.happy_family.verbose_description":"Her k\xfcrek s\u0131\xe7ramas\u0131 i\xe7in ekstra top ba\u015F\u0131na +1 kombo. Bir top kaybedildi\u011Finde kombo s\u0131f\u0131rlan\u0131r. Sadece 1\'in \xfczerindeki top kombo verir.","upgrades.helium.name":"Helyum","upgrades.helium.tooltip":"Yer\xe7ekimi k\xfcre\u011Fin solunda ve sa\u011F\u0131nda tersine d\xf6nd\xfc","upgrades.helium.verbose_description":"1. seviyede yer \xe7ekimi azal\u0131r. 2. seviyede paralar yava\u015F\xe7a yukar\u0131 do\u011Fru s\xfcz\xfcl\xfcr. 3. seviyede ger\xe7ekten u\xe7arlar.","upgrades.hot_start.name":"S\u0131cak ba\u015Flang\u0131\xe7","upgrades.hot_start.tooltip":" {{start}}kombosundan ba\u015Fla, saniyede{{loss}} kombo","upgrades.hot_start.verbose_description":"Her seviyenin ba\u015F\u0131nda kombonuz +30 puanla ba\u015Flayacak, ancak daha sonra her saniye bir puan d\xfc\u015Fecek. Etki di\u011Fer avantajlarla birikiyor.","upgrades.implosions.name":"\u0130\xe7 patlamalar","upgrades.implosions.tooltip":"Patlamalar paralar\u0131 d\u0131\u015Far\u0131 atmak yerine i\xe7eri \xe7ekiyor","upgrades.implosions.verbose_description":"Patlama kuvveti di\u011Fer \u015Fekilde uygulan\u0131r. Daha ileri seviyeler \\"daha b\xfcy\xfck patlama\\" olarak i\u015Flev g\xf6r\xfcr.","upgrades.left_is_lava.name":"Sol taraftan ka\xe7\u0131n\u0131n","upgrades.left_is_lava.tooltip":"+ K\u0131r\u0131lan tu\u011Fla ba\u015F\u0131na{{lvl}} kombo. Top ekran\u0131n sol taraf\u0131na \xe7arparsa kombo s\u0131f\u0131rlan\u0131r","upgrades.left_is_lava.verbose_description":"Bir tu\u011Flay\u0131 k\u0131rd\u0131\u011F\u0131n\u0131zda, kombonuz bir artacak, b\xf6ylece k\u0131rd\u0131\u011F\u0131n\u0131z sonraki t\xfcm tu\u011Flalardan bir jeton daha alacaks\u0131n\u0131z.\\n\\nAncak, kombonuz topunuz sol tarafa \xe7arpt\u0131\u011F\u0131 anda s\u0131f\u0131rlanacakt\u0131r. \\n\\nKombonuz y\xfckseldi\u011Fi anda, sol taraf k\u0131rm\u0131z\u0131ya d\xf6nerek onlara \xe7arpmaman\u0131z gerekti\u011Fini hat\u0131rlat\u0131r.\\n","upgrades.limitless.name":"S\u0131n\u0131rs\u0131z","upgrades.limitless.tooltip":"T\xfcm y\xfckseltmelerin maksimum seviyesini {{lvl}} kadar art\u0131r\u0131n","upgrades.limitless.verbose_description":"Bu yetene\u011Fi se\xe7mek, onun kendi s\u0131n\u0131r\u0131n\u0131 da bir artt\u0131r\u0131r ve tekrar se\xe7menize olanak tan\u0131r.","upgrades.metamorphosis.name":"Ba\u015Fkala\u015F\u0131m","upgrades.metamorphosis.tooltip":"Her madeni para, {{lvl}} tu\u011Flay\u0131 kendi rengiyle lekeleyebilir","upgrades.metamorphosis.verbose_description":"Bu yetenekle, madeni paralar geldikleri tu\u011Flan\u0131n renginde olacak ve dokunduklar\u0131 ilk tu\u011Flay\u0131 ayn\u0131 renge boyayacak. Madeni paralar onlar\u0131 k\u0131ran topun h\u0131z\u0131yla ortaya \xe7\u0131kar, bu da \\"boyamak\\" istedi\u011Finiz tu\u011Flalara do\u011Fru biraz ni\u015Fan alabilece\u011Finiz anlam\u0131na gelir. 1. seviyede, her madeni para \\"harcanmadan\\" ve i\xe7i bo\u015F g\xf6r\xfcnmeden \xf6nce 1 tu\u011Flay\u0131 boyayabilir.","upgrades.minefield.name":"May\u0131n tarlas\u0131","upgrades.minefield.tooltip":"Ekrandaki bomba tu\u011Flas\u0131 ba\u015F\u0131na +{{percent}}% jeton","upgrades.minefield.verbose_description":"Bombalar patlarken de say\u0131l\u0131r.","upgrades.multiball.name":"\xc7oklu top","upgrades.multiball.tooltip":"Her seviyeye {{count}} topla ba\u015Flay\u0131n.","upgrades.multiball.verbose_description":"Breakout 71\'de topu d\xfc\u015F\xfcrd\xfc\u011F\xfcn\xfcz anda kaybedersiniz. \\n\\nBu avantajla iki top elde edersiniz ve bu y\xfczden birini kaybetmeyi g\xf6ze alabilirsiniz. \\n\\nKaybedilen toplar bir sonraki seviyede geri gelir. \\n\\nBirden fazla topa sahip olmak baz\u0131 ek avantajlar\u0131 kullan\u0131labilir hale getirir ve tabii ki seviyeyi daha h\u0131zl\u0131 temizler.","upgrades.nbricks.name":"S\u0131k\u0131 \xf6rneklem b\xfcy\xfckl\xfc\u011F\xfc","upgrades.nbricks.tooltip":"K\xfcrek s\u0131\xe7ramas\u0131 ba\u015F\u0131na tam olarak {{lvl}} tu\u011Fla vurun +{{lvl}} kombo i\xe7in, aksi takdirde s\u0131f\u0131rlan\u0131r","upgrades.nbricks.verbose_description":"Bu tu\u011Flalar\u0131 yok etmeniz gerekmiyor ancak onlara vurman\u0131z gerekiyor. Patlamalarla yok edilen tu\u011Flalar say\u0131lmaz","upgrades.one_more_choice.name":"Ekstra se\xe7enek","upgrades.one_more_choice.tooltip":"Daha fazla seviye atlama, listede {{lvl}} daha fazla se\xe7enek sunacak","upgrades.one_more_choice.verbose_description":"Her y\xfckseltme men\xfcs\xfc bir se\xe7ene\u011Fe daha sahip olacak. Se\xe7ebilece\u011Finiz y\xfckseltme say\u0131s\u0131n\u0131 art\u0131rmaz.","upgrades.ottawa_treaty.name":"Ottawa antla\u015Fmas\u0131","upgrades.ottawa_treaty.tooltip":"Bir bomban\u0131n yak\u0131n\u0131nda tu\u011Fla k\u0131rmak onu etkisiz hale getirir","upgrades.ottawa_treaty.verbose_description":"Yak\u0131ndaki bomba renkli bir blokla de\u011Fi\u015Ftirilecektir. E\u011Fer sapper\'\u0131n\u0131z varsa, top bir sonraki s\u0131\xe7ramaya kadar sapper etkisini kaybedecektir. Ayn\u0131 anda yaln\u0131zca bir bomba de\u011Fi\u015Ftirilebilir.","upgrades.passive_income.name":"Pasif gelir","upgrades.passive_income.tooltip":"+{{lvl}} kombo / tu\u011Fla, k\xfcrek \xf6nemsizdir {{time}}saniye hareket ettikten sonra","upgrades.passive_income.verbose_description":"Baz\u0131 \xf6zellikler, toplar\u0131n hi\xe7bir \u015Fey yapman\u0131za gerek kalmadan istedi\u011Finizi yapmas\u0131na yard\u0131mc\u0131 olabilir.","upgrades.picky_eater.name":"Se\xe7ici yiyen","upgrades.picky_eater.tooltip":"+{{lvl}} kombo her tu\u011Fla k\u0131r\u0131ld\u0131\u011F\u0131nda, top rengi de\u011Fi\u015Fti\u011Finde s\u0131f\u0131rlan\u0131r","upgrades.picky_eater.verbose_description":"Topunuzla ayn\u0131 renkte bir tu\u011Flay\u0131 k\u0131rd\u0131\u011F\u0131n\u0131zda, kombonuz bir artar. \\nE\u011Fer farkl\u0131 bir renkteyse, top yeni rengi al\u0131r, ancak kombo s\u0131f\u0131rlan\u0131r, tabii topun renginde tu\u011Fla kalmam\u0131\u015Fsa. \\nMinimumunuzdan daha y\xfcksek bir kombo elde etti\u011Finizde, yanl\u0131\u015F renkteki tu\u011Flalar k\u0131rm\u0131z\u0131 bir kenarl\u0131k al\u0131r. \\nBirden fazla topunuz varsa, bunlardan biri bir tu\u011Flaya \xe7arpt\u0131\u011F\u0131nda hepsi renk de\u011Fi\u015Ftirir.","upgrades.pierce.name":"Delme","upgrades.pierce.tooltip":"K\xfcrek z\u0131plamas\u0131ndan sonra top {{count}} tu\u011Flay\u0131 deldi","upgrades.pierce.verbose_description":"Top normalde bir \u015Feye dokundu\u011Fu anda z\u0131plar. Bu avantajla, 3 tu\u011Fla k\u0131r\u0131l\u0131ncaya kadar y\xf6r\xfcngesine devam eder. \\n\\nBundan sonra, 4. tu\u011Flada z\u0131plar ve sayac\u0131 s\u0131f\u0131rlamak i\xe7in k\xfcre\u011Fe dokunman\u0131z gerekir.","upgrades.pierce_color.name":"Renk delme","upgrades.pierce_color.tooltip":"+{{lvl}} topun rengindeki tu\u011Flalara hasar","upgrades.pierce_color.verbose_description":"Bir top ayn\u0131 renkteki bir tu\u011Flaya \xe7arpt\u0131\u011F\u0131nda, engellenmeden ge\xe7ecektir. \\n\\nFarkl\u0131 renkteki bir tu\u011Flaya ula\u015Ft\u0131\u011F\u0131nda, onu k\u0131racak, rengini alacak ve sekecektir.\\n\\nSa\u011Flam tu\u011Flalar\u0131n\u0131z varsa, top yine de ayn\u0131 renkteki bir tu\u011Fladan sekebilir.","upgrades.puck_repulse_ball.name":"Yumu\u015Fak ini\u015F","upgrades.puck_repulse_ball.tooltip":"K\xfcrek toplar\u0131 iter","upgrades.puck_repulse_ball.verbose_description":"Bir top k\xfcre\u011Fe yakla\u015Ft\u0131\u011F\u0131nda yava\u015Flamaya ba\u015Flayacak ve hatta k\xfcre\u011Fe de\u011Fmeden bile z\u0131plamaya ba\u015Flayacakt\u0131r.","upgrades.rainbow.name":"G\xf6kku\u015Fa\u011F\u0131","upgrades.rainbow.tooltip":"Paralar g\xf6kku\u015Fa\u011F\u0131 renklerinde ortaya \xe7\u0131kar.","upgrades.rainbow.verbose_description":"Her seviye renkli jetonlar\u0131n oran\u0131n\u0131 art\u0131r\u0131r. Renk seviye zaman\u0131na ba\u011Fl\u0131d\u0131r.","upgrades.reach.name":"Yukar\u0131dan a\u015Fa\u011F\u0131ya","upgrades.reach.tooltip":"En alt s\u0131radaki N tu\u011Flas\u0131na dokunmak komboyu s\u0131f\u0131rlar. Aksi takdirde, +N kombo","upgrades.reach.verbose_description":"E\u011Fer sadece bir s\u0131ra tu\u011 n, die beim Zerbrechen eines Steins entstehen.\\nSie wird auf deinem Paddel angezeigt, zum Beispiel x4 bedeutet, dass jeder Stein 4 M\xfcnzen hervorbringt.\\nDie meisten Upgrades, die den Combo erh\xf6hen, f\xfcgen auch eine Bedingung hinzu, um ihn zur\xfcckzusetzen.\\nDie Kombo wird auch zur\xfcckgesetzt, wenn der Ball zum Schl\xe4ger zur\xfcckkehrt, ohne einen Stein zu treffen.\\nIn diesem Fall wird eine \\"Miss\\"-Meldung angezeigt.\\n\\nVersuchen Sie, jedes Mal auf einen Stein zu zielen.\\n\\n## Anvisieren\\n\\nNur die Position des Balls auf dem Schl\xe4ger entscheidet dar\xfcber, wie der Ball abprallt.\\nWenn der Ball das Paddel genau in der Mitte trifft, prallt er senkrecht nach oben ab.\\nWenn du ihn mehr auf einer Seite triffst, hat er einen gr\xf6\xdferen Winkel.\\nDie Paddelgeschwindigkeit und der Auftreffwinkel haben keinen Einfluss auf die Richtung des Balls nach dem Aufprall.\\n\\nViele Upgrades, die beim Zielen helfen, k\xf6nnen freigeschaltet werden.\\n\\n## Freischaltungen\\n\\nWenn du Breakout 71 zum ersten Mal spielst, sind die meisten Upgrades und Levels gesperrt.\\nUpgrades werden freigeschaltet, indem du einfach spielst und viele M\xfcnzen f\xe4ngst.\\nDie ersten Level werden durch das Erreichen einer hohen Punktzahl freigeschaltet.\\nSp\xe4tere Levels f\xfcgen eine Bedingung hinzu, welche Verg\xfcnstigungen Sie ausw\xe4hlen k\xf6nnen.\\n\\nEine hohe Punktzahl zu erreichen ist viel einfacher, wenn du nach jedem Level mehrere Upgrades erh\xe4ltst.\\n\\n## Re-Rolls und kostenlose Upgrades\\n\\nWenn du gut spielst, bekommst du ein zus\xe4tzliches Upgrade, das du ausw\xe4hlen kannst:\\n\\n- Schaffe das Level in weniger als {{levelTimeGood}} Sekunden\\n- Treffen Sie weniger als {{wallBouncedGood}} Mal die Seiten oder die Spitze\\n- Fangen Sie {{catchRateGood}}% der M\xfcnzen\\n- Verfehle die Steine weniger als {{missesGood}} Mal\\n\\nDu bekommst auch einen Re-Roll, mit dem du Upgrades \xfcberspringen kannst, wenn du noch besser abschneidest:\\n\\n- S ie M\xfcnzen irgendwo aufbewahren, w\xe4hrend Ihre Combo aufsteigt.","upgrades.ball_attract_ball.name":"Schwerkraft","upgrades.ball_attract_ball.tooltip":"B\xe4lle ziehen B\xe4lle an","upgrades.ball_attract_ball.verbose_description":"B\xe4lle, die mehr als \\"3/4 der Spielfeldbreite\\" entfernt sind, beginnen sich gegenseitig anzuziehen.\\n\\nDie Anziehungskraft ist st\xe4rker, wenn sie am weitesten voneinander entfernt sind.\\n\\nUm die Anziehungskraft zu symbolisieren, fliegen Regenbogenpartikel. Dieser Vorteil wird nur angeboten, wenn du bereits mehr als einen Ball hast.","upgrades.ball_attracts_coins.name":"B\xe4lle ziehen M\xfcnzen an","upgrades.ball_attracts_coins.tooltip":"Die M\xfcnzen folgen der n\xe4chstgelegenen Kugel und fallen langsamer herunter.","upgrades.ball_attracts_coins.verbose_description":"Dies k\xf6nnte verwendet werden, um die Kugeln mit M\xfcnzen \\"anzumalen\\", wenn man es mit \\"Flecken\\" und \\"Geisterm\xfcnzen\\" kombiniert. Es funktioniert auch als Ersatz f\xfcr einen M\xfcnzmagneten.","upgrades.ball_repulse_ball.name":"Pers\xf6nlicher Raum","upgrades.ball_repulse_ball.tooltip":"B\xe4lle sto\xdfen B\xe4lle ab","upgrades.ball_repulse_ball.verbose_description":"Kugeln, die weniger als ein Viertel der Bildschirmbreite entfernt sind, sto\xdfen sich gegenseitig ab. Die Absto\xdfungskraft ist st\xe4rker, wenn sie sich nahe beieinander befinden. Um diese Kraft zu symbolisieren, werden Partikel herausgeschleudert. Dieser Vorteil wird nur angeboten, wenn Sie bereits mehr als einen Ball haben.","upgrades.base_combo.name":"Starke Grundlagen","upgrades.base_combo.tooltip":"3 weitere M\xfcnzen pro zerbrochenem Ziegel","upgrades.base_combo.verbose_description":"Deine Combo beginnt normalerweise bei 1 am Anfang des Levels und wird auf 1 zur\xfcckgesetzt, wenn du herumspringst, ohne etwas zu treffen. Mit diesem Vorteil beginnt die Kombo 3 Punkte h\xf6her, sodass du immer mindestens 4 M\xfcnzen pro Stein erh\xe4ltst. Immer, wenn deine Kombo zur\xfcckgesetzt wird, steht sie wieder bei 4 und nicht bei 1. Dein Ball wird ein wenig glitzern, um anzuzeigen, dass sein Combo h\xf6her als 1 ist.","upgrades.bigger_explosions.name":"Kaboom","upgrades.bigger_explosions.tooltip":"Gr\xf6\xdfere Explosionen","upgrades.bigger_explosions.verbose_description":"Die Standardexplosion r\xe4umt ein 3x3-Quadrat, mit dieser wird es zu einem 5x5-Quadrat, und der Schlag auf die M\xfcnzen ist auch wesentlich st\xe4rker. Der Bildschirm blinkt nach jeder Explosion (au\xdfer im Basismodus)","upgrades.bigger_puck.name":"Gr\xf6\xdferes Paddel","upgrades.bigger_puck.tooltip":"Einfach mehr M\xfcnzen fangen.","upgrades.bigger_puck.verbose_description":"Ein gr\xf6\xdferes Paddel macht es einfacher, den Ball nie zu verfehlen und mehr M\xfcnzen zu fangen. Au\xdferdem kann man die Abpraller genau ausrichten (der Winkel des Balls h\xe4ngt nur davon ab, wo er das Paddel trifft).","upgrades.bricks_attract_ball.name":"Ziegelsteine ziehen B\xe4lle an","upgrades.bricks_attract_ball.tooltip":"Der Ball fliegt zu den ersten {{count}} Steinen, die er trifft.","upgrades.bricks_attract_ball.verbose_description":"Die Wirkung ist bei h\xf6heren Stufen st\xe4rker. Die Anzahl der Steine, die getroffen werden k\xf6nnen, bevor der Effekt aufh\xf6rt, ist ebenfalls h\xf6her. Der Effekt setzt wieder ein, wenn der Ball den Puck trifft.","upgrades.bricks_attract_coins.name":"Ziegelsteine ziehen M\xfcnzen an","upgrades.bricks_attract_coins.tooltip":"Hilft ihnen, dort oben zu bleiben","upgrades.bricks_attract_coins.verbose_description":"","upgrades.buoy.name":"Boje","upgrades.buoy.tooltip":"M\xfcnzen schweben {{duration}} Sekunden lang auf der unteren Linie.","upgrades.buoy.verbose_description":"Der Effekt ist im mobilen Modus am deutlichsten sichtbar","upgrades.clairvoyant.name":"Hellsichtig","upgrades.clairvoyant.tooltip":"Sehen Sie die n\xe4chsten Levels, die HP der Steine und die Ballrichtung","upgrades.clairvoyant.verbose_description":"Hilft dir, die richtigen Upgrades auszuw\xe4hlen und zu verstehen, was es mit den robusten Steinen auf sich hat. Level 2 und 3 bringen zus\xe4tzliches Wissen von zweifelhaftem Nutzen (erreichbar im Loop-Modus)","upgrades.coin_magnet.name":"Magnet f\xfcr M\xfcnzen","upgrades.coin_magnet.tooltip":"Paddel zieht M\xfcnzen an","upgrades.coin_magnet.verbose_description":"Lenkt die M\xfcnzen auf das Paddel. Der Effekt ist st\xe4rker, wenn die M\xfcnze bereits in der N\xe4he ist.","upgrades.compound_interest.name":"Zinseszins","upgrades.compound_interest.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, R\xfccksetzung bei verlorener M\xfcnze","upgrades.compound_interest.verbose_description":"Deine Combo w\xe4chst jedes Mal um eins, wenn du einen Stein zerbrichst, und bringt mit jedem Stein, den du zerbrichst, mehr und mehr M\xfcnzen hervor.\\nAchten Sie jedoch darauf, jede dieser M\xfcnzen mit Ihrem Paddel aufzufangen, da jede verlorene M\xfcnze Ihre Combo zur\xfccksetzt.\\nSobald deine Kombo \xfcber dem Minimum liegt, wird der Boden des Spielfelds mit einer roten Linie markiert, um dich daran zu erinnern, dass die M\xfcnzen nicht dorthin geh\xf6ren.","upgrades.concave_puck.name":"Konkaves Paddel","upgrades.concave_puck.tooltip":"Verbessert die vertikale Zielgenauigkeit","upgrades.concave_puck.verbose_description":"Die B\xe4lle gehen zu Beginn des Levels gerade nach oben und prallen in einem geringeren Winkel ab.","upgrades.corner_shot.name":"Eckball","upgrades.corner_shot.tooltip":"L\xe4sst Ihr Paddel mit den R\xe4ndern des Bildschirms \xfcberlappen","upgrades.corner_shot.verbose_description":"Hilft beim Zielen in den Kurven. Weitere Stufen lassen Sie weiter hinausgehen.","upgrades.double_or_nothing.name":"Doppelt oder nichts","upgrades.double_or_nothing.tooltip":"Combo steigt {{multiplier}} -mal schneller, aber Sie verlieren bei jedem Zur\xfccksetzen {{percent}}% Ihrer Punktzahl.","upgrades.double_or_nothing.verbose_description":"","upgrades.etherealcoins.name":"M\xfcnzen, im Weltraum","upgrades.etherealcoins.tooltip":"M\xfcnzen werden nicht mehr von der Schwerkraft beeinflusst","upgrades.etherealcoins.verbose_description":"Die M\xfcnzen behalten ihre Geschwindigkeit auch nach mehreren Aufprallvorg\xe4ngen bei und werden nicht mehr durch die Schwerkraft beeinflusst.","upgrades.extra_levels.name":"5 min mehr","upgrades.extra_levels.tooltip":"Spielen Sie {{count}} Stufen statt 7","upgrades.extra_levels.verbose_description":"Das Standardspiel kann maximal 7 Stufen dauern, danach ist das Spiel vorbei.\\n\\nMit jeder Stufe dieses Vorteils k\xf6nnen Sie eine Stufe h\xf6her gehen. Die letzten Level sind oft diejenigen, in denen man die meisten Punkte macht, so dass der Unterschied dramatisch sein kann.","upgrades.extra_life.name":"","upgrades.extra_life.tooltip":"","upgrades.extra_life.verbose_description":"","upgrades.forgiving.name":"Verzeihen","upgrades.forgiving.tooltip":"Durch fehlende Pausen wird die Kombo schrittweise reduziert, anstatt auf einmal.","upgrades.forgiving.verbose_description":"Der erste Fehlschuss pro Level ist kostenlos, dann 10% der Combo, dann 20% ...","upgrades.fountain_toss.name":"Springbrunnen-Wurf","upgrades.fountain_toss.tooltip":"Gewinnen Sie etwas Combo, wenn Sie einige M\xfcnzen verpassen.","upgrades.fountain_toss.verbose_description":"Wenn du eine M\xfcnze verpasst und deine Combo unter {{max}}war, hat deine Combo eine Wahrscheinlichkeit von {{lvl}}/Combo um eins zu erh\xf6hen.","upgrades.ghost_coins.name":"Geisterm\xfcnzen","upgrades.ghost_coins.tooltip":"M\xfcnzen gehen langsam durch Ziegelsteine","upgrades.ghost_coins.verbose_description":"Das ist kein Bug, sondern ein Feature!  Die M\xfcnzen fliegen nur langsam durch die Ziegel. H\xf6here Stufen lassen sie schneller fliegen.","upgrades.golden_goose.name":"Goldene Gans","upgrades.golden_goose.tooltip":"M\xfcnzen teleportieren sich zum Ball, nachdem sie einen Ziegelstein getroffen haben","upgrades.golden_goose.verbose_description":"Immer wenn eine M\xfcnze einen Ziegelstein trifft, teleportieren Sie diese M\xfcnze zum n\xe4chsten Ball. Auf Stufe zwei teleportieren sich M\xfcnzen auch, wenn sie eine Seite treffen.","upgrades.happy_family.name":"Gl\xfcckliche Familie","upgrades.happy_family.tooltip":"Mehr M\xfcnzen, wenn Sie alle B\xe4lle im Spiel behalten.","upgrades.happy_family.verbose_description":"+1 Combo pro zus\xe4tzlichem Ball pro Schl\xe4gersprung. Die Combo wird zur\xfcckgesetzt, wenn ein Ball verloren geht. Nur B\xe4lle \xfcber 1 ergeben eine Combo.","upgrades.helium.name":"Helium","upgrades.helium.tooltip":"Umgekehrte Schwerkraft links und rechts des Paddels","upgrades.helium.verbose_description":"Auf Stufe 1 ist die Schwerkraft reduziert. Auf Stufe 2 schweben die M\xfcnzen langsam nach oben. Auf Stufe 3 fliegen sie richtig.","upgrades.hot_start.name":"Hei\xdfer Start","upgrades.hot_start.tooltip":"Start bei Kombo {{start}}, -{{loss}} Kombo pro Sekunde","upgrades.hot_start.verbose_description":"Zu Beginn eines jeden Levels beginnt deine Kombo mit +30 Punkten, aber dann wird sie jede Sekunde um einen Punkt verringert. Der Effekt ist mit anderen Perks stapelbar.","upgrades.implosions.name":"Implosionen","upgrades.implosions.tooltip":"Explosionen saugen M\xfcnzen an, anstatt sie wegzublasen","upgrades.implosions.verbose_description":"Die Explosionskraft wird in die andere Richtung angewendet. Weitere Stufen wirken als \\"gr\xf6\xdfere Explosion\\".","upgrades.left_is_lava.name":"Linke Seite meiden","upgrades.left_is_lava.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein. Combo wird zur\xfcckgesetzt, wenn der Ball die linke Seite des Bildschirms trifft.","upgrades.left_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erh\xf6ht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine M\xfcnze mehr bekommst.\\n\\nAllerdings wird deine Combo zur\xfcckgesetzt, sobald dein Ball die linke Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die linke Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.limitless.name":"Grenzenlos","upgrades.limitless.tooltip":"Erh\xf6he die maximale Stufe aller Aufwertungen um {{lvl}} ","upgrades.limitless.verbose_description":"Durch die Wahl dieses Vorteils wird auch sein eigenes Limit um eins erh\xf6ht, so dass man es erneut w\xe4hlen kann.","upgrades.metamorphosis.name":"Metamorphose","upgrades.metamorphosis.tooltip":"Jede M\xfcnze kann {{lvl}} Steine mit ihrer Farbe f\xe4rben","upgrades.metamorphosis.verbose_description":"Mit diesem Vorteil haben die M\xfcnzen die Farbe des Ziegels, aus dem sie stammen, und f\xe4rben den ersten Ziegel, den sie ber\xfchren, in derselben Farbe. Die M\xfcnzen spawnen mit der Geschwindigkeit des Balls, der sie zerbrochen hat, was bedeutet, dass du ein bisschen in die Richtung der Ziegelsteine zielen kannst, die du \\"anmalen\\" willst. Auf Stufe 1 kann jede M\xfcnze 1 Ziegelstein einf\xe4rben, bevor sie \\"verbraucht\\" wird und hohl erscheint.","upgrades.minefield.name":"Minenfeld","upgrades.minefield.tooltip":"+{{percent}}% M\xfcnzen pro Bombenstein auf dem Bildschirm","upgrades.minefield.verbose_description":"Bomben werden auch w\xe4hrend der Explosion gez\xe4hlt.","upgrades.multiball.name":"Multi-Ball","upgrades.multiball.tooltip":"Beginne jedes Level mit {{count}} B\xe4llen.","upgrades.multiball.verbose_description":"Sobald du den Ball in Breakout 71 fallen l\xe4sst, hast du verloren.\\n\\nMit diesem Vorteil erhalten Sie zwei B\xe4lle und k\xf6nnen es sich daher leisten, einen zu verlieren.\\n\\nDie verlorenen B\xe4lle kommen im n\xe4chsten Level zur\xfcck.\\n\\nWenn du mehr als einen Ball hast, stehen dir weitere Verg\xfcnstigungen zur Verf\xfcgung, und du kannst das Level nat\xfcrlich schneller abschlie\xdfen.","upgrades.nbricks.name":"Strenger Stichprobenumfang","upgrades.nbricks.tooltip":"Triff genau {{lvl}} Steine pro Paddle Bounce f\xfcr +{{lvl}} Combo, sonst wird er zur\xfcckgesetzt","upgrades.nbricks.verbose_description":"Ihr m\xfcsst die Steine nicht unbedingt zerst\xf6ren, aber ihr m\xfcsst sie treffen. Durch Explosionen zerst\xf6rte Ziegelsteine z\xe4hlen nicht.","upgrades.one_more_choice.name":"Extra Auswahl","upgrades.one_more_choice.tooltip":"Weitere Stufenaufstiege bieten {{lvl}} weitere Option(en) in der Liste","upgrades.one_more_choice.verbose_description":"Jedes Upgrade-Men\xfc wird eine weitere Option enthalten.  Erh\xf6ht nicht die Anzahl der Upgrades, die Sie ausw\xe4hlen k\xf6nnen.","upgrades.ottawa_treaty.name":"Ottawa-Vertrag","upgrades.ottawa_treaty.tooltip":"Das Zerschlagen eines Ziegelsteins in der N\xe4he einer Bombe entsch\xe4rft diese","upgrades.ottawa_treaty.verbose_description":"Die nahe Bombe wird durch einen farbigen Block ersetzt. Wenn du einen Pionier hast, verliert der Ball seinen Pioniereffekt bis zum n\xe4chsten Aufprall. Es kann immer nur eine Bombe ersetzt werden.","upgrades.passive_income.name":"Passives Einkommen","upgrades.passive_income.tooltip":"+{{lvl}} Combo / Brick, es sei denn, das Paddel hat sich in den letzten {{time}}s bewegt, dann wird es stattdessen zur\xfcckgesetzt","upgrades.passive_income.verbose_description":"Einige Verg\xfcnstigungen k\xf6nnen den B\xe4llen helfen, das zu tun, was du willst, ohne dass du etwas tun musst.","upgrades.picky_eater.name":"W\xe4hlerischer Esser","upgrades.picky_eater.tooltip":"+{{lvl}} Combo pro zerbrochenem Stein, wird bei Farbwechsel des Balls zur\xfcckgesetzt","upgrades.picky_eater.verbose_description":"Jedes Mal, wenn du einen Stein der gleichen Farbe wie deine Kugel zerst\xf6rst, erh\xf6ht sich deine Kombination um eins.\\nWenn es eine andere Farbe ist, nimmt der Ball diese neue Farbe an, aber die Kombination wird zur\xfcckgesetzt, es sei denn, es sind keine Steine in der Farbe des Balls \xfcbrig.\\nSobald du eine h\xf6here Kombination als das Minimum erreicht hast, werden die Steine der falschen Farbe rot umrandet.\\nWenn du mehr als eine Kugel hast, wechseln sie alle die Farbe, sobald eine von ihnen einen Stein trifft.","upgrades.pierce.name":"Piercing","upgrades.pierce.tooltip":"Der Ball durchdringt {{count}} Steine nach einem Paddle Bounce","upgrades.pierce.verbose_description":"Der Ball prallt normalerweise ab, sobald er etwas ber\xfchrt. Mit diesem Vorteil setzt er seine Flugbahn f\xfcr bis zu 3 Ziegelsteine gebrochen fort.\\n\\nDanach prallt er am 4. Ziegelstein ab, und du musst das Paddel ber\xfchren, um den Z\xe4hler zur\xfcckzusetzen.","upgrades.pierce_color.name":"Farbe durchstechen","upgrades.pierce_color.tooltip":"+{{lvl}} Schaden an Steinen der Farbe der Kugel","upgrades.pierce_color.verbose_description":"Wenn ein Ball auf einen gleichfarbigen Stein trifft, geht er ungehindert durch.\\n\\nSobald er einen andersfarbigen Stein erreicht, zerbricht er ihn, nimmt seine Farbe an und springt auf.\\n\\nWenn du robuste Steine hast, kann es sein, dass der Ball trotzdem an einem gleichfarbigen Stein abprallt.","upgrades.puck_repulse_ball.name":"Weiche Landung","upgrades.puck_repulse_ball.tooltip":"Paddel st\xf6\xdft B\xe4lle ab","upgrades.puck_repulse_ball.verbose_description":"Wenn ein Ball in die N\xe4he des Schl\xe4gers kommt, wird er langsamer und springt m\xf6glicherweise sogar, ohne den Schl\xe4ger zu ber\xfchren.","upgrades.rainbow.name":"Regenbogen","upgrades.rainbow.tooltip":"M\xfcnzen spawnen in Regenbogenfarben.","upgrades.rainbow.verbose_description":"Mit jedem Level steigt der Anteil der farbigen M\xfcnzen. Die Farbe h\xe4ngt von der Levelzeit ab.","upgrades.reach.name":"Von oben nach unten","upgrades.reach.tooltip":" Das Ber\xfchren der N Steine der untersten Reihe setzt die Kombo zur\xfcck. Andernfalls: +N Combo","upgrades.reach.verbose_description":"Wenn es nur eine Reihe von Steinen gibt, oder wenn die unterste Reihe von Steinen die gesamte Breite des Spiels abdeckt, dann bewirkt dieser Vorteil nichts. Andernfalls wird die Combo zur\xfcckgesetzt, wenn diese unterste Reihe zerst\xf6rt wird, w\xe4hrend alles andere die Combo um die Anzahl der Steine in dieser untersten Reihe erh\xf6ht.\\n\\nDie unterste Reihe wird in rot hervorgehoben.","upgrades.respawn.name":"Neu spawnen","upgrades.respawn.tooltip":"{{percent}}% der Steine spawnen nach {{delay}}s erneut.","upgrades.respawn.verbose_description":"Einige Partikeleffekte lassen Sie wissen, wo Ziegelsteine erscheinen werden.","upgrades.right_is_lava.name":"Vermeiden Sie die rechte Seite","upgrades.right_is_lava.tooltip":"+{{lvl}} Kombo pro Stein. Combo wird zur\xfcckgesetzt, wenn der Ball die rechte Seite des Bildschirms trifft.","upgrades.right_is_lava.verbose_description":"Jedes Mal, wenn du einen Ziegelstein zerbrichst, erh\xf6ht sich deine Kombo um eins, so dass du von allen weiteren Ziegelsteinen, die du zerbrichst, eine M\xfcnze mehr bekommst.\\n\\nAllerdings wird deine Kombo zur\xfcckgesetzt, sobald dein Ball die rechte Seite trifft.\\n\\nSobald deine Combo ansteigt, wird die rechte Seite rot, um dich daran zu erinnern, dass du es vermeiden solltest, sie zu treffen.\\n","upgrades.sacrifice.name":"Opfern Sie","upgrades.sacrifice.tooltip":"Der Verlust eines Lebens {{lvl}}x die Combo l\xf6scht dann alle Steine","upgrades.sacrifice.verbose_description":"Damit k\xf6nnte die Kombination ziemlich hoch werden.","upgrades.sapper.name":"Sapper","upgrades.sapper.tooltip":"Der erste zerbrochene Ziegelstein wird zu einer Bombe.","upgrades.sapper.verbose_description":"Anstatt einfach zu verschwinden, wird der erste Stein, den du zerbrichst, durch einen Bombenstein ersetzt. Wenn du den Ball auf dem Paddel abprallen l\xe4sst, wird der Effekt wieder aktiviert. Wenn Sie diese F\xe4higkeit aufwerten, k\xf6nnen Sie mehr Bomben platzieren.","upgrades.shocks.name":"Schocks","upgrades.shocks.tooltip":"Kollisionen mit explosiven Kugeln","upgrades.shocks.verbose_description":"Wenn zwei Kugeln zusammensto\xdfen, tauschen sie ihre Geschwindigkeit aus, l\xf6sen eine Explosion aus und gewinnen an Geschwindigkeit, um sie zu trennen.","upgrades.shunt.name":"Shunt","upgrades.shunt.tooltip":"Behalte {{percent}}% deines Combos zwischen den Levels","upgrades.shunt.verbose_description":"Wenn Sie auch Hei\xdfstart haben, wird der Hei\xdfstart einfach zur aktuellen Kombination hinzugef\xfcgt.","upgrades.side_flip.name":"Rechtsh\xe4ndig","upgrades.side_flip.tooltip":"+{{lvl}} Combo pro von rechts gebrochenem Stein, sonst -{{loss}} ","upgrades.side_flip.verbose_description":"Triff den Ziegelstein auf der rechten Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der linken Seite zu treffen, da dies 2 Combo entfernen w\xfcrde. Schl\xe4ge von oben und unten haben keinen Effekt.","upgrades.side_kick.name":"Linksh\xe4ndig","upgrades.side_kick.tooltip":"+{{lvl}} Combo pro von links gebrochenem Stein, sonst -{{loss}} ","upgrades.side_kick.verbose_description":"Triff den Ziegelstein auf der linken Seite, um einen Combo zu erhalten, aber vermeide es, ihn auf der rechten Seite zu treffen, da dies 2 Combo entfernen w\xfcrde. Schl\xe4ge von oben und unten haben keinen Effekt.","upgrades.skip_last.name":"Einfaches Aufr\xe4umen","upgrades.skip_last.tooltip":"Der letzte Stein wird explodieren.","upgrades.skip_last.verbose_description":"Du musst alle Steine zerbrechen, um die n\xe4chste Ebene zu erreichen. Es kann jedoch schwierig sein, die letzten Steine zu bekommen.\\n\\nWenn du ein Level fr\xfch beendest, hast du zus\xe4tzliche M\xf6glichkeiten, um aufzur\xfcsten. Es ist auch sehr vorteilhaft, nie die Steine zu verpassen.\\n\\nWenn es dir also schwerf\xe4llt, die letzten Steine zu zerbrechen, kann es helfen, wenn du diesen Vorteil ein paar Mal bekommst.","upgrades.slow_down.name":"Langsamer Ball","upgrades.slow_down.tooltip":"Der Ball bewegt sich langsamer","upgrades.slow_down.verbose_description":"Der Ball f\xe4ngt relativ langsam an, aber mit jeder Spielstufe wird er ein bisschen schneller.\\n\\nEr wird auch schneller, wenn du viel Zeit in einem Level verbringst.\\n\\nDieser Vorteil macht ihn \xfcberschaubarer.\\n\\nDu kannst ihn jedes Mal beim Start erhalten, indem du den Kindermodus im Men\xfc aktivierst.","upgrades.smaller_puck.name":"Kleineres Paddel","upgrades.smaller_puck.tooltip":"Gibt auch +5 Basis-Kombo","upgrades.smaller_puck.verbose_description":"Dadurch wird das Paddel kleiner, was theoretisch einige Ecksch\xfcsse einfacher macht, aber eigentlich nur den Schwierigkeitsgrad erh\xf6ht.\\n\\nDeshalb gibt es auch einen netten Bonus von +5 M\xfcnzen pro Ziegelstein f\xfcr alle Ziegelsteine, die du nach der Auswahl dieser Option zerst\xf6rst.","upgrades.soft_reset.name":"Weicher Reset","upgrades.soft_reset.tooltip":"Combo-R\xfcckstellungen halten {{percent}}%","upgrades.soft_reset.verbose_description":"Begrenzen Sie die Auswirkungen eines Combo-Resets.","upgrades.steering.name":"","upgrades.steering.tooltip":"","upgrades.steering.verbose_description":"","upgrades.sticky_coins.name":"Klebrige M\xfcnzen","upgrades.sticky_coins.tooltip":"M\xfcnzen haften an Steinen der gleichen Farbe","upgrades.sticky_coins.verbose_description":"Auf Stufe 2 haften sie an Steinen jeder Farbe","upgrades.streak_shots.name":"Gl\xfccksstr\xe4hne","upgrades.streak_shots.tooltip":"Mehr M\xfcnzen, wenn du viele Steine zerbrichst, bevor du auf das Paddel springst.","upgrades.streak_shots.verbose_description":"Jedes Mal, wenn du einen Stein zerbrichst, erh\xf6ht sich dein Combo um eins.\\n\\nSobald der Ball jedoch Ihr Paddel ber\xfchrt, wird die Kombination auf ihren Standardwert zur\xfcckgesetzt.\\n\\nSobald deine Kombo den Basiswert \xfcbersteigt, wird dein Paddel rot umrandet, um dich daran zu erinnern, dass es deine Kombo zerst\xf6rt, wenn du es mit dem Ball ber\xfchrst.","upgrades.sturdy_bricks.name":"Stabile Ziegel","upgrades.sturdy_bricks.tooltip":"+{{lvl}} Ziegel HP, +{{percent}}% M\xfcnzen, die beim Zerbrechen erzeugt werden","upgrades.sturdy_bricks.verbose_description":"Jede Stufe dieses Vorteils f\xfcgt allen Steinen einen HP hinzu. Du kannst die HP-Zahl mit der Perk \\"Hellseher\\" sehen. Du kannst den Schaden der Kugeln
